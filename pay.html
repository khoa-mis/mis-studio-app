function showStaffInvoiceList(s) {
  const dc = s.currency || DB.settings.defaultCurrency || 'USD';

  // Collect all paid runs for this staff member across all months
  const invoices = [];
  Object.entries(DB.payrolls || {}).sort((a, b) => b[0].localeCompare(a[0])).forEach(([month, data]) => {
    const runs = data.extraRuns?.[s.id] || [];
    runs.forEach((run, idx) => {
      if (!run.paid || !run.invoiceNum) return;
      invoices.push({ month, run, idx });
    });
  });

  const fmtAmt = n => fmt(n, dc);

  const rows = invoices.length ? invoices.map(({ month, run }) => {
    const total = Math.max(0, (run.amount || 0) - (run.totalAdvanceDeductions || 0)) + (run.allowance || 0);
    const period = run.periodStart ? fmtPeriodLabel(run.periodStart, run.periodEnd) : fmtMonth(month);
    const hasUrl  = !!run.invoiceUrl;
    const hasPdf  = !!run.invoicePdf;
    return `<tr style="border-bottom:1px solid #F2F1EE">
      <td style="padding:12px 0;font-weight:600;font-family:monospace;font-size:14px">${run.invoiceNum}</td>
      <td style="padding:12px 8px;font-size:13px;color:#898987">${period}</td>
      <td style="padding:12px 8px;font-size:13px;color:#898987">${run.invoiceDate || month}</td>
      <td style="padding:12px 8px;text-align:right;font-weight:700;font-family:monospace">${fmtAmt(total)}</td>
      <td style="padding:12px 0;text-align:right;white-space:nowrap">
        ${hasUrl
          ? `<a href="${run.invoiceUrl}" target="_blank" class="btn btn-ghost btn-sm" style="font-size:11px;text-decoration:none">↗ View PDF</a>`
          : hasPdf
            ? `<button class="btn btn-ghost btn-sm sil-dl-btn" data-inv="${run.invoiceNum}" data-pdf="${run.invoicePdf}" style="font-size:11px">↓ Download</button>`
            : `<button class="btn btn-ghost btn-sm sil-regen-btn" data-month="${run.periodStart?.slice(0,7)||month}" data-sid="${s.id}" data-inv="${run.invoiceNum}" style="font-size:11px;color:#4A7FC1">↻ Regenerate</button>`
        }
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="5" style="padding:32px;text-align:center;color:#ADADAB">No invoices generated yet for ${s.displayName || s.name}.</td></tr>`;

  const o = showModal(
    `Invoices — ${s.displayName || s.name}`,
    `<div style="margin-bottom:4px">
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="padding:8px 0;text-align:left">Invoice #</th>
          <th style="padding:8px 8px;text-align:left">Period</th>
          <th style="padding:8px 8px;text-align:left">Date</th>
          <th style="padding:8px 8px;text-align:right">Amount</th>
          <th style="padding:8px 0"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="padding-top:12px;border-top:1px solid #E2E2E2;text-align:right">
      <button class="btn btn-ghost btn-sm" id="sil-close">Close</button>
    </div>`,
    '580px'
  );

  o.querySelector('#sil-close').onclick = () => o.remove();

  // Download from stored base64
  o.querySelectorAll('.sil-dl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const b64 = btn.dataset.pdf;
      const invNum = btn.dataset.inv;
      if (!b64) return;
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = invNum + '.pdf';
      a.click();
      URL.revokeObjectURL(url);
    });
  });

  // Regenerate PDF from invoice HTML if neither URL nor b64 stored
  o.querySelectorAll('.sil-regen-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      btn.textContent = '…'; btn.disabled = true;
      const sid = btn.dataset.sid;
      const invNum = btn.dataset.inv;
      const month = btn.dataset.month;
      const staff = DB.extraStaff.find(x => x.id === sid); if (!staff) return;
      // Find the run
      let run = null;
      Object.values(DB.payrolls || {}).forEach(data => {
        (data.extraRuns?.[sid] || []).forEach(r => { if (r.invoiceNum === invNum) run = r; });
      });
      if (!run?.invoiceHtml) { toast('Invoice HTML not available — cannot regenerate', 'error'); btn.textContent = '✗'; return; }
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(run.invoiceHtml, 'text/html');
        const container = document.createElement('div');
        container.innerHTML = run.invoiceHtml;
        container.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;';
        document.body.appendChild(container);
        await new Promise(r => setTimeout(r, 200));
        const canvas = await html2canvas(container, { scale: 1.5, useCORS: true, backgroundColor: '#fff', windowWidth: 794 });
        document.body.removeChild(container);
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        const pw = pdf.internal.pageSize.getWidth();
        pdf.addImage(canvas.toDataURL('image/jpeg', 0.7), 'JPEG', 0, 0, pw, Math.min((canvas.height*pw/canvas.width), pdf.internal.pageSize.getHeight()));
        pdf.save(invNum + '.pdf');
        btn.textContent = '✓ Downloaded';
      } catch(err) { toast('Regeneration failed: ' + err.message, 'error'); btn.textContent = '✗ Failed'; }
    });
  });
}


function getEffectiveAllowance(s, date) {
  const history = s.allowanceHistory || [];
  if (!history.length) return s.allowance || 0;
  const d = date || new Date().toISOString().slice(0,10);
  const sorted = [...history].sort((a,b) => b.effectiveFrom.localeCompare(a.effectiveFrom));
  const entry = sorted.find(h => h.effectiveFrom <= d);
  return entry ? entry.amount : (sorted[sorted.length-1]?.amount || s.allowance || 0);
}

function getExtraStaffRate(s, date) {
  const history = s.rateHistory || [];
  if (!history.length) return s.rate || 0;
  const d = date || new Date().toISOString().slice(0,10);
  const sorted = [...history].sort((a,b) => b.effectiveFrom.localeCompare(a.effectiveFrom));
  const entry = sorted.find(h => h.effectiveFrom <= d);
  return entry ? entry.rate : (sorted[sorted.length-1]?.rate || s.rate || 0);
}

// Day Rate: no frequency — invoice amount = day rate × days entered per invoice
// Fixed Monthly: monthly salary, split by frequency
function estMonthlyCost(s, date) {
  const rate = getExtraStaffRate(s, date);
  if (s.rateType === 'day_rate') {
    const daysPerWeek = s.daysPerWeek || (s.scheduledDays?.length) || 5;
    return Math.round(rate * daysPerWeek * 52 / 12);
  }
  return rate; // fixed monthly
}

function estPaymentAmount(s, date) {
  const rate = getExtraStaffRate(s, date);
  if (s.rateType === 'day_rate') {
    const daysPerWeek = s.daysPerWeek || (s.scheduledDays?.length) || 5;
    if (s.frequency === 'weekly')   return Math.round(rate * daysPerWeek);
    if (s.frequency === 'biweekly') return Math.round(rate * daysPerWeek * 2);
    return Math.round(rate * daysPerWeek * 52 / 12); // monthly estimate
  }
  // Fixed monthly — split by frequency
  const monthly = rate;
  if (s.frequency === 'biweekly') return Math.round(monthly / 2);
  if (s.frequency === 'weekly')   return Math.round(monthly / 4);
  return monthly;
}

function calcScheduledDaysInPeriod(s, fromDate, toDate) {
  // Count working days in period based on daysPerWeek (Mon–Fri assumed)
  const daysPerWeek = s.daysPerWeek || (s.scheduledDays?.length) || 5;
  const from = new Date(fromDate);
  const to   = new Date(toDate);
  let count  = 0;
  const d    = new Date(from);
  while (d <= to) {
    const dow = d.getDay(); // 0=Sun,6=Sat
    if (dow !== 0 && dow !== 6) count++; // count weekdays
    d.setDate(d.getDate() + 1);
  }
  // Scale to actual days per week — round to nearest 0.5 to preserve half-days
  const scaled = count * daysPerWeek / 5;
  return Math.round(scaled * 2) / 2 || 0.5;
}

              <div style="font-size:22px;font-weight:300;color:${receiveTotal-spendTotal>=0?'#678F2F':'#C0392B'}">${fmt(receiveTotal-spendTotal,currency)}</div>
            </div>
          </div>
          ${cacheAt ? `<div style="font-size:11px;color:#ADADAB">Last synced ${new Date(cacheAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})} ${new Date(cacheAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</div>` : '<div style="font-size:12px;color:#ADADAB">No Xero data — click Sync Xero to import</div>'}
        </div>
      </div>

      <div class="card" style="padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <input type="text" id="xtx-search" value="${_state.q}" placeholder="Search contact or reference…" style="flex:1;min-width:180px;padding:7px 10px;border:1px solid #E2E2E2;border-radius:4px;font-size:13px;font-family:inherit">
        <select id="xtx-type" style="padding:7px 10px;border:1px solid #E2E2E2;border-radius:4px;font-size:13px;font-family:inherit">
          <option value="all" ${_state.type==='all'?'selected':''}>All types</option>
          <option value="receive" ${_state.type==='receive'?'selected':''}>Income only</option>
          <option value="spend" ${_state.type==='spend'?'selected':''}>Spend only</option>
        </select>
        <select id="xtx-month" style="padding:7px 10px;border:1px solid #E2E2E2;border-radius:4px;font-size:13px;font-family:inherit">
          <option value="">All months</option>
          ${months.map(m=>`<option value="${m}" ${_state.month===m?'selected':''}>${new Date(m+'-01').toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Date</th>
            <th>Type</th>
            <th>Contact / Name</th>
            <th>Description</th>
            <th>Reference</th>
            <th>Bank Account</th>
            <th style="text-align:right">Amount</th>
            <th style="text-align:right">Tax</th>
            <th>Currency</th>
            <th style="text-align:center">Reconciled</th>
          </tr></thead>
          <tbody id="xtx-body"></tbody>
        </table>
      </div>
    </div>
  `;

  function renderRows() {
    const q  = _state.q.toLowerCase();
    const filtered = rows.filter(r => {
      if (_state.type !== 'all' && r.type !== _state.type) return false;
      if (_state.month && !r.date.startsWith(_state.month)) return false;
      if (q && !r.contact.toLowerCase().includes(q) && !r.reference.toLowerCase().includes(q) && !r.description.toLowerCase().includes(q)) return false;
      return true;
    });
    const body = el.querySelector('#xtx-body');
    if (!filtered.length) {
      body.innerHTML = `<tr><td colspan="10" style="padding:32px;text-align:center;color:#ADADAB">${rows.length ? 'No transactions match your filters.' : 'No Xero transactions loaded. Click ↻ Sync Xero to import.'}</td></tr>`;
      return;
    }
    body.innerHTML = filtered.map(r => {
      const lineDesc = r.lineItems.length > 1
        ? r.lineItems.map(li => li.Description).filter(Boolean).join(' · ')
        : r.description;
      return `<tr style="border-bottom:1px solid #F2F1EE">
        <td style="white-space:nowrap;color:#898987">${r.date ? new Date(r.date+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—'}</td>
        <td>${r.type==='receive'
          ? '<span class="badge badge-green" style="font-size:10px">Income</span>'
          : '<span class="badge" style="font-size:10px;background:rgba(192,57,43,.08);color:#C0392B">Spend</span>'}</td>
        <td style="font-weight:600">${r.contact}${r.contactEmail?`<div style="font-size:11px;color:#ADADAB;font-weight:400">${r.contactEmail}</div>`:''}</td>
        <td style="color:#898987;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${lineDesc}">${lineDesc||'—'}</td>
        <td style="font-family:monospace;font-size:13px;color:#4A7FC1">${r.reference||'—'}</td>
        <td style="font-size:12px;color:#898987">${r.bankAccount||'—'}</td>
        <td style="text-align:right;font-weight:700;font-family:monospace;color:${r.type==='receive'?'#678F2F':'#C0392B'}">${r.type==='receive'?'':'-'}${fmt(r.amount,r.currency)}</td>
        <td style="text-align:right;font-size:12px;color:#898987">${r.totalTax ? fmt(r.totalTax,r.currency) : '—'}</td>
        <td><span class="badge badge-gray" style="font-size:10px">${r.currency}${r.currencyRate && r.currencyRate !== 1 ? `<span style="opacity:.6"> @${r.currencyRate.toFixed(4)}</span>` : ''}</span></td>
        <td style="text-align:center">${r.isReconciled ? '<span style="color:#678F2F;font-size:14px">✓</span>' : '<span style="color:#E2E2E2;font-size:14px">○</span>'}</td>
      </tr>`;
    }).join('');
  }

  renderRows();
  el.querySelector('#xtx-search').addEventListener('input', e => { _state.q = e.target.value; renderRows(); });
  el.querySelector('#xtx-type').addEventListener('change',  e => { _state.type = e.target.value; renderRows(); });
  el.querySelector('#xtx-month').addEventListener('change', e => { _state.month = e.target.value; renderRows(); });

  if (!xeroConnected()) {
    el.querySelector('#xtx-body').innerHTML = `<tr><td colspan="7" style="padding:32px;text-align:center;color:#ADADAB">
      Xero is not connected. Go to <strong>Settings → Xero</strong> to connect your account.
    </td></tr>`;
  }
}

  if (_paySettingsPage === 'users' && isAdmin) {

    return `

        <table style="width:100%;border-collapse:collapse;margin-bottom:16px" id="pay-users-tbl">
          <thead><tr>
            <th style="text-align:left;padding:6px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Username</th>
            <th style="padding:6px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Role</th>
            <th style="padding:6px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Password</th>
            <th style="padding:6px 8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Grow</th>
            <th style="padding:6px 0;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Status</th>
            <th style="border-bottom:1px solid #E2E2E2"></th>
          </tr></thead>
          <tbody id="pay-users-body">
            ${users.length
              ? users.map(u => {
                  const active = u.active !== false;
                  const growOn = u.role === 'admin' || u.growAccess === true;
                  return `<tr style="border-bottom:1px solid #F2F1EE;opacity:${active?1:0.5}">
                    <td style="padding:8px 0;font-weight:600">${u.username}</td>
                    <td style="padding:8px 6px"><span class="badge ${u.role==='admin'?'badge-green':'badge-blue'}" style="font-size:10px">${u.role}</span></td>
                    <td style="padding:8px 6px">
                      <span class="pu-pw-mask" data-id="${u.id}" style="font-family:monospace;font-size:13px;letter-spacing:2px;color:#ADADAB">••••••</span>
                      <button class="pu-pw-reveal btn btn-ghost btn-sm" data-id="${u.id}" data-pw="${u.passwordRaw||''}" style="font-size:10px;padding:1px 6px;margin-left:4px">👁</button>
                    </td>
                    <td style="padding:8px 6px;text-align:center">
                      ${u.role === 'admin'
                        ? '<span style="font-size:11px;color:#ADADAB">Always</span>'
                        : `<button class="pu-grow-toggle btn btn-ghost btn-sm" data-id="${u.id}" style="font-size:11px;min-width:52px;color:${growOn?'#678F2F':'#ADADAB'};border-color:${growOn?'#678F2F':'#E2E2E2'}">${growOn?'✓ On':'Off'}</button>`}
                    </td>
                    <td style="padding:8px 6px">
                      <button class="pu-toggle btn btn-ghost btn-sm" data-id="${u.id}" style="font-size:11px;color:${active?'#C0392B':'#678F2F'}">${active?'Deactivate':'Activate'}</button>
                    </td>
                    <td style="padding:8px 0;text-align:right"><button class="btn btn-ghost btn-sm pu-del" data-id="${u.id}" style="font-size:11px;color:#C0392B">Remove</button></td>
                  </tr>`;
                }).join('')
              : '<tr><td colspan="6" style="padding:12px 0;color:#ADADAB;font-size:13px">No users yet. Admin login still works.</td></tr>'}
          </tbody>
        </table>
        <div style="background:#F2F1EE;border-radius:6px;padding:14px 16px">
          <div class="lbl" style="margin-bottom:10px">Add User</div>
          <div class="form-row">
            <div class="form-group"><label>Username</label><input type="text" id="pu-name" placeholder="e.g. jane" autocomplete="off"></div>
            <div class="form-group"><label>Password</label><input type="password" id="pu-pass" placeholder="••••••" autocomplete="new-password"></div>
            <div class="form-group"><label>Role</label><select id="pu-role"><option value="user">user</option><option value="admin">admin</option></select></div>
          </div>
          <button class="btn btn-primary btn-sm" id="pu-add">Add User</button>
        </div>
      </div>`;
  }

  if (_paySettingsPage === 'data') {
  const supaConf = (() => { try { return JSON.parse(localStorage.getItem('mis-supa-config')||'{}'); } catch(e){ return {}; } })();
  return `
    <div class="card mb-20">
      <div class="card-title" style="margin-bottom:4px">Supabase Storage</div>
      <div class="view-desc">Required for storing invoice PDFs. Add a <strong>service role key</strong> to allow uploads, or <a href="https://supabase.com/docs/guides/storage/security/access-control" target="_blank" style="color:#678F2F">add an RLS policy</a> on the <code style="background:#F2F1EE;padding:1px 4px;border-radius:3px">invoices</code> bucket instead.</div>
      <div class="form-row">
        <div class="form-group full">
          <label>Service Role Key <span style="font-weight:400;color:#ADADAB;font-size:11px">— used only for storage uploads, never exposed in emails or sync</span></label>
          <input type="password" id="supa-service-key" value="${supaConf.serviceKey||''}" placeholder="eyJ… (from Supabase → Settings → API → service_role)" style="font-family:monospace;font-size:11px" autocomplete="off">
        </div>
      </div>
      <button class="btn btn-primary btn-sm" id="supa-service-key-save">Save</button>
      <div class="form-hint" style="margin-top:8px">Alternatively, run this in Supabase SQL editor to allow uploads without a service key:<br>
        <code style="background:#F2F1EE;padding:4px 8px;border-radius:3px;font-size:11px;display:block;margin-top:4px;white-space:pre">CREATE POLICY "anon upload invoices" ON storage.objects
  FOR INSERT TO anon
  WITH CHECK (bucket_id = 'invoices');

CREATE POLICY "anon read invoices" ON storage.objects
  FOR SELECT TO anon
  USING (bucket_id = 'invoices');</code>
      </div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:12px">Data Management</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" id="export-btn">Export JSON</button>
        <button class="btn btn-ghost btn-sm" id="reset-btn" style="color:#C0392B">Reset All Data</button>
      </div>
    </div>`;
  }

  return '';
}

function wireSettingsSection(el) {
  const co = DB.settings.company || {};

  // Company
  el.querySelector('#co-save')?.addEventListener('click', () => {
    if (!DB.settings.company) DB.settings.company = {};
    Object.assign(DB.settings.company, {
      name:      el.querySelector('#co-name').value.trim(),
      legalName: el.querySelector('#co-legalname').value.trim(),
      uen:       el.querySelector('#co-uen').value.trim(),
      gst:       el.querySelector('#co-gst').value.trim(),
      address:   el.querySelector('#co-addr').value.trim(),
      city:      el.querySelector('#co-city').value.trim(),
      state:     el.querySelector('#co-state').value.trim(),
      zip:       el.querySelector('#co-zip').value.trim(),
      country:   el.querySelector('#co-country').value.trim(),
      bankName:  el.querySelector('#co-bankname').value.trim(),
      iban:      el.querySelector('#co-iban').value.trim(),
      swift:     el.querySelector('#co-swift').value.trim(),
      phone:     el.querySelector('#co-phone').value.trim(),
      email:     el.querySelector('#co-email').value.trim(),
      website:   el.querySelector('#co-web').value.trim(),
    });
    saveDB(); toast('Company details saved ✓');
  });

  // Entities
  const etb = el.querySelector('#ent-body');
  if (etb) {
    DB.entities.forEach(ent => {
      const staffCount = DB.staff.filter(s => s.entityId === ent.id).length;
      const tr = document.createElement('tr');
      tr.innerHTML = '<td style="font-weight:600">'+ent.name+(ent.legalName&&ent.legalName!==ent.name?'<div style="font-size:11px;color:#898987;font-weight:400">'+ent.legalName+'</div>':'')+'</td>'
        +'<td style="font-size:14px;font-family:monospace;color:#898987">'+(ent.uen||'<span style="color:#ADADAB">—</span>')+'</td>'
        +'<td style="font-size:14px;color:#898987">'+(ent.country||'<span style="color:#ADADAB">—</span>')+'</td>'
        +'<td><span class="badge badge-gray">'+ent.currency+'</span></td>'
        +'<td style="text-align:right;white-space:nowrap"><button class="btn btn-ghost btn-sm edit-ent" data-id="'+ent.id+'">Edit</button><button class="btn btn-ghost btn-sm del-ent" data-id="'+ent.id+'" style="color:'+(staffCount>0?'#ADADAB':'#C0392B')+';" '+(staffCount>0?'title="Remove all staff from this entity first" disabled':'')+'>Delete</button></td>';
      etb.appendChild(tr);
    });
    el.querySelector('#add-ent')?.addEventListener('click', () => showEntityModal());
    el.querySelectorAll('.edit-ent').forEach(btn => btn.addEventListener('click', () => { const e = DB.entities.find(x=>x.id===btn.dataset.id); if(e) showEntityModal(e); }));
    el.querySelectorAll('.del-ent').forEach(btn => btn.addEventListener('click', () => {
      const ent = DB.entities.find(x=>x.id===btn.dataset.id); if(!ent) return;
      if (DB.staff.filter(s=>s.entityId===ent.id).length > 0) { toast('Move all staff off this entity before deleting it','error'); return; }
      confirmModal('Delete Entity','Delete <strong>'+ent.name+'</strong>? This cannot be undone.','Delete', () => {
        DB.entities = DB.entities.filter(e=>e.id!==ent.id); saveDB(); renderView(); toast(ent.name+' deleted');
      });
    }));
  }

  // Currencies
  el.querySelector('#save-dc')?.addEventListener('click', () => { DB.settings.defaultCurrency = el.querySelector('#set-dc').value; saveDB(); renderView(); toast('Saved ✓'); });

  // Tax profiles
  const tpb = el.querySelector('#tp-body');
  if (tpb) {
    DB.taxProfiles.forEach(tp => {
      const g=5000, ed=Math.round(g*tp.employeeRate), ec=Math.round(g*tp.employerRate);
      const builtin = ['sg-cpr','sg-ep','sg-spr1','sg-spr2','none'].includes(tp.id);
      const tr = document.createElement('tr');
      tr.innerHTML = '<td style="font-weight:600">'+tp.name+'</td><td class="mono" style="text-align:right">'+(tp.employeeRate*100).toFixed(1)+'%</td><td class="mono" style="text-align:right">'+(tp.employerRate*100).toFixed(1)+'%</td><td class="mono" style="text-align:right">$'+(g-ed).toLocaleString()+'</td><td class="mono" style="text-align:right;color:#678F2F">$'+(g+ec).toLocaleString()+'</td><td style="text-align:right"><button class="btn btn-ghost btn-sm edit-tp" data-id="'+tp.id+'">Edit</button>'+(builtin?'':'<button class="btn btn-ghost btn-sm del-tp" data-id="'+tp.id+'" style="color:#C0392B;margin-left:4px">Delete</button>')+'</td>';
      tpb.appendChild(tr);
    });
    el.querySelector('#add-tp')?.addEventListener('click', () => showTaxModal());
    el.querySelectorAll('.edit-tp').forEach(btn => btn.addEventListener('click', () => { const tp=DB.taxProfiles.find(t=>t.id===btn.dataset.id); if(tp) showTaxModal(tp); }));
    el.querySelectorAll('.del-tp').forEach(btn => btn.addEventListener('click', () => {
      const tp = DB.taxProfiles.find(t=>t.id===btn.dataset.id); if(!tp) return;
      confirmModal('Delete','Delete <strong>'+tp.name+'</strong>?','Delete', () => { DB.taxProfiles=DB.taxProfiles.filter(t=>t.id!==tp.id); saveDB(); renderView(); toast('Deleted'); });
    }));
  }

  // Xero
  const uriEl = el.querySelector('#xero-redirect-uri');
  if (uriEl) uriEl.textContent = window.location.href.split('?')[0].split('#')[0];
  el.querySelector('#xero-save-tenant')?.addEventListener('click', () => {
    const tid = el.querySelector('#xero-tenant-id-input')?.value.trim();
    if (!tid) { toast('Enter a Tenant ID','error'); return; }
    xeroSaveTokens({...xeroTokens(), tenantId:tid, tenantName:'Xero'});
    xeroFetch('Organisations').then(d => { const n=d?.Organisations?.[0]?.Name; if(n) xeroSaveTokens({...xeroTokens(), tenantName:n}); }).catch(()=>{});
    renderView(); toast('Tenant ID saved ✓');
  });
  el.querySelector('#xero-save-cfg')?.addEventListener('click', () => {
    const clientId=el.querySelector('#xero-client-id')?.value.trim();
    const clientSecret=el.querySelector('#xero-client-secret')?.value.trim();
    if (!clientId) { toast('Enter a Client ID','error'); return; }
    xeroSaveConfig({clientId, clientSecret}); toast('Xero credentials saved ✓');
  });
  el.querySelector('#xero-connect')?.addEventListener('click', () => xeroStartAuth());
  el.querySelector('#xero-disconnect')?.addEventListener('click', () => { xeroClearTokens(); renderView(); toast('Xero disconnected'); });

  el.querySelector('#xero-pull-btn')?.addEventListener('click', async function() {
    const btn = this;
    const statusEl = el.querySelector('#xero-cache-status');
    btn.disabled = true;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="animation:spin .8s linear infinite"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg> Pulling…`;
    if (statusEl) statusEl.textContent = 'Fetching from Xero…';
    try {
      // Bust all caches then re-fetch both transaction types in parallel
      localStorage.removeItem(XERO_CACHE_KEY);
      localStorage.removeItem(XERO_SPEND_CACHE_KEY);
      // Also clear any contact-specific caches
      Object.keys(localStorage)
        .filter(k => k.startsWith(XERO_CONTACT_CACHE_KEY))
        .forEach(k => localStorage.removeItem(k));
      const [receive, spend] = await Promise.all([
        xeroFetchInvoices(true),
        xeroFetchSpend(true),
      ]);
      const total = (receive?.length || 0) + (spend?.length || 0);
      if (statusEl) statusEl.textContent = 'Last synced ' + new Date().toLocaleString();
      toast(`Xero updated — ${total} transaction${total !== 1 ? 's' : ''} loaded ✓`);
    } catch(e) {
      if (statusEl) statusEl.textContent = 'Sync failed — check connection';
      toast('Failed to pull Xero transactions', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg> Pull Latest`;
    }
  });
  el.querySelector('#xero-track-contact-save')?.addEventListener('click', () => {
    const name = el.querySelector('#xero-track-contact')?.value.trim();
    if (!DB.settings.xero) DB.settings.xero = {};
    DB.settings.xero.trackContact = name;
    saveDB();
    const cacheKey = 'mis-xero-contact-' + (name||'').toLowerCase().replace(/\s+/g,'-');
    localStorage.removeItem(cacheKey);
    toast(name ? `Tracking payments to "${name}" ✓` : 'Contact tracking cleared');
  });

  el.querySelector('#xero-sync-from-save')?.addEventListener('click', () => {
    DB.settings.xeroSyncFrom = el.querySelector('#xero-sync-from')?.value || '';
    saveDB();
    toast('Xero sync date saved — re-sync to apply ✓');
  });

  el.querySelector('#ci-save')?.addEventListener('click', () => {
    DB.settings.contactInvoice = {
      name:     el.querySelector('#ci-name').value.trim(),
      reg:      el.querySelector('#ci-reg').value.trim(),
      address:  el.querySelector('#ci-address')?.value.trim() || '',
      city:     el.querySelector('#ci-city')?.value.trim() || '',
      zip:      el.querySelector('#ci-zip')?.value.trim() || '',
      country:  el.querySelector('#ci-country')?.value.trim() || '',

        +rows.map((r,i)=>{const match=DB.staff.find(s=>s.name.toLowerCase()===r.name.toLowerCase()||(s.displayName&&s.displayName.toLowerCase()===r.name.toLowerCase()));const opts='<option value="">— Skip —</option>'+DB.staff.filter(s=>s.active).map(s=>'<option value="'+s.id+'"'+(match&&match.id===s.id?' selected':'')+'>'+displayName(s)+'</option>').join('');return '<tr style="border-bottom:1px solid #E2E2E2"><td style="padding:8px 12px;font-weight:600">'+r.name+'</td><td style="padding:8px 12px;color:#898987">'+r.accountName+'</td><td style="padding:8px 12px;font-family:monospace;font-size:14px">'+r.swift+'</td><td style="padding:8px 12px;font-family:monospace;font-size:14px">'+r.accountNumber+'</td><td style="padding:8px 12px;min-width:160px"><select class="bank-match-sel" data-idx="'+i+'" style="width:100%;padding:5px 8px;border:1px solid '+(match?'#E2E2E2':'#C0392B')+';border-radius:3px;font-family:inherit;font-size:14px">'+opts+'</select></td></tr>';}).join('')
        +'</tbody></table>';
    },
    onConfirm(rows, el) {
      let updated=0,skipped=0;
      el.querySelectorAll('.bank-match-sel').forEach(sel=>{const idx=parseInt(sel.dataset.idx);const staffId=sel.value;if(!staffId){skipped++;return;}const staff=DB.staff.find(s=>s.id===staffId);if(!staff){skipped++;return;}const r=rows[idx];staff.bankAccount={accountName:r.accountName,swift:r.swift.toUpperCase(),accountNumber:r.accountNumber};updated++;});
      return updated+' bank detail'+(updated!==1?'s':'')+' updated'+(skipped?', '+skipped+' skipped':'');
    }
  });
}

//  PAY LOGIN — username + password, role-based nav
// ══════════════════════════════════════════════════════════════
(function(){
const _PAY_SESS_KEY = 'mis-pay-session';
const _USER_VIEWS   = ['extrastaff','extrapayrun']; // views accessible to 'user' role
const _SESS_TTL     = 12 * 60 * 60 * 1000;

// Simple hash (same as original)
function _h(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(16);}

function _getSess(){
  try{const s=JSON.parse(sessionStorage.getItem(_PAY_SESS_KEY));return(s&&s.expires>Date.now())?s:null;}catch(e){return null;}
}
function _setSess(username, role){
  sessionStorage.setItem(_PAY_SESS_KEY, JSON.stringify({username, role, expires: Date.now()+_SESS_TTL}));
}

// Returns the users list from DB (loaded from localStorage payroll-v1)
function _getUsers(){
  try{
    const db = JSON.parse(localStorage.getItem('payroll-v1')||'{}');
    return (db.settings?.payUsers) || [];
  } catch(e){ return []; }
}

// Also check legacy PIN for backward compat
const _PK='mis-pin-v1';
const _legacyPin = () => localStorage.getItem(_PK) || _h('1234');

window._payGetSess  = _getSess;
window._payLogout = function(){
  sessionStorage.removeItem(_PAY_SESS_KEY);
  sessionStorage.removeItem('mis-session-v1');
  localStorage.removeItem('mis-session-v1');
  window.location.href = 'trackr.html';
};
window._payIsAdmin  = function(){ const s=_getSess(); return !s || s.role==='admin'; };
window._payCanView  = function(view){ const s=_getSess(); if(!s||s.role==='admin')return true; return _USER_VIEWS.includes(view); };

// Keep legacy session compat for _initAuth
function _legacySess(){try{const s=JSON.parse(localStorage.getItem('mis-session-v1'));return(s&&s.expires>Date.now())?s:null;}catch(e){return null;}}
window._setSession=function(){localStorage.setItem('mis-session-v1',JSON.stringify({loggedIn:true,expires:Date.now()+_SESS_TTL}));};
window._logout=function(){localStorage.removeItem('mis-session-v1');sessionStorage.removeItem(_PAY_SESS_KEY);location.reload();};
window._changePin=function(oldPin,newPin){if(_h(oldPin)!==_legacyPin())return false;localStorage.setItem(_PK,_h(newPin));return true;};

function _buildPayLogin(onAuth){
  const overlay = document.getElementById('_login-overlay') || (() => {
    const el=document.createElement('div'); el.id='_login-overlay'; document.body.insertBefore(el,document.body.firstChild); return el;
  })();
  overlay.style.cssText='position:fixed;inset:0;background:#2F2F2F;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;font-family:Manrope,sans-serif';
  overlay.innerHTML=`
    <div style="text-align:center;margin-bottom:32px">
      <svg xmlns="http://www.w3.org/2000/svg" width="72" height="58" viewBox="0 0 397 319"><g transform="translate(1)"><text transform="translate(334 248)" fill="#fff" font-size="233" font-family="Manrope,sans-serif" letter-spacing="0.088em"><tspan x="-61.162" y="0">s</tspan></text><text transform="translate(101 249)" fill="#fff" font-size="234" font-family="Manrope,sans-serif" font-weight="500" letter-spacing="0.088em"><tspan x="-101.205" y="0">m</tspan></text><rect width="20" height="126" transform="translate(230 124)" fill="#fff"/><rect width="20" height="22" transform="translate(230 78)" fill="#fff"/></g></svg>
      <div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-top:6px">PAY</div>
    </div>
    <div style="background:#fff;border-radius:8px;padding:32px 36px;width:320px;box-shadow:0 24px 60px rgba(0,0,0,0.35)">
      <div style="font-size:18px;font-weight:700;margin-bottom:4px">Sign in</div>
      <div style="font-size:13px;color:#898987;margin-bottom:24px">mis.studio Payroll</div>
      <label style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#898987;display:block;margin-bottom:6px">Username</label>
      <input id="_pu-user" type="text" autocomplete="username" placeholder="username" style="width:100%;padding:11px 14px;border:1px solid #E2E2E2;border-radius:3px;font-family:inherit;font-size:14px;outline:none;margin-bottom:12px;background:#F2F1EE;color:#2F2F2F">
      <label style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#898987;display:block;margin-bottom:6px">Password</label>
      <input id="_pu-pass" type="password" autocomplete="current-password" placeholder="••••••" style="width:100%;padding:11px 14px;border:1px solid #E2E2E2;border-radius:3px;font-family:inherit;font-size:14px;outline:none;margin-bottom:16px;background:#F2F1EE;color:#2F2F2F">
      <div id="_pu-err" style="color:#C0392B;font-size:14px;margin-bottom:12px;display:none">Incorrect username or password.</div>
      <button id="_pu-btn" style="width:100%;padding:13px;background:#678F2F;color:#fff;border:none;border-radius:3px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">Sign In</button>
    </div>`;

  const userInp = overlay.querySelector('#_pu-user');
  const passInp = overlay.querySelector('#_pu-pass');
  const errEl   = overlay.querySelector('#_pu-err');
  const btn     = overlay.querySelector('#_pu-btn');

  function go(){
    const username = (userInp.value||'').trim().toLowerCase();
    const password = passInp.value||'';
    const users    = _getUsers();

    // Check pay users list
    const match = users.find(u => u.username.toLowerCase()===username && u.passwordHash===_h(password));
    if(match){
      if(match.active === false){ errEl.textContent='Account is deactivated. Contact your administrator.'; errEl.style.display='block'; return; }
      _setSess(match.username, match.role);
      _setSession(); // keep legacy session alive too
      overlay.style.display='none';
      document.getElementById('app-root').style.display='flex';
      onAuth();
      return;
    }
    // Fallback: admin + legacy PIN (username 'admin', password = PIN)
    if(username==='admin' && _h(password)===_legacyPin()){
      _setSess('admin','admin');
      _setSession();
      overlay.style.display='none';
      document.getElementById('app-root').style.display='flex';
      onAuth();
      return;
    }
    errEl.style.display='block'; passInp.value=''; passInp.focus();
  }

  btn.addEventListener('click', go);
  [userInp, passInp].forEach(inp => {
    inp.addEventListener('keydown', e => { if(e.key==='Enter') go(); });
    inp.addEventListener('focus', () => { inp.style.borderColor='#678F2F'; inp.style.boxShadow='0 0 0 3px rgba(103,143,47,.1)'; });
    inp.addEventListener('blur',  () => { inp.style.borderColor='#E2E2E2'; inp.style.boxShadow=''; });
  });
  setTimeout(() => userInp.focus(), 80);
}

window._initAuth = function(onAuth){
  const appRoot = document.getElementById('app-root');
  const paySess = _getSess();
  const legSess = _legacySess();
  // Accept either a valid pay session OR a legacy mis-session (for TRACKR SSO users)
  if(paySess || legSess){
    if(legSess && !paySess) _setSess('admin','admin'); // TRACKR SSO = admin
    appRoot.style.display='flex';
    onAuth();
  } else {
    appRoot.style.display='none';
    _buildPayLogin(onAuth);
  }
};
})();

// ══════════════════════════════════════════════════════════════
//  SUPABASE SYNC — pay.html
//  Uses same mis-supa-config credentials as trackr.
//  Stores payroll data in mis_workspaces with id='payroll-default'
// ══════════════════════════════════════════════════════════════
const SUPA_CFG_KEY  = 'mis-supa-config';
const SUPA_ROW_ID   = 'payroll-default';
let   _payLastPushAt   = 0;
let   _payLastRemoteTs = null;
let   _payPollTimer    = null;
let   _paySyncPending  = false;
let   _paySyncTimer    = null;
let   _paySupabaseReady = false; // must be true before any push is allowed

const _PAY_SUPA_FALLBACK = {
  url: '__SUPABASE_URL__',
  anonKey: '__SUPABASE_ANON_KEY__'
};

// Boot
document.querySelectorAll('.nav-item[data-view]').forEach(item=>{
  item.addEventListener('click',()=>navigate(item.dataset.view));
});

// Cross-tab sync: when TRACKR or CSM writes to mis-v1, refresh anything
// that depends on it (design tokens, team members, currencies)
window.addEventListener('storage', e => {
  if (e.key !== 'mis-v1' || !e.newValue) return;
  // Re-apply design tokens immediately (affects whole UI)
  applyDesignFromTrackr();
  // Sync team member name/nickname changes from TRACKR
  syncStaffFromTrackr();
  // Re-render affected views — skip extrapayrun to preserve in-progress edits
  if (['payroll', 'staff', 'overview'].includes(currentView)) renderView();
});
_initAuth(async function(){
  // Apply nav visibility based on role
  const sess = window._payGetSess ? window._payGetSess() : null;
  const isAdmin = !sess || sess.role === 'admin';
  if (!isAdmin) {
    const userViews = ['extrastaff','extrapayrun'];
    document.querySelectorAll('.nav-item[data-view]').forEach(item => {
      if (!userViews.includes(item.dataset.view)) item.style.display = 'none';
    });
  }

  // Render user footer — append directly to sidebar (mirrors TRACKR pattern)
  const existingUserArea = document.getElementById('pay-user-pill');
  if (existingUserArea) existingUserArea.remove();

  // Resolve display name: prefer TRACKR team member name (real name),
  // fall back to PAY session username (e.g. "admin") only if no member found
  let displayUsername = sess ? sess.username : 'admin';
  let displayRole     = sess ? (sess.role === 'admin' ? 'Admin' : 'User') : 'Admin';
  try {
    const trackrDB  = JSON.parse(localStorage.getItem('mis-v1') || '{}');
    const trackrSes = JSON.parse(sessionStorage.getItem('mis-session-v1') || localStorage.getItem('mis-session-v1') || 'null');
    if (trackrSes?.memberId) {
      const member = (trackrDB.teamMembers || []).find(m => m.id === trackrSes.memberId);
      if (member?.name) {
        displayUsername = member.nickname || member.name;
        displayRole     = { admin: 'Admin', team_manager: 'Manager', member: 'Member' }[member.role] || displayRole;
      }
    }
  } catch(_) {}

  const initials = displayUsername.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || 'PA';
  const userArea = document.createElement('div');
  userArea.className = 'sidebar-user';
  userArea.id = 'pay-user-pill';
  userArea.title = 'Sign out';
  userArea.innerHTML = `
    <div class="avatar-sm" style="flex-shrink:0">${initials}</div>
    <div class="sidebar-user-info">
      <div class="sidebar-user-name">${displayUsername}</div>
      <div class="sidebar-user-role">${displayRole}</div>
    </div>`;
  userArea.addEventListener('click', () => window._payLogout());
  document.querySelector('.sidebar').appendChild(userArea);
  // Check for Xero OAuth callback
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('code') && urlParams.get('state') === 'xero-pay') {
    const code = urlParams.get('code');
    window.history.replaceState({}, '', window.location.pathname);
    loadDB(); renderView();
    const ok = await xeroHandleCallback(code);
    if (ok) { toast('Xero connected ✓'); renderView(); }
    else toast('Xero connection failed — try again', 'error');
    setTimeout(initPayRealtime, 800);
    return;
  }
  // Check role permission: access_pay must be in user's role permissions
  (function checkPayAccess(){
    try{
      const sess = JSON.parse(localStorage.getItem('mis-session-v1'));
      const trackrDB = JSON.parse(localStorage.getItem('mis-v1'));
      if(!sess||!trackrDB)return;
      const memberId = sess.memberId;
      const member = (trackrDB.teamMembers||[]).find(m=>m.id===memberId);
      if(!member)return;
      const role = member.role||'member';
      const perms = (trackrDB.rolePermissions||{})[role]||[];
      if(!perms.includes('access_pay')){
        document.getElementById('app-root').style.display='none';
        document.body.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F2F1EE;font-family:Manrope,sans-serif">'
          +'<div style="text-align:center;padding:40px">'
          +'<div style="font-size:48px;margin-bottom:16px">🔒</div>'
          +'<div style="font-size:22px;font-weight:700;color:#2F2F2F;margin-bottom:8px">Access Restricted</div>'
          +'<div style="font-size:14px;color:#898987;max-width:320px;line-height:1.6">Your account doesn\'t have permission to access PAY. Contact your administrator to request access.</div>'
          +'<a href="trackr.html" style="display:inline-block;margin-top:24px;padding:10px 20px;background:#678F2F;color:#fff;border-radius:6px;text-decoration:none;font-size:14px;font-weight:600">← Back to TRACKR</a>'
          +'</div></div>';
        throw new Error('access_denied');
      }
    }catch(e){ if(e.message==='access_denied')throw e; }
  })();

  loadDB();
  applyDesignFromTrackr();
  FX.warmUp(); // refresh cached FX rates in background
  renderView();
  if(paySupaCfg()){
    try{
      let ok=await paySupaPull();
      if(ok){loadDB();applyDesignFromTrackr();renderView();}
      else if(!_paySupabaseReady){
        setTimeout(async()=>{
          const ok2=await paySupaPull();
          if(ok2){loadDB();applyDesignFromTrackr();renderView();}
          if(!_paySupabaseReady) showSyncBlockedOverlay();
        },2000);
      }
    }catch(e){}
  }
  setTimeout(initPayRealtime,800);
});

function paySupaCfg() {
  try {
    const r = JSON.parse(localStorage.getItem(SUPA_CFG_KEY) || 'null');
    if (r && r.url && r.anonKey) return r;
  } catch(e) { /* fall through */ }
  // Env fallback — only use if both url and key are provided
  if (_PAY_SUPA_FALLBACK.url && _PAY_SUPA_FALLBACK.anonKey) {
    localStorage.setItem(SUPA_CFG_KEY, JSON.stringify(_PAY_SUPA_FALLBACK));
    return _PAY_SUPA_FALLBACK;
  }
  return null;
}

// Upload a PDF (base64 string, no prefix) to Supabase Storage
// Returns the public URL or null on failure
// Bucket: "invoices" (create it in Supabase → Storage with public access)
async function paySupaUploadInvoice(invNum, pdfBase64) {
  const cfg = paySupaCfg();
  if (!cfg) return null;
  // Use service role key for storage if configured, fallback to anon key
  const supaConf = (() => { try { return JSON.parse(localStorage.getItem('mis-supa-config')||'{}'); } catch(e){ return {}; } })();
  const uploadKey = supaConf.serviceKey || cfg.anonKey;
  try {
    const binary = atob(pdfBase64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'application/pdf' });
    const path = `invoices/${invNum}.pdf`;
    const uploadUrl = cfg.url.replace(/\/$/, '') + '/storage/v1/object/' + path;
    const res = await fetch(uploadUrl, {
      method: 'POST',
      headers: {
        'apikey':        uploadKey,
        'Authorization': 'Bearer ' + uploadKey,
        'Content-Type':  'application/pdf',
        'x-upsert':      'true',
      },
      body: blob,
    });
    if (!res.ok) { return null; }
    return cfg.url.replace(/\/$/, '') + '/storage/v1/object/public/' + path;
  } catch(e) { return null; }
}

async function paySupaFetch(path, opts = {}) {
  const cfg = paySupaCfg();
  if (!cfg) return null;
  const url = cfg.url.replace(/\/$/, '') + '/rest/v1' + path;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'apikey':        cfg.anonKey,
      'Authorization': 'Bearer ' + cfg.anonKey,
      'Content-Type':  'application/json',
      'Prefer':        opts.prefer || '',
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) { const t = await res.text(); throw new Error('Supabase ' + res.status + ': ' + t); }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

function showSyncBlockedOverlay() {
  // Don't stack multiple overlays
  if (document.getElementById('sync-blocked-overlay')) return;

  const overlay = document.createElement('div');
  overlay.id = 'sync-blocked-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(47,47,47,0.72);backdrop-filter:blur(3px);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:10px;padding:32px 36px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.25)">
      <div style="font-size:40px;margin-bottom:12px">🛸</div>
      <div style="font-size:17px;font-weight:700;color:#2F2F2F;margin-bottom:8px">Hold up, we need to phone home</div>
      <div style="font-size:14px;color:#898987;margin-bottom:24px;line-height:1.6">
        PAY couldn't check what the mothership knows.<br>
        <strong style="color:#2F2F2F">We've frozen your edits to avoid a data catastrophe</strong> — someone else might have been busy while you weren't looking.
      </div>
      <div id="sync-overlay-status" style="font-size:13px;color:#ADADAB;margin-bottom:20px;min-height:18px"></div>
      <button id="sync-pull-btn" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px">📡 Beam me down the latest</button>
      <div style="font-size:14px;color:#ADADAB;margin-top:12px">Grabs the freshest data from Supabase. Won't hurt a bit.</div>
    </div>`;
  document.body.appendChild(overlay);

  const status = overlay.querySelector('#sync-overlay-status');
  overlay.querySelector('#sync-pull-btn').addEventListener('click', async () => {
    const btn = overlay.querySelector('#sync-pull-btn');
    btn.textContent = '📡 Beaming…'; btn.disabled = true;
    status.textContent = '';
    try {
      const ok = await paySupaPull();
      if (ok) {
        loadDB(); applyDesignFromTrackr(); renderView();
        overlay.remove();
        toast('All caught up ✓');
      } else if (_paySupabaseReady) {
        // Local was newer — safe to continue
        overlay.remove();
        toast('You were already ahead — good to go ✓');
      } else {
        status.innerHTML = '<span style="color:#C0392B">Houston, we have a problem. Check your connection and try again.</span>';
        btn.textContent = '📡 Try again'; btn.disabled = false;
      }
    } catch(e) {
      status.innerHTML = '<span style="color:#C0392B">Oof: ' + (e.message || 'Something went wrong') + '</span>';
      btn.textContent = '📡 Try again'; btn.disabled = false;
    }
  });
}

async function paySupaPush() {
  const cfg = paySupaCfg();
  if (!cfg) return;
  if (!_paySupabaseReady) {
    // Not ready yet — re-schedule so we don't lose the change
    schedulePayPush();
    return;
  }
  if (!DB.entities?.length && !DB.staff?.length) return;
  _payLastPushAt = Date.now();
  const pushedAt = new Date().toISOString();
  // Strip large blobs before pushing (same as saveDB)
  const dbForPush = JSON.parse(JSON.stringify(DB));
  if (dbForPush.payrolls) {
    Object.values(dbForPush.payrolls).forEach(monthData => {
      if (monthData.extraRuns) Object.values(monthData.extraRuns).forEach(runs => (runs||[]).forEach(r => { delete r.invoiceHtml; delete r.invoicePdf; }));
      (monthData.oneOffPayments||[]).forEach(p => { delete p.invoiceHtml; delete p.invoicePdf; });
      if (monthData.payslips) Object.values(monthData.payslips).forEach(p => { delete p.html; delete p.pdf; });
    });
  }
  try {
    await paySupaFetch('/mis_workspaces', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=minimal',
      body: JSON.stringify({ id: SUPA_ROW_ID, data: dbForPush, updated_at: pushedAt }),
    });
    // Sync local timestamp so pull on next boot doesn't overwrite our fresh push
    _payLastRemoteTs = pushedAt;
    // Only update pay-local-saved-at if nothing newer was saved while the push was in flight
    const currentPaySaved = localStorage.getItem('pay-local-saved-at') || '0';
    if (pushedAt >= currentPaySaved) localStorage.setItem('pay-local-saved-at', pushedAt);
    updatePaySyncIndicator('synced');
  } catch(e) {
    updatePaySyncIndicator('error');
  }
}

async function paySupaPull() {
  const cfg = paySupaCfg();
  if (!cfg) return false;
  try {
    const rows = await paySupaFetch('/mis_workspaces?id=eq.' + encodeURIComponent(SUPA_ROW_ID) + '&select=data,updated_at');
    if (!rows || !rows.length || !rows[0].data) {
      _paySupabaseReady = true;
      return false;
    }
    // Don't overwrite local if our local save is newer than what's in Supabase
    const remoteTs = new Date(rows[0].updated_at).getTime();
    const localTs  = new Date(localStorage.getItem('pay-local-saved-at') || 0).getTime();
    if (localTs > remoteTs) {
      _paySupabaseReady = true;
      // Local is newer — push local up to Supabase instead
      schedulePayPush();
      return false;
    }
    DB = rows[0].data;
    // Write localStorage copy without the large xeroCache blob
    const lsCopy = JSON.parse(JSON.stringify(DB));
    delete lsCopy.xeroCache;
    localStorage.setItem(KEY, JSON.stringify(lsCopy));
    // Propagate Xero cache to standalone keys so TRACKR can read them
    if (DB.xeroCache?.invoices) {
      try { localStorage.setItem(XERO_CACHE_KEY, JSON.stringify(DB.xeroCache.invoices)); } catch(_) {}
    }
    if (DB.xeroCache?.spend) {
      try { localStorage.setItem(XERO_SPEND_CACHE_KEY, JSON.stringify(DB.xeroCache.spend)); } catch(_) {}
    }
    _paySupabaseReady = true;
    return true;
  } catch(e) {
    // Pull failed — still allow pushes after a grace period
    setTimeout(() => { _paySupabaseReady = true; }, 5000);
    return false;
  }
}

function schedulePayPush() {
  if (!paySupaCfg()) return;
  _paySyncPending = true;
  updatePaySyncIndicator('pending');
  clearTimeout(_paySyncTimer);
  // 300ms delay — fast enough to survive a quick refresh
  _paySyncTimer = setTimeout(async () => {
    await paySupaPush();
    _paySyncPending = false;
  }, 300);
}

function updatePaySyncIndicator(state) {
  const el = document.getElementById('pay-sync-indicator');
  if (!el) return;
  const map = {
    pending: ['⟳ Saving…',    '#ADADAB'],
    synced:  ['✓ Synced',     '#678F2F'],
    error:   ['✗ Sync error', '#C0392B'],
    live:    ['● Live',       '#22c55e'],
  };
  const [text, color] = map[state] || map.synced;
  el.textContent = text;
  el.style.color  = color;
  el.style.opacity = '1';
  if (state === 'synced') setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

// Polling — check remote updated_at every 8s
async function _payPollChanges() {
  if (Date.now() - _payLastPushAt < 5000) return;
  try {
    const rows = await paySupaFetch('/mis_workspaces?id=eq.' + encodeURIComponent(SUPA_ROW_ID) + '&select=updated_at');
    const ts = rows?.[0]?.updated_at || null;
    if (!ts) return;
    if (_payLastRemoteTs && ts !== _payLastRemoteTs) {
      if (_paySyncPending || (Date.now() - _payLastPushAt) < 5000) {
        _payLastRemoteTs = ts;
        return;
      }
      updatePaySyncIndicator('pending');
      const ok = await paySupaPull();
      if (ok) {
        loadDB(); applyDesignFromTrackr();
        // Preserve scroll position — skip re-render for views with editable inline fields
        // to avoid wiping in-progress input changes
        const scrollY = window.scrollY;
        if (currentView !== 'payroll' && currentView !== 'extrapayrun') {
          renderView();
        }
        window.scrollTo(0, scrollY);
        _showPayUpdateBanner();
      }
    }
    _payLastRemoteTs = ts;
    updatePaySyncIndicator('live');
  } catch(e) { /* silent */ }
}

function initPayRealtime() {
  if (!paySupaCfg()) return;
  if (_payPollTimer) clearInterval(_payPollTimer);
  paySupaFetch('/mis_workspaces?id=eq.' + encodeURIComponent(SUPA_ROW_ID) + '&select=updated_at')
    .then(rows => { _payLastRemoteTs = rows?.[0]?.updated_at || null; updatePaySyncIndicator('live'); })
    .catch(() => {});
  _payPollTimer = setInterval(_payPollChanges, 8000);
}

function _showPayUpdateBanner() {
  const ex = document.getElementById('_pay-rt-banner');
  if (ex) ex.remove();
  const el = document.createElement('div');
  el.id = '_pay-rt-banner';
  el.style.cssText = 'position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#2F2F2F;color:#fff;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:500;z-index:8000;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px';
  el.innerHTML = '<span style="color:#22c55e;font-size:16px">&#9679;</span> Updated by another user';
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2500);
}

</script>
