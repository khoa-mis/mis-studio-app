      <option value="fixed"     ${_overviewState.staffType==='fixed'?'selected':''}>Fixed</option>
      <option value="freelance" ${_overviewState.staffType==='freelance'?'selected':''}>Freelance</option>
    </select>
    ${activeCurrencies.length > 1 ? `<div style="display:flex;gap:3px;margin-left:4px">${activeCurrencies.map(c=>`<button data-ov-curr="${c}" style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;border:1px solid ${c===ovCurr?'#678F2F':'#E2E2E2'};background:${c===ovCurr?'#678F2F':'transparent'};color:${c===ovCurr?'#fff':'#898987'};cursor:pointer;transition:all .12s">${c}</button>`).join('')}</div>` : ''}`;
  acts.appendChild(_fbar);

  el.innerHTML = `

    <div id="ov-stats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px"></div>

    <div class="card" style="padding:24px;margin-bottom:24px">
      <div class="lbl">Monthly ${hasXero?'Income vs Costs':'Staff Costs'}</div>
      <div style="position:relative;width:100%;height:280px">
        <canvas id="ov-chart"></canvas>
      </div>
      <div style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap">
        ${hasXero ? `<span style="display:flex;align-items:center;gap:6px;font-size:14px;color:#ADADAB"><span style="width:16px;height:3px;background:#13B5EA;display:inline-block;border-radius:2px"></span>Income (Xero)</span>` : ''}
        ${hasXero ? `<span style="display:flex;align-items:center;gap:6px;font-size:14px;color:#ADADAB"><span style="width:16px;height:10px;background:rgba(155,89,182,0.45);display:inline-block;border-radius:2px"></span>Xero Outgoing</span>` : ''}
        <span style="display:flex;align-items:center;gap:6px;font-size:14px;color:#ADADAB"><span style="width:16px;height:10px;background:rgba(192,57,43,0.55);display:inline-block;border-radius:2px"></span>Staff Costs</span>
        ${hasXero ? `<span style="display:flex;align-items:center;gap:6px;font-size:14px;color:#ADADAB"><span style="width:16px;height:3px;background:#678F2F;display:inline-block;border-radius:2px;border-top:2px dashed #678F2F"></span>Net</span>` : ''}
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:14px 20px;border-bottom:1px solid #E2E2E2;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;font-weight:700">Monthly Breakdown</div>
        ${xeroConnected() ? `<div style="display:flex;align-items:center;gap:10px">
          ${(() => { try { const c = JSON.parse(localStorage.getItem(XERO_CACHE_KEY)||'null'); return c?.at ? `<span style="font-size:11px;color:#ADADAB">Last import: ${new Date(c.at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})} ${new Date(c.at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}</span>` : ''; } catch(_){return '';} })()}
          <button id="mb-xero-sync" class="btn btn-ghost btn-sm" style="font-size:11px;border-color:#13B5EA;color:#13B5EA">↻ Sync Xero</button>
        </div>` : ''}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Month</th>
            ${hasXero ? `<th style="text-align:right;color:#13B5EA;background:#F7F7F7">X-Income <span style="font-size:9px;opacity:.7">${xeroCurrency}</span></th>` : ''}
            ${hasXero ? `<th style="text-align:right;color:#9B59B6;background:#F7F7F7">X-Outgoing <span style="font-size:9px;opacity:.7">${xeroCurrency}</span></th>` : ''}
            ${hasXero ? `<th style="text-align:right;background:#F7F7F7">Net P&amp;L <span style="font-size:9px;color:#ADADAB">${xeroCurrency}</span></th>` : ''}

            <th class="amt">Total Cost</th>
          </tr></thead>
          <tbody id="ov-table"></tbody>
        </table>
      </div>
    </div>
  `;

  function getFilteredStaff() {
    return DB.staff.filter(s => {
      if (_overviewState.entityId && s.entityId !== _overviewState.entityId) return false;
      if (_overviewState.staffType && s.type !== _overviewState.staffType) return false;
      return true;
    });
  }

  function calcMonth(month) {
    const staff = getFilteredStaff().filter(s => isEligibleForMonth(s, month));
    let totalCost=0, net=0, gross=0, empDed=0, empCont=0;
    staff.forEach(s => {
      const e = calcStaff(s.id, month); if (!e) return;
      totalCost += e.totalCost; net += e.net; empDed += e.empDed; empCont += e.empCont;
      gross += s.type === 'employee' ? e.gross : (e.totalCost - e.bonus - (e.otPay||0));
    });
    // Add extra staff costs for this month — only include staff active in that month
    let extraStaffCost = 0;
    (DB.extraStaff || []).filter(s =>
      (!s.startDate || s.startDate.slice(0,7) <= month) &&
      (!s.endDate   || s.endDate.slice(0,7)   >= month)
    ).forEach(s => {
      const sCurr = s.currency || dc;
      const runs = DB.payrolls?.[month]?.extraRuns?.[s.id] || [];
      runs.forEach(r => {
        const net = Math.max(0, (r.amount||0) - (r.totalAdvanceDeductions||0));
        const amount = net + (r.allowance||0);
        if (sCurr === dc) {
          extraStaffCost += amount;
        } else {
          const converted = FX.convertSync(amount, sCurr, dc);
          extraStaffCost += converted !== null ? converted : amount; // fallback: add as-is
        }
      });
    });
    totalCost += extraStaffCost;
    const income   = xeroIncome[month]   || 0;
    const xSpend   = xeroSpending[month] || 0;
    const pnl = income - xSpend;
    return { totalCost, net, gross, empDed, empCont, extraStaffCost, income, xSpend, pnl };
  }

  const monthData = allMonths.map(m => ({ month: m, ...calcMonth(m) }));
  const latestIdx = allMonths.length - 1;
  const latest = monthData[latestIdx];
  const prev = monthData[latestIdx - 1];
  const avgCost = monthData.reduce((a,d) => a+d.totalCost, 0) / Math.max(monthData.filter(d=>d.totalCost>0).length, 1);

  // Stat cards
  const statsEl = el.querySelector('#ov-stats');
  const statItems = [
    ...(hasXero ? [{ label:'This Month Income', value: fmt(latest.income, xeroCurrency), color:'#13B5EA', sub: prev && latest.income && prev.income ? (latest.income>=prev.income?`▲ ${fmt(latest.income-prev.income,xeroCurrency)}`:`▼ ${fmt(prev.income-latest.income,xeroCurrency)}`) : '' }] : []),

        });
        (DB.extraStaff||[]).forEach(s => {
          const c = s.currency || dc;
          (DB.payrolls?.[allMonths[latestIdx]]?.extraRuns?.[s.id]||[]).forEach(r => {
            byCurr[c] = (byCurr[c]||0) + Math.max(0,(r.amount||0)-(r.totalAdvanceDeductions||0)) + (r.allowance||0);
          });
        });

// Adaptis brand colors
// Adaptis brand red — vivid pure red from reference invoice
const ADAPTIS_RED  = [204, 28, 28];    // #CC1C1C
const ADAPTIS_GRAY = [245, 245, 245];  // light gray for summary bg

async function fetchLogoBase64(url) {
  if (!url) return null;
  try {
    const res = await fetch(url);
    if (!res.ok) return null;
    const blob = await res.blob();
    return await new Promise(resolve => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result);
      reader.onerror = () => resolve(null);
      reader.readAsDataURL(blob);
    });
  } catch { return null; }
}

// Red square + two white mountain peaks matching the Adaptis logo mark
function drawAdaptisLogoMark(pdf, x, y, size) {
  const R = ADAPTIS_RED;
  pdf.setFillColor(...R);
  pdf.rect(x, y, size, size, 'F');
  // White mountain shape: large left peak + smaller right peak
  const pad  = size * 0.13;
  const baseY = y + size - pad;
  const midX  = x + size * 0.5;
  pdf.setFillColor(255, 255, 255);
  // Left (taller) peak
  pdf.triangle(x + pad, baseY,  x + size * 0.38, y + pad * 1.2,  midX + pad, baseY, 'F');
  // Right (shorter) peak — partially behind left in reference, so draw red overlap then white
  pdf.setFillColor(...R);
  pdf.triangle(midX, baseY,  x + size * 0.64, y + size * 0.34,  x + size - pad, baseY, 'F');
  pdf.setFillColor(255, 255, 255);
  pdf.triangle(midX + pad * 0.8, baseY,  x + size * 0.64, y + size * 0.36,  x + size - pad, baseY, 'F');
}

// Split address string into lines for PDF display
function splitAddress(addr) {
  if (!addr) return [];
  if (addr.includes('\n')) return addr.split('\n').map(s => s.trim()).filter(Boolean);
  return addr.split(',').map(s => s.trim()).filter(Boolean);
}

  const secY = y;

  pdf.text('Invoice',                   ML + 4,    y + 6.5);

  // Thin dark separator under header

  breakdown.forEach((b, i) => {

    pdf.rect(ML, y, CW, rh, 'F');
    const desc = b.hours ? b.name + ' — ' + b.hours + ' hours' : b.name;
    sf(9, 'bold',   DARK); pdf.text(desc,          ML + 4,    y + 6.5);

    y += rh;

  // ── Summary box ───────────────────────────────────────────────

  pdf.setFillColor(...ADAPTIS_GRAY);
  pdf.rect(ML, y, CW, sumH, 'F');

  y += sumH + 14;

  // ── Footer ────────────────────────────────────────────────────
  if (ci.email) {
    sf(9, 'normal', MID);
    pdf.text('If you have any questions concerning this invoice, use the following contact information:', ML, y);
    y += 5.5;
    sf(9, 'normal', DARK); pdf.text(ci.email, ML, y);
    y += 10;
  }
  sf(9, 'normal', MID); pdf.text('Thank you!', ML, y);

  return pdf;
}

// Generates a unique invoice number for a contact transaction
function contactInvNum(tx) {
  const prefix = DB.settings.contactInvoice?.prefix || 'INV';
  // Seed from date + reference + amount — ensures uniqueness even when reference is blank
  // Uses full 32-bit FNV hash output as 8 hex chars (~4 billion values, no collisions in practice)
  const seedStr = (tx.date || '') + '|' + (tx.reference || '') + '|' + (tx.amount || 0);
  let h = 0x811c9dc5;
  for (let i = 0; i < seedStr.length; i++) {
    h ^= seedStr.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  const hex = h.toString(16).toUpperCase().padStart(8, '0');
  return prefix + '-' + (tx.date || '').replace(/-/g, '').slice(0, 8) + '-' + hex;
}

// ── SEEDED RAND ─────────────────────────────────────────────────
function seededRand(seed) {
  let h = 0x811c9dc5;
  for (let i = 0; i < seed.length; i++) {
    h ^= seed.charCodeAt(i);
    h = (h * 0x01000193) >>> 0;
  }
  return (h >>> 0) / 0xffffffff;
}

// Generate a deterministic breakdown for a transaction given categories config
// Categories: [{ name, pct, remainder }] where pct is a number (e.g. 15 = 15%)
// One category can be remainder:true (gets whatever is left)
// Returns [{ name, amount, pct }]
function breakdownTransaction(amount, categories, txSeed) {
  if (!categories || !categories.length) return [];
  const fixedCats = categories.filter(c => !c.remainder);
  const remCat    = categories.find(c => c.remainder);
  const result = [];
  let allocated = 0;

  fixedCats.forEach((cat, i) => {
    const range = cat.range || 0;
    const variation = range > 0 ? (seededRand(txSeed + cat.name + i) - 0.5) * range : 0;
    const effectivePct = Math.max(0, (cat.pct || 0) + variation);
    // Last fixed cat (when no remainder) gets exact remainder to guarantee sum = total
    const isLast = !remCat && i === fixedCats.length - 1;
    const catAmt = isLast
      ? Math.max(0, amount - allocated)
      : Math.round(amount * effectivePct / 100);  // whole dollars
    allocated += catAmt;

    let hours = null, adjustedRate = null;
    if (cat.rate > 0 && catAmt > 0) {
      hours = Math.max(1, Math.round(catAmt / cat.rate));
      adjustedRate = Math.round(catAmt / hours * 100) / 100;
    }
    result.push({ name: cat.name, amount: catAmt, pct: effectivePct, baseRate: cat.rate || null, hours, adjustedRate });
  });

  if (remCat) {
    // Remainder always gets exactly what's left — guaranteed sum = total
    const remAmt = Math.max(0, amount - allocated);
    let hours = null, adjustedRate = null;
    if (remCat.rate > 0 && remAmt > 0) {
      hours = Math.max(1, Math.round(remAmt / remCat.rate));
      adjustedRate = Math.round(remAmt / hours * 100) / 100;
    }
    result.push({ name: remCat.name, amount: remAmt, pct: Math.max(0, remAmt / amount * 100), baseRate: remCat.rate || null, hours, adjustedRate });
  }
  return result;
}

    // Build breakdown headers
    const bdHeaders = hasBreakdown
      ? cats.map(c => `<th style="text-align:right;color:#4A7FC1">${c.name}<br><span style="font-size:10px;font-weight:400;color:#ADADAB">${c.remainder ? 'Remainder' : `~${c.pct}%`}</span>${c.rate ? `<br><span style="font-size:11px;font-weight:600;color:#4A7FC1">${fmt(c.rate, txs[0]?.currency||'USD')}/h</span>` : ''}</th>`)
          .join('') + `<th style="text-align:right;color:#898987">Check<br><span style="font-size:10px;font-weight:400;color:#ADADAB">Categories Σ</span></th>`
      : '';
    const hasContactDetails = !!(DB.settings.contactInvoice?.name || DB.settings.xero?.trackContact);

    body.innerHTML = `
      ${!hasBreakdown ? `<div style="padding:12px 20px;background:#F7F9FF;border-bottom:1px solid #E2E2E2;font-size:14px;color:#4A7FC1">
        <strong>Tip:</strong> Click <strong>⚙ Breakdown</strong> to configure how payments are split across teams.
      </div>` : ''}
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Date</th>
            <th>Reference</th>
            <th style="text-align:right">Amount</th>
            ${bdHeaders}
            <th style="text-align:center;white-space:nowrap">Invoice</th>
          </tr></thead>
          <tbody>
            ${txs.map((tx, txIdx) => {
              const bd = hasBreakdown ? breakdownTransaction(tx.amount, cats, tx.date + tx.reference) : [];
              const bdCells = bd.map(b =>
                `<td style="text-align:right;font-size:14px;padding:8px 12px">
                  <div style="font-weight:700;font-family:monospace;color:#4A7FC1">${fmt(b.amount, tx.currency)}</div>
                  ${b.hours !== null
                    ? `<div style="font-size:11px;color:#898987;margin-top:2px;white-space:nowrap">
                        ${b.hours}h
                        <span style="color:#4A7FC1;font-weight:600;margin-left:4px">@ ${fmt(b.baseRate, tx.currency)}/h</span>
                       </div>`
                    : `<div style="font-size:10px;color:#ADADAB;margin-top:1px">${b.pct.toFixed(1)}%</div>`}
                </td>`
              ).join('');
              const catSum = bd.reduce((s, b) => s + b.amount, 0);
              const matches = Math.abs(catSum - tx.amount) < 0.01;
              const checkCell = hasBreakdown
                ? `<td style="text-align:right;padding:8px 12px">
                    <div style="font-weight:700;font-family:monospace;color:${matches?'#678F2F':'#C0392B'}">${fmt(catSum, tx.currency)}</div>
                    <div style="font-size:10px;margin-top:2px;color:${matches?'#678F2F':'#C0392B'}">${matches ? '✓ match' : '✗ off by ' + fmt(Math.abs(catSum - tx.amount), tx.currency)}</div>
                   </td>`
                : '';
              return `<tr data-tx-idx="${txIdx}">
                <td style="white-space:nowrap;color:#898987;font-size:13px">${tx.date || '—'}</td>
                <td style="font-size:13px">${tx.reference || '<span style="color:#ADADAB">—</span>'}</td>
                <td style="text-align:right;font-weight:700;font-family:monospace;font-size:13px">${fmt(tx.amount, tx.currency)}</td>
                ${bdCells}
                ${checkCell}
                <td style="text-align:center;padding:8px 12px">
                  <button class="btn btn-ghost btn-sm ci-gen-btn" data-tx-idx="${txIdx}" style="font-size:11px;white-space:nowrap">
                    ↓ Invoice
                  </button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;

    // Wire invoice generate buttons
    body.querySelectorAll('.ci-gen-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const tx = txs[parseInt(btn.dataset.txIdx)]; if (!tx) return;
        const bd = hasBreakdown ? breakdownTransaction(tx.amount, cats, tx.date + tx.reference) : [];
        const invNum = contactInvNum(tx);
        const origText = btn.textContent;
        btn.textContent = '…'; btn.disabled = true;
        try {
          const pdf = await buildContactInvoicePdf(tx, bd, invNum);
          pdf.save(`${invNum}.pdf`);
          toast(`Invoice ${invNum} downloaded ✓`);
        } catch(e) {
          toast('Invoice generation failed: ' + e.message, 'error');
        } finally {
          btn.textContent = origText; btn.disabled = false;
        }
      });
    });

    // Breakdown totals footer
    if (hasBreakdown && txs.length) {
      const bdTotals = cats.map(() => ({ amount: 0, hours: 0, hasRate: false }));
      txs.forEach(tx => {
        const bd = breakdownTransaction(tx.amount, cats, tx.date + tx.reference);
        bd.forEach((b, i) => {
          bdTotals[i].amount += b.amount;
          if (b.hours !== null) { bdTotals[i].hours += b.hours; bdTotals[i].hasRate = true; }
        });
      });
      const curr = txs[0].currency;
      const totalAmt = Object.values(totalByCurr).reduce((a,b)=>a+b,0);
      const footerRow = `<tr style="background:#F7F7F7;font-weight:700;border-top:2px solid #E2E2E2">
        <td colspan="2" style="padding:10px 12px;font-size:11px;color:#ADADAB;text-transform:uppercase;letter-spacing:.4px">Totals</td>
        <td style="text-align:right;font-family:monospace;padding:10px 12px">${fmt(totalAmt, curr)}</td>
        ${bdTotals.map((t, i) => {
          const baseRate = cats[i]?.rate || null;
          return `<td style="text-align:right;padding:10px 12px">
            <div style="font-family:monospace;color:#4A7FC1">${fmt(t.amount, curr)}</div>
            ${t.hasRate ? `<div style="font-size:11px;color:#898987;margin-top:2px;white-space:nowrap">${Math.round(t.hours)}h <span style="color:#4A7FC1;font-weight:600">@ ${fmt(baseRate,curr)}/h</span></div>` : ''}
          </td>`;
        }).join('')}
        <td style="text-align:right;padding:10px 12px">
          <div style="font-family:monospace;color:#678F2F">${fmt(bdTotals.reduce((s,t)=>s+t.amount,0), curr)}</div>
          <div style="font-size:10px;color:#678F2F;margin-top:2px">✓ total</div>
        </td>
      </tr>`;
      const tbody = body.querySelector('tbody');
      if (tbody) tbody.insertAdjacentHTML('afterend', `<tfoot>${footerRow}</tfoot>`);
    }
  });
}

function showBreakdownSettingsModal(onSave) {
  let cats = JSON.parse(JSON.stringify(DB.settings?.paymentBreakdown || []));

  function syncFormToCats() {
    // Read current input values back into cats before any re-render
    o.querySelectorAll('.bd-name').forEach(inp => {
      const i = parseInt(inp.dataset.i);
      if (cats[i]) cats[i].name = inp.value.trim();
    });
    o.querySelectorAll('.bd-pct').forEach(inp => {
      const i = parseInt(inp.dataset.i);
      if (cats[i] && !cats[i].remainder) cats[i].pct = parseFloat(inp.value) || 0;
    });
    o.querySelectorAll('.bd-range').forEach(inp => {
      const i = parseInt(inp.dataset.i);
      if (cats[i] && !cats[i].remainder) cats[i].range = parseFloat(inp.value) || 0;
    });
    o.querySelectorAll('.bd-rate').forEach(inp => {
      const i = parseInt(inp.dataset.i);
      if (cats[i]) cats[i].rate = parseFloat(inp.value) || 0;
    });
  }

  function modalHTML() {
    const fixedTotal = cats.filter(c => !c.remainder).reduce((s,c) => s + (c.pct||0), 0);
    const remCat = cats.find(c => c.remainder);
    return `
      <div style="font-size:13px;color:#898987;margin-bottom:16px">Define how each payment is split across teams. One category can be set as <strong>Remainder</strong> — it gets whatever is left after fixed allocations. The <strong>Rate</strong> is a guide used to derive hours, which are then rounded to the nearest 0.5h — the effective rate per invoice adjusts to keep amounts exact.</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
        ${cats.map((c, i) => `
          <div style="display:flex;gap:8px;align-items:center">
            <input class="bd-name" data-i="${i}" value="${c.name||''}" placeholder="e.g. Developers" style="flex:1;font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:inherit">
            ${c.remainder
              ? `<span style="font-size:14px;color:#4A7FC1;font-weight:600;padding:0 12px;white-space:nowrap;background:#F7F9FF;border-radius:20px;border:1px solid #D0E4FF;line-height:28px">Remainder</span>`
              : `<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
                  <input class="bd-pct" data-i="${i}" type="number" value="${c.pct||0}" min="0" max="100" step="1" style="width:56px;text-align:right;font-size:13px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:monospace">
                  <span style="font-size:14px;color:#898987">%</span>
                  <span style="font-size:11px;color:#ADADAB;margin:0 2px">±</span>
                  <input class="bd-range" data-i="${i}" type="number" value="${c.range||0}" min="0" max="30" step="1" style="width:44px;text-align:right;font-size:13px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:monospace" title="Random variance ±%">
                  <span style="font-size:14px;color:#ADADAB">%</span>
                </div>`}
            <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
              <input class="bd-rate" data-i="${i}" type="number" value="${c.rate||''}" min="0" step="1" placeholder="Rate" style="width:64px;text-align:right;font-size:13px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:monospace" title="Hourly rate">
              <span style="font-size:14px;color:#898987">/h</span>
            </div>
            <button class="bd-rem-toggle btn btn-ghost btn-sm" data-i="${i}" style="font-size:11px;white-space:nowrap;flex-shrink:0;color:${c.remainder?'#C0392B':'#898987'}">${c.remainder ? 'Fix %' : 'Remainder'}</button>
            <button class="bd-del btn btn-ghost btn-sm" data-i="${i}" style="color:#C0392B;padding:5px 9px;flex-shrink:0">×</button>
          </div>`).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="bd-add">+ Add Category</button>
      <div style="margin-top:12px;padding:10px 14px;background:#F7F9FF;border-radius:6px;font-size:14px;color:#4A7FC1">
        ${cats.length
          ? `Fixed: <strong>${fixedTotal}%</strong>${fixedTotal > 100 ? ' <span style="color:#C0392B">⚠ over 100%</span>' : ''}${remCat ? ` · <strong>${remCat.name||'Remainder'}</strong> gets ${Math.max(0,100-fixedTotal).toFixed(1)}%` : ''}`
          : 'Add categories to get started.'}
      </div>
      <div class="form-actions" style="margin-top:16px">
        <button class="btn btn-ghost" id="bd-cancel">Cancel</button>
        <button class="btn btn-primary" id="bd-save">Save</button>
      </div>`;
  }

  const o = showModal('Breakdown Settings', modalHTML(), '580px');

  function rewire() {
    syncFormToCats();
    o.querySelector('.modal-body').innerHTML = modalHTML();
    bindEvents();
  }

  function bindEvents() {
    o.querySelector('#bd-add')?.addEventListener('click', () => {
      syncFormToCats();
      cats.push({ name: '', pct: 10, range: 0, remainder: false });
      rewire();
    });
    o.querySelectorAll('.bd-del').forEach(btn => {
      btn.addEventListener('click', () => {
        syncFormToCats();
        cats.splice(parseInt(btn.dataset.i), 1);
        rewire();
      });
    });
    o.querySelectorAll('.bd-rem-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        syncFormToCats();
        const i = parseInt(btn.dataset.i);
        if (cats[i].remainder) {
          cats[i].remainder = false;
          cats[i].pct = 10;
          cats[i].range = 0;
        } else {
          cats.forEach(c => { if (c.remainder) { c.remainder = false; c.pct = 10; c.range = 0; } });
          cats[i].remainder = true;
          delete cats[i].pct;
          delete cats[i].range;
        }
        rewire();
      });
    });
    o.querySelector('#bd-cancel')?.addEventListener('click', () => o.remove());
    o.querySelector('#bd-save')?.addEventListener('click', () => {
      syncFormToCats();
      const valid = cats.filter(c => c.name);
      if (!valid.length) { toast('Add at least one category', 'error'); return; }
      DB.settings.paymentBreakdown = valid;
      saveDB();
      o.remove();
      if (onSave) onSave();
      toast('Breakdown saved ✓');
    });
  }

  bindEvents();
}

// ── STAFF & RATES ──────────────────────────────────────────────
function renderStaff(el,acts){
  syncStaffFromTrackr();

  const syncBadge=document.createElement('span');
  syncBadge.style.cssText='font-size:11px;font-weight:600;color:#678F2F;display:flex;align-items:center;gap:4px';
  syncBadge.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.07-5.36"/></svg>Synced from TRACKR';
  acts.appendChild(syncBadge);

  function buildStaffHtml(q) {
    const query = (q || '').toLowerCase().trim();
    const active  = DB.staff.filter(s => s.active && !s.resignedDate);
    const resigned = DB.staff.filter(s => s.active && s.resignedDate);

    const filterMatch = s =>
      !query ||
      (s.name || '').toLowerCase().includes(query) ||
      (s.displayName || '').toLowerCase().includes(query) ||
      (s.type || '').toLowerCase().includes(query) ||
      (s.currency || '').toLowerCase().includes(query) ||
      (getEntity(s.entityId)?.name || '').toLowerCase().includes(query);

    const filteredActive   = active.filter(filterMatch);
    const filteredResigned = resigned.filter(filterMatch);

    const grouped = {};
    filteredActive.forEach(s => { const eid=s.entityId||'other'; if(!grouped[eid])grouped[eid]=[]; grouped[eid].push(s); });

    let html = '';
    if (filteredActive.length === 0 && filteredResigned.length === 0) {
      html = query
        ? '<div class="card" style="text-align:center;padding:40px"><p style="color:#ADADAB">No staff match "'+q+'".</p></div>'
        : '<div class="card" style="text-align:center;padding:60px"><p style="color:#ADADAB">No active team members found in TRACKR.</p></div>';
    } else {
      Object.entries(grouped).forEach(([eid,staffList])=>{
        const entity=getEntity(eid);
        let etotal=0;
        staffList.forEach(s=>{const e=calcStaff(s.id,currentMonth);if(e)etotal+=e.totalCost;});
        html+='<div style="margin-bottom:24px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:16px;font-weight:400;letter-spacing:-0.2px;color:#2F2F2F">'+entity.name+'</div><div style="font-size:14px;color:#ADADAB">Total cost: '+fmt(etotal,entity.currency)+'</div></div><div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr><th>Name</th><th>Type</th><th>Currency</th><th style="text-align:right">Gross / Amount</th><th style="text-align:right">Net Pay</th><th style="text-align:right">Total Cost</th><th>Tax Profile</th><th>Banking</th><th></th></tr></thead><tbody>'
        +staffList.map(s=>{
          const e=calcStaff(s.id,currentMonth);
          const tp=s.type==='employee'?DB.taxProfiles.find(t=>t.id===s.taxProfileId):null;
          const curr=s.currency||entity.currency;
          const hb=s.bankAccount?.accountNumber;
          const isExt=s.type==='external';
          return '<tr style="cursor:pointer;'+(isExt?'background:rgba(103,143,47,0.03)':'')+'" class="staff-row" data-id="'+s.id+'"><td><div style="display:flex;align-items:center;gap:8px"><div class="avatar-sm">'+initials(s.displayName||s.name)+'</div><div><div style="font-weight:600;color:#678F2F;text-decoration:underline;text-underline-offset:3px;text-decoration-style:dotted">'+s.name+'</div>'+(s.displayName&&s.displayName!==s.name?'<div style="font-size:11px;color:#ADADAB">'+s.displayName+'</div>':'')+(isExt&&s.externalCompany?'<div style="font-size:10px;color:#898987">via '+s.externalCompany+'</div>':'')+'</div></div></td>'
          +'<td>'+typeBadge(s.type)+'</td>'
          +'<td><span class="badge badge-gray">'+curr+'</span></td>'
          +'<td class="mono" style="text-align:right">'+(isExt
            ? (getSalaryForMonth(s,currentMonth)>0 ? fmt(getSalaryForMonth(s,currentMonth),curr)+'<div style="font-size:10px;color:#898987">their salary</div>' : '<span style="color:#ADADAB">Not set</span>')
            : fmt(getSalaryForMonth(s,currentMonth),curr)+(s.salaryHistory?.length>1?'<div style="font-size:10px;color:#4A7FC1">'+s.salaryHistory.length+' salary entries</div>':''))
            +(isExt&&s.allocation!==undefined&&s.allocation!==100?'<div style="font-size:10px;font-weight:700;color:#678F2F">'+s.allocation+'% allocated</div>':'')
            +'</td>'
          +'<td class="mono" style="text-align:right;color:#678F2F">'+(e?(isExt?'<span style="color:#ADADAB">&#x2014;</span>':fmt(e.net,curr)):'<span style="color:#ADADAB">&#x2014;</span>')+'</td>'
          +'<td class="mono" class="amt">'+(e
            ? fmt(e.totalCost,curr)
              +(isExt&&e.overhead?'<div style="font-size:10px;color:#898987">incl. '+Math.round(e.overheadRate*100)+'% overhead</div>':'')
              +(isExt&&e.allocPct&&e.allocPct<1?'<div style="font-size:10px;color:#678F2F">'+Math.round(e.allocPct*100)+'% allocation</div>':'')
            : '<span style="color:#ADADAB">&#x2014;</span>')+'</td>'
          +'<td style="font-size:14px">'+(isExt?(s.externalCompany?'<span style="font-weight:600">'+s.externalCompany+'</span>':'<span style="color:#ADADAB">&#x2014;</span>'):(tp?tp.name+'<div style="color:#ADADAB;font-size:10px">'+(tp.employeeRate*100).toFixed(0)+'%/'+(tp.employerRate*100).toFixed(0)+'%</div>':'<span style="color:#ADADAB">&#x2014;</span>'))+'</td>'
          +'<td style="font-size:14px">'+(hb?'<div style="font-weight:600">'+(s.bankAccount.accountName||s.name)+'</div><div style="color:#ADADAB;font-size:10px">'+(s.bankAccount.swift?s.bankAccount.swift+' &middot; ':'')+s.bankAccount.accountNumber+'</div>':(isExt?'<span style="color:#ADADAB;font-size:11px">N/A</span>':'<span style="color:#C0392B;font-size:11px">Not set</span>'))+'</td>'
          +'<td style="text-align:right;white-space:nowrap"><button class="btn btn-ghost btn-sm edit-staff" data-id="'+s.id+'">Edit</button> '+(isExt?'':'<button class="btn btn-ghost btn-sm resign-staff" data-id="'+s.id+'" style="color:#898987">Resign</button>')+'</td></tr>';
        }).join('')
        +'</tbody></table></div></div></div>';
      });
    }

    // Resigned section
    if (filteredResigned.length > 0) {
      html+='<div style="margin-top:8px"><div style="font-size:16px;font-weight:400;letter-spacing:-0.2px;color:#2F2F2F;margin-bottom:10px">Resigned ('+filteredResigned.length+')</div>'
      +filteredResigned.map(s=>{
        const[ry,rm,rd]=s.resignedDate.split('-').map(Number);
        const daysInMonth=new Date(ry,rm,0).getDate();
        const proRated=Math.round((s.baseSalary||0)*rd/daysInMonth);
        const curr=s.currency||'USD';
        return '<div class="card" style="padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:6px;border-color:#F0E0E0">'
          +'<div class="avatar-sm" style="opacity:.6">'+initials(s.displayName||s.name)+'</div>'
          +'<div style="flex:1"><div style="font-weight:600;font-size:13px">'+s.name+'</div>'
          +'<div style="font-size:11px;color:#C0392B;margin-top:1px">Last day: '+s.resignedDate+' &middot; Final pay: '+fmt(proRated,curr)+' <span style="color:#ADADAB">('+rd+'/'+daysInMonth+' days)</span></div></div>'
          +'<span class="badge badge-red">Resigned</span>'
          +' <button class="btn btn-ghost btn-sm undo-resign" data-id="'+s.id+'" style="font-size:11px">Undo</button></div>';
      }).join('')
      +'</div>';
    }

    return html;
  }

  // Search bar in acts
  const searchWrap = document.createElement('div');
  searchWrap.style.cssText = 'position:relative;margin-left:12px';
  searchWrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#ADADAB;pointer-events:none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="staff-search" type="text" placeholder="Search name, type, entity…" style="padding:6px 10px 6px 28px;font-size:14px;border:1px solid #E2E2E2;border-radius:4px;font-family:inherit;width:220px;outline:none;color:#2F2F2F">`;
  acts.appendChild(searchWrap);

  const renderContent = () => {
    el.innerHTML = buildStaffHtml(acts.querySelector('#staff-search')?.value || '');
    wireHandlers();
  };

  searchWrap.querySelector('#staff-search').addEventListener('input', renderContent);
  searchWrap.querySelector('#staff-search').addEventListener('focus', e => { e.target.style.borderColor='#678F2F'; e.target.style.boxShadow='0 0 0 3px rgba(103,143,47,.1)'; });
  searchWrap.querySelector('#staff-search').addEventListener('blur',  e => { e.target.style.borderColor='#E2E2E2'; e.target.style.boxShadow=''; });

  function wireHandlers() {
    el.querySelectorAll('.staff-row').forEach(tr => {
      tr.addEventListener('click', e => {
        if (e.target.closest('button')) return;
        const s = DB.staff.find(x => x.id === tr.dataset.id);
        if (s) showStaffModal(s);
      });
    });
    el.querySelectorAll('.edit-staff').forEach(btn=>btn.addEventListener('click',()=>{const s=DB.staff.find(x=>x.id===btn.dataset.id);if(s)showStaffModal(s);}));
    el.querySelectorAll('.resign-staff').forEach(btn=>btn.addEventListener('click',()=>{const s=DB.staff.find(x=>x.id===btn.dataset.id);if(s)showResignModal(s);}));
    el.querySelectorAll('.undo-resign').forEach(btn=>btn.addEventListener('click',()=>{
      const s=DB.staff.find(x=>x.id===btn.dataset.id);
      if(s){delete s.resignedDate;saveDB();renderView();toast(s.name+' resignation undone');}
    }));
  }

  el.innerHTML = buildStaffHtml('');
  wireHandlers();
}

function showStaffModal(staff){
  const s=staff;
  const nm=nextMonth(todayMonth());

function showResignModal(staff){
  const s=staff;
  const today=new Date().toISOString().slice(0,10);
  const curr=s.currency||'USD';
  const o=showModal('Resign &#x2014; '+s.name,
    '<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:#FEF0EE;border-radius:3px;margin-bottom:20px"><div class="avatar-sm" style="background:rgba(192,57,43,.12);color:#C0392B">'+initials(s.displayName||s.name)+'</div><div><div style="font-weight:700">'+s.name+'</div><div style="font-size:11px;color:#C0392B">Final month pay will be pro-rated automatically.</div></div></div>'
    +'<div class="form-row"><div class="form-group"><label>Last Working Day</label><input type="date" id="resign-date" value="'+(s.resignedDate||today)+'"></div></div>'
    +'<div id="resign-preview" style="padding:10px 14px;background:#FEF0EE;border-radius:3px;font-size:13px;color:#C0392B;margin-bottom:16px;display:none"></div>'
    +'<div class="form-actions"><button class="btn btn-ghost" id="resign-x">Cancel</button><button class="btn btn-danger" id="resign-ok">Set Resignation Date</button></div>'
  );
  function updateResignPreview(){
    const dateStr=o.querySelector('#resign-date').value;
    const prev=o.querySelector('#resign-preview');
    if(!dateStr){prev.style.display='none';return;}
    const[ry,rm,rd]=dateStr.split('-').map(Number);
    if(!ry||!rm||!rd){prev.style.display='none';return;}
    const daysInMonth=new Date(ry,rm,0).getDate();
    const proRated=Math.round((s.baseSalary||0)*rd/daysInMonth);
    prev.style.display='block';
    prev.innerHTML='Final month: <strong>'+fmtMonth(dateStr.slice(0,7))+'</strong> &middot; '+rd+' of '+daysInMonth+' days worked &middot; Final pay: <strong>'+fmt(proRated,curr)+'</strong>';
  }
  const dateInput=o.querySelector('#resign-date');
  dateInput.addEventListener('input',updateResignPreview);
  dateInput.addEventListener('change',updateResignPreview);
  updateResignPreview();
  o.querySelector('#resign-x').onclick=()=>o.remove();
  o.querySelector('#resign-ok').onclick=()=>{
    const dateStr=o.querySelector('#resign-date').value;
    if(!dateStr){toast('Select a date','error');return;}
    s.resignedDate=dateStr;
    saveDB();
    o.remove();
    // Jump to the resignation month's payroll so the user sees the final pay immediately
    currentMonth=dateStr.slice(0,7); localStorage.setItem('pay-last-month',currentMonth); navigate('payroll');
    toast(s.name+' — final pay for '+fmtMonth(currentMonth)+' calculated ✓');
  };
}

function nextFriday(from) {
  const d = from ? (() => { const [y,m,dd]=from.split('-').map(Number); return new Date(y,m-1,dd); })() : new Date();
  const diff = (5 - d.getDay() + 7) % 7 || 7; // days until next Friday (never 0)
  return new Date(d.getFullYear(), d.getMonth(), d.getDate() + diff)
    .toISOString().slice(0, 10);
}

function getNextPaymentDates(s, count = 3) {
  if (!s.firstPaymentDate) return [];
  const freq = s.frequency;
  if (freq === 'monthly') return [];
  const stepDays = freq === 'weekly' ? 7 : 14;
  const today = new Date(); today.setHours(0,0,0,0);
  const [py,pm,pd] = s.firstPaymentDate.split('-').map(Number);
  let d = new Date(py, pm-1, pd); // local midnight
  while (d < today) d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + stepDays);
  const dates = [];
  for (let i = 0; i < count; i++) {
    dates.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
    d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + stepDays);
  }
  return dates;
}

      `<div style="background:#F7F7F5;border-radius:6px;padding:12px 16px;margin-bottom:16px;font-size:13px">
        <strong>${s.name}</strong> &nbsp;·&nbsp; <span style="color:#898987">${periodLabel}</span>
      </div>`
      + missing.map(f => `<div class="form-row"><div class="form-group full"><label>${f.label}</label>${f.html}</div></div>`).join('')

    , '420px');
    o.querySelector('#qi-cancel').onclick = () => o.remove();
    o.querySelector('#qi-go').onclick = () => {
      // Patch missing fields onto staff
      if (o.querySelector('#qi-entity')?.value) s.entityId = o.querySelector('#qi-entity').value;
      if (o.querySelector('#qi-email')?.value)  s.email    = o.querySelector('#qi-email').value.trim();
      if (o.querySelector('#qi-bank')?.value)   s.bankAccount = o.querySelector('#qi-bank').value.trim();
      saveDB();
      o.remove();
      _doQuickInvoice(s, run, invNum, periodLabel, todayStr, dc, ejsCfg, hasEjs);
    };
  } else {
    _doQuickInvoice(s, run, invNum, periodLabel, todayStr, dc, ejsCfg, hasEjs);
  }
}

async function _doQuickInvoice(s, run, invNum, periodLabel, todayStr, dc, ejsCfg, hasEjs) {
  const fmtA   = n => fmt(n, dc);
  const deduct = run.totalAdvanceDeductions || 0;
  const net    = Math.max(0, (run.amount||0) - deduct);
  const total  = net + (run.allowance||0);

  // Build invoice HTML
  const cfg = {
    num: invNum, date: todayStr, due: todayStr,
    entityId: s.entityId, period: periodLabel,
    amount: total, curr: dc,
    desc: (s.rateType==='day_rate' ? 'Services rendered' : s.rateType==='hourly' ? 'Hourly services' : ({weekly:'Weekly',biweekly:'Bi-weekly',monthly:'Monthly'}[s.frequency]||'Payment')) + ' — ' + s.name,
    selectedAdvances: run.advanceDeductions?.map(d=>({...d, deductAmount: d.amount})) || [],
    totalDeductions: deduct,
  };
  const invoiceHtml = buildInvoiceHtml(s, cfg);

  // Generate text-based PDF
  let pdfB64 = null;
  let pdfDataUri = null;
  try {
    const pdf = buildInvoicePdf(s, cfg);
    pdf.save(`${invNum}.pdf`);
    pdfDataUri = pdf.output('datauristring');
    pdfB64 = pdfDataUri.split(',')[1];
    const url = await paySupaUploadInvoice(invNum, pdfB64);
    if (url) run.invoiceUrl = url;
  } catch(err) {
    toast('Invoice saved — PDF generation failed: ' + err.message, 'error');
  }

  // Save to DB
  run.invoiceHtml = invoiceHtml;
  run.invoiceNum  = invNum;
  run.invoiceDate = todayStr;
  if (pdfB64) run.invoicePdf = pdfB64;
  saveDB();

  // Send email
  if (s.email && hasEjs) {
    try {
      emailjs.init({ publicKey: ejsCfg.publicKey });
      const ws = DB.account?.workspaceName || getEntity(s.entityId)?.name || 'mis.studio';
      const msg = [
        'Hi ' + (s.nickname||s.name) + ',',
        '',
        'Please find your payment details for ' + periodLabel + ' below.',
        '',
        'Invoice No:  ' + invNum,
        'Period:      ' + periodLabel,
        'Amount:      ' + fmtA(run.amount),
        ...(deduct > 0 ? ['Adv. deduct: −' + fmtA(deduct)] : []),
        ...(run.allowance ? ['Allowance:   ' + fmtA(run.allowance)] : []),
        'Total:       ' + fmtA(total),
        '',
        'Payment to: ' + [s.bankName, s.bankAccount].filter(Boolean).join('  |  '),
        '',
        'Issued by ' + ws,
      ].join('\n');
      await emailjs.send(ejsCfg.serviceId, ejsCfg.templateId, {
        to_email: s.email, to_name: s.name,
        subject: 'Invoice — ' + periodLabel + ' — ' + s.name,
        message: msg,
        ...ejsPdfParam(pdfDataUri, invNum),
        ...ejsCcParam(),
      });
      toast(s.name + ' — invoice generated, PDF saved, email sent ✓');
    } catch(err) {
      toast(s.name + ' — invoice saved' + (pdfB64 ? ' + PDF' : '') + ' (email failed: ' + (err.text||err.message) + ')', 'error');
    }
  } else {
    toast(s.name + ' — invoice generated' + (pdfB64 ? ' + PDF downloaded' : '') + (s.email ? '' : ' (no email on file)') + ' ✓');
  }
}

async function sendOneOffInvoice(p, month, onSave) {
  const dc     = p.currency || DB.settings.defaultCurrency || 'USD';
  const ejsCfg = DB.settings.emailjs || {};
  const hasEjs = !!(ejsCfg.publicKey && ejsCfg.serviceId && ejsCfg.templateId);
  const today  = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const invNum   = 'INV-' + todayStr.replace(/-/g,'') + '-' + p.id.slice(-6).toUpperCase();
  const entity   = getEntity(p.entityId);
  const fmtA     = n => fmt(n, dc);

  // Build a pseudo-staff object for buildInvoiceHtml
  const pseudoStaff = {
    name: p.name, email: '', bankAccount: p.bankAccount, bankName: p.bankName || '',
    entityId: p.entityId, currency: dc,
  };
  const cfg = {
    num: invNum, date: todayStr, due: todayStr,
    entityId: p.entityId, period: p.payDate,
    amount: p.amount, curr: dc,
    desc: p.description || ('One-off payment — ' + p.name),
    selectedAdvances: [], totalDeductions: 0,
  };
  const invoiceHtml = buildInvoiceHtml(pseudoStaff, cfg);

  // Generate text-based PDF
  let pdfB64 = null;
  let pdfDataUri = null;
  try {
    const pdf = buildInvoicePdf(pseudoStaff, cfg);
    pdf.save(`${invNum}.pdf`);
    pdfDataUri = pdf.output('datauristring');
    pdfB64 = pdfDataUri.split(',')[1];
  } catch(err) { }

  // Save to record
  const rec = DB.payrolls[month].oneOffPayments.find(x => x.id === p.id);
  if (rec) { rec.invoiceHtml = invoiceHtml; rec.invoiceNum = invNum; rec.invoiceDate = todayStr; rec.paid = true; if (pdfB64) rec.invoicePdf = pdfB64; }
  saveDB();
  if (onSave) onSave();

  // Email
  if (p.email && hasEjs) {
    try {
      emailjs.init({ publicKey: ejsCfg.publicKey });
      const ws = DB.account?.workspaceName || entity?.name || 'mis.studio';
      await emailjs.send(ejsCfg.serviceId, ejsCfg.templateId, {
        to_email: p.email, to_name: p.name,
        subject: 'Invoice — ' + (p.description || p.name),
        message: ['Hi ' + p.name + ',', '', 'Please find your payment details below.', '',
          'Invoice No:  ' + invNum, 'Description: ' + (p.description||'—'), 'Amount:      ' + fmtA(p.amount),
          '', 'Issued by ' + ws].join('\n'),
        ...ejsPdfParam(pdfDataUri, invNum),
        ...ejsCcParam(),
      });
      toast(p.name + ' — invoice generated, PDF saved, email sent ✓');
    } catch(err) {
      toast(p.name + ' — invoice saved' + (pdfB64?' + PDF':'') + ' (email failed)', 'error');
    }
  } else {
    toast(p.name + ' — invoice generated' + (pdfB64?' + PDF downloaded':'') + (p.email?'':' (no email)') + ' ✓');
  }
}

function renderExtraPayRun(el, acts) {
  el.innerHTML = '';
  const _today = new Date(); _today.setHours(0,0,0,0);
  const todayStr2 = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;
  // Show staff whose contract starts on or before today and hasn't fully ended before today
const staff = (DB.extraStaff || []).filter(s =>
  (!s.startDate || s.startDate <= todayStr2) &&
  (!s.endDate   || s.endDate   >= todayStr2) &&
  (!s.resignedDate || s.resignedDate >= todayStr2)
);
  const dc    = DB.settings.defaultCurrency || 'USD';

  if (!staff.length) {
    el.innerHTML = '<div class="card"><div class="empty-state"><p>No extra staff configured yet.</p></div></div>';
    return;
  }

  // Build upcoming pay runs for each staff member
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Group runs by pay date
  const byDate = {};

  staff.forEach(s => {
    const curr   = s.currency || dc;
    const rate   = getExtraStaffRate(s) || s.rate || 0;
    const isDayR = s.rateType === 'day_rate';

    if (s.frequency === 'monthly' || !s.frequency) {
      // Determine the pay day-of-month from firstPaymentDate or startDate, defaulting to 1
      const payDaySource = s.firstPaymentDate || s.startDate || null;
      const payDay = payDaySource ? (parseInt(payDaySource.split('-')[2]) || 1) : 1;

      // Helper: build key and push a monthly run entry for a given pay date
      function pushMonthlyRun(payDate) {
        const yr  = payDate.getFullYear();
        const mo  = payDate.getMonth() + 1; // 1-based
        const key = `${yr}-${String(mo).padStart(2,'0')}-${String(payDay).padStart(2,'0')}`;
        if (!byDate[key]) byDate[key] = [];
        // Period = 1st of the previous month → payment date
        const prevMo  = payDate.getMonth() === 0 ? 12 : payDate.getMonth();       // prior month (1-based)
        const prevYr  = payDate.getMonth() === 0 ? yr - 1 : yr;
        const periodStart = `${prevYr}-${String(prevMo).padStart(2,'0')}-01`;
        const isHrly = s.rateType === 'hourly';
        const estAmt = isDayR
          ? Math.round(rate * (s.daysPerWeek||5) * 52/12)
          : isHrly ? Math.round(rate * 40 * 52/12)
          : rate;
        byDate[key].push({ s, estAmt: estAmt + getEffectiveAllowance(s, key), curr, isDayR, isHrly, period: fmtPeriodLabel(periodStart, key), periodStartStr: periodStart });
      }

      const thisMonthPay = new Date(today.getFullYear(), today.getMonth(), payDay);
      const nextMonthPay = new Date(today.getFullYear(), today.getMonth() + 1, payDay);

      // Always show this month's run — it may be today, upcoming, or overdue
      pushMonthlyRun(thisMonthPay);
      // If this month's pay date has already passed, also show next month so the user can see ahead
      if (thisMonthPay < today) pushMonthlyRun(nextMonthPay);
    } else if (s.firstPaymentDate) {
      // Weekly / bi-weekly: find next 3 dates including any overdue
      const stepDays = s.frequency === 'weekly' ? 7 : 14;
      // Parse anchor as local date
      const [ay,am,ad] = s.firstPaymentDate.split('-').map(Number);
      let d = new Date(ay, am-1, ad);
      // Walk to most recent past pay date
      const twoWeeksAgo = new Date(today.getFullYear(), today.getMonth(), today.getDate() - stepDays * 2);
      while (d < twoWeeksAgo) d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + stepDays);
      // Collect next 4 from that point (includes any recent past-due)
      const dates = [];
      for (let i = 0; i < 4; i++) {
        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        dates.push(ds);
        d = new Date(d.getFullYear(), d.getMonth(), d.getDate() + stepDays);
      }
      dates.forEach(dateStr => {
        if (!byDate[dateStr]) byDate[dateStr] = [];
        const [py,pm,pd2] = dateStr.split('-').map(Number);
        const prevDate = new Date(py, pm-1, pd2 - stepDays);
        const prevStr  = `${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}-${String(prevDate.getDate()).padStart(2,'0')}`;

        // Check if a stored run already exists for this period (user may have edited days)
        const runMonth = dateStr.slice(0, 7);
        const storedRun = (DB.payrolls?.[runMonth]?.extraRuns?.[s.id] || [])
          .find(r => r.periodEnd === dateStr);

        const days   = storedRun ? (storedRun.daysWorked ?? calcScheduledDaysInPeriod(s, prevStr, dateStr))
                                 : (isDayR ? calcScheduledDaysInPeriod(s, prevStr, dateStr) : 0);
        const estAmt = storedRun ? (storedRun.amount || 0)
                                 : isDayR   ? Math.round(rate * days)
                                 : s.rateType === 'hourly' ? Math.round(rate * (storedRun?.hoursWorked || 0))
                                 : Math.round(rate / (stepDays === 7 ? 4 : 2));
        const period  = fmtPeriodLabel(prevStr, dateStr);
        const isHrlyW = s.rateType === 'hourly';
        const storedHours = storedRun?.hoursWorked || 0;
        byDate[dateStr].push({ s, estAmt: estAmt + getEffectiveAllowance(s, dateStr), curr, isDayR, isHrly: isHrlyW, days, hours: storedHours, period, periodStartStr: prevStr });
      });
    } else {
      // No anchor set — just show as upcoming with no date
      if (!byDate['no-date']) byDate['no-date'] = [];
      byDate['no-date'].push({ s, estAmt: (isDayR ? Math.round(rate * (s.daysPerWeek||5)) : s.rateType==='hourly' ? Math.round(rate * 40) : rate) + (s.allowance||0), curr, isDayR, isHrly: s.rateType==='hourly', period: '—' });
    }
  });

  // Sort dates — find the current/next upcoming one as default
  const sortedDates = Object.keys(byDate).filter(d => d !== 'no-date').sort();
  const noDateRuns  = byDate['no-date'] || [];

  if (!sortedDates.length && !noDateRuns.length) {
    el.innerHTML = '<div class="card"><div class="empty-state"><p>No upcoming pay runs found. Make sure staff have a First Payment Date set.</p></div></div>';
    return;
  }

  // Default to the first upcoming (or most recent overdue) date
  let _selectedIdx = sortedDates.findIndex(d => d >= todayStr);
  if (_selectedIdx === -1) _selectedIdx = sortedDates.length - 1; // all past — show latest
  if (_selectedIdx === -1) _selectedIdx = 0;

  function renderPayRunView() {
    el.innerHTML = '';

    // ── Navigation bar ──
    const nav = document.createElement('div');
    nav.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:16px';
    const hasPrev = _selectedIdx > 0;
    const hasNext = _selectedIdx < sortedDates.length - 1;
    nav.innerHTML = `
      <button class="btn btn-ghost btn-sm" id="epr-prev" ${hasPrev ? '' : 'disabled style="opacity:.3;pointer-events:none"'}>← Previous</button>
      <div style="font-size:13px;color:#898987;font-weight:600">${_selectedIdx + 1} of ${sortedDates.length} pay runs</div>
      <button class="btn btn-ghost btn-sm" id="epr-next" ${hasNext ? '' : 'disabled style="opacity:.3;pointer-events:none"'}>Next →</button>`;
    el.appendChild(nav);
    nav.querySelector('#epr-prev')?.addEventListener('click', () => { _selectedIdx--; renderPayRunView(); });
    nav.querySelector('#epr-next')?.addEventListener('click', () => { _selectedIdx++; renderPayRunView(); });

    const dateStr = sortedDates[_selectedIdx];
    const runs    = byDate[dateStr];
    const [y,m,d] = dateStr.split('-').map(Number);
    const dt       = new Date(y, m-1, d);
    const daysUntil = Math.round((dt - today) / 86400000);
    const dayName   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dt.getDay()];
    const dateLabel = dayName + ', ' + fmtPeriodDate(dateStr) + ' ' + dt.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    // Update topbar to show the actual pay run date
    const titleEl = document.getElementById('topbar-title');
    if (titleEl) titleEl.innerHTML = '<span style="color:var(--border);font-weight:300;margin-right:10px;letter-spacing:0">//</span>PAY RUN <span style="font-weight:300;color:#E2E2E2;margin-left:8px">'+dt.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'</span>';
    const urgency   = daysUntil === 0 ? '🔔 Today' : daysUntil === 1 ? 'Tomorrow' : daysUntil < 0 ? `⚠ ${Math.abs(daysUntil)}d overdue` : `In ${daysUntil} days`;
    const urgencyColor = daysUntil < 0 ? '#C0392B' : daysUntil <= 1 ? '#E07030' : '#898987';

    const totals = {};
    runs.forEach(({ s, estAmt, curr, isDayR, periodStartStr }) => {
      const baseAmt  = estAmt - getEffectiveAllowance(s, dateStr);

    const card = document.createElement('div');

      <div style="padding:12px 20px;background:#F2F1EE;border-bottom:1px solid #E2E2E2;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="lbl" style="margin-bottom:3px">Pay Run</div>
          <div style="font-size:13px;font-weight:700;color:#2F2F2F">${dateLabel}</div>
          <div style="font-size:11px;font-weight:700;color:${urgencyColor};margin-top:2px">${urgency}</div>
        </div>
        <div style="text-align:right">
          <div class="lbl">Est. Total</div>
          <div style="font-size:16px;font-weight:800;color:#678F2F">${totalLabel}</div>
        </div>
      </div>
      <table style="width:100%;border-collapse:collapse;table-layout:fixed">
        <colgroup>
          <col><col style="width:160px"><col style="width:80px"><col style="width:120px"><col style="width:100px"><col style="width:110px"><col style="width:80px">
        </colgroup>
        <thead>
          <tr style="background:#F7F7F7">
            <th style="padding:7px 18px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Name</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Period</th>
            <th style="padding:7px 10px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Days / Hours</th>
            <th style="padding:7px 10px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Amount</th>
            <th style="padding:7px 10px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Allowance</th>
            <th style="padding:7px 10px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#678F2F;border-bottom:1px solid #E2E2E2">Total</th>
            <th style="padding:7px 10px;border-bottom:1px solid #E2E2E2"></th>
          </tr>
        </thead>
        <tbody>
          ${runs.map(({ s, estAmt, curr, isDayR, isHrly, days, hours, period, periodStartStr }) => {

            const advDeduct = (s.advances || [])
              .filter(a => a.remaining > 0 && a.deductionPerRun > 0 && a.date <= dateStr)
              .reduce((sum, a) => sum + Math.min(a.deductionPerRun, a.remaining), 0);
            const netAmt  = Math.max(0, baseAmt - advDeduct) + allowAmt;

            const allowStyle = isPaid
              ? 'width:80px;text-align:right;border:1px solid transparent;border-radius:3px;padding:3px 6px;font-family:monospace;font-size:13px;background:transparent;color:#ADADAB;pointer-events:none'
              : 'width:80px;text-align:right;border:1px solid #E2E2E2;border-radius:3px;padding:3px 6px;font-family:monospace;font-size:13px;background:#fff;color:#898987;outline:none;cursor:text';
            return `<tr style="border-bottom:1px solid #F2F1EE;background:${isPaid?'rgba(103,143,47,0.03)':''}" data-sid="${s.id}" data-date="${dateStr}">
              <td style="padding:10px 18px">
                <div style="font-weight:600">${s.name}${s.nickname ? ' <span style="color:#898987;font-weight:400;font-size:14px">('+s.nickname+')</span>' : ''}</div>
                <span class="badge ${isDayR?'badge-blue':isHrly?'badge-purple':'badge-green'}" style="font-size:10px">${isDayR?'Day Rate':isHrly?'Hourly':'Fixed Monthly'}</span>
                ${hasAdv ? '<div style="font-size:10px;color:#C0392B;font-weight:600;margin-top:2px">−' + fmt(advDeduct, curr) + ' advance deduction</div>' : ''}
              </td>
              <td style="padding:10px;font-size:14px;color:#898987">${period || '—'}</td>
              <td style="padding:6px 10px;text-align:center">
                ${isDayR
                  ? `<input type="number" class="epr-days-inp" data-sid="${s.id}" data-date="${dateStr}" value="${days||0}" min="0" step="0.5" ${isPaid?'disabled':''}
                      style="${inputStyle}">`
                  : isHrly
                  ? `<input type="number" class="epr-hours-inp" data-sid="${s.id}" data-date="${dateStr}" value="${hours||0}" min="0" step="0.5" ${isPaid?'disabled':''}
                      style="${inputStyle}" placeholder="hrs">`
                  : '<span style="color:#ADADAB">—</span>'}
              </td>
              <td class="mono" style="padding:10px;text-align:right" class="epr-amt-cell" data-sid="${s.id}" data-date="${dateStr}">
                ${hasAdv
                  ? `<span style="text-decoration:line-through;color:#ADADAB;font-size:14px">${fmt(baseAmt, curr)}</span><div style="font-weight:700">${fmt(Math.max(0, baseAmt - advDeduct), curr)}</div>`
                  : `<span style="font-weight:700">${fmt(baseAmt, curr)}</span>`}
              </td>
              <td style="padding:6px 10px;text-align:right">
                <input type="number" class="epr-allow-inp" data-sid="${s.id}" data-date="${dateStr}" value="${allowAmt}" min="0" step="1" ${isPaid?'disabled':''}
                  style="${allowStyle}">
              </td>
              <td class="mono epr-total-cell" data-sid="${s.id}" data-date="${dateStr}" style="padding:10px;text-align:right;font-weight:800;color:#678F2F;font-size:14px">${fmt(netAmt, curr)}</td>
              <td style="padding:10px;text-align:center;min-width:80px" class="epr-paid-cell" data-sid="${s.id}" data-date="${dateStr}">
                ${isPaid
                  ? `<div style="text-align:center">
                      <div style="font-size:13px;color:#678F2F;font-weight:700">✓</div>
                      <div style="font-size:10px;color:#ADADAB;margin-top:1px;white-space:nowrap">${invUrl ? `<a href="${invUrl}" target="_blank" style="color:#678F2F;text-decoration:none">${invNum||''} ↗</a>` : (invNum||'')}</div>
                    </div>`
                  : `<label style="cursor:pointer;display:flex;justify-content:center"><input type="checkbox" class="epr-pay-cb" data-sid="${s.id}" data-date="${dateStr}" style="width:15px;height:15px;accent-color:#678F2F"></label>`}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
    el.appendChild(card);

    // No-date staff
    if (noDateRuns.length && _selectedIdx === sortedDates.length - 1) {
      const noDateCard = document.createElement('div');
      noDateCard.className = 'card mb-20';
      noDateCard.style.cssText = 'padding:12px 18px;border-left:3px solid #ADADAB';
      noDateCard.innerHTML = `<div style="font-size:14px;color:#ADADAB;font-weight:700;margin-bottom:6px">NO PAYMENT DATE SET</div>`
        + noDateRuns.map(r => `<div style="font-size:13px;color:#2F2F2F">${r.s.name} — <span style="color:#ADADAB">set a First Payment Date in Extra Staff</span></div>`).join('');
      el.appendChild(noDateCard);
    }

    // Helper: get or create a stored run record for a staff/date pair
    function getOrCreateRun(sid, payDate) {
      const st = DB.extraStaff.find(x => x.id === sid); if (!st) return null;
      const runMonth = payDate.slice(0,7);
      if (!DB.payrolls[runMonth]) DB.payrolls[runMonth] = { overrides:{}, paid:{}, bankSnapshots:{}, otApprovals:{}, extraRuns:{} };
      if (!DB.payrolls[runMonth].extraRuns) DB.payrolls[runMonth].extraRuns = {};
      if (!DB.payrolls[runMonth].extraRuns[sid]) DB.payrolls[runMonth].extraRuns[sid] = [];
      let run = DB.payrolls[runMonth].extraRuns[sid].find(r => r.periodEnd === payDate);
      if (!run) {
        const stepDays = st.frequency === 'weekly' ? 7 : 14;
        const [py,pm,pd2] = payDate.split('-').map(Number);
        let prevStr;
        if (st.frequency === 'monthly' || !st.frequency) {
          // Period start = 1st of the prior month (e.g. May 1 payment covers April work)
          const prevMo = pm === 1 ? 12 : pm - 1;
          const prevYr = pm === 1 ? py - 1 : py;
          prevStr = `${prevYr}-${String(prevMo).padStart(2,'0')}-01`;
        } else {
          const prevDate = new Date(py, pm-1, pd2 - stepDays);
          prevStr = `${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}-${String(prevDate.getDate()).padStart(2,'0')}`;
        }
        const rate = getExtraStaffRate(st);
        const d = calcScheduledDaysInPeriod(st, prevStr, payDate);
        const amt = st.rateType==='day_rate' ? Math.round(rate*d)
          : st.rateType==='hourly' ? 0  // user enters actual hours each run
          : (st.frequency==='monthly' ? rate : Math.round(rate/(st.frequency==='weekly'?4:2)));
        run = { periodStart: prevStr, periodEnd: payDate, daysWorked: d, hoursWorked: 0, amount: st.rateType==='hourly' ? 0 : amt,
          allowance: getEffectiveAllowance(st, payDate), totalAdvanceDeductions: 0, advanceDeductions: [] };
        DB.payrolls[runMonth].extraRuns[sid].push(run);
      }
      return run;
    }

    // Helper: recalculate and update the Total cell for a row
    function refreshTotal(sid, payDate) {
      const st = DB.extraStaff.find(x => x.id === sid); if (!st) return;
      const run = getOrCreateRun(sid, payDate); if (!run) return;
      const curr = st.currency || dc;
      const advDeduct = (st.advances||[]).filter(a=>a.remaining>0&&a.deductionPerRun>0&&a.date<=payDate).reduce((s,a)=>s+Math.min(a.deductionPerRun,a.remaining),0);
      const net = Math.max(0, (run.amount||0) - advDeduct) + (run.allowance||0);
      const totalCell = card.querySelector(`.epr-total-cell[data-sid="${sid}"][data-date="${payDate}"]`);
      if (totalCell) totalCell.textContent = fmt(net, curr);
    }

    // Wire days inputs (day rate only)
    card.querySelectorAll('.epr-days-inp').forEach(inp => {
      function saveDays() {
        const sid = inp.dataset.sid, payDate = inp.dataset.date;
        const st = DB.extraStaff.find(x => x.id === sid); if (!st) return;
        const days = parseFloat(inp.value) || 0;
        const run = getOrCreateRun(sid, payDate); if (!run) return;
        run.daysWorked = days;
        run.amount = Math.round(getExtraStaffRate(st) * days);
        saveDB();
        refreshTotal(sid, payDate);
      }
      inp.addEventListener('blur', saveDays);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
      inp.addEventListener('focus', () => { inp.style.borderColor = '#678F2F'; inp.style.boxShadow = '0 0 0 2px rgba(103,143,47,.1)'; });
      inp.addEventListener('blur', () => { inp.style.borderColor = '#E2E2E2'; inp.style.boxShadow = ''; });
    });

    // Wire hours inputs (hourly staff)
    card.querySelectorAll('.epr-hours-inp').forEach(inp => {
      function saveHours() {
        const sid = inp.dataset.sid, payDate = inp.dataset.date;
        const st = DB.extraStaff.find(x => x.id === sid); if (!st) return;
        const hours = parseFloat(inp.value) || 0;
        const run = getOrCreateRun(sid, payDate); if (!run) return;
        run.hoursWorked = hours;
        run.amount = Math.round(getExtraStaffRate(st) * hours);
        saveDB();
        refreshTotal(sid, payDate);
      }
      inp.addEventListener('blur', saveHours);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
      inp.addEventListener('focus', () => { inp.style.borderColor = '#678F2F'; inp.style.boxShadow = '0 0 0 2px rgba(103,143,47,.1)'; });
      inp.addEventListener('blur', () => { inp.style.borderColor = '#E2E2E2'; inp.style.boxShadow = ''; });
    });

    // Wire allowance inputs (all staff)
    card.querySelectorAll('.epr-allow-inp').forEach(inp => {
      function saveAllowance() {
        const sid = inp.dataset.sid, payDate = inp.dataset.date;
        const run = getOrCreateRun(sid, payDate); if (!run) return;
        run.allowance = parseFloat(inp.value) || 0;
        saveDB();
        refreshTotal(sid, payDate);
      }
      inp.addEventListener('blur', saveAllowance);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
      inp.addEventListener('focus', () => { inp.style.borderColor = '#678F2F'; inp.style.boxShadow = '0 0 0 2px rgba(103,143,47,.1)'; });
      inp.addEventListener('blur', () => { inp.style.borderColor = '#E2E2E2'; inp.style.boxShadow = ''; });
    });

    // Wire pay checkboxes — same auto-pay flow as payroll
    card.querySelectorAll('.epr-pay-cb').forEach(cb => {
      cb.addEventListener('change', async () => {
        if (!cb.checked) return;
        const sid = cb.dataset.sid;
        const payDate = cb.dataset.date;
        const st = DB.extraStaff.find(x => x.id === sid); if (!st) return;

        // Build the run object (same logic as epr-invoice)
        const stepDays = st.frequency === 'weekly' ? 7 : 14;
        const [py,pm,pd2] = payDate.split('-').map(Number);
        const prevDate = new Date(py,pm-1,pd2-(st.frequency==='monthly'?0:stepDays));
        const prevStr = st.frequency === 'monthly'
          ? `${py}-${String(pm).padStart(2,'0')}-01`
          : `${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}-${String(prevDate.getDate()).padStart(2,'0')}`;
        const rate2 = getExtraStaffRate(st);
        const days2 = st.rateType==='day_rate' ? calcScheduledDaysInPeriod(st, prevStr, payDate) : 0;
        const storedRun2 = (DB.payrolls?.[payDate.slice(0,7)]?.extraRuns?.[sid] || []).find(r => r.periodEnd === payDate);
        const hours2 = st.rateType==='hourly' ? (storedRun2?.hoursWorked || 0) : 0;
        const amount = st.rateType==='day_rate'  ? Math.round(rate2 * days2)
                     : st.rateType==='hourly'    ? Math.round(rate2 * hours2)
                     : (st.frequency==='monthly' ? rate2 : Math.round(rate2/(st.frequency==='weekly'?4:2)));
        const advDeduct = (st.advances||[])
          .filter(a=>a.remaining>0&&a.deductionPerRun>0&&a.date<=payDate)
          .reduce((s,a)=>s+Math.min(a.deductionPerRun,a.remaining),0);
        const runMonth = payDate.slice(0,7);
        if (!DB.payrolls[runMonth]) DB.payrolls[runMonth] = { overrides:{}, paid:{}, bankSnapshots:{}, otApprovals:{}, extraRuns:{} };
        if (!DB.payrolls[runMonth].extraRuns) DB.payrolls[runMonth].extraRuns = {};
        if (!DB.payrolls[runMonth].extraRuns[sid]) DB.payrolls[runMonth].extraRuns[sid] = [];

        // Find or create the run record
        let run = DB.payrolls[runMonth].extraRuns[sid].find(r => r.periodEnd === payDate);
        if (!run) {
          run = {
            periodStart: prevStr, periodEnd: payDate,
            daysWorked: days2, amount, allowance: getEffectiveAllowance(st, payDate),
            totalAdvanceDeductions: advDeduct,
            advanceDeductions: (st.advances||[]).filter(a=>a.remaining>0&&a.deductionPerRun>0&&a.date<=payDate).map(a=>({advId:a.id,description:a.description,amount:Math.min(a.deductionPerRun,a.remaining)}))
          };
          DB.payrolls[runMonth].extraRuns[sid].push(run);
          saveDB();
        }

        const runIdx = DB.payrolls[runMonth].extraRuns[sid].indexOf(run);
        // Show spinner immediately
        const cell = cb.closest('.epr-paid-cell');
        if (cell) cell.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:32px"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="animation:spin .8s linear infinite"><circle cx="9" cy="9" r="7" stroke="#E2E2E2" stroke-width="2"/><path d="M9 2a7 7 0 0 1 7 7" stroke="#678F2F" stroke-width="2" stroke-linecap="round"/></svg></div>';

        await confirmAndPayRun(st, run, runIdx, cb, card);
      });
    });

    // ── One-off Payments ──
    const month    = dateStr.slice(0,7);
    if (!DB.payrolls[month]) DB.payrolls[month] = { overrides:{}, paid:{}, bankSnapshots:{}, otApprovals:{} };
    if (!DB.payrolls[month].oneOffPayments) DB.payrolls[month].oneOffPayments = [];
    const oneOffs  = DB.payrolls[month].oneOffPayments.filter(p => p.payDate === dateStr);

    const oneOffCard = document.createElement('div');
    oneOffCard.className = 'card mb-20';
    oneOffCard.style.cssText = 'padding:0;overflow:hidden';

    function renderOneOffs() {
      const items = DB.payrolls[month].oneOffPayments.filter(p => p.payDate === dateStr);
      oneOffCard.innerHTML = `
        <div style="padding:12px 20px;background:#F2F1EE;border-bottom:1px solid #E2E2E2;display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:13px;font-weight:700;color:#2F2F2F">One-off Payments</div>
          <button class="btn btn-primary btn-sm" id="oop-add" style="font-size:11px">+ Add</button>
        </div>
        ${items.length ? `<table style="width:100%;border-collapse:collapse;table-layout:fixed">
          <colgroup><col><col style="width:180px"><col style="width:120px"><col style="width:80px"></colgroup>
          <thead><tr style="background:#F7F7F7">
            <th style="padding:7px 18px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Name / Description</th>
            <th style="padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Email</th>
            <th style="padding:7px 10px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#678F2F;border-bottom:1px solid #E2E2E2">Amount</th>
            <th style="padding:7px 10px;border-bottom:1px solid #E2E2E2"></th>
          </tr></thead>
          <tbody>
            ${items.map(p => `<tr style="border-bottom:1px solid #F2F1EE${p.paid?' ;background:rgba(103,143,47,0.04)':''}">
              <td style="padding:10px 18px">
                <div style="font-weight:600">${p.name}</div>
                <div style="font-size:14px;color:#898987">${p.description||''}</div>
              </td>
              <td style="padding:10px;font-size:14px;color:#898987">${p.email||'<span style="color:#E2E2E2">—</span>'}</td>
              <td class="mono" style="padding:10px;text-align:right;font-weight:800;color:#678F2F">${fmt(p.amount, p.currency||dc)}</td>
              <td style="padding:10px;text-align:right;display:flex;gap:6px;justify-content:flex-end;align-items:center">
                ${p.paid
                  ? '<span style="font-size:13px;color:#678F2F" title="Invoice sent">✓</span>'
                  : `<button class="btn btn-primary btn-sm oop-invoice" data-id="${p.id}" style="font-size:11px">Invoice</button>
                     <button class="btn btn-ghost btn-sm oop-del" data-id="${p.id}" style="font-size:11px;color:#C0392B;padding:4px 7px">✕</button>`}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`
        : '<div style="padding:20px 20px;font-size:13px;color:#ADADAB">No one-off payments for this run.</div>'}`;

      oneOffCard.querySelector('#oop-add').addEventListener('click', () => showOneOffModal(dateStr, month, renderOneOffs));

      oneOffCard.querySelectorAll('.oop-invoice').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = DB.payrolls[month].oneOffPayments.find(x => x.id === btn.dataset.id);
          if (p) sendOneOffInvoice(p, month, renderOneOffs);
        });
      });

      oneOffCard.querySelectorAll('.oop-del').forEach(btn => {
        btn.addEventListener('click', () => {
          DB.payrolls[month].oneOffPayments = DB.payrolls[month].oneOffPayments.filter(x => x.id !== btn.dataset.id);
          saveDB(); renderOneOffs();
        });
      });
    }
    renderOneOffs();
    el.appendChild(oneOffCard);
  }

  // ── Topbar: Next Pay Run button ──────────────────────────────
  const nextUpcomingIdx = sortedDates.findIndex(d => d >= todayStr);
  if (nextUpcomingIdx !== -1 && sortedDates[nextUpcomingIdx]) {
    const nextDateStr  = sortedDates[nextUpcomingIdx];
    const [ny,nm,nd]   = nextDateStr.split('-').map(Number);
    const nextDateFmt  = new Date(ny, nm-1, nd).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    const nextRunBtn   = document.createElement('button');
    nextRunBtn.className = 'btn btn-primary btn-sm';
    nextRunBtn.innerHTML = `Next Pay Run <span style="font-weight:400;opacity:.8;margin-left:4px">${nextDateFmt}</span>`;
    nextRunBtn.addEventListener('click', () => { _selectedIdx = nextUpcomingIdx; renderPayRunView(); });
    acts.appendChild(nextRunBtn);
  }

  renderPayRunView();

}

function renderExtraStaff(el, acts) {
  // Add staff button
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary btn-sm';
  addBtn.innerHTML = '+ Add Extra Staff';
  addBtn.addEventListener('click', () => showExtraStaffModal(null));
  acts.appendChild(addBtn);

  // Bulk first payment date button
  const bulkBtn = document.createElement('button');
  bulkBtn.className = 'btn btn-ghost btn-sm';
  bulkBtn.style.marginLeft = '8px';
  bulkBtn.innerHTML = 'Set Payment Anchor…';
  bulkBtn.addEventListener('click', () => {
    const o = showModal('Set First Payment Date — All Extra Staff',
      '<div style="font-size:13px;color:#898987;margin-bottom:16px">Updates the payment anchor date for all extra staff and clears cached runs so they regenerate from this anchor.</div>'
      + '<div class="form-row"><div class="form-group"><label>First Payment Date</label>'
      + '<input type="date" id="bulk-firstpay" value="' + (new Date().toISOString().slice(0,10)) + '">'
      + '<div class="form-hint">Typically the date of your last or next payment run.</div></div></div>'
      + '<div class="form-actions"><button class="btn btn-ghost" id="bfp-x">Cancel</button>'
      + '<button class="btn btn-primary" id="bfp-ok">Update All</button></div>'
    , '420px');
    o.querySelector('#bfp-x').onclick = () => o.remove();
    o.querySelector('#bfp-ok').onclick = () => {
      const date = o.querySelector('#bulk-firstpay').value;
      if (!date) { toast('Select a date', 'error'); return; }
      (DB.extraStaff || []).forEach(s => { s.firstPaymentDate = date; });
      // Clear all cached runs so they regenerate from new anchor
      Object.values(DB.payrolls || {}).forEach(p => { if (p.extraRuns) p.extraRuns = {}; });
      saveDB();
      o.remove();
      navigate('extrastaff');
      toast('Payment anchor updated to ' + date + ' for all extra staff ✓');
    };
  });
  acts.appendChild(bulkBtn);

  const staff = DB.extraStaff || [];
  const dc = DB.settings.defaultCurrency || 'USD';

  if (!staff.length) {
    el.innerHTML = '<div class="card"><div class="empty-state"><p>No extra staff yet.</p><p style="font-size:13px;color:#ADADAB;margin-top:8px">Extra staff are paid without hour tracking — weekly, bi-weekly or monthly.</p></div></div>';
    return;
  }

  const freqLabel = { weekly:'Weekly', biweekly:'Bi-weekly', monthly:'Monthly' };
  const rateTypeLabel = { fixed_monthly:'Fixed Monthly', day_rate:'Day Rate', hourly:'Hourly' };

  el.innerHTML = '<div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr>'
    + '<th>Name</th><th>Rate Type</th><th style="text-align:right">Rate</th>'
    + '<th style="text-align:center">Schedule</th><th style="text-align:right">Per Payment</th><th style="text-align:right">Allowance</th><th style="text-align:right">Est. Monthly</th><th></th>'
    + '</tr></thead><tbody id="es-tbody"></tbody></table></div></div>';

  const tbody = el.querySelector('#es-tbody');
  staff.forEach(s => {
    const isDayR  = s.rateType === 'day_rate';
    const isHrly  = s.rateType === 'hourly';
    const perRun  = estPaymentAmount(s);
    const monthly = estMonthlyCost(s);
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.dataset.id = s.id;
    tr.innerHTML = '<td><div style="font-weight:600;color:#678F2F;text-decoration:underline;text-underline-offset:3px;text-decoration-style:dotted">' + (s.name || '—') + '</div>'
      + (s.nickname ? '<div style="font-size:11px;color:#898987">' + s.nickname + '</div>' : '')
      + (s.advances?.some(a=>a.remaining>0) ? '<div style="font-size:10px;color:#C0392B;font-weight:600">Advance outstanding</div>' : '')
      + '</td>'
      + '<td><span class="badge ' + (isDayR ? 'badge-blue' : s.rateType==='hourly' ? 'badge-purple' : 'badge-green') + '" style="font-size:11px">' + (isDayR ? 'Day Rate' : s.rateType==='hourly' ? 'Hourly' : 'Fixed Monthly') + '</span></td>'
      + '<td class="mono" class="amt">' + fmt(getExtraStaffRate(s), s.currency || dc)
      + '<div style="font-size:10px;color:#898987">' + (isDayR ? 'per day' : s.rateType==='hourly' ? 'per hour' : 'per month') + '</div></td>'
      + (isDayR
        ? '<td style="text-align:center;font-size:14px">'
          + '<div style="font-weight:600;color:#2F2F2F">' + (s.daysPerWeek || s.scheduledDays?.length || 5) + ' days/wk</div>'
          + '</td>'
          + '<td class="mono" class="amt-green">' + fmt(perRun, s.currency || dc)
          + '<div style="font-size:10px;color:#898987">per payment</div></td>'
        : '<td style="text-align:center"><span class="badge badge-gray" style="font-size:11px">' + ({weekly:'Weekly (÷4)',biweekly:'Bi-weekly (÷2)',monthly:'Monthly'}[s.frequency]||'Monthly') + '</span>'
          + (s.firstPaymentDate && s.frequency !== 'monthly' ? '<div style="font-size:10px;color:#4A7FC1">' + (getNextPaymentDates(s,1)[0] || '—') + '</div>' : '') + '</td>'
          + '<td class="mono" class="amt-green">' + fmt(perRun, s.currency || dc)
          + '<div style="font-size:10px;color:#898987">per payment</div></td>'
        )
      + '<td class="mono" style="text-align:right;color:#898987">'
