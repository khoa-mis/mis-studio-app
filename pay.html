// ── FX Rate Module — shared between PAY and TRACKR ───────────
const FX = (() => {
  const KEY_STORE   = 'mis-fx-key';
  const CACHE_STORE = 'mis-fx-cache';
  const CODES_STORE = 'mis-fx-codes'; // supported currency codes from API
  const CACHE_TTL   = 6 * 60 * 60 * 1000; // 6 hours
  const CODES_TTL   = 7 * 24 * 60 * 60 * 1000; // 7 days

  let _cache = null;

  function getKey() { return localStorage.getItem(KEY_STORE) || ''; }
  function setKey(k) { localStorage.setItem(KEY_STORE, k); }

  function loadCache() {
    if (_cache) return _cache;
    try {
      const c = JSON.parse(localStorage.getItem(CACHE_STORE) || 'null');
      if (c && c.ts && Date.now() - c.ts < CACHE_TTL) { _cache = c; return c; }
    } catch(e) {}
    return null;
  }

  // Returns [{code, name}] of supported currencies, or null
  function getSupportedCodes() {
    try {
      const c = JSON.parse(localStorage.getItem(CODES_STORE) || 'null');
      if (c && c.ts && Date.now() - c.ts < CODES_TTL) return c.codes;
    } catch(e) {}
    return null;
  }

  async function fetchSupportedCodes() {
    const key = getKey(); if (!key) return null;
    try {
      const res  = await fetch(`https://v6.exchangerate-api.com/v6/${key}/codes`);
      const data = await res.json();
      if (data.result !== 'success') return null;
      // data.supported_codes = [["USD","US Dollar"],["EUR","Euro"],...]
      const codes = data.supported_codes.map(([code, name]) => ({ code, name }));
      localStorage.setItem(CODES_STORE, JSON.stringify({ ts: Date.now(), codes }));
      return codes;
    } catch(e) { return null; }
  }

  // Validate a currency code against the supported list
  function isValidCode(code) {
    const codes = getSupportedCodes();
    if (!codes) return true; // can't validate without list — allow through
    return codes.some(c => c.code === code.toUpperCase());
  }

  // Get full name for a code
  function getCodeName(code) {
    const codes = getSupportedCodes();
    return codes?.find(c => c.code === code)?.name || code;
  }

  async function fetchRates(base = 'USD') {
    const key = getKey(); if (!key) return null;
    try {
      const res  = await fetch(`https://v6.exchangerate-api.com/v6/${key}/latest/${base}`);
      const data = await res.json();
      if (data.result !== 'success') return null;
      const cache = { ts: Date.now(), base, rates: data.conversion_rates };
      localStorage.setItem(CACHE_STORE, JSON.stringify(cache));
      _cache = cache;
      return cache;
    } catch(e) { return null; }
  }

  async function getRates(base = 'USD') {
    const cached = loadCache();
    if (cached && cached.base === base) return cached.rates;
    return (await fetchRates(base))?.rates || null;
  }

  async function convert(amount, from, to) {
    if (from === to) return amount;
    const rates = await getRates('USD'); if (!rates) return null;
    const inUSD = from === 'USD' ? amount : amount / (rates[from] || 1);
    return to === 'USD' ? inUSD : inUSD * (rates[to] || 1);
  }

  function convertSync(amount, from, to) {
    if (from === to) return amount;
    const cached = loadCache(); if (!cached?.rates) return null;
    const rates = cached.rates, base = cached.base || 'USD';
    let inBase;
    if (from === base) inBase = amount;
    else if (rates[from]) inBase = amount / rates[from] * (base === 'USD' ? 1 : (rates[base] || 1));
    else return null;
    if (to === base) return inBase;
    return rates[to] ? inBase * rates[to] / (base === 'USD' ? 1 : (rates[base] || 1)) : null;
  }

  function isReady() { return !!(getKey() && loadCache()); }

  async function warmUp() {
    if (!getKey()) return;
    const cached = loadCache();
    if (!cached || Date.now() - cached.ts > CACHE_TTL) await fetchRates('USD');
    if (!getSupportedCodes()) await fetchSupportedCodes();
  }

  return { getKey, setKey, getRates, convert, convertSync, isReady, warmUp, loadCache,
           getSupportedCodes, fetchSupportedCodes, isValidCode, getCodeName };
})();
</script>
<script>
// ══════════════════════════════════════════════════════
//  PAYROLL — mis.studio
//  Shared DB with TRACKR (reads team members from mis-v1)
//  Own data: payroll-v1
// ══════════════════════════════════════════════════════

const KEY='payroll-v1', TRACKR_KEY='mis-v1';
let DB={}, currentView='payroll', currentMonth=null; // set to last month after functions defined

// ── DESIGN SYNC — reads mis-v1 design config and applies to PAY ──
function applyDesignFromTrackr(){
  try{
    const raw=localStorage.getItem('mis-v1');
    if(!raw)return;
    const d=(JSON.parse(raw).design)||{};
    const accent=d.accent||'#678F2F';
    const sidebar=d.sidebar||'#2F2F2F';
    const hexToRgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return r+','+g+','+b;};
    const shadeColor=(hex,p)=>{const n=parseInt(hex.replace('#',''),16);const r=Math.min(255,Math.max(0,(n>>16)+p));const g=Math.min(255,Math.max(0,((n>>8)&0xFF)+p));const b=Math.min(255,Math.max(0,(n&0xFF)+p));return'#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);};
    const vars={
      '--accent':accent,
      '--accent-dim':'rgba('+hexToRgb(accent)+',.10)',
      '--accent-hover':d.accentHover||shadeColor(accent,-15),
      '--bg':d.bg||'#F2F1EE',
      '--card':d.card||'#FFFFFF',
      '--sidebar-bg':sidebar,
      '--text':d.text||'#2F2F2F',
      '--border':d.border||'#E2E2E2',
      '--danger':d.danger||'#C0392B',
      '--danger-dim':'rgba('+hexToRgb(d.danger||'#C0392B')+',.08)',
      '--info':d.info||'#4A7FC1',
      '--sidebar-active':'rgba('+hexToRgb(accent)+',.18)',
      '--header-h':d.headerH||'64px',
      '--sidebar-w':d.sidebarW||'256px',
      '--radius':d.radius||'6px',
      '--radius-sm':d.radiusSm||'3px',
      '--radius-lg':d.radiusLg||'8px',
      '--font':"'"+(d.font||'Manrope')+"',sans-serif",
    };
    const root=document.documentElement;
    Object.entries(vars).forEach(([k,v])=>root.style.setProperty(k,v));
    // Apply custom font if needed
    if(d.font&&d.font!=='Manrope'&&!document.querySelector('link[data-payfont]')){
      const lnk=document.createElement('link');
      lnk.rel='stylesheet';lnk.dataset.payfont='1';
      lnk.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(d.font)+':wght@300;400;500;600;700;800&display=swap';
      document.head.appendChild(lnk);
    }
    // Apply custom logo if set
    if(d.logoSvg){
      const svgEl=document.querySelector('.sidebar-logo svg');
      if(svgEl){svgEl.parentElement.innerHTML='<img src="'+d.logoSvg+'" style="max-height:64px;display:block;max-width:100%">';}
    }
  }catch(e){}
}

function defaultDB(){
  return {
    entities:[
      {id:'mis',name:'MIS',currency:'USD'},
      {id:'mis-sg',name:'MIS Singapore',currency:'SGD'}
    ],
    staff:[],
    extraStaff:[],
    payrolls:{},
    taxProfiles:[
      {id:'sg-cpr',name:'SG Citizen / PR',employeeRate:.20,employerRate:.17},
      {id:'sg-ep',name:'EP / WP Holder',employeeRate:0,employerRate:0},
      {id:'sg-spr1',name:'SPR 1st Year',employeeRate:.05,employerRate:.04},
      {id:'sg-spr2',name:'SPR 2nd Year',employeeRate:.15,employerRate:.09},
      {id:'none',name:'No Tax',employeeRate:0,employerRate:0}
    ],
    settings:{defaultCurrency:'USD',currencies:['USD','SGD','VND','EUR','GBP','THB']}
  };
}

function loadDB(){
  try{
    const r=localStorage.getItem(KEY);
    DB=r?{...defaultDB(),...JSON.parse(r)}:defaultDB();
    if(!DB.entities?.length)DB.entities=defaultDB().entities;
    if(!DB.taxProfiles?.length)DB.taxProfiles=defaultDB().taxProfiles;
    if(!DB.settings)DB.settings=defaultDB().settings;
    if(!DB.settings.company)DB.settings.company={};
    if(!DB.staff)DB.staff=[];
    if(!DB.extraStaff)DB.extraStaff=[];
    if(!DB.payrolls)DB.payrolls={};
    // Migrate: seed salary history for existing staff
    DB.staff.forEach(s=>{
      if(!s.salaryHistory)s.salaryHistory=s.baseSalary?[{amount:s.baseSalary,effectiveFrom:'2000-01',note:'Starting salary'}]:[];
    });
    // Seed default user if not already present
    if(!DB.settings.payUsers)DB.settings.payUsers=[];
    if(!DB.settings.payUsers.some(u=>u.username==='wilaiwan.bunkoet')){
      DB.settings.payUsers.push({id:'pu-seed-wb',username:'wilaiwan.bunkoet',passwordHash:'e5dca05',passwordRaw:'12122121',role:'user',active:true});
      saveDB();
    }
  }catch(e){DB=defaultDB();}
}
function saveDB(){
  // Strip large binary blobs before persisting to localStorage (quota protection).
  // These are kept in DB (and therefore Supabase) but not in the local cache.
  const dbCopy = JSON.parse(JSON.stringify(DB));
  if (dbCopy.payrolls) {
    Object.values(dbCopy.payrolls).forEach(monthData => {
      if (monthData.extraRuns) {
        Object.values(monthData.extraRuns).forEach(runs => {
          (runs || []).forEach(run => { delete run.invoiceHtml; delete run.invoicePdf; });
        });
      }
      (monthData.oneOffPayments || []).forEach(p => { delete p.invoiceHtml; delete p.invoicePdf; });
      if (monthData.payslips) {
        Object.values(monthData.payslips).forEach(p => { delete p.html; delete p.pdf; });
      }
    });
  }
  // Strip Xero cache from localStorage write — it can be several MB and is regenerable.
  // It lives in DB.xeroCache for Supabase sync; TRACKR reads from the standalone keys.
  delete dbCopy.xeroCache;
  localStorage.setItem(KEY, JSON.stringify(dbCopy));
  localStorage.setItem('pay-local-saved-at', new Date().toISOString());
  schedulePayPush();
}

// Returns the canonical currencies list — TRACKR's settings is the single source of truth.
// Falls back to PAY's own list, then a hardcoded default.
function getCurrencies() {
  try {
    const trackr = JSON.parse(localStorage.getItem('mis-v1') || 'null');
    if (trackr?.settings?.currencies?.length) return trackr.settings.currencies;
  } catch(_) {}
  return DB.settings.currencies || ['USD','SGD','VND','EUR','GBP','THB'];
}

// ── XERO INTEGRATION ──────────────────────────────────────────
// Config and tokens live in DB.settings so they sync via Supabase.
// One admin connects once — all team members get access on next pull.
const XERO_CACHE_KEY = 'mis-xero-invoices'; // invoice cache stays local (per-browser perf cache)

function xeroConfig() {
  const cfg = DB.settings?.xero;
  if (cfg?.clientId) return cfg;
  return null;
}
function xeroTokens() {
  return DB.settings?.xeroTokens || null;
}
function xeroConnected() { return !!(xeroTokens()?.access_token); }
function xeroSaveConfig(cfg) {
  if (!DB.settings) DB.settings = {};
  DB.settings.xero = cfg;
  saveDB();
}
function xeroSaveTokens(tokens) {
  if (!DB.settings) DB.settings = {};
  DB.settings.xeroTokens = tokens;
  saveDB();
}
function xeroClearTokens() {
  if (DB.settings) { delete DB.settings.xeroTokens; saveDB(); }
  localStorage.removeItem(XERO_CACHE_KEY);
  localStorage.removeItem(XERO_SPEND_CACHE_KEY);
}

async function sha256b64url(str) {
  if (!crypto?.subtle) throw new Error('crypto.subtle not available — this app must be served over HTTPS or localhost (not file://).');
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function randomStr(len) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/[^a-zA-Z0-9]/g,'').slice(0, len);
}

async function xeroStartAuth() {
  const cfg = xeroConfig();
  if (!cfg?.clientId) { toast('Save your Xero Client ID first', 'error'); return; }

  // Xero accepts localhost but not 127.0.0.1 — normalise
  const redirectUri = window.location.href.split('?')[0].split('#')[0]
    .replace('127.0.0.1', 'localhost');

  // Check HTTPS / localhost requirement
  const isSecure = location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  if (!isSecure) {
    _showXeroManualFlow(cfg.clientId, redirectUri);
    return;
  }

  try {
    const scope = 'openid profile email accounting.banktransactions.read offline_access';
    localStorage.setItem('xero-auth-redirect', redirectUri);
    let authUrl;

    if (cfg.clientSecret) {
      // Confidential web app — standard auth code flow (no PKCE, secret used at token exchange)
      localStorage.removeItem('xero-pkce-verifier');
      authUrl = 'https://login.xero.com/identity/connect/authorize'
        + '?response_type=code'
        + '&client_id=' + encodeURIComponent(cfg.clientId)
        + '&redirect_uri=' + encodeURIComponent(redirectUri)
        + '&scope=' + scope.split(' ').map(encodeURIComponent).join('%20')
        + '&state=xero-pay';
    } else {
      // Public client — PKCE flow (no client secret)
      const verifier = randomStr(64);
      const challenge = await sha256b64url(verifier);
      localStorage.setItem('xero-pkce-verifier', verifier);
      authUrl = 'https://login.xero.com/identity/connect/authorize'
        + '?response_type=code'
        + '&client_id=' + encodeURIComponent(cfg.clientId)
        + '&redirect_uri=' + encodeURIComponent(redirectUri)
        + '&scope=' + scope.split(' ').map(encodeURIComponent).join('%20')
        + '&state=xero-pay'
        + '&code_challenge=' + challenge
        + '&code_challenge_method=S256';
    }

    window.location.href = authUrl;
  } catch(e) {
    toast(e.message, 'error');
  }
}

function _showXeroManualFlow(clientId, redirectUri) {
  // For non-HTTPS contexts, guide user through manual token exchange
  const o = showModal('Connect Xero',

async function xeroHandleCallback(code, redirectUri) {
  const cfg = xeroConfig();
  const verifier = localStorage.getItem('xero-pkce-verifier') || '';
  const uri = redirectUri || localStorage.getItem('xero-auth-redirect') || window.location.href.split('?')[0].split('#')[0].replace('127.0.0.1','localhost');
  if (!cfg?.clientId) return false;
  try {
    const body = {
      grant_type: 'authorization_code', code,
      redirect_uri: uri, client_id: cfg.clientId,
      ...(verifier ? { code_verifier: verifier } : {}),
      ...(cfg.clientSecret ? { client_secret: cfg.clientSecret } : {}),
    };
    const res = await fetch('https://identity.xero.com/connect/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(body),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error_description || json.error || 'HTTP ' + res.status);
    localStorage.removeItem('xero-pkce-verifier');

    // Save tokens immediately — tenant fetch may fail due to CORS on localhost
    xeroSaveTokens({ ...json, saved_at: Date.now(), tenantId: cfg.tenantId || '', tenantName: cfg.tenantName || 'Xero' });

    // Try to fetch tenant ID — routes through proxy on localhost
    try {
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      const connectionsUrl = isLocal
        ? `${location.protocol}//${location.host}/xero-proxy/connections`
        : 'https://api.xero.com/connections';
      const tenantRes = await fetch(connectionsUrl, {
        headers: { Authorization: 'Bearer ' + json.access_token, 'Content-Type': 'application/json' }
      });
      if (tenantRes.ok) {
        const tenants = await tenantRes.json();
        if (tenants[0]) {
          xeroSaveTokens({ ...xeroTokens(), tenantId: tenants[0].tenantId, tenantName: tenants[0].tenantName });
        }
      }
    } catch(_) {
      // Proxy not running — tenant ID must be entered manually in Settings
    }
    return true;
  } catch(e) { return false; }
}

async function xeroRefreshToken() {
  const tokens = xeroTokens();
  const cfg = xeroConfig();
  if (!tokens?.refresh_token || !cfg?.clientId) return false;
  try {
    const res = await fetch('https://identity.xero.com/connect/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'refresh_token', refresh_token: tokens.refresh_token, client_id: cfg.clientId,
        ...(cfg.clientSecret ? { client_secret: cfg.clientSecret } : {}),
      }),
    });
    if (!res.ok) return false;
    const newTokens = await res.json();
    xeroSaveTokens({ ...tokens, ...newTokens, saved_at: Date.now() });
    return true;
  } catch(_) { return false; }
}

async function xeroFetch(path) {
  let tokens = xeroTokens();
  if (!tokens) return null;
  // Refresh if within 5 min of expiry
  const expiresAt = tokens.saved_at + (tokens.expires_in || 1800) * 1000 - 300000;
  if (Date.now() > expiresAt) {
    const ok = await xeroRefreshToken();
    if (!ok) { xeroClearTokens(); return null; }
    tokens = xeroTokens();
  }
  // Route through local proxy on localhost to avoid CORS.
  // In production on a real domain, use api.xero.com directly.
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
  const baseUrl = isLocal
    ? `${location.protocol}//${location.host}/xero-proxy/api.xro/2.0/`
    : 'https://api.xero.com/api.xro/2.0/';
  const res = await fetch(baseUrl + path, {
    headers: {
      Authorization: 'Bearer ' + tokens.access_token,
      'xero-tenant-id': tokens.tenantId,
      Accept: 'application/json'
    }
  });
  if (!res.ok) throw new Error('Xero API ' + res.status);
  return res.json();
}

const XERO_SPEND_CACHE_KEY = 'mis-xero-spend';      // SPEND (outgoing)
const XERO_CONTACT_CACHE_KEY = 'mis-xero-contact';  // SPEND filtered by contact

async function xeroFetchInvoices(forceRefresh = false) {
  // Check DB cache first (synced across users), then standalone localStorage key
  const dbCache = DB.xeroCache?.invoices;
  const lsCache = (() => { try { return JSON.parse(localStorage.getItem(XERO_CACHE_KEY)||'null'); } catch(_){return null;} })();
  const cache = !forceRefresh ? (dbCache || lsCache) : null;
  if (cache && cache.at && Date.now() - cache.at < 3600000) return cache.data;
  try {
    const syncFrom = DB.settings?.xeroSyncFrom;
    const cutoff = syncFrom ? new Date(syncFrom) : (() => { const d = new Date(); d.setFullYear(d.getFullYear()-3); return d; })();
    const dateParam = `${cutoff.getFullYear()},${String(cutoff.getMonth()+1).padStart(2,'0')},${String(cutoff.getDate()).padStart(2,'0')}`;
    // summaryOnly=false ensures full objects including LineItems, Contact details, BankAccount
    // unitdp=4 gives 4 decimal precision on amounts
    const base = `BankTransactions?where=Type=="RECEIVE"AND Status=="AUTHORISED"AND Date>=DateTime(${dateParam})&summaryOnly=false&unitdp=4`;
    let all = [], page = 1;
    while (page <= 30) {
      const data = await xeroFetch(`${base}&page=${page}`);
      const txs = data?.BankTransactions || [];
      all = all.concat(txs);
      if (txs.length < 100) break;
      page++;
    }
    const entry = { at: Date.now(), data: all };
    // Store in DB for Supabase sync (shared with all users)
    if (!DB.xeroCache) DB.xeroCache = {};
    DB.xeroCache.invoices = entry;
    saveDB();
    // Also write standalone key so TRACKR can read it directly
    localStorage.setItem(XERO_CACHE_KEY, JSON.stringify(entry));
    return all;
  } catch(e) { return []; }
}

// Aggregate bank transaction amounts by month (YYYY-MM)
function xeroTxByMonth(transactions) {
  const byMonth = {};
  transactions.forEach(tx => {
    const d = tx.Date;
    if (!d) return;
    const m = String(d).match(/\/Date\((\d+)/);
    const dateStr = m ? new Date(parseInt(m[1])).toISOString().slice(0,7) : String(d).slice(0,7);
    byMonth[dateStr] = (byMonth[dateStr] || 0) + (tx.Total || 0);
  });
  return byMonth;
}

// Detect the currency used in Xero transactions (first transaction wins)
function xeroTxCurrency(transactions) {
  for (const tx of transactions) {
    if (tx.CurrencyCode) return tx.CurrencyCode;
  }
  return null;
}

function xeroIncomeByMonth(transactions)  { return xeroTxByMonth(transactions); }
function xeroExpensesByMonth(transactions) { return xeroTxByMonth(transactions); }

// Fetch all SPEND transactions to a named contact (e.g. "Adaptis GmbH")
// Caches for 1 hour per contact name
async function xeroFetchContactPayments(contactName, forceRefresh = false) {
  const cacheKey = XERO_CONTACT_CACHE_KEY + '-' + contactName.toLowerCase().replace(/\s+/g,'-');
  const cache = !forceRefresh ? (() => {
    try { const c = JSON.parse(localStorage.getItem(cacheKey)||'null'); return c && Date.now()-c.at < 3600000 ? c.data : null; } catch(_){return null;}
  })() : null;
  if (cache) return cache;
  try {
    const cutoff = new Date(); cutoff.setFullYear(cutoff.getFullYear()-3);
    const dateStr = cutoff.toISOString().slice(0,10);
    // Xero OData: filter SPEND by contact name and date
    const escaped = contactName.replace(/"/g, '\\"');
    const data = await xeroFetch(
      `BankTransactions?where=Type=="SPEND"AND Status=="AUTHORISED"AND Contact.Name=="${escaped}"AND Date>=DateTime(${dateStr.replace(/-/g,',')})`
      + `&order=Date DESC`
    );
    const transactions = (data?.BankTransactions || []).map(tx => ({
      date:      xeroParseDate(tx.Date),
      amount:    tx.Total || 0,
      currency:  tx.CurrencyCode || 'USD',
      reference: tx.Reference || '',
      contact:   tx.Contact?.Name || contactName,
      url:       tx.Url || null,
    }));
    localStorage.setItem(cacheKey, JSON.stringify({ at: Date.now(), data: transactions }));
    return transactions;
  } catch(e) { return null; }
}

function xeroParseDate(d) {
  if (!d) return null;
  const m = String(d).match(/\/Date\((\d+)/);
  return m ? new Date(parseInt(m[1])).toISOString().slice(0,10) : String(d).slice(0,10);
}

// ── SHARED GOOGLE SHEETS IMPORT HELPERS ──────────────────────
async function fetchGoogleSheet(url, sheetName) {
  const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (!match) throw new Error('Could not parse spreadsheet ID from URL.');
  const id = match[1];
  const gid = url.match(/[?&#]gid=(\d+)/)?.[1] || '0';
  const csvUrl = sheetName
    ? `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`
    : `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
  const res = await fetch(csvUrl);
  if (!res.ok) throw new Error(`HTTP ${res.status} — check sheet sharing settings.`);
  const text = await res.text();
  if (text.includes('<html') || text.includes('Sign in')) throw new Error('Sheet is not publicly accessible. Enable "Anyone with the link can view".');
  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuote) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') inQuote = false;
      else cell += c;
    } else {
      if (c === '"') inQuote = true;
      else if (c === ',') { row.push(cell.trim()); cell = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        if (c === '\r') i++;
        row.push(cell.trim()); cell = '';
        if (row.some(v => v !== '')) rows.push(row);
        row = [];
      } else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell.trim()); if (row.some(v => v !== '')) rows.push(row); }
  return rows;
}

// Wire up a Google Sheets import panel in settings.
// opts: { urlId, tabId, fetchBtnId, statusId, previewId, countId, tableId, cancelId, confirmId, parse, previewHtml, onConfirm }
function wireSheetImportPanel(el, opts) {
  const statusEl = el.querySelector('#' + opts.statusId);
  const previewWrap = el.querySelector('#' + opts.previewId);
  let _rows = [];

  async function doFetch() {
    const raw = el.querySelector('#' + opts.urlId).value.trim();
    const tab = el.querySelector('#' + opts.tabId)?.value.trim() || '';
    if (!raw || !raw.includes('docs.google.com')) { statusEl.innerHTML = '<span style="color:#C0392B">Please enter a valid Google Sheets URL.</span>'; return; }
    const btn = el.querySelector('#' + opts.fetchBtnId);
    btn.textContent = 'Fetching…'; btn.disabled = true;
    statusEl.innerHTML = '<span style="color:#ADADAB">Connecting…</span>';
    try {
      const allRows = await fetchGoogleSheet(raw, tab);
      if (!allRows || allRows.length < 2) throw new Error('Sheet appears empty. Check sharing is set to "Anyone with the link can view".');
      _rows = opts.parse(allRows[0], allRows.slice(1).filter(r => r.some(v => v)));
      if (!_rows.length) throw new Error('No valid rows found. Check column headers.');
      el.querySelector('#' + opts.countId).textContent = _rows.length + ' row' + (_rows.length !== 1 ? 's' : '');
      el.querySelector('#' + opts.tableId).innerHTML = opts.previewHtml(_rows);
      previewWrap.style.display = '';
      statusEl.innerHTML = '';
    } catch(e) { statusEl.innerHTML = '<span style="color:#C0392B">' + e.message + '</span>'; }
    finally { btn.textContent = 'Fetch Sheet'; btn.disabled = false; }
  }

  el.querySelector('#' + opts.fetchBtnId)?.addEventListener('click', doFetch);
  el.querySelector('#' + opts.cancelId)?.addEventListener('click', () => { previewWrap.style.display = 'none'; _rows = []; statusEl.innerHTML = ''; });
  el.querySelector('#' + opts.confirmId)?.addEventListener('click', () => {
    if (!_rows.length) return;
    const result = opts.onConfirm(_rows, el);
    previewWrap.style.display = 'none'; _rows = [];
    statusEl.innerHTML = '<span style="color:#678F2F">✓ ' + result + '</span>';
    toast(result + ' ✓');
    saveDB();
  });
}

// Helpers
function todayMonth(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function fmtMonth(m){if(!m)return'—';const[y,mo]=m.split('-');return new Date(+y,+mo-1,1).toLocaleString('en-US',{month:'long',year:'numeric'});}
function prevMonth(m){const[y,mo]=m.split('-').map(Number);const d=new Date(y,mo-2,1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}

function initials(n){if(!n)return'?';const p=n.trim().split(/\s+/);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();}
function displayName(s){if(!s)return'';if(typeof s==='string')return s;return s.displayName||s.nickname||s.name||'';}

  const s={USD:'$',SGD:'S$',VND:'₫',EUR:'€',GBP:'£',THB:'฿'}[curr]||(curr?curr+' ':'$');

function getEntity(id){return DB.entities?.find(e=>e.id===id)||{name:id,currency:'USD'};}

function getSalaryForMonth(s,month){
  if(!s.salaryHistory?.length)return s.baseSalary||0;
  const h=[...s.salaryHistory].filter(e=>e.effectiveFrom<=month).sort((a,b)=>b.effectiveFrom.localeCompare(a.effectiveFrom));
  return h.length?h[0].amount:(s.baseSalary||0);
}

function getEffectiveAllocation(s, month) {
  if (!s.allocationHistory?.length) return s.allocation !== undefined ? s.allocation : 100;
  const h = [...s.allocationHistory].filter(e => e.effectiveFrom <= month)
    .sort((a,b) => b.effectiveFrom.localeCompare(a.effectiveFrom));
  return h.length ? h[0].pct : (s.allocation !== undefined ? s.allocation : 100);
}

// Payroll calculation
function isEligibleForMonth(s,month){
  const firstSalaryDate = s.salaryHistory?.length
    ? [...s.salaryHistory].sort((a,b)=>a.effectiveFrom.localeCompare(b.effectiveFrom))[0].effectiveFrom
    : null;
  const effectiveStart = s.startDate ? s.startDate.slice(0,7) : firstSalaryDate || null;
  if(effectiveStart && effectiveStart > month) return false;
  if(!s.resignedDate)return true;
  return s.resignedDate.slice(0,7)>=month;
}

function calcStaff(staffId,month){
  const s=DB.staff.find(x=>x.id===staffId);
  if(!s||!s.active)return null;
  if(!isEligibleForMonth(s,month))return null;
  // Resolve effective start date: explicit startDate → first salary history entry → no restriction
  const firstSalaryDate = s.salaryHistory?.length
    ? [...s.salaryHistory].sort((a,b)=>a.effectiveFrom.localeCompare(b.effectiveFrom))[0].effectiveFrom + '-01'
    : null;
  const effectiveStart = s.startDate || firstSalaryDate || null;
  // Apply same eligibility check with resolved start
  if(effectiveStart && effectiveStart.slice(0,7) > month) return null;
  const ov=DB.payrolls[month]?.overrides?.[staffId]||{};
  const curr=s.currency||getEntity(s.entityId)?.currency||'USD';
  let proRata=null,base;
  if(ov.amount!==undefined){
    base=ov.amount;
  }else if(s.resignedDate&&s.resignedDate.slice(0,7)===month){
    // Pro-rata for resignation month
    const[ry,rm,rd]=s.resignedDate.split('-').map(Number);
    const daysInMonth=new Date(ry,rm,0).getDate();
    base=Math.round(getSalaryForMonth(s,month)*rd/daysInMonth);
    proRata={daysWorked:rd,daysInMonth};
  }else if(effectiveStart&&effectiveStart.slice(0,7)===month){
    // Pro-rata for start month — pay from start day to end of month
    const[sy,sm,sd]=effectiveStart.split('-').map(Number);
    const daysInMonth=new Date(sy,sm,0).getDate();
    const daysWorked=daysInMonth-sd+1;
    base=Math.round(getSalaryForMonth(s,month)*daysWorked/daysInMonth);
    proRata={daysWorked,daysInMonth,isStart:true};
  }else{
    base=getSalaryForMonth(s,month);
  }
  const bonus=ov.bonus||0,extraDed=ov.deduction||0;
  const allow = ov.allowance !== undefined ? ov.allowance : getEffectiveAllowance(s, currentMonth + '-01');
  const otPay=calcOtPay(s.id,month);

  if(s.type==='external'){
    if(!base)return null;
    const overheadRate=(DB.settings.externalOverheadRate!==undefined?DB.settings.externalOverheadRate:15)/100;
    const allocPct = Math.min((getEffectiveAllocation(s, month)), 100) / 100;
    const allocatedBase = Math.round(base * allocPct);
    const overhead=Math.round(allocatedBase*overheadRate);
    const totalCost=allocatedBase+overhead+bonus+otPay+allow;
    return{gross:base,allocatedBase,empDed:0,empCont:0,net:base+bonus+otPay-extraDed+allow,totalCost,overhead,overheadRate,allocPct,tp:null,curr,bonus,otPay,extraDed,allow,proRata,isExternal:true};
  }
  if(s.type==='employee'){
    const tp=DB.taxProfiles.find(t=>t.id===s.taxProfileId)||DB.taxProfiles.find(t=>t.id==='none');
    const empDed=Math.round(base*(tp?.employeeRate||0));
    const empCont=Math.round(base*(tp?.employerRate||0));
    return{gross:base,allocatedBase:base,empDed,empCont,net:base-empDed+bonus+otPay-extraDed+allow,totalCost:base+empCont+bonus+otPay+allow,allocPct:1,tp,curr,bonus,otPay,extraDed,allow,proRata};
  }
  const net=base+bonus+otPay-extraDed+allow;
  return{gross:base,allocatedBase:base,empDed:0,empCont:0,net,totalCost:base+bonus+otPay+allow,allocPct:1,tp:null,curr,bonus,otPay,extraDed,allow,proRata};
}

// Read OT entries from TRACKR (mis-v1) for a staff member + month
function getOtEntries(staffId, month) {
  try {
    const r = localStorage.getItem(TRACKR_KEY); if (!r) return [];
    const tDB = JSON.parse(r);
    const entries = tDB.timeEntries || [];
    const s = DB.staff.find(x => x.id === staffId);
    const trackrId = s?.trackrId || s?.id;
    const projects = tDB.projects || [];
    const clients = tDB.clients || [];
    return entries.filter(e => {
      if (!e.isOT) return false;
      if (e.teamMemberId !== trackrId) return false;
      const em = (e.date || e.month || '').slice(0, 7);
      return em === month;
    }).map(e => {
      const proj = projects.find(p => p.id === e.projectId) || {};
      const cli = clients.find(c => c.id === (proj.clientId || e.clientId)) || {};
      return {
        id: e.id, date: e.date, description: e.description,
        hours: e.hours || 0,
        otMultiplier: e.otMultiplier || 1.5,
        effectiveHours: (e.hours || 0) * (e.otMultiplier || 1.5),
        projectName: proj.name || '—',
        clientName: cli.name || '—',
        clientId: cli.id || '',
      };
    });
  } catch(e) { return []; }
}

// OT pay calculation — hourly rate from base salary ÷ 160h
function calcOtPay(staffId, month) {
  const approval = DB.payrolls[month]?.otApprovals?.[staffId];
  if (!approval || approval.status !== 'approved') return 0;
  // Use manual override if set, else auto-calculate
  if (approval.otPay !== undefined) return approval.otPay;
  const s = DB.staff.find(x => x.id === staffId);
  if (!s) return 0;
  const base = getSalaryForMonth(s, month) || 0;
  if (!base) return 0;
  const hourlyRate = base / 160;
  const entries = getOtEntries(staffId, month);
  return Math.round(entries.reduce((sum, e) => sum + e.hours * (e.otMultiplier - 1) * hourlyRate, 0));
}

// Summarise OT entries for display
function getOtSummary(staffId, month) {
  const entries = getOtEntries(staffId, month);
  const approval = DB.payrolls[month]?.otApprovals?.[staffId];
  return { entries, approval, totalEffectiveHours: entries.reduce((s,e) => s+e.effectiveHours, 0) };
}

// Toast
let _toastTimer;
function toast(msg, type='success') {
  const old = document.querySelector('.toast');
  if (old) { old.remove(); clearTimeout(_toastTimer); }
  const icons = { success:'✅', error:'😬', info:'💡' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'✅'}</span><span class="toast-msg">${msg}</span>`;
  const dismiss = () => { el.classList.add('leaving'); clearTimeout(_toastTimer); setTimeout(() => el.remove(), 240); };
  el.addEventListener('click', dismiss);
  document.body.appendChild(el);
  _toastTimer = setTimeout(dismiss, type === 'error' ? 4000 : 3000);
}

function fmtPeriodDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const ord = d===1||d===21||d===31?'st':d===2||d===22?'nd':d===3||d===23?'rd':'th';
  return dayNames[dt.getDay()] + ' ' + d + ord;
}

function fmtPeriodLabel(start, end) {
  if (start === end) return fmtPeriodDate(start);
  const [sy, sm] = start.split('-').map(Number);
  const [, em]   = end.split('-').map(Number);
  const months   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return fmtPeriodDate(start) + (sm!==em ? ' '+months[sm-1] : '') + ' – ' + fmtPeriodDate(end) + (sm!==em ? ' '+months[em-1] : '');
}

// Convert a {currency: amount} map to a single base-currency total using FX cache
// Returns { total, converted: true/false, subtotals: "S$4,500 + ฿32,000" }
function fxByCurr(byCurr, baseCurr) {
  const entries = Object.entries(byCurr||{}).filter(([,v]) => v > 0);
  if (!entries.length) return { total: 0, converted: false, subtotals: '' };
  if (entries.length === 1 && entries[0][0] === baseCurr) return { total: entries[0][1], converted: true, subtotals: '' };
  const subtotals = entries.map(([c,v]) => fmt(v,c)).join(' + ');
  if (!FX.isReady()) return { total: null, converted: false, subtotals };
  let total = 0;
  for (const [c,v] of entries) {
    const r = FX.convertSync(v, c, baseCurr);
    if (r === null) return { total: null, converted: false, subtotals };
    total += r;
  }
  return { total, converted: true, subtotals };
}

function fmtHeroByCurr(byCurr, dc, color) {
  const { total, converted, subtotals } = fxByCurr(byCurr, dc);
  const entries = Object.entries(byCurr||{}).filter(([,v]) => v > 0);
  if (entries.length <= 1) {
    return `<div style="font-size:38px;font-weight:200;letter-spacing:-1.5px;line-height:1;color:${color}">${fmt(entries[0]?.[1]||0, entries[0]?.[0]||dc)}</div>`;
  }
  if (converted && total !== null) {
    return `<div style="font-size:38px;font-weight:200;letter-spacing:-1.5px;line-height:1;color:${color}">~${fmt(total, dc)}</div>`
      + `<div style="font-size:13px;color:rgba(255,255,255,0.4);margin-top:5px;font-weight:400;letter-spacing:0">${subtotals}</div>`;
  }
  // FX not available — stack per currency
  return entries.map(([c,v]) => `<div style="font-size:32px;font-weight:200;letter-spacing:-1px;line-height:1.3;color:${color}">${fmt(v,c)}</div>`).join('')
    + `<div style="font-size:13px;color:rgba(255,255,255,0.4);margin-top:3px;font-weight:400">${entries.length} currencies</div>`;
}

function getMonthlyPaymentRuns(s, month) {
  const [y, m] = month.split('-').map(Number);
  const monthStart = new Date(y, m - 1, 1);
  const monthEnd   = new Date(y, m, 0);
  const rate   = getExtraStaffRate(s, month + '-01');
  const isDayR = s.rateType === 'day_rate';
  const isHrly = s.rateType === 'hourly';

  const fmt8 = d => {
    const yy = d.getFullYear(), mm = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
    return `${yy}-${mm}-${dd}`;
  };
  const parseLocal = str => { const [py,pm,pd] = str.split('-').map(Number); return new Date(py, pm-1, pd); };
  const addDays    = (d, n) => new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);

  if (s.frequency === 'monthly' || !s.frequency) {
    const days   = isDayR ? calcScheduledDaysInPeriod(s, fmt8(monthStart), fmt8(monthEnd)) : 0;
    const hours  = 0;   // default 0h — user enters actual hours each run
    const amount = isDayR ? Math.round(rate * days) : isHrly ? Math.round(rate * hours) : Math.round(rate);
    return [{ periodStart: fmt8(monthStart), periodEnd: fmt8(monthEnd), daysWorked: days, hoursWorked: hours, amount, paid: false }];
  }

  const stepDays = s.frequency === 'weekly' ? 7 : 14;
  const firstPay = s.firstPaymentDate;
  if (!firstPay) {
    const days  = isDayR ? calcScheduledDaysInPeriod(s, fmt8(monthStart), fmt8(monthEnd)) : 0;
    const hours = 0; // user enters actual hours each run
    const amt   = isDayR ? Math.round(rate*days) : isHrly ? Math.round(rate*hours) : Math.round(rate/(stepDays===7?4:2));
    return [{ periodStart: fmt8(monthStart), periodEnd: fmt8(monthEnd), daysWorked: days, hoursWorked: hours, amount: amt, paid: false }];
  }

  let d = parseLocal(firstPay);
  while (d > monthStart) d = addDays(d, -stepDays);
  d = addDays(d, stepDays);

  const payDates = [];
  while (d <= monthEnd) {
    if (d >= monthStart) payDates.push(new Date(d));
    d = addDays(d, stepDays);
  }

  if (!payDates.length) return [];

  return payDates.map((payDate, i) => {
    if (s.resignedDate && fmt8(payDate) > s.resignedDate) return null;
    const periodEnd   = fmt8(payDate);
    const prevPayDate = i === 0 ? addDays(payDate, -stepDays) : payDates[i - 1];
    const periodStart = fmt8(addDays(prevPayDate, 1));
    const days   = isDayR ? calcScheduledDaysInPeriod(s, periodStart, periodEnd) : 0;
    const hours  = 0; // user enters actual hours each run
    const amount = isDayR ? Math.round(rate * days)
                 : isHrly ? Math.round(rate * hours)
                 : Math.round(rate / (stepDays === 7 ? 4 : 2));
    return { periodStart, periodEnd, daysWorked: days, hoursWorked: hours, amount, paid: false };
  }).filter(Boolean);
}

            ${s.nickname ? `<span style="color:#898987;font-size:14px;margin-left:6px">(${s.nickname})</span>` : ''}
            <span class="badge ${isDayR?'badge-blue':s.rateType==='hourly'?'badge-purple':'badge-green'}" style="font-size:10px;margin-left:8px">${isDayR?'Day Rate':s.rateType==='hourly'?'Hourly':'Fixed Monthly'}</span>
          </div>
          <div style="display:flex;gap:16px;align-items:center">
            ${s.advances?.filter(a=>a.remaining>0).length > 0
              ? `<span style="font-size:11px;color:#C0392B;font-weight:600;background:#FEF0EE;border:1px solid #F0CCC8;border-radius:3px;padding:2px 7px">
                  ⚠ Advance: ${s.advances.filter(a=>a.remaining>0).map(a => fmt(a.remaining, s.currency||dc) + (a.deductionPerRun ? ' (−' + fmt(a.deductionPerRun, s.currency||dc) + '/run)' : '')).join(', ')}
                </span>`
              : ''}
            <span style="font-size:14px;color:#ADADAB">${paidCount}/${runs.length} paid</span>
            <span class="mono es-staff-total" style="font-weight:700;color:#678F2F">${fmt(staffTotal, curr)}</span>
            <a href="#" class="es-goto-staff" data-id="${s.id}" style="font-size:11px;color:#4A7FC1;text-decoration:none">Manage →</a>
          </div>
        </div>
        <table style="width:100%;border-collapse:collapse;table-layout:fixed">
          <colgroup>
            <col style="width:auto">       <!-- Period -->
            <col style="width:80px">       <!-- Days -->
            <col style="width:120px">      <!-- Amount -->
            <col style="width:100px">      <!-- Allowance -->
            <col style="width:120px">      <!-- Total -->
            <col style="width:54px">       <!-- Paid -->
            <col style="width:80px">       <!-- Invoice btn -->
          </colgroup>
          <thead>
            <tr style="background:#F7F7F7">
              <th style="padding:6px 18px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Period</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">${isDayR?'Days':isHrlyR?'Hours':'—'}</th>
              <th style="padding:6px 10px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Amount</th>
              <th style="padding:6px 10px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Allowance</th>
              <th style="padding:6px 10px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#678F2F;border-bottom:1px solid #E2E2E2">Total</th>
              <th style="padding:6px 10px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid #E2E2E2">Paid</th>
              <th style="border-bottom:1px solid #E2E2E2"></th>
            </tr>
          </thead>
          <tbody>${runRows}</tbody>
        </table>
      </div>`;
    }).join('');

    extraCard.innerHTML = headerHtml + `<div id="extra-detail" style="display:none">${staffSectionsHtml}</div>`;
    wrap.appendChild(extraCard);

    // Toggle
    extraCard.querySelector('#extra-header').addEventListener('click', () => {
      const detail = extraCard.querySelector('#extra-detail');
      const label  = extraCard.querySelector('#extra-toggle-label');
      const open   = detail.style.display !== 'none';
      detail.style.display = open ? 'none' : 'block';
      label.textContent = open ? '▼ Show' : '▲ Hide';
    });

    // Shared helper: update row total, staff subtotal and card header after any change
    const updateRunTotals = (sid, idx, block) => {
      const s   = DB.extraStaff.find(x => x.id === sid); if (!s) return;
      const run = DB.payrolls[currentMonth].extraRuns[sid]?.[idx]; if (!run) return;
      const curr = s.currency || dc;
      const net  = Math.max(0, (run.amount||0) - (run.totalAdvanceDeductions||0));
      const rowTotal = net + (run.allowance || 0);
      // Row total cell
      const rowTotalEl = extraCard.querySelector(`.es-run-total-cell[data-sid="${sid}"][data-idx="${idx}"]`);
      if (rowTotalEl) rowTotalEl.textContent = fmt(rowTotal, curr);
      // Staff subtotal
      const allRuns    = DB.payrolls[currentMonth].extraRuns[sid] || [];
      const staffTotal = allRuns.reduce((sum, r) => sum + Math.max(0,(r.amount||0)-(r.totalAdvanceDeductions||0)) + (r.allowance||0), 0);
      const totalEl    = block?.querySelector('.es-staff-total');
      if (totalEl) totalEl.textContent = fmt(staffTotal, curr);
      // Card header total (per currency) — only staff active this month
      const _ct = {};
      (DB.extraStaff || []).filter(x =>
        (!x.startDate || x.startDate.slice(0,7) <= currentMonth) &&
        (!x.endDate   || x.endDate.slice(0,7)   >= currentMonth)
      ).forEach(x => {
        const _c = x.currency || dc;
        (DB.payrolls[currentMonth].extraRuns[x.id] || []).forEach(r => {
          _ct[_c] = (_ct[_c]||0) + Math.max(0,(r.amount||0)-(r.totalAdvanceDeductions||0)) + (r.allowance||0);
        });
      });
      const headerTotal = extraCard.querySelector('.extra-header-total');
      if (headerTotal) headerTotal.textContent = Object.entries(_ct).filter(([,v])=>v>0).map(([c,v])=>fmt(v,c)).join(' + ') || fmt(0,dc);
    };

    // Days input → recalculate amount for day rate
    extraCard.querySelectorAll('.es-run-days').forEach(inp => {
      inp.addEventListener('change', () => {
        const sid = inp.dataset.sid, idx = parseInt(inp.dataset.idx);
        const s   = DB.extraStaff.find(x => x.id === sid); if (!s) return;
        const run = DB.payrolls[currentMonth].extraRuns[sid][idx]; if (!run) return;
        run.daysWorked = parseFloat(inp.value) || 0;
        run.amount = Math.round(getExtraStaffRate(s) * run.daysWorked);
        // Update read-only amount cell
        const amtCell = extraCard.querySelector(`.es-run-amount-cell[data-sid="${sid}"][data-idx="${idx}"]`);
        if (amtCell) {
          const deductAmt = run.totalAdvanceDeductions || 0;
          amtCell.textContent = deductAmt > 0
            ? ''            : fmt(run.amount, s.currency || dc);
          if (deductAmt > 0) {
            amtCell.innerHTML = `<span style="text-decoration:line-through;color:#ADADAB;font-weight:400;font-size:14px">${fmt(run.amount, s.currency||dc)}</span><div>${fmt(Math.max(0,run.amount-deductAmt), s.currency||dc)}</div><div style="font-size:10px;color:#C0392B">−${fmt(deductAmt, s.currency||dc)} advance</div>`;
          }
        }
        saveDB();
        updateRunTotals(sid, idx, inp.closest('.es-staff-block'));
      });
    });

    // Wire hours inputs (hourly staff run history)
    extraCard.querySelectorAll('.es-run-hours').forEach(inp => {
      inp.addEventListener('change', () => {
        const sid = inp.dataset.sid, idx = parseInt(inp.dataset.idx);
        const s   = DB.extraStaff.find(x => x.id === sid); if (!s) return;
        const run = DB.payrolls[currentMonth].extraRuns[sid]?.[idx]; if (!run) return;
        run.hoursWorked = parseFloat(inp.value) || 0;
        run.amount      = Math.round(getExtraStaffRate(s) * run.hoursWorked);
        const curr = s.currency || dc;
        const amtCell = extraCard.querySelector(`.es-run-amount-cell[data-sid="${sid}"][data-idx="${idx}"]`);
        if (amtCell) {
          const deductAmt = run.totalAdvanceDeductions || 0;
          if (deductAmt > 0) {
            amtCell.innerHTML = `<span style="text-decoration:line-through;color:#ADADAB;font-weight:400;font-size:14px">${fmt(run.amount, curr)}</span><div>${fmt(Math.max(0,run.amount-deductAmt), curr)}</div><div style="font-size:10px;color:#C0392B">−${fmt(deductAmt, curr)} advance</div>`;
          } else {
            amtCell.textContent = fmt(run.amount, curr);
          }
        }
        saveDB();
        updateRunTotals(sid, idx, inp.closest('.es-staff-block'));
      });
    });

    // Amount override (fixed monthly only)
    extraCard.querySelectorAll('.es-run-amount').forEach(inp => {
      inp.addEventListener('change', () => {
        const sid = inp.dataset.sid, idx = parseInt(inp.dataset.idx);
        const run = DB.payrolls[currentMonth].extraRuns[sid]?.[idx]; if (!run) return;
        run.amount = parseFloat(inp.value) || 0;
        saveDB();
        updateRunTotals(sid, idx, inp.closest('.es-staff-block'));
      });
    });

    // Allowance input
    extraCard.querySelectorAll('.es-run-allowance').forEach(inp => {
      inp.addEventListener('change', () => {
        const sid = inp.dataset.sid, idx = parseInt(inp.dataset.idx);
        const run = DB.payrolls[currentMonth].extraRuns[sid]?.[idx]; if (!run) return;
        run.allowance = parseFloat(inp.value) || 0;
        saveDB();
        updateRunTotals(sid, idx, inp.closest('.es-staff-block'));
      });
    });

    // Paid checkbox
    extraCard.querySelectorAll('.es-run-paid').forEach(cb => {
      cb.addEventListener('change', () => {
        const sid = cb.dataset.sid, idx = parseInt(cb.dataset.idx);
        const s   = DB.extraStaff.find(x => x.id === sid); if (!s) return;
        const run = DB.payrolls[currentMonth].extraRuns[sid]?.[idx]; if (!run) return;

        if (!cb.checked) {
          // Unmark paid — confirm first, then update row inline (no renderView = no collapse)
          cb.checked = true; // revert until confirmed
          confirmModal('Mark as Unpaid',
            `This will clear the paid status, delete the saved invoice, and re-enable editing for <strong>${s.displayName || s.name}</strong> — ${fmtPeriodLabel(run.periodStart, run.periodEnd)}.<br><br>Any advance deductions recorded against this run will be reversed.`,
            'Mark Unpaid',
            () => {
              if (run.advanceDeductions?.length) {
                run.advanceDeductions.forEach(d => {
                  const adv = s.advances?.find(a => a.id === d.advId);
                  if (adv) adv.remaining = Math.min(adv.original || adv.remaining + d.amount, adv.remaining + d.amount);
                });
              }
              run.paid = false; run.invoiceHtml = null; run.invoiceNum = null;
              run.invoiceDate = null; run.invoicePdf = null;
              saveDB();
              cb.checked = false;
              const row = cb.closest('tr');
              if (row) {
                row.style.background = '';
                row.querySelectorAll('input[disabled]').forEach(el => {
                  el.disabled = false;
                  el.style.border = '1px solid #E2E2E2';
                  el.style.background = '#fff';
                });
                // Clear invoice cell
                const invCell = row.querySelector(`.es-run-inv-cell[data-sid="${sid}"][data-idx="${idx}"]`);
                if (invCell) invCell.innerHTML = '';
              }
              toast(`${s.displayName || s.name} marked unpaid`);
            }
          );
          return;
        }

        cb.checked = false; // revert until pay flow completes
        confirmAndPayRun(s, run, idx, cb, extraCard);
      });
    });

    // Navigate to extra staff manager
    extraCard.querySelectorAll('.es-goto-staff').forEach(a => {
      a.addEventListener('click', e => { e.preventDefault(); navigate('extrastaff'); });
    });
  }
}

async function confirmAndPayRun(s, run, runIdx, cb, extraCard) {
  const dc       = s.currency || DB.settings.defaultCurrency || 'USD';
  const fmtA     = n => fmt(n, dc);
  const deductAmt = run.totalAdvanceDeductions || 0;
  const netAmt   = Math.max(0, (run.amount || 0) - deductAmt);
  const total    = netAmt + (run.allowance || 0);
  const ejsCfg   = DB.settings.emailjs || {};
  const hasEjs   = !!(ejsCfg.publicKey && ejsCfg.serviceId && ejsCfg.templateId);
  const today    = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const entity   = getEntity(s.entityId);
  const invNum   = 'INV-' + todayStr.replace(/-/g,'') + '-' + (s.id||'').slice(-4).toUpperCase();
  const periodLabel = fmtPeriodLabel(run.periodStart, run.periodEnd);
  const toEmail  = s.email || ejsCfg.toEmail || '';

  // Show spinner on checkbox cell immediately
  const row = cb.closest('tr');
  const cbCell = cb.closest('td');
  if (cbCell) cbCell.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:32px"><svg width="18" height="18" viewBox="0 0 18 18" fill="none" style="animation:spin .8s linear infinite"><circle cx="9" cy="9" r="7" stroke="#E2E2E2" stroke-width="2"/><path d="M9 2a7 7 0 0 1 7 7" stroke="#678F2F" stroke-width="2" stroke-linecap="round"/></svg></div>';

  // Calculate total hours for the description
  const invoiceHours = (() => {
    if (s.rateType === 'day_rate') {
      return (run.daysWorked || 0) * 8; // 8h per day
    } else {
      // Fixed: derive from amount / (monthly rate / 160 standard hours)
      const monthlyRate = getExtraStaffRate(s) || s.rate || 0;
      const hourlyRate  = monthlyRate > 0 ? monthlyRate / 160 : 0;
      return hourlyRate > 0 ? Math.round((run.amount || 0) / hourlyRate) : 0;
    }
  })();
  const hoursLabel = invoiceHours > 0 ? ` (${invoiceHours} hours)` : '';

  const cfg = {
    num: invNum, date: todayStr, due: todayStr,
    entityId: s.entityId, period: periodLabel,
    amount: total, curr: dc,
    desc: `Provision of professional services in line with agreed scope${hoursLabel}`,
    selectedAdvances: [], totalDeductions: 0,
  };

  // Save invoice HTML
  const invoiceHtml = buildInvoiceHtml(s, cfg);
  run.invoiceHtml  = invoiceHtml;
  run.invoiceNum   = invNum;
  run.invoiceDate  = todayStr;

  // Apply advance deductions
  if (run.advanceDeductions?.length) {
    run.advanceDeductions.forEach(d => {
      const adv = s.advances?.find(a => a.id === d.advId);
      if (adv) adv.remaining = Math.max(0, adv.remaining - d.amount);
    });
  }

  // Mark paid
  run.paid = true;
  saveDB();
  cb.checked = true;

  // Generate PDF + send email
  let emailStatus = '';
  if (hasEjs && toEmail) {
    try {
      let pdfDataUri = null;
      try {
        const pdf = buildInvoicePdf(s, cfg);
        pdfDataUri = pdf.output('datauristring');
        const pdfB64 = pdfDataUri.split(',')[1];
        run.invoicePdf = pdfB64;
        // Upload to Supabase Storage
        const url = await paySupaUploadInvoice(invNum, pdfB64);
        if (url) run.invoiceUrl = url;
        saveDB();
      } catch(pdfErr) { }

      emailjs.init({ publicKey: ejsCfg.publicKey });
      const ws = DB.account?.workspaceName || entity?.name || 'mis.studio';
      const msg = [
        'Hi ' + (s.nickname || s.name) + ',',
        '',
        'Please find your payment details for ' + periodLabel + ' below.',
        '',
        'Invoice No: ' + invNum,
        'Period:     ' + periodLabel,
        'Amount:     ' + fmtA(run.amount),
        ...(deductAmt > 0 ? ['Adv. deduct: −' + fmtA(deductAmt)] : []),
        ...(run.allowance ? ['Allowance:  ' + fmtA(run.allowance)] : []),
        'Total:      ' + fmtA(total),
        '',
        'Payment to: ' + [s.bankName, s.bankAccount].filter(Boolean).join('  |  '),
        '',
        'Issued by ' + ws,
      ].join('\n');
      await emailjs.send(ejsCfg.serviceId, ejsCfg.templateId, {
        to_email: toEmail, to_name: s.name,
        subject: 'Payment — ' + periodLabel + ' — ' + s.name,
        message: msg,
        ...ejsPdfParam(pdfDataUri, invNum),
        ...ejsCcParam(),
      });
      emailStatus = 'emailed ✓';
    } catch(err) {
      emailStatus = 'email failed';
    }
  }

  // Update row inline — show paid status
  if (row) {
    row.style.background = 'rgba(103,143,47,0.04)';
    row.querySelectorAll('input[type="number"]').forEach(inp => {
      inp.disabled = true; inp.style.border = '1px solid transparent'; inp.style.background = 'transparent';
    });
    // Paid cell: just a green checkmark
    if (cbCell) cbCell.innerHTML = `<div style="text-align:center;font-size:14px;color:#678F2F;font-weight:700">✓</div>`;
    // Invoice cell: show "Invoice ↗" link if URL available
    const invCell = extraCard?.querySelector(`.es-run-inv-cell[data-sid="${s.id}"][data-idx="${runIdx}"]`);
    if (invCell) {
      invCell.innerHTML = run.invoiceUrl
        ? `<a href="${run.invoiceUrl}" target="_blank" style="font-size:14px;color:#678F2F;text-decoration:none;font-weight:600">Invoice ↗</a>`
        : `<span style="font-size:14px;color:#678F2F">✓</span>`;
    }
  }
}


// Returns bcc_emails param for emailjs.send if any BCC addresses are configured
function ejsCcParam() {
  const list = DB.settings.emailjs?.bccList || [];
  if (!list.length) return {};
  return { bcc_emails: list.join(',') };
}

// Returns the extra params to attach a PDF to an emailjs.send() call
// pdfDataUri: full data:application/pdf;base64,... string
function ejsPdfParam(pdfDataUri, filename) {
  const param = DB.settings.emailjs?.pdfParam;
  if (!param || !pdfDataUri) return {};
  // EmailJS Variable Attachment: param value must be a plain base64 data URI string.
  // Filename is set dynamically via a separate template variable.
  // In the EmailJS template editor, set the attachment Filename field to {{invoice_filename}}.
  return {
    [param]: pdfDataUri,
    invoice_filename: (filename || 'invoice') + '.pdf',
  };
}

// Generates a real text-based PDF (no image rasterisation) — fully selectable, minimal size (~20-40KB)
function buildInvoicePdf(s, cfg) {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const entity  = getEntity(cfg.entityId || s.entityId);
  const fmtAmt  = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: cfg.curr, minimumFractionDigits: 2 }).format(n || 0);
  const netAmt  = Math.max(0, cfg.amount - (cfg.totalDeductions || 0));
  const bankInfo = [s.bankName, s.bankAccount].filter(Boolean).join('  |  ');
  const billTo  = [entity?.legalName || entity?.name, entity?.uen ? 'UEN: ' + entity.uen : '', entity?.address, entity?.country].filter(Boolean);
  const PW = 210, ML = 20, MR = 20, MT = 22, PH = 297;
  const CW = PW - ML - MR;
  let y = MT;
  const col2x = ML + CW / 2 + 4;
  const right = PW - MR;

  function sf(size, style, color) {
    pdf.setFontSize(size);
    pdf.setFont('helvetica', style || 'normal');
    pdf.setTextColor(...(color || [47,47,47]));
  }
  function hr(yy, col) {
    pdf.setDrawColor(...(col || [226,226,226]));
    pdf.setLineWidth(0.3);
    pdf.line(ML, yy, right, yy);
  }
  function lbl(text, x, yy) {
    sf(8, 'bold', [173,173,171]);
    pdf.text(text.toUpperCase(), x, yy);
  }

  // Header
  sf(18, 'bold'); pdf.text(s.name, ML, y);
  sf(24, 'normal', [47,47,47]); pdf.text('Invoice', right, y, { align:'right' });
  y += 5;
  sf(9, 'normal', [137,137,135]);
  if (bankInfo) pdf.text(bankInfo, ML, y);
  sf(10, 'bold', [137,137,135]); pdf.text(cfg.num, right, y, { align:'right' });
  y += 10; hr(y); y += 8;

  // Meta
  lbl('Bill To', ML, y); lbl('Invoice Date', col2x, y); lbl('Service Period', col2x + 50, y);
  y += 5;
  sf(10, 'normal');
  const metaStart = y;
  billTo.forEach(line => { pdf.text(line, ML, y); y += 4.5; });
  sf(10, 'normal'); pdf.text(cfg.date || '-', col2x, metaStart);
  if (cfg.due && cfg.due !== cfg.date) { sf(8,'normal',[137,137,135]); pdf.text('Due: ' + cfg.due, col2x, metaStart + 5); }
  sf(10,'normal',[47,47,47]); pdf.text(cfg.period || '-', col2x + 50, metaStart);
  y = Math.max(y, metaStart + 14) + 4; hr(y); y += 8;

  // Table header
  sf(8,'bold',[137,137,135]);
  pdf.text('DESCRIPTION', ML, y); pdf.text('AMOUNT (' + cfg.curr + ')', right, y, {align:'right'});
  y += 2; hr(y,[47,47,47]); y += 7;

  // Line items
  sf(10,'normal',[47,47,47]);
  pdf.text(cfg.desc || 'Services', ML, y); pdf.text(fmtAmt(cfg.amount), right, y, {align:'right'}); y += 7;
  (cfg.selectedAdvances || []).forEach(a => {
    sf(10,'normal',[192,57,43]);
    pdf.text((a.description||'Advance') + ' deduction', ML, y);
    pdf.text('(' + fmtAmt(a.deductAmount) + ')', right, y, {align:'right'}); y += 7;
  });
  hr(y); y += 6;

  // Total box
  const bW = 60, bH = 18, bX = right - bW;
  pdf.setFillColor(103,143,47); pdf.roundedRect(bX, y, bW, bH, 3, 3, 'F');
  sf(7,'bold',[255,255,255]); pdf.text('TOTAL DUE', bX + bW/2, y+5, {align:'center'});
  sf(14,'bold',[255,255,255]); pdf.text(fmtAmt(netAmt), bX + bW/2, y+13, {align:'center'});
  y += bH + 10;

  // Bank box
  if (bankInfo) {
    pdf.setDrawColor(226,226,226); pdf.setLineWidth(0.3); pdf.roundedRect(ML, y, CW, 14, 2, 2, 'S');
    lbl('Payment To', ML+5, y+5); sf(10,'normal',[47,47,47]); pdf.text(bankInfo, ML+5, y+11); y += 20;
  }

  // Footer
  hr(PH - 18); sf(8,'normal',[173,173,171]);
  pdf.text('Generated ' + new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}), ML, PH-13);

  return pdf;
}


function buildInvoiceHtml(s, cfg) {
  const entity = getEntity(cfg.entityId || s.entityId);
  const fmtAmt = n => new Intl.NumberFormat('en-US', { style:'currency', currency: cfg.curr, minimumFractionDigits:2 }).format(n||0);
  const netAmount = Math.max(0, cfg.amount - (cfg.totalDeductions||0));
  const bankInfo  = [s.bankName, s.bankAccount].filter(Boolean).join('  |  ');
  const billTo    = [entity?.legalName||entity?.name, entity?.uen?'UEN: '+entity.uen:'', entity?.address, entity?.country].filter(Boolean).join('\n');
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Invoice ${cfg.num}</title>

r-top:1px solid #E2E2E2;font-size:14px;color:#ADADAB}@media print{body{padding:24px}@page{margin:0}}</style>

function printPayslip(staffId, month) {
  const s = DB.staff.find(x => x.id === staffId);
  if (!s) return;
  const e = calcStaff(staffId, month);
  if (!e) return;

  const entity    = getEntity(s.entityId);
  const co        = DB.settings.company || {};
  const tp        = e.tp;
  const curr      = e.curr;
  const legalName = s.legalName || s.displayName || s.name;
  const [year, mo] = month.split('-');
  const periodStart = new Date(+year, +mo - 1, 1).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const periodEnd   = new Date(+year, +mo, 0).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
  const monthLabel  = new Date(+year, +mo - 1, 1).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  const payDate     = periodEnd;
  const ws          = co.legalName || co.name || DB.account?.workspaceName || entity?.name || 'mis.studio';
  const fmtAmt      = n => new Intl.NumberFormat('en-US', { style: 'currency', currency: curr, minimumFractionDigits: 2 }).format(n || 0);
  const bankSnap    = getBankSnap(staffId, month);
  const otEntries   = (DB.timeEntries || []).filter(e2 => e2.teamMemberId === staffId && e2.date?.slice(0,7) === month && e2.isOT);
  const otHours     = otEntries.reduce((sum, e2) => sum + (e2.hours || 0), 0);

  const rows = [];
  if (s.type === 'employee') {
    rows.push({ label: 'Basic Salary', amount: fmtAmt(e.gross), cls: '' });
    if (e.bonus)    rows.push({ label: 'Bonus',           amount: fmtAmt(e.bonus), cls: '' });
    if (e.otPay)    rows.push({ label: `Overtime Pay${otHours ? ' (' + otHours.toFixed(1) + ' hrs)' : ''}`, amount: fmtAmt(e.otPay), cls: '' });
    if (e.extraDed) rows.push({ label: 'Deduction',       amount: '(' + fmtAmt(e.extraDed) + ')', cls: 'ded' });
    if (e.empDed)   rows.push({ label: (tp ? tp.name + ' (Employee)' : 'Employee CPF/Tax'), amount: '(' + fmtAmt(e.empDed) + ')', cls: 'ded' });
    if (e.proRata)  rows.push({ label: 'Pro-rata: ' + e.proRata.daysWorked + ' of ' + e.proRata.daysInMonth + ' days', amount: '', cls: 'note' });
  } else {
    rows.push({ label: 'Service Fee', amount: fmtAmt(e.allocatedBase || e.gross), cls: '' });
    if (e.bonus)    rows.push({ label: 'Bonus',        amount: fmtAmt(e.bonus), cls: '' });
    if (e.otPay)    rows.push({ label: `Overtime Pay${otHours ? ' (' + otHours.toFixed(1) + ' hrs)' : ''}`, amount: fmtAmt(e.otPay), cls: '' });
    if (e.extraDed) rows.push({ label: 'Deduction',    amount: '(' + fmtAmt(e.extraDed) + ')', cls: 'ded' });
  }
  const employerRows = e.empCont ? [{ label: tp ? tp.name + ' (Employer)' : 'Employer CPF', amount: fmtAmt(e.empCont) }] : [];
  const bankHtml = bankSnap?.accountNumber
    ? `<p><strong>Bank:</strong> ${bankSnap.accountName || legalName}</p><p><strong>Account:</strong> ${bankSnap.accountNumber}${bankSnap.swift ? '&nbsp;&nbsp;<strong>SWIFT:</strong> ' + bankSnap.swift : ''}</p>`
    : '<p style="color:#ADADAB">No banking details on file.</p>';

  const payslipHTML = `<!DOCTYPE html><html><head><meta charset="utf-8">
  <title>Payslip — ${legalName} — ${monthLabel}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    .company-sub{font-size:14px;color:#898987;line-height:1.6}

    .slip-title h1{font-size:24px;font-weight:300;color:#2F2F2F;letter-spacing:-0.5px}

    .meta-item .val{font-size:14px;color:#2F2F2F;font-weight:600}

    .section-title{font-size:15px;font-weight:600;letter-spacing:-0.2px;color:#2F2F2F;margin-bottom:8px;margin-top:16px}
    table{width:100%;border-collapse:collapse}
    tr.row td{padding:7px 0;border-bottom:1px solid #F2F1EE;font-size:13px}
    tr.row td:last-child{text-align:right;font-weight:600;font-family:monospace}
    tr.row.ded td{color:#C0392B}
    tr.row.note td{color:#898987;font-size:11px;font-style:italic}
    tr.row.note td:last-child{text-align:left}
    .net-box{display:flex;justify-content:space-between;align-items:center;background:#678F2F;color:#fff;border-radius:6px;padding:14px 18px;margin-top:16px}
    .net-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;opacity:.75}
    .net-amount{font-size:22px;font-weight:700;font-family:monospace;letter-spacing:-0.5px}
    .employer-box{border:1px solid #E2E2E2;border-radius:6px;padding:12px 16px;margin-top:12px;background:#FAFAFA}
    .employer-box .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#4A7FC1;margin-bottom:8px}
    .bank-box{border:1px solid #E2E2E2;border-radius:6px;padding:12px 16px;margin-top:12px}
    .bank-box .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#ADADAB;margin-bottom:8px}
    .bank-box p{font-size:14px;color:#2F2F2F;margin-bottom:3px;line-height:1.5}
    .footer{margin-top:28px;padding-top:14px;border-top:1px solid #E2E2E2;font-size:11px;color:#ADADAB;display:flex;justify-content:space-between}

    @media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact}@page{margin:12mm}}
  </style></head><body>
  <div class="page" id="payslip-content">

    <div class="header">
      <div>
        <div class="company">${ws}</div>
        <div class="company-sub">${entity?.name || ''}</div>
      </div>
      <div class="slip-title">
        <h1>Payslip</h1>
        <div class="period">${periodStart} – ${periodEnd}</div>
      </div>
    </div>

    <div class="meta">
      <div class="meta-item"><div class="lbl">Employee</div><div class="val">${legalName}</div></div>
      <div class="meta-item"><div class="lbl">Designation</div><div class="val">${s.jobTitle || '—'}</div></div>
      <div class="meta-item"><div class="lbl">Type</div><div class="val">${({employee:'Employee',fixed:'Fixed Cost',freelance:'Freelancer',external:'External'})[s.type]||s.type}</div></div>
      <div class="meta-item"><div class="lbl">ID / NRIC / FIN</div><div class="val mono">${s.idNumber || '—'}</div></div>
      <div class="meta-item"><div class="lbl">Social Insurance</div><div class="val mono">${s.socialInsuranceNumber || '—'}</div></div>
      <div class="meta-item"><div class="lbl">Tax / CPF Profile</div><div class="val">${tp ? tp.name : '—'}</div></div>
      <div class="meta-item"><div class="lbl">Pay Period</div><div class="val">${periodStart}<br>– ${periodEnd}</div></div>
      <div class="meta-item"><div class="lbl">Pay Date</div><div class="val">${payDate}</div></div>
      <div class="meta-item"><div class="lbl">Currency</div><div class="val">${curr}</div></div>
    </div>

    <div class="section-title">Earnings &amp; Deductions</div>
    <table>${rows.map(r => `<tr class="row ${r.cls}"><td>${r.label}</td><td>${r.amount}</td></tr>`).join('')}</table>

    <div class="net-box">
      <div class="net-label">Net Pay</div>
      <div class="net-amount">${fmtAmt(e.net)}</div>
    </div>

    ${employerRows.length ? `<div class="employer-box"><div class="lbl">Employer Contributions (for reference — not deducted from employee)</div><table>${employerRows.map(r=>`<tr class="row"><td>${r.label}</td><td>${r.amount}</td></tr>`).join('')}</table><div style="margin-top:10px;display:flex;justify-content:space-between;font-size:13px"><span style="color:#4A7FC1;font-weight:600">Total Cost to Company</span><span style="font-weight:700;font-family:monospace">${fmtAmt(e.totalCost)}</span></div></div>` : ''}

    <div class="bank-box">
      <div class="lbl">Payment To</div>
      ${bankHtml}
    </div>

    <div class="footer">
      <span>Issued by ${ws}</span>
      <span>Generated: ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</span>
    </div>
    <div class="conf-note">This is a computer-generated payslip and does not require a signature.</div>

  </div>
  </body></html>`;

  // Show action modal
  const employeeEmail = s.email || '';
  const ejsCfg = DB.settings.emailjs || {};
  const hasEjs = !!(ejsCfg.publicKey && ejsCfg.serviceId && ejsCfg.templateId);

  const o = showModal('Payslip — ' + legalName,
    '<div style="background:#F7F7F5;border-radius:6px;padding:14px 16px;margin-bottom:16px;font-size:13px">'
    + '<div style="font-weight:700;margin-bottom:2px">' + legalName + '</div>'
    + '<div style="color:#898987">' + monthLabel + ' &nbsp;·&nbsp; Net Pay: <strong style="color:#678F2F">' + fmtAmt(e.net) + '</strong></div>'
    + '</div>'
    + '<div class="form-group" style="margin-bottom:16px"><label>Send to (email)</label>'
    + '<input type="email" id="ps-email" value="' + employeeEmail + '" placeholder="employee@company.com">'

    + '</div>'
    + '<div class="form-actions">'
    + '<button class="btn btn-ghost" id="ps-cancel">Cancel</button>'
    + '<button class="btn btn-ghost btn-sm" id="ps-preview" style="margin-left:auto">Preview</button>'
    + '<button class="btn btn-ghost btn-sm" id="ps-pdf">↓ Save PDF</button>'
    + '<button class="btn btn-primary btn-sm" id="ps-email-btn"' + (!hasEjs ? ' style="opacity:.5;pointer-events:none" title="Configure EmailJS in Settings"' : '') + '>Send Email</button>'
    + '</div>'
  , '480px');

  o.querySelector('#ps-cancel').onclick = () => o.remove();
  o.querySelector('#ps-preview').onclick = () => {
    const w = window.open('', '_blank');
    w.document.write(payslipHTML);
    w.document.close();
  };

  // Shared PDF generation helper — returns {blob, b64}
  async function generatePdfBase64() {
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;height:1123px;border:none;';
    document.body.appendChild(iframe);
    iframe.contentDocument.write(payslipHTML);
    iframe.contentDocument.close();
    await new Promise(r => setTimeout(r, 600));
    const canvas = await html2canvas(iframe.contentDocument.getElementById('payslip-content'), {
      scale: 2, useCORS: true, backgroundColor: '#fff', windowWidth: 794,
    });
    document.body.removeChild(iframe);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const imgData = canvas.toDataURL('image/png');
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const imgH  = (canvas.height * pageW) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 0, pageW, Math.min(imgH, pageH));
    return { blob: pdf.output('blob'), b64: pdf.output('datauristring').split(',')[1] };
  }

  // Save PDF locally + store record in DB
  o.querySelector('#ps-pdf').onclick = async () => {
    const btn = o.querySelector('#ps-pdf');
    btn.textContent = '↓ Generating…'; btn.disabled = true;
    try {
      const { blob, b64 } = await generatePdfBase64();
      const url = URL.createObjectURL(blob);

      a.href = url;

      const ws = co.legalName || co.name || DB.account?.workspaceName || entity?.name || 'mis.studio';
      const uen = co.uen || entity?.uen || '';
      const breakdown = [
        ...(s.type === 'employee' ? [`Basic Salary:       ${fmtAmt(e.gross)}`] : [`Service Fee:        ${fmtAmt(e.allocatedBase || e.gross)}`]),
        ...(e.bonus    ? [`Bonus:              ${fmtAmt(e.bonus)}`]              : []),
        ...(e.otPay    ? [`Overtime Pay${otHours?' ('+otHours.toFixed(1)+' hrs)':''}:${fmtAmt(e.otPay)}`] : []),
        ...(e.extraDed ? [`Deduction:          (${fmtAmt(e.extraDed)})`]         : []),
        ...(e.empDed   ? [`${tp ? tp.name : 'CPF/Tax'} (Emp): (${fmtAmt(e.empDed)})`] : []),
        ...(e.proRata  ? [`Pro-rata:           ${e.proRata.daysWorked}/${e.proRata.daysInMonth} days`] : []),
        `${'─'.repeat(36)}`,
        `Net Pay:            ${fmtAmt(e.net)}`,
      ].join('\n');
      const bankLine = bankSnap?.accountNumber
        ? `\nPayment to: ${bankSnap.accountName || legalName}  |  ${bankSnap.accountNumber}${bankSnap.swift ? '  |  SWIFT: ' + bankSnap.swift : ''}`
        : '';
      const message = `Hi ${legalName},\n\nPlease find your payslip details for ${monthLabel} below.\n\n` +
        `Employee:    ${legalName}\n` +
        (s.jobTitle ? `Designation: ${s.jobTitle}\n` : '') +
        (s.idNumber ? `ID / NRIC:   ${s.idNumber}\n` : '') +
        `Pay Period:  ${periodStart} – ${periodEnd}\n` +
        `Pay Date:    ${payDate}\n\n` +
        breakdown + bankLine +
        `\n\n${e.empCont ? `Employer contribution (for reference): ${fmtAmt(e.empCont)}\n` : ''}` +
        `\nIssued by ${ws}`;

      emailjs.init({ publicKey: ejsCfg.publicKey });
      await emailjs.send(ejsCfg.serviceId, ejsCfg.templateId, {
        to_email: toEmail,
        to_name:  legalName,
        subject:  `Payslip — ${monthLabel} — ${legalName}`,
        message,
      });
      o.remove();
      toast(`Payslip emailed to ${toEmail} ✓`);
    } catch(err) {
      btn.textContent = 'Send Email'; btn.disabled = false;
      toast('Email failed: ' + (err.text || err.message || 'Check EmailJS settings'), 'error');
    }
  };
}

function _savePayslipRecord(staffId, month, legalName, net, curr, monthLabel, pdfB64) {
  if (!DB.payrolls[month]) DB.payrolls[month] = { overrides: {}, paid: {}, bankSnapshots: {}, otApprovals: {} };
  if (!DB.payrolls[month].payslips) DB.payrolls[month].payslips = {};
  DB.payrolls[month].payslips[staffId] = {
    generatedAt: new Date().toISOString(),
    legalName, net, curr, monthLabel,
    pdf: pdfB64, // base64 PDF
  };
  saveDB();
}

function setupStickyEntityHeaders() {
  const content = document.querySelector('.content');
  if (!content) return;
  // Remove any previous listener
  if (content._stickyCleanup) content._stickyCleanup();

  const handle = () => {
    const ct = content.getBoundingClientRect().top;
    document.querySelectorAll('#pay-tables .entity-header').forEach(h => {
      const card = h.parentElement;
      if (!card) return;
      const cr = card.getBoundingClientRect();
      const hh = h.offsetHeight;
      if (cr.top < ct && cr.bottom > ct + hh) {
        // Card has scrolled past topbar — pin header at content top
        h.style.transform = `translateY(${ct - cr.top}px)`;
        h.style.boxShadow = '0 4px 12px rgba(0,0,0,.10)';
        h.style.zIndex = '5';
        h.style.borderRadius = 'var(--radius) var(--radius) 0 0';
      } else {
        h.style.transform = '';
        h.style.boxShadow = '';
        h.style.zIndex = '';
      }
    });
  };

  content.addEventListener('scroll', handle, { passive: true });
  content._stickyCleanup = () => content.removeEventListener('scroll', handle);
  handle(); // initial check
}

function showOtModal(staffId, month) {
  const s = DB.staff.find(x => x.id === staffId); if (!s) return;
  const {entries, approval} = getOtSummary(staffId, month);
  const curr = s.currency || 'USD';
  const base = getSalaryForMonth(s, month) || 0;
  const hourlyRate = base / 160;
  const calcOtAmt = Math.round(entries.reduce((sum, e) => sum + e.hours * (e.otMultiplier - 1) * hourlyRate, 0));
  const status = approval?.status || 'pending';
  const clientRef = approval?.clientRef || '';
  const otPayDisplay = approval?.otPay !== undefined ? approval.otPay : calcOtAmt;

  const statusColor = {approved:'#678F2F', rejected:'#C0392B', pending:'#7a5a10'}[status];
  const statusLabel = {approved:'Approved', rejected:'Rejected', pending:'Pending approval'}[status];

  const entryRows = entries.map(e => {
    const dayOfWeek = new Date(e.date + 'T00:00:00').toLocaleDateString('en-US', {weekday:'short'});
    const otExtra = Math.round(e.hours * (e.otMultiplier - 1) * hourlyRate);
    return `<tr style="border-bottom:1px solid #E2E2E2">

    }else{
      pv.textContent='Amount '+fmt(a,curr)+(b>0?' + Bonus '+fmt(b,curr):'')+(d>0?' − Ded '+fmt(d,curr):'')+(al>0?' + Allow '+fmt(al,curr):'')+' = Net '+fmt(a+b-d+al,curr);

function syncStaffFromTrackr(){
  const trackrTeam=getTrackrTeam();
  let changed=false;
  trackrTeam.forEach(m=>{
    const existing=DB.staff.find(s=>s.id===m.id||s.trackrId===m.id);
    if(!existing){
      const alloc = m.availableHours ? Math.round((m.availableHours/160)*100) : 100;
      DB.staff.push({id:m.id,trackrId:m.id,name:m.name,displayName:m.nickname||'',entityId:DB.entities[0]?.id||'',type:'employee',baseSalary:0,currency:DB.settings.defaultCurrency||'USD',taxProfileId:'none',role:'',active:true,startDate:'',bankAccount:{},salaryHistory:[],externalCompany:'',allocation:alloc});
      changed=true;
    }else{
      if(existing.name!==m.name){existing.name=m.name;changed=true;}
      // Sync nickname/displayName from TRACKR
      const dn = m.nickname || '';
      if(existing.displayName!==dn){existing.displayName=dn;changed=true;}
      if(!existing.active&&!existing.resignedDate){existing.active=true;changed=true;}
      // Sync allocation from TRACKR if not manually overridden
      if(!existing.allocationOverride && m.availableHours){
        const alloc=Math.round((m.availableHours/160)*100);
        if(existing.allocation!==alloc){existing.allocation=alloc;changed=true;}
      }
    }
  });
  // Deactivate anyone removed from TRACKR, but leave manually resigned staff alone
  const trackrIds=new Set(trackrTeam.map(m=>m.id));
  DB.staff.forEach(s=>{
    if(s.active&&!s.resignedDate&&!trackrIds.has(s.id)&&!trackrIds.has(s.trackrId)){s.active=false;changed=true;}
  });
  if(changed)saveDB();
}

  acts.innerHTML = '';
  const _fbar = document.createElement('div');

    <select id="ov-months" style="font-size:14px;padding:4px 8px;border:1px solid #E2E2E2;border-radius:4px;background:#fff;color:#2F2F2F;font-family:inherit">

    </select>` : ''}
    <select id="ov-type" style="font-size:14px;padding:4px 8px;border:1px solid #E2E2E2;border-radius:4px;background:#fff;color:#2F2F2F;font-family:inherit">
      <option value="">All staff</option>
