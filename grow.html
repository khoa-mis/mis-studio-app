function showNewClientModal(onSave, existing) {
  const isEdit = !!existing;
  const c = existing || {};
  // Work on a deep copy of contacts so edits only commit on save
  let contacts = JSON.parse(JSON.stringify(c.contacts || []));

  function contactsHTML() {
    return `
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px" id="nc-contacts-list">
        ${contacts.length === 0
          ? `<div style="font-size:14px;color:#ADADAB;padding:10px 0">No contacts yet.</div>`
          : contacts.map((ct, i) => `
            <div style="background:#FAFAF9;border:1px solid #E2E2E2;border-radius:5px;padding:11px 13px;position:relative" data-ci="${i}">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:8px">
                  ${ct.isLead
                    ? `<span class="badge badge-green" style="font-size:10px">Lead</span>`
                    : `<button class="btn btn-ghost btn-sm nc-set-lead" data-ci="${i}" style="font-size:10px;padding:2px 8px;color:#898987">Set as Lead</button>`}
                  <span style="font-size:13px;font-weight:700">${ct.name||'Unnamed'}</span>
                  ${ct.jobTitle ? `<span style="font-size:11px;color:#898987">${ct.jobTitle}</span>` : ''}
                </div>
                <button class="nc-del-contact btn btn-ghost btn-sm" data-ci="${i}" style="color:#C0392B;padding:3px 8px;font-size:13px">×</button>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 14px">
                <input class="nc-ct-name" data-ci="${i}" value="${ct.name||''}" placeholder="Full Name" class="input-sm">
                <input class="nc-ct-title" data-ci="${i}" value="${ct.jobTitle||''}" placeholder="Job Title" class="input-sm">
                <input class="nc-ct-email" data-ci="${i}" type="email" value="${ct.email||''}" placeholder="email@company.com" class="input-sm">
                <input class="nc-ct-phone" data-ci="${i}" value="${ct.phone||''}" placeholder="Phone" class="input-sm">
                <input class="nc-ct-linkedin" data-ci="${i}" value="${ct.linkedin||''}" placeholder="LinkedIn URL" style="font-size:14px;padding:6px 9px;border:1px solid #E2E2E2;border-radius:3px;font-family:inherit;grid-column:1/-1">
              </div>
            </div>`).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="nc-add-contact" style="margin-bottom:4px">+ Add Contact</button>
    `;
  }

  function syncContactsFromForm() {
    o.querySelectorAll('[data-ci]').forEach(inp => {
      const i = parseInt(inp.dataset.ci);
      if (!contacts[i]) return;
      if (inp.classList.contains('nc-ct-name'))     contacts[i].name     = inp.value.trim();
      if (inp.classList.contains('nc-ct-title'))    contacts[i].jobTitle = inp.value.trim();
      if (inp.classList.contains('nc-ct-email'))    contacts[i].email    = inp.value.trim();
      if (inp.classList.contains('nc-ct-phone'))    contacts[i].phone    = inp.value.trim();
      if (inp.classList.contains('nc-ct-linkedin')) contacts[i].linkedin = inp.value.trim();
    });
  }

  function rewireContacts() {
    syncContactsFromForm();
    o.querySelector('#nc-contacts-wrap').innerHTML = contactsHTML();
    bindContactEvents();
  }

  function bindContactEvents() {
    o.querySelector('#nc-add-contact')?.addEventListener('click', () => {
      syncContactsFromForm();
      const isFirst = contacts.length === 0;
      contacts.push({ id: genId('ct'), name:'', jobTitle:'', email:'', phone:'', linkedin:'', isLead: isFirst });
      rewireContacts();
    });
    o.querySelectorAll('.nc-del-contact').forEach(btn => {
      btn.addEventListener('click', () => {
        syncContactsFromForm();
        const i = parseInt(btn.dataset.ci);
        const wasLead = contacts[i]?.isLead;
        contacts.splice(i, 1);
        // Reassign lead to first if deleted lead
        if (wasLead && contacts.length > 0) contacts[0].isLead = true;
        rewireContacts();
      });
    });
    o.querySelectorAll('.nc-set-lead').forEach(btn => {
      btn.addEventListener('click', () => {
        syncContactsFromForm();
        const i = parseInt(btn.dataset.ci);
        contacts.forEach((ct, idx) => { ct.isLead = idx === i; });
        rewireContacts();
      });
    });
  }

  const o = showModal(isEdit ? `${c.name}` : 'New Client', `
    <div class="section-divider">Company</div>
    <div class="form-row">
      <div class="form-group"><label>Name</label><input id="nc-name" value="${c.name||''}" placeholder="e.g. Acme Corp" style="font-size:13px"></div>
      <div class="form-group">
        <label>Classification</label>
        <select id="nc-class">
          <option value="client" ${(c.classification||'client')==='client'?'selected':''}>Client</option>
          <option value="prospect" ${c.classification==='prospect'?'selected':''}>Prospect</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>General Email</label><input type="email" id="nc-email" value="${c.email||''}" placeholder="info@company.com"></div>
      <div class="form-group"><label>General Phone</label><input id="nc-phone" value="${c.phone||''}" placeholder="+1 555 0100"></div>
    </div>
    <div class="form-row">
      <div class="form-group full"><label>Notes</label><textarea id="nc-notes">${c.notes||''}</textarea></div>
    </div>
    <div class="section-divider">Contacts</div>
    <div id="nc-contacts-wrap">${contactsHTML()}</div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="nc-save">${isEdit ? 'Update' : 'Add Client'}</button>
    </div>
  `, '640px');

  bindContactEvents();

  o.querySelector('#nc-save').onclick = () => {
    syncContactsFromForm();
    const name = o.querySelector('#nc-name').value.trim();
    if (!name) { toast('Name required', 'error'); return; }
    const client = {
      ...(c || {}),
      id:             c.id || genId('cl'),
      name,
      classification: o.querySelector('#nc-class').value,
      email:          o.querySelector('#nc-email').value.trim(),
      phone:          o.querySelector('#nc-phone').value.trim(),
      notes:          o.querySelector('#nc-notes').value.trim(),
      contacts:       contacts.filter(ct => ct.name),
      currency:       c.currency || DB.settings.currency || 'USD',
      billingModel:   c.billingModel || 'standard',
      rateCard:       c.rateCard || {},
      logo:           c.logo || '',
      createdAt:      c.createdAt || new Date().toISOString().slice(0,10),
    };
    saveClientToTrackr(client);
    o.remove();
    if (onSave) onSave();
    toast(isEdit ? `${name} updated ✓` : `${name} added ✓`);
  };
}

      <div style="width:4px;height:32px;border-radius:2px;background:#4A7FC1;flex-shrink:0"></div>
      <input class="col-name-inp" data-cid="${id}" value="New Stage" style="flex:1;font-size:13px;padding:7px 10px">
      <input type="color" class="col-color-inp" data-cid="${id}" value="#4A7FC1" style="width:36px;height:36px;padding:3px;border:1px solid #E2E2E2;border-radius:3px;cursor:pointer">
      <button class="btn btn-ghost btn-sm col-del" data-cid="${id}" style="color:#C0392B;padding:6px 10px">×</button>
    `;
    list.appendChild(div);
    wireColSettings(el);
  });

  el.querySelector('#col-save').addEventListener('click', () => {
    const rows = el.querySelectorAll('#col-list > [data-cid]');
    const newCols = [];
    rows.forEach((row, i) => {
      const cid = row.dataset.cid;
      newCols.push({
        id:    cid,
        name:  row.querySelector('.col-name-inp').value.trim() || 'Stage',
        color: row.querySelector('.col-color-inp').value,
        order: i,
      });
    });
    // Keep fixed cols
    const fixed = DB.columns.filter(c => c.fixed).map((c,i) => ({ ...c, order: newCols.length + i }));
    DB.columns = [...newCols, ...fixed];
    saveDB(); renderView(); toast('Columns saved ✓');
  });

  wireColSettings(el);
}

function wireColSettings(el) {
  el.querySelectorAll('.col-del').forEach(btn => {
    btn.addEventListener('click', () => {
      // Use parentElement — btn.closest('[data-cid]') would match the button itself
      // since the button also carries data-cid
      btn.parentElement.remove();
    });
  });
  el.querySelectorAll('.col-color-inp').forEach(inp => {
    inp.addEventListener('input', () => {
      const swatch = inp.closest('[data-cid]').querySelector('div[style*="background"]');
      if (swatch) swatch.style.background = inp.value;
    });
  });
}

// ── Boot ──────────────────────────────────────────────
loadDB();
// Sync team members from TRACKR's mis-v1 on every boot
function getTrackrTeam() {
  try {
    const r = localStorage.getItem('mis-v1');
    if (!r) return [];
    return (JSON.parse(r).teamMembers || []).filter(m => !m.archived);
  } catch { return []; }
}

// Render sidebar user footer — resolves real name from TRACKR session first
function renderCSMUser() {
  // Append directly to .sidebar — mirrors TRACKR pattern exactly
  const existing = document.getElementById('csm-user-pill');
  if (existing) existing.remove();
  let username = 'User', role = '';
  try {
    // Always try TRACKR session first — it has the real display name
    const trackrDB  = JSON.parse(localStorage.getItem('mis-v1') || '{}');
    const trackrSes = JSON.parse(sessionStorage.getItem('mis-session-v1') || localStorage.getItem('mis-session-v1') || 'null');
    if (trackrSes?.memberId) {
      const member = (trackrDB.teamMembers || []).find(m => m.id === trackrSes.memberId);
      if (member?.name) {
        username = member.nickname || member.name;
        role     = { admin: 'Admin', team_manager: 'Manager', member: 'Member' }[member.role] || member.role || '';
      }
    }
    // Fall back to PAY session username only if no TRACKR member found
    if (username === 'User') {
      const paySess = JSON.parse(sessionStorage.getItem('mis-pay-session') || 'null');
      if (paySess && paySess.expires > Date.now() && paySess.username !== 'admin') {
        username = paySess.username;
        role = paySess.role === 'admin' ? 'Admin' : 'User';
      }
    }
  } catch {}
  const initials = username.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || 'CS';
  const area = document.createElement('div');
  area.className = 'sidebar-user';
  area.id = 'csm-user-pill';
  area.title = 'Sign out';
  area.innerHTML = `
    <div class="avatar-sm" style="flex-shrink:0">${initials}</div>
    <div class="sidebar-user-info" style="flex:1;min-width:0">
      <div class="sidebar-user-name">${username}</div>
      ${role ? `<div class="sidebar-user-role">${role}</div>` : ''}
    </div>
    <button title="Log out" style="flex-shrink:0;background:none;border:none;cursor:pointer;padding:4px;border-radius:4px;color:rgba(255,255,255,0.35);transition:color .12s;display:flex;align-items:center" onmouseover="this.style.color='rgba(255,255,255,0.8)'" onmouseout="this.style.color='rgba(255,255,255,0.35)'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>`;
  document.querySelector('.sidebar').appendChild(area);
  area.addEventListener('click', () => {
    sessionStorage.removeItem('mis-pay-session');
    sessionStorage.removeItem('mis-session-v1');
    localStorage.removeItem('mis-session-v1');
    window.location.href = 'trackr.html';
  });
}

// Migration: seed Closed Won column with any TRACKR clients that don't have a CSM deal yet
// First: purge old client-seeded Won deals (no csmProjectId, no reverse project link)
(function purgeClientSeededWonDeals() {
  const wonCol = DB.columns.find(c => c.won);
  if (!wonCol) return;
  const projects = getTrackrProjects();
  const projectDealIds = new Set(projects.map(p => p.csmDealId).filter(Boolean));
  const before = DB.deals.length;
  DB.deals = DB.deals.filter(d => {
    if (d.stage !== wonCol.id) return true;          // not in Won — keep
    if (d.csmProjectId) return true;                 // has forward project link — keep
    if (projectDealIds.has(d.id)) return true;       // has reverse project link — keep
    return false;                                     // client-seeded legacy deal — remove
  });
  if (DB.deals.length !== before) saveDB();
})();
// Remove any duplicate Won deals sharing the same csmProjectId (race condition cleanup)
(function deduplicateWonDeals() {
  const wonCol = DB.columns.find(c => c.won);
  if (!wonCol) return;
  const seenProjId  = new Set();
  const seenNameKey = new Set();
  const before = DB.deals.length;
  DB.deals = DB.deals.filter(d => {
    if (d.stage !== wonCol.id) return true; // not in Won — keep
    // Deduplicate by csmProjectId (primary key)
    if (d.csmProjectId) {
      if (seenProjId.has(d.csmProjectId)) return false;
      seenProjId.add(d.csmProjectId);
    }
    // Deduplicate by projectName+clientId fallback (for legacy deals without csmProjectId)
    const nameKey = (d.projectName||d.name||'') + '|' + (d.clientId||'');
    if (nameKey !== '|') {
      if (seenNameKey.has(nameKey)) return false;
      seenNameKey.add(nameKey);
    }
    return true;
  });
  if (DB.deals.length !== before) saveDB();
})();

document.querySelectorAll('.nav-item').forEach(n => {
  n.addEventListener('click', () => navigate(n.dataset.view));
});

// Cross-tab sync: when TRACKR writes to mis-v1, re-render views that use client/project data
window.addEventListener('storage', e => {
  if (e.key !== 'mis-v1') return;
  const projects = getTrackrProjects();
  let changed = false;

  // Seed new projects and sync name/value changes on existing ones
  const wonCol = DB.columns.find(c => c.won);
  if (wonCol) {
    projects.forEach(proj => {
      // Find existing deal linked to this project
      const existingDeal = DB.deals.find(d =>
        d.csmProjectId === proj.id || proj.csmDealId === d.id
      );

      if (existingDeal) {
        // Sync fields that may have been updated in TRACKR
        let dealChanged = false;
        if (proj.name && existingDeal.projectName !== proj.name) {
          existingDeal.projectName = proj.name;
          existingDeal.name        = proj.name;
          dealChanged = true;
        }
        if (proj.clientId && existingDeal.clientId !== proj.clientId) {
          existingDeal.clientId = proj.clientId;
          dealChanged = true;
        }
        if (existingDeal.csmProjectId !== proj.id) {
          existingDeal.csmProjectId = proj.id;
          dealChanged = true;
        }
        if (dealChanged) changed = true;
      } else {
        // New project — seed a Won deal for it
        DB.deals.push({
          id:           genId('deal'),
          csmProjectId: proj.id,
          clientId:     proj.clientId || null,
          projectName:  proj.name,
          name:         proj.name,
          value:        proj.fixedFee || proj.retainer?.monthlyFee || 0,
          currency:     proj.currency || DB.settings.currency || 'USD',
          stage:        wonCol.id,
          teamLead:     proj.leadId || null,
          techLead:     null,
          notes:        '',
          createdAt:    proj.startDate || new Date().toISOString().slice(0,10),
          wonAt:        proj.startDate || new Date().toISOString().slice(0,10),
        });
        changed = true;
      }
    });
  }

  if (changed) saveDB();
  if (['clients', 'pipeline', 'health'].includes(currentView)) renderView();
});

// Boot: pull from Supabase if configured, then render
(async () => {
  const pulled = await growSupaPull();
  // Always seed/cleanup after boot — whether we pulled from Supabase or not.
  // Running seed only inside `if (pulled)` caused duplicates: sync boot seeds first,
  // then pull overwrites DB.deals with older cloud data, then purgeAndSeed seeds again.
  {
    (function purgeAndSeed() {
      const wonCol = DB.columns?.find(c => c.won);
      if (!wonCol) return;
      const projects = getTrackrProjects();
      const projectDealIds = new Set(projects.map(p => p.csmDealId).filter(Boolean));
      const before = DB.deals.length;
      // Remove legacy client-seeded Won deals with no project link
      DB.deals = DB.deals.filter(d => {
        if (d.stage !== wonCol.id) return true;
        if (d.csmProjectId) return true;
        if (projectDealIds.has(d.id)) return true;
        return false;
      });
      let changed = DB.deals.length !== before;
      projects.forEach(proj => {
        const existingDeal = DB.deals.find(d => d.csmProjectId === proj.id || proj.csmDealId === d.id);
        if (existingDeal) {
          // Sync name/client from TRACKR in case they were updated there
          if (proj.name && existingDeal.projectName !== proj.name) {
            existingDeal.projectName = proj.name;
            existingDeal.name        = proj.name;
            changed = true;
          }
          if (proj.clientId && existingDeal.clientId !== proj.clientId) {
            existingDeal.clientId = proj.clientId;
            changed = true;
          }
          if (existingDeal.csmProjectId !== proj.id) {
            existingDeal.csmProjectId = proj.id;
            changed = true;
          }
        } else {
          // New project — seed a Won deal
          DB.deals.push({ id:genId('deal'), csmProjectId:proj.id, clientId:proj.clientId||null, projectName:proj.name, name:proj.name, value:proj.fixedFee||proj.retainer?.monthlyFee||0, currency:proj.currency||DB.settings.currency||'USD', stage:wonCol.id, teamLead:proj.leadId||null, techLead:null, notes:'', createdAt:proj.startDate||new Date().toISOString().slice(0,10), wonAt:proj.startDate||new Date().toISOString().slice(0,10) });
          changed = true;
        }
      });
      if (changed) saveDB();
    })();
  } // end seed block
  renderCSMUser();

  (function checkGrowAccess() {
    try {
      const trackrSess = JSON.parse(sessionStorage.getItem('mis-session-v1') || localStorage.getItem('mis-session-v1') || 'null');
      if (trackrSess?.memberId || trackrSess?.loggedIn) {
        // TRACKR user — check role permission
        const trackrDB = JSON.parse(localStorage.getItem('mis-v1') || '{}');
        const member = (trackrDB.teamMembers || []).find(m => m.id === trackrSess.memberId);
        if (member) {
          const role = member.role || 'member';
          const perms = (trackrDB.rolePermissions || {})[role] || [];
          if (role !== 'admin' && !perms.includes('access_grow')) {
            showGrowBlocked();
            return;
          }
        }
        return; // admin or has permission
      }
      // PAY-only user — check growAccess flag
      const paySess = JSON.parse(sessionStorage.getItem('mis-pay-session') || 'null');
      if (!paySess || paySess.expires <= Date.now()) return;
      if (paySess.role === 'admin') return;
      const payDB = JSON.parse(localStorage.getItem('payroll-v1') || '{}');
      const payUser = (payDB.settings?.payUsers || []).find(u => u.username === paySess.username);
      if (!payUser || !payUser.growAccess) { showGrowBlocked(); return; }
    } catch(_) {}

    function showGrowBlocked() {
      document.getElementById('main-content').innerHTML = '';
      document.querySelector('.main').innerHTML =
        '<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#F2F1EE">'
        + '<div style="text-align:center;padding:40px">'
        + '<div style="font-size:48px;margin-bottom:16px">🔒</div>'
        + '<div style="font-size:22px;font-weight:700;color:#2F2F2F;margin-bottom:8px">Access Restricted</div>'
        + '<div style="font-size:14px;color:#898987;max-width:320px;line-height:1.6;margin-bottom:24px">Your account doesn\'t have permission to access Grow. Contact your administrator.</div>'
        + '<a href="trackr.html" style="display:inline-block;padding:10px 20px;background:#678F2F;color:#fff;border-radius:6px;text-decoration:none;font-size:14px;font-weight:600">← Back to Sign In</a>'
        + '</div></div>';
    }
  })();

  renderView();
  setTimeout(initGrowRealtime, 1000);
})();
</script>
