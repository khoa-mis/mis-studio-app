<style>
/* ── Pipeline ─────────────────────────────── */
.pipeline-wrap{flex:1;overflow-x:auto;overflow-y:hidden;padding:24px;display:flex;gap:14px;align-items:stretch}

.pipeline-col{width:240px;flex-shrink:0;display:flex;flex-direction:column;background:#F8F8F6;border:1px solid var(--border);border-radius:8px;overflow:hidden}

.pipeline-col.drag-over{background:#EAF0E2;border-color:var(--accent)}

.pipeline-col.col-won{background:#EAF5E2}

.pipeline-col.col-lost{background:#FBF0EF}

.col-header{padding:12px 14px 10px;background:rgba(255,255,255,.7);border-bottom:1px solid var(--border);flex-shrink:0}

.col-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}

.col-name{font-size:14px;font-weight:800;letter-spacing:.3px;text-transform:uppercase}

.col-count{font-size:11px;font-weight:700;background:var(--border);color:var(--text-2);padding:2px 7px;border-radius:100px}

.col-total{font-size:14px;font-weight:700;color:var(--accent)}

.col-cards{flex:1;overflow-y:auto;padding:8px}

.deal-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:11px 12px;margin-bottom:7px;cursor:grab;transition:all .12s;position:relative}

.deal-card:hover{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,.06)}

.deal-card.dragging{opacity:.4;cursor:grabbing}

.deal-card.drag-placeholder{background:#EAF0E2;border:2px dashed var(--accent);height:60px;border-radius:6px}

.deal-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}

.deal-company{font-size:14px;color:var(--text-2);margin-bottom:7px}

.deal-value{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:6px}

.deal-leads{display:flex;gap:5px;flex-wrap:wrap}

.deal-lead-pip{font-size:10px;font-weight:700;background:var(--bg);border:1px solid var(--border);border-radius:100px;padding:2px 7px;color:var(--text-2)}
.deal-proj-btn{display:flex;align-items:center;gap:4px;margin-top:7px;font-size:10px;font-weight:700;color:var(--accent);background:rgba(103,143,47,0.07);border:1px solid rgba(103,143,47,0.25);border-radius:100px;padding:2px 8px;cursor:pointer;transition:background .12s;width:fit-content}
.deal-proj-btn:hover{background:rgba(103,143,47,0.15)}

.col-add-btn{width:100%;padding:9px;text-align:center;font-size:14px;font-weight:600;color:var(--text-3);background:none;border:none;cursor:pointer;transition:color .12s}

.col-add-btn:hover{color:var(--accent)}

/* Won column accent */
.col-won .col-name{color:var(--accent)}

.col-won .deal-card{border-left:3px solid var(--accent)}

/* Lost column accent */
.col-lost .col-name{color:var(--danger)}

.col-lost .deal-card{border-left:3px solid var(--danger);opacity:.65}

/* ── Client Health ─────────────────────────── */
.health-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:24px;overflow-y:auto;flex:1}

.health-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:box-shadow .12s}

.health-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}

.health-card-header{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--bg)}

.health-month-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}

.rag-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.rag-green{background:var(--accent)}

.rag-amber{background:#E07030}

.rag-red{background:var(--danger)}

.rag-gray{background:#D0D0CE}

/* Health detail modal */
.month-strip{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}

.month-pill{padding:6px 12px;border-radius:100px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;white-space:nowrap;transition:all .1s}

.health-score-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}

.score-dots{display:flex;gap:5px}

.score-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all .1s}

.score-dot.s1.sel{background:var(--danger);border-color:var(--danger)}

.score-dot.s2.sel{background:#E07030;border-color:#E07030}

.score-dot.s3.sel{background:#E8B84B;border-color:#E8B84B}

.score-dot.s4.sel{background:#9BC25A;border-color:#9BC25A}

.score-dot.s5.sel{background:var(--accent);border-color:var(--accent)}

.score-dot:hover{transform:scale(1.2)}

/* Settings */

.th-std{padding:11px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)}
.th-first{padding:11px 18px;text-align:left;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px 20px;min-width:120px}

/* Extracted from repeated inline styles */
.input-sm{font-size:14px;padding:6px 9px;border:1px solid var(--border);border-radius:3px;font-family:inherit}</style>
</head>

<script>
// ══════════════════════════════════════════════════════
//  CSM — mis.studio
//  Grow Management
//  Data key: csm-v1
// ══════════════════════════════════════════════════════
const KEY           = 'csm-v1';
const GROW_ROW_ID   = 'grow-default';    // row in mis_workspaces
const GROW_SAVED_AT = 'grow-local-saved-at';

// Reuse the shared mis-supa-config (same Supabase instance as TRACKR/PAY)
const _GROW_SUPA_FALLBACK = {
  url: '__SUPABASE_URL__',
  anonKey: '__SUPABASE_ANON_KEY__'
};

function growSupaCfg() {
  try {
    const r = JSON.parse(localStorage.getItem('mis-supa-config') || 'null');
    if (r && r.url && r.anonKey) return r;
  } catch(_) {}
  // Env fallback — only use if both url and key are provided
  if (_GROW_SUPA_FALLBACK.url && _GROW_SUPA_FALLBACK.anonKey) {
    localStorage.setItem('mis-supa-config', JSON.stringify(_GROW_SUPA_FALLBACK));
    return _GROW_SUPA_FALLBACK;
  }
  return null;
}

// Format a team member's display name for deal card pills:
// nickname first → first name + first initial of last name → first name only
function memberShortName(m) {
  if (!m) return '';
  if (m.nickname) return m.nickname;
  const parts = (m.name || '').trim().split(/\s+/);
  if (parts.length >= 2) return parts[0] + ' ' + parts[parts.length - 1][0] + '.';
  return parts[0] || '';
}

// Read currencies list from TRACKR (single source of truth), fallback to defaults
function getCurrencies() {
  try {
    const t = JSON.parse(localStorage.getItem('mis-v1') || 'null');
    if (t?.settings?.currencies?.length) return t.settings.currencies;
  } catch(_) {}
  return ['USD','EUR','GBP','SGD','CHF','AUD'];
}

async function growSupaFetch(path, opts = {}) {
  const cfg = growSupaCfg();
  if (!cfg) return null;
  const url = cfg.url.replace(/\/$/, '') + '/rest/v1' + path;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'apikey':        cfg.anonKey,
      'Authorization': 'Bearer ' + cfg.anonKey,
      'Content-Type':  'application/json',
      'Prefer':        opts.prefer || '',
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) { const t = await res.text(); throw new Error('Supabase ' + res.status + ': ' + t); }
  return res.status === 204 ? null : res.json();
}

let _growSupabaseReady = false;
let _growLastRemoteTs  = null;
let _growLastPushAt    = 0;
let _growSyncTimer     = null;
let _growPollTimer     = null;

async function growSupaPull() {
  const cfg = growSupaCfg();
  if (!cfg) { _growSupabaseReady = true; return false; }
  try {
    const rows = await growSupaFetch('/mis_workspaces?id=eq.' + encodeURIComponent(GROW_ROW_ID) + '&select=data,updated_at');
    if (!rows || !rows.length || !rows[0].data) {
      _growSupabaseReady = true;
      return false;
    }
    const remoteTs = new Date(rows[0].updated_at).getTime();
    const localTs  = new Date(localStorage.getItem(GROW_SAVED_AT) || 0).getTime();
    if (localTs > remoteTs) {
      _growSupabaseReady = true;
      scheduleGrowPush();
      return false;
    }
    DB = { ...DB, ...rows[0].data };
    // Strip any legacy deals payload — under the unified schema, DB.deals is
    // derived from mis-v1.projects, never persisted in csm-v1.
    delete DB.deals;
    syncDealsFromProjects();
    localStorage.setItem(KEY, JSON.stringify({ ...DB, deals: undefined }));
    localStorage.setItem(GROW_SAVED_AT, rows[0].updated_at); // keep local ts in sync with remote
    _growLastRemoteTs = rows[0].updated_at;
    _growSupabaseReady = true;
    return true;
  } catch(_) {
    setTimeout(() => { _growSupabaseReady = true; }, 5000);
    return false;
  }
}

async function growSupaPush() {
  const cfg = growSupaCfg();
  if (!cfg) return;
  if (!_growSupabaseReady) { scheduleGrowPush(); return; }
  if (!DB.columns) return;
  _growLastPushAt = Date.now();
  const pushedAt  = new Date().toISOString();
  // Strip the derived deals array from the pushed payload — it lives in
  // mis-v1.projects, not csm-v1.
  const payload = { ...DB };
  delete payload.deals;
  try {
    await growSupaFetch('/mis_workspaces', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=minimal',
      body: JSON.stringify({ id: GROW_ROW_ID, data: payload, updated_at: pushedAt }),
    });
    _growLastRemoteTs = pushedAt;
    const currentSaved = localStorage.getItem(GROW_SAVED_AT) || '0';
    if (pushedAt >= currentSaved) localStorage.setItem(GROW_SAVED_AT, pushedAt);
  } catch(_) {}
}

function scheduleGrowPush() {
  clearTimeout(_growSyncTimer);
  _growSyncTimer = setTimeout(() => growSupaPush(), 800);
}

async function _growPollChanges() {
  if (Date.now() - _growLastPushAt < 5000) return;
  try {
    const rows = await growSupaFetch('/mis_workspaces?id=eq.' + encodeURIComponent(GROW_ROW_ID) + '&select=updated_at');
    const ts = rows?.[0]?.updated_at || null;
    if (!ts || ts === _growLastRemoteTs) return;
    if (Date.now() - _growLastPushAt < 5000) { _growLastRemoteTs = ts; return; }
    // Remote is newer — pull
    const pulled = await growSupaPull();
    if (pulled) renderView();
  } catch(_) {}
}

function initGrowRealtime() {
  if (!growSupaCfg()) return;
  if (_growPollTimer) clearInterval(_growPollTimer);
  growSupaFetch('/mis_workspaces?id=eq.' + encodeURIComponent(GROW_ROW_ID) + '&select=updated_at')
    .then(rows => { _growLastRemoteTs = rows?.[0]?.updated_at || null; })
    .catch(() => {});
  _growPollTimer = setInterval(_growPollChanges, 8000);
}
let DB = {}, currentView = 'pipeline';
// When set, renderClientsList shows the org-chart canvas for that client
// instead of the regular table. Cleared when the user clicks "← Back to Clients".
let _orgChartClientId = null;

// One-time migration that runs from Grow if the user opens this app before
// opening TRACKR after a unified-schema upgrade. Mirrors the migration block
// in trackr.html — translates csm-v1.deals into mis-v1.projects records and
// gates with DB.settings.unifiedSchemaMigratedAt so it only runs once.
//
// NOTE: Mirrors the migration in trackr.html's loadDB(). The flag is set in
// mis-v1 so both apps see it and only one runs. If you change this, mirror
// it in trackr.html.
function maybeRunUnifiedSchemaMigrationFromGrow() {
  let mis;
  try { mis = JSON.parse(localStorage.getItem('mis-v1') || 'null') || {}; }
  catch { return; }
  if (!mis.settings) mis.settings = {};
  if (mis.settings.unifiedSchemaMigratedAt) return;

  let csm = null;
  try { csm = JSON.parse(localStorage.getItem('csm-v1') || 'null'); } catch(_) {}
  if (!csm || !Array.isArray(csm.deals) || csm.deals.length === 0) {
    // Nothing to migrate — still stamp the flag so we don't probe every load
    mis.settings.unifiedSchemaMigratedAt = new Date().toISOString();
    localStorage.setItem('mis-v1', JSON.stringify(mis));
    return;
  }

  if (!Array.isArray(mis.projects)) mis.projects = [];
  const cols = csm.columns || [];
  const colTypeById = {};
  cols.forEach(col => {
    if (col.won)       colTypeById[col.id] = 'won';
    else if (col.lost) colTypeById[col.id] = 'lost';
    else               colTypeById[col.id] = 'pipeline';
  });
  const projById = new Map(mis.projects.map(p => [p.id, p]));
  const dealToProjectId = {};
  const today = new Date().toISOString().slice(0, 10);

  csm.deals.forEach(d => {
    const stageType = colTypeById[d.stage] || 'pipeline';
    if (d.csmProjectId && projById.has(d.csmProjectId)) {
      const proj = projById.get(d.csmProjectId);
      proj.csmDealId            = d.id;
      proj.pipelineStageId      = d.stage || null;
      proj.pipelineStageName    = (cols.find(c => c.id === d.stage)?.name) || null;
      if (proj.pipelineProbability == null) proj.pipelineProbability  = 0;
      if (proj.pipelineValue       == null) proj.pipelineValue        = d.value || 0;
      if (proj.introducerId === undefined) proj.introducerId = d.introducerId || null;
      if (!proj.introduction)              proj.introduction = d.introduction || { commission: 0 };
      if (proj.preSalesLead === undefined) proj.preSalesLead = d.preSalesLead || null;
      if (proj.techLead     === undefined) proj.techLead     = d.techLead     || null;
      if (proj.pipelineNotes === undefined) proj.pipelineNotes = d.notes || '';
      if (!proj.wonAt && d.wonAt) proj.wonAt = d.wonAt;
      if (proj.status === undefined) proj.status = stageType === 'lost' ? 'lost' : 'active';
      dealToProjectId[d.id] = proj.id;
      return;
    }
    const newProj = {
      id:                  d.csmProjectId || ('pr-' + d.id),
      csmDealId:           d.id,
      name:                d.projectName || d.name || '(unnamed)',
      clientId:            d.clientId || null,
      currency:            d.currency || mis.settings?.defaultCurrency || 'USD',
      leadId:              d.teamLead || '',
      members:             [],
      files:               [],
      billingType:         d.billingType || 'time_materials',
      fixedFee:            0,
      retainer:            { hoursIncluded:0, monthlyFee:0, overageEnabled:false, overageRate:0, billingDay:1 },
      variableRetainer:    { yearlyBudget:0, hourlyRate:0, approvals:{} },
      changeOrders:        [],
      expenses:            [],
      startDate:           d.startDate || '',
      closedDate:          d.endDate || '',
      status:              stageType === 'lost' ? 'lost' : (stageType === 'won' ? 'active' : 'pipeline'),
      atRisk:              false,
      pipelineStageId:     d.stage || null,
      pipelineStageName:   (cols.find(c => c.id === d.stage)?.name) || null,
      pipelineProbability: 0,
      pipelineValue:       d.value || 0,
      introducerId:        d.introducerId || null,
      introduction:        d.introduction || { commission: 0 },
      preSalesLead:        d.preSalesLead || null,
      techLead:             d.techLead || null,
      pipelineNotes:        d.notes || '',
      wonAt:                d.wonAt || null,
      createdAt:            d.createdAt || today,
    };
    mis.projects.push(newProj);
    dealToProjectId[d.id] = newProj.id;
  });

  // Rewrite synthetic pipeline-{dealId} time entry projectIds
  if (Array.isArray(mis.timeEntries)) {
    mis.timeEntries.forEach(e => {
      if (typeof e.projectId !== 'string' || !e.projectId.startsWith('pipeline-')) return;
      const dealId = e.projectId.slice('pipeline-'.length);
      const newId = dealToProjectId[dealId];
      if (newId) { e.projectId = newId; e.nonBillable = true; }
    });
  }

  mis.settings.unifiedSchemaMigratedAt = new Date().toISOString();
  try {
    localStorage.setItem('mis-v1', JSON.stringify(mis));
    window.dispatchEvent(new StorageEvent('storage', { key: 'mis-v1', newValue: JSON.stringify(mis) }));
  } catch(_) {}
}

// ── Persistence ───────────────────────────────────────
function loadDB() {
  try { DB = JSON.parse(localStorage.getItem(KEY) || 'null') || {}; } catch { DB = {}; }
  if (!DB.columns)  DB.columns  = defaultColumns();
  // DB.deals is no longer persisted in csm-v1 — it's derived from mis-v1.projects
  // on every load (see dealsFromProjects below). Pipeline projects, lost projects,
  // and Won projects (with a known stage) all surface as "deals" in this app.
  // We keep an empty array around so existing code that does DB.deals.push/etc
  // still works; mutations are intercepted via dealCommit/dealRemove.
  DB.deals = [];
  if (!DB.health)   DB.health   = {};
  // Migration: remove the accidental Pre-Sales Lead pipeline column if present
  if (DB.columns.find(c => c.id === 'presales')) {
    DB.columns = DB.columns.filter(c => c.id !== 'presales');
    DB.columns.filter(c => !c.fixed).sort((a,b)=>a.order-b.order).forEach((c,i)=>c.order=i);
    saveDB();
  }
  if (!DB.settings) {
    let defaultCurr = 'USD';
    try {
      const t = JSON.parse(localStorage.getItem('mis-v1') || 'null');
      if (t?.settings?.defaultCurrency) defaultCurr = t.settings.defaultCurrency;
    } catch(_) {}
    DB.settings = { currency: defaultCurr };
  }
  if (!DB.introducers)  DB.introducers  = [];
  // Drop any legacy csm-v1.deals payload — the unified schema (gated by
  // mis-v1.settings.unifiedSchemaMigratedAt) has already copied them into
  // mis-v1.projects, or will when the migration below runs.
  if (Array.isArray(DB._legacyDeals)) delete DB._legacyDeals;
  // Run the unified migration if it hasn't been done yet (e.g. user opens
  // Grow before TRACKR after the upgrade). Idempotent — gated by the flag.
  maybeRunUnifiedSchemaMigrationFromGrow();
  // Hydrate DB.deals from mis-v1.projects
  syncDealsFromProjects();
}

// Derive the in-memory DB.deals array from mis-v1.projects. Pipeline projects,
// lost projects, and active projects with a pipelineStageId all appear as deals
// (the pipeline board needs Won projects to render the Closed Won column).
function syncDealsFromProjects() {
  try {
    const mis = JSON.parse(localStorage.getItem('mis-v1') || 'null');
    const projects = mis?.projects || [];
    const wonStage = (DB.columns || []).find(c => c.won);
    const lostStage = (DB.columns || []).find(c => c.lost);
    DB.deals = projects
      .filter(p => p.status === 'pipeline'
                || p.status === 'lost'
                || (p.status === 'active' && p.pipelineStageId)
                || p.csmDealId)
      .map(p => projectToDeal(p, wonStage, lostStage));
  } catch(_) { DB.deals = []; }
}

// Translate a TRACKR project into the legacy "deal" shape Grow's UI expects.
// We keep csmProjectId pointing at the project itself so existing code that
// uses it for linkage keeps working.
function projectToDeal(p, wonStage, lostStage) {
  // Resolve which Grow column this project belongs to. Pipeline records
  // already have pipelineStageId set; active records (Won) default to the
  // workspace's Won column; lost records to the Lost column. If the legacy
  // record is missing pipelineStageId for some reason we fall back to the
  // status-implied column so it still appears somewhere sensible.
  let stage = p.pipelineStageId;
  if (!stage) {
    if (p.status === 'active' && wonStage)  stage = wonStage.id;
    else if (p.status === 'lost' && lostStage) stage = lostStage.id;
  }
  return {
    id:           p.id, // unified: deal.id === project.id
    csmProjectId: p.id,
    csmDealId:    p.csmDealId || null,
    clientId:     p.clientId || null,
    projectName:  p.name || '',
    name:         p.name || '',
    value:        p.pipelineValue || 0,
    currency:     p.currency || DB.settings?.currency || 'USD',
    billingType:  p.billingType || 'fixed',
    stage,
    preSalesLead: p.preSalesLead || null,
    teamLead:     p.leadId || null,
    techLead:     p.techLead || null,
    notes:        p.pipelineNotes || '',
    introducerId: p.introducerId || null,
    introduction: p.introduction || { commission: 0 },
    startDate:    p.startDate || null,
    endDate:      p.closedDate || null,
    createdAt:    p.createdAt || null,
    wonAt:        p.wonAt || null,
    _projectStatus: p.status || 'active',
  };
}

// Translate a deal-shaped object to a project record. Used when writing.
// Merges over the existing project so we don't drop fields Grow doesn't touch.
function dealToProjectShape(deal, existing, opts) {
  opts = opts || {};
  const wonStage  = (DB.columns || []).find(c => c.won);
  const lostStage = (DB.columns || []).find(c => c.lost);
  const stageType =
    deal.stage === wonStage?.id  ? 'won'  :
    deal.stage === lostStage?.id ? 'lost' : 'pipeline';
  const status =
    stageType === 'won'  ? 'active' :
    stageType === 'lost' ? 'lost'   : 'pipeline';
  const today = new Date().toISOString().slice(0,10);
  const base = existing || {
    id:               deal.id,
    name:             '',
    clientId:         null,
    currency:         DB.settings?.currency || 'USD',
    leadId:           '',
    members:          [],
    files:            [],
    billingType:      'time_materials',
    fixedFee:         0,
    retainer:         { hoursIncluded:0, monthlyFee:0, overageEnabled:false, overageRate:0, billingDay:1 },
    variableRetainer: { yearlyBudget:0, hourlyRate:0, approvals:{} },
    changeOrders:     [],
    expenses:         [],
    startDate:        '',
    closedDate:       '',
    status:           'active',
    atRisk:           false,
  };
  const merged = {
    ...base,
    id:                  deal.id,
    name:                deal.projectName || deal.name || base.name || '',
    clientId:            deal.clientId || base.clientId || null,
    currency:            deal.currency || base.currency,
    billingType:         deal.billingType || base.billingType || 'fixed',
    leadId:              deal.teamLead || base.leadId || '',
    startDate:           deal.startDate || base.startDate || '',
    closedDate:          deal.endDate   || base.closedDate || '',
    status,
    pipelineStageId:     deal.stage,
    pipelineStageName:   (DB.columns.find(c => c.id === deal.stage)?.name) || deal.stage || null,
    pipelineProbability: base.pipelineProbability || 0,
    pipelineValue:       parseFloat(deal.value) || 0,
    introducerId:        deal.introducerId || null,
    introduction:        deal.introduction || { commission: 0 },
    preSalesLead:        deal.preSalesLead || null,
    techLead:            deal.techLead || null,
    pipelineNotes:       deal.notes || '',
    csmDealId:           deal.csmDealId || base.csmDealId || null,
    createdAt:           base.createdAt || deal.createdAt || today,
    // wonAt rules:
    //   - Won transition: stamp today (preserve any existing wonAt if already set)
    //   - Moved out of Won: deal.wonAt is explicitly null → clear the record
    //   - Otherwise: preserve whatever was on base
    wonAt:               stageType === 'won'
                            ? (base.wonAt || today)
                            : (deal.wonAt === null ? null : (base.wonAt || null)),
  };
  // Contract terms — only write through if the deal payload carried them
  // (the deal modal does; drag/drop and other internal callers don't, so
  // those preserve whatever was on the existing project record).
  if (deal.contractFixedFee !== undefined) {
    merged.fixedFee = deal.contractFixedFee;
  }
  if (deal.contractRetainer) {
    merged.retainer = {
      ...(base.retainer || { overageEnabled:false, overageRate:0 }),
      monthlyFee:    deal.contractRetainer.monthlyFee || 0,
      hoursIncluded: deal.contractRetainer.hoursIncluded || 0,
      billingDay:    deal.contractRetainer.billingDay || 1,
    };
  }
  if (deal.contractVariableRetainer) {
    merged.variableRetainer = {
      ...(base.variableRetainer || { approvals: {} }),
      yearlyBudget: deal.contractVariableRetainer.yearlyBudget || 0,
      hourlyRate:   deal.contractVariableRetainer.hourlyRate || 0,
    };
  }
  return merged;
}

// Write a deal back to mis-v1.projects (creating or updating). Also refreshes
// DB.deals so the UI is in sync immediately.
function dealCommit(deal) {
  try {
    const raw = localStorage.getItem('mis-v1');
    const mis = raw ? JSON.parse(raw) : {};
    if (!Array.isArray(mis.projects)) mis.projects = [];
    const existing = mis.projects.find(p => p.id === deal.id) || null;
    const next = dealToProjectShape(deal, existing);
    const idx = mis.projects.findIndex(p => p.id === deal.id);
    if (idx >= 0) mis.projects[idx] = next;
    else mis.projects.push(next);
    localStorage.setItem('mis-v1', JSON.stringify(mis));
    window.dispatchEvent(new StorageEvent('storage', { key: 'mis-v1', newValue: JSON.stringify(mis) }));
    // Also push to Supabase so a TRACKR instance that's not currently open picks it up
    if (typeof pushProjectToTrackrSupabase === 'function') pushProjectToTrackrSupabase(next);
    syncDealsFromProjects();
    return next;
  } catch(e) { console.warn('dealCommit failed', e); return null; }
}

// Remove a deal from mis-v1.projects entirely (only for pipeline/lost — Won
// projects must be deleted from TRACKR proper to keep history consistent).
function dealRemove(dealId) {
  try {
    const raw = localStorage.getItem('mis-v1');
    const mis = raw ? JSON.parse(raw) : {};
    if (!Array.isArray(mis.projects)) return;
    mis.projects = mis.projects.filter(p => p.id !== dealId);
    localStorage.setItem('mis-v1', JSON.stringify(mis));
    window.dispatchEvent(new StorageEvent('storage', { key: 'mis-v1', newValue: JSON.stringify(mis) }));
    if (typeof deleteProjectFromTrackrSupabase === 'function') deleteProjectFromTrackrSupabase(dealId);
    syncDealsFromProjects();
  } catch(e) { console.warn('dealRemove failed', e); }
}

// Inspect what a Won → non-Won transition would leave behind. Returns a
// summary object the caller uses to decide whether to confirm with the user.
// Hours and invoices logged while a project was Won don't get deleted on
// transition out of Won, but they semantically lose meaning — entryBillable
// returns 0 for pipeline projects, and invoices stop rolling up as active
// project revenue. Showing the impact lets the user decide.
function getUnWonImpact(dealId) {
  let hourCount = 0, invoiceCount = 0, totalHours = 0;
  try {
    const mis = JSON.parse(localStorage.getItem('mis-v1') || '{}');
    (mis.timeEntries || []).forEach(e => {
      if (e.projectId === dealId) { hourCount++; totalHours += parseFloat(e.hours) || 0; }
    });
    (mis.invoices || []).forEach(i => { if (i.projectId === dealId) invoiceCount++; });
  } catch(_) {}
  return { hourCount, invoiceCount, totalHours };
}

function saveDB() {
  // Note: DB.deals is derived from mis-v1.projects and not persisted here.
  // We write a copy of DB without the deals array to avoid carrying duplicate
  // data forward and confusing future loads.
  try {
    const persisted = { ...DB };
    delete persisted.deals;
    localStorage.setItem(KEY, JSON.stringify(persisted));
  } catch(_) {}
  localStorage.setItem(GROW_SAVED_AT, new Date().toISOString());
  scheduleGrowPush();
}

function genId(prefix) {
  return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// Always read team live from TRACKR (mis-v1) so it's shared
function getTeam() { return getTrackrTeam(); }

// Read clients from TRACKR's mis-v1 (classification: 'client' | 'prospect')
function getClients() {
  try {
    const r = localStorage.getItem('mis-v1');
    if (!r) return [];
    return JSON.parse(r).clients || [];
  } catch { return []; }
}

// Returns clients suitable for Grow's pickers — excludes archived (TRACKR's
// archive_client tool flag) and closed (TRACKR's status='closed' lifecycle
// state). Prospects ARE included because Grow is the pre-sales tool — that's
// where prospects belong. The selected `currentId` (when editing an existing
// deal) is always kept visible so we don't drop the linkage if the underlying
// client was closed/archived after the deal was created.
function getPickerClients(currentId = '') {
  return getClients().filter(c =>
    c.id === currentId || (
      !c.archived &&
      (c.status || 'active') !== 'closed'
    )
  );
}

// Build client <option> strings for a Grow picker. Adds a "(Prospect)" tag
// for prospects, and "(Closed)" / "(Archived)" tags when an existing deal
// references a client that has since been retired (so the user knows why
// the option looks unusual but the linkage still resolves).
function buildClientOptions(currentId = '') {
  return getPickerClients(currentId).map(c => {
    const tag = c.archived ? ' (Archived)'
              : (c.status === 'closed' ? ' (Closed)'
              : (c.classification === 'prospect' ? ' (Prospect)' : ''));
    return `<option value="${c.id}" ${c.id === currentId ? 'selected' : ''}>${c.name}${tag}</option>`;
  }).join('');
}

// Read all projects from TRACKR's mis-v1
function getTrackrProjects() {
  try {
    const r = localStorage.getItem('mis-v1');
    if (!r) return [];
    return JSON.parse(r).projects || [];
  } catch { return []; }
}

// Get the live project name for a deal — reads from TRACKR for linked Won deals
// so the name is always up-to-date even if the local copy is stale.
function getDealName(deal) {
  if (deal?.csmProjectId) {
    const proj = getTrackrProjects().find(p => p.id === deal.csmProjectId);
    if (proj?.name) return proj.name;
  }
  return deal?.projectName || deal?.name || '';
}

// Save a new client (or update) back to TRACKR's mis-v1
function saveClientToTrackr(client) {
  try {
    const raw = localStorage.getItem('mis-v1');
    const data = raw ? JSON.parse(raw) : {};
    if (!Array.isArray(data.clients)) data.clients = [];
    const idx = data.clients.findIndex(c => c.id === client.id);
    if (idx >= 0) data.clients[idx] = client;
    else data.clients.push(client);
    localStorage.setItem('mis-v1', JSON.stringify(data));
    // Fire storage event so TRACKR (same or other tab) picks up the change and pushes to Supabase
    window.dispatchEvent(new StorageEvent('storage', { key: 'mis-v1', newValue: JSON.stringify(data) }));
    // Also push directly to TRACKR's Supabase row so other devices see the
    // client even if no TRACKR tab is open. Without this, a new client
    // created from Grow only lives in this browser's localStorage until
    // TRACKR is opened, breaking sync for users on other devices.
    if (typeof pushClientToTrackrSupabase === 'function') pushClientToTrackrSupabase(client);
  } catch(e) { }
}

// Push an updated client directly to TRACKR's Supabase workspace row.
// Mirrors pushProjectToTrackrSupabase so cross-device sync works without
// requiring a TRACKR tab to be open somewhere.
async function pushClientToTrackrSupabase(client) {
  const cfg = growSupaCfg();
  if (!cfg) return;
  const workspaceId = cfg.workspaceId || 'default';
  try {
    await _trackrCrossRowWrite(workspaceId, (trackrData) => {
      if (!Array.isArray(trackrData.clients)) trackrData.clients = [];
      const idx = trackrData.clients.findIndex(c => c.id === client.id);
      if (idx >= 0) trackrData.clients[idx] = client;
      else trackrData.clients.push(client);
    });
  } catch(_) {} // silently ignore — localStorage is already updated
}

// Save a new project into TRACKR's mis-v1.projects (triggers cross-tab storage event)
// Push an updated project directly to TRACKR's Supabase workspace row.
// This ensures other users see the change immediately without needing TRACKR open.
// Shared optimistic-locking helper for cross-row writes to TRACKR's mis_workspaces row.
// mutate(trackrData) modifies the data in place (or returns false to abort).
// On 412 Precondition Failed: refetches once, re-applies, retries. On second 412: toasts.
async function _trackrCrossRowWrite(workspaceId, mutate) {
  const path = '/mis_workspaces?id=eq.' + encodeURIComponent(workspaceId) + '&select=data,updated_at';
  for (let attempt = 0; attempt < 2; attempt++) {
    const rows = await growSupaFetch(path);
    if (!rows || !rows[0]?.data) return;
    const trackrData = rows[0].data;
    const prevUpdatedAt = rows[0].updated_at;
    const proceed = mutate(trackrData);
    if (proceed === false) return;
    try {
      await growSupaFetch('/mis_workspaces', {
        method: 'POST',
        prefer: 'resolution=merge-duplicates,return=minimal',
        headers: { 'If-Match': prevUpdatedAt },
        body: JSON.stringify({
          id: workspaceId,
          data: trackrData,
          updated_at: new Date().toISOString(),
        }),
      });
      return;
    } catch (e) {
      if (String(e && e.message).indexOf('412') !== -1 && attempt === 0) continue;
      if (String(e && e.message).indexOf('412') !== -1) {
        try { toast("TRACKR was updated by someone else — your project change wasn't saved, please retry", 'error'); } catch(_) {}
        return;
      }
      throw e;
    }
  }
}

async function pushProjectToTrackrSupabase(project) {
  const cfg = growSupaCfg();
  if (!cfg) return;
  const workspaceId = cfg.workspaceId || 'default';
  try {
    await _trackrCrossRowWrite(workspaceId, (trackrData) => {
      if (!Array.isArray(trackrData.projects)) trackrData.projects = [];
      const idx = trackrData.projects.findIndex(p => p.id === project.id);
      if (idx >= 0) trackrData.projects[idx] = project;
      else trackrData.projects.push(project);
    });
  } catch(_) {} // silently ignore — localStorage is already updated
}

// Delete a project from TRACKR's localStorage and Supabase workspace row.
// Used when a deal is moved out of Closed Won — project no longer exists.
async function deleteProjectFromTrackrSupabase(projectId) {
  const cfg = growSupaCfg();
  if (!cfg) return;
  const workspaceId = cfg.workspaceId || 'default';
  try {
    await _trackrCrossRowWrite(workspaceId, (trackrData) => {
      if (!Array.isArray(trackrData.projects)) return false;
      const before = trackrData.projects.length;
      trackrData.projects = trackrData.projects.filter(p => p.id !== projectId);
      if (trackrData.projects.length === before) return false;
    });
  } catch(_) {}
}

function deleteProjectFromTrackr(projectId) {
  try {
    const raw = localStorage.getItem('mis-v1');
    const data = raw ? JSON.parse(raw) : {};
    if (!Array.isArray(data.projects)) return;
    data.projects = data.projects.filter(p => p.id !== projectId);
    localStorage.setItem('mis-v1', JSON.stringify(data));
    window.dispatchEvent(new StorageEvent('storage', { key: 'mis-v1', newValue: JSON.stringify(data) }));
  } catch(_) {}
}

function saveProjectToTrackr(project) {
  try {
    const raw = localStorage.getItem('mis-v1');
    const data = raw ? JSON.parse(raw) : {};
    if (!Array.isArray(data.projects)) data.projects = [];
    const idx = data.projects.findIndex(p => p.id === project.id);
    if (idx >= 0) data.projects[idx] = project;
    else data.projects.push(project);
    localStorage.setItem('mis-v1', JSON.stringify(data));
    // Fire storage event manually for same-tab listeners (localStorage events
    // only fire in OTHER tabs, so same-tab TRACKR instance won't auto-pick up)
    window.dispatchEvent(new StorageEvent('storage', { key: 'mis-v1', newValue: JSON.stringify(data) }));
  } catch(e) { }
}

// Check if a project already exists in TRACKR for this deal
function getTrackrProjectForDeal(dealId) {
  // Under the unified schema, dealId === projectId — they're the same record.
  try {
    const mis      = JSON.parse(localStorage.getItem('mis-v1') || '{}');
    const projects = mis.projects || [];
    return projects.find(p => p.id === dealId) || null;
  } catch { return null; }
}

// Compute the canonical value + currency for a deal.
// For Won deals linked to a TRACKR project, use the live project budget.
function resolveDealValue(deal) {
  // Under the unified schema deal.id IS the project id. For Won deals
  // (status === 'active'), pull the contracted value from the project record
  // including change orders. For pipeline/lost deals, return the pipeline
  // estimate stored on the same record.
  const proj = getTrackrProjects().find(p => p.id === deal.id);
  if (proj && proj.status === 'active') {
    const bt = proj.billingType || 'time_materials';
    const coSum = (proj.changeOrders || [])
      .filter(co => co.status !== 'rejected')
      .reduce((s, co) => s + (co.value || 0), 0);
    let contractVal = 0;
    if (bt === 'fixed')                  contractVal = (proj.fixedFee || 0);
    else if (bt === 'retainer')          contractVal = (proj.retainer?.monthlyFee || 0);
    else if (bt === 'variable_retainer') contractVal = (proj.variableRetainer?.yearlyBudget || 0);
    // contractVal stays 0 for 'time_materials' — no inherent contract figure
    const curr = proj.currency || deal.currency || DB.settings.currency || 'USD';
    if (contractVal > 0) {
      const label = bt === 'retainer' ? '/mo' : bt === 'variable_retainer' ? '/yr' : '';
      return { value: contractVal + coSum, currency: curr, label };
    }
    // Fallback: the project is Won but its contract field is empty (T&M
    // projects, or a project that was Won before the fee was filled in).
    // Use the pipeline value originally agreed at the deal stage so the
    // introducer view, kanban totals, and commission calcs still reflect
    // the budget the deal was sold on. Label "estimate" so it's visible
    // this isn't a contracted figure.
    if (proj.pipelineValue && proj.pipelineValue > 0) {
      return { value: proj.pipelineValue + coSum, currency: curr, label: bt === 'time_materials' ? 'budget' : 'estimate' };
    }
    return { value: coSum, currency: curr, label: '' };
  }
  return { value: deal.value || 0, currency: deal.currency || DB.settings.currency || 'USD', label: '' };
}

function fmtVal(n, curr) {
  if (!n) return '—';
  return new Intl.NumberFormat('en-US', { style:'currency', currency: curr||DB.settings.currency||'USD', minimumFractionDigits:0, maximumFractionDigits:0 }).format(n);
}

// ── Toast ─────────────────────────────────────────────
let _toastTimer;
function toast(msg, type='success') {
  const old = document.querySelector('.toast');
  if (old) { old.remove(); clearTimeout(_toastTimer); }
  const icons = { success:'✅', error:'😬', info:'💡' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'✅'}</span><span class="toast-msg">${msg}</span>`;
  const dismiss = () => { el.classList.add('leaving'); clearTimeout(_toastTimer); setTimeout(() => el.remove(), 240); };
  el.addEventListener('click', dismiss);
  document.body.appendChild(el);
  _toastTimer = setTimeout(dismiss, type === 'error' ? 4000 : 3000);
}

// ── Modal ─────────────────────────────────────────────
function showModal(title, bodyHTML, maxWidth = '680px') {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal" style="max-width:${maxWidth}">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-close').onclick = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  return overlay;
}

function confirmModal(title, body, confirmLabel, onConfirm, danger = true) {
  const overlay = showModal(title, `
    <div style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:20px">${body}</div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cm-cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="cm-ok-btn" style="${danger ? 'background:var(--danger)' : ''}">${confirmLabel}</button>
    </div>
  `);
  overlay.querySelector('#cm-cancel-btn').onclick = () => overlay.remove();
  overlay.querySelector('#cm-ok-btn').onclick = () => { overlay.remove(); onConfirm(); };
  return overlay;
}

// ── Navigation ────────────────────────────────────────
function navigate(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  const titles = { pipeline:'Pipeline', clients:'Clients', health:'Client Health', settings:'Settings', introducers:'Introducers' };
  document.getElementById('topbar-title').innerHTML = `<span style="color:var(--border);font-weight:300;margin-right:10px;letter-spacing:0">//</span>${titles[view]||view.charAt(0).toUpperCase()+view.slice(1)}`;
  renderView();
}

function renderView() {
  const el   = document.getElementById('main-content');
  const acts = document.getElementById('topbar-actions');
  acts.innerHTML = '';
  el.innerHTML = '';
  el.classList.remove('content-full');
  // Full-bleed views manage their own layout; standard views use shared .content padding
  if (currentView === 'pipeline') {
    el.style.cssText = 'padding:0;overflow:hidden;display:flex;flex-direction:column;flex:1';
    renderPipeline(el, acts);
  } else if (currentView === 'health') {
    el.style.cssText = 'padding:0;overflow:hidden;display:flex;flex-direction:column;flex:1';
    renderHealth(el, acts);
  } else {
    el.style.cssText = '';  // use shared .content CSS (padding:32px 36px, overflow-y:auto)
    if      (currentView === 'clients')     renderClientsList(el, acts);
    else if (currentView === 'introducers') renderIntroducers(el, acts);
    else if (currentView === 'settings')    renderSettings(el, acts);
  }
  // Show/hide the Ask & Act topbar button based on view + role
  if (typeof updatePageChatButton === 'function') updatePageChatButton();
}

let _dragPlaceholder = null;
let _showLost = false; // Lost column hidden by default

function renderPipeline(el, acts) {
  // Acts bar — Show Lost toggle + add button
  const toggleBtn = document.createElement('button');
  toggleBtn.className = 'btn btn-ghost btn-sm';
  toggleBtn.style.cssText = `font-size:14px;${_showLost ? 'color:var(--danger);border-color:var(--danger)' : ''}`;
  toggleBtn.innerHTML = _showLost
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg> Hide Lost'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Show Lost';
  toggleBtn.onclick = () => { _showLost = !_showLost; renderView(); };
  acts.appendChild(toggleBtn);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary btn-sm';
  addBtn.innerHTML = '+ Add Deal';
  addBtn.onclick = () => showDealModal(null);
  acts.appendChild(addBtn);

  // Default: show all columns except Lost. Toggle shows Lost too.
  let sortedCols = [...DB.columns].sort((a,b) => a.order - b.order);
  if (!_showLost) sortedCols = sortedCols.filter(c => !c.lost);

  const wrap = document.createElement('div');
  wrap.className = 'pipeline-wrap';
  el.appendChild(wrap);

  sortedCols.forEach(col => {
    // NOTE: a previous version of this code silently deleted Won-stage deals
    // whose `csmProjectId` didn't resolve to a current TRACKR project. That
    // ran on every render and caused two bugs:
    //   1. Edit a deal → 200ms race window where the deal is in Won but its
    //      auto-created project hasn't been written yet → cleanup deletes it.
    //   2. If a TRACKR project was deleted/closed, the linked Grow deal would
    //      vanish silently with no warning.
    // Removed entirely — orphan deals stay visible so the user can review and
    // decide. If we need to surface them later we can add a badge or a
    // "Reconcile" button rather than deleting data.
    const colDeals = DB.deals.filter(d => d.stage === col.id)
      .sort((a, b) => {
        // Closed Won: alphabetical by project name
        if (col.won) return getDealName(a).localeCompare(getDealName(b));
        // Other columns: newest first (createdAt desc)
        return (b.createdAt||'').localeCompare(a.createdAt||'');
      });
    const total    = colDeals.reduce((s, d) => s + (resolveDealValue(d).value || 0), 0);

    const colEl = document.createElement('div');
    colEl.className = 'pipeline-col' + (col.won ? ' col-won' : col.lost ? ' col-lost' : '');
    colEl.dataset.col = col.id;

    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-header-top">
          <span class="col-name" style="color:${col.color}">${col.name}</span>
          <span class="col-count">${colDeals.length}</span>
        </div>
        ${total > 0 ? `<div class="col-total">${fmtVal(total)}</div>` : '<div class="col-total" style="color:#ADADAB">—</div>'}
      </div>
      <div class="col-cards" id="col-cards-${col.id}"></div>
      ${!col.lost ? `<button class="col-add-btn" data-col="${col.id}">+ Add deal</button>` : ''}
    `;

    wrap.appendChild(colEl);

    // Render cards
    const cardsEl = colEl.querySelector(`#col-cards-${col.id}`);
    colDeals.forEach(deal => {
      cardsEl.appendChild(buildDealCard(deal, col));
    });

    // Drop zone wiring
    wireDropZone(colEl, col.id);

    // Add deal button
    colEl.querySelector('.col-add-btn')?.addEventListener('click', () => showDealModal(null, col.id));
  });
}

function buildDealCard(deal, col) {
  const card = document.createElement('div');
  card.className = 'deal-card';
  card.draggable = true;
  card.dataset.id = deal.id;

  const team = getTeam();
  const psl  = deal.preSalesLead ? team.find(t => t.id === deal.preSalesLead) : null;
  const tl   = deal.teamLead ? team.find(t => t.id === deal.teamLead) : null;
  const tec  = deal.techLead ? team.find(t => t.id === deal.techLead) : null;
  const intr = deal.introducerId ? (DB.introducers||[]).find(r => r.id === deal.introducerId) : null;

  // Resolve client name — from TRACKR clients or legacy name field
  const client = deal.clientId ? getClients().find(c => c.id === deal.clientId) : null;
  const clientName   = client?.name || deal.name || '';
  const liveProjectName = getDealName(deal);
  const projectLabel = liveProjectName && liveProjectName !== clientName ? liveProjectName : null;

  // Resolve value live from TRACKR project if linked
  const { value: resolvedVal, currency: resolvedCurr, label: valLabel } = resolveDealValue(deal);

  // Resolve dates — linked project is the authoritative source; fall back to deal's own fields
  const linkedProjDates = deal.csmProjectId ? getTrackrProjects().find(p => p.id === deal.csmProjectId) : null;
  const cardStartDate   = linkedProjDates?.startDate  || deal.startDate || null;
  const cardEndDate     = linkedProjDates?.closedDate || deal.endDate   || null;
  function fmtCardDate(d) {
    if (!d) return '';
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
  }
  const dateLineHTML = (cardStartDate || cardEndDate)
    ? `<div style="font-size:10px;color:var(--text-3);margin-top:5px;display:flex;align-items:center;gap:4px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        ${cardStartDate ? fmtCardDate(cardStartDate) : '—'}
        <span style="opacity:.5">→</span>
        ${cardEndDate ? fmtCardDate(cardEndDate) : '—'}
       </div>`
    : '';

  card.innerHTML = `
    <div class="deal-name">${projectLabel || clientName}</div>
    ${projectLabel ? `<div class="deal-company">${clientName}</div>` : (deal.company ? `<div class="deal-company">${deal.company}</div>` : '')}
    ${resolvedVal ? `<div class="deal-value">${fmtVal(resolvedVal, resolvedCurr)}${valLabel ? `<span style="font-size:10px;font-weight:600;opacity:.6;margin-left:2px">${valLabel}</span>` : ''}</div>` : ''}
    ${dateLineHTML}
    <div class="deal-leads">
      ${psl ? `<span class="deal-lead-pip" style="background:#F0EDF7;border-color:#C8BAE8;color:#7a3cbe">PSL: ${memberShortName(psl)}</span>` : ''}
      ${tl  ? `<span class="deal-lead-pip">AL: ${memberShortName(tl)}</span>` : ''}
      ${tec ? `<span class="deal-lead-pip">Tech: ${memberShortName(tec)}</span>` : ''}
      ${intr ? `<span class="deal-lead-pip" style="background:#FFF8E7;border-color:#F5D78E;color:#8a6a10" title="Introduced by ${intr.name}${intr.company ? ' · '+intr.company : ''}${deal.introduction?.commission ? ' · '+deal.introduction.commission+'% commission' : ''}">↗ ${intr.name.split(' ')[0]}${deal.introduction?.commission ? ' · '+deal.introduction.commission+'%' : ''}</span>` : ''}
    </div>
  `;

  // Drag + click handling — coexisting nicely is harder than it looks.
  // When an element is draggable=true, browsers can interpret even tiny
  // mouse movements as the start of a drag, which suppresses normal click
  // and mouseup events. We handle BOTH cases:
  //   1. A real click (no drag triggered) → 'click' event fires normally
  //   2. A tiny drag that never moved (dragstart→dragend with no real travel)
  //      → 'click' may be swallowed by the browser, so we detect the failed
  //        drag in the 'dragend' handler and open the modal there.
  // _dragHandledByDragend prevents both paths firing the modal twice when
  // the browser dispatches both dragend AND click for the same gesture.
  let _dragStartX = 0, _dragStartY = 0, _dragStartTime = 0;
  let _dragHandledByDragend = false;
  card.addEventListener('dragstart', e => {
    _dragId = deal.id;
    _dragStartX = e.clientX;
    _dragStartY = e.clientY;
    _dragStartTime = Date.now();
    _dragHandledByDragend = false;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', e => {
    const dx = Math.abs(e.clientX - _dragStartX);
    const dy = Math.abs(e.clientY - _dragStartY);
    const dt = Date.now() - _dragStartTime;
    const didNotTravel = dx < 5 && dy < 5 && dt < 500;
    _dragId = null;
    card.classList.remove('dragging');
    document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
    document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    // Browser treated this as a failed drag and may have swallowed the click.
    // Open the modal manually and flag so the click handler below skips.
    if (didNotTravel && !e.target?.closest?.('.deal-proj-btn')) {
      _dragHandledByDragend = true;
      showDealModal(deal);
      // Reset the flag on the next tick so a follow-up real click works.
      setTimeout(() => { _dragHandledByDragend = false; }, 0);
    }
  });

  // Real click path — fires when the browser didn't enter drag mode at all.
  card.addEventListener('click', e => {
    if (_dragHandledByDragend) return;
    if (e.target.closest('.deal-proj-btn')) return;
    showDealModal(deal);
  });

  // Project settings button — only on Won deals with a linked project
  if (col?.won && deal.csmProjectId) {
    const settingsBtn = document.createElement('button');
    settingsBtn.className = 'deal-proj-btn';
    settingsBtn.title = 'Edit project settings in TRACKR';
    settingsBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg> Project`;
    settingsBtn.addEventListener('click', e => {
      e.stopPropagation(); // don't open the deal modal
      showLinkedProjectModal(deal);
    });
    card.appendChild(settingsBtn);
  }

  return card;
}

function wireDropZone(colEl, colId) {
  colEl.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    colEl.classList.add('drag-over');

    // Position placeholder
    const cardsEl = colEl.querySelector('.col-cards');
    const afterEl = getDragAfterElement(cardsEl, e.clientY);
    const ph = document.querySelector('.drag-placeholder') || (() => {
      const p = document.createElement('div');
      p.className = 'deal-card drag-placeholder';
      return p;
    })();
    if (!afterEl) cardsEl.appendChild(ph);
    else cardsEl.insertBefore(ph, afterEl);
  });

  colEl.addEventListener('dragleave', e => {
    if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over');
  });

  colEl.addEventListener('drop', e => {
    e.preventDefault();
    colEl.classList.remove('drag-over');
    document.querySelector('.drag-placeholder')?.remove();
    if (!_dragId) return;
    const deal = DB.deals.find(d => d.id === _dragId);
    if (!deal) return;
    const prevStage = deal.stage;
    const col       = DB.columns.find(c => c.id === colId);
    const prevCol   = DB.columns.find(c => c.id === prevStage);

    // Moving OUT of Closed Won — sanity-check against losing data. Hours and
    // invoices that were billable while the project was Won become non-billable
    // (or orphaned) once status flips to pipeline/lost. Confirm with the user
    // rather than silently re-classifying their work.
    if (prevCol?.won && !col?.won && prevStage !== colId) {
      const { hourCount, invoiceCount, totalHours } = getUnWonImpact(deal.id);
      if (hourCount > 0 || invoiceCount > 0) {
        // Snap card back visually until the user confirms — renderView will
        // re-render from canonical state (which still has the deal in Won).
        renderView();
        const targetName = col?.name || 'that column';
        const parts = [];
        if (hourCount > 0)    parts.push(`<strong>${totalHours.toFixed(1)}h logged</strong> across ${hourCount} entr${hourCount===1?'y':'ies'}`);
        if (invoiceCount > 0) parts.push(`<strong>${invoiceCount} invoice${invoiceCount===1?'':'s'}</strong>`);
        const consequences = [];
        if (hourCount > 0)    consequences.push('Logged hours stay in TRACKR but become non-billable (pre-sales hours are 0-rated).');
        if (invoiceCount > 0) consequences.push('Invoices remain in TRACKR but no longer roll up under an active project — they show as orphan billings.');
        confirmModal(
          `Move out of Closed Won?`,
          `<strong>${getDealName(deal)}</strong> has ${parts.join(' and ')} attached.<br><br>
           Moving it to <strong>${targetName}</strong> will:<br>
           ${consequences.map(c => '• ' + c).join('<br>')}<br><br>
           This is reversible — drag the deal back to Closed Won to restore active status.`,
          'Move it anyway',
          () => {
            // Re-apply the stage change after confirmation
            deal.stage = colId;
            deal.wonAt = null; // moved out of Won
            dealCommit(deal);
            saveDB();
            renderView();
            toast(`Moved to ${col?.name || colId}`);
          }
        );
        return;
      }
    }

    // Apply stage and any side-effects (won/lost transitions)
    deal.stage = colId;
    if (col?.won && !deal.wonAt) deal.wonAt = new Date().toISOString().slice(0,10);
    if (prevCol?.won && !col?.won) deal.wonAt = null; // moved back out of Won

    // Single write — dealCommit handles the status flip (pipeline ↔ active ↔ lost)
    dealCommit(deal);
    saveDB();
    renderView();
    if (prevStage !== colId) toast(`Moved to ${col?.name || colId}`);
    // For Won transitions, only prompt to configure billing terms if they
    // haven't been set yet. With the deal modal extended to capture contract
    // details up-front, most Won transitions have terms already and don't
    // need the follow-up modal.
    if (col?.won && prevStage !== colId) {
      const fresh = DB.deals.find(d => d.id === deal.id);
      const proj = fresh ? getTrackrProjectForDeal(fresh.id) : null;
      const hasTerms =
        (proj?.billingType === 'fixed' && (proj.fixedFee || 0) > 0) ||
        (proj?.billingType === 'retainer' && (proj.retainer?.monthlyFee || 0) > 0) ||
        (proj?.billingType === 'variable_retainer' && (proj.variableRetainer?.yearlyBudget || 0) > 0) ||
        proj?.billingType === 'time_materials';
      if (fresh && !hasTerms && typeof showLinkedProjectModal === 'function') {
        setTimeout(() => showLinkedProjectModal(fresh), 100);
      }
    }
  });
}

function getDragAfterElement(container, y) {
  const draggableEls = [...container.querySelectorAll('.deal-card:not(.dragging):not(.drag-placeholder)')];
  return draggableEls.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

        </div>
        <div style="font-size:11px;color:var(--text-3);margin-top:-4px">Annual budget consumed at a defined hourly rate. Monthly approvals/usage tracked in TRACKR.</div>
      </div>

      <!-- Time &amp; Materials -->
      <div class="d-contract-section" data-bt="time_materials">
        <div style="font-size:13px;color:var(--text-2);line-height:1.6;padding:6px 0">
          No fixed contract value. Hours are billed at each team member's rate (defined by job-title rate cards in TRACKR).
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Start Date</label><input type="date" id="d-start-date" value="${initStartDate}"></div>
      <div class="form-group"><label>${linkedProj ? 'Close Date' : 'End Date'}</label><input type="date" id="d-end-date" value="${initEndDate}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Pre-Sales Lead</label>
        <select id="d-presales"><option value="">— None —</option>${teamOptions}</select>
      </div>
      <div class="form-group"><label>Account Lead</label>
        <select id="d-tl"><option value="">— None —</option>${teamOptions}</select>
      </div>
      <div class="form-group"><label>Technical Lead</label>
        <select id="d-tech"><option value="">— None —</option>${teamOptions}</select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full"><label>Notes</label><textarea id="d-notes">${deal?.notes||''}</textarea></div>
    </div>
    <div class="section-divider">Introduction <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:#ADADAB">— who referred or introduced this opportunity</span></div>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label>Introducer</label>
        <select id="d-introducer-sel">
          <option value="">— None —</option>
          ${DB.introducers.map(r => `<option value="${r.id}" ${deal?.introducerId===r.id?'selected':''}>${r.name}${r.company?' · '+r.company:''}</option>`).join('')}
          <option value="__new__">+ Add new introducer…</option>
        </select>
      </div>
      <div class="form-group" style="max-width:160px">
        <label>Commission %</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="number" id="d-intro-commission" value="${deal?.introduction?.commission||''}" placeholder="0" min="0" max="100" step="0.5">
          <span id="d-commission-calc" style="font-size:14px;color:var(--accent);white-space:nowrap;font-weight:700"></span>
        </div>
      </div>
    </div>
    <div id="d-new-introducer-form" style="display:none;background:#F8F8F6;border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#898987;margin-bottom:10px">New Introducer</div>
      <div class="form-row">
        <div class="form-group"><label>Name</label><input id="d-ni-name" placeholder="e.g. James Wong"></div>
        <div class="form-group"><label>Company</label><input id="d-ni-company" placeholder="e.g. Acme Corp"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email</label><input type="email" id="d-ni-email" placeholder="james@acme.com"></div>
        <div class="form-group"><label>Phone</label><input id="d-ni-phone" placeholder="+1 555 0100"></div>
      </div>
      <div class="form-row">
        <div class="form-group full"><label>Notes</label><input id="d-ni-notes" placeholder="How they know you, how you met…"></div>
      </div>
    </div>
    <div class="form-actions">
      ${isEdit ? `<button class="btn btn-ghost btn-sm" id="d-del" style="color:#C0392B;margin-right:auto">Delete</button>` : ''}
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="d-save">${isEdit ? 'Update' : 'Add Deal'}</button>
    </div>
  `, '620px');

  // Pre-select leads
  if (deal?.preSalesLead) o.querySelector('#d-presales').value = deal.preSalesLead;
  if (deal?.teamLead)     o.querySelector('#d-tl').value       = deal.teamLead;
  if (deal?.techLead)     o.querySelector('#d-tech').value     = deal.techLead;

  // Introducer dropdown — show/hide new introducer form
  o.querySelector('#d-introducer-sel').addEventListener('change', function() {
    const form = o.querySelector('#d-new-introducer-form');
    form.style.display = this.value === '__new__' ? 'block' : 'none';
    if (this.value === '__new__') o.querySelector('#d-ni-name')?.focus();
  });

  // Show only the contract subsection that matches the selected billing type
  function refreshContractSections() {
    const bt = o.querySelector('#d-billing-type').value;
    o.querySelectorAll('.d-contract-section').forEach(sec => {
      sec.style.display = sec.dataset.bt === bt ? 'block' : 'none';
    });
  }
  o.querySelector('#d-billing-type').addEventListener('change', refreshContractSections);
  refreshContractSections();

  // Auto-populate the Deal Value (pipeline estimate) from contract terms
  // when the user hasn't entered one yet. Helpful while drafting a deal —
  // they put in the contracted fixed fee, the pipeline estimate auto-fills.
  // Stops once the user types into Deal Value directly.
  let _dealValueTouched = !!(deal?.value);
  o.querySelector('#d-value').addEventListener('input', () => { _dealValueTouched = true; });
  function autoSyncDealValue() {
    if (_dealValueTouched) return;
    const bt = o.querySelector('#d-billing-type').value;
    let suggested = 0;
    if (bt === 'fixed')                  suggested = parseFloat(o.querySelector('#d-fixed-fee').value) || 0;
    else if (bt === 'retainer')          suggested = parseFloat(o.querySelector('#d-retainer-fee').value) || 0; // monthly fee as a marker
    else if (bt === 'variable_retainer') suggested = parseFloat(o.querySelector('#d-vr-budget').value) || 0;
    if (suggested > 0) {
      o.querySelector('#d-value').value = suggested;
      if (typeof updateCommissionCalc === 'function') updateCommissionCalc();
    }
  }
  ['#d-fixed-fee','#d-retainer-fee','#d-vr-budget'].forEach(sel => {
    o.querySelector(sel)?.addEventListener('input', autoSyncDealValue);
  });
  o.querySelector('#d-billing-type').addEventListener('change', autoSyncDealValue);

  // Live commission calculator
  function updateCommissionCalc() {
    const pct  = parseFloat(o.querySelector('#d-intro-commission').value) || 0;
    const val  = parseFloat(o.querySelector('#d-value').value) || 0;
    const curr = o.querySelector('#d-currency').value;
    const calc = o.querySelector('#d-commission-calc');
    if (calc) calc.textContent = pct && val ? '= ' + fmtVal(val * pct / 100, curr) : '';
  }
  o.querySelector('#d-intro-commission').addEventListener('input', updateCommissionCalc);
  o.querySelector('#d-value').addEventListener('input', updateCommissionCalc);
  o.querySelector('#d-currency').addEventListener('change', updateCommissionCalc);
  updateCommissionCalc();

  // Toggle new client form
  o.querySelector('#d-new-client').addEventListener('click', () => {
    const form = o.querySelector('#d-new-client-form');
    const showing = form.style.display !== 'none';
    form.style.display = showing ? 'none' : 'block';
    o.querySelector('#d-new-client').textContent = showing ? '+ New Client' : '− Cancel';
    if (!showing) o.querySelector('#d-client').value = '';
  });

  // Warn if typed name matches an existing client
  o.querySelector('#d-nc-name').addEventListener('input', e => {
    const val = e.target.value.toLowerCase().trim();
    const similar = o.querySelector('#d-nc-similar');
    if (!val || val.length < 3) { similar.style.display = 'none'; return; }
    const matches = getClients().filter(c => {
      const cn = c.name.toLowerCase();
      return cn.includes(val) || val.includes(cn) || cn.startsWith(val) || val.startsWith(cn);
    });
    if (matches.length) {
      similar.style.display = 'block';
      similar.innerHTML = `⚠ Similar client${matches.length>1?'s':''} already exist: ${matches.map(c=>`<strong>${c.name}</strong>`).join(', ')} — consider selecting from the dropdown above instead.`;
    } else {
      similar.style.display = 'none';
    }
  });

  o.querySelector('#d-save').onclick = () => {
    // Handle new client creation if form is visible
    let clientId = o.querySelector('#d-client').value;
    const newClientForm = o.querySelector('#d-new-client-form');
    if (newClientForm.style.display !== 'none') {
      const ncName = o.querySelector('#d-nc-name').value.trim();
      if (!ncName) { toast('Client name required', 'error'); return; }
      // Check if a client with this name already exists
      const existingClient = getClients().find(c => c.name.toLowerCase().trim() === ncName.toLowerCase());
      if (existingClient) {
        clientId = existingClient.id;
        o.querySelector('#d-new-client-form').style.display = 'none';
        toast(`Using existing client "${existingClient.name}"`);
      } else {
        const newClient = {
          id:             genId('cl'),
          name:           ncName,
          classification: o.querySelector('#d-nc-class').value,
          status:         'active',
          email:          o.querySelector('#d-nc-email').value.trim(),
          phone:          o.querySelector('#d-nc-phone').value.trim(),
          currency:       DB.settings.currency || 'USD',
          billingModel:   'standard',
          rateCard:       {},
          logo:           '',
          createdAt:      new Date().toISOString().slice(0,10),
        };
        saveClientToTrackr(newClient);
        clientId = newClient.id;
      }
    }

    if (!clientId) { toast('Select or create a client', 'error'); return; }
    const projectName = o.querySelector('#d-project').value.trim();
    const stage = o.querySelector('#d-stage').value;
    const col   = DB.columns.find(col => col.id === stage);
    const client = getClients().find(cl => cl.id === clientId) || {};

    // Build deal-shape payload. With the unified schema, this maps to a
    // single mis-v1.projects record. Use the 'pr-' prefix so new ids match
    // every other project record in mis-v1.projects.
    const dealId = deal?.id || genId('pr');
    const billingType = o.querySelector('#d-billing-type').value || 'fixed';
    // Read all contract-section values from the form — but only persist the
    // ones matching the selected billing type. Stale values from a previous
    // billing-type pick stay on the project record (TRACKR ignores them
    // since they don't match billingType), letting the user switch back
    // and forth without losing their numbers.
    const contractFixedFee   = parseFloat(o.querySelector('#d-fixed-fee').value)       || 0;
    const contractRetFee     = parseFloat(o.querySelector('#d-retainer-fee').value)    || 0;
    const contractRetHours   = parseFloat(o.querySelector('#d-retainer-hours').value)  || 0;
    const contractRetDay     = parseInt(o.querySelector('#d-retainer-day').value, 10)  || 1;
    const contractVrBudget   = parseFloat(o.querySelector('#d-vr-budget').value)       || 0;
    const contractVrRate     = parseFloat(o.querySelector('#d-vr-rate').value)         || 0;

    const data = {
      id:          dealId,
      csmProjectId: dealId,
      csmDealId:    deal?.csmDealId || null,
      clientId,
      projectName: projectName || client.name,
      name:        client.name || projectName,
      value:       parseFloat(o.querySelector('#d-value').value) || 0,
      currency:    o.querySelector('#d-currency').value,
      billingType,
      stage,
      preSalesLead: o.querySelector('#d-presales').value || null,
      teamLead:    o.querySelector('#d-tl').value || null,
      techLead:    o.querySelector('#d-tech').value || null,
      notes:       o.querySelector('#d-notes').value.trim(),
      introduction: { commission: parseFloat(o.querySelector('#d-intro-commission').value) || 0 },
      startDate:   o.querySelector('#d-start-date').value || null,
      endDate:     o.querySelector('#d-end-date').value || null,
      createdAt:   deal?.createdAt || new Date().toISOString().slice(0,10),
      // wonAt: stamped while in Won (preserved across edits), cleared when
      // moving to any other column. dealToProjectShape honours explicit null
      // values to clear, and 'today' to set on first Won transition.
      wonAt:       col?.won
                     ? (deal?.wonAt || new Date().toISOString().slice(0,10))
                     : null,
      // Contract terms — only flow through the section matching the selected
      // billing type, so we don't accidentally write zeros over existing
      // values for the other billing types when the user picks one.
      ...(billingType === 'fixed'             ? { contractFixedFee } : {}),
      ...(billingType === 'retainer'          ? { contractRetainer:        { monthlyFee: contractRetFee, hoursIncluded: contractRetHours, billingDay: contractRetDay } } : {}),
      ...(billingType === 'variable_retainer' ? { contractVariableRetainer:{ yearlyBudget: contractVrBudget, hourlyRate: contractVrRate } } : {}),
    };

    // Handle introducer — create new if needed
    const intrSel = o.querySelector('#d-introducer-sel').value;
    if (intrSel === '__new__') {
      const niName = o.querySelector('#d-ni-name').value.trim();
      if (!niName) { toast('Introducer name required', 'error'); return; }
      const newIntr = {
        id:      genId('intr'),
        name:    niName,
        company: o.querySelector('#d-ni-company').value.trim(),
        email:   o.querySelector('#d-ni-email').value.trim(),
        phone:   o.querySelector('#d-ni-phone').value.trim(),
        notes:   o.querySelector('#d-ni-notes').value.trim(),
      };
      DB.introducers.push(newIntr);
      data.introducerId = newIntr.id;
    } else {
      data.introducerId = intrSel || null;
    }

    // Detect un-Won transition: the deal was in Won, the user picked a different
    // (non-Won) stage in the modal. Same data-loss risk as the drag handler —
    // confirm before flipping status away from active.
    const prevWonStage = isEdit && deal?.stage ? DB.columns.find(c => c.id === deal.stage)?.won : false;
    const newIsWon = !!col?.won;
    if (prevWonStage && !newIsWon) {
      const { hourCount, invoiceCount, totalHours } = getUnWonImpact(dealId);
      if (hourCount > 0 || invoiceCount > 0) {
        const targetName = col?.name || 'that column';
        const parts = [];
        if (hourCount > 0)    parts.push(`<strong>${totalHours.toFixed(1)}h logged</strong> across ${hourCount} entr${hourCount===1?'y':'ies'}`);
        if (invoiceCount > 0) parts.push(`<strong>${invoiceCount} invoice${invoiceCount===1?'':'s'}</strong>`);
        const consequences = [];
        if (hourCount > 0)    consequences.push('Logged hours stay in TRACKR but become non-billable (pre-sales hours are 0-rated).');
        if (invoiceCount > 0) consequences.push('Invoices remain in TRACKR but no longer roll up under an active project — they show as orphan billings.');
        // Close the deal modal first so the confirm modal sits on top cleanly
        o.remove();
        confirmModal(
          'Move out of Closed Won?',
          `<strong>${getDealName(deal) || projectName || client.name}</strong> has ${parts.join(' and ')} attached.<br><br>
           Moving it to <strong>${targetName}</strong> will:<br>
           ${consequences.map(c => '• ' + c).join('<br>')}<br><br>
           This is reversible — move the deal back to Closed Won to restore active status.`,
          'Move it anyway',
          () => {
            dealCommit(data);
            saveDB();
            renderView();
            toast('Deal updated ✓');
          }
        );
        return;
      }
    }

    // Single write: stamps the unified project record in mis-v1.projects.
    // Status flips happen automatically based on which column the deal is in.
    dealCommit(data);
    saveDB();

    o.remove(); renderView();
    toast(isEdit ? 'Deal updated ✓' : 'Deal added ✓');
  };

  if (isEdit) {
    o.querySelector('#d-del').onclick = () => {
      o.remove();
      confirmModal('Delete Deal', `Remove <strong>${getDealName(deal)||deal.name}</strong> permanently?`, 'Delete', () => {
        // Refuse to delete if the project has logged hours or invoices in TRACKR —
        // deletion would orphan that data. Use the shared impact helper to keep
        // the check aligned with the un-Won transition guard.
        const { hourCount, invoiceCount, totalHours } = getUnWonImpact(deal.id);
        if (hourCount > 0 || invoiceCount > 0) {
          const parts = [];
          if (hourCount > 0)    parts.push(`${totalHours.toFixed(1)}h logged`);
          if (invoiceCount > 0) parts.push(`${invoiceCount} invoice${invoiceCount===1?'':'s'}`);
          toast(`Has ${parts.join(' and ')} in TRACKR — close it from there instead`, 'error');
          return;
        }
        dealRemove(deal.id);
        saveDB(); renderView(); toast('Deal deleted');
      });
    };
  }
}
