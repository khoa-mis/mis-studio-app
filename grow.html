// Mirrors PAY's applyDesignFromTrackr — keeps the three apps visually in lockstep
// when design tokens are edited in TRACKR's Settings → Design System page.
function applyDesignFromTrackr(){
  try{
    const raw=localStorage.getItem('mis-v1');
    if(!raw)return;
    const d=(JSON.parse(raw).design)||{};
    const accent=d.accent||'#678F2F';
    const sidebar=d.sidebar||'#2F2F2F';
    const hexToRgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return r+','+g+','+b;};
    const shadeColor=(hex,p)=>{const n=parseInt(hex.replace('#',''),16);const r=Math.min(255,Math.max(0,(n>>16)+p));const g=Math.min(255,Math.max(0,((n>>8)&0xFF)+p));const b=Math.min(255,Math.max(0,(n&0xFF)+p));return'#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);};
    const vars={
      '--accent':accent,
      '--accent-dim':'rgba('+hexToRgb(accent)+',.10)',
      '--accent-hover':d.accentHover||shadeColor(accent,-15),
      '--bg':d.bg||'#F2F1EE',
      '--card':d.card||'#FFFFFF',
      '--sidebar-bg':sidebar,
      '--text':d.text||'#2F2F2F',
      '--border':d.border||'#E2E2E2',
      '--danger':d.danger||'#C0392B',
      '--danger-dim':'rgba('+hexToRgb(d.danger||'#C0392B')+',.08)',
      '--info':d.info||'#4A7FC1',
      '--sidebar-active':'rgba('+hexToRgb(accent)+',.18)',
      '--header-h':d.headerH||'64px',
      '--sidebar-w':d.sidebarW||'256px',
      '--radius':d.radius||'6px',
      '--radius-sm':d.radiusSm||'3px',
      '--radius-lg':d.radiusLg||'8px',
      '--font':"'"+(d.font||'Manrope')+"',sans-serif",
    };
    const root=document.documentElement;
    Object.entries(vars).forEach(([k,v])=>root.style.setProperty(k,v));
    // Apply custom font if needed
    if(d.font&&d.font!=='Manrope'&&!document.querySelector('link[data-growfont]')){
      const lnk=document.createElement('link');
      lnk.rel='stylesheet';lnk.dataset.growfont='1';
      lnk.href='https://fonts.googleapis.com/css2?family='+encodeURIComponent(d.font)+':wght@300;400;500;600;700;800&display=swap';
      document.head.appendChild(lnk);
    }
    // Apply custom logo if set
    if(d.logoSvg){
      const svgEl=document.querySelector('.sidebar-logo svg');
      if(svgEl){svgEl.parentElement.innerHTML='<img src="'+d.logoSvg+'" style="max-height:64px;display:block;max-width:100%">';}
    }
  }catch(e){}
}

// Render sidebar user footer — resolves real name from TRACKR session first
function renderCSMUser() {
  // Append directly to .sidebar — mirrors TRACKR pattern exactly
  const existing = document.getElementById('csm-user-pill');
  if (existing) existing.remove();
  let username = 'User', role = '';
  try {
    // Always try TRACKR session first — it has the real display name
    const trackrDB  = JSON.parse(localStorage.getItem('mis-v1') || '{}');
    const trackrSes = JSON.parse(sessionStorage.getItem('mis-session-v1') || localStorage.getItem('mis-session-v1') || 'null');
    if (trackrSes?.memberId) {
      const member = (trackrDB.teamMembers || []).find(m => m.id === trackrSes.memberId);
      if (member?.name) {
        username = member.nickname || member.name;
        role     = { admin: 'Admin', team_manager: 'Manager', member: 'Member' }[member.role] || member.role || '';
      }
    }
    // Fall back to PAY session username only if no TRACKR member found
    if (username === 'User') {
      const paySess = JSON.parse(sessionStorage.getItem('mis-pay-session') || 'null');
      if (paySess && paySess.expires > Date.now() && paySess.username !== 'admin') {
        username = paySess.username;
        role = paySess.role === 'admin' ? 'Admin' : 'User';

// ── Tool execution ──────────────────────────────────────
function executeGrowTool(name, input) {
  try {
    if (name === 'get_pipeline_summary') {
      const wonStage  = (DB.columns || []).find(c => c.won);
      const lostStage = (DB.columns || []).find(c => c.lost);
      const cols = (DB.columns || []).slice().sort((a,b) => (a.order||0) - (b.order||0));
      // Stage→probability weighting (matches getGrowPipelineDeals in TRACKR)
      const weight = {};
      cols.forEach(c => {
        if (c.won)  return weight[c.id] = 1.0;
        if (c.lost) return weight[c.id] = 0;
        const custom = cols.filter(x => !x.won && !x.lost);
        const pos = custom.findIndex(x => x.id === c.id);
        weight[c.id] = custom.length > 1 ? (pos / (custom.length-1)) * 0.7 + 0.1 : 0.5;
      });
      const byStage = {};
      let totalPipelineValue = 0, totalWeighted = 0, wonValue = 0, lostValue = 0;
      const pipelineDealCount = (DB.deals || []).filter(d => d.stage !== wonStage?.id && d.stage !== lostStage?.id).length;
      (DB.deals || []).forEach(d => {
        const v = resolveDealValue(d).value || 0;
        const col = cols.find(c => c.id === d.stage);
        const stageName = col?.name || d.stage || 'Unstaged';
        if (!byStage[stageName]) byStage[stageName] = { count:0, value:0, weighted:0 };
        byStage[stageName].count++;
        byStage[stageName].value += v;
        byStage[stageName].weighted += v * (weight[d.stage] || 0);
        if (d.stage === wonStage?.id)       wonValue += v;
        else if (d.stage === lostStage?.id) lostValue += v;
        else { totalPipelineValue += v; totalWeighted += v * (weight[d.stage] || 0); }
      });
      const topDeals = (DB.deals || [])
        .filter(d => d.stage !== wonStage?.id && d.stage !== lostStage?.id)
        .map(d => ({ id: d.id, name: getDealName(d), value: resolveDealValue(d).value || 0, stage: cols.find(c => c.id === d.stage)?.name || d.stage }))
        .sort((a,b) => b.value - a.value)
        .slice(0, 10);
      return { success: true, data: {
        total_deal_count:    (DB.deals || []).length,
        pipeline_deal_count: pipelineDealCount,
        won_value:           Math.round(wonValue),
        lost_value:          Math.round(lostValue),
        pipeline_value:      Math.round(totalPipelineValue),
        weighted_pipeline:   Math.round(totalWeighted),
        currency:            DB.settings?.currency || 'USD',
        by_stage:            byStage,
        top_pipeline_deals:  topDeals,
      }};
    }

    if (name === 'get_deals') {
      const wonStage  = (DB.columns || []).find(c => c.won);
      const lostStage = (DB.columns || []).find(c => c.lost);
      const cols = DB.columns || [];
      let deals = (DB.deals || []);
      if (input.bucket === 'won')      deals = deals.filter(d => d.stage === wonStage?.id);
      else if (input.bucket === 'lost') deals = deals.filter(d => d.stage === lostStage?.id);
      else if (input.bucket === 'pipeline') deals = deals.filter(d => d.stage !== wonStage?.id && d.stage !== lostStage?.id);
      if (input.stage) {
        const s = String(input.stage).toLowerCase();
        deals = deals.filter(d => {
          const col = cols.find(c => c.id === d.stage);
          return d.stage === input.stage || (col?.name || '').toLowerCase() === s;
        });
      }
      if (input.client_id)     deals = deals.filter(d => d.clientId === input.client_id);
      if (input.introducer_id) deals = deals.filter(d => d.introducerId === input.introducer_id);
      if (typeof input.min_value === 'number') {
        deals = deals.filter(d => (resolveDealValue(d).value || 0) >= input.min_value);
      }
      const limit = Math.min(Math.max(1, input.limit || 50), 200);
      const total = deals.length;
      deals = deals.slice(0, limit);
      const today = new Date();
      return { success: true, data: {
        total_matching: total,
        returned: deals.length,
        deals: deals.map(d => {
          const col = cols.find(c => c.id === d.stage);
          const cli = getClients().find(c => c.id === d.clientId);
          const intr = (DB.introducers || []).find(r => r.id === d.introducerId);
          const v = resolveDealValue(d);
          // Days since createdAt as a rough "in pipeline" proxy
          const created = d.createdAt ? new Date(d.createdAt + 'T00:00:00') : null;
          const daysSince = created ? Math.floor((today - created) / 86400000) : null;
          return {
            id: d.id,
            name: getDealName(d) || '(unnamed)',
            client_id: d.clientId || null,
            client_name: cli?.name || null,
            stage_id: d.stage,
            stage_name: col?.name || d.stage,
            stage_type: col?.won ? 'won' : col?.lost ? 'lost' : 'pipeline',
            value: v.value,
            currency: v.currency,
            value_label: v.label || null,
            billing_type: d.billingType || null,
            days_in_pipeline: daysSince,
            won_at: d.wonAt || null,
            introducer_id: d.introducerId || null,
            introducer_name: intr?.name || null,
            introducer_commission_pct: d.introduction?.commission || 0,
          };
        }),
      }};
    }

    if (name === 'get_deal_details') {
      const d = (DB.deals || []).find(x => x.id === input.deal_id);
      if (!d) return { error: `Deal not found: ${input.deal_id}` };
      const cli = getClients().find(c => c.id === d.clientId);
      const col = (DB.columns || []).find(c => c.id === d.stage);
      const intr = (DB.introducers || []).find(r => r.id === d.introducerId);
      const proj = getTrackrProjectForDeal(d.id);
      let totalHours = 0, hoursCount = 0, invoiceCount = 0, invoiceTotal = 0, paidTotal = 0;
      try {
        const mis = JSON.parse(localStorage.getItem('mis-v1') || '{}');
        (mis.timeEntries || []).forEach(e => {
          if (e.projectId === d.id) { hoursCount++; totalHours += parseFloat(e.hours) || 0; }
        });
        (mis.invoices || []).forEach(i => {
          if (i.projectId !== d.id) return;
          invoiceCount++;
          invoiceTotal += parseFloat(i.amount) || 0;
          if (i.paymentDate || i.status === 'paid') paidTotal += parseFloat(i.amount) || 0;
        });
      } catch(_) {}
      const v = resolveDealValue(d);
      return { success: true, data: {
        id: d.id,
        name: getDealName(d) || '(unnamed)',
        client: cli ? { id: cli.id, name: cli.name } : null,
        stage: col?.name || d.stage,
        stage_type: col?.won ? 'won' : col?.lost ? 'lost' : 'pipeline',
        value: v.value, currency: v.currency, value_label: v.label || null,
        billing_type: d.billingType || null,
        contracted: proj ? {
          fixed_fee: proj.fixedFee || 0,
          retainer_monthly: proj.retainer?.monthlyFee || 0,
          retainer_hours_included: proj.retainer?.hoursIncluded || 0,
          variable_retainer_yearly: proj.variableRetainer?.yearlyBudget || 0,
          variable_retainer_rate: proj.variableRetainer?.hourlyRate || 0,
          change_orders_count: (proj.changeOrders || []).length,
        } : null,
        introducer: intr ? {
          id: intr.id, name: intr.name, company: intr.company || null,
          commission_pct: d.introduction?.commission || 0,
        } : null,
        notes: d.notes || '',
        start_date: d.startDate || null,
        end_date: d.endDate || null,
        created_at: d.createdAt || null,
        won_at: d.wonAt || null,
        time_entries_count: hoursCount,
        total_hours: Math.round(totalHours * 10) / 10,
        invoice_count: invoiceCount,
        invoice_total: invoiceTotal,
        invoice_paid: paidTotal,
      }};
    }

    if (name === 'get_introducer_summary') {
      const wonStage  = (DB.columns || []).find(c => c.won);
      const lostStage = (DB.columns || []).find(c => c.lost);
      const result = (DB.introducers || []).map(intr => {
        const intrDeals = (DB.deals || []).filter(d => d.introducerId === intr.id);
        let wonComm = 0, pendingComm = 0;
        const breakdown = intrDeals.map(d => {
          const v = resolveDealValue(d).value || 0;
          const pct = d.introduction?.commission || 0;
          const isWon = d.stage === wonStage?.id;
          const isLost = d.stage === lostStage?.id;
          const comm = isLost ? 0 : v * (pct / 100);
          if (isWon)       wonComm += comm;
          else if (!isLost) pendingComm += comm;
          return {
            deal_id: d.id, deal_name: getDealName(d) || '(unnamed)',
            stage: (DB.columns || []).find(c => c.id === d.stage)?.name || d.stage,
            value: v, commission_pct: pct, commission_amount: Math.round(comm),
          };
        });
        return {
          id: intr.id, name: intr.name, company: intr.company || null,
          email: intr.email || null,
          deal_count: intrDeals.length,
          won_commission_total: Math.round(wonComm),
          pending_commission_total: Math.round(pendingComm),
          deals: breakdown,
        };
      }).sort((a,b) => b.won_commission_total - a.won_commission_total);
      return { success: true, data: {
        introducer_count: result.length,
        introducers: result,
      }};
    }

    if (name === 'get_stale_deals') {
      const threshold = input.days_since_update || 14;
      const wonStage  = (DB.columns || []).find(c => c.won);
      const lostStage = (DB.columns || []).find(c => c.lost);
      const today = new Date();
      const stale = (DB.deals || [])
        .filter(d => d.stage !== wonStage?.id && d.stage !== lostStage?.id)
        .map(d => {
          // Use createdAt as proxy for last-modified; deals don't track updatedAt yet
          const created = d.createdAt ? new Date(d.createdAt + 'T00:00:00') : null;
          const days = created ? Math.floor((today - created) / 86400000) : null;
          return { d, days };
        })
        .filter(x => x.days !== null && x.days >= threshold)
        .sort((a,b) => b.days - a.days);
      return { success: true, data: {
        threshold_days: threshold,
        count: stale.length,
        deals: stale.slice(0, 30).map(({ d, days }) => {
          const cli = getClients().find(c => c.id === d.clientId);
          const col = (DB.columns || []).find(c => c.id === d.stage);
          return {
            id: d.id, name: getDealName(d) || '(unnamed)',
            client_name: cli?.name || null,
            stage: col?.name || d.stage,
            value: resolveDealValue(d).value,
            days_since_created: days,
          };
        }),
      }};
    }

    if (name === 'update_deal_notes') {
      const d = (DB.deals || []).find(x => x.id === input.deal_id);
      if (!d) return { error: `Deal not found: ${input.deal_id}` };
      const note = String(input.note || '').trim();
      if (!note) return { error: 'Note text is required' };
      const today = new Date().toISOString().slice(0,10);
      const stamped = `[${today}] ${note}`;
      const updated = { ...d, notes: d.notes ? `${d.notes}\n\n${stamped}` : stamped };
      dealCommit(updated);
      saveDB();
      // Re-derive deals from the persisted store so the verified block reflects
      // what's actually saved, not the in-flight payload.
      syncDealsFromProjects();
      const verified = (DB.deals || []).find(x => x.id === d.id);
      return {
        success: true,
        message: `Added note to "${getDealName(d) || d.id}"`,
        verified: { deal_id: verified?.id, notes_length: (verified?.notes || '').length, last_note_includes: stamped },
      };
    }

    if (name === 'set_introducer_commission') {
      const d = (DB.deals || []).find(x => x.id === input.deal_id);
      if (!d) return { error: `Deal not found: ${input.deal_id}` };
      if (!d.introducerId) return { error: 'This deal has no introducer — assign one first via the deal modal' };
      const pct = Number(input.commission_pct);
      if (!isFinite(pct) || pct < 0 || pct > 100) return { error: 'commission_pct must be a number between 0 and 100' };
      const updated = { ...d, introduction: { ...(d.introduction || {}), commission: pct } };
      dealCommit(updated);
      saveDB();
      syncDealsFromProjects();
      const verified = (DB.deals || []).find(x => x.id === d.id);
      return {
        success: true,
        message: `Set introducer commission on "${getDealName(d) || d.id}" to ${pct}%`,
        verified: { deal_id: verified?.id, commission_pct: verified?.introduction?.commission ?? null, introducer_id: verified?.introducerId || null },
      };
    }

    return { error: `Unknown tool: ${name}` };
  } catch(e) {
    return { error: `Tool ${name} threw: ${e?.message || String(e)}` };
  }
}

// ── System prompt — view-specific context ───────────────
function buildGrowChatSystemPrompt(viewName) {
  const today = new Date().toISOString().slice(0,10);
  const dc = DB.settings?.currency || 'USD';
  const wonStage  = (DB.columns || []).find(c => c.won);
  const lostStage = (DB.columns || []).find(c => c.lost);
  const cols = (DB.columns || []).slice().sort((a,b) => (a.order||0) - (b.order||0));
  const stageList = cols.map(c => `${c.id} (${c.name}${c.won?', WON':c.lost?', LOST':''})`).join(', ');

  const COMMON = `You are an AI assistant inside the Grow CRM app for mis.studio. Today is ${today}. Default currency is ${dc}.

You have read + limited write access to the pipeline. Mutating tools (update_deal_notes, set_introducer_commission) should be PROPOSED first — explain what you'll do and wait for the user to confirm in the chat before invoking them. Read tools (get_*) you can call freely without confirmation.

Pipeline stages in this workspace: ${stageList}.

Style:
- Be concise. Use short bullets or numbered lists.
- When summarising, lead with the headline number; details on follow-up.
- Format currency naturally ($50k, £2.4M); for clarity use full numbers in tables.
- Don't list every deal unless asked — give counts + top entries.

`;

  if (viewName === 'pipeline') {
    const total  = (DB.deals || []).length;
    const won    = (DB.deals || []).filter(d => d.stage === wonStage?.id).length;
    const lost   = (DB.deals || []).filter(d => d.stage === lostStage?.id).length;
    const live   = total - won - lost;
    return COMMON + `You're on the PIPELINE page — kanban view of all deals across the stages above.

**Quick stats:** ${total} deals total — ${live} in pipeline, ${won} won, ${lost} lost.

**Useful tools here:** get_pipeline_summary, get_deals (filter by stage/bucket/client/introducer), get_deal_details, get_stale_deals, update_deal_notes, set_introducer_commission.

**Common asks:**
- "What's our weighted pipeline?" → get_pipeline_summary
- "What deals are stuck?" → get_stale_deals
- "Tell me about the Acme deal" → get_deals to find it, then get_deal_details
- "Add a note to that deal: had a great call, sending proposal Friday" → update_deal_notes (confirm first)
- "Bump the commission on X to 12%" → set_introducer_commission (confirm first)`;
  }

  if (viewName === 'introducers') {
    const introducerCount = (DB.introducers || []).length;
    return COMMON + `You're on the INTRODUCERS page — referral partners and the deals they've brought in.

**Workspace has ${introducerCount} introducer${introducerCount===1?'':'s'}.**

**Useful tools here:** get_introducer_summary (full breakdown), get_deals with introducer_id filter, set_introducer_commission, get_deal_details.

**Common asks:**
- "Who are our top introducers?" → get_introducer_summary
- "How much commission do we owe James Wong?" → get_introducer_summary
- "What deals did Acme Partners bring in?" → get_deals with their introducer_id`;
  }

  return COMMON + `You're in Grow. Use the tools to answer questions about pipeline data.`;
}

  let panel = document.getElementById('page-chat-panel');

    panel.id = 'page-chat-panel';
    panel.style.cssText = `
      position:fixed;top:0;right:0;bottom:0;width:440px;max-width:92vw;
      background:#fff;border-left:1px solid var(--border);
      box-shadow:-12px 0 32px rgba(0,0,0,0.06);
      display:flex;flex-direction:column;z-index:9000;
      transform:translateX(100%);transition:transform 0.25s ease;
      font-family:var(--font);
    `;
    document.body.appendChild(panel);
    requestAnimationFrame(() => { panel.style.transform = 'translateX(0)'; });
  }
  const titleMap = { pipeline: 'Pipeline', introducers: 'Introducers' };
  const pageTitle = titleMap[viewName] || viewName;
  panel.innerHTML = `
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0">
      <div>
        <div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px">Ask &amp; Act</div>
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-top:2px">${pageTitle}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" id="page-chat-clear" title="Clear conversation for this page">Clear</button>
        <button class="btn btn-ghost btn-sm" id="page-chat-close" title="Close" style="font-size:18px;padding:0 10px">×</button>
      </div>
    </div>
    <div id="page-chat-list" style="flex:1;overflow-y:auto;padding:12px 14px"></div>
    <div style="padding:10px 12px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0">
      <div style="display:flex;gap:8px;align-items:flex-end">
        <textarea id="page-chat-input" placeholder="Ask about this page or instruct an action…" rows="2" style="flex:1;resize:none;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;line-height:1.45;outline:none;min-height:38px;max-height:120px;background:#fff"></textarea>
        <button class="btn btn-primary" id="page-chat-send" style="height:38px;padding:0 14px;flex-shrink:0">Send</button>
      </div>
      <div style="margin-top:6px;font-size:10.5px;color:var(--text-3);line-height:1.4">⏎ to send · Shift+⏎ for new line · Tools: ${GROW_TOOLS.length} available</div>
    </div>
  `;
  renderPageChatHistory(viewName);
  panel.querySelector('#page-chat-close').onclick = () => closePageChat();
  panel.querySelector('#page-chat-clear').onclick = () => {
    if (!confirm('Clear the conversation for this page?')) return;
    if (DB.pageChatHistory) DB.pageChatHistory[viewName] = [];
    saveDB();
    renderPageChatHistory(viewName);
  };
  const input = panel.querySelector('#page-chat-input');
  const send  = panel.querySelector('#page-chat-send');
  const submit = () => {
    const t = input.value.trim();
    if (!t || _pageChatBusy) return;
    input.value = '';
    runPageChatTurn(viewName, t);
  };
  send.onclick = submit;
  input.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } };
  setTimeout(() => input.focus(), 100);
}

function openPageChat(viewName) {
  _pageChatOpen = true;
  renderPageChatPanel(viewName);
  const btn = document.getElementById('page-chat-btn');
  if (btn) btn.style.background = 'var(--border)';
}

function closePageChat() {
  _pageChatOpen = false;
  const panel = document.getElementById('page-chat-panel');
  if (panel) {
    panel.style.transform = 'translateX(100%)';
    setTimeout(() => panel.remove(), 250);
  }
  const btn = document.getElementById('page-chat-btn');
  if (btn) btn.style.background = 'var(--bg)';
}

function updatePageChatButton() {
  const btn = document.getElementById('page-chat-btn');
  if (!btn) return;
  // Read role from TRACKR session — Grow doesn't have its own role system
  let isAdmin = false;
  try {
    const sess = JSON.parse(sessionStorage.getItem('mis-session-v1') || localStorage.getItem('mis-session-v1') || 'null');
    if (sess?.memberId) {
      const trackrDB = JSON.parse(localStorage.getItem('mis-v1') || '{}');
      const member = (trackrDB.teamMembers || []).find(m => m.id === sess.memberId);
      isAdmin = member?.role === 'admin';
    }
  } catch(_) {}
  const supported = PAGE_CHAT_SUPPORTED.includes(currentView);
  if (isAdmin && supported) {
    btn.style.display = 'flex';
    btn.onclick = () => {
      if (_pageChatOpen) closePageChat();
      else openPageChat(currentView);
    };
  } else {
    btn.style.display = 'none';
    if (_pageChatOpen) closePageChat();
  }
  if (_pageChatOpen && supported) renderPageChatPanel(currentView);
}

function renderPageChatHistory(viewName) {
  const list = document.getElementById('page-chat-list');
  if (!list) return;
  if (!DB.pageChatHistory) DB.pageChatHistory = {};
  const chat = DB.pageChatHistory[viewName] || [];
  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const renderInline = txt => {
    let s = esc(txt);
    s = s.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g, '<em>$1</em>');
    return s;
  };
  const renderText = text => (text||'').split('\n').map(line => {
    const t = line.trim();
    if (!t) return '<div style="height:6px"></div>';
    const numMatch = t.match(/^(\d+)\.\s+(.*)$/);
    if (numMatch) return `<div style="display:flex;gap:8px;padding:2px 0"><span style="font-weight:700;color:var(--text-3);min-width:16px">${numMatch[1]}.</span><span>${renderInline(numMatch[2])}</span></div>`;
    const bulletMatch = t.match(/^[-•*]\s+(.*)$/);
    if (bulletMatch) return `<div style="display:flex;gap:8px;padding:2px 0"><span style="color:var(--text-3);font-weight:700">•</span><span>${renderInline(bulletMatch[1])}</span></div>`;
    return `<div style="margin:3px 0">${renderInline(t)}</div>`;
  }).join('');

  if (!chat.length) {
    const placeholders = {
      pipeline: 'Try: "What\'s our weighted pipeline?" or "Find deals stuck for over 30 days" or "Tell me about the Acme deal"',
      introducers: 'Try: "Who are our top introducers?" or "How much commission is pending for James?"',
    };
    list.innerHTML = `<div style="padding:24px;color:var(--text-3);font-size:13px;line-height:1.6;text-align:center">
      <div style="font-size:14px;font-weight:600;color:var(--text-2);margin-bottom:8px">Ask &amp; Act on this page</div>
      <div style="font-size:12.5px">${placeholders[viewName] || 'Ask anything about this page.'}</div>
      <div style="font-size:11px;color:var(--text-3);margin-top:14px;line-height:1.5">For mutations the AI will <strong>propose first</strong> and wait for your confirmation. Read-only questions get answered immediately.</div>
    </div>`;
    return;
  }

  list.innerHTML = chat.map(m => {
    const when = new Date(m.ts).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    if (m.role === 'user') {
      return `<div style="display:flex;justify-content:flex-end;margin:8px 0">
        <div style="max-width:85%;padding:8px 12px;background:var(--accent);color:#fff;border-radius:12px 12px 2px 12px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word">${esc(m.content)}</div>
      </div>`;
    }
    const actionsHTML = (m.actionsTaken && m.actionsTaken.length) ? `
      <div style="margin-top:8px;padding:7px 9px;background:var(--bg);border-radius:6px;border:1px dashed var(--border);font-size:11px">
        <div style="font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-3);margin-bottom:4px">Tool activity</div>
        ${m.actionsTaken.map(a => {
          const ok = !a.result?.error;
          const isRead = (a.tool || '').startsWith('get_');
          const icon = !ok ? '⚠' : isRead ? '🔍' : '✓';
          let label;
          if (a.result?.message) label = a.result.message;
          else if (a.result?.error) label = a.result.error;
          else label = a.tool;
          const colour = !ok ? 'var(--danger)' : isRead ? 'var(--text-3)' : 'var(--accent)';
          return `<div style="display:flex;gap:5px;align-items:flex-start;color:${colour};margin:1px 0"><span>${icon}</span><span style="color:var(--text-2)">${esc(label)}</span></div>`;
        }).join('')}
      </div>` : '';
    return `<div style="display:flex;justify-content:flex-start;margin:8px 0">
      <div style="max-width:90%;padding:9px 12px;background:#fff;border:1px solid var(--border);border-radius:12px 12px 12px 2px;font-size:13px;line-height:1.5;color:var(--text)">${renderText(m.content)}${actionsHTML}<div style="margin-top:5px;font-size:10px;color:var(--text-3)">${when}</div></div>
    </div>`;
  }).join('');
  list.scrollTop = list.scrollHeight;
}

  if (send)  { send.disabled = busy; send.innerHTML = busy ? '<span style="opacity:.7">Working…</span>' : 'Send'; }

}

// ── Turn machinery ─────────────────────────────────────
async function runPageChatTurn(viewName, userText) {
  // API key is shared from TRACKR's settings (we already share mis-v1)
  let apiKey = '';
  try {
    const trackrDB = JSON.parse(localStorage.getItem('mis-v1') || '{}');
    apiKey = trackrDB?.settings?.anthropicApiKey || localStorage.getItem('mis-anthropic-key') || '';
  } catch(_) {}
  if (!apiKey) {
    toast('Set your Anthropic API key in TRACKR → Settings → AI Features first', 'error');
    return;
  }
  if (!userText.trim() || _pageChatBusy) return;
  _pageChatBusy = true;
  if (!DB.pageChatHistory) DB.pageChatHistory = {};
  if (!Array.isArray(DB.pageChatHistory[viewName])) DB.pageChatHistory[viewName] = [];

  DB.pageChatHistory[viewName].push({ id: 'msg_'+Date.now(), role: 'user', content: userText.trim(), ts: Date.now() });
  saveDB();
  renderPageChatHistory(viewName);
  setPageChatBusyUI(true);

  let model = 'claude-sonnet-4-6';
  try {
    const trackrDB = JSON.parse(localStorage.getItem('mis-v1') || '{}');
    if (trackrDB?.settings?.aiModel) model = trackrDB.settings.aiModel;
  } catch(_) {}

  const systemPrompt = buildGrowChatSystemPrompt(viewName);
  const messages = DB.pageChatHistory[viewName]
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .map(m => ({ role: m.role, content: m.content }));
  const messagesForApi = [...messages];
  const actionsTaken = [];
  let finalText = '', lastError = '';
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 90000);

  try {
    for (let round = 0; round < 6; round++) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model, max_tokens: 1500, system: systemPrompt, tools: GROW_TOOLS, messages: messagesForApi }),
        signal: controller.signal,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) { lastError = data?.error?.message || `HTTP ${res.status}`; break; }
      messagesForApi.push({ role: 'assistant', content: data.content });
      const toolUses = (data.content || []).filter(b => b.type === 'tool_use');
      if (!toolUses.length) {
        finalText = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
        break;
      }
      const toolResults = [];
      for (const tu of toolUses) {
        const result = executeGrowTool(tu.name, tu.input || {});
        actionsTaken.push({ tool: tu.name, input: tu.input || {}, result });
        toolResults.push({
          type: 'tool_result', tool_use_id: tu.id,
          content: JSON.stringify(result), is_error: !!result.error,
        });
      }
      messagesForApi.push({ role: 'user', content: toolResults });
    }
  } catch(e) {
    lastError = e.name === 'AbortError' ? 'Request timed out after 90s' : (e.message || String(e));
  } finally {
    clearTimeout(timeoutId);
  }
  if (!finalText) finalText = lastError ? `❌ ${lastError}` : 'No response from AI.';

  DB.pageChatHistory[viewName].push({ id: 'msg_'+Date.now(), role: 'assistant', content: finalText, ts: Date.now(), actionsTaken });
  if (DB.pageChatHistory[viewName].length > 50) {
    DB.pageChatHistory[viewName] = DB.pageChatHistory[viewName].slice(-50);
  }
  saveDB();
  _pageChatBusy = false;
  setPageChatBusyUI(false);
  renderPageChatHistory(viewName);
  // If a mutating tool ran, refresh the underlying view
  if (actionsTaken.some(a => !a.tool.startsWith('get_'))) {
    syncDealsFromProjects();
    if (!_pageChatOpen || currentView !== viewName) return;
    renderView(); // refresh underlying page; drawer survives because it's appended to body
  }
}

// Cross-tab sync: when TRACKR writes to mis-v1, re-render views that use client/project data
// Pending flag for storage-event re-renders. dealCommit fires synchronous
// storage events that would otherwise destroy DOM mid-event-handler (breaking
// focus chains). Coalesce rapid events into a single deferred render.
let _storageRenderPending = false;
window.addEventListener('storage', e => {
  if (e.key !== 'mis-v1') return;
  // Re-apply design tokens immediately — cross-app visual lockstep with TRACKR/PAY
  applyDesignFromTrackr();
  // Refresh the derived deals view from the unified store synchronously so
  // any read between now and the next render hits up-to-date data.
  syncDealsFromProjects();
  // Defer the re-render so the current event handler finishes (and DOM stays
  // alive long enough for click-to-next-field, focus chains, etc.).
  if (_storageRenderPending) return;
  _storageRenderPending = true;
  setTimeout(() => {
    _storageRenderPending = false;
    if (['clients', 'pipeline', 'health', 'introducers'].includes(currentView)
        && !document.querySelector('.modal-overlay')) renderView();
  }, 0);
});

// Boot: pull from Supabase if configured, then render
(async () => {
  const pulled = await growSupaPull();
  // If the pull brought fresh data from another device, design tokens may have changed too —
  // re-apply so a colour edit on another machine immediately re-skins grow without a refresh.
  if (pulled) applyDesignFromTrackr();
  // Refresh derived deals view from the unified mis-v1.projects store
  syncDealsFromProjects();
  renderCSMUser();

  (function checkGrowAccess() {
    try {
      const trackrSess = JSON.parse(sessionStorage.getItem('mis-session-v1') || localStorage.getItem('mis-session-v1') || 'null');
      if (trackrSess?.memberId || trackrSess?.loggedIn) {
        // TRACKR user — check role permission
        const trackrDB = JSON.parse(localStorage.getItem('mis-v1') || '{}');
        const member = (trackrDB.teamMembers || []).find(m => m.id === trackrSess.memberId);
        if (member) {
          const role = member.role || 'member';
          const perms = (trackrDB.rolePermissions || {})[role] || [];
          if (role !== 'admin' && !perms.includes('access_grow')) {
            showGrowBlocked();
            return;
          }
        }
        return; // admin or has permission
      }
      // PAY-only user — check growAccess flag
      const paySess = JSON.parse(sessionStorage.getItem('mis-pay-session') || 'null');
      if (!paySess || paySess.expires <= Date.now()) return;
      if (paySess.role === 'admin') return;
      const payDB = JSON.parse(localStorage.getItem('payroll-v1') || '{}');
      const payUser = (payDB.settings?.payUsers || []).find(u => u.username === paySess.username);
      if (!payUser || !payUser.growAccess) { showGrowBlocked(); return; }
    } catch(_) {}

    function showGrowBlocked() {
      document.getElementById('main-content').innerHTML = '';
      document.querySelector('.main').innerHTML =
        '<div style="flex:1;display:flex;align-items:center;justify-content:center;background:#F2F1EE">'
        + '<div style="text-align:center;padding:40px">'
        + '<div style="font-size:48px;margin-bottom:16px">🔒</div>'
        + '<div style="font-size:22px;font-weight:700;color:#2F2F2F;margin-bottom:8px">Access Restricted</div>'
        + '<div style="font-size:14px;color:#898987;max-width:320px;line-height:1.6;margin-bottom:24px">Your account doesn\'t have permission to access Grow. Contact your administrator.</div>'
        + '<a href="trackr.html" style="display:inline-block;padding:10px 20px;background:#678F2F;color:#fff;border-radius:6px;text-decoration:none;font-size:14px;font-weight:600">← Back to Sign In</a>'
        + '</div></div>';
    }
  })();

  renderView();
  setTimeout(initGrowRealtime, 1000);
})();
</script>
