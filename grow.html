// ════════════════════════════════════════════════════════
//  CLIENT HEALTH
// ════════════════════════════════════════════════════════
const HEALTH_CATS = [
  { id:'communication', label:'Communication' },
  { id:'delivery',      label:'Delivery / Output' },
  { id:'satisfaction',  label:'Client Satisfaction' },
  { id:'relationship',  label:'Relationship' },
  { id:'risk',          label:'Risk Level' },
];

function ragFromScores(scores) {
  if (!scores || !Object.keys(scores).length) return 'gray';
  const vals = Object.values(scores).filter(Boolean);
  if (!vals.length) return 'gray';
  const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
  if (avg >= 4) return 'green';
  if (avg >= 2.5) return 'amber';
  return 'red';
}

function ragLabel(rag) {
  return { green:'Healthy', amber:'Needs Attention', red:'At Risk', gray:'No Data' }[rag] || 'No Data';
}

function latestHealthMonth(contactId) {
  const months = Object.keys(DB.health[contactId] || {}).sort().reverse();
  return months[0] || null;
}

function renderHealth(el, acts) {
  const wonDeals = DB.deals.filter(d => {
    const col = DB.columns.find(c => c.id === d.stage);
    return col?.won;
  });

  if (!wonDeals.length) {
    el.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#ADADAB">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#E2E2E2" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      <p style="font-size:14px">No closed won clients yet.</p>
      <p style="font-size:14px">Move a deal to Closed Won in the Pipeline to track their health here.</p>
    </div>`;
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'health-grid';
  el.appendChild(grid);

  wonDeals.forEach(deal => {
    const _team = getTeam();
    const tl   = deal.teamLead ? _team.find(t => t.id === deal.teamLead) : null;
    const tech = deal.techLead ? _team.find(t => t.id === deal.techLead) : null;
    const latestMonth = latestHealthMonth(deal.id);
    const latestData  = latestMonth ? (DB.health[deal.id]?.[latestMonth] || {}) : {};
    const rag = ragFromScores(latestData.scores);

    const card = document.createElement('div');
    card.className = 'health-card';
    card.innerHTML = `
      <div class="health-card-header">
        <div>
          <div style="font-size:14px;font-weight:700;margin-bottom:3px">${getDealName(deal)}</div>
          <div style="font-size:14px;color:#898987">${getClients().find(c=>c.id===deal.clientId)?.name || deal.company || ''}</div>
          <div style="display:flex;gap:6px;margin-top:7px;flex-wrap:wrap">
            ${tl   ? `<span class="badge badge-gray">AL: ${tl.name}</span>` : '<span class="badge badge-gray" style="color:#ADADAB">No Account Lead</span>'}
            ${tech ? `<span class="badge badge-blue">Tech: ${tech.name}</span>` : ''}
          </div>
        </div>
        <div style="text-align:right">
          <div class="rag-dot rag-${rag}" style="width:14px;height:14px;margin-left:auto;margin-bottom:4px"></div>
          <div style="font-size:11px;font-weight:700;color:${rag==='green'?'#678F2F':rag==='amber'?'#E07030':rag==='red'?'#C0392B':'#ADADAB'}">${ragLabel(rag)}</div>
          ${latestMonth ? `<div style="font-size:10px;color:#ADADAB;margin-top:2px">${latestMonth}</div>` : ''}
        </div>
      </div>
      <div class="health-card-body">
        ${HEALTH_CATS.map(cat => {
          const score = latestData.scores?.[cat.id] || 0;
          const dotColor = score>=4?'#678F2F':score>=3?'#9BC25A':score>=2?'#E07030':score>=1?'#C0392B':'#E2E2E2';
          return `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:11px;color:#898987">${cat.label}</span>
            <div style="display:flex;gap:3px">
              ${[1,2,3,4,5].map(i=>`<div style="width:10px;height:10px;border-radius:50%;background:${i<=score?dotColor:'#F0EFED'};border:1px solid ${i<=score?dotColor:'#E2E2E2'}"></div>`).join('')}
            </div>
          </div>`;
        }).join('')}
        ${latestData.notes ? `<div style="font-size:11px;color:#898987;margin-top:8px;padding-top:8px;border-top:1px solid #F2F1EE;line-height:1.5">${latestData.notes}</div>` : ''}
      </div>
    `;
    card.addEventListener('click', () => showHealthModal(deal));
    grid.appendChild(card);
  });
}

function showHealthModal(deal) {
  // Generate last 12 months
  const today = new Date();
  const months = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }

  if (!DB.health[deal.id]) DB.health[deal.id] = {};

  let _selMonth = latestHealthMonth(deal.id) || months[0];

  const _tm  = getTeam();
  const tl   = deal.teamLead ? _tm.find(t => t.id === deal.teamLead) : null;
  const tech = deal.techLead ? _tm.find(t => t.id === deal.techLead) : null;
  const teamOptions = _tm.map(t => `<option value="${t.id}">${memberShortName(t)}</option>`).join('');

  function buildContent() {
    const data = DB.health[deal.id]?.[_selMonth] || { scores:{}, notes:'', teamLead: deal.teamLead, techLead: deal.techLead };
    const rag = ragFromScores(data.scores);
    return `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div>
          <div style="font-size:15px;font-weight:700">${getDealName(deal)}</div>
          <div style="font-size:13px;color:#898987">${getClients().find(c=>c.id===deal.clientId)?.name || deal.company || ''}</div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <span class="badge ${rag==='green'?'badge-green':rag==='amber'?'badge-amber':rag==='red'?'badge-red':'badge-gray'}">${ragLabel(rag)}</span>
        </div>
      </div>
      <div class="month-strip" id="h-month-strip">
        ${months.map(m => `<button class="month-pill ${m===_selMonth?'active':''}" data-m="${m}">${m}</button>`).join('')}
      </div>
      <div class="section-divider">Assigned Leads</div>
      <div class="form-row">
        <div class="form-group">
          <label>Account Lead</label>
          <select id="h-tl"><option value="">— None —</option>${teamOptions}</select>
        </div>
        <div class="form-group">
          <label>Technical Lead</label>
          <select id="h-tech"><option value="">— None —</option>${teamOptions}</select>
        </div>
      </div>
      <div class="section-divider">Health Scores — ${_selMonth}</div>
      ${HEALTH_CATS.map(cat => `
        <div class="health-score-row">
          <div class="score-label">${cat.label}</div>
          <div class="score-dots" id="sdots-${cat.id}">
            ${[1,2,3,4,5].map(i => `<div class="score-dot s${i} ${(data.scores?.[cat.id]||0)>=i?'sel':''}" data-cat="${cat.id}" data-v="${i}"></div>`).join('')}
          </div>
          <div style="font-size:14px;color:#ADADAB;margin-left:8px" id="slbl-${cat.id}">${['—','Critical','Poor','Fair','Good','Excellent'][data.scores?.[cat.id]||0]}</div>
        </div>
      `).join('')}
      <div class="form-row" style="margin-top:14px">
        <div class="form-group full">
          <label>Notes for ${_selMonth}</label>
          <textarea id="h-notes">${data.notes||''}</textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Close</button>
        <button class="btn btn-primary" id="h-save">Save</button>
      </div>
    `;
  }

  const o = showModal(`Client Health — ${getDealName(deal)}`, buildContent(), '580px');

  // Pre-select leads
  const curData = DB.health[deal.id]?.[_selMonth] || {};
  o.querySelector('#h-tl').value   = curData.teamLead  || deal.teamLead  || '';
  o.querySelector('#h-tech').value = curData.techLead || deal.techLead || '';

  function rewire() {
    o.querySelector('.modal-body').innerHTML = buildContent();
    const d = DB.health[deal.id]?.[_selMonth] || {};
    o.querySelector('#h-tl').value   = d.teamLead  || deal.teamLead  || '';
    o.querySelector('#h-tech').value = d.techLead || deal.techLead || '';
    bindEvents();
  }

  function bindEvents() {
    // Month pills
    o.querySelectorAll('.month-pill').forEach(btn => {
      btn.addEventListener('click', () => { _selMonth = btn.dataset.m; rewire(); });
    });

    // Score dots
    o.querySelectorAll('.score-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        const cat = dot.dataset.cat, v = parseInt(dot.dataset.v);
        const m = _selMonth;
        if (!DB.health[deal.id][m]) DB.health[deal.id][m] = { scores:{}, notes:'' };
        const cur = DB.health[deal.id][m].scores?.[cat] || 0;
        DB.health[deal.id][m].scores = DB.health[deal.id][m].scores || {};
        DB.health[deal.id][m].scores[cat] = cur === v ? 0 : v; // toggle off if same
        saveDB();
        // Update dots inline
        const dots = o.querySelectorAll(`[data-cat="${cat}"]`);
        const newV = DB.health[deal.id][m].scores[cat];
        dots.forEach(d => { d.classList.toggle('sel', parseInt(d.dataset.v) <= newV); });
        o.querySelector(`#slbl-${cat}`).textContent = ['—','Critical','Poor','Fair','Good','Excellent'][newV];
      });
    });

    // Save
    o.querySelector('#h-save')?.addEventListener('click', () => {
      const m = _selMonth;
      if (!DB.health[deal.id][m]) DB.health[deal.id][m] = { scores:{}, notes:'' };
      DB.health[deal.id][m].notes    = o.querySelector('#h-notes').value.trim();
      DB.health[deal.id][m].teamLead = o.querySelector('#h-tl').value || null;
      DB.health[deal.id][m].techLead = o.querySelector('#h-tech').value || null;
      // Also update deal leads (writes to mis-v1.projects via dealCommit)
      deal.teamLead = DB.health[deal.id][m].teamLead;
      deal.techLead = DB.health[deal.id][m].techLead;
      dealCommit(deal);
      saveDB();
      o.remove();
      renderView();
      toast('Health record saved ✓');
    });
  }

  bindEvents();
}

// ════════════════════════════════════════════════════════
//  INTRODUCERS
// ════════════════════════════════════════════════════════
function renderIntroducers(el, acts) {
  const introducers = DB.introducers || [];
  const deals       = DB.deals || [];

  // Topbar — Add Introducer button
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary btn-sm';
  addBtn.textContent = '+ Add Introducer';
  acts.appendChild(addBtn);
  addBtn.onclick = () => showIntroducerModal(null, () => renderView());

  // Bucket every introducer-attached deal into pipeline vs won. Lost deals
  // are excluded from both totals (no commission owed). For won deals we
  // use resolveDealValue() so the commission tracks the actual contracted
  // amount in TRACKR (including change orders), matching the pipeline column.
  function dealBucket(d) {
    const col = DB.columns.find(c => c.id === d.stage);
    if (col?.won)  return 'won';
    if (col?.lost) return 'lost';
    return 'pipeline';
  }
  function dealValueForBucket(d, bucket) {
    if (bucket === 'won') return resolveDealValue(d).value || 0;
    return d.value || 0;
  }

  const introducerDeals = deals.filter(d => d.introducerId);
  const totalDeals = introducerDeals.length;
  let pipelineCommission = 0;
  let wonCommission = 0;
  introducerDeals.forEach(d => {
    const pct = d.introduction?.commission || 0;
    if (!pct) return;
    const bucket = dealBucket(d);
    if (bucket === 'lost') return;
    const value = dealValueForBucket(d, bucket);
    const commission = value * (pct / 100);
    if (bucket === 'won') wonCommission += commission;
    else                  pipelineCommission += commission;
  });
  const curr = DB.settings.currency || 'USD';

  el.innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap">
      <div class="card" style="flex:1;min-width:180px;padding:16px 20px">
        <div class="lbl" style="margin-bottom:4px">Introducers</div>
        <div style="font-size:28px;font-weight:300;color:var(--text)">${introducers.length}</div>
      </div>
      <div class="card" style="flex:1;min-width:180px;padding:16px 20px">
        <div class="lbl" style="margin-bottom:4px">Deals Introduced</div>
        <div style="font-size:28px;font-weight:300;color:var(--text)">${totalDeals}</div>
      </div>
      <div class="card" style="flex:1;min-width:180px;padding:16px 20px" title="Commission exposure on deals still in pipeline (not yet won or lost)">
        <div class="lbl" style="margin-bottom:4px">Pipeline Commission</div>
        <div style="font-size:28px;font-weight:300;color:var(--text-2)">${fmtVal(pipelineCommission, curr)}</div>
      </div>
      <div class="card" style="flex:1;min-width:180px;padding:16px 20px" title="Commission earned on Closed Won deals — uses the contracted project value from TRACKR (incl. change orders)">
        <div class="lbl" style="margin-bottom:4px">Won Commission</div>
        <div style="font-size:28px;font-weight:300;color:var(--accent)">${fmtVal(wonCommission, curr)}</div>
      </div>
    </div>
    ${introducers.length === 0 ? `
      <div class="card">
        <div class="empty-state">
          <p>No introducers yet. Add someone who referred a deal to start tracking commissions.</p>
        </div>
      </div>` : introducers.map(intr => {
        const intrDeals = deals.filter(d => d.introducerId === intr.id);
        let intrPipeline = 0;
        let intrWon      = 0;
        intrDeals.forEach(d => {
          const pct = d.introduction?.commission || 0;
          if (!pct) return;
          const bucket = dealBucket(d);
          if (bucket === 'lost') return;
          const value = dealValueForBucket(d, bucket);
          const commission = value * (pct / 100);
          if (bucket === 'won') intrWon += commission;
          else                  intrPipeline += commission;
        });
        const dealCount = intrDeals.length;
        const hasAny = intrPipeline > 0 || intrWon > 0;
        return `
        <div class="card mb-20" id="intr-card-${intr.id}">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:${dealCount?'16px':'0'};gap:14px">
            <div style="display:flex;align-items:center;gap:14px;min-width:0">
              <div style="width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0">
                ${intr.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
              </div>
              <div style="min-width:0">
                <div style="font-weight:700;font-size:15px;color:var(--text)">${intr.name}</div>
                ${intr.company ? `<div style="font-size:14px;color:#898987;margin-top:1px">${intr.company}</div>` : ''}
                <div style="display:flex;gap:12px;margin-top:4px;flex-wrap:wrap">
                  ${intr.email ? `<a href="mailto:${intr.email}" style="font-size:14px;color:var(--accent);text-decoration:none">${intr.email}</a>` : ''}
                  ${intr.phone ? `<span style="font-size:14px;color:#898987">${intr.phone}</span>` : ''}
                </div>
                ${intr.notes ? `<div style="font-size:14px;color:#898987;margin-top:4px;font-style:italic">${intr.notes}</div>` : ''}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:14px;flex-shrink:0">
              ${hasAny ? `
                <div style="display:flex;gap:18px;text-align:right">
                  <div>
                    <div class="lbl">Pipeline</div>
                    <div style="font-size:15px;font-weight:700;color:var(--text-2)">${fmtVal(intrPipeline, curr)}</div>
                  </div>
                  <div>
                    <div class="lbl">Won</div>
                    <div style="font-size:15px;font-weight:700;color:var(--accent)">${fmtVal(intrWon, curr)}</div>
                  </div>
                </div>
              ` : ''}
              <div style="display:flex;gap:6px">
                <button class="btn btn-ghost btn-sm intr-edit-btn" data-id="${intr.id}">Edit</button>
                ${dealCount === 0 ? `<button class="btn btn-ghost btn-sm intr-del-btn" data-id="${intr.id}" style="color:var(--danger)">Delete</button>` : ''}
              </div>
            </div>
          </div>
          ${dealCount > 0 ? `
          <div style="border-top:1px solid var(--border);padding-top:12px">
            <div class="lbl" style="margin-bottom:8px">Deals Introduced (${dealCount})</div>
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead>
                <tr style="background:#F7F7F7">
                  <th style="padding:6px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid var(--border)">Deal</th>
                  <th style="padding:6px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid var(--border)">Stage</th>
                  <th style="padding:6px 12px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid var(--border)">Value</th>
                  <th style="padding:6px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid var(--border)">Commission %</th>
                  <th style="padding:6px 12px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#ADADAB;border-bottom:1px solid var(--border)">Commission Value</th>
                </tr>
              </thead>
              <tbody>
                ${intrDeals.map(d => {
                  const col = DB.columns.find(c => c.id === d.stage);
                  const pct = d.introduction?.commission || 0;
                  const bucket = dealBucket(d);
                  const dealVal = dealValueForBucket(d, bucket);
                  const commVal = bucket === 'lost' ? 0 : dealVal * (pct / 100);
                  const dCurr = (bucket === 'won' ? resolveDealValue(d).currency : d.currency) || curr;
                  // Won deals use TRACKR's contracted total (incl change orders);
                  // when the project's contract field is empty the figure
                  // falls back to the original pipeline budget — the label
                  // tells the user which source they're looking at.
                  let valSrcText = '';
                  if (bucket === 'won') {
                    const lbl = resolveDealValue(d).label;
                    if (lbl === 'budget')        valSrcText = 'T&M budget';
                    else if (lbl === 'estimate') valSrcText = 'pipeline estimate';
                    else if (lbl === '/yr')      valSrcText = 'yearly';
                    else if (lbl === '/mo')      valSrcText = 'monthly';
                    else                          valSrcText = 'contracted';
                  }
                  const valSrc = valSrcText ? `<span style="font-size:9px;color:#ADADAB;display:block;margin-top:1px">${valSrcText}</span>` : '';
                  const rowOpacity = bucket === 'lost' ? '0.5' : '1';
                  return `<tr style="border-bottom:1px solid #F2F1EE;opacity:${rowOpacity}">
                    <td style="padding:8px 12px">
                      <div style="font-weight:600">${getDealName(d) || '—'}</div>
                      ${d.clientId ? `<div style="font-size:11px;color:#898987">${getClients().find(cl=>cl.id===d.clientId)?.name||''}</div>` : ''}
                    </td>
                    <td style="padding:8px 12px">
                      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${col?.color||'#ADADAB'};margin-right:5px"></span>
                      <span style="color:#898987">${col?.name||d.stage}</span>
                    </td>
                    <td style="padding:8px 12px;text-align:right;font-weight:600">${dealVal ? fmtVal(dealVal, dCurr) : '—'}${valSrc}</td>
                    <td style="padding:8px 12px;text-align:center">
                      <input type="number" class="intr-pct-inp" data-deal="${d.id}"
                        value="${pct||''}" min="0" max="100" step="0.5" placeholder="0"
                        style="width:60px;text-align:center;border:1px solid var(--border);border-radius:3px;padding:3px 6px;font-size:13px;font-weight:600;font-family:inherit">
                      <span style="color:#898987">%</span>
                    </td>
                    <td style="padding:8px 12px;text-align:right;font-weight:700;color:${commVal>0?(bucket==='won'?'var(--accent)':'var(--text-2)'):'#ADADAB'}" class="intr-comm-val" data-deal="${d.id}">
                      ${commVal > 0 ? fmtVal(commVal, dCurr) : '—'}
                    </td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>` : ''}
        </div>`;
      }).join('')}
  `;

  // Wire edit buttons
  el.querySelectorAll('.intr-edit-btn').forEach(btn => {
    btn.onclick = () => {
      const intr = DB.introducers.find(r => r.id === btn.dataset.id);
      if (intr) showIntroducerModal(intr, () => renderView());
    };
  });

  // Wire delete buttons
  el.querySelectorAll('.intr-del-btn').forEach(btn => {
    btn.onclick = () => {
      const intr = DB.introducers.find(r => r.id === btn.dataset.id);
      if (!intr) return;
      confirmModal('Delete Introducer', `Remove <strong>${intr.name}</strong>? This cannot be undone.`, 'Delete', () => {
        DB.introducers = DB.introducers.filter(r => r.id !== btn.dataset.id);
        saveDB(); renderView(); toast(intr.name + ' removed');
      });
    };
  });

  // Wire commission % inputs — live-edit per deal
  el.querySelectorAll('.intr-pct-inp').forEach(inp => {
    const update = () => {
      const deal = DB.deals.find(d => d.id === inp.dataset.deal);
      if (!deal) return;
      // Mutate a fresh copy so the in-memory deal stays consistent with the
      // re-derived view from mis-v1.projects after dealCommit re-syncs.
      const updated = {
        ...deal,
        introduction: { ...(deal.introduction || {}), commission: parseFloat(inp.value) || 0 },
      };
      // Persist to the project record. dealCommit fires a storage event that
      // triggers a full renderView, which re-paints the commission cell from
      // canonical state — no manual DOM update needed.
      dealCommit(updated);
      saveDB();
    };
    inp.addEventListener('blur', update);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); });
    inp.addEventListener('focus', () => { inp.style.borderColor = 'var(--accent)'; });
    inp.addEventListener('blur',  () => { inp.style.borderColor = 'var(--border)'; });
  });
}

// ════════════════════════════════════════════════════════
//  LINKED PROJECT MODAL (edit TRACKR project from Grow)
// ════════════════════════════════════════════════════════
function showLinkedProjectModal(deal) {
  // Resolve the linked TRACKR project — read ALL projects (including closed)
  const allProjects = (() => { try { return JSON.parse(localStorage.getItem('mis-v1')||'{}').projects || []; } catch(_){return [];} })();
  const p = deal.csmProjectId
    ? allProjects.find(pr => pr.id === deal.csmProjectId)
    : allProjects.find(pr => pr.csmDealId === deal.id);

  if (!p) { toast('No linked TRACKR project found', 'error'); return; }

  const billingType = p.billingType || 'time_materials';
  const retainer    = p.retainer    || { hoursIncluded:0, monthlyFee:0, overageEnabled:false, overageRate:0, billingDay:1 };
  const vr          = p.variableRetainer || { yearlyBudget:0, hourlyRate:0, approvals:{} };
  const fixedFee    = p.fixedFee || '';

  const team     = getTrackrTeam();
  const currencies = getCurrencies();

  const clientOptions = buildClientOptions(p.clientId || '');
  const leadOptions = team.map(m => {
    const name = m.nickname ? m.nickname : (m.name||'').split(' ').map((w,i,a) => i===0 ? w : w[0]+'.').join(' ');
    return `<option value="${m.id}" ${m.id === p.leadId ? 'selected' : ''}>${name}</option>`;
  }).join('');
  const currOptions = currencies.map(cu =>
    `<option value="${cu}" ${cu === p.currency ? 'selected' : ''}>${cu}</option>`
  ).join('');

  const body = `
    <div class="form-row">
      <div class="form-group full">
        <label>Project Name</label>
        <input type="text" id="lp-name" value="${p.name||''}" placeholder="e.g. Website Redesign">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Client</label>
        <select id="lp-client">
          <option value="">Select client…</option>
          ${clientOptions}
        </select>
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select id="lp-currency">
          <option value="">Inherit from client</option>
          ${currOptions}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Project Lead</label>
        <select id="lp-lead">
          <option value="">— No lead assigned —</option>
          ${leadOptions}
        </select>
      </div>
      <div class="form-group">
        <label>Billing Type</label>
        <select id="lp-billing-type">

          <option value="retainer"          ${billingType==='retainer'         ?'selected':''}>Monthly Retainer (Fixed)</option>

        </select>
      </div>
    </div>

    <!-- T&M budget -->
    <div id="lp-tm-section" style="display:${billingType==='time_materials'?'block':'none'}">
      <div class="section-divider">Budget <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:#ADADAB">(optional)</span></div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Budget</label>
          <input type="number" id="lp-tm-budget" value="${p.tmBudget||''}" placeholder="e.g. 50000" min="0">
          <div class="form-hint">Value cap for burn tracking.</div>
        </div>
      </div>
    </div>

    <!-- Retainer -->
    <div id="lp-retainer-section" style="display:${billingType==='retainer'?'block':'none'}">
      <div class="section-divider">Retainer Settings</div>
      <div class="form-row">
        <div class="form-group">
          <label>Hours Included / Month</label>
          <input type="number" id="lp-retainer-hours" value="${retainer.hoursIncluded||''}" placeholder="e.g. 40" min="0" step="0.5">

      <div class="section-divider">Fixed Fee</div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Fixed Fee</label>

        <div class="form-group">
          <label>Progress billing %</label>
          <input type="number" id="lp-ms-midpoint" value="${p.fixedMilestones?.midpoint ?? 50}" min="0" max="100" step="1">
          <div class="form-hint">Raised at the trigger point.</div>
        </div>
        <div class="form-group">
          <label>Closeout %</label>
          <input type="number" id="lp-ms-closeout" value="${p.fixedMilestones?.closeout ?? 25}" readonly style="background:#F8F8F6;color:#ADADAB">

        <div class="form-group" style="max-width:200px">
          <label>Progress trigger</label>
          <input type="number" id="lp-ms-trigger" value="${p.fixedMilestones?.midpointTrigger ?? 70}" min="1" max="99" step="1">

    <!-- Variable retainer -->
    <div id="lp-variable-retainer-section" style="display:${billingType==='variable_retainer'?'block':'none'}">
      <div class="section-divider">Variable Retainer Settings</div>
      <div class="form-row">
        <div class="form-group">
          <label>Yearly Budget</label>
          <input type="number" id="lp-vr-yearly-budget" value="${vr.yearlyBudget||''}" placeholder="e.g. 120000" min="0">
        </div>
        <div class="form-group">
          <label>Default Hourly Rate</label>
          <input type="number" id="lp-vr-hourly-rate" value="${vr.hourlyRate||''}" placeholder="e.g. 100" min="0">
        </div>
      </div>
    </div>

    <div class="section-divider">Project Dates</div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Date <span style="font-size:10px;color:#ADADAB;font-weight:400">(optional)</span></label>
        <input type="date" id="lp-start-date" value="${p.startDate||''}">
        <div class="form-hint">Project hidden from months before this date.</div>
      </div>
      <div class="form-group">
        <label>Close Date <span style="font-size:10px;color:#ADADAB;font-weight:400">(optional)</span></label>
        <input type="date" id="lp-close-date" value="${p.closedDate||''}">
        <div class="form-hint">Project hidden from months after this date.</div>
      </div>
    </div>

    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="lp-save">Update Project</button>
    </div>
  `;

  const o = showModal(`Project Settings — ${p.name}`, body, '620px');

  // Billing type toggle
  const btSel = o.querySelector('#lp-billing-type');
  btSel.addEventListener('change', () => {
    o.querySelector('#lp-tm-section').style.display              = btSel.value === 'time_materials'    ? 'block' : 'none';
    o.querySelector('#lp-retainer-section').style.display        = btSel.value === 'retainer'          ? 'block' : 'none';
    o.querySelector('#lp-fixed-section').style.display           = btSel.value === 'fixed'             ? 'block' : 'none';
    o.querySelector('#lp-variable-retainer-section').style.display = btSel.value === 'variable_retainer' ? 'block' : 'none';
  });

  // Overage toggle
  o.querySelector('#lp-overage-enabled').addEventListener('change', function() {
    o.querySelector('#lp-overage-rate-group').style.display = this.checked ? 'flex' : 'none';
  });

  // Blended rate hint
  function updateBlended() {
    const h = parseFloat(o.querySelector('#lp-retainer-hours').value) || 0;
    const f = parseFloat(o.querySelector('#lp-retainer-fee').value)   || 0;
    const curr = o.querySelector('#lp-currency').value || getCurrencies()[0] || 'USD';
    const hint = o.querySelector('#lp-retainer-blended-hint');
    if (hint) hint.textContent = h > 0 && f > 0 ? `≈ ${fmtVal(f/h, curr)}/h blended rate` : '';
  }
  o.querySelector('#lp-retainer-hours').addEventListener('input', updateBlended);
  o.querySelector('#lp-retainer-fee').addEventListener('input',   updateBlended);
  updateBlended();

  // Milestone closeout live update
  function updateLpMilestoneCloseout() {
    const dep = parseFloat(o.querySelector('#lp-ms-deposit')?.value) || 0;
    const mid = parseFloat(o.querySelector('#lp-ms-midpoint')?.value) || 0;
    const co  = o.querySelector('#lp-ms-closeout');
    const hint = o.querySelector('#lp-ms-sum-hint');
    if (!co) return;
    co.value = Math.max(0, 100 - dep - mid);
    if (hint) hint.textContent = 'Auto — remainder to 100.';
  }
  o.querySelector('#lp-ms-deposit')?.addEventListener('input', updateLpMilestoneCloseout);
  o.querySelector('#lp-ms-midpoint')?.addEventListener('input', updateLpMilestoneCloseout);
  updateLpMilestoneCloseout();

  // Save
  o.querySelector('#lp-save').onclick = () => {
    const name = o.querySelector('#lp-name').value.trim();
    if (!name) { toast('Project name is required', 'error'); return; }

    const bt       = o.querySelector('#lp-billing-type').value;
    const clientId = o.querySelector('#lp-client').value || p.clientId;
    const currency = o.querySelector('#lp-currency').value;
    const leadId   = o.querySelector('#lp-lead').value;

    const retainerData = {
      hoursIncluded:  parseFloat(o.querySelector('#lp-retainer-hours').value) || 0,
      monthlyFee:     parseFloat(o.querySelector('#lp-retainer-fee').value)   || 0,
      overageEnabled: o.querySelector('#lp-overage-enabled').checked,
      overageRate:    parseFloat(o.querySelector('#lp-overage-rate').value)   || 0,
      billingDay:     parseInt(o.querySelector('#lp-billing-day').value)       || 1,
    };

    const msDeposit  = parseFloat(o.querySelector('#lp-ms-deposit')?.value)  ?? 25;
    const msMidpoint = parseFloat(o.querySelector('#lp-ms-midpoint')?.value) ?? 50;
    const msTrigger  = parseFloat(o.querySelector('#lp-ms-trigger')?.value)  ?? 70;
    const msCloseout = Math.max(0, 100 - msDeposit - msMidpoint);

    // Merge changes onto a fresh copy of the project (preserves all other TRACKR fields)
    const updated = {
      ...p,
      name,
      clientId,
      currency,
      leadId,
      billingType:      bt,
      tmBudget:         parseFloat(o.querySelector('#lp-tm-budget').value)         || 0,
      fixedFee:         parseFloat(o.querySelector('#lp-fixed-fee').value)          || 0,
      retainer:         retainerData,
      variableRetainer: {
        ...vr,
        yearlyBudget: parseFloat(o.querySelector('#lp-vr-yearly-budget').value) || 0,
        hourlyRate:   parseFloat(o.querySelector('#lp-vr-hourly-rate').value)   || 0,
      },
      fixedMilestones: { deposit: msDeposit, midpoint: msMidpoint, midpointTrigger: msTrigger, closeout: msCloseout },
      startDate:  o.querySelector('#lp-start-date').value  || '',
      closedDate: o.querySelector('#lp-close-date').value  || '',
    };

    // Save to localStorage and Supabase. Under the unified schema, the deal
    // and project are the same record, so this single write updates both
    // views automatically. syncDealsFromProjects() refreshes DB.deals.
    saveProjectToTrackr(updated);
    pushProjectToTrackrSupabase(updated);
    syncDealsFromProjects();
    saveDB();

    o.remove();
    renderView();
    toast(`${updated.name} updated in TRACKR ✓`);
  };
}

function showIntroducerModal(intr, onSave) {
  const isEdit = !!intr;
  const o = showModal(isEdit ? 'Edit Introducer' : 'Add Introducer', `
    <div class="form-row">
      <div class="form-group"><label>Name</label><input id="ni-name" value="${intr?.name||''}" placeholder="Full name"></div>
      <div class="form-group"><label>Company</label><input id="ni-company" value="${intr?.company||''}" placeholder="e.g. Acme Corp"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Email</label><input type="email" id="ni-email" value="${intr?.email||''}" placeholder="james@acme.com"></div>
      <div class="form-group"><label>Phone</label><input id="ni-phone" value="${intr?.phone||''}" placeholder="+1 555 0100"></div>
    </div>
    <div class="form-row">
      <div class="form-group full"><label>Notes</label><input id="ni-notes" value="${intr?.notes||''}" placeholder="How they know you, conference they referred you from…"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="ni-save">${isEdit ? 'Save Changes' : 'Add Introducer'}</button>
    </div>
  `, '520px');

  o.querySelector('#ni-name').focus();

  o.querySelector('#ni-save').onclick = () => {
    const name = o.querySelector('#ni-name').value.trim();
    if (!name) { toast('Name is required', 'error'); return; }
    const data = {
      id:      intr?.id || genId('intr'),
      name,
      company: o.querySelector('#ni-company').value.trim(),
      email:   o.querySelector('#ni-email').value.trim(),
      phone:   o.querySelector('#ni-phone').value.trim(),
      notes:   o.querySelector('#ni-notes').value.trim(),
    };
    if (isEdit) {
      const idx = DB.introducers.findIndex(r => r.id === intr.id);
      if (idx >= 0) DB.introducers[idx] = data;
    } else {
      if (!DB.introducers) DB.introducers = [];
      DB.introducers.push(data);
    }
    saveDB(); o.remove();
    toast(name + (isEdit ? ' updated ✓' : ' added ✓'));
    if (onSave) onSave();
  };
}

// ════════════════════════════════════════════════════════
//  CLIENTS LIST
// ════════════════════════════════════════════════════════
// State for the Active/Closed/Prospects sub-toggle. Persists across re-renders
// within the session; resets to 'active' on full reload.
let clientsStatusFilter = 'active'; // 'active' | 'closed' | 'prospects'

function renderClientsList(el, acts) {
  // Org-chart drill-in — when set, show the contact org chart for that client
  // instead of the regular table list. Returns when done so the rest of this
  // function (table rendering) doesn't run for the chart view.
  if (_orgChartClientId) {
    renderOrgChart(el, acts, _orgChartClientId);
    return;
  }

  // Read all records — sub-toggle decides which slice we show
  const allRecords    = getClients();
  const allClients    = allRecords.filter(c => (c.classification || 'client') !== 'prospect' && !c.archived);
  const allProspects  = allRecords.filter(c => c.classification === 'prospect' && !c.archived);
  const activeCount   = allClients.filter(c => (c.status || 'active') !== 'closed').length;
  const closedCount   = allClients.filter(c => c.status === 'closed').length;
  const prospectCount = allProspects.length;
  const filter        = clientsStatusFilter;

  // Add-client button in the topbar action area
  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary btn-sm';
  addBtn.innerHTML = '+ New Client';
  addBtn.onclick = () => showNewClientModal(() => renderView());
  acts.appendChild(addBtn);

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px">
      <button class="btn btn-sm ${filter==='active'    ? 'btn-primary' : 'btn-ghost'}" id="cf-active">
        Active <span style="opacity:.65;margin-left:4px">${activeCount}</span>
      </button>
      <button class="btn btn-sm ${filter==='closed'    ? 'btn-primary' : 'btn-ghost'}" id="cf-closed">
        Closed <span style="opacity:.65;margin-left:4px">${closedCount}</span>
      </button>
      <button class="btn btn-sm ${filter==='prospects' ? 'btn-primary' : 'btn-ghost'}" id="cf-prospects" title="Pre-sales records — created in Grow when a deal opens, convert to Clients when the deal is won">
        Prospects <span style="opacity:.65;margin-left:4px">${prospectCount}</span>
      </button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Client</th>
              <th>Status</th>
              <th>Currency</th>
              <th>Billing</th>
              <th>Deals</th>
              <th>Pipeline Value</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="clients-body"></tbody>
        </table>
      </div>
    </div>
  `;

  el.querySelector('#cf-active').addEventListener('click',    () => { clientsStatusFilter = 'active';    renderView(); });
  el.querySelector('#cf-closed').addEventListener('click',    () => { clientsStatusFilter = 'closed';    renderView(); });
  el.querySelector('#cf-prospects').addEventListener('click', () => { clientsStatusFilter = 'prospects'; renderView(); });

  // Pick the visible slice based on the current sub-toggle
  let visibleClients;
  if (filter === 'prospects')   visibleClients = allProspects;
  else if (filter === 'closed') visibleClients = allClients.filter(c => c.status === 'closed');
  else                          visibleClients = allClients.filter(c => (c.status || 'active') !== 'closed');

  const body = el.querySelector('#clients-body');
  if (visibleClients.length === 0) {
    const emptyMsg = filter === 'prospects'
      ? 'No prospects. Prospects are typically created when a deal opens against a new contact — they convert to Clients when the deal is won.'
      : (filter === 'closed' ? 'No closed clients.' : 'No clients yet. Add your first client.');
    body.innerHTML = `<tr><td colspan="7"><div class="empty-state"><p>${emptyMsg}</p></div></td></tr>`;
    return;
  }

  visibleClients.forEach(c => {
    const dealsForClient = (DB.deals || []).filter(d => d.clientId === c.id);
    const totalVal       = dealsForClient.reduce((s, d) => s + (d.value || 0), 0);
    const isCustom       = c.billingModel === 'rate_card';
    const isClosed       = c.status === 'closed';
    const isProspect     = c.classification === 'prospect';
    const dimRow         = isClosed; // prospects keep full opacity — they're the focus of Grow
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.innerHTML = `
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          ${c.logo
            ? `<div style="width:40px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);border-radius:3px;overflow:hidden${dimRow?';opacity:.5':''}"><img src="${c.logo}" style="max-width:100%;max-height:100%;object-fit:contain"></div>`
            : `<div style="width:40px;height:28px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center"><span style="font-size:11px;font-weight:700;color:var(--text-3)">${(c.name||'?').charAt(0).toUpperCase()}</span></div>`}
          <span style="font-weight:600;font-family:var(--font);${dimRow?'color:var(--text-3)':''}">${(c.name||'').replace(/</g,'&lt;')}</span>
          ${c.importedAt ? '<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;white-space:nowrap;background:rgba(212,160,23,0.1);color:#B8860B">↓ Imported</span>' : ''}
        </div>
      </td>
      <td>
        ${isProspect
          ? '<span class="badge badge-blue">Prospect</span>'
          : (isClosed ? '<span class="badge badge-gray">Closed</span>' : '<span class="badge badge-green">Active</span>')}
      </td>
      <td><span class="badge badge-blue">${c.currency||'—'}</span></td>
      <td>
        <button class="btn btn-ghost btn-sm cl-edit-billing" data-id="${c.id}" style="font-size:14px;padding:4px 10px" title="Billing model is set in TRACKR">
          ${isCustom ? '<span class="badge badge-green" style="pointer-events:none">Custom rate card</span>' : '<span class="badge badge-gray" style="pointer-events:none">Standard</span>'}
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" style="margin-left:4px;opacity:.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </td>
      <td class="muted">${dealsForClient.length}</td>
      <td style="font-weight:700;color:${totalVal>0?'var(--accent)':'var(--text-3)'}">${totalVal > 0 ? fmtVal(totalVal) : '—'}</td>
      <td>
        <div style="display:flex;justify-content:flex-end;gap:6px">
          <button class="btn btn-ghost btn-sm cl-orgchart" data-id="${c.id}" title="Open the contact org chart for this client" style="display:flex;align-items:center;gap:4px">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="5" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="9" y="16" width="6" height="5" rx="1"/><path d="M6.5 8v3h11v-3"/><path d="M12 11v5"/></svg>
            Org Chart
            ${(c.contacts || []).length ? `<span style="opacity:0.7;font-weight:600">${(c.contacts || []).length}</span>` : ''}
          </button>
          <button class="btn btn-ghost btn-sm cl-edit" data-id="${c.id}">Edit</button>
          ${isClosed
            ? `<button class="btn btn-ghost btn-sm cl-reopen" data-id="${c.id}" style="color:var(--accent)">Reopen</button>`
            : `<button class="btn btn-ghost btn-sm cl-close" data-id="${c.id}" style="color:var(--text-2)">Close</button>`}
          <button class="btn btn-ghost btn-sm cl-del" data-id="${c.id}" style="color:${dealsForClient.length>0?'var(--text-3)':'var(--danger)'};${dealsForClient.length>0?'cursor:not-allowed;opacity:0.5;':''}">Delete</button>
        </div>
      </td>
    `;
    // Row click opens edit modal — but ignore clicks on action buttons
    tr.addEventListener('click', e => {
      if (e.target.closest('button')) return;
      showNewClientModal(() => renderView(), c);
    });
    body.appendChild(tr);
  });

  // Wire up action buttons
  body.querySelectorAll('.cl-orgchart').forEach(btn => {
    btn.addEventListener('click', () => {
      _orgChartClientId = btn.dataset.id;
      renderView();
    });
  });
  body.querySelectorAll('.cl-edit, .cl-edit-billing').forEach(btn => {
    btn.addEventListener('click', () => {
      const cl = getClients().find(c => c.id === btn.dataset.id);
      if (cl) showNewClientModal(() => renderView(), cl);
    });
  });
  body.querySelectorAll('.cl-close').forEach(btn => {
    btn.addEventListener('click', () => {
      const cl = getClients().find(c => c.id === btn.dataset.id);
      if (!cl?.id) return;
      saveClientToTrackr({ ...cl, status: 'closed' });
      toast(`${cl.name} closed — hidden from new pickers, existing data kept 🔒`);
      renderView();
    });
  });
  body.querySelectorAll('.cl-reopen').forEach(btn => {
    btn.addEventListener('click', () => {
      const cl = getClients().find(c => c.id === btn.dataset.id);
      if (!cl?.id) return;
      saveClientToTrackr({ ...cl, status: 'active' });
      toast(`${cl.name} reopened — back in the rotation ✨`);
      renderView();
    });
  });
  body.querySelectorAll('.cl-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const cl = getClients().find(c => c.id === id);
      const hasDeals = (DB.deals || []).some(d => d.clientId === id);
      if (hasDeals) {
        toast('This client still has deals! Move them first before deleting 🔌', 'error');
        return;
      }
      confirmModal(
        'Delete client?',
        `<strong>${cl?.name || 'This client'}</strong> will be permanently removed. This can't be undone.<br><br>If you'd rather keep historical records, use <em>Close</em> instead.`,
        'Delete',
        () => {
          // Remove from TRACKR's mis-v1.clients (the canonical store)
          try {
            const raw = localStorage.getItem('mis-v1');
            const data = raw ? JSON.parse(raw) : {};
            if (Array.isArray(data.clients)) {
              data.clients = data.clients.filter(c => c.id !== id);
              localStorage.setItem('mis-v1', JSON.stringify(data));
              window.dispatchEvent(new StorageEvent('storage', { key: 'mis-v1', newValue: JSON.stringify(data) }));
            }
          } catch(e) {}
          toast('Client deleted. Goodbye and good luck! 👋');
          renderView();
        }
      );
    });
  });
}

// ════════════════════════════════════════════════════════
//  ORG CHART
// ════════════════════════════════════════════════════════
// Free-form drag-and-drop canvas of contact boxes for one client. Each
// contact gets an {x, y} position stored on the contact record. The user
// can drop a contact anywhere — Y axis represents seniority (top = most
// senior), X axis is for grouping/teams. Reporting lines are drawn
// between any two contacts with a parent-child relationship (contact.reportsTo).
//
// Persistence: contact.position = {x, y} (origin top-left of canvas)
//              contact.reportsTo = id of another contact (or null for top-level)
// All saved via saveClientToTrackr (storage event → TRACKR re-renders too).

// In-memory drag state — only valid during a drag operation
let _ocDrag = null; // { contactId, startX, startY, offsetX, offsetY }
// Connection-mode state — when set, clicking a box will set its reportsTo
let _ocConnectFromId = null;

// Default positions for newly-added contacts when they have no saved position
function _ocDefaultPosition(index) {
  const cols = 4;
  return {
    x: 40 + (index % cols) * 240,
    y: 40 + Math.floor(index / cols) * 160,
  };
}

function renderOrgChart(el, acts, clientId) {
  const client = getClients().find(c => c.id === clientId);
  if (!client) {
    // Client was deleted — drop back to the list
    _orgChartClientId = null;
    renderView();
    return;
  }
  const contacts = (client.contacts || []).map((ct, i) => ({
    ...ct,
    // Ensure every contact has a position so drawing is deterministic
    position: ct.position || _ocDefaultPosition(i),
  }));

  // ── Topbar actions ──
  acts.innerHTML = '';
  const backBtn = document.createElement('button');
  backBtn.className = 'btn btn-ghost btn-sm';
  backBtn.innerHTML = '← Back to Clients';
  backBtn.onclick = () => { _orgChartClientId = null; _ocConnectFromId = null; renderView(); };
  acts.appendChild(backBtn);

  const addBtn = document.createElement('button');
  addBtn.className = 'btn btn-primary btn-sm';
  addBtn.innerHTML = '+ Add Contact';
  addBtn.onclick = () => {
    // New contact spawns near the centre with sensible defaults
    const newCt = {
      id: genId('ct'),
      name: '',
      jobTitle: '',
      email: '',
      phone: '',
      linkedin: '',
      isLead: contacts.length === 0,
      reportsTo: null,
      position: _ocDefaultPosition(contacts.length),
    };
    const updated = { ...client, contacts: [...(client.contacts || []), newCt] };
    saveClientToTrackr(updated);
    renderView();
  };
  acts.appendChild(addBtn);

  // ── Canvas ──
  // Use a relatively-positioned container with a fixed minimum size; boxes
  // are absolutely positioned inside. The SVG overlay renders the connection
  // lines underneath the boxes (z-index 0 vs 1).
  const lead = contacts.find(ct => ct.isLead) || null;
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--text-3);margin-bottom:3px">Org Chart</div>
        <div style="font-size:22px;font-weight:300;color:var(--text)">${(client.name||'').replace(/</g,'&lt;')}</div>
        ${lead ? `<div style="font-size:12px;color:var(--text-3);margin-top:2px">Lead contact: <strong style="color:var(--text-2);font-weight:600">${(lead.name||'Unnamed').replace(/</g,'&lt;')}</strong>${lead.jobTitle?` · ${lead.jobTitle.replace(/</g,'&lt;')}`:''}</div>` : ''}
      </div>
      <div style="font-size:11.5px;color:var(--text-3);max-width:380px;line-height:1.5;text-align:right">
        Drag boxes to position. Click <strong style="color:var(--text-2)">Connect</strong> on a box, then click another to draw a reporting line. Top = most senior.
      </div>
    </div>

    ${contacts.length === 0 ? `
      <div style="background:#fff;border:1px dashed var(--border);border-radius:8px;padding:80px 24px;text-align:center;color:var(--text-3)">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:14px;opacity:0.6"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="5" r="3"/><path d="M21 11v-1a3 3 0 0 0-3-3"/></svg>
        <div style="font-size:15px;font-weight:600;color:var(--text-2);margin-bottom:6px">No contacts yet</div>
        <div style="font-size:13px;line-height:1.5">Click <strong style="color:var(--text-2)">+ Add Contact</strong> to drop your first box on the canvas.</div>
      </div>
    ` : `
      <div id="oc-canvas" style="position:relative;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:auto;min-height:600px;height:calc(100vh - 220px)">
        <div id="oc-canvas-inner" style="position:relative;width:${Math.max(1200, ...contacts.map(c => c.position.x + 240))}px;height:${Math.max(600, ...contacts.map(c => c.position.y + 200))}px">
          <svg id="oc-lines" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0"></svg>
          <div id="oc-boxes" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:1"></div>
        </div>
      </div>
    `}
  `;

  if (!contacts.length) return;

  // ── Render boxes ──
  const boxesContainer = el.querySelector('#oc-boxes');
  contacts.forEach(ct => {
    const isConnectFrom = _ocConnectFromId === ct.id;
    const isLeadFlag = !!ct.isLead;
    const div = document.createElement('div');
    div.className = 'oc-box';
    div.dataset.contactId = ct.id;
    div.style.cssText = `
      position:absolute;
      left:${ct.position.x}px; top:${ct.position.y}px;
      width:220px; min-height:108px;
      background:#fff;
      border:${isConnectFrom ? '2px solid var(--accent)' : '1px solid var(--border)'};
      border-radius:6px;
      padding:14px 16px 12px;
      box-shadow:${isConnectFrom ? '0 0 0 4px rgba(103,143,47,0.15)' : '0 1px 2px rgba(0,0,0,0.04)'};
      cursor:grab;
      user-select:none;
      transition:box-shadow .12s, border-color .12s;
    `;
    div.innerHTML = `
      ${isLeadFlag ? `<span class="badge badge-green" style="position:absolute;top:8px;right:8px;font-size:9px;padding:1px 6px">Lead</span>` : ''}
      <div class="oc-name" style="font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px;padding-right:${isLeadFlag?'40px':'0'};word-break:break-word">${(ct.name || 'Unnamed').replace(/</g,'&lt;')}</div>
      <div class="oc-email" style="font-size:11.5px;color:var(--text-3);line-height:1.4;margin-bottom:6px;word-break:break-all">${(ct.email || '').replace(/</g,'&lt;') || '<span style="opacity:0.5">no email</span>'}</div>
      <div class="oc-title" style="font-size:11.5px;color:var(--text-2);line-height:1.4;font-style:italic">${(ct.jobTitle || '').replace(/</g,'&lt;') || '<span style="opacity:0.5;font-style:normal">no title</span>'}</div>
      <div class="oc-actions" style="display:flex;gap:4px;margin-top:9px;border-top:1px solid var(--bg);padding-top:7px;opacity:0.85">
        <button class="oc-btn oc-edit" data-id="${ct.id}" style="flex:1;font-size:10.5px;font-weight:600;padding:3px 6px;border:1px solid var(--border);background:var(--bg);color:var(--text-2);border-radius:3px;cursor:pointer">Edit</button>
        <button class="oc-btn oc-connect" data-id="${ct.id}" style="flex:1;font-size:10.5px;font-weight:600;padding:3px 6px;border:1px solid ${isConnectFrom?'var(--accent)':'var(--border)'};background:${isConnectFrom?'var(--accent)':'var(--bg)'};color:${isConnectFrom?'#fff':'var(--text-2)'};border-radius:3px;cursor:pointer" title="${isConnectFrom?'Click another box to set its manager, or click here to cancel':'Mark as the manager, then click a direct report'}">${isConnectFrom?'Cancel':'Connect'}</button>
        <button class="oc-btn oc-del" data-id="${ct.id}" style="font-size:10.5px;font-weight:600;padding:3px 6px;border:1px solid var(--border);background:var(--bg);color:var(--danger);border-radius:3px;cursor:pointer" title="Delete contact">×</button>
      </div>
    `;
    boxesContainer.appendChild(div);
  });

  // ── Render reporting lines ──
  // Draw an L-shaped line from each child to its parent. Ends at the child's
  // top-centre and starts at the parent's bottom-centre, with a horizontal
  // shelf in between for clean orthogonal routing.
  const svg = el.querySelector('#oc-lines');
  const BOX_W = 220;
  const BOX_H_DEFAULT = 108; // matches min-height; close enough for rendering
  let svgInner = '';
  contacts.forEach(child => {
    if (!child.reportsTo) return;
    const parent = contacts.find(p => p.id === child.reportsTo);
    if (!parent) return;
    const px = parent.position.x + BOX_W / 2;
    const py = parent.position.y + BOX_H_DEFAULT;
    const cx = child.position.x + BOX_W / 2;
    const cy = child.position.y;
    // Shelf at the midpoint
    const midY = (py + cy) / 2;
    svgInner += `<path d="M ${px} ${py} L ${px} ${midY} L ${cx} ${midY} L ${cx} ${cy}" stroke="var(--border)" stroke-width="1.5" fill="none"/>`;
  });
  svg.innerHTML = svgInner;

  // ── Drag wiring ──
  const canvas = el.querySelector('#oc-canvas');
  const inner  = el.querySelector('#oc-canvas-inner');

  function onPointerDown(e) {
    // Only drag from the box itself, not from action buttons or text selection
    if (e.target.closest('.oc-actions')) return;
    if (e.target.closest('input, textarea, select')) return;
    const box = e.target.closest('.oc-box');
    if (!box) return;
    e.preventDefault();
    const id = box.dataset.contactId;
    const ct = contacts.find(x => x.id === id);
    if (!ct) return;
    // Compute offset from the pointer to the top-left of the box, accounting
    // for canvas scroll position
    const canvasRect = canvas.getBoundingClientRect();
    const innerLeft = canvasRect.left - canvas.scrollLeft;
    const innerTop  = canvasRect.top  - canvas.scrollTop;
    _ocDrag = {
      contactId: id,
      offsetX: e.clientX - (innerLeft + ct.position.x),
      offsetY: e.clientY - (innerTop  + ct.position.y),
      box,
    };
    box.style.cursor = 'grabbing';
    box.style.zIndex = '2';
    box.style.boxShadow = '0 6px 16px rgba(0,0,0,0.12)';
    document.addEventListener('pointermove', onPointerMove);
    document.addEventListener('pointerup',   onPointerUp, { once: true });
  }

  function onPointerMove(e) {
    if (!_ocDrag) return;
    const canvasRect = canvas.getBoundingClientRect();
    const innerLeft = canvasRect.left - canvas.scrollLeft;
    const innerTop  = canvasRect.top  - canvas.scrollTop;
    let nx = e.clientX - innerLeft - _ocDrag.offsetX;
    let ny = e.clientY - innerTop  - _ocDrag.offsetY;
    // Clamp to non-negative — boxes can't go off the top-left edge
    if (nx < 0) nx = 0;
    if (ny < 0) ny = 0;
    _ocDrag.box.style.left = nx + 'px';
    _ocDrag.box.style.top  = ny + 'px';
    // Update the in-memory contact so subsequent line redraws use the new pos
    const ct = contacts.find(x => x.id === _ocDrag.contactId);
    if (ct) {
      ct.position = { x: nx, y: ny };
      // Live-redraw lines so they follow the box during drag
      let svgInner = '';
      contacts.forEach(child => {
        if (!child.reportsTo) return;
        const parent = contacts.find(p => p.id === child.reportsTo);
        if (!parent) return;
        const px = parent.position.x + BOX_W / 2;
        const py = parent.position.y + BOX_H_DEFAULT;
        const cx = child.position.x + BOX_W / 2;
        const cy = child.position.y;
        const midY = (py + cy) / 2;
        svgInner += `<path d="M ${px} ${py} L ${px} ${midY} L ${cx} ${midY} L ${cx} ${cy}" stroke="var(--border)" stroke-width="1.5" fill="none"/>`;
      });
      svg.innerHTML = svgInner;
    }
  }

  function onPointerUp(e) {
    if (!_ocDrag) return;
    document.removeEventListener('pointermove', onPointerMove);
    const ct = contacts.find(x => x.id === _ocDrag.contactId);
    _ocDrag.box.style.cursor = 'grab';
    _ocDrag.box.style.zIndex = '1';
    _ocDrag.box.style.boxShadow = '0 1px 2px rgba(0,0,0,0.04)';
    _ocDrag = null;
    if (!ct) return;
    // Persist the new position back to the client record
    const updated = {
      ...client,
      contacts: client.contacts.map(c => c.id === ct.id ? { ...c, position: ct.position } : c),
    };
    saveClientToTrackr(updated);
    // No re-render — DOM and DB are now in sync; saves us a flash + scroll-loss
  }

  // Click handlers — Edit / Connect / Delete + box-click for connect-target
  inner.addEventListener('click', e => {
    const editBtn    = e.target.closest('.oc-edit');
    const connectBtn = e.target.closest('.oc-connect');
    const delBtn     = e.target.closest('.oc-del');
    const box        = e.target.closest('.oc-box');

    if (editBtn) {
      e.stopPropagation();
      showContactEditModal(client.id, editBtn.dataset.id);
      return;
    }
    if (connectBtn) {
      e.stopPropagation();
      const id = connectBtn.dataset.id;
      if (_ocConnectFromId === id) {
        // Cancel
        _ocConnectFromId = null;
        renderView();
        return;
      }
      if (_ocConnectFromId) {
        // Already a "from" — but user clicked Connect on another box.
        // Treat the new one as the new "from" (re-arming).
        _ocConnectFromId = id;
        renderView();
        return;
      }
      _ocConnectFromId = id;
      renderView();
      return;
    }
    if (delBtn) {
      e.stopPropagation();
      const ct = contacts.find(x => x.id === delBtn.dataset.id);
      if (!ct) return;
      const name = ct.name || 'this contact';
      confirmModal(
        'Delete contact?',
        `Remove <strong>${name.replace(/</g,'&lt;')}</strong> from the org chart? Any reporting lines pointing to or from them will be cleared.`,
        'Delete',
        () => {
          const newContacts = (client.contacts || [])
            .filter(c => c.id !== ct.id)
            // Clear reportsTo on anyone who reported to the deleted contact
            .map(c => c.reportsTo === ct.id ? { ...c, reportsTo: null } : c);
          saveClientToTrackr({ ...client, contacts: newContacts });
          if (_ocConnectFromId === ct.id) _ocConnectFromId = null;
          renderView();
        }
      );
      return;
    }

    // Plain box click while a "from" is armed → set this box as the report
    if (box && _ocConnectFromId && _ocConnectFromId !== box.dataset.contactId) {
      const reportId = box.dataset.contactId;
      const managerId = _ocConnectFromId;
      // Prevent cycles — walk up from manager and refuse if we hit the report
      let cursor = managerId;
      const visited = new Set();
      while (cursor && !visited.has(cursor)) {
        if (cursor === reportId) {
          toast('That would create a reporting cycle.', 'error');
          _ocConnectFromId = null;
          renderView();
          return;
        }
        visited.add(cursor);
        const next = (client.contacts || []).find(c => c.id === cursor);
        cursor = next?.reportsTo || null;
      }
      const newContacts = (client.contacts || []).map(c =>
        c.id === reportId ? { ...c, reportsTo: managerId } : c
      );
      saveClientToTrackr({ ...client, contacts: newContacts });
      _ocConnectFromId = null;
      const fromName = (client.contacts || []).find(c => c.id === managerId)?.name || 'Manager';
      const toName   = (client.contacts || []).find(c => c.id === reportId)?.name || 'Report';
      toast(`${toName} now reports to ${fromName}`, 'success');
      renderView();
    }
  });

  // Pointerdown on boxes for drag
  inner.querySelectorAll('.oc-box').forEach(b => {
    b.addEventListener('pointerdown', onPointerDown);
  });
}

// Inline edit modal for a single contact — used from the org chart's Edit button.
// Doesn't reload the chart unless the save changes something visible.
function showContactEditModal(clientId, contactId) {
  const client = getClients().find(c => c.id === clientId);
  if (!client) return;
  const contact = (client.contacts || []).find(c => c.id === contactId);
  if (!contact) return;
  const o = showModal('Edit Contact', `
    <div class="form-row">
      <div class="form-group full">
        <label>Name</label>
        <input id="oc-ct-name" value="${(contact.name||'').replace(/"/g,'&quot;')}" placeholder="Full name">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input id="oc-ct-email" type="email" value="${(contact.email||'').replace(/"/g,'&quot;')}" placeholder="email@company.com">
      </div>
      <div class="form-group">
        <label>Job Title</label>
        <input id="oc-ct-title" value="${(contact.jobTitle||'').replace(/"/g,'&quot;')}" placeholder="e.g. Head of Delivery">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input id="oc-ct-phone" value="${(contact.phone||'').replace(/"/g,'&quot;')}" placeholder="+1 555 0100">
      </div>
      <div class="form-group">
        <label>LinkedIn</label>
        <input id="oc-ct-linkedin" value="${(contact.linkedin||'').replace(/"/g,'&quot;')}" placeholder="https://linkedin.com/in/…">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="oc-ct-lead" ${contact.isLead?'checked':''} style="width:auto">
          <span>Mark as Lead Contact</span>
        </label>
        <div class="form-hint">The lead is the primary day-to-day contact for this client.</div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" id="oc-ct-save">Save</button>
    </div>
  `, '560px');

  o.querySelector('#oc-ct-save').onclick = () => {
    const name = o.querySelector('#oc-ct-name').value.trim();
    if (!name) { toast('Name required', 'error'); return; }
    const updates = {
      name,
      email:    o.querySelector('#oc-ct-email').value.trim(),
      jobTitle: o.querySelector('#oc-ct-title').value.trim(),
      phone:    o.querySelector('#oc-ct-phone').value.trim(),
      linkedin: o.querySelector('#oc-ct-linkedin').value.trim(),
      isLead:   o.querySelector('#oc-ct-lead').checked,
    };
    // If we're setting this one as Lead, clear the flag on every other contact
    const newContacts = (client.contacts || []).map(c => {
      if (c.id === contactId) return { ...c, ...updates };
      if (updates.isLead) return { ...c, isLead: false };
      return c;
    });
    saveClientToTrackr({ ...client, contacts: newContacts });
    o.remove();
    renderView();
    toast('Contact updated ✓', 'success');
  };
}

// Unified Client Modal — mirrors TRACKR's showClientModal so editing a client
// looks the same regardless of which app you're in. Both apps read/write the
// same record in localStorage['mis-v1'].clients.
//
// Sections that Trackr owns (rate card per job title, logo upload to Supabase)
// are shown READ-ONLY here with a "Manage in TRACKR" link, since Grow doesn't
// know the job titles list and isn't wired to Supabase storage. Saves preserve
// any field Grow doesn't manage by spreading the existing record.
function showNewClientModal(onSave, existing) {
  const isEdit = !!existing;
  const c = existing || {};
  // Work on a deep copy of contacts so cancel discards changes
  let contacts = JSON.parse(JSON.stringify(c.contacts || []));

  // ── Contacts UI ──
  function contactsHTML() {
    return `
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px" id="cm-contacts-list">
        ${contacts.length === 0
          ? `<div style="font-size:13px;color:#ADADAB;padding:8px 0">No contacts yet.</div>`
          : contacts.map((ct, i) => `
            <div style="background:#FAFAF9;border:1px solid #E2E2E2;border-radius:5px;padding:11px 13px;position:relative" data-ci="${i}">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:8px">
                  ${ct.isLead
                    ? `<span class="badge badge-green" style="font-size:10px">Lead</span>`
                    : `<button class="btn btn-ghost btn-sm cm-set-lead" data-ci="${i}" style="font-size:10px;padding:2px 8px;color:#898987">Set as Lead</button>`}
                  <span style="font-size:13px;font-weight:700">${(ct.name||'Unnamed').replace(/</g,'&lt;')}</span>
                  ${ct.jobTitle ? `<span style="font-size:11px;color:#898987">${ct.jobTitle.replace(/</g,'&lt;')}</span>` : ''}
                </div>
                <button class="cm-del-contact btn btn-ghost btn-sm" data-ci="${i}" style="color:#C0392B;padding:3px 8px;font-size:13px">×</button>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 14px">
                <input class="cm-ct-name"  data-ci="${i}" value="${(ct.name||'').replace(/"/g,'&quot;')}" placeholder="Full Name" class="input-sm">
                <input class="cm-ct-title" data-ci="${i}" value="${(ct.jobTitle||'').replace(/"/g,'&quot;')}" placeholder="Job Title" class="input-sm">
                <input class="cm-ct-email" data-ci="${i}" type="email" value="${(ct.email||'').replace(/"/g,'&quot;')}" placeholder="email@company.com" class="input-sm">
                <input class="cm-ct-phone" data-ci="${i}" value="${(ct.phone||'').replace(/"/g,'&quot;')}" placeholder="Phone" class="input-sm">
                <input class="cm-ct-linkedin" data-ci="${i}" value="${(ct.linkedin||'').replace(/"/g,'&quot;')}" placeholder="LinkedIn URL" style="font-size:14px;padding:6px 9px;border:1px solid #E2E2E2;border-radius:3px;font-family:inherit;grid-column:1/-1">
              </div>
            </div>`).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" id="cm-add-contact">+ Add Contact</button>
    `;
  }

  function syncContactsFromForm() {
    o.querySelectorAll('[data-ci]').forEach(inp => {
      const i = parseInt(inp.dataset.ci);
      if (!contacts[i]) return;
      if (inp.classList.contains('cm-ct-name'))     contacts[i].name     = inp.value.trim();
      if (inp.classList.contains('cm-ct-title'))    contacts[i].jobTitle = inp.value.trim();
      if (inp.classList.contains('cm-ct-email'))    contacts[i].email    = inp.value.trim();
      if (inp.classList.contains('cm-ct-phone'))    contacts[i].phone    = inp.value.trim();
      if (inp.classList.contains('cm-ct-linkedin')) contacts[i].linkedin = inp.value.trim();
    });
  }

  function rewireContacts() {
    syncContactsFromForm();
    o.querySelector('#cm-contacts-wrap').innerHTML = contactsHTML();
    bindContactEvents();
  }

  function bindContactEvents() {
    o.querySelector('#cm-add-contact')?.addEventListener('click', () => {
      syncContactsFromForm();
      const isFirst = contacts.length === 0;
      contacts.push({ id: genId('ct'), name:'', jobTitle:'', email:'', phone:'', linkedin:'', isLead: isFirst });
      rewireContacts();
    });
    o.querySelectorAll('.cm-del-contact').forEach(btn => {
      btn.addEventListener('click', () => {
        syncContactsFromForm();
        const i = parseInt(btn.dataset.ci);
        const wasLead = contacts[i]?.isLead;
        contacts.splice(i, 1);
        if (wasLead && contacts.length > 0) contacts[0].isLead = true;
        rewireContacts();
      });
    });
    o.querySelectorAll('.cm-set-lead').forEach(btn => {
      btn.addEventListener('click', () => {
        syncContactsFromForm();
        const i = parseInt(btn.dataset.ci);
        contacts.forEach((ct, idx) => { ct.isLead = idx === i; });
        rewireContacts();
      });
    });
  }

  // Read-only billing summary — what TRACKR has set on this record. We can't
  // edit job-title rate cards from Grow (we don't know the job titles list),
  // but we CAN show what's been configured so the user knows it exists.
  const billingModel = c.billingModel || 'standard';
  const rateCardCount = c.rateCard ? Object.keys(c.rateCard).length : 0;
  const billingSummary = !isEdit
    ? '<span style="color:#ADADAB">Configured in TRACKR after the client is created.</span>'
    : (billingModel === 'rate_card'
        ? `<span class="badge badge-green" style="margin-right:6px">Rate Card</span><span style="color:#898987">${rateCardCount} job-title override${rateCardCount===1?'':'s'} configured</span>`
        : '<span class="badge badge-gray" style="margin-right:6px">Standard</span><span style="color:#898987">Per-member rates apply</span>');

  const o = showModal(isEdit ? 'Edit Client' : 'New Client', `
    <!-- ─── Identity ─── -->
    <div class="form-row">
      <div class="form-group full">
        <label>Client Name</label>
        <input id="cm-name" value="${(c.name||'').replace(/"/g,'&quot;')}" placeholder="e.g. Acme Corp">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Classification</label>
        <select id="cm-classification">
          <option value="client" ${(c.classification||'client')==='client'?'selected':''}>Client</option>
          <option value="prospect" ${c.classification==='prospect'?'selected':''}>Prospect</option>
        </select>
        <div class="form-hint">Prospects only appear in Grow. Clients appear everywhere.</div>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="cm-status">
          <option value="active" ${(c.status||'active')==='active'?'selected':''}>Active</option>
          <option value="closed" ${c.status==='closed'?'selected':''}>Closed</option>
        </select>
        <div class="form-hint">Closed clients are hidden from new pickers. Existing data stays intact.</div>
      </div>
    </div>

    <!-- ─── General contact ─── -->
    <div class="form-row">
      <div class="form-group">
        <label>General Email</label>
        <input type="email" id="cm-email" value="${(c.email||'').replace(/"/g,'&quot;')}" placeholder="info@company.com">
      </div>
      <div class="form-group">
        <label>General Phone</label>
        <input id="cm-phone" value="${(c.phone||'').replace(/"/g,'&quot;')}" placeholder="+1 555 0100">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full">
        <label>Notes</label>
        <textarea id="cm-notes" rows="3" placeholder="Anything worth remembering about this client.">${(c.notes||'').replace(/</g,'&lt;')}</textarea>
      </div>
    </div>

    <!-- ─── Billing (read-only here) ─── -->
    <div class="section-divider">Billing</div>
    <div class="form-row">
      <div class="form-group">
        <label>Default Currency</label>
        <select id="cm-currency">
          ${getCurrencies().map(cu=>`<option value="${cu}" ${cu===(c.currency||DB.settings.currency||'USD')?'selected':''}>${cu}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Billing Model</label>
        <div style="padding:8px 10px;background:#FAFAF9;border:1px solid #E2E2E2;border-radius:3px;font-size:13px;line-height:1.4">${billingSummary}</div>
        <div class="form-hint">Edit billing model and rate card in TRACKR → Projects & Clients.</div>
      </div>
    </div>

    <!-- ─── Contacts ─── -->
    <div class="section-divider" style="display:flex;align-items:center;justify-content:space-between">
      <span>Contacts</span>
      ${isEdit ? `<button type="button" class="btn btn-ghost btn-sm" id="cm-open-orgchart" style="font-size:11px;font-weight:600;letter-spacing:0;text-transform:none">Open org chart →</button>` : ''}
    </div>
    <div id="cm-contacts-wrap">${contactsHTML()}</div>

    <!-- ─── Branding (read-only here) ─── -->
    <div class="section-divider">Branding</div>
    <div class="form-row">
      <div class="form-group full">
        <label>Logo</label>

    const id = genId('col');
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;gap:8px;align-items:center';
    div.dataset.cid = id;
    div.innerHTML = `
      <div style="width:4px;height:32px;border-radius:2px;background:#4A7FC1;flex-shrink:0"></div>

    wireColSettings(el);

  el.querySelector('#col-save').addEventListener('click', () => {
    const rows = el.querySelectorAll('#col-list > [data-cid]');
    const newCols = [];

      newCols.push({

        color: row.querySelector('.col-color-inp').value,
        order: i,
      });
    });
    // Keep fixed cols
    const fixed = DB.columns.filter(c => c.fixed).map((c,i) => ({ ...c, order: newCols.length + i }));
    DB.columns = [...newCols, ...fixed];
    saveDB();
    // Sweep mis-v1.projects to update any cached pipelineStageName values that
    // point at columns we just renamed, so TRACKR rendering stays in sync.
    try {
      const raw = localStorage.getItem('mis-v1');
      if (raw) {
        const mis = JSON.parse(raw);
        let touched = false;
        const colNameById = Object.fromEntries(DB.columns.map(c => [c.id, c.name]));
        (mis.projects || []).forEach(p => {
          if (p.pipelineStageId && colNameById[p.pipelineStageId] && p.pipelineStageName !== colNameById[p.pipelineStageId]) {
            p.pipelineStageName = colNameById[p.pipelineStageId];
            touched = true;
          }
        });
        if (touched) {
          localStorage.setItem('mis-v1', JSON.stringify(mis));
          window.dispatchEvent(new StorageEvent('storage', { key: 'mis-v1', newValue: JSON.stringify(mis) }));
        }
      }
    } catch(_) {}
    renderView(); toast('Columns saved ✓');
  });

  wireColSettings(el);
}

function wireColSettings(el) {
  el.querySelectorAll('.col-del').forEach(btn => {
    btn.addEventListener('click', () => {
      // Use parentElement — btn.closest('[data-cid]') would match the button itself
      // since the button also carries data-cid
      btn.parentElement.remove();
    });
  });
  el.querySelectorAll('.col-color-inp').forEach(inp => {
    inp.addEventListener('input', () => {
      const swatch = inp.closest('[data-cid]').querySelector('div[style*="background"]');
      if (swatch) swatch.style.background = inp.value;
    });
  });
}
