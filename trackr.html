        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              ${c.logo ? `<div style="width:40px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);border-radius:3px;overflow:hidden"><img src="${c.logo}" style="max-width:100%;max-height:100%;object-fit:contain"></div>` : `<div style="width:40px;height:28px;flex-shrink:0;background:var(--bg);border:1px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center"><span style="font-size:11px;font-weight:700;color:var(--text-3)">${c.name.charAt(0).toUpperCase()}</span></div>`}
              <span style="font-weight:600;font-family:var(--font)">${c.name}</span>
              ${c.importedAt ? '<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;white-space:nowrap;background:rgba(212,160,23,0.1);color:#B8860B">↓ Imported</span>' : ''}
            </div>
          </td>
          <td><span class="badge badge-blue">${c.currency||'—'}</span></td>
          <td>
            <button class="btn btn-ghost btn-sm edit-client-billing" data-id="${c.id}" style="font-size:14px;padding:4px 10px">
              ${isCustom ? '<span class="badge badge-green" style="pointer-events:none">Custom rate card</span>' : '<span class="badge badge-gray" style="pointer-events:none">Standard</span>'}
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" style="margin-left:4px;opacity:.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </td>
          <td class="muted">${projCount} project${projCount!==1?'s':''}</td>
          <td>
            <div class="flex" style="justify-content:flex-end;gap:6px">
              <button class="btn btn-ghost btn-sm edit-client" data-id="${c.id}">Edit</button>
              <button class="btn btn-ghost btn-sm del-client" data-id="${c.id}" style="color:${projCount>0?'var(--text-3)':'var(--danger)'};${projCount>0?'cursor:not-allowed;opacity:0.5;':''}">Delete</button>
            </div>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    document.getElementById('new-client-btn')?.addEventListener('click', () => showClientModal());
    body.querySelectorAll('.edit-client').forEach(btn => btn.addEventListener('click', () => {
      showClientModal(getClient(btn.dataset.id));
    }));
    body.querySelectorAll('.edit-client-billing').forEach(btn => btn.addEventListener('click', () => {
      showClientModal(getClient(btn.dataset.id));
    }));
    body.querySelectorAll('.del-client').forEach(btn => btn.addEventListener('click', () => {
      const hasProjects = DB.projects.some(p => p.clientId === btn.dataset.id);
      if (hasProjects) {
        toast('This client still has projects! Rehome them first before pulling the plug 🔌', 'error');
        return;
      }
      if (!confirm('Delete this client?')) return;
      DB.clients = DB.clients.filter(c => c.id !== btn.dataset.id);
      saveDB(); renderView(); toast('Client deleted. Goodbye and good luck! 👋');
    }));

  } else {
    acts.innerHTML = `<button class="btn btn-primary" id="new-proj-btn">+ Add Project</button>`;

    // Build lead options for filter
    const leadsInProjects = [...new Set(DB.projects.map(p => p.leadId).filter(Boolean))];
    const leadOptions = leadsInProjects.map(id => {
      const m = getMember(id);
      return m?.id ? `<option value="${id}">${displayName(m)}</option>` : '';
    }).join('');

    // Client options for filter
    const clientsInProjects = [...new Set(DB.projects.map(p => p.clientId).filter(Boolean))];
    const clientOptions = clientsInProjects.map(id => {
      const c = getClient(id);
      return c?.id ? `<option value="${id}">${c.name}</option>` : '';
    }).join('');

    content.innerHTML = `
      <div class="card" style="padding:0;overflow:hidden">
        <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)">
          <div style="position:relative;flex:1;min-width:0;max-width:220px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="proj-search" placeholder="Search…" style="width:100%;padding:7px 9px 7px 28px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font)">
          </div>
          ${leadOptions ? `<select id="proj-lead-filter" style="font-size:13px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);width:140px;flex-shrink:0">
            <option value="">All leads</option>
            ${leadOptions}
          </select>` : ''}
          ${clientOptions ? `<select id="proj-client-filter" style="font-size:13px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);width:140px;flex-shrink:0">
            <option value="">All clients</option>
            ${clientOptions}
          </select>` : ''}
          <select id="proj-sort" style="font-size:13px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);width:130px;flex-shrink:0">
            <option value="name-asc" selected>Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
            <option value="client-asc">Client A–Z</option>
            <option value="hours-desc">Hours ↓</option>
            <option value="hours-asc">Hours ↑</option>
            <option value="billable-desc">Billable ↓</option>
          </select>
          <select id="proj-status-filter" style="font-size:13px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);width:120px;flex-shrink:0">
            <option value="active_upcoming">Active &amp; Upcoming</option>
            <option value="active">Active</option>
            <option value="upcoming">Upcoming</option>
            <option value="all">All</option>
            <option value="closed">Closed</option>
          </select>
          <span id="proj-count" style="font-size:14px;color:var(--text-3);white-space:nowrap;margin-left:auto;flex-shrink:0"></span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Project</th>
                <th>Client</th>
                <th>Lead</th>
                <th>Currency</th>
                <th>Billable Hrs</th>
                <th>Non-Bill. Hrs</th>
                <th>Billable Value</th>
                <th>Billing</th>
                <th>Financials</th>
              </tr>
            </thead>
            <tbody id="projects-body"></tbody>
          </table>
        </div>
      </div>
    `;

    const body = content.querySelector('#projects-body');
    const countEl = content.querySelector('#proj-count');

    function renderProjectRows() {
      const q = (content.querySelector('#proj-search')?.value || '').toLowerCase().trim();
      const leadFilter = content.querySelector('#proj-lead-filter')?.value || '';
      const clientFilter = content.querySelector('#proj-client-filter')?.value || '';
      const statusFilter = content.querySelector('#proj-status-filter')?.value || 'active_upcoming';
      const sort = content.querySelector('#proj-sort')?.value || 'name-asc';

      // Pre-compute data for all projects
      let rows = DB.projects.map(p => {
        const cli = getClient(p.clientId);
        const lead = getMember(p.leadId);
        const projEntries = entriesByProject(p.id);
        const totalH = projEntries.reduce((s,e)=>s+e.hours, 0);
        const billH  = projEntries.filter(e=>!e.nonBillable).reduce((s,e)=>s+e.hours, 0);
        const nonBillH = totalH - billH;
        const totalB = projEntries.reduce((s,e)=>s+entryBillable(e), 0);
        const curr = p.currency || cli.currency || DB.settings.defaultCurrency;
        return { p, cli, lead, totalH, billH, nonBillH, totalB, curr };
      });

      // Filter
      const today = new Date().toISOString().slice(0, 10);
      const todayMonth = today.slice(0, 7);
      // Derived status helpers (all based on actual date values vs today)
      const isActuallyClosed  = p => !!p.closedDate && p.closedDate < today;
      const isActuallyUpcoming = p => !!p.startDate && p.startDate > today;
      const isActuallyActive   = p => !isActuallyClosed(p) && !isActuallyUpcoming(p);
      if (statusFilter === 'active_upcoming') rows = rows.filter(({ p }) => isActuallyActive(p) || isActuallyUpcoming(p));
      if (statusFilter === 'active')   rows = rows.filter(({ p }) => isActuallyActive(p));
      if (statusFilter === 'upcoming') rows = rows.filter(({ p }) => isActuallyUpcoming(p));
      if (statusFilter === 'closed')   rows = rows.filter(({ p }) => isActuallyClosed(p));
      if (q) rows = rows.filter(({ p, cli }) =>
        p.name.toLowerCase().includes(q) || (cli.name||'').toLowerCase().includes(q)
      );
      if (leadFilter) rows = rows.filter(({ p }) => p.leadId === leadFilter);
      if (clientFilter) rows = rows.filter(({ p }) => p.clientId === clientFilter);

      // Sort
      rows.sort((a, b) => {
        switch (sort) {
          case 'name-asc':     return a.p.name.localeCompare(b.p.name);
          case 'name-desc':    return b.p.name.localeCompare(a.p.name);
          case 'client-asc': {
            const cmp = (a.cli.name||'').localeCompare(b.cli.name||'');
            return cmp !== 0 ? cmp : a.p.name.localeCompare(b.p.name);
          }
          case 'hours-desc':   return b.totalH - a.totalH;
          case 'hours-asc':    return a.totalH - b.totalH;
          case 'billable-desc':return b.totalB - a.totalB;
          default: {
            const cmp = (a.cli.name||'').localeCompare(b.cli.name||'');
            return cmp !== 0 ? cmp : a.p.name.localeCompare(b.p.name);
          }
        }
      });

      body.innerHTML = '';
      if (countEl) countEl.textContent = rows.length === DB.projects.length
        ? `${rows.length} project${rows.length !== 1 ? 's' : ''}`
        : `${rows.length} of ${DB.projects.length}`;

      if (rows.length === 0) {
        body.innerHTML = `<tr><td colspan="8"><div class="empty-state" style="padding:32px">
          <p>${DB.projects.length === 0 ? 'No projects yet.' : 'No projects match your filters.'}</p>
          ${DB.projects.length > 0 ? `<button class="btn btn-ghost btn-sm" id="clear-proj-filters">Clear filters</button>` : ''}
        </div></td></tr>`;
        body.querySelector('#clear-proj-filters')?.addEventListener('click', () => {
          content.querySelector('#proj-search').value = '';
          if (content.querySelector('#proj-lead-filter')) content.querySelector('#proj-lead-filter').value = '';
          if (content.querySelector('#proj-client-filter')) content.querySelector('#proj-client-filter').value = '';
          renderProjectRows();
        });
        return;
      }

      rows.forEach(({ p, cli, lead, totalH, billH, nonBillH, totalB, curr }) => {
        const currIsOverride = p.currency && p.currency !== cli.currency;
        // Change orders: sum approved/pending values (not rejected)
        const coSum = (p.changeOrders||[]).filter(c => c.status !== 'rejected').reduce((s,c) => s + (c.value||0), 0);
        const coCount = (p.changeOrders||[]).filter(c => c.status !== 'rejected').length;

        // Build financials cell — original budget + scope changes line
        function financialsCell() {
          if (p.billingType === 'variable_retainer' && p.variableRetainer?.yearlyBudget) {
            const base = p.variableRetainer.yearlyBudget;
            return `<div style="font-weight:700">${fmt(base + coSum, curr)}</div>
                    <div style="font-size:10px;color:var(--text-3);margin-top:1px">yearly budget</div>
                    ${coSum > 0 ? `<div style="font-size:10px;color:var(--accent);margin-top:3px">${fmt(base,curr)} + ${fmt(coSum,curr)} (${coCount} CO)</div>` : ''}`;
          }
          if (p.billingType === 'retainer' && p.retainer?.monthlyFee) {
            return `<div style="font-weight:700">${fmt(p.retainer.monthlyFee, curr)}</div>
                    <div style="font-size:10px;color:var(--text-3);margin-top:1px">per month</div>
                    ${coSum > 0 ? `<div style="font-size:10px;color:var(--accent);margin-top:3px">+${fmt(coSum,curr)} scope changes</div>` : ''}`;
          }
          if (p.billingType === 'fixed' && (p.fixedFee || coSum > 0)) {
            const base = p.fixedFee || 0;
            return coSum > 0
              ? `<div style="font-weight:800">${fmt(base + coSum, curr)}</div>
                 <div style="display:flex;flex-direction:column;gap:1px;margin-top:4px">
                   <div style="font-size:10px;color:var(--text-3)">${fmt(base,curr)} original</div>
                   <div style="font-size:10px;color:var(--accent);font-weight:700">+${fmt(coSum,curr)} scope changes</div>
                 </div>`
              : `<div style="font-weight:700">${fmt(base, curr)}</div><div style="font-size:10px;color:var(--text-3);margin-top:1px">project budget</div>`;
          }
          if (totalH > 0 && totalB > 0) {
            return `<div>${fmt(totalB/billH, curr)}/h</div><div style="font-size:10px;color:var(--text-3);margin-top:1px">avg rate</div>`;
          }
          return `<span style="color:var(--text-3)">—</span>`;
        }

        const tr = document.createElement('tr');
        tr.className = 'clickable';
        // Status badge and date sub-label — computed outside template to avoid nested backtick issues
        const _isUpcoming = p.startDate && p.startDate > today;
        const _isPastClosed = p.closedDate && p.closedDate < today;
        const _isFutureClose = p.closedDate && p.closedDate >= today && (() => {
          const d = new Date(p.closedDate); d.setHours(0,0,0,0);
          const t = new Date(today);        t.setHours(0,0,0,0);
          return (d - t) / 86400000 <= 30;
        })();
        const statusBadge = _isUpcoming
          ? '<span style="font-size:10px;font-weight:700;margin-left:6px;padding:1px 6px;border-radius:100px;white-space:nowrap;background:rgba(74,127,193,0.12);color:#4A7FC1">Upcoming</span>'
          : _isPastClosed
          ? '<span style="font-size:10px;font-weight:700;margin-left:6px;padding:1px 6px;border-radius:100px;white-space:nowrap;background:rgba(192,57,43,0.1);color:var(--danger)">Closed</span>'
          : _isFutureClose
          ? '<span style="font-size:10px;font-weight:700;margin-left:6px;padding:1px 6px;border-radius:100px;white-space:nowrap;background:rgba(192,57,43,0.06);color:#C0735A">Closing</span>'
          : '';
        const dateSubLabel = (p.startDate || p.closedDate) ? ('<div style="font-size:11px;color:var(--text-3);margin-top:1px">'
          + (p.startDate ? 'From ' + fmtDate(p.startDate) : '')
          + (p.startDate && p.closedDate ? ' · ' : '')
          + (p.closedDate ? (_isPastClosed ? 'Closed on ' : _isFutureClose ? 'Closing on ' : 'Closes on ') + fmtDate(p.closedDate) : '')
          + '</div>') : '';
        tr.innerHTML = `
          <td><div style="font-weight:700;font-family:var(--font);color:var(--text)">${p.name}${statusBadge}${p.importedAt ? '<span style="font-size:10px;font-weight:700;margin-left:6px;padding:1px 6px;border-radius:100px;white-space:nowrap;background:rgba(212,160,23,0.1);color:#B8860B">↓ Imported</span>' : ''}</div>${dateSubLabel}</td>
          <td class="muted">${cli.name||'—'}</td>
          <td>${lead?.id ? `<span style="font-size:13px">${displayName(lead)}</span>` : '<span style="color:var(--text-3)">—</span>'}</td>
          <td><span class="badge ${currIsOverride ? 'badge-amber' : 'badge-blue'}" title="${currIsOverride ? `Overrides client default (${cli.currency||'—'})` : 'Inherited from client'}">${curr}${currIsOverride?' ↑':''}</span></td>
          <td class="mono">${billH > 0 ? fmtH(billH) : '<span style="color:var(--text-3)">—</span>'}</td>
          <td class="mono" style="color:var(--text-3)">${nonBillH > 0 ? fmtH(nonBillH) : '<span style="color:var(--text-3)">—</span>'}</td>
          <td class="mono">${totalB > 0 ? fmt(totalB, curr) : '<span style="color:var(--text-3)">—</span>'}</td>
          <td>${
            p.billingType === 'retainer'          ? `<span class="badge" style="background:rgba(74,127,193,0.12);color:#4A7FC1">Retainer</span>` :
            p.billingType === 'variable_retainer' ? `<span class="badge" style="background:rgba(74,127,193,0.18);color:#2860A0">Variable Retainer</span>` :
            p.billingType === 'fixed'             ? `<span class="badge" style="background:rgba(150,80,180,0.1);color:#9650B4">Fixed Fee</span>` :
                                                    `<span class="badge badge-gray">T&amp;M</span>`
          }</td>
          <td class="mono">${financialsCell()}</td>
        `;
        tr.addEventListener('click', e => {
          if (e.target.closest('button')) return;
          projectDrillId = p.id;
          history.pushState({ view: 'clients' }, '', buildHash('clients'));
          renderView();
        });
        body.appendChild(tr);
      });
    }

    renderProjectRows();

    document.getElementById('new-proj-btn')?.addEventListener('click', () => showProjectModal());
    content.querySelector('#proj-search')?.addEventListener('input', renderProjectRows);
    content.querySelector('#proj-lead-filter')?.addEventListener('change', renderProjectRows);
    content.querySelector('#proj-client-filter')?.addEventListener('change', renderProjectRows);
    content.querySelector('#proj-sort')?.addEventListener('change', renderProjectRows);
    content.querySelector('#proj-status-filter')?.addEventListener('change', renderProjectRows);
  }
}

// ── PROJECT DETAIL / REPORT ──
function renderProjectDetail(el, acts) {
  const proj = getProject(projectDrillId);
  if (!proj?.id) { projectDrillId = null; renderView(); return; }

  // Backfill: sync any expense receipts that aren't yet in proj.files
  const existingExpenseFileIds = new Set((proj.files||[]).filter(f=>f.expenseId).map(f=>f.expenseId));
  const existingSowFileIds = new Set((proj.files||[]).filter(f=>f.sowId).map(f=>f.sowId));
  let needsSave = false;
  (proj.expenses||[]).forEach(exp => {
    if (exp.receiptUrl && !existingExpenseFileIds.has(exp.id)) {
      if (!proj.files) proj.files = [];
      const ext = exp.receiptUrl.split('.').pop().split('?')[0] || 'pdf';
      proj.files.push({
        id: genId('fl'),
        expenseId: exp.id,
        name: `[Receipt] ${exp.description||'Expense'}.${ext}`,
        size: 0,
        type: ext === 'pdf' ? 'application/pdf' : 'image/*',
        url: exp.receiptUrl,
        uploadedAt: exp.createdAt || new Date().toISOString(),
      });
      needsSave = true;
    }
  });
  (proj.changeOrders||[]).forEach(co => {
    if (co.docUrl && !existingSowFileIds.has(co.id)) {
      if (!proj.files) proj.files = [];
      const ext = co.docUrl.split('.').pop().split('?')[0] || 'pdf';
      const tagLabel = co.tag || (co.name||'').slice(0,12);
      proj.files.push({
        id: genId('fl'),
        sowId: co.id,
        name: `[SOW] ${tagLabel} — ${co.name||''}.${ext}`,
        size: 0,
        type: ext === 'pdf' ? 'application/pdf' : 'application/octet-stream',
        url: co.docUrl,
        uploadedAt: co.createdAt || new Date().toISOString(),
      });
      needsSave = true;
    }
  });
  if (needsSave) saveDB();

  const cli = getClient(proj.clientId);
  const curr = proj.currency || cli.currency || DB.settings.defaultCurrency;
  const entries = entriesByProject(proj.id);

  const totalHours = entries.reduce((s,e) => s+e.hours, 0);
  const totalBillable = entries.reduce((s,e) => s+entryBillable(e), 0);

  // Date range
  const dates = entries.map(e => e.date).filter(Boolean).sort();
  const dateRange = dates.length ? `${fmtDate(dates[0])} — ${fmtDate(dates[dates.length-1])}` : 'No entries yet';

  // By member
  const memberMap = {};
  entries.forEach(e => {
    if (!memberMap[e.teamMemberId]) memberMap[e.teamMemberId] = { hours: 0, billable: 0, entries: 0 };
    memberMap[e.teamMemberId].hours += e.hours;
    memberMap[e.teamMemberId].billable += entryBillable(e);
    memberMap[e.teamMemberId].entries++;
  });

  // By month — use retainer billing period if applicable
  const billingDay = proj.billingType === 'retainer' ? (proj.retainer?.billingDay || 1) : 1;
  const monthMap = {};
  entries.forEach(e => {
    const m = billingDay > 1 && e.date
      ? getRetainerPeriod(e.date, billingDay)
      : (e.month || dateToMonth(e.date) || '—');
    if (!monthMap[m]) monthMap[m] = { hours: 0, billable: 0 };
    monthMap[m].hours += e.hours;
    monthMap[m].billable += entryBillable(e);
  });
  const sortedMonths = Object.keys(monthMap).filter(m => m !== '—').sort();
  if (monthMap['—']) sortedMonths.push('—'); // unknown dates at end

  // Rate overrides kept for backwards compat; billing is now at client level
  const lead = getMember(proj.leadId);

  const todayStr = new Date().toISOString().slice(0, 10);
  const isClosed = !!proj.closedDate && proj.closedDate < todayStr;  // only truly closed if date is past
  // Topbar actions
  acts.innerHTML = `
    <button class="btn btn-ghost btn-sm" id="proj-back-btn">← Back to Projects</button>
    <button class="btn btn-ghost btn-sm edit-proj-btn">Edit Project</button>
    ${isClosed
      ? `<button class="btn btn-ghost btn-sm" id="proj-reopen-btn" style="color:var(--accent)">↑ Reopen Project</button>`
      : `<button class="btn btn-ghost btn-sm" id="proj-close-btn" style="color:var(--text-2)">Close Project</button>`}
    ${isAdmin() ? `<button class="btn btn-ghost btn-sm" id="proj-delete-btn" style="color:var(--danger)">Delete Project</button>` : ''}
  `;

  el.innerHTML = `
    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a id="bc-clients">Projects & Clients</a>
      <span>›</span>
      <a id="bc-projects">Projects</a>
      <span>›</span>
      <span>${proj.name}</span>
    </div>

    <!-- Report header -->
    <div id="report-root">
      <!-- Hero -->
      ${(() => {
        const billableH  = entries.filter(e=>!e.nonBillable).reduce((s,e)=>s+e.hours,0);
        const nonBillH   = totalHours - billableH;
        const coCount    = (proj.changeOrders||[]).filter(c=>c.status!=='rejected').length;
        const expTotal   = (proj.expenses||[]).reduce((s,e)=>s+(e.amount||0),0);
        const expBillBack= (proj.expenses||[]).filter(e=>e.billBack).reduce((s,e)=>s+(e.amount||0),0);

        // Billing type label + badge colour
        const billingLabels = {
          retainer:          ['Monthly Retainer', 'rgba(74,127,193,0.7)', '#4A7FC1'],
          variable_retainer: ['Variable Retainer', 'rgba(40,96,160,0.7)', '#2860A0'],
          fixed:             ['Fixed Fee',          'rgba(150,80,180,0.7)', '#9650B4'],
          time_materials:    ['Time & Materials',   'rgba(255,255,255,0.15)', 'rgba(255,255,255,0.7)'],
        };
        const [btLabel, btBg, btColor] = billingLabels[proj.billingType] || billingLabels['time_materials'];

        // Right-side stats — vary by billing type
        let stats = [];
        if (proj.billingType === 'retainer') {
          const r = proj.retainer || {};
          const blended = r.hoursIncluded > 0 ? (r.monthlyFee||0)/r.hoursIncluded : 0;
          stats = [
            { label:'Billable Hours',  value: fmtH(billableH) },
            ...(nonBillH > 0 ? [{ label:'Non-Billable', value: fmtH(nonBillH), muted: true }] : []),
            { label:'Monthly Fee',     value: fmt(r.monthlyFee||0, curr), highlight: true },
            { label:'Incl. Hours/mo',  value: fmtH(r.hoursIncluded||0) },
            ...(blended > 0 ? [{ label:'Blended Rate', value: fmt(blended,curr)+'/h' }] : []),
          ];
        } else if (proj.billingType === 'variable_retainer') {
          const vr = proj.variableRetainer || {};
          const totalApproved = Object.values(vr.approvals||{}).reduce((s,a)=>s+(a.feeApproved||(a.hoursApproved||0)*(a.hourlyRate||vr.hourlyRate||0)),0);
          const remaining = Math.max(0,(vr.yearlyBudget||0)-totalApproved);
          stats = [
            { label:'Billable Hours',    value: fmtH(billableH) },
            ...(nonBillH > 0 ? [{ label:'Non-Billable', value: fmtH(nonBillH), muted: true }] : []),
            { label:'Yearly Budget',     value: fmt(vr.yearlyBudget||0, curr), highlight: true },
            { label:'Approved to Date',  value: fmt(totalApproved, curr) },
            { label:'Remaining',         value: fmt(remaining, curr), danger: totalApproved > (vr.yearlyBudget||0) },
          ];
        } else if (proj.billingType === 'fixed') {
          const fixed = proj.fixedFee || 0;
          const coApproved = (proj.changeOrders||[]).filter(c => c.status !== 'rejected');
          const coSum = coApproved.reduce((s,c) => s + (c.value||0), 0);
          const totalBudget = fixed + coSum;
          const burnPct = totalBudget > 0 ? Math.min((totalBillable/totalBudget)*100,100) : 0;
          stats = [
            { label:'Hours Logged',  value: fmtH(totalHours) },
            ...(nonBillH > 0 ? [{ label:'Non-Billable', value: fmtH(nonBillH), muted: true }] : []),
            { label:'Original Budget', value: fmt(fixed, curr) },
            ...(coSum > 0 ? [{ label:`+${coApproved.length} Scope Changes`, value: fmt(coSum, curr), highlight: false, accent: true }] : []),
            { label: coSum > 0 ? 'Total Budget' : 'Fixed Fee', value: fmt(totalBudget, curr), highlight: true },
            { label:'Budget Burn',   value: burnPct.toFixed(0)+'%', danger: burnPct >= 90 },
          ];
        } else {
          // T&M — show budget burn if a budget is configured
          const tmBudget = proj.tmBudget || 0;
          const burnPct = tmBudget > 0 ? Math.min((totalBillable / tmBudget) * 100, 100) : 0;
          const avgRate = billableH > 0 ? totalBillable / billableH : 0;
          stats = [
            { label:'Billable Hours',  value: fmtH(billableH) },
            ...(nonBillH > 0 ? [{ label:'Non-Billable', value: fmtH(nonBillH), muted: true }] : []),
            { label:'Billable Value',  value: fmt(totalBillable, curr), highlight: true },
            ...(tmBudget > 0 ? [
              { label:'Budget',        value: fmt(tmBudget, curr) },
              { label:'Budget Burn',   value: burnPct.toFixed(0) + '%', danger: burnPct >= 90 },
            ] : [
              { label:'Avg Rate',      value: avgRate > 0 ? fmt(avgRate, curr) + '/h' : '—' },
            ]),
          ];
        }

        const statHtml = stats.map(s => `
          <div style="text-align:right;padding-left:24px;border-left:1px solid rgba(255,255,255,0.08)">
            <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:4px;white-space:nowrap">${s.label}</div>
            <div style="font-family:var(--font);font-size:${s.highlight?'28':'22'}px;font-weight:${s.muted?'400':'300'};letter-spacing:-0.5px;line-height:1;font-style:${s.muted?'italic':'normal'};color:${s.highlight?'#9BC25A':s.accent?'#4A7FC1':s.danger?'#E07060':s.muted?'rgba(255,255,255,0.55)':'#fff'}">${s.value}</div>
          </div>`).join('');

        // Meta tags row

  async function renderFileList() {
    const files = proj.files || [];
    filesCount.textContent = `${files.length} file${files.length !== 1 ? 's' : ''} attached`;
    if (files.length === 0) {
      filesList.innerHTML = '';
      return;
    }
    filesList.innerHTML = '';
    const listCard = document.createElement('div');
    listCard.className = 'card';
    listCard.style.padding = '0';
    listCard.style.overflow = 'hidden';

    files.forEach((f, idx) => {
      const row = document.createElement('div');
      row.style.cssText = `display:flex;align-items:center;gap:12px;padding:12px 20px;${idx < files.length-1 ? 'border-bottom:1px solid var(--border)' : ''}`;

      const icon = document.createElement('div');
      icon.style.cssText = 'font-size:22px;flex-shrink:0;width:32px;text-align:center';
      icon.textContent = fileIcon(f.type || '');
      row.appendChild(icon);

      info.style.cssText = 'flex:1;min-width:0';
      info.innerHTML = `
        <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px">
          ${f.expenseId ? `<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;white-space:nowrap;background:rgba(224,112,48,0.1);color:#7EB83B;flex-shrink:0">RECEIPT</span>` : ''}

        <div class="micro-11">${f.size > 0 ? fmtFileSize(f.size)+' · ' : ''}Uploaded ${new Date(f.uploadedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
      `;
      row.appendChild(info);

      // Download button
      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn btn-ghost btn-sm';
      dlBtn.textContent = 'Download';
      dlBtn.onclick = async () => {
        if (f.url) {
          const a = document.createElement('a');
          a.href = f.url; a.download = f.name; a.target = '_blank';
          document.body.appendChild(a); a.click();
          setTimeout(() => { document.body.removeChild(a); }, 100);
        } else {
          toast('No URL for this file — it may have been stored locally before Supabase was connected', 'error');
        }
      };
      row.appendChild(dlBtn);

      // Delete — role-tiered
      if (hasRole('admin', 'team_manager')) {
        const delBtn = document.createElement('button');
        delBtn.className = 'btn btn-ghost btn-sm';
        delBtn.style.color = 'var(--danger)';
        delBtn.textContent = isAdmin() ? 'Delete' : 'Remove (hide)';
        delBtn.onclick = async () => {
          // Admin: delete from Supabase Storage too
          if (isAdmin() && f.url) {
            const path = supaPathFromUrl(f.url);
            if (path) await supaDelete(path).catch(() => {});
          }
          proj.files = (proj.files || []).filter(x => x.id !== f.id);
          const _p1 = getProject(proj.id); if (_p1) _p1.files = proj.files;
          saveDB();
          renderFileList();
          toast(isAdmin() ? `${f.name} deleted` : `${f.name} removed`);
        };
        row.appendChild(delBtn);
      }

      listCard.appendChild(row);
    });
    filesList.appendChild(listCard);
  }

  async function handleFiles(fileList) {
    if (!supaCfg()) {
      toast('Connect Supabase first — Settings → Supabase Sync', 'error');
      return;
    }
    const MAX = 50 * 1024 * 1024;
    let uploaded = 0;
    for (const file of Array.from(fileList)) {
      if (file.size > MAX) { toast(`${file.name} is too large (max 50 MB)`, 'error'); continue; }
      const id = genId('fl');
      const ext = file.name.split('.').pop() || 'bin';
      const path = `project-files/${proj.id}/${id}.${ext}`;
      try {
        const url = await supaUpload(file, path);
        if (!proj.files) proj.files = [];
        proj.files.push({ id, name: file.name, size: file.size, type: file.type, url, uploadedAt: new Date().toISOString() });
        const _p2 = getProject(proj.id); if (_p2) _p2.files = proj.files;
        saveDB();
        uploaded++;
      } catch(e) {
        toast(`Could not upload ${file.name}: ${e.message}`, 'error');
        continue;
      }
    }
    renderFileList();
    if (uploaded > 0) toast(`${uploaded} file${uploaded !== 1 ? 's' : ''} uploaded to cloud storage ✓`);
  }

        hint.textContent = `Calculated: ${fmtH(h)} × ${fmt(r,curr)}/h = ${fmt(h*r,curr)}`;

    }

        .trim()
        .split(/\s+/)
        .slice(0, 3)
        .map(w => w.slice(0, 4))
        .join('-');
      tagInput.value = generated;
    });

    // Generate ID once — shared by file uploader and save handler so paths match
    const _coId = isEdit ? co.id : genId('co');
    let pendingDocUrl = co?.docUrl || '';

    // Live effective rate hint
    function updateCoRateHint() {
      const h = parseFloat(overlay.querySelector('#co-hours')?.value) || 0;

      } else if (hint) hint.textContent = '';

    overlay.querySelector('#co-hours')?.addEventListener('input', updateCoRateHint);
    overlay.querySelector('#co-value')?.addEventListener('input', updateCoRateHint);

        ? `Delete the OT change order <strong>${co.name}</strong>?<br><br>This will remove the overtime classification from the time entry and notify ${getMember(co.otMemberId)?.name || 'the team member'}.`

        isOtCo ? 'Remove OT Classification' : 'Delete Change Order',
        confirmMsg,
        'Delete',
        () => {
          // If OT CO — clear isOT on the linked entry
          if (isOtCo && co.otEntryId) {
            const otEntry = DB.timeEntries.find(e => e.id === co.otEntryId);
            if (otEntry) { otEntry.isOT = false; otEntry.otMultiplier = 1; }
            // Notify the member who logged the OT
            const otMem = getMember(co.otMemberId);
            if (otMem?.email) {
              const lead = getMember(proj.leadId);
              const subject = `OT Removed: ${proj.name}`;
              const body = `Hi ${otMem.name},\n\nYour overtime entry on ${co.otEntryId && DB.timeEntries.find(e=>e.id===co.otEntryId)?.date || 'the logged date'} for ${proj.name} has been removed by ${lead ? displayName(lead) : 'the project lead'}.\n\nThe OT classification has been cleared from the time entry. Please contact the project lead if you have questions.`;
              const ejsConfigured = DB.emailjs?.publicKey && DB.emailjs?.serviceId && DB.emailjs?.templateId;
              if (ejsConfigured) {
                sendNotificationEmail({ to_name: otMem.name, to_email: otMem.email, subject, message: body });
              } else {
                window.open(`mailto:${otMem.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
              }

          DB.timeEntries.forEach(e => { if (e.changeOrderId === co.id) e.changeOrderId = ''; });
          proj.files = (proj.files||[]).filter(f => f.sowId !== co.id && f.url !== co.docUrl);
          const _pf = getProject(proj.id); if (_pf) _pf.files = proj.files;
          proj.changeOrders = proj.changeOrders.filter(c => c.id !== co.id);
          saveDB(); overlay.remove(); renderView();
          toast(isOtCo ? 'OT removed — member notified' : 'Change order deleted');

    overlay.querySelector('#co-save').onclick = () => {

        value: parseFloat(overlay.querySelector('#co-value')?.value) || 0,
        currency: overlay.querySelector('#co-currency')?.value || curr,
        docUrl: pendingDocUrl,
      };
      if (!proj.changeOrders) proj.changeOrders = [];
      if (isEdit) {
        Object.assign(proj.changeOrders.find(c => c.id === co.id), data);
      } else {
        proj.changeOrders.push({ id: coId, createdAt: new Date().toISOString(), ...data });

      // Sync document into proj.files so it appears in Agreements & Files
      if (pendingDocUrl) {
        if (!proj.files) proj.files = [];
        const ext = pendingDocUrl.split('.').pop().split('?')[0] || 'pdf';
        const tagLabel = data.tag || name.slice(0,12);
        proj.files = proj.files.filter(f => f.sowId !== coId);
        proj.files.push({

          sowId: coId,
          name: `[SOW] ${tagLabel} — ${name}.${ext}`,

          url: pendingDocUrl,
          uploadedAt: new Date().toISOString(),

      }

      toast(isEdit ? 'SOW item updated ✓' : 'SOW item added ✓');
    };

  });

  document.getElementById('proj-delete-btn')?.addEventListener('click', () => {
    const entryCount = entriesByProject(proj.id).length;
    confirmModal(
      'Delete Project',
      `Permanently delete <strong>${proj.name}</strong>?${entryCount > 0 ? `<br><br>⚠ This will also delete <strong>${entryCount} time entr${entryCount !== 1 ? 'ies' : 'y'}</strong> logged against this project.` : ''}<br><br>This cannot be undone.`,
      'Delete Project',
      () => {
        DB.projects = DB.projects.filter(p => p.id !== proj.id);
        DB.timeEntries = DB.timeEntries.filter(e => e.projectId !== proj.id);
        projectDrillId = null;
        saveDB(); navigate('clients');
        toast(`${proj.name} deleted 🗑`);
      }
    );
  });
}

// ── Monthly Detail Modal (from project detail month click) ──
function showMonthlyDetailModal(proj, cli, curr, month, allEntries) {
  const billingDay = proj.billingType === 'retainer' ? (proj.retainer?.billingDay || 1) : 1;
  const periodRange = (proj.billingType === 'retainer' && billingDay > 1 && month !== '—')
    ? getRetainerPeriodRange(month, billingDay)
    : null;

  // Filter entries for this period
  const monthEntries = allEntries.filter(e => {
    if (periodRange) {
      return e.date && e.date >= periodRange.start && e.date <= periodRange.end;
    }
    return (e._month || entryMonth(e)) === month;
  }).sort((a,b) => (a.date||'').localeCompare(b.date||''));

  const totalHours = monthEntries.reduce((s,e) => s+e.hours, 0);
  const monthBill  = getMonthBillable(proj.id, month);

  // Date bounds — use retainer period range if applicable, else actual entry dates
  const dates = monthEntries.map(e => e.date||'').filter(Boolean).sort();
  const defaultFrom = periodRange ? periodRange.start : (dates[0] || '');
  const defaultTo   = periodRange ? periodRange.end   : (dates[dates.length-1] || '');

  // Build billing context bar for retainer/fixed projects
  let billingContextHtml = '';
  if (proj.billingType === 'retainer') {
    const r = proj.retainer || {};
    const billableHours = monthEntries.filter(e => !e.nonBillable).reduce((s,e) => s + e.hours, 0);
    const included = r.hoursIncluded || 0;
    const overage = Math.max(0, billableHours - included);
    const pct = included > 0 ? Math.min((billableHours / included) * 100, 100) : 0;
    billingContextHtml = `
      <div style="background:rgba(74,127,193,0.07);border:1px solid rgba(74,127,193,0.2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#4A7FC1;flex-shrink:0">Monthly Retainer</div>
        <div style="display:flex;gap:20px;flex:1;flex-wrap:wrap;font-size:13px">
          <div><span class="micro-label">Included</span><br><strong>${fmtH(included)}</strong></div>
          <div><span class="micro-label">Used</span><br><strong style="${billableHours > included ? 'color:var(--danger)' : 'color:var(--success)'}">${fmtH(billableHours)}</strong></div>
          ${overage > 0 ? `<div><span class="micro-label">Overage</span><br><strong style="color:var(--danger)">${fmtH(overage)} × ${fmt(r.overageRate||0, curr)}/h</strong></div>` : ''}
          <div><span class="micro-label">This Month</span><br><strong>${fmt(monthBill, curr)}</strong></div>
        </div>
        <div style="width:120px;flex-shrink:0">
          <div style="font-size:10px;color:var(--text-3);margin-bottom:4px;text-align:right">${billableHours.toFixed(1)} / ${included} h</div>
          <div style="height:6px;background:var(--border);border-radius:100px;white-space:nowrap;overflow:hidden">
            <div style="height:100%;width:${Math.min(pct,100).toFixed(0)}%;background:${billableHours > included ? 'var(--danger)' : '#4A7FC1'};border-radius:100px;white-space:nowrap"></div>
          </div>
        </div>
      </div>`;
  } else if (proj.billingType === 'variable_retainer') {
    const vr = proj.variableRetainer || {};
    const ap = vr.approvals?.[month] || {};
    const approvedHours = ap.hoursApproved || 0;
    const rate = ap.hourlyRate !== undefined ? ap.hourlyRate : (vr.hourlyRate || 0);
    const approvedFee = ap.feeApproved || (approvedHours * rate);
    const billableHours = monthEntries.filter(e => !e.nonBillable).reduce((s,e) => s + e.hours, 0);
    const pct = approvedHours > 0 ? Math.min((billableHours/approvedHours)*100,100) : 0;
    const over = billableHours > approvedHours && approvedHours > 0;
    billingContextHtml = `
      <div style="background:rgba(40,96,160,0.06);border:1px solid rgba(40,96,160,0.2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#2860A0;flex-shrink:0">Variable Retainer</div>
        <div style="display:flex;gap:20px;flex:1;flex-wrap:wrap;font-size:13px">
          <div><span class="micro-label">Approved Hours</span><br><strong>${approvedHours > 0 ? fmtH(approvedHours) : '—'}</strong></div>
          <div><span class="micro-label">Rate</span><br><strong>${fmt(rate, curr)}/h</strong></div>
          <div><span class="micro-label">Approved Fee</span><br><strong style="color:#2860A0">${approvedFee > 0 ? fmt(approvedFee, curr) : '—'}</strong></div>
          <div><span class="micro-label">Hours Used</span><br><strong style="${over?'color:var(--danger)':'color:var(--success)'}">${fmtH(billableHours)}</strong></div>
          ${ap.notes ? `<div><span class="micro-label">Notes</span><br><span style="font-size:14px;color:var(--text-2)">${ap.notes}</span></div>` : ''}
        </div>
        ${approvedHours > 0 ? `<div style="width:120px;flex-shrink:0">
          <div style="font-size:10px;color:var(--text-3);margin-bottom:4px;text-align:right">${billableHours.toFixed(1)} / ${approvedHours} h</div>
          <div style="height:6px;background:var(--border);border-radius:100px;white-space:nowrap;overflow:hidden">
            <div style="height:100%;width:${pct.toFixed(0)}%;background:${over?'var(--danger)':'#2860A0'};border-radius:100px;white-space:nowrap"></div>
          </div>
        </div>` : ''}
      </div>`;
  } else if (proj.billingType === 'fixed') {
    billingContextHtml = `
      <div style="background:rgba(150,80,180,0.06);border:1px solid rgba(150,80,180,0.2);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#9650B4;flex-shrink:0">Fixed Fee Project</div>
        <div style="font-size:13px;color:var(--text-2)">Hours are tracked for progress only. Total fixed fee: <strong>${fmt(proj.fixedFee||0, curr)}</strong></div>
      </div>`;
  }

  const body = document.createElement('div');
  body.innerHTML = `
    ${billingContextHtml}

    <!-- Stats bar -->
    <div id="md-stats" style="display:flex;gap:24px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
      <div><div class="lbl">Total Hours</div><div id="md-stat-hours" style="font-size:22px;font-weight:300;font-family:var(--font)">${fmtH(totalHours)}</div></div>
      <div><div class="lbl">${proj.billingType === 'fixed' ? 'Fixed Fee' : 'Billable Value'}</div><div id="md-stat-bill" style="font-size:22px;font-weight:800;font-family:var(--font);color:var(--accent)">${fmt(monthBill, curr)}</div></div>
      <div><div class="lbl">Entries</div><div id="md-stat-entries" style="font-size:22px;font-weight:300;font-family:var(--font)">${monthEntries.length}</div></div>
    </div>

    <!-- Filter toolbar -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div class="row-6">
        <label style="font-size:14px;color:var(--text-3);white-space:nowrap">From</label>
        <input type="date" id="md-date-from" value="${defaultFrom}" style="font-size:14px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font)">
      </div>
      <div class="row-6">
        <label style="font-size:14px;color:var(--text-3);white-space:nowrap">To</label>
        <input type="date" id="md-date-to" value="${defaultTo}" style="font-size:14px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font)">
      </div>
      <div style="width:1px;height:20px;background:var(--border);flex-shrink:0"></div>
      <label style="display:flex;align-items:center;gap:5px;font-size:14px;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="md-show-billable" checked style="width:14px;height:14px"> Billable
      </label>
      <label style="display:flex;align-items:center;gap:5px;font-size:14px;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="md-show-nonbillable" checked style="width:14px;height:14px"> Non-billable
      </label>
      <div style="width:1px;height:20px;background:var(--border);flex-shrink:0"></div>
      <label style="display:flex;align-items:center;gap:5px;font-size:14px;cursor:pointer;white-space:nowrap">
        <input type="checkbox" id="md-show-billable-col" checked style="width:14px;height:14px"> Show Billable column
      </label>
      <span id="md-filter-count" style="margin-left:auto;font-size:14px;color:var(--text-3);white-space:nowrap"></span>
    </div>

    <!-- Table -->
    <div id="md-table-wrap" style="overflow:auto;max-height:52vh"></div>

    <!-- Actions -->
    <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost btn-sm" id="monthly-print-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
      <button class="btn btn-ghost btn-sm" id="monthly-excel-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
        Export to Excel
      </button>
      <button class="btn btn-primary btn-sm" id="monthly-pdf-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Generate Report PDF
      </button>
    </div>
  `;

  const overlay = showModal(
    periodRange
      ? `${proj.name} — ${fmtMonth(month)} <span style="font-size:14px;font-weight:400;color:var(--text-3)">(${fmtDateRange(periodRange.start, periodRange.end)})</span>`
      : `${proj.name} — ${fmtMonth(month)}`,
    '', '960px'
  );
  overlay.querySelector('.modal-body').appendChild(body);

  // ── Live table renderer ──
  function getFiltered() {
    const from = body.querySelector('#md-date-from').value;
    const to   = body.querySelector('#md-date-to').value;
    const showB  = body.querySelector('#md-show-billable').checked;
    const showNB = body.querySelector('#md-show-nonbillable').checked;
    return monthEntries.filter(e => {
      if (from && e.date && e.date < from) return false;
      if (to   && e.date && e.date > to)   return false;
      if (!showB  && !e.nonBillable) return false;
      if (!showNB && e.nonBillable)  return false;
      return true;
    });
  }

  function renderTable() {
    const showBillCol = body.querySelector('#md-show-billable-col').checked;
    const filtered = getFiltered();
    const fHours = filtered.reduce((s,e) => s+e.hours, 0);
    const fBill  = filtered.reduce((s,e) => s+entryBillable(e), 0);

    // Update stats
    body.querySelector('#md-stat-hours').textContent = fmtH(fHours);
    body.querySelector('#md-stat-bill').textContent  = fmt(fBill, curr);
    body.querySelector('#md-stat-entries').textContent = filtered.length;
    const countEl = body.querySelector('#md-filter-count');
    if (countEl) countEl.textContent = filtered.length < monthEntries.length
      ? `${filtered.length} of ${monthEntries.length} entries`
      : `${monthEntries.length} entr${monthEntries.length !== 1 ? 'ies' : 'y'}`;

    const wrap = body.querySelector('#md-table-wrap');
    if (filtered.length === 0) {
      wrap.innerHTML = `<div class="empty-state" style="padding:32px"><p>No entries match the current filters.</p></div>`;
      return;
    }

    const colCount = showBillCol ? 5 : 4;
    const rows = filtered.map(e => {
      const mem = getMember(e.teamMemberId);
      const billableAmt = entryBillable(e);
      const billCell = showBillCol ? `<td style="padding:9px 16px;text-align:right;white-space:nowrap">
        ${e.nonBillable
          ? `<span class="micro-12">Non-billable</span>`
          : `<span style="font-size:13px;font-weight:600;color:var(--success)">${fmt(billableAmt, curr)}</span>`}
      </td>` : '';
      const co = e.changeOrderId ? (proj.changeOrders||[]).find(c => c.id === e.changeOrderId) : null;
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:9px 16px;font-size:14px;color:var(--text-2);white-space:nowrap">${e.date ? fmtDate(e.date) : ''}</td>
        <td style="padding:9px 16px;font-size:13px;font-weight:600">${displayName(mem)||'—'}</td>
        <td style="padding:9px 16px;font-size:13px;color:var(--text-2);max-width:240px">${e.description||'—'}</td>
        <td style="padding:9px 16px;font-size:14px;white-space:nowrap">${co
          ? `<code style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;background:rgba(224,112,48,0.1);color:#7EB83B">${co.tag||co.name}</code>${co.tag && co.tag !== co.name ? `<div style="font-size:10px;color:var(--text-3);margin-top:2px">${co.name}</div>` : ''}`
          : '<span class="micro-label">Original scope</span>'}</td>
        <td style="padding:9px 16px;font-family:var(--font);font-weight:700;text-align:right;white-space:nowrap">${fmtH(e.hours)}</td>
        ${billCell}
      </tr>`;
    }).join('');

    const billHead = showBillCol ? `<th style="padding:8px 16px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Billable</th>` : '';
    const billFoot = showBillCol ? `<td style="padding:12px 16px;text-align:right;font-weight:800;font-size:15px;color:#9BC25A;font-family:var(--font)">${fmt(fBill, curr)}</td>` : '';
    const coColCount = 4 + (showBillCol ? 1 : 0); // Date + Member + Desc + CO + Hours [+ Billable]

    wrap.innerHTML = `
      <table class="tbl">
        <thead style="position:sticky;top:0;background:var(--card);z-index:1">
          <tr>
            <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border);white-space:nowrap">Date</th>
            <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Member</th>
            <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Description</th>
            <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#7EB83B;border-bottom:1px solid var(--border)">SOW / Change Order</th>
            <th style="padding:8px 16px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Hours</th>
            ${billHead}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot>
          <tr style="background:var(--sidebar-bg)">
            <td colspan="${coColCount - 1}" style="padding:12px 16px;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;color:rgba(255,255,255,0.5)">Total</td>
            <td style="padding:12px 16px;text-align:right;font-weight:800;font-size:15px;color:#fff;font-family:var(--font)">${fmtH(fHours)}</td>
            ${billFoot}
          </tr>
        </tfoot>
      </table>`;
  }

  renderTable();

  // Wire all controls
  ['#md-date-from','#md-date-to','#md-show-billable','#md-show-nonbillable','#md-show-billable-col'].forEach(sel => {
    body.querySelector(sel)?.addEventListener('change', renderTable);
  });

  const pdfBtnHTML = body.querySelector('#monthly-pdf-btn').innerHTML;

  body.querySelector('#monthly-print-btn')?.addEventListener('click', () => {
    const filtered = getFiltered();
    const fHours = filtered.reduce((s,e) => s+e.hours, 0);
    const fBill  = filtered.reduce((s,e) => s+entryBillable(e), 0);
    const showBillCol = body.querySelector('#md-show-billable-col').checked;
    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html><head>
      <meta charset="UTF-8"><title>${proj.name} — ${fmtMonth(month)}</title>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
      <style>
        *{box-sizing:border-box;margin:0;padding:0} body{font-family:'Manrope',sans-serif;font-size:13px;color:#2F2F2F;background:#fff;padding:32px}
        table{width:100%;border-collapse:collapse} th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #E2E2E2}
        th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#ADADAB;background:#F5F5F3}
        .stat{display:inline-block;margin-right:32px;margin-bottom:20px}
        .stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#ADADAB;margin-bottom:4px}
        .stat-val{font-size:22px;font-weight:800} @media print{body{padding:16px}}
      </style>
    </head><body>
      <h1 style="font-size:20px;font-weight:800;margin-bottom:4px">${proj.name}</h1>
      <p style="color:#898987;margin-bottom:20px">${cli.name||''} · ${fmtMonth(month)}</p>
      <div style="margin-bottom:24px;padding-bottom:20px;border-bottom:2px solid #E2E2E2">
        <div class="stat"><div class="stat-label">Total Hours</div><div class="stat-val">${fmtH(fHours)}</div></div>
        ${showBillCol ? `<div class="stat"><div class="stat-label">Billable Value</div><div class="stat-val" style="color:#678F2F">${fmt(fBill,curr)}</div></div>` : ''}
        <div class="stat"><div class="stat-label">Entries</div><div class="stat-val">${filtered.length}</div></div>
      </div>
      <table>
        <thead><tr><th>Date</th><th>Member</th><th>Description</th><th style="text-align:right">Hours</th>${showBillCol?'<th style="text-align:right">Billable</th>':''}</tr></thead>
        <tbody>
          ${filtered.map(e => {
            const mem = getMember(e.teamMemberId);
            return `<tr><td>${e.date?fmtDate(e.date):''}</td><td>${displayName(mem)||''}</td><td>${e.description||'—'}</td><td style="text-align:right">${fmtH(e.hours)}</td>${showBillCol?`<td style="text-align:right">${e.nonBillable?'Non-billable':fmt(entryBillable(e),curr)}</td>`:''}</tr>`;
          }).join('')}
        </tbody>
        <tfoot><tr style="font-weight:800;border-top:2px solid #2F2F2F"><td colspan="${showBillCol?3:3}">Total</td><td style="text-align:right">${fmtH(fHours)}</td>${showBillCol?`<td style="text-align:right;color:#678F2F">${fmt(fBill,curr)}</td>`:''}</tr></tfoot>
      </table>
    </body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 600);
  });

  body.querySelector('#monthly-excel-btn')?.addEventListener('click', () => {
    if (typeof XLSX === 'undefined') { toast('Excel library not loaded — check your connection', 'error'); return; }
    const filtered = getFiltered();
    const fHours = filtered.reduce((s,e) => s+e.hours, 0);
    const fBill  = filtered.reduce((s,e) => s+entryBillable(e), 0);
    const filename = `${proj.name} - ${cli.name||'Client'} - ${fmtMonth(month)}.xlsx`.replace(/[/\\?*[\]]/g, '-');
    const wb = XLSX.utils.book_new();

    const summaryData = [
      ['Project', proj.name],
      ['Client',  cli.name || ''],
      ['Period',  fmtMonth(month)],
      [],
      ['Total Hours',   fHours],
      ['Billable Value', fBill],
      ['Entries',       filtered.length],
      ['Team Members',  new Set(filtered.map(e => e.teamMemberId)).size],
    ];
    const wsSummary = XLSX.utils.aoa_to_sheet(summaryData);
    wsSummary['!cols'] = [{ wch: 20 }, { wch: 30 }];
    XLSX.utils.book_append_sheet(wb, wsSummary, 'Summary');

    const headers = ['Date', 'Member', 'Job Title', 'Description', 'Hours', 'Billable', 'Amount'];
    const rows = filtered.map(e => {
      const mem = getMember(e.teamMemberId);
      const jt = (DB.jobTitles||[]).find(j => j.id === mem.jobTitleId);
      const billableAmt = e.nonBillable ? 0 : entryBillable(e);
      return [e.date||'', displayName(mem)||'', jt?.name||'', e.description||'', e.hours, e.nonBillable?'Non-billable':'Billable', e.nonBillable?0:billableAmt];
    });
    rows.push(['', '', '', 'TOTAL', fHours, '', fBill]);

    const wsEntries = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    wsEntries['!cols'] = [{ wch: 12 },{ wch: 22 },{ wch: 22 },{ wch: 40 },{ wch: 8 },{ wch: 14 },{ wch: 14 }];
    const headerRange = XLSX.utils.decode_range(wsEntries['!ref']);
    for (let col = headerRange.s.c; col <= headerRange.e.c; col++) {
      const addr = XLSX.utils.encode_cell({ r: 0, c: col });
      if (!wsEntries[addr]) wsEntries[addr] = {};
      wsEntries[addr].s = { font: { bold: true }, fill: { fgColor: { rgb: 'F5F5F3' } } };
    }
    XLSX.utils.book_append_sheet(wb, wsEntries, 'Time Entries');

    const memberSummaryHeaders = ['Member', 'Job Title', 'Hours', 'Billable Value', 'Rate Source'];
    const memberRows = Object.entries(
      filtered.reduce((acc, e) => {
        if (!acc[e.teamMemberId]) acc[e.teamMemberId] = { hours: 0, billable: 0 };
        acc[e.teamMemberId].hours += e.hours;
        acc[e.teamMemberId].billable += entryBillable(e);
        return acc;
      }, {})
    ).sort((a,b) => b[1].hours - a[1].hours).map(([mid, d]) => {
      const mem = getMember(mid);
      const jt = (DB.jobTitles||[]).find(j => j.id === mem.jobTitleId);
      const { source } = getEffectiveRate(mid, proj.id);
      return [displayName(mem)||'', jt?.name||'', d.hours, d.billable, source==='rate_card'?'Rate Card':'Default Rate'];
    });
    memberRows.push(['TOTAL', '', fHours, fBill, '']);

    const wsMember = XLSX.utils.aoa_to_sheet([memberSummaryHeaders, ...memberRows]);
    wsMember['!cols'] = [{ wch: 22 },{ wch: 22 },{ wch: 8 },{ wch: 16 },{ wch: 14 }];
    XLSX.utils.book_append_sheet(wb, wsMember, 'By Member');

    XLSX.writeFile(wb, filename);
    toast('Excel file downloaded ✓');
  });

  body.querySelector('#monthly-pdf-btn')?.addEventListener('click', () => {
    const btn = body.querySelector('#monthly-pdf-btn');
    btn.disabled = true;
    btn.textContent = 'Generating…';
    const filtered = getFiltered();
    const fHours = filtered.reduce((s,e) => s+e.hours, 0);
    const fBill  = filtered.reduce((s,e) => s+entryBillable(e), 0);
    const showBillCol = body.querySelector('#md-show-billable-col').checked;

    const logoSection = cli.logo
      ? `<div style="margin-bottom:6px"><img src="${cli.logo}" style="max-height:56px;max-width:180px;object-fit:contain;display:block"></div>`
      : '';
    const misLogo = DB.design?.logoSvg
      ? `<div style="opacity:0.5">${DB.design.logoSvg}</div>`
      : `<div style="font-size:13px;font-weight:700;color:#678F2F">MIS</div>`;

    const tableRows = filtered.map(e => {
      const mem = getMember(e.teamMemberId);
      const billCell = showBillCol
        ? `<td style="text-align:right;font-variant-numeric:tabular-nums">${e.nonBillable ? '<span style="color:#ADADAB">Non-billable</span>' : `<span style="color:#678F2F;font-weight:600">${fmt(entryBillable(e),curr)}</span>`}</td>`
        : '';
      return `<tr>
        <td>${e.date ? fmtDate(e.date) : ''}</td>
        <td>${displayName(mem)||''}</td>
        <td>${(e.description||'—').replace(/</g,'&lt;')}</td>
        <td style="text-align:right;font-variant-numeric:tabular-nums">${fmtH(e.hours)}</td>
        ${billCell}
      </tr>`;
    }).join('');

    const billHead = showBillCol ? `<th style="text-align:right">Billable</th>` : '';
    const billFoot = showBillCol ? `<td style="text-align:right;color:#678F2F">${fmt(fBill,curr)}</td>` : '';

    const htmlContent = `<!DOCTYPE html><html><head>
      <meta charset="UTF-8"><title>${proj.name} — ${fmtMonth(month)}</title>
      <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
      <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Manrope',sans-serif;font-size:13px;color:#2F2F2F;background:#fff;padding:40px 48px}
        .page-header{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:24px;border-bottom:2px solid #2F2F2F;margin-bottom:28px}
        .client-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#ADADAB;margin-top:8px}
        .report-meta{text-align:right}
        .report-meta h1{font-size:22px;font-weight:800;color:#2F2F2F;margin-bottom:4px}
        .report-meta .period{font-size:13px;color:#898987}
        .stats{display:flex;gap:0;margin-bottom:28px;border:1px solid #E2E2E2;border-radius:6px;overflow:hidden}
        .stat{flex:1;padding:16px 20px;border-right:1px solid #E2E2E2}
        .stat:last-child{border-right:none}
        .stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#ADADAB;margin-bottom:6px}
        .stat-val{font-size:20px;font-weight:800;color:#2F2F2F}
        .stat-val.green{color:#678F2F}
        table{width:100%;border-collapse:collapse}
        thead th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#ADADAB;background:#F8F8F6;border-bottom:2px solid #E2E2E2}
        tbody td{padding:10px 14px;border-bottom:1px solid #F0F0EE;vertical-align:top}
        tfoot td{padding:12px 14px;font-weight:800;border-top:2px solid #2F2F2F;font-size:14px}
        .footer{margin-top:40px;padding-top:16px;border-top:1px solid #E2E2E2;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#ADADAB}
        @media print{body{padding:24px 32px} @page{margin:0.5cm}}
      </style>
    </head><body>
      <div class="page-header">
        <div class="client-block">
          ${logoSection}
          <div class="client-name">${cli.name||''}</div>
        </div>
        <div class="report-meta">
          <h1>${proj.name}</h1>
          <div class="period">${fmtMonth(month)} · Hours Report</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-label">Total Hours</div><div class="stat-val">${fmtH(fHours)}</div></div>
        ${showBillCol ? `<div class="stat"><div class="stat-label">Billable Value</div><div class="stat-val green">${fmt(fBill,curr)}</div></div>` : ''}
        <div class="stat"><div class="stat-label">Entries</div><div class="stat-val">${filtered.length}</div></div>
        <div class="stat"><div class="stat-label">Team Members</div><div class="stat-val">${new Set(filtered.map(e=>e.teamMemberId)).size}</div></div>
      </div>
      <table>
        <thead><tr><th>Date</th><th>Member</th><th>Description</th><th style="text-align:right">Hours</th>${billHead}</tr></thead>
        <tbody>${tableRows}</tbody>
        <tfoot><tr><td colspan="${showBillCol?3:3}">Total</td><td style="text-align:right">${fmtH(fHours)}</td>${billFoot}</tr></tfoot>
      </table>
      <div class="footer">
        <div>Generated by TRACKR · ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</div>
        ${misLogo}
      </div>
    </body></html>`;

    const win = window.open('', '_blank');
    if (!win) { toast('Allow pop-ups to generate the PDF', 'error'); btn.disabled = false; btn.innerHTML = pdfBtnHTML; return; }
    win.document.write(htmlContent);
    win.document.close();
    const printWhenReady = () => {
      if (win.document.readyState === 'complete') { setTimeout(() => { win.focus(); win.print(); }, 400); }
      else { setTimeout(printWhenReady, 100); }
    };
    printWhenReady();
    btn.disabled = false;
    btn.innerHTML = pdfBtnHTML;
  });
}

function showClientModal(client = null) {
  const isEdit = !!client;
  const c = client || { name:'', currency: DB.settings.defaultCurrency, logo: '', billingModel: 'standard', rateCard: {} };
  const billingModel = c.billingModel || 'standard';
  const rateCard = c.rateCard || {};

  // Build rate card rows — one per job title
  const rateCardRows = (DB.jobTitles||[]).map(jt => {
    const rate = rateCard[jt.id] !== undefined ? rateCard[jt.id] : '';
    return `<div class="rate-override-row">
      <label style="font-size:13px">${jt.name} <span class="micro-11">${jt.category}</span></label>
      <input type="number" class="rc-input" data-jt="${jt.id}" value="${rate}" placeholder="Rate/h" style="max-width:120px" min="0">
    </div>`;
  }).join('');

  const body = `
    <div class="form-row">
      <div class="form-group full">
        <label>Client Name</label>
        <input type="text" id="cm-name" value="${c.name||''}" placeholder="e.g. Acme Corp">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Classification</label>
        <select id="cm-classification">
          <option value="client" ${(c.classification||'client')==='client'?'selected':''}>Client</option>
          <option value="prospect" ${c.classification==='prospect'?'selected':''}>Prospect</option>
        </select>
        <div class="form-hint">Prospects only appear in CSM. Clients appear everywhere.</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Default Currency</label>
        <select id="cm-currency">
          ${DB.settings.currencies.map(cu=>`<option value="${cu}" ${cu===c.currency?'selected':''}>${cu}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Billing Model</label>
        <select id="cm-billing-model">
          <option value="standard" ${billingModel==='standard'?'selected':''}>Standard — per member rate</option>
          <option value="rate_card" ${billingModel==='rate_card'?'selected':''}>Rate Card — by job function</option>
        </select>
        <div class="form-hint">Rate card bills based on the team member's job title.</div>
      </div>
    </div>

    <div id="cm-rate-card-section" style="display:${billingModel==='rate_card'?'block':'none'}">
      <div class="section-divider" style="margin:16px 0 12px">Rate Card <span style="font-size:10px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--text-3)">(per job title — leave blank to fall back to member default)</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 24px">
        ${rateCardRows}
      </div>
    </div>

    <div class="form-row" style="margin-top:16px">
      <div class="form-group full">
        <label>Client Logo</label>
        <div style="display:flex;align-items:center;gap:14px;margin-top:6px">
          <div id="cm-logo-preview" style="width:72px;height:48px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
            ${c.logo ? `<img src="${c.logo}" style="max-width:100%;max-height:100%;object-fit:contain">` : `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.5" width="22" height="22"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`}
          </div>
          <div>
            <label class="btn btn-secondary btn-sm" style="cursor:pointer;display:inline-block;margin-bottom:4px">
              Upload Logo
              <input type="file" id="cm-logo" accept="image/*" style="display:none">
            </label>
            ${c.logo && hasRole('admin','team_manager') ? `<button class="btn btn-ghost btn-sm" id="cm-remove-logo" style="margin-left:6px;color:var(--danger)">Remove${isAdmin() ? '' : ' (hide)'}</button>` : ''}
            <div class="form-hint">PNG or SVG recommended. Used in report exports.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cm-cancel">Cancel</button>
      <button class="btn btn-primary" id="cm-save">${isEdit?'Update Client':'Add Client'}</button>
    </div>
  `;
  const overlay = showModal(isEdit?'Edit Client':'Add Client', body, 'max-width:640px');
  let pendingLogo = c.logo || '';

  // Toggle rate card section visibility
  overlay.querySelector('#cm-billing-model').addEventListener('change', function() {
    overlay.querySelector('#cm-rate-card-section').style.display = this.value === 'rate_card' ? 'block' : 'none';
  });

  // Logo upload preview
  overlay.querySelector('#cm-logo').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!supaCfg()) {
      toast('Connect Supabase first — Settings → Supabase Sync', 'error');
      e.target.value = '';
      return;
    }
    try {
      const clientId = client?.id || 'new-' + Date.now();
      const ext = file.name.split('.').pop() || 'png';
      const path = `logos/${clientId}.${ext}`;
      const localUrl = URL.createObjectURL(file);
      const preview = overlay.querySelector('#cm-logo-preview');
      preview.innerHTML = `<img src="${localUrl}" style="max-width:100%;max-height:100%;object-fit:contain">`;
      pendingLogo = localUrl;
      const finalUrl = await supaUpload(file, path);
      URL.revokeObjectURL(localUrl); // free blob from memory
      pendingLogo = finalUrl;
      preview.innerHTML = `<img src="${finalUrl}" style="max-width:100%;max-height:100%;object-fit:contain">`;
      toast('Logo uploaded ✓');
    } catch(e) {
      toast('Logo upload failed: ' + e.message, 'error');
    }
  });

  overlay.querySelector('#cm-remove-logo')?.addEventListener('click', async () => {
    const oldLogo = pendingLogo;
    pendingLogo = '';
    const preview = overlay.querySelector('#cm-logo-preview');
    preview.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.5" width="22" height="22"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;
    if (isAdmin() && oldLogo) {
      const path = supaPathFromUrl(oldLogo);
      if (path) await supaDelete(path).catch(() => {});
    }
  });

  overlay.querySelector('#cm-cancel').onclick = () => overlay.remove();
  overlay.querySelector('#cm-save').onclick = () => {
    const name = overlay.querySelector('#cm-name').value.trim();
    const currency = overlay.querySelector('#cm-currency').value;
    const billingModel = overlay.querySelector('#cm-billing-model').value;
    if (!name) { toast('Every client needs a name — even mysterious ones 🕵️', 'error'); return; }
    // Collect rate card
    const rateCard = {};
    overlay.querySelectorAll('.rc-input').forEach(inp => {
      const val = parseFloat(inp.value);
      if (!isNaN(val) && val >= 0) rateCard[inp.dataset.jt] = val;
    });
    const classification = overlay.querySelector('#cm-classification')?.value || 'client';
    if (isEdit) Object.assign(getClient(client.id), { name, currency, logo: pendingLogo, billingModel, rateCard, classification });
    else DB.clients.push({ id: genId('cl'), name, currency, logo: pendingLogo, billingModel, rateCard, classification });
    saveDB(); overlay.remove(); renderView(); toast(isEdit?'Client details updated — nice! ✏️':'New client added — welcome aboard! 🎉');
  };
}
