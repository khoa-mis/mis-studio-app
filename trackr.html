      <div style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:14px">
        Import from a Google Sheet or CSV. New clients are created automatically.<br>
        Columns: <code class="code-pill">Project</code> <code class="code-pill">Client</code> <code class="code-pill">Currency</code> <code class="code-pill">Billing</code> <code class="code-pill">Lead</code>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px">
        <input type="text" id="imp-proj-url" placeholder="Google Sheets URL" style="flex:1;min-width:200px">
        <input type="text" id="imp-proj-tab" placeholder="Tab name (optional)" style="width:160px">
        <button class="btn btn-primary" id="imp-proj-sheet-btn">Fetch Sheet</button>
      </div>
      <div id="imp-proj-status" style="margin-top:10px;font-size:13px"></div>
      <div id="imp-proj-preview" style="display:none;margin-top:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px">
          <div style="font-size:13px;font-weight:700">Preview — <span id="imp-proj-count"></span></div>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;cursor:pointer;text-transform:none;letter-spacing:0;color:var(--text)">
            <input type="checkbox" id="imp-proj-preview-newonly" style="width:14px;height:14px;accent-color:var(--accent)">
            New records only (skip existing)
          </label>
        </div>
        <div id="imp-proj-table" style="overflow-x:auto;max-height:320px;overflow-y:auto"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button class="btn btn-ghost btn-sm" id="imp-proj-cancel">Cancel</button>
          <button class="btn btn-primary btn-sm" id="imp-proj-confirm">Import Projects</button>
        </div>
      </div>
    </div>`;

  return '';
}

function wireSettingsPage(el) {
  const s = DB.settings;

    if (settingsPage === 'design') {
      // Live colour preview — sync color picker → swatch + hex input
      el.querySelectorAll('.ds-color').forEach(input => {
        const key = input.dataset.key;
        const swatch = el.querySelector(`.ds-swatch[data-key="${key}"]`);
        const hexInput = el.querySelector(`.ds-hex[data-key="${key}"]`);
        input.addEventListener('input', () => {
          if (swatch) swatch.style.background = input.value;
          if (hexInput) hexInput.value = input.value;
        });
      });

      // Hex input → color picker + swatch (on valid hex)
      el.querySelectorAll('.ds-hex').forEach(hexInput => {
        const key = hexInput.dataset.key;
        const colorInput = el.querySelector(`.ds-color[data-key="${key}"]`);
        const swatch = el.querySelector(`.ds-swatch[data-key="${key}"]`);
        hexInput.addEventListener('input', () => {
          let val = hexInput.value.trim();
          if (!val.startsWith('#')) val = '#' + val;
          // Only apply if valid 6-digit hex
          if (/^#[0-9a-fA-F]{6}$/.test(val)) {
            if (colorInput) colorInput.value = val;
            if (swatch) swatch.style.background = val;
            hexInput.value = val;
          }
        });
        hexInput.addEventListener('keydown', e => { if (e.key === 'Enter') hexInput.blur(); });
      });

      // Logo upload
      el.querySelector('#ds-logo-upload')?.addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        if (!supaCfg()) {
          toast('Connect Supabase first — Settings → Supabase Sync', 'error');
          e.target.value = '';
          return;
        }
        try {
          const ext = file.name.split('.').pop() || 'svg';
          const path = `branding/logo.${ext}`;
          toast('Uploading logo…', 'info');
          const finalUrl = await supaUpload(file, path);
          DB.design.logoSvg = finalUrl;
          saveDB(); applyDesign(); renderView();
          toast('Logo uploaded to cloud storage ✓');
        } catch(e) {
          toast('Logo upload failed: ' + e.message, 'error');
        }
      });

      el.querySelector('#ds-logo-remove')?.addEventListener('click', async () => {
        const oldLogo = DB.design.logoSvg;
        DB.design.logoSvg = '';
        if (isAdmin() && oldLogo) {
          const path = supaPathFromUrl(oldLogo);
          if (path) await supaDelete(path).catch(() => {});
        }
        saveDB(); applyDesign(); renderView();
        toast('Logo removed');
      });

      // Save & Apply — prefer hex input value (user may have typed directly)
      el.querySelector('#ds-save-btn')?.addEventListener('click', () => {
        el.querySelectorAll('.ds-color').forEach(input => {
          const key = input.dataset.key;
          const hexInput = el.querySelector(`.ds-hex[data-key="${key}"]`);
          const hexVal = hexInput?.value.trim();
          // Use hex input if valid, otherwise fall back to color picker
          if (hexVal && /^#[0-9a-fA-F]{6}$/.test(hexVal)) {
            DB.design[key] = hexVal;
          } else {
            DB.design[key] = input.value;
          }
        });
        el.querySelectorAll('.ds-radius').forEach(input => {
          const v = input.value.trim();
          if (v) DB.design[input.dataset.key] = v.includes('px') ? v : v + 'px';
        });
        const font = el.querySelector('#ds-font')?.value;
        if (font) DB.design.font = font;
        saveDB();
        applyDesign();
        toast('Design system applied ✨');
      });

      // Reset to defaults
      el.querySelector('#ds-reset-btn')?.addEventListener('click', () => {
        DB.design = {
          accent: '#678F2F', accentHover: '#537825', bg: '#F2F1EE', card: '#FFFFFF',
          sidebar: '#2F2F2F', text: '#2F2F2F', border: '#E2E2E2', danger: '#C0392B',
          info: '#4A7FC1', radiusSm: '3px', radius: '6px', radiusLg: '8px',
          headerH: '64px', sidebarW: '256px', font: 'Manrope', logoSvg: '',
        };
        saveDB(); applyDesign(); renderView();
        toast('Design reset to defaults');
      });
    }

    if (settingsPage === 'import') {
      el.querySelector('#s-import-save')?.addEventListener('click', () => {
        DB.settings.xeroSyncFrom = el.querySelector('#s-xero-sync-from').value || '';
        saveDB();
        toast('Import settings saved ✓');
      });
    }

    if (settingsPage === 'currencies') {
    el.querySelectorAll('.currency-pill').forEach(pill => {
      pill.addEventListener('click', e => {
        if (e.target.classList.contains('remove-currency')) return;
        DB.settings.defaultCurrency = pill.dataset.currency;
        saveDB(); renderView();
      });
    });
    el.querySelectorAll('.remove-currency').forEach(btn => btn.addEventListener('click', e => {
      e.stopPropagation();
      const c = btn.dataset.c;
      if (c === DB.settings.defaultCurrency) { toast('You can\'t remove your default currency — it\'s the favourite! Set another as default first 🏆', 'error'); return; }
      DB.settings.currencies = DB.settings.currencies.filter(cu=>cu!==c);
      saveDB(); renderView();
    }));
    el.querySelector('#new-currency-input')?.addEventListener('input', e => {
      const val  = e.target.value.trim().toUpperCase();
      const hint = el.querySelector('#currency-hint');
      if (!hint || val.length !== 3) return;
      const codes = FX.getSupportedCodes();
      if (!codes) return;
      const match = codes.find(c => c.code === val);
      hint.textContent = match ? `✓ ${match.name}` : `✗ "${val}" is not a valid ExchangeRate-API currency code`;
      hint.style.color = match ? 'var(--accent)' : 'var(--danger)';
    });
    el.querySelector('#add-currency-btn')?.addEventListener('click', () => {
      const val = el.querySelector('#new-currency-input').value.trim().toUpperCase();
      if (!val || val.length < 2 || val.length > 4) { toast('Currency codes are 2-4 letters — like USD, SGD, EUR... not "PIZZA" 🍕', 'error'); return; }
      if (DB.settings.currencies.includes(val)) { toast('Already got that one! No duplicates allowed in this economy 💰', 'error'); return; }
      // Validate against FX supported codes if available
      if (FX.getKey() && !FX.isValidCode(val)) {
        toast(`"${val}" isn't a valid ExchangeRate-API code — check the code and try again`, 'error'); return;
      }
      DB.settings.currencies.push(val);
      if (!DB.settings.symbols) DB.settings.symbols = {};
      DB.settings.symbols[val] = val;
      saveDB(); renderView(); toast(`${val} added to the money mix 💱`);
    });
    el.querySelector('#save-symbols-btn')?.addEventListener('click', () => {
      el.querySelectorAll('.symbol-input').forEach(inp => {
        const sym = inp.value.trim();
        if (sym) { if (!DB.settings.symbols) DB.settings.symbols={}; DB.settings.symbols[inp.dataset.currency]=sym; }
      });
      saveDB(); renderView(); toast('Currency symbols saved — looking ✨ sharp');
    });

    el.querySelector('#fx-save')?.addEventListener('click', async () => {
      const key    = el.querySelector('#fx-key').value.trim();
      const status = el.querySelector('#fx-status');
      if (!key) { status.textContent = 'Enter an API key first.'; status.style.color = 'var(--danger)'; return; }
      FX.setKey(key);
      status.textContent = 'Testing…'; status.style.color = 'var(--text-3)';
      const [rates, codes] = await Promise.all([FX.getRates('USD'), FX.fetchSupportedCodes()]);
      if (rates && codes) {
        status.textContent = `✓ Connected — ${codes.length} currencies supported, rates loaded`;
        status.style.color = 'var(--accent)';
        toast('FX rates and currency list loaded ✓');
      } else if (rates) {
        status.textContent = `✓ Rates loaded (${Object.keys(rates).length} currencies)`;
        status.style.color = 'var(--accent)';
        toast('FX rates loaded ✓');
      } else {
        status.textContent = '✗ Connection failed — check your API key';
        status.style.color = 'var(--danger)';
      }
    });
  }

    if (settingsPage === 'email') {
    el.querySelector('#save-emailjs-btn')?.addEventListener('click', async () => {
      const publicKey = el.querySelector('#ejs-public-key').value.trim();
      const serviceId = el.querySelector('#ejs-service-id').value.trim();
      const templateId = el.querySelector('#ejs-template-id').value.trim();
      const statusEl = el.querySelector('#emailjs-test-status');
      if (!publicKey || !serviceId || !templateId) { toast('EmailJS needs all three keys — think of it as a 3-lock safe 🔐', 'error'); return; }
      DB.emailjs = { publicKey, serviceId, templateId };
      saveDB();
      toast('EmailJS saved — let the notifications fly! ✉️');
      const testRecipient = DB.teamMembers.find(m => m.email);
      if (!testRecipient) { statusEl.innerHTML = `<span style="color:var(--accent)">Saved. Add a team member with an email to test.</span>`; return; }
      statusEl.textContent = 'Sending test email…';
      const result = await sendNotificationEmail({
        to_email: testRecipient.email, to_name: testRecipient.name,
        from_name: 'mis.studio', subject: 'EmailJS test — TRACKR',
        message: `Hi ${testRecipient.name},\n\nThis is a test email from TRACKR. EmailJS is configured correctly!`,
      });
      if (result.ok) statusEl.innerHTML = `<span style="color:var(--accent)">&#10003; Test sent to ${testRecipient.email}</span>`;
      else statusEl.innerHTML = `<span style="color:var(--danger)">Failed: ${result.reason}</span>`;
    });
  }

    if (settingsPage === 'schedule') {
    // Day pill toggle
    el.querySelectorAll('label:has(input[name="sched-day"])').forEach(lbl => {
      lbl.addEventListener('click', () => {
        const cb = lbl.querySelector('input');
        requestAnimationFrame(() => {
          const on = cb.checked;
          lbl.style.background = on ? 'var(--accent)' : 'var(--bg)';
          lbl.style.color = on ? '#fff' : 'var(--text-2)';
          lbl.style.borderColor = on ? 'var(--accent)' : 'var(--border)';
        });
      });
    });

    // Chip search
    const schedSearch = el.querySelector('#sched-search');
    const schedDropdown = el.querySelector('#sched-dropdown');
    const schedChips = el.querySelector('#sched-chips');
    const getSelectedIds = () => [...schedChips.querySelectorAll('.sched-chip')].map(c => c.dataset.id);
    const addChip = (m) => {
      if (getSelectedIds().includes(m.id)) return;
      const chip = document.createElement('div');
      chip.className = 'sched-chip'; chip.dataset.id = m.id;
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:100px;padding:4px 10px 4px 8px;font-size:13px;font-weight:600;color:var(--accent)';
      chip.innerHTML = `<div class="avatar-sm" style="width:18px;height:18px;font-size:8px">${initials(m.name)}</div>${displayName(m)}<button class="sched-remove" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0;line-height:1;opacity:0.6;width:auto;height:auto">&#10005;</button>`;
      chip.querySelector('.sched-remove').onclick = () => chip.remove();
      schedChips.appendChild(chip);
    };
    schedChips.addEventListener('click', e => { if (e.target.closest('.sched-remove')) e.target.closest('.sched-chip').remove(); });
    schedSearch?.addEventListener('input', () => {
      const q = schedSearch.value.trim().toLowerCase();
      schedDropdown.innerHTML = '';
      if (!q) { schedDropdown.style.display = 'none'; return; }
      const matches = DB.teamMembers.filter(m => m.email && !m.archived && (m.name.toLowerCase().includes(q) || m.email.toLowerCase().includes(q)));
      if (!matches.length) { schedDropdown.innerHTML = `<div style="padding:10px 14px;font-size:13px;color:var(--text-3)">No matches</div>`; schedDropdown.style.display = 'block'; return; }
      matches.forEach(m => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border)';
        row.innerHTML = `<div class="avatar-sm">${initials(m.name)}</div><div><div style="font-weight:600;font-size:13px">${m.name}</div><div class="micro-11">${m.email}</div></div>`;
        row.addEventListener('mouseenter', () => row.style.background = 'var(--bg)');
        row.addEventListener('mouseleave', () => row.style.background = '');
        row.addEventListener('click', () => { addChip(m); schedSearch.value = ''; schedDropdown.style.display = 'none'; });
        schedDropdown.appendChild(row);
      });
      schedDropdown.style.display = 'block';
    });
    const _closeSchedDrop = (e) => {
      if (schedSearch && schedDropdown &&
          !schedSearch.contains(e.target) && !schedDropdown.contains(e.target)) {
        schedDropdown.style.display = 'none';
      }
    };
    if (window._schedDropdownHandler) document.removeEventListener('click', window._schedDropdownHandler);
    window._schedDropdownHandler = _closeSchedDrop;
    document.addEventListener('click', _closeSchedDrop);

    el.querySelector('#save-schedule-btn')?.addEventListener('click', () => {
      const enabled = el.querySelector('#sched-enabled').checked;
      const days = [...el.querySelectorAll('input[name="sched-day"]:checked')].map(i => parseInt(i.value));
      const recipients = getSelectedIds();
      DB.schedule = { ...DB.schedule, enabled, days, recipients };
      saveDB();
      toast('Schedule saved — we\'ll take it from here 📅');
      el.querySelector('#schedule-status').innerHTML = '';
    });
    el.querySelector('#send-now-btn')?.addEventListener('click', async () => {
      const statusEl = el.querySelector('#schedule-status');
      statusEl.textContent = 'Sending…';
      const result = await sendScheduledReport();
      if (result.ok) statusEl.innerHTML = `<span style="color:var(--accent)">&#10003; Sent to ${result.count} recipient${result.count!==1?'s':''}</span>`;
      else statusEl.innerHTML = `<span style="color:var(--danger)">${result.reason}</span>`;
    });
  }

    if (settingsPage === 'overtime') {
      el.querySelector('#ot-mult-save')?.addEventListener('click', () => {
        if (!DB.settings.otMultipliers) DB.settings.otMultipliers = { weekday:1.5, weekend:2, holiday:3 };

      // Fetch holidays from Calendarific
      el.querySelectorAll('.ot-fetch-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const code = btn.dataset.country;
          const year = parseInt(el.querySelector(`.ot-import-year[data-country="${code}"]`)?.value || new Date().getFullYear());
          const statusEl = el.querySelector(`.ot-fetch-status[data-country="${code}"]`);
          const calKey = localStorage.getItem('mis-calendarific-key');
          if (!calKey) {
            if (statusEl) statusEl.innerHTML = `<span style="color:var(--danger)">No Calendarific API key configured. Go to <strong>Settings → AI Features</strong> to add one. Free tier available at <a href="https://calendarific.com" target="_blank" style="color:var(--accent)">calendarific.com</a>.</span>`;
            return;

          btn.textContent = 'Fetching…'; btn.disabled = true;
          if (statusEl) statusEl.innerHTML = '<span style="color:var(--text-3)">Fetching from Calendarific…</span>';
          try {
            const res = await fetch(`https://calendarific.com/api/v2/holidays?api_key=${encodeURIComponent(calKey)}&country=${code}&year=${year}&type=national`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            if (json.meta?.code !== 200) throw new Error(json.meta?.error_detail || `API error ${json.meta?.code}`);
            const holidays = json.response?.holidays;
            if (!Array.isArray(holidays)) throw new Error('Unexpected response structure.');
            if (!DB.settings.nationalHolidays) DB.settings.nationalHolidays = {};
            if (!DB.settings.nationalHolidays[code]) DB.settings.nationalHolidays[code] = [];
            const existing = new Set(DB.settings.nationalHolidays[code]);
            let added = 0;
            holidays.forEach(h => {
              const d = h.date?.iso?.slice(0, 10);
              if (d && !existing.has(d)) { existing.add(d); added++; }
            });
            DB.settings.nationalHolidays[code] = [...existing].sort();
            saveDB(); renderView();
            toast(`${added} holiday${added!==1?'s':''} imported for ${year} ✓`);
          } catch(e) {
            btn.textContent = `Import ${year} holidays`; btn.disabled = false;

          // Test: try to fetch the table (will 404 if table doesn't exist, 200/[] if it does)

            ? { 'apikey': key }
            : { 'apikey': key, 'Authorization': 'Bearer ' + key };
          const res = await fetch(`${url}/rest/v1/mis_workspaces?id=eq.${encodeURIComponent(wsId)}&select=id`, {
            headers: _testHeaders
          });
          if (res.ok) {
            const existing = await res.json().catch(() => []);
            if (existing && existing.length > 0) {
              // Remote data exists — pull it, never overwrite
              const pulled = await supabasePull(); // sets _supabaseReady
              if (pulled) { loadDB(); applyDesign(); renderView(); }
              statusEl.innerHTML = '<span style="color:var(--accent)">✓ Connected! Data restored from Supabase.</span>';

              // No remote data — confirmed empty, safe to push local DB

              await supabasePush();
              statusEl.innerHTML = '<span style="color:var(--accent)">✓ Connected! Data pushed to Supabase.</span>';
              renderView();

            statusEl.innerHTML = '<span style="color:var(--danger)">Table not found — please run the setup SQL first.</span>';
          } else {
            statusEl.innerHTML = `<span style="color:var(--danger)">Connection failed (${res.status}) — check your URL and key.</span>`;

    const _colHelper = (headers, row, ...names) => {
      for (const n of names) {

      tableId:'imp-mem-table', cancelId:'imp-mem-cancel', confirmId:'imp-mem-confirm',
      parse(headers, dataRows) {
          const h = headers.map(x => x.toLowerCase().replace(/[^a-z0-9]/g,''));
          const col = (r, ...n) => _colHelper(h, r, ...n);
          return dataRows.map(r => ({

          return `<table class="tbl"><thead><tr style="background:var(--bg)">

async function fetchGoogleSheet(url, sheetName) {
  // Extract spreadsheet ID from URL
  const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if (!match) throw new Error('Could not parse spreadsheet ID from URL.');
  const id = match[1];

  const csvUrl = sheetName
    ? `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`
    : `https://docs.google.com/spreadsheets/d/${id}/export?format=csv`;

  const res = await fetch(csvUrl);
  if (!res.ok) throw new Error(`HTTP ${res.status} — check sheet sharing settings.`);
  const text = await res.text();
  if (text.includes('<html') || text.includes('Sign in')) throw new Error('Sheet is not publicly accessible. Enable "Anyone with the link can view".');

  return parseCSV(text);
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuote) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') inQuote = false;
      else cell += c;
    } else {
      if (c === '"') inQuote = true;
      else if (c === ',') { row.push(cell.trim()); cell = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        if (c === '\r') i++;
        row.push(cell.trim()); cell = '';
        if (row.some(v => v !== '')) rows.push(row);
        row = [];
      } else cell += c;
    }
  }
  if (cell || row.length) { row.push(cell.trim()); if (row.some(v => v !== '')) rows.push(row); }
  return rows;
}

// Shared Google Sheets import panel — identical signature to PAY's wireSheetImportPanel
// opts: { urlId, tabId, fetchBtnId, statusId, previewId, countId, tableId, cancelId, confirmId, parse, previewHtml, onConfirm }
function wireSheetImportPanel(el, opts) {
  const statusEl = el.querySelector('#' + opts.statusId);
  const previewWrap = el.querySelector('#' + opts.previewId);
  let _rows = [];

  async function doFetch() {
    const raw = el.querySelector('#' + opts.urlId).value.trim();
    const tab = el.querySelector('#' + opts.tabId)?.value.trim() || '';
    if (!raw || !raw.includes('docs.google.com')) { statusEl.innerHTML = '<span style="color:var(--danger)">Please enter a valid Google Sheets URL.</span>'; return; }
    const btn = el.querySelector('#' + opts.fetchBtnId);
    btn.textContent = 'Fetching…'; btn.disabled = true;
    statusEl.innerHTML = '<span style="color:var(--text-3)">Connecting…</span>';
    try {
      const allRows = await fetchGoogleSheet(raw, tab);
      if (!allRows || allRows.length < 2) throw new Error('Sheet appears empty. Check sharing is set to "Anyone with the link can view".');
      _rows = opts.parse(allRows[0], allRows.slice(1).filter(r => r.some(v => v)));
      if (!_rows.length) throw new Error('No valid rows found. Check column headers.');
      renderPreview();
      previewWrap.style.display = '';
      statusEl.innerHTML = '';
    } catch(e) { statusEl.innerHTML = `<span style="color:var(--danger)">${e.message}</span>`; }
    finally { btn.textContent = 'Fetch Sheet'; btn.disabled = false; }
  }

  function renderPreview() {
    const newOnly = el.querySelector('#' + opts.previewId + '-newonly')?.checked || false;
    el.querySelector('#' + opts.countId).textContent = _rows.length + ' row' + (_rows.length !== 1 ? 's' : '');
    el.querySelector('#' + opts.tableId).innerHTML = opts.previewHtml(_rows, newOnly);
  }

  el.querySelector('#' + opts.fetchBtnId)?.addEventListener('click', doFetch);
  el.querySelector('#' + opts.cancelId)?.addEventListener('click', () => { previewWrap.style.display = 'none'; _rows = []; statusEl.innerHTML = ''; });

  // Re-render preview when "new only" toggle changes
  el.addEventListener('change', e => {
    if (e.target.id === opts.previewId + '-newonly' && _rows.length) renderPreview();
  });

  el.querySelector('#' + opts.confirmId)?.addEventListener('click', () => {
    if (!_rows.length) return;
    const newOnly = el.querySelector('#' + opts.previewId + '-newonly')?.checked || false;
    const result = opts.onConfirm(_rows, el, newOnly);
    previewWrap.style.display = 'none'; _rows = [];
    statusEl.innerHTML = `<span style="color:var(--accent)">✓ ${result}</span>`;
    toast(result + ' ✓');
    saveDB();
  });
}

function autoDetectColumns() {
  const s = _importState;
  const headers = s.headers.map(h => h.toLowerCase().replace(/[^a-z0-9]/g,' ').trim());
  const fieldHints = {
    date:        ['date','day','when','entry date','work date'],
    member:      ['name','member','team member','staff','employee','person','who','user'],
    client:      ['client','customer','company','account'],
    project:     ['project','job','task','work'],
    hours:       ['hours','time','duration','hrs','h','logged','spent'],
    description: ['description','notes','details','work done','task description','activity','note'],
    billable:    ['billable','bill','billing','chargeable'],
  };
  s.colMap = {};
  Object.entries(fieldHints).forEach(([field, hints]) => {
    const idx = headers.findIndex(h => hints.some(hint => h.includes(hint)));
    if (idx >= 0 && !Object.values(s.colMap).includes(idx)) s.colMap[field] = idx;
  });
}

  footer.querySelector('#iw-back-btn').onclick = () => { s.step = 1; renderImportWizard(); };
  footer.querySelector('#iw-next-btn').onclick = () => {

    errEl.textContent = '';
    // Read selections
    s.dateFmt = body.querySelector('#iw-date-fmt')?.value || 'dmy';
    FIELDS.forEach(f => {
      const sel = body.querySelector('#col-' + f.id);
      s.colMap[f.id] = parseInt(sel.value);
    });
    // Validate required
    const missing = FIELDS.filter(f => f.required && s.colMap[f.id] < 0).map(f => f.label);
    if (missing.length) { errEl.textContent = `Required: ${missing.join(', ')}`; return; }

    buildValueMappings();
    s.step = 3;
    renderImportWizard();

// ── STEP 3: Map Values ──
function buildValueMappings() {
  const s = _importState;
  const dataRows = s.rawRows.slice(1);
  const get = (row, field) => (s.colMap[field] >= 0 ? (row[s.colMap[field]] || '').trim() : '');

  // Only map team members — client and project come from TRACKR selection in Step 1
  const memberVals = [...new Set(dataRows.map(r => get(r, 'member')).filter(Boolean))];

  const normalize = str => str.toLowerCase().replace(/[^a-z0-9]/g, '');
  const fuzzyFind = (val, list, keyFn) => {
    const nVal = normalize(val);
    return list.find(item => normalize(keyFn(item)) === nVal) ||
           list.find(item => normalize(keyFn(item)).includes(nVal) || nVal.includes(normalize(keyFn(item)))) ||
           null;
  };

  memberVals.forEach(v => {
    if (!s.memberMap[v]) {
      const match = fuzzyFind(v, DB.teamMembers.filter(m => !m.archived), m => m.name);
      s.memberMap[v] = match ? match.id : null;
    }
  });
}

// ── STEP 4: Review ──
function buildImportPreview() {
  const s = _importState;
  const dataRows = s.rawRows.slice(1);
  const get = (row, field) => (s.colMap[field] >= 0 ? (row[s.colMap[field]] || '').trim() : '');

  s.preview = [];
  s.skipped = 0;

  dataRows.forEach((row, idx) => {
    const memberId = s.memberMap[get(row, 'member')];
    const clientId = s.clientId;   // from TRACKR selection in Step 1
    const projectId = s.projectId; // from TRACKR selection in Step 1
    const dateRaw = get(row, 'date');
    const hoursRaw = get(row, 'hours');
    const hours = parseFloat(hoursRaw.replace(/[^0-9.]/g, ''));

    if (!memberId || !clientId || !projectId || !dateRaw || isNaN(hours) || hours <= 0) {  // date null check is below
      s.skipped++;
      return;
    }

    // Normalise date to YYYY-MM-DD using configured format
    const date = normaliseImportDate(dateRaw, s.dateFmt || 'dmy');
    if (!date) { s.skipped++; return; } // unparseable date → skip

    const billableRaw = get(row, 'billable').toLowerCase();
    const nonBillable = ['no','false','0','n','x','non-billable','non billable'].includes(billableRaw) ? true : false;

    s.preview.push({
      teamMemberId: memberId,
      clientId, projectId,
      date, hours,
      description: get(row, 'description') || '',
      nonBillable,
      month: dateToMonth(date),
      _row: idx + 2,
    });
  });
}

// ── AUTH, SESSION & GOOGLE SSO ──
const SESSION_KEY = 'mis-session-v1';

function getSession() {
  try { return JSON.parse(sessionStorage.getItem(SESSION_KEY)); } catch { return null; }
}

function setSession(memberId) {
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({ memberId }));
  invalidateUserCache();
}

function clearSession() {
  sessionStorage.removeItem(SESSION_KEY);
  invalidateUserCache();
}

let _currentUserCache = null;
let _currentUserCacheId = null;
function currentUser() {
  const s = getSession();
  if (!s) { _currentUserCache = null; _currentUserCacheId = null; return null; }
  if (_currentUserCacheId === s.memberId && _currentUserCache) return _currentUserCache;
  const testUser = (DB.testUsers || []).find(t => t.id === s.memberId);
  _currentUserCache = testUser || (DB.teamMembers || []).find(m => m.id === s.memberId) || null;
  _currentUserCacheId = s.memberId;
  return _currentUserCache;
}
function invalidateUserCache() { _currentUserCache = null; _currentUserCacheId = null; }

function isAdmin() {
  const u = currentUser();
  return u && u.role === 'admin';
}

// Returns true if current user has at least the given role level
function hasRole(...roles) {
  const u = currentUser();
  return u && roles.includes(u.role);
}

function applyRoleToBody() {
  const u = currentUser();
  const role = u ? u.role : '';
  document.body.classList.toggle('is-admin', role === 'admin');
  document.body.classList.toggle('is-team-manager', role === 'team_manager');
  document.body.classList.toggle('is-manager-plus', role === 'admin' || role === 'team_manager');
  updateSidebarNav();
}

function updateSidebarNav() {
  const user = currentUser();
  const role = user?.role || '';
  const isTest = (DB.testUsers||[]).some(t => t.id === (user?.id||''));
  const allowed = DB.rolePermissions?.[role] || [];
  document.querySelectorAll('.nav-item[data-view]').forEach(el => {
    const view = el.dataset.view;
    const canSee = isTest ? true : (view === 'settings' ? role === 'admin' : allowed.includes(view));
    el.style.display = canSee ? '' : 'none';
  });
}

// Decode a Google JWT credential without verifying signature (client-side only)
function decodeGoogleJWT(credential) {
  try {
    const payload = credential.split('.')[1];
    const decoded = JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
    return decoded; // { email, name, picture, hd, sub, ... }
  } catch { return null; }
}

function handleGoogleCredential(response) {
  const screen = document.getElementById('login-screen');
  const errEl = screen ? screen.querySelector('.login-error') : null;

  const payload = decodeGoogleJWT(response.credential);
  if (!payload) {
    if (errEl) { errEl.textContent = 'Google sign-in failed — could not read credentials.'; errEl.classList.add('show'); }
    return;
  }

  const allowedDomain = DB.account?.allowedDomain || '';
  const emailDomain = payload.email ? payload.email.split('@')[1] : '';

  // Check domain restriction
  if (allowedDomain && emailDomain !== allowedDomain) {
    if (errEl) {
      errEl.textContent = `Access restricted to @${allowedDomain} accounts. You signed in with @${emailDomain}.`;
      errEl.classList.add('show');
    }
    return;
  }

  // Match to an active team member
  let mem = DB.teamMembers.find(m => m.email.toLowerCase() === payload.email.toLowerCase() && !m.archived);

  // Block archived members explicitly
  const archivedMatch = !mem && DB.teamMembers.find(m => m.email.toLowerCase() === payload.email.toLowerCase() && m.archived);
  if (archivedMatch) {
    if (errEl) { errEl.textContent = 'Your account has been archived. Contact your admin to restore access.'; errEl.classList.add('show'); }
    return;
  }

  const isNewUser = !mem;

  if (!mem) {
    // Auto-create a new team member from Google profile data
    const hasAdmin = DB.teamMembers.some(m => m.role === 'admin' && !m.archived);
    mem = {
      id: genId('tm'),
      name: payload.name || payload.email.split('@')[0],
      email: payload.email.toLowerCase(),
      role: hasAdmin ? 'member' : 'admin',  // first ever user gets admin
      defaultRate: 0,
      defaultCurrency: DB.settings.defaultCurrency,
      availableHours: 160,
      trackUtilisation: true,
      archived: false,
      hiddenProjects: [],
      category: '',
      nickname: '',
      photo: payload.picture || null,
      needsOnboarding: true,  // flag to show profile completion
    };
    DB.teamMembers.push(mem);
  }

  // Ensure at least one admin exists (fallback) — single saveDB after all mutations
  if (!DB.teamMembers.some(m => m.role === 'admin' && !m.archived)) { mem.role = 'admin'; }
  saveDB();

  setSession(mem.id);
  if (screen) screen.remove();
  bootApp();

  // If new user, show profile completion modal after boot
  if (isNewUser) {
    setTimeout(() => showProfileOnboarding(mem), 400);
  }
}

function initGoogleSignIn(clientId, allowedDomain) {
  if (typeof google === 'undefined' || !google.accounts) {
    // GSI not loaded yet — retry shortly
    setTimeout(() => initGoogleSignIn(clientId, allowedDomain), 300);
    return;
  }
  const config = { client_id: clientId, callback: handleGoogleCredential, ux_mode: 'popup' };
  if (allowedDomain) config.hd = allowedDomain;
  google.accounts.id.initialize(config);
  const btn = document.getElementById('g-signin-btn');
  if (btn) {
    google.accounts.id.renderButton(btn, {
      theme: 'outline', size: 'large', width: 312, text: 'signin_with', shape: 'rectangular'
    });
  }
}

        role: 'admin',
        nickname: '',
        defaultRate: 0,
        defaultCurrency: DB.settings?.defaultCurrency || 'USD',
        availableHours: 160,
        trackUtilisation: true,
        archived: false,
        hiddenProjects: [],
        category: '',
        photo: null,
      });
      saveDB();
    }
    // If allowedDomain isn't set yet, infer it from the admin's email
    if (!DB.account.allowedDomain && email.includes('@')) {
      DB.account.allowedDomain = email.split('@')[1];
      saveDB();
    }
    // Sign the new admin straight in — no need to go through Google OAuth again
    const createdMem = DB.teamMembers.find(m => m.email === email);
    if (createdMem) {
      setSession(createdMem.id);
      screen.remove();
      bootApp();
    } else {
      screen.remove();
      showLoginScreen();
    }
  };

  screen.querySelector('#admin-create-btn').addEventListener('click', doCreate);
  screen.querySelector('#admin-email').addEventListener('keydown', e => { if (e.key === 'Enter') doCreate(); });
  screen.querySelector('#admin-name').addEventListener('keydown', e => { if (e.key === 'Enter') screen.querySelector('#admin-email').focus(); });
  screen.querySelector('#admin-back-link').addEventListener('click', (e) => {
    e.preventDefault();
    DB.account.googleClientId = '';
    saveDB();
    screen.remove();
    showLoginScreen();
  });

  setTimeout(() => screen.querySelector('#admin-name').focus(), 50);
}

function logout() {
  clearSession(); // clears mis-session-v1 from sessionStorage
  if (window._setSession) localStorage.removeItem('mis-session-v1'); // clear shared SSO
  sessionStorage.removeItem('mis-pay-session'); // clear PAY session
  if (_mhChart) { try { _mhChart.destroy(); } catch(_) {} _mhChart = null; }
  if (window._perfChart) { try { window._perfChart.destroy(); } catch(_) {} window._perfChart = null; }
  document.body.classList.remove('is-admin');
  if (typeof google !== 'undefined' && google.accounts) {
    try { google.accounts.id.disableAutoSelect(); } catch(_) {}
  }
  showLoginScreen();
}

function bootApp() {
  // Set shared SSO session so pay.html knows we're authenticated
  if(window._setSession)window._setSession();
  applyDesign();
  applyRoleToBody();
  // Update sync status on boot
  if (supaCfg()) {
    updateSyncIndicator('synced');
    // Start realtime subscription (slightly deferred to let page settle)
    setTimeout(initRealtimeSync, 800);
  }
  renderSidebarUser();
  // Notification bell uses onclick attribute in HTML — no extra handler needed
  setTimeout(updateNotifBadge, 100); // update badge after sidebar renders
  // Check if a scheduled backup is due (runs silently, respects lastSent)
  setTimeout(() => checkScheduledBackup(), 3000);
  const role = currentUser()?.role || 'member';
  const allowed = DB.rolePermissions?.[role] || [];

  // Check if there's a hash URL to restore
  const hashState = parseHash(window.location.hash);
  let startView = null;

  if (hashState && allowed.includes(hashState.view)) {
    // Restore state from hash
    if (hashState.clientsTab) clientsTab = hashState.clientsTab;
    if (hashState.projectDrillId) { projectDrillId = hashState.projectDrillId; myHoursState.projectDrillId = hashState.projectDrillId; }
    if (hashState.settingsPage) settingsPage = hashState.settingsPage;
    startView = hashState.view;
  } else {
    // Default landing view based on role
    startView = allowed.includes('performance') ? 'performance'
      : allowed.includes('myhours') ? 'myhours' : 'account';
  }

  if (startView !== 'myhours') {
    navigate(startView);
    if (role === 'admin') checkSchedule();
  } else {
    const user = currentUser();
    myHoursState.memberId = user ? user.id : null;
    navigate('myhours');
  }
  setTimeout(checkReminderForCurrentUser, 2000);
}

// Guard: redirect members away from admin-only views
function guardView(view) {
  const role = currentUser()?.role || '';
  if (!role) return false;
  // Test users always have full access including settings
  const s = getSession();
  const isTestUser = s && (DB.testUsers || []).some(t => t.id === s.memberId);
  if (isTestUser) return true;
  // Settings is always admin-only regardless of permissions config
  if (view === 'settings' && role !== 'admin') { navigate('myhours'); return false; }
  // All other views: check rolePermissions
  const allowed = (DB.rolePermissions?.[role] || []);
  if (!allowed.includes(view)) {
    navigate('myhours'); return false;
  }
  return true;
}

function renderNotifications(el, acts) {
  const user = currentUser();
  const isAdminOrManager = hasRole('admin', 'team_manager');

  // Mark all as read for this user on open
  let dirty = false;
  (DB.notifications || []).forEach(n => {
    if (!n.confirmedAt && (isAdminOrManager || n.memberId === user?.id)) {
      n.confirmedAt = new Date().toISOString();
      dirty = true;
    }
  });
  if (dirty) { saveDB(); updateNotifBadge(); }

  // Filter: admins see all, members see only their own
  const notifs = (DB.notifications || []).filter(n =>
    isAdminOrManager || n.memberId === user?.id
  );

  const typeIcon = { nudge: '🔔', status: 'ℹ️', reset: '🔄' };
  const typeBadge = { nudge: 'badge-amber', status: 'badge-blue', reset: 'badge-gray' };
  const typeLabel = { nudge: 'Nudge', status: 'Status', reset: 'Reset' };

  if (isAdminOrManager) {
    const clearBtn = document.createElement('button');
    clearBtn.className = 'btn btn-ghost btn-sm';
    clearBtn.textContent = 'Clear All';
    clearBtn.addEventListener('click', () => {
      DB.notifications = [];
      saveDB(); updateNotifBadge(); renderView();

  }

  el.innerHTML = '';

  if (!notifs.length) {
    el.innerHTML = `<div class="empty-state"><p>No notifications yet.</p></div>`;
    return;
  }

  const wrap = document.createElement('div');
  wrap.style.cssText = 'max-width:720px';

  notifs.forEach(n => {
    const mem = getMember(n.memberId);
    const sentDate = n.sentAt ? new Date(n.sentAt).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : '';
    const row = document.createElement('div');
    row.className = 'card';
    row.style.cssText = 'display:flex;gap:14px;align-items:flex-start;padding:16px 20px;margin-bottom:10px';
    row.innerHTML = `
      <div style="font-size:20px;flex-shrink:0;margin-top:1px">${typeIcon[n.type] || '🔔'}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
          <span style="font-weight:700;font-size:14px">${n.subject||'Notification'}</span>
          <span class="badge ${typeBadge[n.type]||'badge-gray'}" style="font-size:10px">${typeLabel[n.type]||n.type}</span>
          ${isAdminOrManager && mem.id ? `<span class="micro-12">→ ${displayName(mem)}</span>` : ''}
        </div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.5;white-space:pre-wrap">${n.message||''}</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:6px">${sentDate}</div>

    `;
    wrap.appendChild(row);
  });

  el.appendChild(wrap);

  el.querySelectorAll('.del-notif').forEach(btn => {
    btn.addEventListener('click', () => {
      DB.notifications = DB.notifications.filter(n => n.id !== btn.dataset.id);

}

function addNotification(memberId, type, subject, message) {
  const notif = {
    id: genId('nt'),
    memberId,
    type,           // 'nudge' | 'status' | 'reset'
    subject,
    message,
    sentAt: new Date().toISOString(),
    confirmedAt: null,
  };
  if (!DB.notifications) DB.notifications = [];
  DB.notifications.unshift(notif); // newest first
  saveDB();
  updateNotifBadge();
  return notif;
}

function updateNotifBadge() {
  const badge = document.getElementById('notif-badge');
  const bell = document.getElementById('notif-bell-btn');
  if (!badge) return;
  const user = currentUser();
  if (!user) return;
  const unread = (DB.notifications || []).filter(n =>
    !n.confirmedAt &&
    (hasRole('admin','team_manager') || n.memberId === user.id)
  ).length;
  badge.textContent = unread;
  badge.style.display = 'inline-block';
  badge.style.background = unread > 0 ? 'var(--accent)' : 'var(--border)';
  badge.style.color = unread > 0 ? '#fff' : 'var(--text-3)';

// ── SCHEDULED REPORTS ──
function buildPerformanceSummary() {
  const month = currentMonth();
  const entries = DB.teamMembers.flatMap(m => entriesByMemberMonth(m.id, month));
  const totalH = entries.reduce((s,e) => s+e.hours, 0);
  const billH = entries.reduce((s,e) => e.nonBillable ? s : s+e.hours, 0);
  const tracked = DB.teamMembers.filter(m => m.trackUtilisation !== false);
  const avail = tracked.reduce((s,m) => s+(m.availableHours||160), 0);
  const util = avail > 0 ? Math.round((totalH/avail)*100) : 0;
  const billPct = totalH > 0 ? Math.round((billH/totalH)*100) : 0;
  const lines = [
    `Performance Report \u2014 ${fmtMonth(month)}`,
    '='.repeat(40), '',
    `Utilisation:    ${util}%  (${totalH.toFixed(1)}h of ${avail}h available)`,
    `Billable Hours: ${billH.toFixed(1)}h  (${billPct}% of logged hours)`,
    `Hours Logged:   ${totalH.toFixed(1)}h`, '',
    'Team Breakdown', '-'.repeat(40),
  ];
  DB.teamMembers.forEach(m => {
    const mH = entries.filter(e=>e.teamMemberId===m.id).reduce((s,e)=>s+e.hours,0);
    const mAvail = m.availableHours||160;
    lines.push(`${m.name.padEnd(22)} ${mH.toFixed(1)}h / ${mAvail}h  (${Math.round((mH/mAvail)*100)}%)`);
  });
  lines.push('', `Generated by TRACKR \u2014 ${new Date().toLocaleDateString('en-GB')}`);
  return lines.join('\n');
}

async function sendScheduledReport() {
  const sched = DB.schedule || {};
  const recipients = (sched.recipients||[])
    .map(id => getMember(id))
    .filter(m => m && m.email);
  if (!recipients.length) return { ok: false, reason: 'No recipients configured \u2014 add some in Settings!' };
  const summary = buildPerformanceSummary();
  const subject = `Performance Report \u2014 ${fmtMonth(currentMonth())}`;
  let sent = 0, lastError = '';
  for (const mem of recipients) {
    const result = await sendNotificationEmail({
      to_email: mem.email, to_name: mem.name,
      from_name: 'TRACKR Performance', subject,
      message: `Hi ${mem.name},\n\nHere is your performance summary for ${fmtMonth(currentMonth())}.\n\n${summary}`,
    });
    if (result.ok) sent++;
    else lastError = result.reason;
  }
  if (sent > 0) {
    DB.schedule.lastSent = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    saveDB();
    return { ok: true, count: sent };
  }
  return { ok: false, reason: lastError || 'Failed to send' };
}

function checkSchedule() {
  const sched = DB.schedule;
  if (!sched?.enabled || !sched.frequency || !sched.recipients?.length) return;

  const today = new Date();
  const todayStr = today.toLocaleDateString('en-GB');
  if (sched.lastSent && sched.lastSent.startsWith(todayStr)) return; // already sent today

  const dow = today.getDay(); // 0=Sun,1=Mon...6=Sat
  const dom = today.getDate();
  const lastDom = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();

  // Work out if today matches the frequency
  let due = false;
  if (sched.frequency === 'weekly-mon')   due = (dow === 1);
  if (sched.frequency === 'weekly-fri')   due = (dow === 5);
  if (sched.frequency === 'monthly-1')    due = (dom === 1);
  if (sched.frequency === 'monthly-15')   due = (dom === 15);
  if (sched.frequency === 'monthly-last') due = (dom === lastDom);

  // Bi-weekly: every other occurrence — use week number parity
  if (sched.frequency === 'biweekly-mon' || sched.frequency === 'biweekly-fri') {
    const targetDow = sched.frequency === 'biweekly-mon' ? 1 : 5;
    const weekNum = Math.floor((today - new Date(today.getFullYear(), 0, 1)) / 604800000);
    due = (dow === targetDow) && (weekNum % 2 === 0);
  }

  if (!due) return;

  setTimeout(async () => {
    const result = await sendScheduledReport();
    if (result.ok) toast(`\uD83D\uDCEC Performance report sent to ${result.count} team member${result.count!==1?'s':''}!`);
  }, 3000);
}

// ── PERSONAL REMINDERS ──
async function checkReminderForCurrentUser() {
  const user = currentUser();
  if (!user) return;
  const r = user.reminders;
  if (!r || !r.enabled) return;

  const today = new Date();
  const todayDay = today.getDay();
  if (!(r.days || []).includes(todayDay)) return;

  // Check if already reminded today (store in sessionStorage to avoid repeat)
  const reminderKey = `ubr-reminded-${user.id}-${today.toLocaleDateString('en-GB')}`;
  if (sessionStorage.getItem(reminderKey)) return;

  // Check if hours are already at capacity
  const month = currentMonth();
  const logged = DB.timeEntries
    .filter(e => e.teamMemberId === user.id && entryMonth(e) === month)
    .reduce((s, e) => s + e.hours, 0);
  const avail = user.availableHours || 160;

  if (logged >= avail) return; // Already at capacity — no reminder needed

  const remaining = (avail - logged).toFixed(1);
  sessionStorage.setItem(reminderKey, '1');

  // In-app notification
  if ((r.channels || []).includes('inapp')) {
    setTimeout(() => {
      toast(`⏰ Reminder: you have ${remaining}h left to log this month!`, 'info');
    }, 1500);
  }

  // Email notification
  if ((r.channels || []).includes('email') && user.email) {
    const result = await sendNotificationEmail({
      to_email: user.email,
      to_name: user.name,
      from_name: 'mis.studio',
      subject: `⏰ Time tracking reminder — ${fmtMonth(month)}`,
      message: `Hi ${user.name},\n\nJust a friendly reminder to log your hours for ${fmtMonth(month)}.\n\nLogged so far: ${logged.toFixed(1)}h of ${avail}h (${remaining}h remaining)\n\nKeep it up! 🙌\n\nTRACKR`,
    });
    if (!result.ok && result.via !== 'mailto') {
    }
  }
}

// Cross-tab sync: when CSM (or any other app) writes to mis-v1, merge clients into memory
window.addEventListener('storage', e => {
  if (e.key !== 'mis-v1' || !e.newValue) return;
  try {
    const fresh = JSON.parse(e.newValue);

    // ── Merge clients ───────────────────────────────────────────
    if (Array.isArray(fresh.clients)) {
      const freshById = Object.fromEntries(fresh.clients.map(c => [c.id, c]));
      const memIds    = new Set((DB.clients || []).map(c => c.id));
      DB.clients = [
        ...(DB.clients || []).map(c => freshById[c.id] || c),
        ...fresh.clients.filter(c => !memIds.has(c.id)),
      ];
    }

    // ── Merge projects (GROW creates/updates projects in mis-v1) ─
    // Use fresh.projects as the authoritative list — removes deleted projects too
    if (Array.isArray(fresh.projects)) {
      DB.projects = fresh.projects.map(p => {
        const existing = (DB.projects || []).find(ep => ep.id === p.id);
        // Merge: fresh wins on all fields (it's the source of truth in mis-v1)
        return existing ? { ...existing, ...p } : p;
      });
    }

    // Push merged data to Supabase so all users get the cross-app changes
    saveDB();

    // Re-render if on affected views and no modal is open
    const affectedViews = ['clients', 'projects', 'performance'];
    if (affectedViews.includes(currentView) && !document.querySelector('.modal-overlay')) renderView();
  } catch(_) {}
});

// ══════════════════════════════════════════════════════════════
//  REALTIME SYNC — Polling via existing REST API
//  Checks updated_at every 8s; pulls + re-renders on remote change
// ══════════════════════════════════════════════════════════════
let _rtPollTimer   = null;
let _lastPushAt    = 0;   // timestamp of our own last push
let _lastRemoteTs  = null; // updated_at from last known remote state

async function _getRemoteTimestamp() {
  const cfg = supaCfg();
  if (!cfg) return null;
  const workspaceId = cfg.workspaceId || 'default';
  try {
    const rows = await supaFetch(
      `/mis_workspaces?id=eq.${encodeURIComponent(workspaceId)}&select=updated_at`
    );
    return rows?.[0]?.updated_at || null;
  } catch(e) {
    return null;
  }
}

async function _pollForChanges() {
  // Don't poll if we just pushed (suppress echo for 5s)
  if (Date.now() - _lastPushAt < 5000) return;

  const ts = await _getRemoteTimestamp();
  if (!ts) return;

  if (_lastRemoteTs && ts !== _lastRemoteTs) {
    // Remote change detected
    updateSyncIndicator('syncing');
    try {
      const pulled = await supabasePull();
      if (pulled) {
        loadDB();
        renderView();
        _showRemoteUpdateBanner();
      }
    } catch(e) {
      updateSyncIndicator('error');
      return;
    }
  }

  _lastRemoteTs = ts;
  updateSyncIndicator('live');
}

function initRealtimeSync() {
  const cfg = supaCfg();
  if (!cfg) return;

  // Clear any existing poll
  if (_rtPollTimer) { clearInterval(_rtPollTimer); _rtPollTimer = null; }

  // Seed the initial timestamp so we don't false-trigger on first poll
  _getRemoteTimestamp().then(ts => {
    _lastRemoteTs = ts;
    updateSyncIndicator('live');
  });

  // Poll every 8 seconds
  _rtPollTimer = setInterval(_pollForChanges, 8000);
}

function _showRemoteUpdateBanner() {
  const ex = document.getElementById('_rt-banner');
  if (ex) ex.remove();
  const el = document.createElement('div');
  el.id = '_rt-banner';
  el.style.cssText = [
    'position:fixed', 'top:72px', 'left:50%',
    'transform:translateX(-50%)',
    'background:#2F2F2F', 'color:#fff',
    'padding:9px 20px', 'border-radius:6px',
    'font-size:13px', 'font-weight:500',
    'z-index:8000', 'pointer-events:none',
    'box-shadow:0 4px 16px rgba(0,0,0,.2)',
    'animation:_rtSlide .2s ease',
    'display:flex', 'align-items:center', 'gap:8px'
  ].join(';');
  el.innerHTML = '<span style="color:#22c55e;font-size:16px">&#9679;</span> Updated by another user';
  document.body.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transition = 'opacity .3s';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}
