// Read PAY's payroll-v1 and return a map of { trackrMemberId → resignedDate }
// PAY staff link back to TRACKR members via trackrId (or id)
let _payResignCache = null;
function getPayResignedDates() {
  if (_payResignCache !== null) return _payResignCache;
  try {
    const payDB = JSON.parse(localStorage.getItem('payroll-v1') || '{}');
    const map = {};
    (payDB.staff || []).forEach(s => {
      if (s.resignedDate) {
        const key = s.trackrId || s.id;
        if (key) map[key] = s.resignedDate;
      }
    });
    _payResignCache = map;
    return map;
  } catch(e) { return (_payResignCache = {}); }
}

// Returns true if a team member was still active during a given month
// Checks PAY resignation date if available
function memberActiveInMonth(memberId, month) {
  const resigned = getPayResignedDates();
  const resignedDate = resigned[memberId];
  if (!resignedDate) return true;
  // Active if the month is on or before their resignation month
  return month <= resignedDate.slice(0, 7);
}

// ── ENTRY INDEX ──
// Pre-built indexes per renderView() — avoids repeated O(n) scans of timeEntries
let _entryIdx = null;

function _buildEntryIndex() {
  if (_entryIdx) return _entryIdx;
  const byMember = {};  // memberId → [entries]
  const byProject = {}; // projectId → [entries]
  const byMemberMonth = {}; // `${memberId}:${month}` → [entries]
  const byProjectMember = {}; // `${projectId}:${memberId}` → [entries]

  for (const e of DB.timeEntries) {
    const mo = entryMonth(e); // compute once per entry
    e._month = mo; // cache month on entry object (avoids re-computation)

    // by member
    (byMember[e.teamMemberId] ??= []).push(e);
    // by project
    (byProject[e.projectId] ??= []).push(e);
    // by member+month
    const mmKey = `${e.teamMemberId}:${mo}`;
    (byMemberMonth[mmKey] ??= []).push(e);
    // by project+member
    const pmKey = `${e.projectId}:${e.teamMemberId}`;
    (byProjectMember[pmKey] ??= []).push(e);
  }
  _entryIdx = { byMember, byProject, byMemberMonth, byProjectMember };
  return _entryIdx;
}

// Shorthand accessors — safe empty arrays when nothing found
function entriesByMember(memberId) { return _buildEntryIndex().byMember[memberId] || []; }
function entriesByProject(projectId) { return _buildEntryIndex().byProject[projectId] || []; }
function entriesByMemberMonth(memberId, month) { return _buildEntryIndex().byMemberMonth[`${memberId}:${month}`] || []; }
function entriesByProjectMember(projectId, memberId) { return _buildEntryIndex().byProjectMember[`${projectId}:${memberId}`] || []; }

// ── MY HOURS ──
let myHoursState = {
  memberId: null,           // null = pick first member
  month: currentMonth(),    // 'YYYY-MM'
  projectDrillId: null,     // when drilling into a project
};

function prevMonth(m) {
  const [y, mo] = m.split('-').map(Number);
  const d = new Date(y, mo - 2, 1);
  return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}`;
}

function renderMyHours(el, acts) {
  if (myHoursState.projectDrillId) { renderMyHoursProject(el, acts); return; }

  // Default to first member if none set
  if (!myHoursState.memberId && DB.teamMembers.length) {
    myHoursState.memberId = DB.teamMembers[0].id;
  }

  const mem = getMember(myHoursState.memberId || '');
  const month = myHoursState.month;
  const prevMo = prevMonth(month);
  const isThisMonth = month === currentMonth();

  // Member picker in topbar — admin/manager see all, members see only themselves
  if (hasRole('admin','team_manager')) {
    acts.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;white-space:nowrap">
        <span style="font-size:13px;color:var(--text-2);font-weight:600">Viewing:</span>
        <select id="mh-member-sel" style="font-size:14px;font-weight:700;border:1px solid var(--border);border-radius:6px;padding:6px 32px 6px 10px;background:var(--card);color:var(--text);appearance:none;background-image:url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%2712%27 viewBox=%270 0 24 24%27 fill=%27none%27 stroke=%27%23898987%27 stroke-width=%272%27%3E%3Cpath d=%27M6 9l6 6 6-6%27/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 10px center;cursor:pointer;outline:none">
          ${DB.teamMembers.filter(m=>!m.archived && memberActiveInMonth(m.id, myHoursState.month)).map(m => `<option value="${m.id}" ${m.id === myHoursState.memberId ? 'selected' : ''}>${displayName(m)}${getPayResignedDates()[m.id] ? ' (resigned)' : ''}</option>`).join('')}
        </select>
      </div>
    `;
    acts.querySelector('#mh-member-sel').addEventListener('change', e => {
      myHoursState.memberId = e.target.value;
      renderView();
    });
  } else {
    // Member — lock to their own account, show name only
    const u = currentUser();
    acts.innerHTML = `<span style="font-size:14px;font-weight:700;color:var(--text)">${u ? displayName(u) : ''}</span>`;
    myHoursState.memberId = u ? u.id : myHoursState.memberId;
  }

  if (!mem.id) {
    // Check if it's a test user with no real member data
    const isTestU = (DB.testUsers||[]).some(t => t.id === myHoursState.memberId);
    el.innerHTML = `<div class="empty-state">${
      isTestU
        ? '<p>Test user — no time entries exist for this account.</p>'
        : '<p>No team members yet. Add one in Team Members first.</p>'
    }</div>`;
    return;
  }

  const _loggedForAvail = entriesByMemberMonth(mem.id, month).reduce((s,e) => s+e.hours, 0);
  const avail = effectiveAvailH(mem, _loggedForAvail, month);
  // Single pass: get all entries for member, derive month slices from it
  const allMemberEntries = entriesByMember(mem.id);
  const thisMonthEntries = entriesByMemberMonth(mem.id, month);
  const prevMonthEntries = entriesByMemberMonth(mem.id, prevMo);
  const loggedHours = thisMonthEntries.reduce((s,e) => s+e.hours, 0);
  const remainingHours = Math.max(0, avail - loggedHours);
  const pct = Math.min((loggedHours / avail) * 100, 100);
  const over = loggedHours > avail;
  const loggedProjectIds = new Set(allMemberEntries.map(e => e.projectId));
  const joinedProjectIds = new Set(
    DB.projects.filter(p => (p.members||[]).includes(mem.id)).map(p => p.id)
  );
  const leadProjectIds = new Set(
    DB.projects.filter(p => p.leadId === mem.id).map(p => p.id)
  );
  const hiddenSet = new Set(mem.hiddenProjects || []);

  // Auto-unhide any project where this member is the lead — leads always see their projects
  const leadHidden = [...leadProjectIds].filter(id => hiddenSet.has(id));
  if (leadHidden.length > 0) {
    mem.hiddenProjects = (mem.hiddenProjects||[]).filter(id => !leadProjectIds.has(id));
    leadHidden.forEach(id => hiddenSet.delete(id));
    saveDB();
  }

  // Projects shown depend on the SELECTED MEMBER's role, not the viewer's.
  // Admins/managers see all projects when viewing their own hours.
  // When viewing another member, show only that member's joined/logged/lead projects.
  // Closed projects are excluded if the current month is after their close date.
  const memberIsAdminOrManager = mem.role === 'admin' || mem.role === 'team_manager';
  const allRelevantIds = memberIsAdminOrManager
    ? DB.projects.filter(p => isProjectActiveInMonth(p, month)).map(p => p.id).filter(id => !hiddenSet.has(id))
    : [...new Set([...joinedProjectIds, ...leadProjectIds, ...loggedProjectIds])].filter(id => {
        if (hiddenSet.has(id)) return false;
        const p = getProject(id);
        // Always show projects with logged entries, even if now closed (historical view)
        const hasEntries = allMemberEntries.some(e => e.projectId === id);
        return isProjectActiveInMonth(p, month) || hasEntries;
      });

  const activeProjects = allRelevantIds.map(pid => {
    const proj = getProject(pid);
    const cli = getClient(proj.clientId);
    const monthE = thisMonthEntries.filter(e => e.projectId === pid);
    const totalE = allMemberEntries.filter(e => e.projectId === pid);
    const curr = proj.currency || cli.currency || mem.defaultCurrency || DB.settings.defaultCurrency;
    const isJoined = (proj.members||[]).includes(mem.id);
    return {
      proj, cli, curr, isJoined,
      monthHours: monthE.reduce((s,e) => s+e.hours, 0),
      monthBillable: monthE.reduce((s,e) => s+entryBillable(e), 0),
      totalHours: totalE.reduce((s,e) => s+e.hours, 0),
    };
  }).filter(p => p.proj.id);

  // For team managers/admins: split into "my projects" (joined/lead) and "team projects" (the rest)
  // Important: use only joined/lead for the split — logged-but-left projects should appear under Team Projects.
  // loggedProjectIds is still used for allRelevantIds above (to show historical entries) but NOT for the section split.
  const myProjectIds = memberIsAdminOrManager
    ? new Set([...joinedProjectIds, ...leadProjectIds])
    : new Set([...joinedProjectIds, ...leadProjectIds, ...loggedProjectIds]);
  const myProjects = activeProjects.filter(p => myProjectIds.has(p.proj.id));
  const teamProjects = memberIsAdminOrManager
    ? activeProjects.filter(p => !myProjectIds.has(p.proj.id))
    : [];

  // Sort: by client name then project name
  const sortProjs = arr => arr.sort((a,b) => {
    const cc = (a.cli.name||'').localeCompare(b.cli.name||'');
    return cc !== 0 ? cc : (a.proj.name||'').localeCompare(b.proj.name||'');
  });
  sortProjs(myProjects);
  sortProjs(teamProjects);

  // Projects available to join: anything not in myProjectIds and not hidden
  // For admins/managers allRelevantIds includes team projects, so we must use
  // myProjectIds (only truly joined/led/logged) as the exclusion set, not allRelevantIds
  const availableToJoin = DB.projects.filter(p =>
    !myProjectIds.has(p.id) &&
    !hiddenSet.has(p.id) &&
    isProjectActiveInMonth(p, month)
  );

  // 6-month chart data
  const chartMonths = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}`;
    const h = entriesByMemberMonth(mem.id, key).reduce((s,e)=>s+e.hours,0);
    chartMonths.push({ key, label: d.toLocaleDateString('en-GB',{month:'short'}), hours: h });
  }

  const currentHours = chartMonths.find(m => m.key === month)?.hours || 0;

  // Build last 6 months (oldest → newest)
  const sixMonths = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    sixMonths.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
  }
  const monthPills = sixMonths.map(m => {
    const active = m === month;
    const label = new Date(m.split('-')[0], m.split('-')[1]-1, 1)
      .toLocaleDateString('en-GB', { month: 'short', year: '2-digit' });
    return `<button class="mh-month-pill" data-month="${m}" style="padding:7px 14px;border:none;background:${active?'var(--accent)':'transparent'};color:${active?'#fff':'var(--text-2)'};font-family:var(--font);font-size:13px;font-weight:${active?'700':'500'};cursor:pointer;transition:all 0.12s;border-radius:6px;white-space:nowrap">${label}</button>`;
  }).join('');

  el.innerHTML = `
    <!-- Month switcher -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <div style="display:flex;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px;gap:2px">
        ${monthPills}
      </div>
    </div>

    <!-- Chart.js chart -->
    <div class="card" style="margin-bottom:24px;padding:20px 20px 16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
        <div>
          <div class="lbl">6-month overview</div>
          <div style="font-size:22px;font-weight:300;color:var(--text)">${displayName(mem)}</div>
        </div>
        <div style="text-align:right">
          <div class="lbl">${fmtMonth(month)}</div>
          <div style="font-size:28px;font-weight:600;color:#4a7c25">${currentHours.toFixed(1)}h</div>
          <div class="micro-12">${remainingHours > 0 ? remainingHours.toFixed(0) + 'h remaining' : 'At capacity \u2713'}</div>
        </div>
      </div>
      <div style="position:relative;width:100%;height:200px">
        <canvas id="mh-chart"></canvas>
      </div>
      <div style="display:flex;align-items:center;gap:20px;margin-top:12px;font-size:14px;color:var(--text-3)">
        <span class="row-6">
          <span style="width:20px;height:2.5px;background:#4a7c25;display:inline-block;border-radius:2px"></span>
          Hours logged
        </span>
        <span class="row-6">
          <span style="width:20px;height:0;border-top:1.5px dashed rgba(74,124,37,0.5);display:inline-block"></span>
          Capacity (${avail}h)
        </span>
      </div>
    </div>

    <!-- Projects -->
    <div class="section-header">
      <div>
        <div class="section-title">My Projects</div>
      </div>
      <button class="btn btn-secondary btn-sm" id="mh-join-btn" style="font-size:14px">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Join Project
      </button>
    </div>

    ${myProjects.length === 0 ? `
      <div class="card" style="margin-bottom:10px"><div class="empty-state" style="padding:32px">
        <p>No projects joined yet.</p>
      </div></div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:${teamProjects.length>0?'28px':'0px'}" id="mh-project-list">
        ${myProjects.map(p => {
          const pct2 = p.totalHours > 0 && loggedHours > 0 ? Math.min((p.monthHours/loggedHours)*100,100) : 0;
          const hasThisMonth = p.monthHours > 0;
          const statusKey = `${mem.id}::${p.proj.id}::${month}`;
          const isDone = DB.projectStatuses[statusKey] === 'done';
          const isLead = p.proj.leadId === mem.id;
          return `<div class="card mh-proj-card" data-pid="${p.proj.id}" style="cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s;padding:18px 22px;${isDone?'border-left:3px solid var(--accent);':''}">
            <div style="display:flex;align-items:center;gap:16px">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px">
                  <span style="font-family:var(--font);font-size:20px;font-weight:400;color:var(--text)">${p.proj.name}</span>
                  <span class="micro-12">${p.cli.name||'—'}</span>
                  ${isLead ? `<span class="badge" style="background:rgba(103,143,47,0.1);color:var(--accent);font-size:10px;font-weight:700">Lead</span>` : ''}
                  ${isDone ? `<span class="badge" style="background:#EAF0E2;color:var(--accent);font-size:11px;display:inline-flex;align-items:center;gap:4px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><polyline points="20 6 9 17 4 12"/></svg>Done</span>` : (!hasThisMonth ? `<span class="badge badge-gray" style="font-size:11px">No entries this month</span>` : '')}
                </div>
                <div style="height:4px;background:var(--border);border-radius:100px;white-space:nowrap;overflow:hidden;max-width:300px">
                  <div style="height:100%;width:${pct2.toFixed(1)}%;background:var(--accent);border-radius:100px;white-space:nowrap"></div>
                </div>
              </div>
              <div style="display:flex;gap:10px;align-items:center;flex-shrink:0">
                <div style="text-align:right">
                  <div style="font-family:var(--font);font-size:18px;font-weight:800;color:${hasThisMonth?'var(--text)':'var(--text-3)'};letter-spacing:-0.3px">${fmtH(p.monthHours)}</div>
                  <div class="micro-12">For ${fmtMonth(month)}</div>
                </div>
                <button class="mh-done-btn btn btn-sm ${isDone?'btn-secondary':'btn-ghost'}" data-pid="${p.proj.id}" data-status="${isDone?'done':'pending'}" title="${isDone?'Done — click to unmark':'Mark as done and notify lead'}" style="width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;${isDone?'background:#EAF0E2;border-color:#C8D8B4;':''}">
                  ${isDone
                    ? `<svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" width="15" height="15"><polyline points="20 6 9 17 4 12"/></svg>`
                    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><circle cx="12" cy="12" r="9"/><polyline points="9 12 11 14 15 10"/></svg>`
                  }
                </button>
                ${isLead ? '' : `<button class="mh-leave-btn btn btn-ghost btn-sm" data-pid="${p.proj.id}" style="color:var(--text-3);font-size:14px" title="Leave project">Leave</button>`}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `}

    ${teamProjects.length > 0 ? `
      <div class="section-header" style="margin-top:4px">
        <div>
          <div class="section-title">Team Projects</div>
          <div style="font-size:14px;color:var(--text-3);margin-top:2px">All other active projects — monitoring view</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px" id="mh-team-project-list">
        ${teamProjects.map(p => {
          const hasThisMonth = p.monthHours > 0;
          const teamEntries = DB.timeEntries.filter(e => e.projectId === p.proj.id && entryMonth(e) === month);
          const teamH = teamEntries.reduce((s,e) => s+e.hours, 0);
          const memberCount = new Set(teamEntries.map(e => e.teamMemberId)).size;
          const lead = getMember(p.proj.leadId);
          return `<div class="card mh-proj-card" data-pid="${p.proj.id}" style="cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s;padding:16px 22px;opacity:0.92">
            <div style="display:flex;align-items:center;gap:16px">
              <div style="flex:1;min-width:0">
                <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:6px">
                  <span style="font-family:var(--font);font-size:18px;font-weight:400;color:var(--text)">${p.proj.name}</span>
                  <span class="micro-12">${p.cli.name||'—'}</span>
                  ${lead?.id ? `<span class="micro-11">Lead: ${displayName(lead)}</span>` : ''}
                </div>
                <div style="display:flex;gap:16px;font-size:14px;color:var(--text-3)">
                  ${teamH > 0 ? `<span><strong style="color:var(--text-2)">${fmtH(teamH)}</strong> logged this month</span>` : '<span>No entries this month</span>'}
                  ${memberCount > 0 ? `<span><strong style="color:var(--text-2)">${memberCount}</strong> member${memberCount!==1?'s':''} active</span>` : ''}
                </div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-family:var(--font);font-size:18px;font-weight:800;color:${hasThisMonth?'var(--text-2)':'var(--text-3)'};letter-spacing:-0.3px">${fmtH(p.monthHours)}</div>
                <div class="micro-11">My hours</div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    ` : ''}
  `;

  // Month switch
  el.querySelectorAll('.mh-month-pill').forEach(btn => {
    btn.addEventListener('click', () => { myHoursState.month = btn.dataset.month; renderView(); });
  });
  

  // Init Chart.js
  const chartCanvas = el.querySelector('#mh-chart');
  if (chartCanvas && typeof Chart !== 'undefined') {
    if (_mhChart) { try { _mhChart.destroy(); } catch(_) {} _mhChart = null; }
    const labels = chartMonths.map(m => m.label);
    const dataHours = chartMonths.map(m => m.hours);
    const ctx = chartCanvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 200);
    grad.addColorStop(0, 'rgba(74,124,37,0.18)');
    grad.addColorStop(1, 'rgba(74,124,37,0)');
    const currentIdx = chartMonths.findIndex(m => m.key === month);
    _mhChart = new Chart(chartCanvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            data: dataHours,
            borderColor: '#4a7c25',
            borderWidth: 2.5,
            backgroundColor: grad,
            fill: true,
            tension: 0.4,
            pointBackgroundColor: dataHours.map((_, i) => i === currentIdx ? '#4a7c25' : '#fff'),
            pointBorderColor: '#4a7c25',
            pointBorderWidth: 2.5,
            pointRadius: dataHours.map((_, i) => i === currentIdx ? 6 : 4),
            pointHoverRadius: dataHours.map((_, i) => i === currentIdx ? 8 : 6),
          },
          {
            data: Array(6).fill(avail),
            borderColor: 'rgba(74,124,37,0.4)',
            borderWidth: 1.5,
            borderDash: [5, 4],
            fill: false,
            tension: 0,
            pointRadius: 0,
            pointHoverRadius: 0,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#fff',
            borderColor: 'rgba(74,124,37,0.3)',
            borderWidth: 1,
            titleColor: 'var(--text)',
            bodyColor: '#666',
            padding: 10,
            cornerRadius: 6,
            callbacks: {
              title: (items) => labels[items[0].dataIndex],
              label: (item) => {
                if (item.datasetIndex === 1) return `  Capacity: ${item.raw}h`;
                const h = item.raw;
                const rem = avail - h;
                return rem > 0 ? `  Logged: ${h}h  (${rem.toFixed(0)}h remaining)` : `  Logged: ${h}h  (+${Math.abs(rem).toFixed(0)}h over)`;
              }
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: {
              color: (ctx) => ctx.index === currentIdx ? 'var(--text)' : '#ADADAB',
              font: (ctx) => ({ size: 12, weight: ctx.index === currentIdx ? '600' : '400', family: 'Manrope,sans-serif' }),
            }
          },
          y: {
            min: 0,
            max: Math.max(...dataHours, avail) * 1.2,
            grid: { color: 'var(--border)', drawTicks: false },
            border: { display: false },
            ticks: {
              color: '#ADADAB',
              font: { size: 11, family: 'Manrope,sans-serif' },
              callback: (v) => v + 'h',
              maxTicksLimit: 5,
              padding: 8,
            }
          }
        }
      }
    });
  }

  // Join Project button (regular members only)
  el.querySelector('#mh-join-btn')?.addEventListener('click', () => {
    showJoinProjectModal(mem, availableToJoin);
  });

  // Leave buttons — two-step: first click shows "Confirm?", second click executes
  el.querySelectorAll('.mh-leave-btn').forEach(btn => {
    let pending = false;
    let resetTimer = null;

    btn.addEventListener('click', e => {
      e.stopPropagation();
      e.preventDefault();

      if (!pending) {
        // First click: enter confirm state
        pending = true;
        btn.textContent = 'Confirm?';
        btn.style.color = 'var(--danger)';
        btn.style.borderColor = 'rgba(192,57,43,0.3)';
        resetTimer = setTimeout(() => {
          pending = false;
          btn.textContent = 'Leave';
          btn.style.color = 'var(--text-3)';
          btn.style.borderColor = '';
        }, 2500);
      } else {
        // Second click: execute leave
        clearTimeout(resetTimer);
        const pid = btn.dataset.pid;
        const proj = getProject(pid);
        // Remove from project members
        const p = getProject(pid);
        if (p) p.members = (p.members||[]).filter(id => id !== mem.id);
        // For admins/managers: don't hide — the project should appear under Team Projects
        // For regular members: add to hiddenProjects so it disappears from their view
        if (mem.role !== 'admin' && mem.role !== 'team_manager') {
          const m = getMember(mem.id);
          if (m) {
            if (!m.hiddenProjects) m.hiddenProjects = [];
            if (!m.hiddenProjects.includes(pid)) m.hiddenProjects.push(pid);
          }
        }
        saveDB();
        toast(`Left "${proj.name}" — it'll appear under Team Projects`);
        renderView();
      }
    });
  });

  // Done buttons — toggle status and show notification modal
  el.querySelectorAll('.mh-done-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const pid = btn.dataset.pid;
      const statusKey = `${mem.id}::${pid}::${month}`;
      const isDone = DB.projectStatuses[statusKey] === 'done';
      const proj = getProject(pid) || {};
      const lead = getMember(proj.leadId);

      if (!isDone) {
        // Mark as done
        DB.projectStatuses[statusKey] = 'done';
        saveDB();

        // Show notification modal
        const totalMonthH = activeProjects.find(ap=>ap.proj.id===pid)?.monthHours || 0;
        const ejsConfigured = !!(DB.emailjs?.publicKey && DB.emailjs?.serviceId && DB.emailjs?.templateId);
        const body = `
          <div style="text-align:center;padding:8px 0 16px">
            <div style="width:56px;height:56px;border-radius:50%;background:#EAF0E2;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
              <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" width="26" height="26"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px">${proj.name} marked as done</div>
            <div style="font-size:13px;color:var(--text-2);margin-bottom:20px">For ${fmtMonth(month)}</div>
          </div>
          ${lead.id ? `
          <div style="background:var(--bg);border-radius:6px;padding:14px 16px;margin-bottom:20px">
            <div class="lbl">Project Lead</div>
            <div style="display:flex;align-items:center;gap:12px">
              <div class="avatar-sm">${initials(lead.name)}</div>
              <div>
                <div style="font-weight:700;font-size:14px;color:var(--text)">${displayName(lead)}</div>
                ${lead.email ? `<div class="micro-12">${lead.email}</div>` : ''}
              </div>
              ${lead.email
                ? ejsConfigured
                  ? `<button class="btn btn-primary btn-sm" id="send-notif-btn" style="margin-left:auto;white-space:nowrap">Send Notification</button>`
                  : `<a href="mailto:${lead.email}?subject=${encodeURIComponent('Hours submitted: ' + proj.name + ' — ' + fmtMonth(month))}&body=${encodeURIComponent('Hi ' + lead.name + ',\n\n' + mem.name + ' has submitted their hours for ' + proj.name + ' (' + fmtMonth(month) + ').\n\nTotal: ' + fmtH(totalMonthH) + '\n\nPlease review at your earliest convenience.')}" class="btn btn-ghost btn-sm" style="margin-left:auto;white-space:nowrap">Open in Mail</a>`
                : ''}
            </div>
            ${!ejsConfigured && lead.email ? `<div style="font-size:11px;color:var(--text-3);margin-top:8px">Tip: Configure EmailJS in Settings to send directly without opening your mail client.</div>` : ''}
          </div>` : `<div style="background:#FFF8E1;border-radius:6px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#8a6d00">No project lead assigned. Edit the project to assign one.</div>`}
          <div id="email-status" style="margin-bottom:12px"></div>
          <div class="form-actions">
            <button class="btn btn-primary" id="done-modal-close">Done</button>
          </div>
        `;
        const overlay = showModal('Hours Submitted', body);
        overlay.querySelector('#done-modal-close').onclick = () => { overlay.remove(); renderView(); };

        const sendBtn = overlay.querySelector('#send-notif-btn');
        if (sendBtn) {
          sendBtn.onclick = async () => {
            const params = {
              to_email: lead.email,
              to_name: lead.name,
              from_name: mem.name,
              subject: `Hours submitted: ${proj.name} — ${fmtMonth(month)}`,
              message: `Hi ${lead.name},\n\n${mem.name} has submitted their hours for ${proj.name} (${fmtMonth(month)}).\n\nTotal: ${fmtH(totalMonthH)}\n\nPlease review at your earliest convenience.`,
            };
            const statusEl = overlay.querySelector('#email-status');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending…';
            const result = await sendNotificationEmail(params);
            if (result.ok) {
              sendBtn.textContent = result.via === 'mailto' ? '✓ Mail client opened' : '✓ Sent';
              sendBtn.style.background = 'var(--accent)';
              const msg = result.via === 'mailto' ? `Opening your mail client with a pre-filled email to ${lead.email}` : `Email sent to ${lead.email}`;
              if (statusEl) statusEl.innerHTML = `<div class="status-success">${msg}</div>`;
            } else {
              sendBtn.disabled = false;
              sendBtn.textContent = 'Send Notification';
              if (statusEl) statusEl.innerHTML = `<div class="status-error">Failed: ${result.reason}</div>`;
            }
          };
        }
      } else {
        // Unmark as done
        delete DB.projectStatuses[statusKey];
        saveDB();
        renderView();
        toast('Back to pending — no rush, take your time ⏳');
      }
    });
  });

  // Project card click (navigate to drill-down, not on leave or done button)
  el.querySelectorAll('.mh-proj-card').forEach(card => {
    card.addEventListener('mouseenter', () => { card.style.boxShadow = '0 4px 16px rgba(0,0,0,0.08)'; card.style.borderColor = '#C8C8C6'; });
    card.addEventListener('mouseleave', () => { card.style.boxShadow = ''; card.style.borderColor = 'var(--border)'; });
    card.addEventListener('click', e => {
      if (e.target.closest('.mh-leave-btn') || e.target.closest('.mh-done-btn')) return;
      myHoursState.projectDrillId = card.dataset.pid;
      renderView();
    });
  });
}

function showJoinProjectModal(mem, available) {
  // Also surface previously-hidden projects so the user can rejoin them
  const hiddenSet = new Set(mem.hiddenProjects || []);
  const hiddenProjects = DB.projects.filter(p => hiddenSet.has(p.id));
  const allJoinable = [...available, ...hiddenProjects];

  if (!allJoinable.length) {
    toast('Look at you — already on every project! Nothing left to join 🎉', 'info');
    return;
  }

  const rows = allJoinable.map(p => {
    const cli = getClient(p.clientId);
    const totalEntries = entriesByProject(p.id).length;
    const myEntries = entriesByProjectMember(p.id, mem.id).length;
    const members = (p.members||[]).map(id => { const m = getMember(id); return m.id ? displayName(m) : null; }).filter(Boolean);
    const wasHidden = hiddenSet.has(p.id);
    return { p, cli, totalEntries, myEntries, members, wasHidden };
  });

  const body = `
    <div style="font-size:14px;color:var(--text-2);margin-bottom:16px">
      Select projects to join. You'll be able to log time against them from My Hours.
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:380px;overflow-y:auto" id="join-proj-list">
      ${rows.map(({ p, cli, totalEntries, myEntries, members, wasHidden }) => `
        <label style="display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color 0.12s,background 0.12s" class="join-proj-row">
          <input type="checkbox" class="join-proj-check" data-pid="${p.id}" style="width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-family:var(--font);font-size:14px;font-weight:700;color:var(--text)">${p.name}</span>
              ${wasHidden ? `<span class="badge badge-gray" style="font-size:10px">Previously hidden${myEntries ? ' · '+myEntries+'h logged' : ''}</span>` : ''}
            </div>
            <div style="font-size:14px;color:var(--text-3);margin-top:2px">${cli.name||'—'} · ${totalEntries} total entr${totalEntries!==1?'ies':'y'}${members.length ? ' · ' + members.slice(0,3).join(', ') + (members.length>3?' +'+(members.length-3)+' more':'') : ''}</div>
          </div>
          <span class="badge ${p.currency ? 'badge-blue' : 'badge-gray'}">${p.currency || cli.currency || '—'}</span>
        </label>
      `).join('')}
    </div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-ghost" id="join-cancel">Cancel</button>
      <button class="btn btn-primary" id="join-confirm">Join Selected</button>
    </div>
  `;

  const overlay = showModal('Join a Project', body);

  overlay.querySelectorAll('.join-proj-row').forEach(row => {
    const cb = row.querySelector('input[type="checkbox"]');
    const update = () => {
      row.style.borderColor = cb.checked ? 'var(--accent)' : 'var(--border)';
      row.style.background = cb.checked ? 'var(--accent-dim)' : '';
    };
    cb.addEventListener('change', update);
    row.addEventListener('click', e => { if (e.target !== cb) { cb.checked = !cb.checked; update(); } });
    update();
  });

  overlay.querySelector('#join-cancel').onclick = () => overlay.remove();
  overlay.querySelector('#join-confirm').onclick = () => {
    const checked = [...overlay.querySelectorAll('.join-proj-check:checked')].map(cb => cb.dataset.pid);
    if (!checked.length) { toast('Pick at least one project — you can\'t join the void 🌀', 'error'); return; }
    checked.forEach(pid => {
      // Add to project members
      const p = getProject(pid);
      if (p) {
        if (!p.members) p.members = [];
        if (!p.members.includes(mem.id)) p.members.push(mem.id);
      }
      // Remove from member's hiddenProjects if it was there
      const m = getMember(mem.id);
      if (m && m.hiddenProjects) {
        m.hiddenProjects = m.hiddenProjects.filter(id => id !== pid);
      }
    });
    saveDB(); overlay.remove(); renderView();
    toast(`You\'re in! Joined ${checked.length} project${checked.length!==1?'s':''} — let\'s get to work 💪`);
  };
}

          <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35)">${cli.name||'—'}</div>
        </div>
        <div style="font-family:var(--font);font-size:28px;font-weight:300;color:#fff;letter-spacing:-0.3px">${proj.name}</div>
      </div>
      <div style="display:flex;gap:20px;flex-wrap:wrap">
        <div style="text-align:right;padding-left:20px;border-left:1px solid rgba(255,255,255,0.08)">
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:3px">${fmtMonth(month)}</div>
          <div id="mhp-header-hours" style="font-family:var(--font);font-size:26px;font-weight:800;color:#fff;letter-spacing:-0.5px">${totalH.toFixed(1)}<span style="font-size:13px;opacity:0.4">h</span></div>
        </div>
        <div style="text-align:right;padding-left:20px;border-left:1px solid rgba(255,255,255,0.08)">
          <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:3px">Remaining</div>
          <div id="mhp-header-remaining" style="font-family:var(--font);font-size:26px;font-weight:800;color:${over?'#E07060':'#9BC25A'};letter-spacing:-0.5px">${over ? '+' : ''}${over ? (allMonthHours - avail).toFixed(1) : remainingH.toFixed(1)}<span style="font-size:13px;opacity:0.6">${over ? 'h over' : 'h left'}</span></div>
        </div>
      </div>
    </div>

    <!-- Sheet -->
    <div class="sheet-wrap">
      <div class="sheet-scroll">
        <table class="sheet-table" id="mhp-sheet">
          <colgroup>
            <col style="width:130px">
            <col style="width:auto">
            ${(proj.changeOrders||[]).length > 0 ? '<col style="width:170px">' : ''}
            <col style="width:90px">
            <col style="width:72px">
            <col style="width:140px">
            <col style="width:44px">
          </colgroup>
          <thead class="sheet-head">
            <tr>
              <th>Date</th>
              <th>Details</th>
              ${(proj.changeOrders||[]).length > 0 ? '<th style="color:#7EB83B">SOW / Change Order</th>' : ''}
              <th>Hours</th>
              <th style="text-align:center;color:var(--danger);width:72px">OT</th>
              <th style="padding-left:10px">
                <div style="display:flex;align-items:center;gap:5px">
                  <span>Billable</span>
                  <span style="font-size:9px;font-weight:500;color:var(--text-3);text-transform:none;letter-spacing:0">☑ on</span>
                </div>

          </thead>

        </table>
      </div>
      <div class="sheet-footer" style="justify-content:flex-end">
        <button class="add-row-btn" id="mhp-add-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Entry
        </button>
        <div id="mhp-totals" style="display:none"></div>
      </div>
    </div>
  `;

  const body = el.querySelector('#mhp-body');
  const { rate: myRate, overridden } = getEffectiveRate(mem.id, proj.id);

  // Month date bounds — shared by buildMhpRow and addMhpRow
  const [mYear, mMon] = month.split('-').map(Number);
  const monthMin = `${month}-01`;
  const monthMax = `${month}-${new Date(mYear, mMon, 0).getDate().toString().padStart(2,'0')}`;

  function buildMhpRow(entry, isNew = false) {
    const tr = document.createElement('tr');
    tr.className = `sheet-row${isNew?' row-new':''}`;
    tr.dataset.id = entry.id;

    const isNonBillable = !!entry.nonBillable;
    const cos = proj.changeOrders || [];
    const coOptions = cos.length > 0
      ? `<option value="">— Original scope —</option>${cos.filter(c=>c.status!=='rejected').map(c=>`<option value="${c.id}" ${c.id===entry.changeOrderId?'selected':''}>${c.tag ? c.tag+' — ' : ''}${c.name}</option>`).join('')}`
      : '';

    tr.innerHTML = `
      <td class="sheet-cell">
        <input type="date" data-field="date" value="${entry.date||''}" min="${monthMin}" max="${monthMax}" tabindex="0" style="font-size:13px;padding:0 8px;color:var(--text-2)">
      </td>
      <td class="sheet-cell" style="min-width:0;vertical-align:middle;padding:12px 0">
        <div contenteditable="true" data-field="description" tabindex="0"
          data-placeholder="What did you work on?"
          style="min-height:21px"
        >${(entry.description||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </td>
      ${cos.length > 0 ? `<td class="sheet-cell" style="min-width:160px">
        <select data-field="changeOrderId" tabindex="0" style="font-size:14px;padding:4px 6px;border:none;background:transparent;color:${entry.changeOrderId?'#7EB83B':'var(--text-3)'};width:100%;cursor:pointer">
          ${coOptions}
        </select>
      </td>` : ''}
      <td class="sheet-cell">
        <input type="number" data-field="hours" value="${entry.hours||''}" min="0.25" step="0.25" placeholder="0" tabindex="0">
      </td>
      <td class="sheet-cell cell-readonly" style="min-width:80px;text-align:center">
        <label title="Overtime" style="display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;height:46px;padding:0 8px">
          <input type="checkbox" data-field="isOT" ${entry.isOT?'checked':''} tabindex="-1" style="width:14px;height:14px;accent-color:var(--danger);cursor:pointer;flex-shrink:0">
          <span class="ot-label" style="font-size:11px;font-weight:700;color:${entry.isOT?'var(--danger)':'var(--text-3)'};white-space:nowrap">${entry.isOT?otLabel(entry.otMultiplier||getOtMultiplier(entry.date)):'OT'}</span>
        </label>
      </td>
      <td class="sheet-cell cell-billable cell-readonly" style="position:relative">
        <div class="billable-inner">
          <label title="${isNonBillable?'Non-billable':'Mark as non-billable'}" style="display:flex;align-items:center;justify-content:center;width:38px;height:46px;cursor:pointer;flex-shrink:0;border-right:1px solid var(--border)">
            <input type="checkbox" data-field="nonBillable" ${isNonBillable?'checked':''} tabindex="-1" style="width:15px;height:15px;accent-color:var(--accent);cursor:pointer;pointer-events:auto">
          </label>
          <span style="flex:1;padding:0 10px;font-size:13px;font-weight:600;color:${isNonBillable?'var(--text-3)':'var(--accent)'};font-style:${isNonBillable?'italic':''};" class="mhp-nb-label">${isNonBillable?'Non-billable':''}</span>
        </div>
      </td>
      <td class="col-del">
        <button class="del-row-btn" title="Delete" tabindex="-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        </button>
      </td>
    `;

    // OT checkbox — requires client approval confirmation before saving
    const otCb = tr.querySelector('[data-field="isOT"]');
    const otLabelEl = tr.querySelector('.ot-label');
    function refreshOtLabel() {
      const dateVal = tr.querySelector('[data-field="date"]').value;
      const mult = getOtMultiplier(dateVal);
      const checked = otCb.checked;
      otLabelEl.textContent = checked ? otLabel(mult) : 'OT';
      otLabelEl.style.color = checked ? 'var(--danger)' : 'var(--text-3)';
    }
    otCb.addEventListener('change', () => {
      if (!otCb.checked) {
        // Unchecking — find and remove the OT change order for this entry
        const entryId = entry.id;
        const otCo = (proj.changeOrders || []).find(c => c.otEntryId === entryId);
        if (otCo) {
          if (!confirm(`Remove the OT change order "${otCo.name}"?`)) { otCb.checked = true; return; }
          proj.changeOrders = proj.changeOrders.filter(c => c.id !== otCo.id);
          saveDB();
          toast('OT change order removed');
        }
        refreshOtLabel(); markDirty(); setTimeout(() => saveRow(), 50);
        return;
      }

      // Checking OT — require client approval confirmation
      otCb.checked = false; // revert until confirmed
      const dateVal = tr.querySelector('[data-field="date"]').value;
      const hoursVal = parseFloat(tr.querySelector('[data-field="hours"]').value) || 0;
      const mult = getOtMultiplier(dateVal);
      const lead = getMember(proj.leadId);

      const o = showModal('Overtime Approval Required',
        `<div style="background:rgba(192,57,43,0.06);border:1px solid rgba(192,57,43,0.15);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:20px;font-size:13px;line-height:1.6">
          <strong>OT is only logged once the client has approved the budget.</strong><br>
          By confirming, a change order will be created and the project lead will be notified.
        </div>
        <div class="form-row" style="margin-bottom:16px">
          <div class="form-group" style="flex:1">
            <label>Client Approval Reference</label>
            <input type="text" id="ot-conf-ref" placeholder="e.g. email date, approval ticket, verbal on…" autofocus>
            <div class="form-hint">Required — confirms the client approved this OT budget</div>
          </div>
        </div>
        <div style="background:var(--bg);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--text-2)">
          <strong style="color:var(--text)">${dateVal}</strong> · ${hoursVal}h · ×${mult} OT multiplier
          · ${proj.name} (${getClient(proj.clientId).name||'—'})
          ${lead?.id ? `<div style="margin-top:4px;color:var(--text-3)">Lead: ${displayName(lead)}</div>` : ''}
        </div>
        <div class="form-actions">
          <button class="btn btn-ghost" id="ot-conf-cancel">Cancel</button>
          <button class="btn btn-primary" id="ot-conf-ok">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>
            Confirm OT &amp; Notify Lead
          </button>
        </div>`);

      o.querySelector('#ot-conf-cancel').onclick = () => o.remove();
      o.querySelector('#ot-conf-ok').onclick = () => {
        const ref = o.querySelector('#ot-conf-ref').value.trim();
        if (!ref) { toast('Please enter a client approval reference', 'error'); o.querySelector('#ot-conf-ref').focus(); return; }

        // Create the OT change order
        if (!proj.changeOrders) proj.changeOrders = [];
        const coId = genId('co');
        const fmtDate = new Date(dateVal + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
        const coName = `OT — ${displayName(mem)} · ${fmtDate} · ${hoursVal}h ×${mult}`;
        proj.changeOrders.push({
          id: coId,
          createdAt: new Date().toISOString(),
          name: coName,
          tag: 'OT',
          description: `Overtime request: ${hoursVal}h at ×${mult} multiplier on ${dateVal}. Client approval ref: ${ref}`,
          status: 'pending',
          value: 0,
          currency: proj.currency || getClient(proj.clientId)?.currency || DB.settings.defaultCurrency,
          otEntryId: entry.id, // link back to the time entry
          otRef: ref,
          otMemberId: mem.id,
        });

        // Apply OT to the entry
        otCb.checked = true;
        refreshOtLabel(); markDirty(); saveRow();

        // Notify project lead
        if (lead?.email) {
          const ejsConfigured = DB.emailjs?.publicKey && DB.emailjs?.serviceId && DB.emailjs?.templateId;
          const subject = `OT Request: ${proj.name} — ${displayName(mem)} · ${fmtDate}`;
          const body = `Hi ${lead.name},\n\n${displayName(mem)} has logged ${hoursVal}h overtime (×${mult}) on ${dateVal} for ${proj.name}.\n\nClient approval ref: ${ref}\n\nPlease review the change order in TRACKR. You can delete the OT classification if it should not be approved.`;
          if (ejsConfigured) {
            sendNotificationEmail({ to_name: lead.name, to_email: lead.email, subject, message: body }).then(r => {
              if (r.ok) toast(`OT logged & ${lead.name} notified ✓`);
              else toast(`OT logged — could not email ${lead.name}: ${r.error}`, 'error');
            });
          } else {
            window.open(`mailto:${lead.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`);
            toast('OT logged — mail client opened to notify lead');
          }
        } else {
          toast('OT logged — no lead email configured');
        }
        saveDB();
        o.remove();
      };
    });

    // Checkbox toggle — update label and save immediately
    const nbCb = tr.querySelector('[data-field="nonBillable"]');
    const nbLabel = tr.querySelector('.mhp-nb-label');
    nbCb.addEventListener('change', () => {
      const nb = nbCb.checked;
      nbLabel.textContent = nb ? 'Non-billable' : '';
      nbLabel.style.color = nb ? 'var(--text-3)' : 'var(--accent)';
      nbLabel.style.fontStyle = nb ? 'italic' : '';
      markDirty();
      setTimeout(() => saveRow(), 50);
    });

    // Change order dropdown → save immediately
    const coSel = tr.querySelector('[data-field="changeOrderId"]');
    if (coSel) {
      coSel.addEventListener('change', () => {
        coSel.style.color = coSel.value ? '#7EB83B' : 'var(--text-3)';
        markDirty();
        setTimeout(() => saveRow(), 50);
      });
    }

    const descEl = tr.querySelector('[data-field="description"]');

    // Closure helpers — scoped to this row intentionally
  function getVals() {
      const dateVal = tr.querySelector('[data-field="date"]').value;
      const isOT = tr.querySelector('[data-field="isOT"]').checked;
      return {
        date: dateVal,
        description: descEl.innerText.trim(),
        hours: parseFloat(tr.querySelector('[data-field="hours"]').value) || 0,
        nonBillable: tr.querySelector('[data-field="nonBillable"]').checked,
        changeOrderId: tr.querySelector('[data-field="changeOrderId"]')?.value || '',
        isOT,
        otMultiplier: isOT ? getOtMultiplier(dateVal) : 1,
      };
    }

    function clearDoneStatus(reason = 'edited') {
      const statusKey = `${mem.id}::${proj.id}::${month}`;
      if (DB.projectStatuses[statusKey] !== 'done') return;
      delete DB.projectStatuses[statusKey];
      saveDB();

      const lead = getMember(proj.leadId);
      const reasonText = reason === 'deleted' ? 'An entry was deleted' : 'Hours were updated';

      const body = `
        <div style="text-align:center;padding:8px 0 16px">
          <div style="width:56px;height:56px;border-radius:50%;background:#FFF3E0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7EB83B" stroke-width="2.5" width="26" height="26"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px">${proj.name} marked as pending</div>
          <div style="font-size:13px;color:var(--text-2);margin-bottom:4px">${reasonText} for ${fmtMonth(month)}</div>
          <div class="micro-12">This project was previously marked as done.</div>
        </div>
        ${lead.id ? `
        <div style="background:var(--bg);border-radius:6px;padding:14px 16px;margin-bottom:20px">
          <div class="lbl">Notify project lead</div>
          <div style="display:flex;align-items:center;gap:12px">
            ${memberAvatar(lead)}
            <div>
              <div style="font-weight:700;font-size:14px;color:var(--text)">${displayName(lead)}</div>
              ${lead.email ? `<div class="micro-12">${lead.email}</div>` : ''}
            </div>
            ${lead.email
              ? (DB.emailjs?.publicKey && DB.emailjs?.serviceId && DB.emailjs?.templateId)
                ? `<button id="reset-send-btn" class="btn btn-primary btn-sm" style="margin-left:auto;white-space:nowrap">Send Notification</button>`
                : `<a href="mailto:${lead.email}?subject=${encodeURIComponent('Hours updated: ' + proj.name + ' \u2014 ' + fmtMonth(month))}&body=${encodeURIComponent('Hi ' + lead.name + ',\n\n' + mem.name + ' has updated their hours for ' + proj.name + ' (' + fmtMonth(month) + ').\n\nReason: ' + reasonText + '\n\nThis project has been reset to pending status.')}" class="btn btn-ghost btn-sm" style="margin-left:auto;white-space:nowrap">Open in Mail</a>`
              : ''}
          </div>
        </div>` : `<div style="background:#FFF8E1;border-radius:6px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#8a6d00">No project lead assigned. Edit the project to assign one.</div>`}
        <div id="reset-email-status" style="margin-bottom:12px"></div>
        <div class="form-actions">
          <button class="btn btn-primary" id="reset-modal-close">OK</button>
        </div>
      `;

      const overlay = showModal('Status Reset', body);
      overlay.querySelector('#reset-modal-close').onclick = () => overlay.remove();

      const resetSendBtn = overlay.querySelector('#reset-send-btn');
      if (resetSendBtn && lead.email) {
        resetSendBtn.onclick = async () => {
          const params = {
            to_email: lead.email,
            to_name: lead.name,
            from_name: mem.name,
            subject: 'Hours updated: ' + proj.name + ' \u2014 ' + fmtMonth(month),
            message: 'Hi ' + lead.name + ',\n\n' + mem.name + ' has updated their hours for ' + proj.name + ' (' + fmtMonth(month) + ').\n\nReason: ' + reasonText + '\n\nThis project has been reset to pending status.',
          };
          const statusEl = overlay.querySelector('#reset-email-status');
          resetSendBtn.disabled = true;
          resetSendBtn.textContent = 'Sending\u2026';
          const result = await sendNotificationEmail(params);
          if (result.ok) {
            resetSendBtn.textContent = result.via === 'mailto' ? '\u2713 Mail client opened' : '\u2713 Sent';
            resetSendBtn.style.background = 'var(--accent)';
            const msg = result.via === 'mailto' ? 'Opening your mail client to ' + lead.email : 'Email sent to ' + lead.email;
            if (statusEl) statusEl.innerHTML = '<div class="status-success">' + msg + '</div>';
          } else {
            resetSendBtn.disabled = false;
            resetSendBtn.textContent = 'Send Notification';
            if (statusEl) statusEl.innerHTML = '<div class="status-error">Failed: ' + result.reason + '</div>';
          }
        };
      }
    }

    function saveRow() {
      const { date, description, hours, nonBillable, changeOrderId, isOT, otMultiplier } = getVals();
      if (hours <= 0) return;
      const mo = dateToMonth(date) || month;
      const full = {
        date, description, hours, nonBillable, changeOrderId, isOT, otMultiplier,
        month: mo,
        teamMemberId: mem.id,
        clientId: proj.clientId,
        projectId: proj.id,
      };
      const idx = DB.timeEntries.findIndex(e => e.id === entry.id);
      if (idx >= 0) Object.assign(DB.timeEntries[idx], full);
      else DB.timeEntries.push({ id: entry.id, ...full });
      clearDoneStatus();
      saveDB();
      tr.classList.remove('row-new','row-dirty');
      updateMhpTotals();
    }

    function markDirty() { if (!tr.classList.contains('row-new')) tr.classList.add('row-dirty'); }

    // Contenteditable description events
    descEl.addEventListener('input', () => markDirty());
    descEl.addEventListener('blur', () => { setTimeout(() => { if (!tr.contains(document.activeElement)) saveRow(); }, 80); });
    descEl.addEventListener('keydown', ev => {
      if (ev.key === 'Enter' && !ev.shiftKey) {
        // Tab to hours on Enter
        ev.preventDefault();
        tr.querySelector('[data-field="hours"]')?.focus();
      }
      if (ev.key === 'Escape') descEl.blur();
    });
    descEl.addEventListener('paste', ev => {
      // Paste as plain text only
      ev.preventDefault();
      const text = ev.clipboardData.getData('text/plain');
      document.execCommand('insertText', false, text);
    });

    tr.querySelectorAll('[data-field]:not([data-field="nonBillable"]):not([data-field="isOT"]):not([contenteditable])').forEach(inp => {
      inp.addEventListener('change', () => { markDirty(); if (inp.dataset.field === 'date') refreshOtLabel(); });
      inp.addEventListener('input',  () => { markDirty(); });
      inp.addEventListener('blur', () => { setTimeout(() => { if (!tr.contains(document.activeElement)) saveRow(); }, 80); });
      inp.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') {
          ev.preventDefault();
          ev.stopPropagation();

          const isHoursField = inp.dataset.field === 'hours';
          const { hours } = getVals();
          const rowComplete = hours > 0;

          if (isHoursField && rowComplete) {
            saveRow();
            inp.blur();
            setTimeout(() => addMhpRow('description'), 120);
          } else {
            saveRow();
            const rows = [...body.querySelectorAll('.sheet-row')];
            const next = rows[rows.indexOf(tr) + 1];
            if (next) {
              const peer = next.querySelector(`[data-field="${inp.dataset.field}"]`);
              if (peer) { inp.blur(); setTimeout(() => peer.focus(), 0); }
            } else {
              inp.blur();
              setTimeout(() => addMhpRow('description'), 120);
            }
          }
        }
        if (ev.key === 'Escape') inp.blur();
      });
    });

    tr.querySelector('.del-row-btn').addEventListener('click', () => {
      DB.timeEntries = DB.timeEntries.filter(e => e.id !== entry.id);
      clearDoneStatus('deleted');
      saveDB();
      tr.style.transition = 'opacity 0.12s'; tr.style.opacity = '0';
      setTimeout(() => { tr.remove(); updateMhpTotals(); }, 130);
      toast('Entry gone — like it never happened ✨');
    });

    return tr;
  }

  entries.forEach(e => body.appendChild(buildMhpRow(e)));
  if (entries.length === 0) {
    const blank = { id: genId('te'), date: todayDate(), description: '', hours: '', month };
    body.appendChild(buildMhpRow(blank, true));
  }

  // Delegated listeners — catch both input (typing) and change (spinner/scroll) on hours fields
  const onHoursUpdate = ev => {
    if (ev.target.dataset && ev.target.dataset.field === 'hours') updateMhpTotals();
  };
  body.addEventListener('input', onHoursUpdate);
  body.addEventListener('change', onHoursUpdate);

  function updateMhpTotals() {
    // Read hours directly from DOM — works for unsaved rows too
    let domH = 0;
    body.querySelectorAll('[data-field="hours"]').forEach(inp => {
      domH += parseFloat(inp.value) || 0;
    });
    const otherH = DB.timeEntries
      .filter(e => e.teamMemberId === mem.id && entryMonth(e) === month && e.projectId !== proj.id)
      .reduce((s, e) => s + e.hours, 0);
    const totalAllH = otherH + domH;
    const rem = Math.max(0, avail - totalAllH);
    const isOver = totalAllH > avail;

    // Update footer
    const t = el.querySelector('#mhp-totals');
    if (t) t.innerHTML = `<span style="font-size:16px;font-weight:700">${domH.toFixed(1)}h</span>`;

    // Update header stats
    const hdrH = el.querySelector('#mhp-header-hours');
    if (hdrH) hdrH.innerHTML = `${domH.toFixed(1)}<span style="font-size:13px;opacity:0.4">h</span>`;

    const hdrR = el.querySelector('#mhp-header-remaining');
    if (hdrR) {
      hdrR.style.color = isOver ? '#E07060' : '#9BC25A';
      hdrR.innerHTML = isOver
        ? `+${(totalAllH - avail).toFixed(1)}<span style="font-size:13px;opacity:0.6">h over</span>`
        : `${rem.toFixed(1)}<span style="font-size:13px;opacity:0.6">h left</span>`;
    }
  }

  function addMhpRow(focusField = 'date') {
    const today = todayDate();
    const defaultDate = today >= monthMin && today <= monthMax ? today : monthMin;
    const blank = { id: genId('te'), date: defaultDate, description: '', hours: '', month };
    const row = buildMhpRow(blank, true);
    body.appendChild(row);
    row.scrollIntoView({ block: 'nearest' });
    const target = focusField === 'description'
      ? row.querySelector('[data-field="description"]')
      : row.querySelector(`[data-field="${focusField}"]`) || row.querySelector('[data-field="date"]');
    if (target) setTimeout(() => target.focus(), 0);
  }

  el.querySelector('#mhp-add-btn').addEventListener('click', addMhpRow);
  document.getElementById('mhp-back')?.addEventListener('click', () => { myHoursState.projectDrillId = null; renderView(); });
  el.querySelector('#mhp-bc-home')?.addEventListener('click', () => { myHoursState.projectDrillId = null; renderView(); });
}

function getGrowPipelineDeals() {
  try {
    const csm = JSON.parse(localStorage.getItem('csm-v1') || 'null');
    if (!csm) return [];
    const cols = csm.columns || [];
    const STAGE_WEIGHTS = {};
    cols.forEach(col => {
      if (col.won)  { STAGE_WEIGHTS[col.id] = 1.0; return; }
      if (col.lost) { STAGE_WEIGHTS[col.id] = 0;   return; }
      const custom = cols.filter(c => !c.won && !c.lost).sort((a,b) => a.order - b.order);
      const pos    = custom.findIndex(c => c.id === col.id);
      const total  = custom.length;
      STAGE_WEIGHTS[col.id] = total > 1 ? (pos / (total-1)) * 0.7 + 0.1 : 0.5;
    });
    return (csm.deals || [])
      .filter(d => {
        const col = cols.find(c => c.id === d.stage);
        return col && !col.won && !col.lost && (STAGE_WEIGHTS[d.stage] || 0) > 0;
      })
      .map(d => ({
        id:          d.id,
        name:        d.projectName || d.name || '—',
        clientId:    d.clientId,
        value:       d.value || 0,
        currency:    d.currency || 'USD',
        stage:       d.stage,
        stageName:   cols.find(c => c.id === d.stage)?.name || d.stage,
        probability: Math.round((STAGE_WEIGHTS[d.stage] || 0.3) * 100),
        notes:       d.notes || '',
        startDate:   d.startDate || null,
        endDate:     d.endDate   || null,
        billingType: d.billingType || 'fixed',
      }));
  } catch(_) { return []; }
}

// ── Payroll cost reader ───────────────────────────────────────────────────────
// Reads PAY's payroll-v1 and returns a map of { 'YYYY-MM' → totalCost (with 15% buffer) }
// For months without a completed payroll run, estimates from staff salary data.
function getPayrollTotalsByMonth() {
  try {
    const pay = JSON.parse(localStorage.getItem('payroll-v1') || 'null');
    if (!pay) return {};
    const dc = DB.settings?.defaultCurrency || 'USD';
    const BUFFER = 1.15;
    const staff = pay.staff || [];

    function addM(ym, n) {
      const [y,m] = ym.split('-').map(Number);
      const d = new Date(y, m-1+n, 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }
    const today = new Date();
    const cm = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;

    // Salary as of a given month (mirrors PAY's getSalaryForMonth)
    function salaryFor(s, month) {
      if (!s.salaryHistory?.length) return s.baseSalary || 0;
      const h = [...s.salaryHistory].filter(e => e.effectiveFrom <= month)
        .sort((a,b) => b.effectiveFrom.localeCompare(a.effectiveFrom));
      return h.length ? h[0].amount : (s.baseSalary || 0);
    }
    // Allocation as of a given month (mirrors PAY's getEffectiveAllocation)
    function allocFor(s, month) {
      if (!s.allocationHistory?.length) return s.allocation !== undefined ? s.allocation : 100;
      const h = [...s.allocationHistory].filter(e => e.effectiveFrom <= month)
        .sort((a,b) => b.effectiveFrom.localeCompare(a.effectiveFrom));
      return h.length ? h[0].pct : (s.allocation !== undefined ? s.allocation : 100);
    }
    function toDefault(amount, currency) {
      if (!amount) return 0;
      if (!currency || currency === dc) return amount;
      const converted = FX.convertSync(amount, currency, dc);
      return converted !== null ? Math.round(converted) : amount;
    }
    // Is a staff member active in a given month?
    function eligible(s, month) {
      if (!s.active) return false;
      if (s.startDate && s.startDate.slice(0,7) > month) return false;
      if (s.resignedDate && s.resignedDate.slice(0,7) < month) return false;
      return true;
    }

    // Estimate raw payroll cost for a given month from staff records
    function estimateMonth(month) {
      let total = 0;
      const overheadRate = (pay.settings?.externalOverheadRate !== undefined ? pay.settings.externalOverheadRate : 15) / 100;
      staff.forEach(s => {
        if (!eligible(s, month)) return;
        const base = salaryFor(s, month);
        if (!base) return;
        let cost = base;
        if (s.type === 'external') {
          const allocPct = Math.min(allocFor(s, month), 100) / 100;
          cost = Math.round(base * allocPct * (1 + overheadRate));
        } else if (s.type === 'employee') {
          const tp = (pay.taxProfiles || []).find(t => t.id === s.taxProfileId);
          cost = Math.round(base * (1 + (tp?.employerRate || 0)));
        }
        const curr = s.currency || (pay.entities || []).find(e => e.id === s.entityId)?.currency || dc;
        total += toDefault(cost, curr);
      });
      return total;
    }

    const byMonth = {};
    // Cover 14 months back → 8 ahead (spans any _projOffset window)
    for (let i = -14; i <= 8; i++) {
      const month = addM(cm, i);
      const est = estimateMonth(month);
      if (est > 0) byMonth[month] = Math.round(est * BUFFER);
    }
    return byMonth;
  } catch(_) { return {}; }
}
