        <div class="form-group">
          <label>Default Hourly Rate</label>
          <input type="number" id="pm-vr-hourly-rate" value="${vr.hourlyRate||''}" placeholder="e.g. 100" min="0">
          <div class="form-hint">Used when a monthly approval doesn't specify a rate.</div>
        </div>
      </div>
      <div class="form-hint" style="margin-top:4px">Monthly hour approvals are managed from the project detail page.</div>
    </div>

    <div class="section-divider">Project Dates</div>
    <div class="form-row">
      <div class="form-group">
        <label>Start Date <span style="font-size:10px;color:var(--text-3);font-weight:400">(optional)</span></label>
        <input type="date" id="pm-start-date" value="${p.startDate||''}">
        <div class="form-hint">Project hidden from months before this date.</div>
      </div>
      <div class="form-group">
        <label>Close Date <span style="font-size:10px;color:var(--text-3);font-weight:400">(optional)</span></label>
        <input type="date" id="pm-close-date" value="${p.closedDate||''}">
        <div class="form-hint">Project hidden from months after this date.</div>
      </div>
    </div>

    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-ghost" id="pm-cancel">Cancel</button>
      <button class="btn btn-primary" id="pm-save">${isEdit?'Update Project':'Add Project'}</button>
    </div>
  `;

  const overlay = showModal(isEdit ? 'Edit Project' : 'Add Project', body, '600px');

  // Billing type toggle
  const billingTypeSel = overlay.querySelector('#pm-billing-type');
  billingTypeSel.addEventListener('change', () => {
    overlay.querySelector('#pm-tm-section').style.display = billingTypeSel.value === 'time_materials' ? 'block' : 'none';
    overlay.querySelector('#pm-retainer-section').style.display = billingTypeSel.value === 'retainer' ? 'block' : 'none';
    overlay.querySelector('#pm-fixed-section').style.display = billingTypeSel.value === 'fixed' ? 'block' : 'none';
    overlay.querySelector('#pm-variable-retainer-section').style.display = billingTypeSel.value === 'variable_retainer' ? 'block' : 'none';
  });

  // Milestone live closeout updater
  function updateMilestoneCloseout() {
    const dep = parseFloat(overlay.querySelector('#pm-ms-deposit')?.value) || 0;
    const mid = parseFloat(overlay.querySelector('#pm-ms-midpoint')?.value) || 0;
    const co  = overlay.querySelector('#pm-ms-closeout');
    const hint = overlay.querySelector('#pm-ms-sum-hint');
    if (!co) return;
    const remainder = Math.max(0, 100 - dep - mid);
    co.value = remainder;
    if (hint) hint.textContent = dep + mid + remainder === 100 ? 'Auto — remainder to 100.' : `⚠ Total: ${dep+mid+remainder}%`;
  }
  overlay.querySelector('#pm-ms-deposit')?.addEventListener('input', updateMilestoneCloseout);
  overlay.querySelector('#pm-ms-midpoint')?.addEventListener('input', updateMilestoneCloseout);
  updateMilestoneCloseout();

  // Overage checkbox toggle
  overlay.querySelector('#pm-overage-enabled')?.addEventListener('change', function() {
    overlay.querySelector('#pm-overage-rate-group').style.display = this.checked ? 'flex' : 'none';
  });

  // Blended rate hint for retainer
  function updateBlendedHint() {
    const hours = parseFloat(overlay.querySelector('#pm-retainer-hours')?.value) || 0;
    const fee = parseFloat(overlay.querySelector('#pm-retainer-fee')?.value) || 0;
    const hint = overlay.querySelector('#pm-retainer-blended-hint');
    if (hint && hours > 0 && fee > 0) {
      hint.textContent = `≈ ${fmt(fee/hours, overlay.querySelector('#pm-currency').value)}/h blended rate`;
    } else if (hint) {
      hint.textContent = '';
    }
  }
  overlay.querySelector('#pm-retainer-hours')?.addEventListener('input', updateBlendedHint);
  overlay.querySelector('#pm-retainer-fee')?.addEventListener('input', updateBlendedHint);
  updateBlendedHint();

  // Billing day hint
  function updateBillingDayHint() {
    const day = parseInt(overlay.querySelector('#pm-billing-day')?.value) || 1;
    const hint = overlay.querySelector('#pm-billing-day-hint');
    if (!hint) return;
    if (day <= 1) {
      hint.textContent = 'Cycles run 1st → end of month (standard)';
    } else {
      const exStart = `e.g. Apr ${day}`;
      const exEnd   = `May ${day-1}`;
      hint.textContent = `Cycle runs ${exStart} → ${exEnd} — reported as "April"`;
    }
  }
  overlay.querySelector('#pm-billing-day')?.addEventListener('input', updateBillingDayHint);
  updateBillingDayHint();

  // When client changes → auto-set currency to client's default (unless user has already manually changed it)
  let userChangedCurrency = false;
  const currSel = overlay.querySelector('#pm-currency');
  const hint = overlay.querySelector('#pm-currency-hint');

  function updateCurrencyHint() {
    const cid = overlay.querySelector('#pm-client').value;
    const cli = getClient(cid);
    const clientCurr = cli.currency || DB.settings.defaultCurrency;
    if (!currSel.value) {
      hint.textContent = `· using ${clientCurr} (from client)`;
    } else {
      hint.textContent = currSel.value !== clientCurr ? `· overrides ${clientCurr} (client default)` : '';
    }
  }

  overlay.querySelector('#pm-client').addEventListener('change', function() {
    updateCurrencyHint();
  });

  currSel.addEventListener('change', () => { userChangedCurrency = true; updateCurrencyHint(); });
  updateCurrencyHint();

  // ── SOW PDF Import ──
  if (!isEdit) {
    const sowFile = overlay.querySelector('#pm-sow-file');
    const sowStatus = overlay.querySelector('#pm-sow-status');

    sowFile?.addEventListener('change', async () => {
      const file = sowFile.files[0];
      if (!file) return;
      sowStatus.style.display = 'block';
      sowStatus.innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(103,143,47,.06);border:1px solid rgba(103,143,47,.2);border-radius:var(--radius-sm)">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" width="16" height="16" style="flex-shrink:0;animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <span style="color:var(--text-2)">Reading <strong style="color:var(--text)">${file.name}</strong> — extracting project details…</span>
      </div>`;

      try {
        const base64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(',')[1]);
          r.onerror = () => rej(new Error('Could not read file'));
          r.readAsDataURL(file);
        });

        const apiKey = localStorage.getItem('mis-anthropic-key');
        if (!apiKey) {
          sowStatus.innerHTML = `<div style="padding:10px 14px;background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2);border-radius:var(--radius-sm);font-size:13px;color:var(--danger)">
            No API key configured. Go to <strong>Settings → AI Features</strong> to add your Anthropic API key.
          </div>`;
          sowFile.value = '';
          return;
        }

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{
              role: 'user',
              content: [
                { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: base64 } },
                { type: 'text', text: `Extract project details from this SOW/service agreement PDF. Return ONLY a JSON object with these fields (no markdown, no explanation):
{
  "projectName": "short descriptive project name (infer from scope, not the document title)",
  "clientName": "client company name",
  "currency": "3-letter currency code e.g. USD",
  "billingType": "fixed OR time_materials OR retainer",
  "fixedFee": number or null (total contract value if fixed price),
  "retainerMonthlyFee": number or null (monthly fee if retainer),
  "notes": "1-2 sentence summary of scope"
}` }
              ]
            }]
          })
        });

        const data = await response.json();
        const raw = data.content?.find(b => b.type === 'text')?.text || '';
        const clean = raw.replace(/```json|```/g, '').trim();
        const extracted = JSON.parse(clean);

        // Fill form fields
        if (extracted.projectName) overlay.querySelector('#pm-name').value = extracted.projectName;

        // Fuzzy client matching — score by significant word overlap
        let clientMatch = null;
        let clientSuggested = false;
        if (extracted.clientName) {
          const stopWords = new Set(['inc','ltd','llc','pte','co','corp','the','and','of','for','a','an','&']);
          const tokenise = str => str.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(w => w.length > 1 && !stopWords.has(w));
          const sowTokens = tokenise(extracted.clientName);

          // Exact/substring first
          clientMatch = DB.clients.find(c =>
            c.name.toLowerCase().includes(extracted.clientName.toLowerCase()) ||
            extracted.clientName.toLowerCase().includes(c.name.toLowerCase())
          );

          // Fuzzy: score each client by token overlap
          if (!clientMatch && sowTokens.length) {
            let best = null, bestScore = 0;
            DB.clients.forEach(c => {
              const cTokens = tokenise(c.name);
              const shared = sowTokens.filter(t => cTokens.some(ct => ct.includes(t) || t.includes(ct))).length;
              // Score = shared tokens / max possible, weighted by coverage of both sides
              const score = (shared * 2) / (sowTokens.length + cTokens.length);
              if (score > bestScore) { bestScore = score; best = c; }
            });
            // Accept if at least 1 meaningful word in common (~0.15 threshold)
            if (best && bestScore >= 0.15) { clientMatch = best; clientSuggested = true; }
          }

          if (clientMatch) {
            overlay.querySelector('#pm-client').value = clientMatch.id;
            updateCurrencyHint();
          }
        }

        // Currency
        if (extracted.currency) {
          const currOpt = [...overlay.querySelector('#pm-currency').options].find(o => o.value === extracted.currency);
          if (currOpt) { overlay.querySelector('#pm-currency').value = extracted.currency; userChangedCurrency = true; }
        }

        // Billing type & fee
        if (extracted.billingType === 'fixed') {
          billingTypeSel.value = 'fixed';
          billingTypeSel.dispatchEvent(new Event('change'));
          if (extracted.fixedFee) overlay.querySelector('#pm-fixed-fee').value = extracted.fixedFee;
        } else if (extracted.billingType === 'retainer') {
          billingTypeSel.value = 'retainer';
          billingTypeSel.dispatchEvent(new Event('change'));
          if (extracted.retainerMonthlyFee) overlay.querySelector('#pm-retainer-fee').value = extracted.retainerMonthlyFee;
        } else {
          billingTypeSel.value = 'time_materials';
          billingTypeSel.dispatchEvent(new Event('change'));
        }

        const parts = [];
        if (extracted.clientName) {
          if (clientSuggested && clientMatch) {
            parts.push(`<span style="color:#7a5a10">⚠ SOW says <strong>"${extracted.clientName}"</strong> — closest match: <strong>${clientMatch.name}</strong>. Change client if wrong.</span>`);
          } else if (!clientMatch) {
            parts.push(`<span style="color:var(--danger)">Client "<strong>${extracted.clientName}</strong>" not found — select manually</span>`);
          }
        }
        if (extracted.notes) parts.push(`<span style="color:var(--text-2)">${extracted.notes}</span>`);

        sowStatus.innerHTML = `<div style="padding:10px 14px;background:rgba(103,143,47,.06);border:1px solid rgba(103,143,47,.2);border-radius:var(--radius-sm);display:flex;gap:8px;align-items:flex-start">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5" width="15" height="15" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg>
          <div style="font-size:13px">${parts.length ? parts.join('<br>') : 'Fields filled from SOW — review and save.'}</div>
        </div>`;

      } catch(e) {
        sowStatus.innerHTML = `<div style="padding:10px 14px;background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2);border-radius:var(--radius-sm);font-size:13px;color:var(--danger)">
          Could not extract details: ${e.message}. Fill in manually.
        </div>`;
      }
      sowFile.value = '';
    });
  }

  overlay.querySelector('#pm-cancel').onclick = () => overlay.remove();
  overlay.querySelector('#pm-save').onclick = () => {
    const name = overlay.querySelector('#pm-name').value.trim();
    const clientId = overlay.querySelector('#pm-client').value;
    const currency = currSel.value;
    if (!name || !clientId) { toast('Project needs a name and a client — it can\'t float in space! 🚀', 'error'); return; }
    const leadId = overlay.querySelector('#pm-lead').value;
    const bt = billingTypeSel.value;

    const retainerData = {
      hoursIncluded: parseFloat(overlay.querySelector('#pm-retainer-hours')?.value) || 0,
      monthlyFee:    parseFloat(overlay.querySelector('#pm-retainer-fee')?.value) || 0,
      overageEnabled: overlay.querySelector('#pm-overage-enabled')?.checked || false,
      overageRate:   parseFloat(overlay.querySelector('#pm-overage-rate')?.value) || 0,
      billingDay:    parseInt(overlay.querySelector('#pm-billing-day')?.value) || 1,
    };
    const fixedFeeVal = parseFloat(overlay.querySelector('#pm-fixed-fee')?.value) || 0;
    const tmBudgetVal = parseFloat(overlay.querySelector('#pm-tm-budget')?.value) || 0;
    const msDeposit   = parseFloat(overlay.querySelector('#pm-ms-deposit')?.value) ?? 25;
    const msMidpoint  = parseFloat(overlay.querySelector('#pm-ms-midpoint')?.value) ?? 50;
    const msTrigger   = parseFloat(overlay.querySelector('#pm-ms-trigger')?.value) ?? 70;
    const msCloseout  = Math.max(0, 100 - msDeposit - msMidpoint);

    const vrData = {
      yearlyBudget: parseFloat(overlay.querySelector('#pm-vr-yearly-budget')?.value) || 0,
      hourlyRate:   parseFloat(overlay.querySelector('#pm-vr-hourly-rate')?.value) || 0,
      approvals: isEdit ? (getProject(project.id).variableRetainer?.approvals || {}) : {},
    };

    if (bt === 'retainer' && !retainerData.monthlyFee) {
      toast('Set a monthly fee for the retainer', 'error'); return;
    }
    if (bt === 'fixed' && !fixedFeeVal) {
      toast('Set the fixed fee for this project', 'error'); return;
    }

    const update = { name, clientId, currency, leadId, billingType: bt, retainer: retainerData, fixedFee: fixedFeeVal, tmBudget: tmBudgetVal, variableRetainer: vrData,
      fixedMilestones: { deposit: msDeposit, midpoint: msMidpoint, midpointTrigger: msTrigger, closeout: msCloseout },
      startDate: overlay.querySelector('#pm-start-date')?.value || '',
      closedDate: overlay.querySelector('#pm-close-date')?.value || '',
    };
    if (isEdit) {
      Object.assign(getProject(project.id), update);
    } else {
      DB.projects.push({ id: genId('pr'), rateOverrides: {}, members: [], ...update });
    }
    saveDB(); overlay.remove(); renderView();
    toast(isEdit ? 'Project updated — looking good 👍' : 'New project launched! 🚀');
  };
}

// ── TEAM MEMBERS ──
function renderTeam(el, acts) {
  const resignedDates   = getPayResignedDates();
  const archivedMembers = DB.teamMembers.filter(m => m.archived);
  // Split non-archived into active vs resigned (resigned = has a date in PAY)
  const resignedMembers = DB.teamMembers.filter(m => !m.archived && !!resignedDates[m.id]);
  const activeMembers   = DB.teamMembers.filter(m => !m.archived && !resignedDates[m.id]);
  const canSeeArchived  = hasRole('admin', 'team_manager');

  acts.innerHTML = `
    <button class="btn btn-primary" id="new-member-btn">+ Add Member</button>
    ${canSeeArchived && archivedMembers.length > 0 ? `
    <button class="btn btn-ghost btn-sm" id="archived-btn" style="position:relative">
      Archived
      <span style="background:var(--text-3);color:#fff;border-radius:100px;white-space:nowrap;font-size:10px;font-weight:700;padding:1px 6px;margin-left:4px">${archivedMembers.length}</span>
    </button>` : ''}
  `;

  const categories = [...new Set(activeMembers.map(m => m.category).filter(Boolean))];
  const roles = [...new Set(activeMembers.map(m => m.role || 'member'))];

  el.innerHTML = `
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="position:relative;flex:1;min-width:0;max-width:240px">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13" style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="team-search" placeholder="Search members..." style="width:100%;padding:7px 9px 7px 28px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font)">
        </div>
        ${roles.length > 1 ? `<select id="team-role-filter" style="font-size:13px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);width:140px;flex-shrink:0">
          <option value="">All roles</option>
          <option value="admin">Admin</option>
          <option value="team_manager">Team Manager</option>
          <option value="member">Member</option>
        </select>` : ''}
        ${categories.length > 0 ? `<select id="team-cat-filter" style="font-size:13px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);width:140px;flex-shrink:0">
          <option value="">All categories</option>
          ${categories.map(cat => '<option value="'+cat+'">'+cat+'</option>').join('')}
        </select>` : ''}
        <span id="team-count" style="font-size:14px;color:var(--text-3);white-space:nowrap;margin-left:auto;flex-shrink:0">${activeMembers.length} member${activeMembers.length!==1?'s':''}</span>
      </div>
      <div id="team-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border)"></div>
    </div>
    ${resignedMembers.length > 0 ? '<div id="resigned-section"></div>' : ''}
  `;

  const grid    = el.querySelector('#team-grid');
  const countEl = el.querySelector('#team-count');
  const thisMonth = currentMonth();

  function buildCard(m) {
    const hours = entriesByMemberMonth(m.id, thisMonth).reduce((s,e)=>s+e.hours,0);
    const avail = m.availableHours || 160;
    const pct = Math.min((hours/avail)*100,100);
    const div = document.createElement('div');
    div.style.cssText = 'background:var(--card);padding:20px';
    div.innerHTML = `
      <div class="flex items-center gap-8 mb-16">
        <div class="avatar" style="overflow:hidden;${m.photo?'padding:0;background:none':''}">
          ${m.photo ? '<img src="'+m.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">' : initials(m.name)}
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
            <div class="member-name-link" data-id="${m.id}" style="font-family:var(--font);font-weight:700;font-size:15px;min-width:0;cursor:pointer;color:var(--accent);text-decoration:underline;text-underline-offset:3px">${m.name||'—'}</div>
            ${roleTag(m.role||'member')}
          </div>
          <div style="font-size:11px;color:var(--text-3);margin-top:2px">${m.email}</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:3px">
            ${m.jobTitleId ? '<span class="badge badge-blue" style="font-size:10px">'+((DB.jobTitles||[]).find(jt=>jt.id===m.jobTitleId)?.name||'')+'</span>' : ''}
            ${m.category ? '<span class="badge badge-gray" style="font-size:10px">'+m.category+'</span>' : ''}
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:14px">
        <div>
          <div class="lbl">Default Rate</div>
          <div style="font-family:var(--font);font-size:14px;margin-top:2px">${fmt(m.defaultRate, m.defaultCurrency)}/h</div>
        </div>
        <div>
          <div class="lbl">Available</div>
          <div style="font-family:var(--font);font-size:14px;margin-top:2px">${fmtH(avail)}/mo</div>
        </div>
      </div>
      <div style="margin-top:12px">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:4px">
          <span>This month</span>
          <span style="font-family:var(--font)">${fmtH(hours)} / ${fmtH(avail)}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill${hours>avail?' over':''}" style="width:${pct}%"></div></div>
      </div>
      <div style="display:flex;gap:6px;margin-top:14px">
        <button class="btn btn-ghost btn-sm edit-member" data-id="${m.id}" style="flex:1">Edit</button>
        <button class="btn btn-ghost btn-sm archive-member" data-id="${m.id}" style="color:var(--text-3)" title="Archive member">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
        </button>
      </div>`;
    return div;
  }

  function renderGrid() {
    const q     = (el.querySelector('#team-search')?.value || '').toLowerCase().trim();
    const roleF = el.querySelector('#team-role-filter')?.value || '';
    const catF  = el.querySelector('#team-cat-filter')?.value || '';

    let filtered = activeMembers.filter(m => {
      if (q && !m.name.toLowerCase().includes(q) && !(m.email||'').toLowerCase().includes(q)) return false;
      if (roleF && (m.role || 'member') !== roleF) return false;
      if (catF && m.category !== catF) return false;
      return true;
    });

    grid.innerHTML = '';
    if (countEl) countEl.textContent = filtered.length === activeMembers.length
      ? `${filtered.length} member${filtered.length!==1?'s':''}`
      : `${filtered.length} of ${activeMembers.length}`;

    if (filtered.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'grid-column:1/-1;background:var(--card);padding:40px;text-align:center;color:var(--text-3)';
      empty.innerHTML = activeMembers.length === 0
        ? 'No active team members.'
        : 'No members match your filters. <button class="btn btn-ghost btn-sm" id="clear-team-filters" style="margin-left:8px">Clear filters</button>';
      grid.appendChild(empty);
      empty.querySelector('#clear-team-filters')?.addEventListener('click', () => {
        el.querySelector('#team-search').value = '';
        if (el.querySelector('#team-role-filter')) el.querySelector('#team-role-filter').value = '';
        if (el.querySelector('#team-cat-filter')) el.querySelector('#team-cat-filter').value = '';
        renderGrid();
      });
      return;
    }

    filtered.forEach(m => {
      const card = buildCard(m);
      card.querySelector('.member-name-link')?.addEventListener('click', () => showMemberTimesheetModal(m));
      card.querySelector('.edit-member').addEventListener('click', () => showMemberModal(getMember(m.id)));
      card.querySelector('.archive-member').addEventListener('click', () => {
        const mem = getMember(m.id);
        if (!mem?.id) return;
        confirmModal('Archive Member',
          `Archiving <strong>${mem.name}</strong> hides them from future use. All historical data is kept.<br><br>You can restore them via the Archived button at any time.`,
          'Archive Member',
          () => { mem.archived = true; saveDB(); renderView(); toast(`${mem.name} archived`); }
        );
      });
      grid.appendChild(card);
    });
  }

  function renderResigned() {
    const section = el.querySelector('#resigned-section');
    if (!section) return;
    section.innerHTML = '';
    const wrap = document.createElement('div');
    // Divider header
    wrap.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:4px">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-3)">Resigned</div>
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span class="micro-11">${resignedMembers.length} member${resignedMembers.length!==1?'s':''}</span>
      </div>`;

    const listWrap = document.createElement('div');
    listWrap.style.cssText = 'background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden';
    resignedMembers.forEach((m, idx) => {
      const rd = resignedDates[m.id];
      const jobTitle = m.jobTitleId ? ((DB.jobTitles||[]).find(jt=>jt.id===m.jobTitleId)?.name||'') : '';
      const meta = [m.email, m.category, jobTitle].filter(Boolean).join(' · ');
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:14px;padding:14px 18px' + (idx < resignedMembers.length-1 ? ';border-bottom:1px solid var(--border)' : '');
      row.innerHTML = `
        <div class="avatar" style="width:36px;height:36px;font-size:14px;flex-shrink:0;overflow:hidden;opacity:.55;${m.photo?'padding:0;background:none':''}">
          ${m.photo ? '<img src="'+m.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">' : initials(m.name)}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            ${m.name||'—'}
            <span class="badge" style="font-size:10px;background:rgba(192,57,43,0.08);color:var(--danger)">Resigned ${fmtDate(rd)}</span>
            ${roleTag(m.role||'member')}
          </div>
          <div style="font-size:11px;color:var(--text-3);margin-top:2px">${meta}</div>
        </div>
        <button class="btn btn-ghost btn-sm edit-resigned" data-id="${m.id}" style="flex-shrink:0;font-size:14px">Edit</button>
      `;
      row.querySelector('.edit-resigned').addEventListener('click', () => showMemberModal(getMember(m.id)));
      listWrap.appendChild(row);
    });

    wrap.appendChild(listWrap);
    section.appendChild(wrap);
  }

  renderGrid();
  renderResigned();

  el.querySelector('#team-search')?.addEventListener('input', renderGrid);
  el.querySelector('#team-role-filter')?.addEventListener('change', renderGrid);
  el.querySelector('#team-cat-filter')?.addEventListener('change', renderGrid);

  document.getElementById('new-member-btn')?.addEventListener('click', () => showMemberModal());

  // Archived modal
  document.getElementById('archived-btn')?.addEventListener('click', () => {
    const body = document.createElement('div');

    function renderArchivedList() {
      body.innerHTML = '';
      const archived = DB.teamMembers.filter(m => m.archived);
      if (archived.length === 0) {
        body.innerHTML = '<div class="empty-state" style="padding:32px"><p>No archived members.</p></div>';
        return;
      }
      archived.forEach(m => {
        const hasEntries = DB.timeEntries.some(e => e.teamMemberId === m.id);
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)';
        row.innerHTML = `
          <div class="avatar" style="width:36px;height:36px;font-size:13px;flex-shrink:0;overflow:hidden;${m.photo?'padding:0;background:none':''}">
            ${m.photo ? '<img src="'+m.photo+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%">' : initials(m.name)}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px">
              ${m.name||'—'} ${roleTag(m.role||'member')}
            </div>
            <div style="font-size:11px;color:var(--text-3);margin-top:1px">${m.email||'—'}${m.category?' · '+m.category:''}</div>
          </div>
          <button class="btn btn-ghost btn-sm restore-archived" data-id="${m.id}">Restore</button>
          ${isAdmin() ? '<button class="btn btn-ghost btn-sm del-archived" data-id="'+m.id+'" style="color:'+(hasEntries?'var(--text-3)':'var(--danger)')+'" '+(hasEntries?'disabled title="Has logged hours"':'')+'>'+
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>'+
          '</button>' : ''}
        `;
        row.querySelector('.restore-archived').addEventListener('click', () => {
          getMember(m.id).archived = false;
          saveDB(); renderView();
          overlay.remove();
          toast(`${m.name} restored!`);
        });
        row.querySelector('.del-archived')?.addEventListener('click', () => {
          if (hasEntries) return;
          confirmModal('Delete Permanently',
            `Permanently delete <strong>${m.name}</strong>? This cannot be undone.`,
            'Delete',
            () => {
              DB.teamMembers = DB.teamMembers.filter(t => t.id !== m.id);
              saveDB(); renderView(); overlay.remove();
              toast('Member deleted permanently 🗑');
            }
          );
        });
        body.appendChild(row);
      });
    }

    renderArchivedList();
    const overlay = showModal(`Archived Members (${archivedMembers.length})`, body.outerHTML || '');
    // Re-wire since showModal clones HTML — use live DOM
    overlay.querySelector('.modal-body').innerHTML = '';
    overlay.querySelector('.modal-body').appendChild(body);
    renderArchivedList();
  });
}

// ── Member Timesheet Modal ──
function showMemberTimesheetModal(mem) {
  const months = [...new Set(
    DB.timeEntries.filter(e => e.teamMemberId === mem.id).map(e => e._month || entryMonth(e))
  )].filter(Boolean).sort().reverse();

  let selectedMonth = months[0] || currentMonth();

  function buildContent() {
    const monthEntries = DB.timeEntries.filter(e =>
      e.teamMemberId === mem.id && (e._month || entryMonth(e)) === selectedMonth
    ).sort((a,b) => (a.date||'').localeCompare(b.date||''));

    const totalH = monthEntries.reduce((s,e) => s+e.hours, 0);
    const avail = mem.availableHours || 160;
    const pct = Math.min((totalH/avail)*100, 100);

    const rowsHtml = monthEntries.map(e => {
      const proj = getProject(e.projectId);
      const cli = getClient(proj.clientId);
      return `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:9px 16px;font-size:14px;color:var(--text-2);white-space:nowrap">${e.date ? fmtDate(e.date) : ''}</td>
        <td style="padding:9px 16px;font-size:13px;font-weight:600">${proj.name||'—'}<span style="font-weight:400;color:var(--text-3);margin-left:6px;font-size:14px">${cli.name||''}</span></td>
        <td style="padding:9px 16px;font-size:13px;color:var(--text-2);max-width:240px">${e.description||'—'}</td>
        <td style="padding:9px 16px;font-size:11px">
          ${e.nonBillable
            ? `<span style="color:var(--text-3)">Non-billable</span>`
            : `<span style="color:var(--success)">Billable</span>`}
        </td>
        <td style="padding:9px 16px;font-family:var(--font);font-weight:700;text-align:right;white-space:nowrap">${fmtH(e.hours)}</td>
      </tr>`;
    }).join('');

    return `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <select id="ts-month-sel" style="font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font)">
          ${months.length ? months.map(mo => `<option value="${mo}" ${mo===selectedMonth?'selected':''}>${fmtMonth(mo)}</option>`).join('') : `<option value="${currentMonth()}">${fmtMonth(currentMonth())}</option>`}
        </select>
        <div style="flex:1"></div>
        <span class="micro-12">${fmtH(totalH)} / ${fmtH(avail)}</span>
        <div style="width:80px;height:4px;background:var(--border);border-radius:100px;white-space:nowrap;overflow:hidden">
          <div style="height:100%;width:${pct.toFixed(0)}%;background:var(--accent);border-radius:100px;white-space:nowrap"></div>
        </div>
      </div>
      ${monthEntries.length === 0
        ? `<div class="empty-state" style="padding:32px"><p>No entries for ${fmtMonth(selectedMonth)}.</p></div>`
        : `<div style="overflow:auto;max-height:50vh">
            <table class="tbl">
              <thead style="position:sticky;top:0;background:var(--card);z-index:1">
                <tr>
                  <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border);white-space:nowrap">Date</th>
                  <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Project</th>
                  <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Description</th>
                  <th style="padding:8px 16px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Type</th>
                  <th style="padding:8px 16px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Hours</th>
                </tr>
              </thead>
              <tbody>${rowsHtml}</tbody>
              <tfoot>
                <tr style="border-top:2px solid var(--border)">
                  <td colspan="4" style="padding:10px 16px;font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3)">Total</td>
                  <td style="padding:10px 16px;text-align:right;font-weight:800;font-family:var(--font)">${fmtH(totalH)}</td>
                </tr>
              </tfoot>
            </table>
          </div>`}
      <div style="margin-top:16px;display:flex;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" id="ts-edit-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit in My Hours
        </button>
      </div>
    `;
  }

  const container = document.createElement('div');
  container.innerHTML = buildContent();
  const overlay = showModal(mem.name, container.innerHTML);
  const modalBody = overlay.querySelector('.modal-body');
  modalBody.innerHTML = '';
  modalBody.appendChild(container);

  // Month switcher — re-render on change
  container.querySelector('#ts-month-sel')?.addEventListener('change', function() {
    selectedMonth = this.value;
    container.innerHTML = buildContent();
    rewire();
  });

  function rewire() {
    container.querySelector('#ts-month-sel')?.addEventListener('change', function() {
      selectedMonth = this.value;
      container.innerHTML = buildContent();
      rewire();
    });
    container.querySelector('#ts-edit-btn')?.addEventListener('click', () => {
      overlay.remove();
      // Navigate to My Hours for this member at the selected month
      myHoursState.memberId = mem.id;
      myHoursState.month = selectedMonth;
      navigate('myhours');
    });
  }

  rewire();
  container.querySelector('#ts-edit-btn')?.addEventListener('click', () => {
    overlay.remove();
    myHoursState.memberId = mem.id;
    myHoursState.month = selectedMonth;
    navigate('myhours');
  });
}

function showMemberModal(member = null) {
  const isEdit = !!member;
  const m = member || { name:'', email:'', defaultRate:100, defaultCurrency: DB.settings.defaultCurrency, availableHours: 160, trackUtilisation: true };
  const trackUtil = m.trackUtilisation !== false; // default true

  const body = `
    <div class="form-row">
      <div class="form-group full" style="align-items:center;display:flex;gap:16px">
        <div id="mm-avatar-preview" style="width:64px;height:64px;border-radius:50%;overflow:hidden;background:var(--bg);border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:22px;font-weight:700;color:var(--text-2)">
          ${m.photo ? `<img src="${m.photo}" style="width:100%;height:100%;object-fit:cover">` : `<span>${(m.name||'?').charAt(0).toUpperCase()}</span>`}
        </div>
        <div>
          <label style="display:block;margin-bottom:6px">Profile Photo</label>
          <label class="btn btn-secondary btn-sm" style="cursor:${supaCfg()?'pointer':'not-allowed'};display:inline-block;opacity:${supaCfg()?'1':'0.5'}" title="${supaCfg()?'Upload photo':'Configure Supabase in Settings first'}">
            ${supaCfg() ? 'Upload Photo' : '🔒 Supabase required'}
            <input type="file" id="mm-photo" accept="image/*" style="display:none" ${supaCfg()?'':'disabled'}>
          </label>
          ${m.photo && hasRole('admin','team_manager') ? `<button class="btn btn-ghost btn-sm" id="mm-remove-photo" style="margin-left:6px;color:var(--danger)">Remove${isAdmin() ? '' : ' (hide)'}</button>` : ''}
          <div class="form-hint" style="margin-top:4px">JPG, PNG or WebP. Used in reports.</div>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="mm-name" value="${m.name||''}" placeholder="e.g. Alice Chen">
      </div>
      <div class="form-group">
        <label>Nickname <span style="font-weight:400;text-transform:none;font-size:11px;color:var(--text-3)">(optional)</span></label>
        <input type="text" id="mm-nickname" value="${m.nickname||''}" placeholder="e.g. Ali, Ace">
        <div class="form-hint">Shown instead of full name.</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full">
        <label>Email</label>
        <input type="email" id="mm-email" value="${m.email||''}" placeholder="alice@company.com">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Default Billable Rate</label>
        <input type="number" id="mm-rate" min="0" value="${m.defaultRate||''}" placeholder="e.g. 120">
        <div class="form-hint">Per hour. Can be overridden per project.</div>
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select id="mm-currency">
          ${[...new Set([...DB.settings.currencies, m.defaultCurrency].filter(Boolean))].map(c=>`<option value="${c}" ${c===m.defaultCurrency?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Job Title</label>
        <select id="mm-job-title">
          <option value="">— Select job title —</option>
          ${Object.entries((DB.jobTitles||[]).reduce((acc,jt)=>{ (acc[jt.category]??=[]).push(jt); return acc; },{})).map(([cat,jts])=>`<optgroup label="${cat}">${jts.map(jt=>`<option value="${jt.id}" ${jt.id===(m.jobTitleId||'')?'selected':''}>${jt.name}</option>`).join('')}</optgroup>`).join('')}
        </select>
        <div class="form-hint">Used for rate card billing.</div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="mm-category">
          <option value="">— Select category —</option>
          ${['Admin','Technology','PM/AM','Quality Control'].map(c=>`<option value="${c}" ${c===m.category?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Available Hours / Month</label>
        <input type="number" id="mm-hours" min="1" value="${m.availableHours||160}" placeholder="e.g. 160">
        <div class="form-hint">Full-time ≈ 160h, part-time adjust as needed.</div>
      </div>
    </div>
    ${(DB.rolePermissions?.[currentUser()?.role||'']||[]).includes('manage_rights') ? `
    <div class="form-row">
      <div class="form-group full">
        <label>Team Access</label>
        <select id="mm-role">
          <option value="member" ${(m.role||'member')==='member'?'selected':''}>Member — can log and view their own hours</option>
          <option value="team_manager" ${m.role==='team_manager'?'selected':''}>Team Manager — can manage team and projects</option>
          ${hasRole('admin') ? `<option value="admin" ${m.role==='admin'?'selected':''}>Admin — full access including system settings</option>` : ''}
        </select>
        <div class="form-hint" style="margin-top:4px">Controls what this person can see and do across the platform.</div>
      </div>
    </div>` : ''}
    <div class="form-row">
      <div class="form-group full">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:400">
          <input type="checkbox" id="mm-track-util" ${trackUtil?'checked':''} style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer">
          <span>Include in utilisation calculations</span>
        </label>
        <div class="form-hint" style="margin-top:4px">Exclude from team capacity tracking.</div>
      </div>
    </div>
    <div class="form-row" id="mm-no-target-row" style="${trackUtil?'':'display:none'}">
      <div class="form-group full">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:400">
          <input type="checkbox" id="mm-no-target" ${m.noTargetHours?'checked':''} style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer">
          <span>No target hours</span>
        </label>
        <div class="form-hint" style="margin-top:4px">Any hours logged = 100% utilisation. Use for staff with no set capacity.</div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-ghost" id="mm-cancel">Cancel</button>
      <button class="btn btn-primary" id="mm-save">${isEdit?'Update Member':'Add Member'}</button>
    </div>
  `;

  const overlay = showModal(isEdit?'Edit Team Member':'Add Team Member', body);

  // Photo upload preview
  let pendingPhoto = m.photo || null;
  const preview = overlay.querySelector('#mm-avatar-preview');
  const fileInput = overlay.querySelector('#mm-photo');
  const nameInput = overlay.querySelector('#mm-name');

  // Update initials preview as name changes
  nameInput.addEventListener('input', () => {
    if (!pendingPhoto) {
      const initial = (nameInput.value||'?').charAt(0).toUpperCase();
      preview.innerHTML = `<span>${initial}</span>`;
    }
  });

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    if (!supaCfg()) {
      toast('Connect Supabase first — Settings → Supabase Sync', 'error');
      fileInput.value = '';
      return;
    }
    const saveBtn = overlay.querySelector('#mm-save');
    try {
      const memberId = member?.id || 'new-' + Date.now();
      const ext = file.name.split('.').pop() || 'jpg';
      const path = `avatars/${memberId}.${ext}`;
      const localUrl = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${localUrl}" style="width:100%;height:100%;object-fit:cover">`;
      pendingPhoto = null; // clear until upload completes — prevents blob URL being saved
      if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Uploading…'; }
      const finalUrl = await supaUpload(file, path);
      URL.revokeObjectURL(localUrl); // free blob from memory
      pendingPhoto = finalUrl;
      preview.innerHTML = `<img src="${finalUrl}" style="width:100%;height:100%;object-fit:cover">`;
      toast('Photo uploaded ✓');
    } catch(e) {
      pendingPhoto = null;
      preview.innerHTML = `<span>${(nameInput.value||'?').charAt(0).toUpperCase()}</span>`;
      toast('Photo upload failed: ' + e.message, 'error');
    } finally {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = isEdit ? 'Update Member' : 'Add Member'; }
    }
  });

  overlay.querySelector('#mm-remove-photo')?.addEventListener('click', async () => {
    const oldPhoto = pendingPhoto;
    pendingPhoto = null;
    const initial = (nameInput.value||'?').charAt(0).toUpperCase();
    preview.innerHTML = `<span>${initial}</span>`;
    // Admin: delete from storage. Manager: just clear the reference.
    if (isAdmin() && oldPhoto) {
      const path = supaPathFromUrl(oldPhoto);
      if (path) await supaDelete(path).catch(() => {});
    }
  });

  overlay.querySelector('#mm-cancel').onclick = () => overlay.remove();

  // Show/hide "No target hours" row based on trackUtil checkbox
  const trackUtilCb = overlay.querySelector('#mm-track-util');
  const noTargetRow = overlay.querySelector('#mm-no-target-row');
  trackUtilCb?.addEventListener('change', () => {
    if (noTargetRow) noTargetRow.style.display = trackUtilCb.checked ? '' : 'none';
    if (!trackUtilCb.checked && overlay.querySelector('#mm-no-target')) {
      overlay.querySelector('#mm-no-target').checked = false;
    }
  });
  overlay.querySelector('#mm-save').onclick = () => {
    const name = overlay.querySelector('#mm-name').value.trim();
    const email = overlay.querySelector('#mm-email').value.trim();
    const defaultRate = parseFloat(overlay.querySelector('#mm-rate').value);
    const defaultCurrency = overlay.querySelector('#mm-currency').value;
    const availableHours = parseFloat(overlay.querySelector('#mm-hours').value);
    const nickname = (overlay.querySelector('#mm-nickname')?.value||'').trim();
    const category = overlay.querySelector('#mm-category').value;
    const jobTitleId = overlay.querySelector('#mm-job-title')?.value || '';
    const trackUtilisation = overlay.querySelector('#mm-track-util').checked;
    const noTargetHours = overlay.querySelector('#mm-no-target')?.checked || false;
    const roleVal = overlay.querySelector('#mm-role')?.value;
    if (!name||!email) { toast('We need a name and email — how else do we know who\'s who? 👋', 'error'); return; }
    if (isNaN(defaultRate)||defaultRate<0) { toast('Rate must be 0 or above 💸', 'error'); return; }
    if (isNaN(availableHours)||availableHours<=0) { toast('Zero hours? Even robots need a lunch break 🤖 — set at least 1!', 'error'); return; }

    // Check for archived member with same name or email (new members only)
    if (!isEdit) {
      const nameLower = name.toLowerCase();
      const emailLower = email.toLowerCase();
      const archivedMatch = DB.teamMembers.find(m =>
        m.archived && (m.name.toLowerCase() === nameLower || (m.email && m.email.toLowerCase() === emailLower))
      );
      if (archivedMatch) {
        const matchType = archivedMatch.email?.toLowerCase() === emailLower ? 'email' : 'name';
        confirmModal(
          'Archived Member Found',
          `<strong>${archivedMatch.name}</strong> is already in the system as an archived member (matched by ${matchType}).<br><br>
          Would you like to restore them instead? This keeps all their historical data intact.`,
          'Restore Existing Member',
          () => {
            archivedMatch.archived = false;
            // Update with any new details entered
            Object.assign(archivedMatch, { name, email, nickname, defaultRate, defaultCurrency, availableHours, category, trackUtilisation, noTargetHours });
            if (roleVal) archivedMatch.role = roleVal;
            if (pendingPhoto) archivedMatch.photo = pendingPhoto;
            saveDB(); overlay.remove(); renderView();
            toast(`${archivedMatch.name} restored and updated — welcome back! 🎉`);
          },
          false // not destructive — use accent colour
        );
        return;
      }
    }
    // Last-admin guard: don't allow removing the last admin
    if (roleVal && isEdit && member.role === 'admin' && roleVal !== 'admin') {
      const otherAdmins = DB.teamMembers.filter(tm => tm.role === 'admin' && tm.id !== member.id && !tm.archived);
      if (otherAdmins.length === 0) { toast('You need at least one admin — promote someone else first 👑', 'error'); return; }
    }
    const bankAccount = member?.bankAccount || {};
    const data = { name, email, nickname, defaultRate, defaultCurrency, availableHours, category, jobTitleId, trackUtilisation, noTargetHours, photo: pendingPhoto || null, bankAccount };
    if (roleVal) data.role = roleVal;
    if (isEdit) Object.assign(getMember(member.id), data);
    else DB.teamMembers.push({ id: genId('tm'), role: roleVal || 'member', ...data });
    saveDB(); overlay.remove(); renderView(); toast(isEdit?'Profile updated — fresh look! ✨':'New team member added — say hello! 👋');
  };
}

            <span class="micro-11">—</span>
          </div>
        </div>

  if (settingsPage === 'ratecards') {
    const s = DB.settings;
    const jts = DB.jobTitles || [];
    const rc = s.rateCard || {};
    const curr = s.defaultCurrency || 'USD';
    const clientRows = DB.clients.map(c => {
      const isCustom = c.billingModel === 'rate_card';

    return `
      <div class="card mb-16">

              <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Category</th>
              <th style="padding:10px 16px;text-align:right;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);border-bottom:1px solid var(--border)">Rate / hr</th>
            </tr></thead>

              ${jts.map((jt,i) => `<tr style="${i<jts.length-1?'border-bottom:1px solid var(--border)':''}">

                <td style="padding:10px 16px;font-size:14px;color:var(--text-2)">${jt.category}</td>
                <td style="padding:8px 16px;text-align:right">
                  <input type="number" class="rc-company-input" data-jt="${jt.id}" value="${rc[jt.id]||''}" min="0" step="5" placeholder="—"
                    style="width:90px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);text-align:right;font-family:var(--font);font-size:13px;background:var(--card)">

            </table></div>`}
      </div>`;

  if (settingsPage === 'jobtitles') {
    const byCategory = (DB.jobTitles||[]).reduce((acc, jt) => {
      (acc[jt.category] ??= []).push(jt);
      return acc;

    const cats = Object.keys(byCategory).sort();
    return `
      <div class="card mb-16">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <div>
            <div class="card-title" style="margin-bottom:2px">Job Titles</div>
            <div style="font-size:13px;color:var(--text-2)">Assign job titles to team members. Titles determine billing rates when a client uses a rate card.</div>
          </div>
          <button class="btn btn-primary btn-sm" id="add-jt-btn">+ Add Job Title</button>

        ${cats.length === 0 ? `<div class="empty-state"><p>No job titles yet.</p></div>` : cats.map(cat => `
          <div style="margin-bottom:20px">

            <div style="display:flex;flex-direction:column;gap:4px">
              ${byCategory[cat].map(jt => {
                const usedBy = (DB.teamMembers||[]).filter(m => m.jobTitleId === jt.id).length;
                return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)">
                  <span style="flex:1;font-weight:600;font-size:13px">${jt.name}</span>
                  <span class="micro-12">${usedBy} member${usedBy!==1?'s':''}</span>
                  <button class="btn btn-ghost btn-sm edit-jt-btn" data-id="${jt.id}">Edit</button>
                  <button class="btn btn-ghost btn-sm del-jt-btn" data-id="${jt.id}" style="color:${usedBy>0?'var(--text-3)':'var(--danger)'}" ${usedBy>0?'disabled title="In use by team members"':''}>Delete</button>
                </div>`;
              }).join('')}
            </div>
          </div>`).join('')}
      </div>
    `;
  }

  if (settingsPage === 'testusers') {
    const roleLabel = { admin: 'Admin', team_manager: 'Team Manager', member: 'Member' };
    const roleColor = { admin: 'var(--accent)', team_manager: 'var(--info, #3b82f6)', member: 'var(--text-3)' };
    return `
      <div class="card mb-16">
        <div class="card-title" style="margin-bottom:4px">Test Users</div>
        <div style="font-size:13px;color:var(--text-2);margin-bottom:20px;line-height:1.5">

          Test users always have access to Settings regardless of role permissions.
        </div>
        <div id="test-users-list" style="display:flex;flex-direction:column;gap:2px"></div>
        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
          <button class="btn btn-ghost btn-sm" id="add-test-user-btn">+ Add Test User</button>
        </div>
      </div>
    `;
  }

  if (settingsPage === 'overtime') {
    const m = DB.settings.otMultipliers || { weekday: 1.5, weekend: 2, holiday: 3 };
    const nh = DB.settings.nationalHolidays || {};

    // Read entities from PAY (payroll-v1) if available
    const COUNTRY_MAP = {
      singapore:'SG', sg:'SG', vietnam:'VN', vn:'VN',
      philippines:'PH', ph:'PH', malaysia:'MY', my:'MY',
      indonesia:'ID', id2:'ID', thailand:'TH', th:'TH',
      australia:'AU', au:'AU', 'united states':'US', usa:'US', us:'US',
      'united kingdom':'GB', uk:'GB', gb:'GB', india:'IN', in2:'IN',
      japan:'JP', jp:'JP', china:'CN', cn:'CN', korea:'KR', kr:'KR',
      germany:'DE', france:'FR', netherlands:'NL', spain:'ES', italy:'IT',
    };
    const COUNTRY_NAMES = { SG:'Singapore', VN:'Vietnam', PH:'Philippines', MY:'Malaysia', ID:'Indonesia',
      TH:'Thailand', AU:'Australia', US:'United States', GB:'United Kingdom', IN:'India',
      JP:'Japan', CN:'China', KR:'South Korea', DE:'Germany', FR:'France', NL:'Netherlands',
      ES:'Spain', IT:'Italy', _:'Uncategorised' };
    function inferCountry(entityName) {
      const lower = entityName.toLowerCase();
      for (const [key, code] of Object.entries(COUNTRY_MAP)) {
        if (lower.includes(key)) return code;
      }
      return null;
    }

    let payEntities = [];
    try {
      const payData = JSON.parse(localStorage.getItem('payroll-v1') || '{}');
      payEntities = payData.entities || [];
    } catch(_) {}

    // Build list of active country codes — from entities + any already configured
    const activeCountries = new Set(Object.keys(nh));
    payEntities.forEach(e => { const c = inferCountry(e.name); if (c) activeCountries.add(c); });

    const currentYear = new Date().getFullYear();

    const calKey = localStorage.getItem('mis-calendarific-key');
    function renderCountrySection(code) {
      const dates = (nh[code] || []).sort();
      const countryName = COUNTRY_NAMES[code] || code;
      const entityForCode = payEntities.find(e => inferCountry(e.name) === code);
      return `<div class="card mb-16" data-country="${code}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:14px;font-weight:700">${countryName}</div>
            ${entityForCode ? `<div class="micro-12">Entity: ${entityForCode.name}</div>` : ''}
          </div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <select class="ot-import-year" data-country="${code}" style="font-size:14px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:var(--font)">
              <option value="${currentYear}">${currentYear}</option>
              <option value="${currentYear+1}">${currentYear+1}</option>
              <option value="${currentYear-1}">${currentYear-1}</option>
            </select>
            <button class="btn btn-ghost btn-sm ot-fetch-btn" data-country="${code}" style="font-size:14px">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Import ${currentYear} holidays
            </button>
            <button class="btn btn-ghost btn-sm ot-add-single" data-country="${code}" style="font-size:14px">+ Add date</button>
            <button class="btn btn-ghost btn-sm ot-remove-country" data-country="${code}" style="font-size:14px;color:var(--danger)">Remove</button>
          </div>
        </div>
        <div class="ot-fetch-status" data-country="${code}" style="font-size:14px;margin-bottom:8px"></div>
        ${dates.length === 0
          ? `<div style="font-size:13px;color:var(--text-3);padding:8px 0">No holidays added yet. Import a year or add individually.</div>`
          : `<div style="display:flex;flex-wrap:wrap;gap:6px">${dates.map(d => {
              const dt = new Date(d + 'T00:00:00');
              const label = dt.toLocaleDateString('en-US', { weekday:'short', day:'numeric', month:'short' });
              return `<div style="display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 9px;font-size:14px">
                <span style="font-weight:600">${label}</span>
                <button class="del-holiday-btn" data-country="${code}" data-date="${d}" style="background:none;border:none;cursor:pointer;color:var(--text-3);font-size:13px;padding:0 1px;line-height:1">×</button>
              </div>`;
            }).join('')}</div>`}
      </div>`;
    }

    const countrySections = [...activeCountries].map(renderCountrySection).join('');

    // Dropdown of all supported countries to add
    const allCodes = Object.entries(COUNTRY_NAMES).filter(([k]) => k !== '_').map(([k,v]) => `<option value="${k}">${v} (${k})</option>`).join('');

    return `
      <div class="card mb-16">
        <div class="card-title" style="margin-bottom:4px">Overtime Multipliers</div>
        <div style="font-size:13px;color:var(--text-2);margin-bottom:16px">Applied to hours when the OT checkbox is ticked on a time entry.</div>
        <div class="form-row">
          <div class="form-group"><label>Weekday rate</label><input type="number" id="ot-weekday" value="${m.weekday}" min="1" step="0.25"><div class="form-hint">Mon – Fri</div></div>
          <div class="form-group"><label>Weekend rate</label><input type="number" id="ot-weekend" value="${m.weekend}" min="1" step="0.25"><div class="form-hint">Sat &amp; Sun</div></div>
          <div class="form-group"><label>Holiday rate</label><input type="number" id="ot-holiday" value="${m.holiday}" min="1" step="0.25"><div class="form-hint">Dates below</div></div>
        </div>
        <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary btn-sm" id="ot-mult-save">Save Rates</button></div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:16px;font-weight:700;color:var(--text)">National Holidays</div>
          <div style="font-size:13px;color:var(--text-2);margin-top:2px">Organised by country — triggers the ×${m.holiday} OT rate.</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="ot-add-country-sel" style="font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:var(--font)">
            <option value="">Add country…</option>
            ${allCodes}
          </select>
          <button class="btn btn-primary btn-sm" id="ot-add-country-btn">Add</button>
        </div>
      </div>

      ${activeCountries.size === 0
        ? `<div class="card"><div style="text-align:center;padding:24px;color:var(--text-3);font-size:13px">No countries configured yet.<br>Your entities (${payEntities.map(e=>e.name).join(', ')||'none found in PAY'}) will be auto-detected when you add a country.</div></div>`
        : countrySections}`;
  }

  if (settingsPage === 'ai') {
    const savedKey = localStorage.getItem('mis-anthropic-key') || '';
    const calKey = localStorage.getItem('mis-calendarific-key') || '';
    return `
      <div class="card mb-16">
        <div class="card-title" style="margin-bottom:4px">Anthropic API Key</div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:16px">
          Required for AI-powered features like <strong>Import from SOW</strong>. Your key is stored only in this browser.
          Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--accent)">console.anthropic.com</a>.
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <div class="form-group" style="flex:1;margin:0">
            <label>API Key</label>
            <input type="password" id="ai-api-key" value="${savedKey}" placeholder="sk-ant-..." autocomplete="off"
              style="font-family:monospace;font-size:13px;letter-spacing:.5px">
          </div>
          <button class="btn btn-primary btn-sm" id="ai-key-save" style="flex-shrink:0;margin-bottom:1px">Save</button>
          ${savedKey ? `<button class="btn btn-ghost btn-sm" id="ai-key-clear" style="flex-shrink:0;margin-bottom:1px;color:var(--danger)">Remove</button>` : ''}
        </div>
        <div id="ai-key-status" style="margin-top:8px;font-size:13px"></div>
      </div>
      <div class="card mb-16">
        <div class="card-title" style="margin-bottom:4px">Calendarific API Key</div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:16px">
          Required for accurate holiday data in <strong>Settings → Overtime</strong>, including Vietnam Tết, Singapore public holidays, and 230+ countries.
          Free tier: 1,000 requests/month. Get one at <a href="https://calendarific.com" target="_blank" style="color:var(--accent)">calendarific.com</a>.
        </div>
        <div style="display:flex;gap:8px;align-items:flex-end">
          <div class="form-group" style="flex:1;margin:0">
            <label>API Key</label>
            <input type="password" id="cal-api-key" value="${calKey}" placeholder="cal_api_..." autocomplete="off"
              style="font-family:monospace;font-size:13px;letter-spacing:.5px">
          </div>
          <button class="btn btn-primary btn-sm" id="cal-key-save" style="flex-shrink:0;margin-bottom:1px">Save</button>
          ${calKey ? `<button class="btn btn-ghost btn-sm" id="cal-key-clear" style="flex-shrink:0;margin-bottom:1px;color:var(--danger)">Remove</button>` : ''}
        </div>
        <div id="cal-key-status" style="margin-top:8px;font-size:13px"></div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:8px">AI Features</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg);border-radius:var(--radius-sm)">
            <span style="font-size:20px">📄</span>
            <div>
              <div style="font-weight:600;font-size:14px">Import from SOW</div>
              <div style="font-size:14px;color:var(--text-2);margin-top:2px">Upload a PDF service agreement when adding a project — auto-fills name, client, currency, billing type and fee.</div>
            </div>
            <span class="badge ${savedKey ? 'badge-green' : 'badge-gray'}" style="flex-shrink:0;margin-left:auto">${savedKey ? 'Active' : 'Needs API key'}</span>
          </div>
        </div>
      </div>`;
  }

  if (settingsPage === 'supabase') {
    const sb = supaCfg() || {};
    const isConfigured = !!supaCfg();
    return `
      <div class="card mb-16">
        <div class="card-title" style="margin-bottom:4px">Supabase Sync</div>
        <div style="font-size:13px;color:var(--text-2);margin-bottom:20px;line-height:1.6">
          Connect TRACKR to a Supabase project for shared data across your team. All changes sync automatically.
          ${isConfigured
            ? '<span style="color:var(--accent);font-weight:700">● Connected</span>'
            : '<span style="color:var(--text-3)">○ Not connected</span>'}
        </div>

        <div class="form-group" style="margin-bottom:16px">
          <label>Project URL</label>
          <input type="text" id="supa-url" value="${sb.url||''}" placeholder="https://xxxxxxxxxxxx.supabase.co">
          <div class="form-hint">Found in Supabase Dashboard → Settings → API</div>
        </div>
        <div class="form-group" style="margin-bottom:16px">
          <label>Anon / Public Key</label>
          <input type="password" id="supa-key" value="${sb.anonKey||''}" placeholder="eyJhbGci...">
          <div class="form-hint">Use the anon/public key — not the service role key.</div>
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label>Workspace ID</label>
          <input type="text" id="supa-workspace" value="${sb.workspaceId||'default'}" placeholder="default">
          <div class="form-hint">Unique identifier for this workspace. Use different IDs to share one Supabase project across multiple workspaces.</div>
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" id="supa-save-btn">Save & Test Connection</button>
          ${isConfigured ? '<button class="btn btn-ghost btn-sm" id="supa-push-btn">Push Local → Supabase</button>' : ''}
          ${isConfigured ? '<button class="btn btn-ghost btn-sm" id="supa-pull-btn">Pull Supabase → Local</button>' : ''}
          ${isConfigured ? '<button class="btn btn-ghost btn-sm" id="supa-clear-btn" style="color:var(--danger)">Disconnect</button>' : ''}
        </div>
        <div id="supa-status" style="margin-top:14px;font-size:13px"></div>
      </div>

      <div class="card">
        <div class="card-title" style="margin-bottom:4px">Setup Instructions</div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.8">
          <strong>1.</strong> Create a free project at <a href="https://supabase.com" target="_blank" style="color:var(--accent)">supabase.com</a><br>
          <strong>2.</strong> Run this SQL in the Supabase SQL editor:<br>
          <code style="display:block;background:var(--bg);padding:10px 12px;border-radius:var(--radius-sm);font-size:14px;margin:8px 0;white-space:pre-wrap;font-family:monospace">create table if not exists mis_workspaces (
  id text primary key,
  data jsonb not null,
  updated_at timestamptz default now()
);
-- Allow anon read/write (or use RLS for more security)
alter table mis_workspaces enable row level security;
create policy "anon_all" on mis_workspaces for all using (true) with check (true);</code>
          <strong>3.</strong> Paste the Project URL and anon key above and hit Save.<br><br>
          <strong>For file storage (photos, logos):</strong><br>
          <strong>4.</strong> Go to Supabase Dashboard → Storage → Create bucket<br>
          <strong>5.</strong> Name it <code style="background:var(--bg);padding:1px 5px;border-radius:3px;font-family:monospace">mis-files</code>, set to <strong>Public</strong><br>
          <strong>6.</strong> Under bucket policies, add an INSERT policy for <code style="background:var(--bg);padding:1px 5px;border-radius:3px;font-family:monospace">anon</code> role (or use the SQL below):<br>
          <code style="display:block;background:var(--bg);padding:10px 12px;border-radius:var(--radius-sm);font-size:14px;margin:8px 0;white-space:pre-wrap;font-family:monospace">create policy "anon_upload" on storage.objects
  for insert to anon with check (bucket_id = 'mis-files');
create policy "anon_read" on storage.objects
  for select to anon using (bucket_id = 'mis-files');
create policy "anon_delete" on storage.objects
  for delete to anon using (bucket_id = 'mis-files');</code>
        </div>
      </div>
    `;
  }

  if (settingsPage === 'import') return `
    <div class="card mb-16">
      <div class="card-title" style="margin-bottom:4px">Invoice Import</div>
      <div style="font-size:13px;color:var(--text-2);margin-bottom:20px">Controls what data is imported when syncing invoices from your Google Sheet.</div>
      <div class="form-group" style="max-width:320px">
        <label>Xero Sync From Date</label>
        <input type="date" id="s-xero-sync-from" value="${s.xeroSyncFrom||''}" placeholder="e.g. 2024-03-01">
        <div class="form-hint">Invoices with a payment date before this date cannot be matched to Xero — they will be imported as unpaid. Leave blank to attempt matching on all imported invoices.</div>
      </div>
      <button class="btn btn-primary" id="s-import-save" style="margin-top:16px">Save</button>
    </div>
  `;

  if (settingsPage === 'data') return `
    <div class="card mb-16">
      <div class="card-title">Export All Data</div>

      <div class="form-group" style="margin-bottom:16px">

      <input type="file" id="import-file" accept=".json" style="display:none">

    <div class="card mb-16">

      <div style="font-size:13px;color:var(--text-2);margin:10px 0;line-height:1.6">
        Import legacy timesheet data from a Google Sheet. Maps sheet values to existing clients, projects,
        and team members with a step-by-step review process before creating entries.

      <button class="btn btn-primary" id="gsheets-import-btn">Import Time Sheets</button>

    <div class="card mb-16">

      <div style="font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:14px">
        Import from a Google Sheet (<strong>"Anyone with the link can view"</strong> sharing) or a CSV file.<br>
        Columns: <code class="code-pill">Name</code> <code class="code-pill">Email</code> <code class="code-pill">Nickname</code> <code class="code-pill">Rate</code> <code class="code-pill">Currency</code> <code class="code-pill">Hours</code> <code class="code-pill">Category</code> <code class="code-pill">Role</code>

    <div class="card mb-16">
