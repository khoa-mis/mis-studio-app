// Write startDate/closedDate back to the linked Grow deal in csm-v1 (if any)
function syncProjDatesToGrowDeal(projId, startDate, closedDate) {
  try {
    const raw = localStorage.getItem('csm-v1');
    if (!raw) return;
    const csm = JSON.parse(raw);
    if (!Array.isArray(csm.deals)) return;
    const idx = csm.deals.findIndex(d => d.csmProjectId === projId);
    if (idx < 0) return;
    csm.deals[idx].startDate = startDate || null;
    csm.deals[idx].endDate   = closedDate || null;
    localStorage.setItem('csm-v1', JSON.stringify(csm));
  } catch(_) {}
}

function renderProjections(el, acts) {
  const today        = new Date(); today.setHours(0,0,0,0);
  const currentMonth = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  const dc           = DB.settings?.defaultCurrency || 'USD';
  const apiKey       = localStorage.getItem('mis-anthropic-key') || '';

  // ── Helpers ──────────────────────────────────────────────────
  function addMonths(ym, n) {
    const [y,m] = ym.split('-').map(Number);
    const d = new Date(y, m-1+n, 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
  function monthsBetween(a, b) {
    const [ay,am] = a.split('-').map(Number);
    const [by,bm] = b.split('-').map(Number);
    return (by-ay)*12 + (bm-am) + 1;
  }
  function isMonthPast(ym)    { return ym <  currentMonth; }
  function isMonthCurrent(ym) { return ym === currentMonth; }
  function projCurr(proj) {
    return proj.currency || getClient(proj.clientId)?.currency || dc;
  }
  const fmtM = m => {
    const [y, mo] = m.split('-').map(Number);
    return new Date(y, mo-1, 1).toLocaleDateString('en-GB', { month: 'short', year: '2-digit' });
  };

  // 7-month window shifted by _projOffset (steps of ±3 months)
  const months = [];
  for (let i = -1; i < 6; i++) months.push(addMonths(currentMonth, i + _projOffset));
  const lastMonth = months[months.length - 1];

  // ── Navigation buttons ────────────────────────────────────────
  const navWrap = document.createElement('div');
  navWrap.style.cssText = 'display:flex;align-items:center;gap:6px';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'btn btn-ghost btn-sm';
  prevBtn.innerHTML = '← 3mo';
  prevBtn.addEventListener('click', () => { _projOffset -= 3; renderView(); });

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-ghost btn-sm';
  nextBtn.disabled = _projOffset >= 0;
  nextBtn.style.cssText = _projOffset >= 0 ? 'opacity:.35;pointer-events:none' : '';
  nextBtn.innerHTML = '3mo →';
  nextBtn.addEventListener('click', () => { _projOffset = Math.min(0, _projOffset + 3); renderView(); });

  if (_projOffset < 0) {
    const todayBtn = document.createElement('button');
    todayBtn.className = 'btn btn-ghost btn-sm';
    todayBtn.textContent = 'Today';
    todayBtn.style.cssText = 'font-size:11px';
    todayBtn.addEventListener('click', () => { _projOffset = 0; renderView(); });
    navWrap.appendChild(todayBtn);
  }
  navWrap.appendChild(prevBtn);
  navWrap.appendChild(nextBtn);
  acts.appendChild(navWrap);

  // ── Currency conversion ───────────────────────────────────────
  function toDefaultCurrency(amount, fromCurr) {
    if (!amount) return { value: 0, ok: true };
    if (fromCurr === dc) return { value: amount, ok: true };
    const converted = FX.convertSync(amount, fromCurr, dc);
    if (converted !== null) return { value: Math.round(converted), ok: true };
    return { value: amount, ok: false, origCurr: fromCurr };
  }

  // ── Read Xero historical actuals from PAY cache ───────────────
  function getXeroActualsByMonth() {
    try {
      const cache = JSON.parse(localStorage.getItem('mis-xero-invoices') || 'null');
      if (!cache || !Array.isArray(cache.data)) return {};
      const byMonth = {};
      const parseXeroDate = d => {
        if (!d) return null;
        const mm = String(d).match(/\/Date\((\d+)/);
        const dt = mm ? new Date(parseInt(mm[1])) : new Date(String(d));
        if (isNaN(dt)) return null;
        return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
      };
      cache.data.forEach(tx => {
        const monthStr = parseXeroDate(tx.Date);
        if (!monthStr) return;
        const txCurr = tx.CurrencyCode || dc;
        const res = toDefaultCurrency(tx.Total || 0, txCurr);
        byMonth[monthStr] = (byMonth[monthStr] || 0) + (res.ok ? res.value : 0);
      });
      return byMonth;
    } catch(_) { return {}; }
  }

  // Imported invoices grouped by invoiceDate month → actual billed amounts
  function getInvoicedByMonth() {
    const byMonth = {};
    (DB.invoices || []).forEach(inv => {
      if (!inv.invoiceDate) return;
      const month = inv.invoiceDate.slice(0,7);
      const res   = toDefaultCurrency(inv.amount || 0, inv.currency || dc);
      if (res.ok) byMonth[month] = (byMonth[month] || 0) + res.value;
    });
    return byMonth;
  }

  // ── Payment behaviour model ───────────────────────────────────
  // Analyse matched invoices to build per-client (and global fallback) payment profiles.
  // Returns:
  //   clientProfiles: { [clientId]: { avgDaysFromDue, avgDaysFromInvoice, stdDev, count, samples } }
  //   global: { avgDaysFromDue, avgDaysFromInvoice, stdDev, count }
  function buildPaymentProfiles() {
    const byClient = {};
    const todayDate = new Date();
    todayDate.setHours(0,0,0,0);
    const todayStr = `${todayDate.getFullYear()}-${String(todayDate.getMonth()+1).padStart(2,'0')}-${String(todayDate.getDate()).padStart(2,'0')}`;

    // Only use invoices paid in the last 12 months for the behaviour model
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - 12);
    const cutoffStr = cutoff.toISOString().slice(0,10);

    (DB.invoices || []).forEach(inv => {
      if (!inv.clientId) return;

      if (inv.paymentDate && inv.invoiceDate) {
        // ── Paid invoice: use actual payment date ──────────────
        if (inv.paymentDate < cutoffStr) return;
        const paid   = new Date(inv.paymentDate + 'T00:00:00');
        const issued = new Date(inv.invoiceDate + 'T00:00:00');
        if (isNaN(paid) || isNaN(issued)) return;
        const daysFromInvoice = Math.round((paid - issued) / 86400000);
        if (daysFromInvoice < 0 || daysFromInvoice > 365) return;

        let daysFromDue = null;
        if (inv.dueDate) {
          const due = new Date(inv.dueDate + 'T00:00:00');
          if (!isNaN(due)) {
            daysFromDue = Math.round((paid - due) / 86400000);
            if (daysFromDue < -30 || daysFromDue > 365) daysFromDue = null;
          }
        }
        if (!byClient[inv.clientId]) byClient[inv.clientId] = [];
        byClient[inv.clientId].push({ daysFromDue, daysFromInvoice, amount: inv.amount || 0, inv, isOverdue: false });

      } else if (!inv.paymentDate && inv.status !== 'paid' && inv.status !== 'bad_debt' && inv.dueDate && inv.dueDate < todayStr) {
        // ── Currently overdue: days-so-far is a minimum observation ──
        // Use today as a floor — the actual payment will be at least this late
        const due     = new Date(inv.dueDate + 'T00:00:00');
        const issued  = inv.invoiceDate ? new Date(inv.invoiceDate + 'T00:00:00') : null;
        if (isNaN(due)) return;
        const daysFromDue = Math.round((todayDate - due) / 86400000);
        if (daysFromDue <= 0 || daysFromDue > 365) return;
        const daysFromInvoice = issued && !isNaN(issued) ? Math.round((todayDate - issued) / 86400000) : null;
        if (!byClient[inv.clientId]) byClient[inv.clientId] = [];
        byClient[inv.clientId].push({ daysFromDue, daysFromInvoice: daysFromInvoice || 0, amount: inv.amount || 0, inv, isOverdue: true });
      }
    });

    const calcStats = (samples) => {
      // Remove statistical outliers using IQR before computing averages
      const removeOutliers = arr => {
        if (arr.length < 4) return arr;
        const sorted = [...arr].sort((a,b) => a-b);
        const q1 = sorted[Math.floor(sorted.length * 0.25)];
        const q3 = sorted[Math.floor(sorted.length * 0.75)];
        const iqr = q3 - q1;
        return arr.filter(v => v >= q1 - 1.5 * iqr && v <= q3 + 1.5 * iqr);
      };

      const dueSamples = removeOutliers(samples.filter(s => s.daysFromDue !== null).map(s => s.daysFromDue));
      const invSamples = removeOutliers(samples.map(s => s.daysFromInvoice));
      const mean   = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
      const stddev = arr => {
        if (arr.length < 2) return null;
        const m = mean(arr);
        return Math.sqrt(arr.reduce((s,v) => s + (v-m)**2, 0) / arr.length);
      };
      const confidence = samples.length >= 5 ? 'high' : samples.length >= 2 ? 'medium' : 'low';
      return {
        avgDaysFromDue:     mean(dueSamples),
        avgDaysFromInvoice: mean(invSamples),
        stdDev:             stddev(dueSamples.length >= 2 ? dueSamples : invSamples),
        count:              samples.length,
        confidence,
        samples,
      };
    };

    const clientProfiles = {};
    Object.entries(byClient).forEach(([cid, samples]) => {
      clientProfiles[cid] = calcStats(samples);
    });

    // Global fallback — all matched invoices pooled
    const allSamples = Object.values(byClient).flat();
    const global = calcStats(allSamples);

    return { clientProfiles, global };
  }

  // Predict payment month for an outstanding invoice based on payment profiles
  // Returns: { predictedDate, predictedMonth, daysOffset, confidence, clientAvg, globalAvg }
  function predictPaymentDate(inv, profiles) {
    const { clientProfiles, global } = profiles;
    const profile = inv.clientId ? clientProfiles[inv.clientId] : null;

    // Determine reference date: prefer dueDate, fall back to invoiceDate
    const refDateStr = inv.dueDate || inv.invoiceDate;
    const refDate    = refDateStr ? new Date(refDateStr + 'T00:00:00') : null;
    if (!refDate || isNaN(refDate)) return null;

    let daysOffset = null;
    let confidence = 'low';
    let source = 'global';

    if (profile && profile.count >= 2) {
      const offset = inv.dueDate
        ? (profile.avgDaysFromDue  ?? profile.avgDaysFromInvoice ?? global.avgDaysFromDue ?? global.avgDaysFromInvoice ?? 0)
        : (profile.avgDaysFromInvoice ?? global.avgDaysFromInvoice ?? 0);
      daysOffset = Math.round(offset || 0);
      confidence = profile.confidence;
      source = 'client';
    } else if (global.count >= 2) {
      const offset = inv.dueDate
        ? (global.avgDaysFromDue  ?? global.avgDaysFromInvoice ?? 0)
        : (global.avgDaysFromInvoice ?? 0);
      daysOffset = Math.round(offset || 0);
      confidence = global.count >= 5 ? 'medium' : 'low';
      source = 'global';
    } else {
      // No payment history at all — use sensible net terms as fallback:
      // If due date exists: expect payment on due date (+0 days)
      // If no due date: assume 30-day net terms from invoice date
      daysOffset = inv.dueDate ? 0 : 30;
      confidence = 'low';
      source = 'default';
    }

    const predicted = new Date(refDate);
    predicted.setDate(predicted.getDate() + daysOffset);

    // Use local date components to avoid UTC timezone shift
    const py = predicted.getFullYear();
    const pm = String(predicted.getMonth() + 1).padStart(2,'0');
    const pd = String(predicted.getDate()).padStart(2,'0');
    const predictedMonth = `${py}-${pm}`;

    return {
      predictedDate:  `${py}-${pm}-${pd}`,
      predictedMonth,
      daysOffset,
      confidence,
      source,
      profileCount: profile?.count || global.count || 0,
    };
  }

  // Build predicted payment schedule from outstanding invoices
  // Returns: { byMonth: {YYYY-MM: {total, invoices[], confidence}}, profiles }
  function getPredictedCollectionSchedule() {
    const today2    = new Date().toISOString().slice(0,10);
    const todayM    = today2.slice(0,7); // current month YYYY-MM
    const nextMonth = addMonths(todayM, 1);
    const profiles  = buildPaymentProfiles();
    const byMonth   = {};

    (DB.invoices || []).forEach(inv => {
      if (inv.paymentDate || inv.status === 'paid' || inv.badDebt || inv.status === 'bad_debt') return;
      // Only exclude invoices sent in FUTURE months — invoices sent this month are
      // handled at render time by alreadySentInvIds, and should appear in future months'
      // expected payments if still unpaid (e.g. April invoice due in May)
      if (inv.invoiceDate && inv.invoiceDate.slice(0,7) > todayM) return;
      const prediction = predictPaymentDate(inv, profiles);
      if (!prediction) return;

      // If prediction falls in a past month, push to current month —
      // these are overdue invoices we're still chasing
      const month = prediction.predictedMonth < todayM ? todayM : prediction.predictedMonth;

      if (!byMonth[month]) byMonth[month] = { total: 0, invoices: [], confidence: prediction.confidence };
      const res = toDefaultCurrency(inv.amount || 0, inv.currency || dc);
      if (!res.ok) return;
      byMonth[month].total += res.value;
      byMonth[month].invoices.push({ inv, prediction: { ...prediction, predictedMonth: month }, amount: res.value });
      if (prediction.confidence === 'low' && byMonth[month].confidence !== 'low') byMonth[month].confidence = 'medium';
    });

    return { byMonth, profiles };
  }

  // ── Xero-based accuracy correction factor ────────────────────
  // Compare what we actually invoiced (DB.invoices) or projected against what Xero received.
  // Invoiced amounts are more reliable than project estimates as the reference signal.
  function calcXeroCorrectionFactor(xeroActuals, invoicedByMonth) {
    const historicalMonths = Object.keys(xeroActuals)
      .filter(m => isMonthPast(m) && xeroActuals[m] > 0)
      .sort();
    if (!historicalMonths.length) return { factor: 1.0, dataPoints: 0, trend: null };

    const allProjects = DB.projects || [];
    let totalProjected = 0, totalActual = 0;
    const ratios = [];
    historicalMonths.forEach(month => {
      // Prefer actual invoiced amounts; fall back to project estimates (lagged 1 month)
      const hasInvoiced = invoicedByMonth[month] > 0;
      let projected = 0;
      if (hasInvoiced) {
        // Direct comparison: invoiced in this month vs Xero received this month
        // (some clients pay same month, some lag — use invoiced as reference)
        projected = invoicedByMonth[month];
      } else {
        // Fall back to project-based estimate for the prior month (lag correction)
        const projectionMonth = addMonths(month, -1);
        allProjects.forEach(proj => {
          if (proj.startDate  && proj.startDate.slice(0,7)  > projectionMonth) return;
          if (proj.closedDate && proj.closedDate.slice(0,7) < projectionMonth) return;
          const r = getExpected(proj, projectionMonth);
          if (r && !r.fxWarn) projected += r.amount;
        });
      }
      const actual = xeroActuals[month] || 0;
      if (projected > 0 && actual > 0) {
        totalProjected += projected;
        totalActual    += actual;
        ratios.push(actual / projected);
      }
    });

    if (!ratios.length) return { factor: 1.0, dataPoints: 0, trend: null };

    let weightedSum = 0, weightSum = 0;
    ratios.forEach((r, i) => {
      const w = i + 1;
      weightedSum += r * w;
      weightSum   += w;
    });
    const rawFactor = weightedSum / weightSum;
    const factor = Math.max(0.6, Math.min(1.4, rawFactor));
    const pct    = Math.round((factor - 1) * 100);
    const trend  = pct === 0 ? null : pct > 0 ? `+${pct}%` : `${pct}%`;

    return { factor, dataPoints: ratios.length, trend, totalProjected, totalActual };
  }

  // ── Expected invoice per project per month ────────────────────
  function getExpected(proj, month) {
    if (proj.closedDate && month > proj.closedDate.slice(0,7)) return null;
    if (proj.startDate  && month < proj.startDate.slice(0,7))  return null;
    const curr = projCurr(proj);

    function cvt(raw, note) {
      const res = toDefaultCurrency(raw, curr);
      if (res.ok) return { amount: res.value, note, fxWarn: false };
      return { amount: 0, note: `${note} — ⚠ no FX rate for ${res.origCurr}`, fxWarn: true };
    }

    switch (proj.billingType) {
      case 'retainer': {
        const fee = proj.retainer?.monthlyFee || 0;
        return fee ? cvt(fee, 'Monthly retainer fee') : null;
      }
      case 'variable_retainer': {
        const vr = proj.variableRetainer || {};
        const approval = vr.approvals?.[month];
        if (approval) {
          const amt = approval.feeApproved ||
            ((approval.hoursApproved||0) * (approval.hourlyRate || vr.hourlyRate || 0));
          if (amt) return cvt(amt, `Approved: ${fmtH(approval.hoursApproved||0)} h`);
        }
        if (vr.yearlyBudget) {
          const startM       = proj.startDate  ? proj.startDate.slice(0,7)  : currentMonth;
          const closeM       = proj.closedDate ? proj.closedDate.slice(0,7) : addMonths(startM, 11);
          const activeMonths = Math.max(1, monthsBetween(startM, closeM));
          return cvt(Math.round(vr.yearlyBudget / activeMonths),
            `Budget estimate (${fmt(vr.yearlyBudget,curr)} ÷ ${activeMonths}mo)`);
        }
        return null;
      }
      case 'fixed': {
        const coApproved = (proj.changeOrders||[]).filter(co => co.status !== 'rejected');
        const total = (proj.fixedFee||0) + coApproved.reduce((s,co) => s+(co.value||0), 0);
        if (!total) return null;

        const startM = proj.startDate  ? proj.startDate.slice(0,7)  : null;
        const closeM = proj.closedDate ? proj.closedDate.slice(0,7) : null;

        // Without both dates, fall back to even spread so the project still appears in the forecast
        if (!startM || !closeM) {
          const fallbackStart = startM || currentMonth;
          const fallbackClose = closeM || addMonths(fallbackStart, 11);
          if (month < fallbackStart || month > fallbackClose) return null;
          const totalMonths = Math.max(1, monthsBetween(fallbackStart, fallbackClose));
          return cvt(Math.round(total / totalMonths), `Fixed fee ÷ ${totalMonths} months (set dates for milestone billing)`);
        }

        if (month < startM || month > closeM) return null;

        const ms = proj.fixedMilestones || { deposit: 25, midpoint: 50, midpointTrigger: 70, closeout: 25 };

        // Midpoint month = startM + floor(duration * trigger%)
        // Use (totalMonths - 1) as the span so the offset lands before closeM
        const totalMonths = Math.max(1, monthsBetween(startM, closeM));
        const midOffset   = Math.max(1, Math.min(totalMonths - 2, Math.round((totalMonths - 1) * (ms.midpointTrigger / 100))));
        const midM        = addMonths(startM, midOffset);
        // Collapse overlap: midpoint must sit strictly between start and close
        const showMid = midM !== startM && midM !== closeM;

        const depositAmt  = Math.round(total * ms.deposit / 100);
        const midpointAmt = showMid ? Math.round(total * ms.midpoint / 100) : 0;
        const closeoutAmt = total - depositAmt - midpointAmt; // remainder handles rounding

        if (month === startM)              return depositAmt  > 0 ? cvt(depositAmt,  `Deposit (${ms.deposit}%)`) : null;
        if (showMid && month === midM)     return midpointAmt > 0 ? cvt(midpointAmt, `Progress billing (${ms.midpoint}%) at ${ms.midpointTrigger}% timeline`) : null;
        if (month === closeM)              return closeoutAmt > 0 ? cvt(closeoutAmt, `Closeout (${ms.closeout}%)`) : null;
        return null;
      }
      case 'time_materials': {
        if (isMonthPast(month) || isMonthCurrent(month)) {
          const actual = getMonthBillable(proj.id, month);
          return actual > 0 ? cvt(actual, 'Actual billed (T&M)') : null;
        }
        if (proj.closedDate && month > proj.closedDate.slice(0,7)) return null;
        const pastActuals = [addMonths(month,-1), addMonths(month,-2), addMonths(month,-3)]
          .map(m => getMonthBillable(proj.id, m)).filter(v => v > 0);
        if (!pastActuals.length) return null;
        const avg = Math.round(pastActuals.reduce((s,v)=>s+v,0) / pastActuals.length);
        return avg > 0 ? cvt(avg, '3-month rolling avg (T&M)') : null;
      }
      default: return null;
    }
  }

  // ── Assemble data (re-derived on every renderAll call) ───────
  const xeroActuals      = getXeroActualsByMonth();
  const invoicedByMonth  = getInvoicedByMonth();
  const collectionSched  = getPredictedCollectionSchedule();
  const outstandingByDue = collectionSched.byMonth; // keyed by YYYY-MM, value = {total, invoices[], confidence}
  const paymentProfiles  = collectionSched.profiles;
  const hasInvoiceData   = Object.keys(invoicedByMonth).some(m => months.includes(m));
  const hasXeroData      = Object.keys(xeroActuals).some(m => months.includes(m));
  const payrollByMonth   = getPayrollTotalsByMonth();

  let confirmedProjects, correction, allPipeline, confirmedPipeline, softPipeline,
      monthData, fxWarnings, maxVal, softPipelineWeighted;

  const billingLabel = { retainer:'Retainer', variable_retainer:'Var. Retainer', fixed:'Fixed Fee', time_materials:'T&M' };
  const billingColor = { retainer:'#4A7FC1', variable_retainer:'#2860A0', fixed:'#9650B4', time_materials:'#678F2F' };

  let selectedMonth = months.includes(currentMonth) ? currentMonth : months[Math.floor(months.length / 2)];
  // AI analysis persists in DB (synced to Supabase) so all users see it
  let aiAnalysis = DB.projAiAnalysis?.text || null;
  let aiRunAt    = DB.projAiAnalysis?.runAt || null;
  let aiLoading  = false;
  let aiExpanded = !!aiAnalysis; // open by default if there's a result

  async function runAIAnalysis() {
    if (!apiKey) return;
    aiLoading = true; renderAll();

    const projectSummary = confirmedProjects.slice(0,12).map(p => ({
      name: p.name, client: getClient(p.clientId)?.name||'—',
      billingType: p.billingType, currency: projCurr(p),
      m0: (getExpected(p, months[1])?.amount || 0),
      m1: (getExpected(p, months[2])?.amount || 0),
      m2: (getExpected(p, months[3])?.amount || 0),
    })).filter(p => p.m0 || p.m1 || p.m2);

    const totalNext3 = months.slice(1,4).reduce((s,m) => s + (monthData.find(d=>d.month===m)?.total||0), 0);

    const xeroSummary = Object.entries(xeroActuals)
      .filter(([m]) => months.includes(m))
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([m, v]) => `  ${fmtM(m)}: ${fmt(v, dc)}`).join('\n') || '  None';

    const invoicedSummary = Object.entries(invoicedByMonth)
      .filter(([m]) => months.includes(m))
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([m, v]) => `  ${fmtM(m)}: ${fmt(v, dc)}`).join('\n') || '  None';

    const outstandingSummary = Object.entries(outstandingByDue)
      .filter(([m]) => months.includes(m))
      .sort(([a],[b]) => a.localeCompare(b))
      .map(([m, v]) => `  Predicted ${fmtM(m)}: ${fmt(v.total||v, dc)} (${v.confidence||'—'} confidence, ${v.invoices?.length||0} invoices)`)
      .join('\n') || '  None';

    const totalInvoiced    = Object.values(invoicedByMonth).reduce((s,v)=>s+v,0);
    const totalOutstanding = Object.values(outstandingByDue).reduce((s,v)=>s+(v.total||v||0),0);

    const behaviourSummary = profileEntries.length
      ? profileEntries.map(p => `  ${p.name}: avg ${Math.round(p.avgDays)>=0?'+':''}${Math.round(p.avgDays)}d from due (${p.confidence}, ${p.count} invoices)`).join('\n')
      : '  Insufficient matched invoice data';

    const corrNote = correction.dataPoints > 0
      ? `Accuracy model: ${correction.dataPoints} data point(s) — Xero income in each month is compared against projected invoices from the prior month (Xero shows cash received, which lags invoicing by ~1 month). TRACKR was ${correction.trend||'accurate'} vs projected. Correction factor ${Math.round(correction.factor*100)}% applied to future months.`
      : 'No historical accuracy data yet (Xero not connected or insufficient history).';

    const prompt = `You are a revenue analyst for a professional services agency.

${corrNote}

CONFIRMED + PIPELINE FORECAST (next 3 months, ${dc}, income-adjusted):
${projectSummary.map(p => `- ${p.name} (${p.client}, ${p.billingType}): ${fmt(p.m0,dc)} / ${fmt(p.m1,dc)} / ${fmt(p.m2,dc)}`).join('\n')}
3-month total: ${fmt(totalNext3, dc)}

XERO HISTORICAL INCOME RECEIVED (cash in, lags invoicing by ~1 month):
${xeroSummary}

ACTUAL INVOICED BY MONTH (from imported invoices — what was billed, not yet received):
${invoicedSummary}
Total invoiced in window: ${fmt(totalInvoiced, dc)}

OUTSTANDING INVOICES (predicted payment by month, based on payment behaviour model):
${outstandingSummary}

CLIENT PAYMENT BEHAVIOUR (from matched invoice history):
${behaviourSummary}

HIGH-CONFIDENCE PIPELINE (≥80%, already in forecast):
${confirmedPipeline.map(d => `- ${d.name}: ${fmt(d.value, d.currency)} at ${d.probability}%`).join('\n') || 'None'}

SOFT PIPELINE (50–79%, not in forecast, weighted total: ${fmt(softPipelineWeighted, dc)}):
${softPipeline.map(d => `- ${d.name}: ${fmt(d.value,d.currency)} at ${d.stageName} (${d.probability}%)`).join('\n') || 'None'}

In 3-4 sentences:
1. State the income-adjusted revenue outlook for the next 3 months
2. Note any accuracy patterns (is TRACKR consistently over/under when measured against Xero income?)
3. Flag the most significant risk or opportunity
4. One specific recommendation

Be direct and use the actual numbers.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 400, messages: [{ role: 'user', content: prompt }] }),
      });
      const data = await res.json();
      aiAnalysis = data.content?.[0]?.text || 'Analysis unavailable.';
    } catch(e) {
      aiAnalysis = 'Could not reach AI — check Anthropic API key in Settings.';
    }
    aiRunAt = Date.now();
    DB.projAiAnalysis = { text: aiAnalysis, runAt: aiRunAt };
    saveDB();
    aiExpanded = true;
    aiLoading = false; renderAll();
  }

  function renderAll() {
    confirmedProjects = (DB.projects||[]).filter(p =>
      (!p.closedDate || p.closedDate.slice(0,7) >= months[0]) &&
      (!p.startDate  || p.startDate.slice(0,7)  <= lastMonth)
    );
    correction    = calcXeroCorrectionFactor(xeroActuals, invoicedByMonth);
    allPipeline   = getGrowPipelineDeals();
    confirmedPipeline = allPipeline.filter(d => d.probability >= 80);
    softPipeline  = allPipeline.filter(d => d.probability >= 50 && d.probability < 80);

    // ── Build invoice lookup by projectId + month ─────────────────
    // invByProjMonth: keyed by invoiceDate month (sent this month)
    // paidByProjMonth: keyed by paymentDate month (paid this month — for current month display)
    const invByProjMonth  = {};
    const invByMonth      = {};
    const paidByProjMonth = {}; // key: "projId|YYYY-MM" → [{inv}, ...]
    (DB.invoices || []).forEach(inv => {
      if (!inv.invoiceDate) return;
      const m = inv.invoiceDate.slice(0,7);
      if (inv.projectId) {
        const k = inv.projectId + '|' + m;
        (invByProjMonth[k] = invByProjMonth[k] || []).push(inv);
      } else {
        (invByMonth[m] = invByMonth[m] || []).push(inv);
      }
      // Index by paymentDate month for current-month paid display
      if (inv.paymentDate && inv.projectId) {
        const pm = inv.paymentDate.slice(0,7);
        const pk = inv.projectId + '|' + pm;
        (paidByProjMonth[pk] = paidByProjMonth[pk] || []).push(inv);
      }
    });

    function getPipelineMonthly(deal, month) {
      if (month < currentMonth) return 0;
      const res = toDefaultCurrency(deal.value, deal.currency);
      if (!res.ok) return 0;
      if (deal.billingType === 'retainer' || deal.billingType === 'variable_retainer') {
        const startM = deal.startDate ? deal.startDate.slice(0,7) : currentMonth;
        const endM   = deal.endDate   ? deal.endDate.slice(0,7)   : null;
        if (month < startM) return 0;
        if (endM && month > endM) return 0;
        return res.value;
      }
      const startM      = deal.startDate ? deal.startDate.slice(0,7) : currentMonth;
      const endM        = deal.endDate   ? deal.endDate.slice(0,7)   : addMonths(startM, 11);
      if (month < startM || month > endM) return 0;
      const spreadMonths = Math.max(1, monthsBetween(startM, endM));
      return Math.round(res.value / spreadMonths);
    }

    monthData = months.map(month => {
      let confirmedTotal = 0;
      let pipelineTotal  = 0;
      const isPast = isMonthPast(month);
      const isCur  = isMonthCurrent(month);
      const useActuals = isPast && invoicedByMonth[month] > 0;
      const byProject = [];
      // today as ISO string for safe string comparisons
      const todayISO = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      if (useActuals) {
        // ── Past/current months with actual invoice data ──────────
        // Build rows from actual imported invoices, grouped by project
        const seenProjects = new Set();

        confirmedProjects.forEach(proj => {
          const k = proj.id + '|' + month;
          const invs = invByProjMonth[k] || [];

            const firstInv  = invs.sort((a,b) => (a.invoiceDate||'').localeCompare(b.invoiceDate||''))[0];

            const paidAmt   = paidInvs.reduce((s,i) => { const r = toDefaultCurrency(i.amount||0, i.currency||dc); return s + (r.ok?r.value:0); }, 0);
            confirmedTotal += totalAmt;
            seenProjects.add(proj.id);
            byProject.push({
              projId: proj.id, name: proj.name, client: client?.name||'—',
              amount: totalAmt,
              note: `${invs.length} invoice${invs.length>1?'s':''} — ${invs.map(i=>i.invoiceNumber||'?').join(', ')}`,
              billing: proj.billingType, origCurr: projCurr(proj), fxWarn: false,
              isPipeline: false, startDate: proj.startDate||'', closedDate: proj.closedDate||'',

            byProject.push({

        Object.entries(invByProjMonth).forEach(([k, invs]) => {
          const [projId, m] = k.split('|');

          const proj   = (DB.projects||[]).find(p => p.id === projId);
          const client = proj ? getClient(proj.clientId) : null;
          let totalAmt = 0;
          invs.forEach(inv => { const r = toDefaultCurrency(inv.amount||0, inv.currency||dc); if (r.ok) totalAmt += r.value; });
          const firstInv = invs.sort((a,b) => (a.invoiceDate||'').localeCompare(b.invoiceDate||''))[0];
          const paidAmt  = invs.filter(i => i.paymentDate||i.status==='paid').reduce((s,i) => { const r = toDefaultCurrency(i.amount||0,i.currency||dc); return s+(r.ok?r.value:0); }, 0);
          confirmedTotal += totalAmt;
          seenProjects.add(projId);
          byProject.push({
            projId, name: proj?.name || firstInv.description || 'Unknown project',
            client: client?.name || firstInv.originalClient || '—',

            billing: proj?.billingType || 'fixed', origCurr: dc, fxWarn: false,

      } else {

        // Build a map: projectId → [{inv, prediction, amount}] for invoices predicted to be paid this month
        // Also: clientId → items for invoices whose project isn't set
        const predictedThisMonth = {};     // projectId → items

        (outstandingByDue[month]?.invoices || []).forEach(({ inv, prediction, amount }) => {

            predictedByClient[inv.clientId].push({ inv, prediction, amount });
          }
        });

        // For current month: also include invoices from PRIOR months that were paid this month
        // These go into the prediction section (as "Received") not the top project rows
        const paidPriorThisMonth = []; // {inv, amount} pairs paid this month but sent earlier
        if (isCur) {
          // Compute the last day of prior month — invoices on this date are likely timezone-shifted
          // April 1 stored as March 31 should show in top section, not "Received"
          const [cy, cm] = month.split('-').map(Number);
          const lastDayOfPrior = `${addMonths(month,-1)}-${String(new Date(cy, cm-1, 0).getDate()).padStart(2,'0')}`;

          Object.entries(paidByProjMonth).forEach(([k, invs]) => {
            const [projId, pm] = k.split('|');

              if (!inv.invoiceDate) return;

              // Only include if genuinely a prior-month invoice

                if (r.ok) paidPriorThisMonth.push({ inv, amount: r.value });

            });
          });
        }

        confirmedProjects.forEach(proj => {
          const k    = proj.id + '|' + month;
          // Also catch invoices UTC-shifted to last day of prior month (timezone artifact)
          // e.g. April 1 stored as March 31
          const prevM = addMonths(month, -1);
          const prevMonthBorderInvs = (invByProjMonth[proj.id + '|' + prevM] || []).filter(i => {
            if (!i.invoiceDate) return false;
            const [y, m2] = month.split('-').map(Number);
            const lastDay = String(new Date(y, m2 - 1, 0).getDate()).padStart(2,'0');
            // Catch invoices on the last day of prior month — these are likely April 1 invoices
            // timezone-shifted back to March 31
            return i.invoiceDate === `${prevM}-${lastDay}`;
          });
          const invs = [...(invByProjMonth[k] || []), ...prevMonthBorderInvs].filter(i => i.invoiceDate <= todayISO);
          const client = getClient(proj.clientId);

          if (invs.length > 0) {
            // Invoice already sent this month — use actual amount
            let totalAmt = 0;
            invs.forEach(inv => { const r = toDefaultCurrency(inv.amount||0, inv.currency||dc); if (r.ok) totalAmt += r.value; });
            const firstInv = [...invs].sort((a,b) => (a.invoiceDate||'').localeCompare(b.invoiceDate||''))[0];
            const paidAmt  = invs.filter(i => i.paymentDate||i.status==='paid').reduce((s,i) => { const r = toDefaultCurrency(i.amount||0,i.currency||dc); return s+(r.ok?r.value:0); }, 0);
            confirmedTotal += totalAmt;
            byProject.push({
              projId: proj.id, name: proj.name, client: client?.name||'—',
              amount: totalAmt,
              note: `${invs.length} invoice${invs.length>1?'s':''} — ${invs.map(i=>i.invoiceNumber||'?').join(', ')}`,
              billing: proj.billingType, origCurr: projCurr(proj), fxWarn: false,
              isPipeline: false, startDate: proj.startDate||'', closedDate: proj.closedDate||'',
              _actualInvs: invs, _paidAmt: paidAmt,
              _sentDate: firstInv.invoiceDate, _sentAmt: totalAmt,
            });
          } else {
            // No invoice sent yet — show project estimate
            // Skip if this fixed-fee project is already fully invoiced
            if (proj.billingType === 'fixed') {
              const coApproved = (proj.changeOrders||[]).filter(co => co.status !== 'rejected');
              const projTotal = toDefaultCurrency(
                (proj.fixedFee||0) + coApproved.reduce((s,co) => s+(co.value||0), 0),
                projCurr(proj)
              );
              const projTotalDc = projTotal.ok ? projTotal.value : 0;
              const totalInvoiced = (DB.invoices||[])
                .filter(i => i.projectId === proj.id && i.status !== 'bad_debt')
                .reduce((s,i) => { const r = toDefaultCurrency(i.amount||0, i.currency||dc); return s+(r.ok?r.value:0); }, 0);
              if (projTotalDc > 0 && totalInvoiced >= projTotalDc * 0.98) return; // fully invoiced
            }
            const result = getExpected(proj, month);
            if (result) {
              let amt = result.amount;
              const isVariableBilling = proj.billingType === 'time_materials' || proj.billingType === 'variable_retainer';
              if (isVariableBilling && correction.factor !== 1.0) amt = Math.round(amt * correction.factor);
              confirmedTotal += amt;
              byProject.push({ projId: proj.id, name: proj.name, client: client?.name||'—', amount: amt, note: result.note, billing: proj.billingType, origCurr: projCurr(proj), fxWarn: result.fxWarn, isPipeline: false, startDate: proj.startDate||'', closedDate: proj.closedDate||'' });
            }
          }
        });

        // Add ALL predicted collections as separate prediction rows (for any unpaid prior invoices)
        const addedPredProjIds = new Set();
        const alreadySentInvIds = new Set(
          byProject.filter(r => r._actualInvs).flatMap(r => r._actualInvs.map(i => i.id))
        );
        const addPrediction = (items, projId, projName, clientName) => {
          const filtered = items.filter(p => !alreadySentInvIds.has(p.inv.id));
          if (!filtered.length) return;
          const predTotal = filtered.reduce((s,p) => s + p.amount, 0);
          const bestPred  = filtered[0].prediction;
          const invNums   = filtered.map(p => p.inv.invoiceNumber || '?').join(', ');

          // Calculate days overdue based on actual due date (or invoiceDate + 30 as proxy)
          const effectiveDueDates = filtered.map(p => {
            if (p.inv.dueDate) return p.inv.dueDate;
            if (p.inv.invoiceDate) {
              const d = new Date(p.inv.invoiceDate + 'T00:00:00');
              d.setDate(d.getDate() + 30);
              return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            }
            return null;
          }).filter(Boolean).sort();
          const oldestDue = effectiveDueDates[0];
          const daysOverdue = oldestDue && oldestDue < todayISO
            ? Math.round((new Date(todayISO+'T00:00:00') - new Date(oldestDue+'T00:00:00')) / 86400000)
            : 0;
          const isOverdue = daysOverdue > 0;
          const freshPred = isOverdue ? { daysOverdue, oldestDue } : null;
          const seriouslyOverdue = daysOverdue > 90;
          // Only include in forecast if not seriously overdue — 90+ days needs manual review
          if (!seriouslyOverdue) confirmedTotal += predTotal;
          byProject.push({
            projId, name: projName, client: clientName,
            amount: predTotal,
            note: (() => {
              const sentDates = filtered.map(p => p.inv.invoiceDate).filter(Boolean).sort();
              const earliestSent = sentDates[0];
              const sentStr = earliestSent ? ` · Sent ${new Date(earliestSent+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'})}` : '';
              // Build due date string from oldest effective due date
              const dueStr = freshPred?.oldestDue
                ? ` · Due ${new Date(freshPred.oldestDue+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`
                : effectiveDueDates[0]
                  ? ` · Due ${new Date(effectiveDueDates[0]+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`
                  : '';
              if (isOverdue && freshPred) {
                return `${invNums}${sentStr}${dueStr} · Overdue (${freshPred.daysOverdue}d)`;
              } else if (isOverdue) {
                return `${invNums}${sentStr}${dueStr} · Overdue`;
              }
              const paidBy = new Date(bestPred.predictedDate+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
              return `${invNums}${sentStr}${dueStr} · Expected by ${paidBy}`;
            })(),
            billing: 'fixed', origCurr: dc, fxWarn: false,
            isPipeline: false, startDate: '', closedDate: '',
            _isPrediction: true, _confidence: bestPred.confidence,
            _isOverdue: isOverdue,
            _daysOverdue: freshPred?.daysOverdue || 0,
            _seriouslyOverdue: seriouslyOverdue,
          });
        };

        Object.entries(predictedThisMonth).forEach(([projId, items]) => {
          addedPredProjIds.add(projId);
          const proj   = (DB.projects||[]).find(p => p.id === projId);
          const client = proj ? getClient(proj.clientId) : null;
          addPrediction(items, projId, proj?.name || 'Invoice', client?.name || items[0].inv.originalClient || '—');
        });

        Object.entries(predictedByClient).forEach(([clientId, items]) => {
          const client = getClient(clientId);
          const filtered = items.filter(p => !addedPredProjIds.has(p.inv.projectId));
          if (!filtered.length) return;
          // Try to find a confirmed project for this client to label the row correctly
          const matchedProj = confirmedProjects.find(p => p.clientId === clientId);
          const projId = matchedProj?.id || '';
          const projName = matchedProj?.name || ('Invoice ' + filtered.map(p=>p.inv.invoiceNumber||'?').join(', '));
          addPrediction(filtered, projId, projName, client?.name || filtered[0].inv.originalClient || '—');
        });

        // Add prior-month invoices paid this month as "Received" rows in the prediction section
        if (paidPriorThisMonth.length > 0) {
          // Group by project
          const byProj = {};
          paidPriorThisMonth.forEach(({ inv, amount }) => {
            const key = inv.projectId || ('_client_' + (inv.clientId||'none'));
            if (!byProj[key]) byProj[key] = [];
            byProj[key].push({ inv, amount });
          });
          Object.entries(byProj).forEach(([key, items]) => {
            const proj   = (DB.projects||[]).find(p => p.id === items[0].inv.projectId);
            const client = proj ? getClient(proj.clientId) : getClient(items[0].inv.clientId);
            const totalAmt = items.reduce((s,p) => s+p.amount, 0);
            const invNums  = items.map(p => p.inv.invoiceNumber || '?').join(', ');
            const sentDate = items[0].inv.invoiceDate;
            const paidDate = items[0].inv.paymentDate;
            const fmtShort = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';
            confirmedTotal += totalAmt;
            byProject.push({
              projId: items[0].inv.projectId || '',
              name:   proj?.name || 'Invoice ' + invNums,
              client: client?.name || items[0].inv.originalClient || '—',
              amount: totalAmt,
              note:   `${invNums} · Sent ${fmtShort(sentDate)} · Received ${fmtShort(paidDate)}`,
              billing: proj?.billingType || 'fixed', origCurr: dc, fxWarn: false,
              isPipeline: false, startDate: '', closedDate: '',
              _isPrediction: true, _confidence: 'high', _isReceived: true,
            });
          });
        }
      }

      confirmedPipeline.forEach(deal => {
        const monthly = getPipelineMonthly(deal, month);
        if (!monthly) return;
        pipelineTotal += monthly;
        byProject.push({ projId: undefined, name: deal.name, client: getClient(deal.clientId)?.name||'—', amount: monthly, note: (deal.billingType === 'retainer' || deal.billingType === 'variable_retainer') ? `Pipeline ${deal.probability}% — monthly retainer` : `Pipeline ${deal.probability}% — spread over ${Math.max(1, monthsBetween(deal.startDate ? deal.startDate.slice(0,7) : currentMonth, deal.endDate ? deal.endDate.slice(0,7) : addMonths(deal.startDate ? deal.startDate.slice(0,7) : currentMonth, 11)))}mo`, billing: deal.billingType || 'fixed', origCurr: deal.currency, fxWarn: false, isPipeline: true, probability: deal.probability });
      });

      byProject.sort((a,b) => b.amount - a.amount);

      // Enrich with invoice data — prefer actual invoice data over invoiceLog
      const enriched = byProject.map(r => {
        if (!r.projId) return { ...r, inv: null };
        if (r._actualInvs) {
          // Use actual imported invoice data
          // For multiple invoices, use the latest due date
          const dueDates = r._actualInvs.map(i => i.dueDate).filter(Boolean).sort();
          const latestDue = dueDates[dueDates.length - 1] || '';
          return { ...r, inv: {
            sentDate: r._sentDate || '',
            sentAmt:  r._sentAmt  || 0,
            dueDate:  latestDue,
            paidDate: r._actualInvs.find(i => i.paymentDate)?.paymentDate || '',
            paidAmt:  r._paidAmt  || 0,
          }};
        }
        // Fall back to invoiceLog
        const proj = (DB.projects||[]).find(p => p.id === r.projId) || {};
        const log  = (proj.invoiceLog || {})[month] || {};
        return { ...r, inv: { sentDate: log.sentDate||'', sentAmt: log.sentAmt||0, paidDate: log.paidDate||'', paidAmt: log.paidAmt||0 } };
      });

      const invoicedTotal = enriched.reduce((s,r) => s + (r.inv?.sentAmt || 0), 0);
      const receivedTotal = enriched.reduce((s,r) => s + (r.inv?.paidAmt || 0), 0);
      const invoicedActual  = invoicedByMonth[month] || 0;
      const schedEntry      = outstandingByDue[month] || { total: 0, invoices: [], confidence: 'low' };
      // Exclude seriously overdue (>90 days past due) from chart — they need manual review
      const outstandingDue = schedEntry.invoices.reduce((s, { inv, amount }) => {
        const effDue = inv.dueDate || (inv.invoiceDate ? (() => {
          const d = new Date(inv.invoiceDate + 'T00:00:00'); d.setDate(d.getDate() + 30);
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        })() : null);
        if (effDue && effDue < todayISO) {
          const days = Math.round((new Date(todayISO+'T00:00:00') - new Date(effDue+'T00:00:00')) / 86400000);
          if (days > 90) return s; // exclude
        }
        return s + amount;
      }, 0);
      const outstandingConf = schedEntry.confidence;

      // Chart bars:
      // Past months  — amber=invoicedActual (billed), teal=xero (received), green=hidden
      // Future months — amber=outstandingDue (predicted collections), green=confirmedTotal (unbilled estimates)
      const chartConfirmed    = useActuals ? 0 : confirmedTotal;  // green bar
      const chartInvoiced     = useActuals ? invoicedActual : outstandingDue; // amber bar
      const chartInvoicedConf = useActuals ? 'high' : outstandingConf;

      return {
        month,
        confirmedTotal:     chartConfirmed,
        confirmedRaw:       confirmedTotal,
        pipelineTotal,
        total: useActuals
          ? invoicedActual + pipelineTotal
          : confirmedTotal + pipelineTotal,
        byProject: enriched,
        xeroActual:    xeroActuals[month] || null,
        payrollCost:   payrollByMonth[month] || 0,
        invoicedTotal,
        receivedTotal,
        invoicedActual:  chartInvoiced,     // amber bar (billed past / predicted future)
        outstandingDue:  chartInvoiced,     // keep alias for existing refs
        outstandingConf: chartInvoicedConf,
        useActuals,
      };
    });

    fxWarnings = (monthData.find(d => d.month === currentMonth)?.byProject || []).filter(r => r.fxWarn);
    maxVal = Math.max(...monthData.map(d => Math.max(d.total, d.xeroActual || 0, d.payrollCost || 0, d.invoicedTotal || 0, d.receivedTotal || 0, d.invoicedActual || 0, d.outstandingDue || 0)), 1);
    // Round maxVal up to a clean number for nice y-axis ticks
    const magnitude = Math.pow(10, Math.floor(Math.log10(maxVal)));
    maxVal = Math.ceil(maxVal / magnitude) * magnitude;
    softPipelineWeighted = 0;
    softPipeline.forEach(d => {
      const res = toDefaultCurrency(Math.round(d.value * d.probability / 100), d.currency);
      if (res.ok) softPipelineWeighted += res.value;
    });

    const selData = monthData.find(d => d.month === selectedMonth) || monthData[0];

    // ── Build payment behaviour summary for card ──────────────────
    const { clientProfiles, global: globalProfile } = paymentProfiles;
    // Build overdue/outstanding amounts per client from DB.invoices
    const today3 = new Date().toISOString().slice(0,10);
    const overdueByClient = {};
    const outstandingByClient = {};
    (DB.invoices || []).forEach(inv => {
      if (inv.paymentDate || inv.status === 'paid' || inv.status === 'bad_debt') return;
      const cid = inv.clientId; if (!cid) return;
      const res = toDefaultCurrency(inv.amount || 0, inv.currency || dc);
      if (!res.ok) return;
      if (inv.dueDate && inv.dueDate < today3) {
        overdueByClient[cid] = (overdueByClient[cid] || 0) + res.value;
      } else {
        outstandingByClient[cid] = (outstandingByClient[cid] || 0) + res.value;
      }
    });

    // Merge paid-history profiles with overdue/outstanding clients
    const allClientIds = new Set([
      ...Object.entries(clientProfiles).filter(([,p]) => p.count >= 2).map(([cid]) => cid),
      ...Object.keys(overdueByClient),
      ...Object.keys(outstandingByClient),
    ]);

    const profileEntries = [...allClientIds].map(cid => {
      const p = clientProfiles[cid];
      return {
        name:           getClient(cid)?.name || cid,
        avgDays:        p ? (p.avgDaysFromDue ?? p.avgDaysFromInvoice ?? 0) : null,
        basis:          p ? (p.avgDaysFromDue != null ? 'due' : 'invoice') : null,
        stdDev:         p ? (p.stdDev || 0) : 0,
        count:          p ? p.count : 0,
        confidence:     p ? p.confidence : 'low',
        samples:        p ? (p.samples || []) : [],
        overdueAmt:     overdueByClient[cid] || 0,
        outstandingAmt: outstandingByClient[cid] || 0,
      };
    })
    .sort((a,b) => (b.overdueAmt + b.outstandingAmt) - (a.overdueAmt + a.outstandingAmt) || b.count - a.count);

    const totalPredicted = Object.values(outstandingByDue)
      .filter((_,i) => {
        const m = Object.keys(outstandingByDue)[i];
        return m >= currentMonth;
      })
      .reduce((s,v) => s + (v.total||0), 0);

    el.innerHTML = `
      <!-- Payment Behaviour Card -->
      ${globalProfile.count >= 2 ? `
      <div class="card mb-20" style="padding:0;overflow:hidden">
        <div style="padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:28px;height:28px;border-radius:6px;background:rgba(74,127,193,0.1);display:flex;align-items:center;justify-content:center">
              <svg viewBox="0 0 24 24" fill="none" stroke="#4A7FC1" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div>
              <div style="font-size:15px;font-weight:600">Payment Behaviour</div>
              <div style="font-size:12px;color:var(--text-3)">Based on ${globalProfile.count} matched invoice${globalProfile.count!==1?'s':''} · Global avg ${globalProfile.avgDaysFromDue!=null?Math.round(globalProfile.avgDaysFromDue):Math.round(globalProfile.avgDaysFromInvoice||0)}d from due</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;font-weight:700">Predicted incoming</div>
            <div style="font-size:22px;font-weight:300;color:#4A7FC1">${fmt(Object.values(outstandingByDue).reduce((s,v)=>s+(v.total||0),0), dc)}</div>
          </div>
        </div>
        ${profileEntries.length ? `
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:var(--bg)">
              <th style="padding:8px 16px;text-align:left;font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Client</th>
              <th style="padding:8px 12px;text-align:right;font-size:11px;color:#C0392B;font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Overdue</th>
              <th style="padding:8px 12px;text-align:right;font-size:11px;color:#4A7FC1;font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Outstanding</th>
              <th style="padding:8px 12px;text-align:center;font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Avg days from due</th>
              <th style="padding:8px 12px;text-align:center;font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Variance (±)</th>
              <th style="padding:8px 12px;text-align:center;font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Invoices</th>
              <th style="padding:8px 12px;text-align:center;font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Confidence</th>
              <th style="padding:8px 16px;text-align:left;font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Behaviour</th>
              <th style="padding:8px 12px;text-align:left;font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)">Samples</th>
            </tr></thead>
            <tbody>
              ${profileEntries.map((p, i) => {
                const hasHistory = p.avgDays !== null && p.count >= 2;
                const days  = hasHistory ? Math.round(p.avgDays) : null;
                const early = days !== null && days < -3;
                const ontime = days !== null && days >= -3 && days <= 5;
                const color = days === null ? 'var(--text-3)' : early ? '#678F2F' : ontime ? '#4A7FC1' : days > 20 ? '#C0392B' : '#E07030';
                const label = days === null ? '—' : early ? `Pays early (${days}d)` : ontime ? 'Pays on time' : days <= 14 ? `${days}d late` : `${days}d late ⚠`;
                const basisNote = p.basis === 'invoice' ? '<span style="font-size:9px;opacity:.5;margin-left:3px">from invoice</span>' : '';
                const confBadge = !hasHistory ? '<span style="opacity:.3;font-size:10px">No history</span>' :
                  p.confidence === 'high'
                  ? `<span style="background:rgba(103,143,47,.1);color:#678F2F;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap">High</span>`
                  : p.confidence === 'medium'
                  ? `<span style="background:rgba(74,127,193,.1);color:#4A7FC1;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap">Med</span>`
                  : `<span style="background:rgba(0,0,0,.06);color:var(--text-3);font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;white-space:nowrap">Low</span>`;
                const sampleVals = p.samples.map(s => {
                  const d = p.basis === 'due' ? s.daysFromDue : s.daysFromInvoice;
                  if (d == null) return null;
                  const inv = s.inv;
                  const tip = inv
                    ? `${s.isOverdue ? '⏳ Still unpaid' : '✓ Paid'} | ${inv.invoiceNumber||'?'} | Sent: ${inv.invoiceDate||'?'} | Due: ${inv.dueDate||'n/a'} | ${s.isOverdue ? `${d}d overdue (so far)` : `Paid: ${inv.paymentDate||'?'}`}`
                    : '';
                  const col = s.isOverdue ? '#C0392B' : d > 5 ? '#E07030' : d < -3 ? '#678F2F' : '#4A7FC1';
                  const label = `${d >= 0 ? '+' : ''}${d}d${s.isOverdue ? '…' : ''}`;
                  return `<span title="${tip}" style="font-size:10px;font-family:monospace;color:${col};cursor:help;border-bottom:1px dashed currentColor">${label}</span>`;
                }).filter(Boolean).join(' ');
                return `<tr style="border-bottom:${i<profileEntries.length-1?'1px solid var(--bg)':'none'}${p.overdueAmt>0?';background:rgba(192,57,43,0.02)':''}">
                  <td style="padding:9px 16px;font-weight:600">${p.name}</td>
                  <td style="padding:9px 12px;text-align:right;font-family:monospace;font-weight:700;color:${p.overdueAmt>0?'#C0392B':'var(--text-3)'}">${p.overdueAmt>0?fmt(p.overdueAmt,dc):'—'}</td>
                  <td style="padding:9px 12px;text-align:right;font-family:monospace;color:${p.outstandingAmt>0?'#4A7FC1':'var(--text-3)'}">${p.outstandingAmt>0?fmt(p.outstandingAmt,dc):'—'}</td>
                  <td style="padding:9px 12px;text-align:center;font-weight:700;color:${color};font-family:monospace">${days===null?'—':`${days>=0?'+':''}${days}d${basisNote}`}</td>
                  <td style="padding:9px 12px;text-align:center;color:var(--text-3);font-family:monospace">${hasHistory?`±${Math.round(p.stdDev||0)}d`:'—'}</td>
                  <td style="padding:9px 12px;text-align:center;color:var(--text-3)">${p.count||'—'}</td>
                  <td style="padding:9px 12px;text-align:center">${confBadge}</td>
                  <td style="padding:9px 16px;color:${color};font-size:12px">${label}</td>

      ${fxWarnings.length ? `<div class="card mb-20" style="padding:12px 18px;border-left:3px solid #D4A017">

            ${Object.keys(payrollByMonth).length ? `<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:linear-gradient(180deg,#9170D6,#5338A0)"></div> Est. Cost +15%</div>` : ''}

          <!-- Y-axis gridlines and labels -->
          <div style="position:absolute;inset:0 0 36px 0;pointer-events:none;z-index:0">

                <span style="font-size:9px;color:var(--text-3);padding-right:6px;line-height:1;transform:translateY(50%);white-space:nowrap;min-width:52px;text-align:right">${pct===0?'':fmt(maxVal*pct/100,dc)}</span>
              </div>`).join('')}
          </div>
          <!-- Bars (position:relative + z-index:1 so they sit above the gridlines) -->
          <div style="display:flex;align-items:flex-end;gap:4px;height:260px;padding-bottom:36px;margin-top:58px;padding-left:58px;position:relative;z-index:1">

              const isCur  = isMonthCurrent(month);

              const xPx    = xeroActual && maxVal > 0 ? Math.max(2, Math.round((xeroActual / maxVal) * chartH)) : 0;
              const iPx    = invoicedActual > 0 && maxVal > 0 ? Math.max(2, Math.round((invoicedActual / maxVal) * chartH)) : 0;
              const cPx    = confirmedTotal > 0 && maxVal > 0 ? Math.max(2, Math.round((confirmedTotal / maxVal) * chartH)) : 0;
              const pPx    = pipelineTotal > 0 && maxVal > 0 ? Math.max(2, Math.round((pipelineTotal / maxVal) * chartH)) : 0;
              const costPx = payrollCost > 0 && maxVal > 0 ? Math.max(2, Math.round((payrollCost / maxVal) * chartH)) : 0;
              const selBg  = isSel ? 'background:rgba(103,143,47,0.05);border-radius:8px;outline:1.5px solid rgba(103,143,47,0.25);outline-offset:-1px' : '';

              const hasCost = costPx > 0;
              const hasInv  = hasInvoiceData;

                style="flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;min-width:0;height:${chartH+38}px;justify-content:flex-end;padding:3px 2px;${selBg};transition:background .15s">
                <!-- Variance badge (past months only) -->
                ${isPast && selData.total >= 0 ? (() => {
                  const forecast = confirmedTotal + pipelineTotal;

                  const pct      = forecast > 0 ? Math.round(((actual - forecast) / forecast) * 100) : (actual > 0 ? 100 : null);
                  if (pct === null) return '';
                  const isOver  = pct >= 0;
                  const color   = isOver ? '#678F2F' : '#C0392B';
                  const bg      = isOver ? 'rgba(103,143,47,0.12)' : 'rgba(192,57,43,0.08)';
                  return `<div style="font-size:8px;font-weight:700;color:${color};background:${bg};border-radius:100px;padding:1px 5px;margin-bottom:3px;letter-spacing:.2px;white-space:nowrap">${isOver?'+':''}${pct}%</div>`;
                })() : '<div style="height:14px"></div>'}

                    ${xPx > 0
                      ? `<div style="width:100%;height:${xPx}px;background:linear-gradient(180deg,${isSel?'#56B4E5':'#3D9FD4'} 0%,${isSel?'#1874BA':'#1358A0'} 100%);border-radius:3px 3px 0 0;box-shadow:0 1px 3px rgba(19,88,160,.2)"></div>`

                  </div>` : ''}

                      ? `<div style="width:100%;height:${iPx}px;background:linear-gradient(180deg,${isSel?'#F5A623':'#E09010'} 0%,${isSel?'#C87800':'#B06800'} 100%);border-radius:3px 3px 0 0;opacity:${isSel?1:outstandingConf==='low'?0.45:outstandingConf==='medium'?0.7:isPast?0.85:0.65};box-shadow:0 1px 3px rgba(200,120,0,.2)" title="${isPast?'Invoiced: '+fmt(invoicedActual,dc):'Predicted collection: '+fmt(outstandingDue,dc)+' ('+outstandingConf+' confidence)'}"></div>`

                    ${cPx > 0 ? `<div style="width:100%;height:${cPx}px;background:#678F2F;opacity:${isPast&&!isSel?0.5:!isPast&&!isCur&&outstandingConf==='low'?0.45:!isPast&&!isCur&&outstandingConf==='medium'?0.7:1};border-radius:${pPx?'0':'3px'} ${pPx?'0':'3px'} 0 0" title="${!isPast&&!isCur?'Confidence: '+(outstandingConf||'—'):''}"></div>` : ''}
                    ${cPx === 0 && pPx === 0 ? `<div style="width:100%;height:2px;background:rgba(0,0,0,.05);border-radius:1px"></div>` : ''}
                  </div>
                  <!-- Est. cost -->
                  ${hasCost ? `<div style="width:${bW.cost}px;flex-shrink:0;display:flex;flex-direction:column;justify-content:flex-end;height:100%">
                    <div style="width:100%;height:${costPx}px;background:linear-gradient(180deg,${isSel?'#A882E8':'#9170D6'} 0%,${isSel?'#6A45B8':'#5338A0'} 100%);border-radius:3px 3px 0 0;opacity:${isSel?0.95:0.55};box-shadow:0 1px 3px rgba(83,56,160,.2)"></div>
                  </div>` : ''}
                </div>
                <!-- Month label -->
                <div style="text-align:center;margin-top:5px;line-height:1.25">
                  <div style="font-size:9px;font-weight:${isCur?'700':'500'};color:${isSel?'var(--accent)':isCur?'var(--text)':'var(--text-3)'};letter-spacing:${isCur?'.2px':'0'}">${fmtM(month)}${isCur?` <span style="color:var(--accent);font-size:8px">●</span>`:''}</div>
                  <div style="font-size:9px;color:${isSel?'var(--accent)':'var(--text-3)'};font-weight:${isSel?'700':'400'};margin-top:1px;letter-spacing:-.2px">${(confirmedTotal+pipelineTotal)>0?fmt(confirmedTotal+pipelineTotal,dc):'—'}</div>
                </div>
              </div>`;

          </div>
        </div>

      <!-- Month selector -->
      <div class="card mb-20" style="padding:12px 20px">

            ${fmtM(m)}</button>`).join('')}

              <div>
                <div style="font-size:26px;font-weight:300">${fmtM(selectedMonth)}</div>
                ${isMonthPast(selectedMonth) ? (() => {
                  const forecast = selData.total;

                  const diff     = actual - forecast;
                  const pct      = forecast > 0 ? Math.round((diff / forecast) * 100) : (actual > 0 ? 100 : -100);
                  const isOver   = diff >= 0;
                  const color    = isOver ? '#678F2F' : '#C0392B';
                  return `<div style="margin-top:6px;display:flex;align-items:center;gap:8px">
                    <div style="font-size:13px;color:var(--text-3)">
                      Xero received: <strong style="color:#2176AE">${actual > 0 ? fmt(actual,dc) : '$0'}</strong>
                    </div>
                    <div style="padding:2px 8px;border-radius:100px;white-space:nowrap;background:${isOver?'rgba(103,143,47,0.1)':'rgba(192,57,43,0.08)'};font-size:12px;font-weight:700;color:${color}">
                      ${isOver?'+':''}${pct}% vs forecast
                    </div>
                  </div>`;
                })() : ''}
              </div>
              <div style="display:flex;gap:16px;align-items:flex-end">
                ${selData.pipelineTotal > 0 ? `
                <div style="text-align:right">
                  <div class="lbl" style="color:#7EB83B">Pipeline ≥80%</div>
                  <div style="font-size:16px;font-weight:700;color:#7EB83B">+ ${fmt(selData.pipelineTotal, dc)}</div>
                </div>` : ''}
                <div style="text-align:right">
                  <div class="lbl">Total forecast</div>
                  <div style="font-size:20px;font-weight:700;color:var(--accent)">${selData.total > 0 ? fmt(selData.total, dc) : '—'}</div>
                </div>
              </div>
            </div>
            ${(() => {
              // ── Compute summary stats ──────────────────────────────────
              const projRows   = selData.byProject.filter(r => !r._isPrediction);
              const predRows   = selData.byProject.filter(r => r._isPrediction);
              const invoicedAmt    = selData.useActuals ? (selData.invoicedActual || 0) : (selData.invoicedTotal || 0);
              const paidAmt      = selData.xeroActual || 0;
              const expectedAmt  = predRows.filter(r => !r._seriouslyOverdue).reduce((s,r) => s+r.amount, 0);
              const toSendAmt    = projRows.filter(r => !r.inv?.sentDate && !r.inv?.paidDate && !r._isPrediction).reduce((s,r) => s+r.amount, 0);
              const sentUnpaidAmt = projRows.filter(r => r.inv?.sentDate && !r.inv?.paidDate).reduce((s,r) => s+r.amount, 0);
              const costAmt      = selData.payrollCost || 0;
              const revenueBase  = invoicedAmt > 0 ? invoicedAmt : selData.confirmedTotal || 0;
              const margin       = revenueBase > 0 && costAmt > 0 ? revenueBase - costAmt : null;

              const tile = (label, value, color, sub='', icon='') =>
                `<div style="display:flex;flex-direction:column;gap:3px">
