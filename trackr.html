<style>
  :root {
    --success: #678F2F;
  }

  
  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100vh;
  }
  
  .topbar-title {
    font-family: var(--font);
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    flex: 1;
    letter-spacing: -0.3px;
  }
  

  

  /* ── BUTTONS ── */
  
  .btn svg { width: 15px; height: 15px; }
  
  
  
  
  
  
  

  /* ── CARDS ── */
  
  
  .card-value {
    font-family: var(--font);
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    letter-spacing: -1px;
  }
  .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 18px; }
  
  
  
  
  

  /* ── SECTION HEADER ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: var(--font);
    font-size: 24px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .section-sub {
    font-size: 14px;
    color: var(--text-2);
    margin-top: 3px;
    font-weight: 400;
  }
  .mb-16 { margin-bottom: 16px; }
  .text-center { text-align: center; }
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  
  .empty-state svg { width: 40px; height: 40px; opacity: 0.2; margin: 0 auto 14px; display: block; }
  

  /* ── PROGRESS BAR ── */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--accent);
    transition: width 0.3s ease;
  }
  .progress-fill.over { background: var(--danger); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .tab {
    padding: 12px 20px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-2);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; color: var(--text-2);
    margin-bottom: 24px;
  }
  .breadcrumb a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb span { color: var(--text-3); }

  /* ── DRILL-DOWN ── */
  .drill-member-header {
    background: var(--sidebar-bg);
    border-radius: var(--radius);
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
    color: #fff;
  }
  
  

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {

    
  }
  @media (max-width: 680px) {
    .sidebar { display: none; }
    .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
    
  }
  @media (max-width: 480px) {
    
    
  }

  /* ── SHEET (inline editable grid) ── */
  .sheet-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .sheet-scroll { overflow-x: auto; }
  .sheet-
  .sheet-table colgroup col { }
  .sheet-head {
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .sheet-head th {
    background: #F5F5F3;
    font-family: var(--font);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-3);
    padding: 12px 12px;
    text-align: left;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }
  .sheet-head th.col-del { width: 44px; }
  .sheet-head th:first-child { padding-left: 16px; }
  .sheet-head th:last-child { padding-right: 12px; }

  .sheet-row { border-bottom: 1px solid var(--border); transition: background 0.08s; position: relative; }
  .sheet-row:last-child { border-bottom: none; }
  .sheet-row:hover { background: #F9F9F7; }
  .sheet-row.row-new { background: rgba(103,143,47,0.04); }
  .sheet-row.row-dirty { background: rgba(103,143,47,0.07); }

  .sheet-cell {
    padding: 0;
    vertical-align: middle;
    position: relative;
  }
  .sheet-row td.sheet-cell:first-child,
  .sheet-row td.sheet-cell:first-child input,
  .sheet-row td.sheet-cell:first-child 
  .sheet-row td:last-child { padding-right: 12px; }
  .sheet-cell input,
  .sheet-cell 
  .sheet-cell input:focus,
  .sheet-cell select:focus {
    background: #fff;
    box-shadow: inset 0 0 0 2px var(--accent);
    cursor: text;
    position: relative;
    z-index: 2;
  }
  .sheet-cell [contenteditable] {
    outline: none;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1em;
    cursor: text;
    padding: 0 12px;
    line-height: 1.5;
    font-family: var(--font);
    font-size: 14px;
    color: var(--text);
    border-radius: 3px;
    transition: background 0.1s, box-shadow 0.1s;
  }
  .sheet-cell [contenteditable]:focus {
    background: #fff;
    box-shadow: inset 0 0 0 2px var(--accent);
    position: relative;
    z-index: 2;
  }
  .sheet-cell [contenteditable]:empty:before {
    content: attr(data-placeholder);
    color: var(--text-3);
    pointer-events: none;
  }
  .sheet-cell input[type="number"] { font-family: var(--font); }
  .sheet-cell.cell-readonly input[type="text"],
  .sheet-cell.cell-readonly input[type="number"],
  .sheet-cell.cell-readonly input[type="date"] {
    color: var(--text-2);
    font-family: var(--font);
    cursor: default;
    pointer-events: none;
  }
  .sheet-cell
  .sheet-cell.cell-billable .billable-inner {
    display: flex;
    align-items: center;
    height: 46px;
    min-width: 120px;
  }
  .sheet-cell.cell-billable .billable-inner .mhp-nb-
  .sheet-cell.cell-billable > 
  .sheet-cell.cell-billable input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--accent);
    cursor: pointer;
    pointer-events: auto;
  }
  .sheet-cell
  .col-del { width: 44px; vertical-align: middle; text-align: center; }
  .del-row-btn {
    opacity: 0;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--danger);
    padding: 6px 8px;
    border-radius: 5px;
    transition: opacity 0.15s, background 0.15s;
    display: inline-flex; align-items: center;
  }
  .sheet-row:hover .del-row-btn { opacity: 1; }
  .del-row-btn:hover { background: var(--danger-dim); }

  .sheet-footer {
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .add-row-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: none;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 16px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* Remove spinner arrows from number inputs */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

  /* Hide calendar icon by default, show on hover/focus */
  input[type="date"]::-webkit-calendar-picker-indicator {
    opacity: 0;
    transition: opacity 0.15s;
    cursor: pointer;
  }
  input[type="date"]:hover::-webkit-calendar-picker-indicator,
  input[type="date"]:focus::-webkit-calendar-picker-indicator {
    opacity: 0.5;
  }
  input[type="date"]:focus::-webkit-calendar-picker-indicator {
    opacity: 0.8;
  }

  /* Divider in rate override section */
  .rate-override-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }
  .rate-override-row:last-child { border-bottom: none; }
  .rate-override-row 
  .rate-override-row input { max-width: 120px; }
  /* ── LOGIN SCREEN ── */
  .login-screen {
    position: fixed; inset: 0;
    background: var(--sidebar-bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 99998;
    flex-direction: column;
    gap: 0;
  }
  .login-card {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 40px 44px;
    width: 100%; max-width: 400px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
  }
  .login-logo {
    margin-bottom: 0px;
    display: block;
    margin-left: -5px;
  }
  .login-title {
    font-size: 26px; font-weight: 300; color: var(--text);
    margin-bottom: 8px; letter-spacing: -0.5px;
  }
  .login-sub {
    font-size: 13px; color: var(--text-3); margin-bottom: 28px;
  }
  .login-field { margin-bottom: 16px; }
  .login-field 
  .login-field input {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-family: var(--font); font-size: 14px; color: var(--text);
    background: var(--bg); outline: none; transition: border-color 0.15s;
  }
  .login-field input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 13px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-family: var(--font); font-size: 14px; font-weight: 700;
    cursor: pointer; margin-top: 8px; transition: background 0.15s;
  }
  .login-btn:hover { background: var(--accent-hover); }
  .login-error {
    background: var(--danger-dim); border: 1px solid rgba(192,57,43,0.2);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 13px; color: var(--danger); margin-top: 14px;
    display: none;
  }
  .login-error.show { display: block; }

  /* ── SIDEBAR user area ── */
  .test-mode-bar {
    background: #f59e0b;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
    cursor: pointer;
    transition: background 0.15s;
  }
  .test-mode-bar:hover { background: #d97706; }
  .test-mode-bar svg { flex-shrink: 0; }

  
  
  
  
  
  
  

  #notif-bell-btn:hover { background: var(--border) !important; color: var(--text) !important; }

  /* Admin-only nav items hidden for members */
  .admin-only { display: none !important; }
  body.is-admin .admin-only { display: block !important; }
  body.is-admin .nav-item.admin-only { display: flex !important; }

  .manager-plus-only { display: none !important; }
  body.is-manager-plus .manager-plus-only { display: block !important; }
  body.is-manager-plus .nav-item.manager-plus-only { display: flex !important; }
  .notif-item {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .notif-item:last-child { border-bottom: none; }
  .notif-item.confirmed { opacity: 0.5; }
  .notif-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent-dim); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 16px;
  }
  .notif-icon.confirmed { background: var(--bg); color: var(--text-3); }
  .notif-
  .notif-subject { font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 2px; }
  .notif-meta { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }
  .notif-message { font-size: 12px; color: var(--text-2); white-space: pre-wrap; line-height: 1.5; }
  .notif-actions { display: flex; gap: 6px; margin-top: 8px; }

  /* Notification badge on nav item */
  .nav-badge {
    background: var(--accent); color: #fff;
    border-radius: 100px; font-size: 10px; font-weight: 700;
    padding: 1px 6px; margin-left: auto; flex-shrink: 0;
    line-height: 1.6;
  }
  
  
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position:  200% center; }
  }
  
  
  
  
  
  
  

  /* Badges and pills — never wrap */
  .badge, [class*="badge-"] { white-space: nowrap; }

  /* Currency pill */
  .currency-pill {
    display: inline-flex; align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 4px 13px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    gap: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .currency-pill:hover { border-color: var(--accent); color: var(--accent); }
  .currency-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  
  .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Utility classes extracted from repeated inline styles */
  .label-caps { font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-3); }
  .label-caps-sm { font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-3); }
  .status-success { background:#EAF0E2;border-radius:6px;padding:10px 14px;font-size:13px;color:var(--accent); }
  .status-error { background:#FFF0F0;border-radius:6px;padding:10px 14px;font-size:13px;color:var(--danger); }
  .dot-indicator { width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.2);display:inline-block; }

  @keyframes _rtSlide {
    from { transform: translateX(-50%) translateY(-8px); opacity: 0; }
    to   { transform: translateX(-50%) translateY(0);   opacity: 1; }
  }
.lbl-sm{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-3)}
table 
table thead th:first-child{text-align:left}

.micro-label{color:var(--text-3);font-size:11px}

<script>
// ── FX Rate Module — shared between PAY and TRACKR ───────────
const FX = (() => {
  const KEY_STORE   = 'mis-fx-key';
  const CACHE_STORE = 'mis-fx-cache';
  const CODES_STORE = 'mis-fx-codes';
  const CACHE_TTL   = 6 * 60 * 60 * 1000;
  const CODES_TTL   = 7 * 24 * 60 * 60 * 1000;
  let _cache = null;
  function getKey() { return localStorage.getItem(KEY_STORE) || ''; }
  function setKey(k) { localStorage.setItem(KEY_STORE, k); }
  function loadCache() {
    if (_cache) return _cache;
    try { const c = JSON.parse(localStorage.getItem(CACHE_STORE) || 'null'); if (c && c.ts && Date.now() - c.ts < CACHE_TTL) { _cache = c; return c; } } catch(e) {}
    return null;
  }
  function getSupportedCodes() {
    try { const c = JSON.parse(localStorage.getItem(CODES_STORE) || 'null'); if (c && c.ts && Date.now() - c.ts < CODES_TTL) return c.codes; } catch(e) {}
    return null;
  }
  async function fetchSupportedCodes() {
    const key = getKey(); if (!key) return null;
    try {
      const res = await fetch(`https://v6.exchangerate-api.com/v6/${key}/codes`);
      const data = await res.json();
      if (data.result !== 'success') return null;
      const codes = data.supported_codes.map(([code, name]) => ({ code, name }));
      localStorage.setItem(CODES_STORE, JSON.stringify({ ts: Date.now(), codes }));
      return codes;
    } catch(e) { return null; }
  }
  function isValidCode(code) {
    const codes = getSupportedCodes();
    if (!codes) return true;
    return codes.some(c => c.code === code.toUpperCase());
  }
  function getCodeName(code) {
    const codes = getSupportedCodes();
    return codes?.find(c => c.code === code)?.name || code;
  }
  async function fetchRates(base = 'USD') {
    const key = getKey(); if (!key) return null;
    try {
      const res = await fetch(`https://v6.exchangerate-api.com/v6/${key}/latest/${base}`);
      const data = await res.json();
      if (data.result !== 'success') return null;
      const cache = { ts: Date.now(), base, rates: data.conversion_rates };
      localStorage.setItem(CACHE_STORE, JSON.stringify(cache)); _cache = cache; return cache;
    } catch(e) { return null; }
  }
  async function getRates(base = 'USD') {
    const cached = loadCache(); if (cached && cached.base === base) return cached.rates;
    return (await fetchRates(base))?.rates || null;
  }
  async function convert(amount, from, to) {
    if (from === to) return amount;
    const rates = await getRates('USD'); if (!rates) return null;
    const inUSD = from === 'USD' ? amount : amount / (rates[from] || 1);
    return to === 'USD' ? inUSD : inUSD * (rates[to] || 1);
  }
  function convertSync(amount, from, to) {
    if (from === to) return amount;
    const cached = loadCache(); if (!cached?.rates) return null;
    const rates = cached.rates; const base = cached.base || 'USD';
    let inBase;
    if (from === base) inBase = amount;
    else if (rates[from]) inBase = amount / rates[from] * (base === 'USD' ? 1 : (rates[base] || 1));
    else return null;
    if (to === base) return inBase;
    return rates[to] ? inBase * rates[to] / (base === 'USD' ? 1 : (rates[base] || 1)) : null;
  }
  function isReady() { return !!(getKey() && loadCache()); }
  async function warmUp() {
    if (!getKey()) return;
    const cached = loadCache();
    if (!cached || Date.now() - cached.ts > CACHE_TTL) await fetchRates('USD');
    if (!getSupportedCodes()) await fetchSupportedCodes();
  }
  return { getKey, setKey, getRates, convert, convertSync, isReady, warmUp, loadCache,
           getSupportedCodes, fetchSupportedCodes, isValidCode, getCodeName };
})();

let _pendingSync = false;
let _syncTimer = null;

// ── SUPABASE READY GATE ────────────────────────────────────────
// This flag MUST be true before any push is allowed.
// It is set only after we have confirmed the remote state this session:
//   - supabasePull() returned data (we loaded the real DB), OR
//   - supabasePull() returned empty AND we verified the remote row is genuinely absent.
// It is never true on a fresh load until confirmed. This means clearing
// localStorage/cache cannot cause an empty DB to overwrite Supabase.
let _supabaseReady = false;

function saveDB() {
  // Strip base64 blobs before saving — files must be in Supabase Storage
  (DB.teamMembers || []).forEach(m => { if (m.photo?.startsWith('data:')) m.photo = null; });
  (DB.clients || []).forEach(c => { if (c.logo?.startsWith('data:')) c.logo = ''; });
  if (DB.design?.logoSvg?.startsWith('data:')) DB.design.logoSvg = '';

  // Always update localStorage cache immediately
  try { localStorage.setItem(KEY, JSON.stringify(DB)); } catch(_) {}
  _currentUserCache = null; _currentUserCacheId = null; // invalidate on any DB change
  _entryIdx = null; // invalidate entry index
  // Debounced push to Supabase (max 1 push per 1.5s to avoid hammering)
  if (supaCfg()) {
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => {
      supabasePush()
        .then(() => { _pendingSync = false; updateSyncIndicator('synced'); })
        .catch(() => { _pendingSync = true; updateSyncIndicator('error'); });
    }, 1500);
    _pendingSync = true;
    updateSyncIndicator('pending');
  }
}

function updateSyncIndicator(state) {
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  const states = {
    pending:  { text: '⟳ Syncing…',     color: 'var(--text-3)' },
    syncing:  { text: '⟳ Syncing…',     color: 'var(--text-3)' },
    synced:   { text: '✓ Synced',        color: 'var(--accent)'  },
    error:    { text: '✗ Sync failed',   color: 'var(--danger)'  },
    offline:  { text: '⊘ Offline',       color: 'var(--text-3)'  },
    live:     { text: '● Live',          color: '#22c55e'         },
  };
  const s = states[state] || states.offline;
  el.textContent = s.text;
  el.style.color = s.color;
  el.style.opacity = '1';
  if (state === 'synced') setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

function genId(prefix) {
  return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
}

// OT multiplier helpers
function getOtMultiplier(dateStr) {
  if (!dateStr) return (DB.settings.otMultipliers || {}).weekday || 1.5;
  const m = DB.settings.otMultipliers || { weekday: 1.5, weekend: 2, holiday: 3 };
  // Check all country holiday lists
  const nh = DB.settings.nationalHolidays || {};
  const isHoliday = Object.values(nh).some(arr => Array.isArray(arr) && arr.includes(dateStr));
  if (isHoliday) return m.holiday;
  const dow = new Date(dateStr + 'T00:00:00').getDay(); // 0=Sun, 6=Sat
  return (dow === 0 || dow === 6) ? m.weekend : m.weekday;
}
function otLabel(mult) { return `OT ×${mult}`; }

// Returns true if a project should appear in a given month.
// Closed projects are hidden from months after their close date.
// Projects with a start date are hidden from months before it.
function isProjectActiveInMonth(proj, month) {
  if (!month) return true;
  // Closed: only exclude if the project closed BEFORE this month (not during it)
  if (proj.closedDate && month > proj.closedDate.slice(0, 7)) return false;
  // Upcoming: only exclude if the project hasn't started yet this month
  if (proj.startDate  && month < proj.startDate.slice(0, 7))  return false;
  return true;
}

// Convert a {currency: amount} map to a single base-currency total using FX cache
function fxByCurr(byCurr, baseCurr) {
  const entries = Object.entries(byCurr||{}).filter(([,v]) => v > 0);
  if (!entries.length) return { total: 0, converted: false, subtotals: '' };
  if (entries.length === 1 && entries[0][0] === baseCurr) return { total: entries[0][1], converted: true, subtotals: '' };
  const subtotals = entries.map(([c,v]) => fmt(v,c)).join(' + ');
  if (!FX.isReady()) return { total: null, converted: false, subtotals };
  let total = 0;
  for (const [c,v] of entries) {
    const r = FX.convertSync(v, c, baseCurr);
    if (r === null) return { total: null, converted: false, subtotals };
    total += r;
  }
  return { total, converted: true, subtotals };
}

// Render a hero stat block for a byCurr map — shows ~converted total + subtotals if multi-currency
function fmtHeroFx(byCurr, dc, options = {}) {
  const { bigStyle = 'font-size:28px;font-weight:800;', subStyle = 'font-size:11px;opacity:.5;margin-top:2px', color = 'var(--accent)' } = options;
  const entries = Object.entries(byCurr||{}).filter(([,v]) => v > 0);
  if (!entries.length) return `<div style="${bigStyle}color:${color}">—</div>`;
  if (entries.length === 1) return `<div style="${bigStyle}color:${color}">${fmt(entries[0][1], entries[0][0])}</div>`;
  const { total, converted, subtotals } = fxByCurr(byCurr, dc);
  if (converted && total !== null) {
    return `<div style="${bigStyle}color:${color}">~${fmt(total, dc)}</div>`
      + `<div style="${subStyle}">${subtotals}</div>`;
  }
  // No FX — stack each currency
  return entries.map(([c,v]) => `<div style="${bigStyle}color:${color};line-height:1.3">${fmt(v,c)}</div>`).join('');
}

function fmt(val, currency) {  const s = DB.settings.symbols[currency] || currency;
  return s + Number(val).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function fmtDate(d) {
  // d = "YYYY-MM-DD" → "2 Mar"
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.getDate() + ' ' + dt.toLocaleDateString('en-US', { month: 'short' });
}

function dateToMonth(d) {
  // "YYYY-MM-DD" → "YYYY-MM"
  if (!d) return '';
  return d.slice(0, 7);
}

function todayDate() {
  const now = new Date();
  return `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
}

// Count weekday public holidays in a given month across all configured countries.
// Returns hours to deduct (holidays × hours-per-day based on standard 20 working days/month).
function publicHolidayDeductH(month, hoursPerMonth = 160) {
  if (!month) return 0;
  const [y, mo] = month.split('-').map(Number);
  const nh = DB.settings.nationalHolidays || {};
  // Merge all country holiday lists into one set
  const allHolidays = new Set();
  Object.values(nh).forEach(arr => { if (Array.isArray(arr)) arr.forEach(d => allHolidays.add(d)); });
  // Count weekday holidays (Mon–Fri) that fall in this month
  let count = 0;
  allHolidays.forEach(d => {
    if (!d || d.slice(0, 7) !== month) return;
    const dow = new Date(d + 'T00:00:00').getDay(); // 0=Sun, 6=Sat
    if (dow >= 1 && dow <= 5) count++;
  });
  const hoursPerDay = hoursPerMonth / 20; // standard 20 working days/month
  return count * hoursPerDay;
}

// Returns the effective available hours for utilisation in a given month.
// Deducts public holidays that fall on weekdays in that month.
// Pro-rates hours when a member resigns mid-month.
// If noTargetHours is set, use the member's logged hours so utilisation = 100%.
function effectiveAvailH(member, loggedH = 0, month = null) {
  if (member.noTargetHours) return Math.max(loggedH, 1);
  const base   = member.availableHours || 160;
  const deduct = month ? publicHolidayDeductH(month, base) : 0;
  const full   = Math.max(base - deduct, 1);
  if (!month) return full;

  // Check resignation date — pro-rate if they leave mid-month
  const resigned = getPayResignedDates();
  const resignedDate = resigned[member.id];
  if (!resignedDate) return full;

  const [ry, rm, rd] = resignedDate.split('-').map(Number);
  const [my, mm]     = month.split('-').map(Number);

  // Resigned before this month — zero hours
  if (ry < my || (ry === my && rm < mm)) return 0;
  // Resigned after this month — full hours
  if (ry > my || (ry === my && rm > mm)) return full;

  // Resigned during this month — pro-rate by working days worked vs total working days
  // Count working days (Mon–Fri) in the month up to and including resignation date
  const daysInMonth   = new Date(my, mm, 0).getDate();
  let totalWorkDays = 0, workedWorkDays = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(my, mm - 1, d).getDay(); // 0=Sun,6=Sat
    if (dow >= 1 && dow <= 5) {
      totalWorkDays++;
      if (d <= rd) workedWorkDays++;
    }
  }
  if (totalWorkDays === 0) return full;
  return Math.max(Math.round((workedWorkDays / totalWorkDays) * full), 1);
}

function initials(name) {

// Display name: uses nickname if set, otherwise "Adam Eastburn" → "Adam E"
function displayName(nameOrMember, _unused) {
  // Can accept a member object or a plain name string
  if (nameOrMember && typeof nameOrMember === 'object') {
    if (nameOrMember.nickname) return nameOrMember.nickname;
    nameOrMember = nameOrMember.name || '';
  }
  const name = nameOrMember || '';
  if (!name) return '';
  const parts = name.trim().split(/\s+/);
  if (parts.length < 2) return parts[0] || '';
  return parts[0] + ' ' + parts[parts.length - 1][0].toUpperCase();
}

// Send notification email.
// If EmailJS is configured → sends via EmailJS only (no mailto fallback).
// If EmailJS is not configured → opens mailto in a new tab.
async function sendNotificationEmail(params) {
  try {
    const { publicKey, serviceId, templateId } = DB.emailjs || {};
    const { to_email, subject, message } = params;

    if (publicKey && serviceId && templateId) {
      if (typeof emailjs === 'undefined') {
        return { ok: false, reason: 'EmailJS SDK not loaded. Check your internet connection.' };
      }
      emailjs.init({ publicKey });
      const response = await emailjs.send(serviceId, templateId, params);
      if (response.status === 200) return { ok: true };
      return { ok: false, reason: `EmailJS error: ${response.text}` };
    }

    // No EmailJS configured — open mailto
    if (!to_email) return { ok: false, reason: 'No email address.' };
    const mailtoUrl = `mailto:${encodeURIComponent(to_email)}`
      + `?subject=${encodeURIComponent(subject)}`
      + `&body=${encodeURIComponent(message)}`;
    window.open(mailtoUrl, '_blank');
    return { ok: true, via: 'mailto' };
  } catch(err) {
    return { ok: false, reason: err.text || err.message || String(err) };
  }
}

// ── SCHEDULED BACKUP ────────────────────────────────────────────
async function sendScheduledBackup(force = false) {
  const cfg = DB.settings?.backupSchedule;
  if (!cfg?.enabled && !force) return;
  if (!cfg?.emails?.length && !force) return;

  const today = new Date();
  const todayStr = today.toISOString().slice(0, 10);

  if (!force) {
    // Check if already sent today
    if (cfg.lastSent === todayStr) return;
    // Check frequency
    const freq = cfg.frequency || 'weekly';
    if (freq === 'weekly'  && today.getDay() !== (cfg.dayOfWeek ?? 1)) return;
    if (freq === 'monthly' && today.getDate() !== (cfg.dayOfMonth ?? 1)) return;
    // daily: always send if not yet sent today
  }

  // Build the backup JSON
  const backupJson = JSON.stringify(DB, null, 2);
  const b64 = btoa(unescape(encodeURIComponent(backupJson)));
  const dateLabel = todayStr;
  const stats = `${DB.teamMembers?.length||0} members · ${DB.projects?.length||0} projects · ${DB.timeEntries?.length||0} entries`;

  // Also trigger a browser download so the file is always saved locally
  const blob = new Blob([backupJson], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `trackr-backup-${dateLabel}.json`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);

  const emails = (cfg?.emails || []);
  const subject = `TRACKR Backup — ${dateLabel}`;
  const message = `Automated backup from TRACKR.\n\nDate: ${dateLabel}\nWorkspace: ${DB.account?.workspaceName||'mis.studio'}\n${stats}\n\nThe backup file has also been downloaded to your device.\n\n--- BASE64 BACKUP (paste into a .json file to restore) ---\n${b64}`;

  let anyOk = false;
  for (const email of emails) {
    const r = await sendNotificationEmail({ to_email: email, subject, message });
    if (r.ok) anyOk = true;
  }

  // Update lastSent
  if (!DB.settings.backupSchedule) DB.settings.backupSchedule = {};
  DB.settings.backupSchedule.lastSent = todayStr;
  saveDB();

  if (force) toast(anyOk ? `Backup sent to ${emails.join(', ')} ✓` : 'Backup downloaded — email failed (check EmailJS config)', anyOk ? 'success' : 'warning');
}

function checkScheduledBackup() {
  const cfg = DB.settings?.backupSchedule;
  if (!cfg?.enabled) return;
  // Run silently on app load — will only fire if today matches schedule
  sendScheduledBackup(false).catch(() => {});
}

function getEffectiveRate(memberId, projectId) {
  const proj = getProject(projectId);
  const mem = getMember(memberId);
  const cli = getClient(proj.clientId);

  // 1. Project-level override — highest priority
  if (proj.id && proj.rateOverrides && proj.rateOverrides[memberId] !== undefined) {
    return { rate: proj.rateOverrides[memberId], overridden: true, source: 'project' };
  }

  // 2. Client rate card — overrides company card for this client
  if (cli.billingModel === 'rate_card' && mem.jobTitleId) {
    const cardRate = cli.rateCard?.[mem.jobTitleId];
    if (cardRate !== undefined) {
      return { rate: cardRate, overridden: true, source: 'rate_card' };
    }
  }

  // 3. Company-wide rate card — applies when enabled and client uses standard billing
  if (DB.settings.rateCardEnabled && mem.jobTitleId) {
    const companyRate = DB.settings.rateCard?.[mem.jobTitleId];
    if (companyRate !== undefined) {
      return { rate: companyRate, overridden: true, source: 'company_rate_card' };
    }
  }

  // 4. Member default rate
  return { rate: (mem.id && mem.defaultRate) || 0, overridden: false, source: 'default' };
}

function getEntryCurrency(entry) {
  const proj = getProject(entry.projectId);
  const cli = getClient(entry.clientId);
  const mem = getMember(entry.teamMemberId);
  // Project currency takes precedence, then client, then member, then global default
  return proj.currency || cli.currency || mem.defaultCurrency || DB.settings.defaultCurrency;
}

function entryBillable(entry) {
  if (entry.nonBillable) return 0;
  const proj = getProject(entry.projectId);
  if (proj.billingType === 'fixed') return 0;
  if (proj.billingType === 'retainer') {
    const r = proj.retainer || {};
    const blended = r.hoursIncluded > 0 ? (r.monthlyFee || 0) / r.hoursIncluded : 0;
    return entry.hours * blended;
  }
  if (proj.billingType === 'variable_retainer') {
    // Per-entry: use the approved hourly rate for that month
    const vr = proj.variableRetainer || {};
    const entryMo = entry._month || entryMonth(entry);
    const approval = vr.approvals?.[entryMo];
    const rate = approval?.hourlyRate !== undefined ? approval.hourlyRate : (vr.hourlyRate || 0);
    return entry.hours * rate;
  }
  const { rate } = getEffectiveRate(entry.teamMemberId, entry.projectId);
  return rate * entry.hours;
}

// Accurate total billable for a project in a given month — handles retainer/fixed correctly
function getMonthBillable(projectId, month) {
  const proj = getProject(projectId);
  const billingDay = proj.billingType === 'retainer' ? (proj.retainer?.billingDay || 1) : 1;

  // For retainer with non-standard billing day, filter entries by the actual date range
  let monthEntries;
  if (proj.billingType === 'retainer' && billingDay > 1) {
    const range = getRetainerPeriodRange(month, billingDay);
    monthEntries = (DB.timeEntries||[]).filter(e =>
      e.projectId === projectId && e.date && e.date >= range.start && e.date <= range.end
    );
  } else {
    monthEntries = (DB.timeEntries||[]).filter(e =>
      e.projectId === projectId && (e._month || entryMonth(e)) === month
    );
  }

  const billableHours = monthEntries.filter(e => !e.nonBillable).reduce((s,e) => s + e.hours, 0);
  switch (proj.billingType) {
    case 'retainer': {
      const r = proj.retainer || {};
      const overage = Math.max(0, billableHours - (r.hoursIncluded || 0));
      return (r.monthlyFee || 0) + (r.overageEnabled && overage > 0 ? overage * (r.overageRate || 0) : 0);
    }
    case 'fixed':
      return proj.fixedFee || 0;
    case 'variable_retainer': {
      const vr = proj.variableRetainer || {};
      const approval = vr.approvals?.[month];
      if (!approval) return monthEntries.reduce((s,e) => s + entryBillable(e), 0);
      // If fee directly approved, use that; otherwise hours × rate
      if (approval.feeApproved > 0) return approval.feeApproved;
      const rate = approval.hourlyRate !== undefined ? approval.hourlyRate : (vr.hourlyRate || 0);
      return (approval.hoursApproved || 0) * rate;
    }
    default:
      return monthEntries.reduce((s,e) => s + entryBillable(e), 0);
  }
}

function entryMonth(e) {
  // use cached _month if available (set by _buildEntryIndex), else compute
  return e._month || e.month || dateToMonth(e.date) || '';
}
// Returns YYYY-MM period key for a date under a retainer billing cycle
// billingDay=1 → standard calendar month; billingDay=15 → Apr 15–May 14 = "April" (2024-04)
function getRetainerPeriod(dateStr, billingDay) {
  if (!dateStr) return '';
  const day = parseInt(billingDay) || 1;
  if (day <= 1) return dateStr.slice(0, 7);
  const d = new Date(dateStr + 'T00:00:00');
  const dd = d.getDate();
  if (dd >= day) {
    // Date is on/after billing day → belongs to this calendar month's cycle
    return dateStr.slice(0, 7);
  } else {
    // Date is before billing day → belongs to previous calendar month's cycle
    const prev = new Date(d.getFullYear(), d.getMonth() - 1, 1);
    return prev.getFullYear() + '-' + String(prev.getMonth() + 1).padStart(2, '0');
  }
}

// Returns the date range for a retainer period label (YYYY-MM) given a billingDay
function getRetainerPeriodRange(periodKey, billingDay) {
  const day = parseInt(billingDay) || 1;
  if (day <= 1) {
    // Standard month
    const [y, m] = periodKey.split('-').map(Number);
    const lastDay = new Date(y, m, 0).getDate();
    return {
      start: periodKey + '-01',
      end: `${y}-${String(m).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`,
    };
  }
  const [y, m] = periodKey.split('-').map(Number);
  const startStr = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  // End = day-1 of next month
  const endYear = m === 12 ? y + 1 : y;
  const endMonth = m === 12 ? 1 : m + 1;
  const endStr = `${endYear}-${String(endMonth).padStart(2,'0')}-${String(day - 1).padStart(2,'0')}`;
  return { start: startStr, end: endStr };
}

// Format a date range compactly, e.g. "15 Apr – 14 May 2024"
function fmtDateRange(start, end) {
  const opts = { day: 'numeric', month: 'short' };
  const optsY = { day: 'numeric', month: 'short', year: 'numeric' };
  const s = new Date(start + 'T00:00:00');
  const e = new Date(end + 'T00:00:00');
  const sy = s.getFullYear(), ey = e.getFullYear();
  const sf = s.toLocaleDateString('en-GB', sy === ey ? opts : optsY);
  const ef = e.toLocaleDateString('en-GB', optsY);
  return `${sf} – ${ef}`;
}

function allMonths() {
  const months = new Set((DB.timeEntries || []).map(e => entryMonth(e)).filter(Boolean));
  const now = new Date();
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.add(`${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}`);
  }
  return [...months].sort().reverse();
}

function fmtMonth(m) {
  if (!m) return '';
  const [y, mo] = m.split('-');
  const d = new Date(y, mo-1, 1);
  return d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

let _currentMonthCache = null;
let _currentMonthCacheDate = null;
function currentMonth() {
  const today = new Date().toDateString();

  _currentMonthCache = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}`;
  _currentMonthCacheDate = today;

}

// Build a URL hash from the current navigation state
function buildHash(view) {
  let hash = '#/' + view;
  if (view === 'clients') {
    hash += '/' + clientsTab;
    if (projectDrillId) hash += '/project/' + projectDrillId;
  }
  if (view === 'myhours' && myHoursState.projectDrillId) {
    hash += '/project/' + myHoursState.projectDrillId;
  }
  if (view === 'settings' && settingsPage) {
    hash += '/' + settingsPage;
  }
  return hash;
}

// Parse a URL hash and return { view, ...state }
function parseHash(hash) {
  const clean = (hash || '').replace(/^#\/?/, '');
  if (!clean) return null;
  const parts = clean.split('/');
  const view = parts[0];
  const state = {};
  if (view === 'clients') {
    state.clientsTab = parts[1] || 'projects';
    if (parts[2] === 'project') state.projectDrillId = parts[3] || null;
  }
  if (view === 'myhours' && parts[1] === 'project') {
    state.projectDrillId = parts[2] || null;
  }
  if (view === 'settings' && parts[1]) {
    state.settingsPage = parts[1];
  }
  return { view, ...state };
}

let _toastTimer;

function toast(msg, type='success') {
  const old = document.querySelector('.toast');
  if (old) { old.remove(); clearTimeout(_toastTimer); }

  const icons = {
    success: '✅',
    error:   '😬',
    info:    '💡',
  };

  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span class="toast-icon">${icons[type]||'✅'}</span><span class="toast-msg">${msg}</span>`;

  const dismiss = () => {
    el.classList.add('leaving');
    clearTimeout(_toastTimer);
    setTimeout(() => el.remove(), 240);
  };

  el.addEventListener('click', dismiss);
  document.body.appendChild(el);

  const duration = type === 'error' ? 4000 : 3000;
  _toastTimer = setTimeout(dismiss, duration);
}

function hexToRgb(hex) {

}

  };

  const root = document.documentElement;

  }
}

function shadeColor(hex, percent) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0xFF) + percent));
  const b = Math.min(255, Math.max(0, (num & 0xFF) + percent));
  return '#' + ((1 << 24) | (r << 16) | (g << 8) | b).toString(16).slice(1);
}

// Robust date normaliser for import — handles all common formats
// format: 'dmy' | 'mdy' | 'ymd' (for ambiguous numeric dates)
function normaliseImportDate(raw, fmt = 'dmy') {
  if (!raw) return null;
  const s = raw.toString().trim();

  // Strip time component from ISO datetime (2024-03-15T00:00:00Z)
  const iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (iso) {
    const [, y, m, d] = iso;
    if (isValidDate(+y, +m, +d)) return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }

  // Excel serial number (e.g. 45365 = days since 1899-12-30)
  if (/^\d{5}$/.test(s)) {
    const serial = parseInt(s);
    if (serial > 25000 && serial < 60000) {
      const epoch = new Date(Date.UTC(1899, 11, 30));
      epoch.setUTCDate(epoch.getUTCDate() + serial);
      const y = epoch.getUTCFullYear();
      const m = epoch.getUTCMonth() + 1;
      const d = epoch.getUTCDate();
      return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    }
  }

  // Text month names: "15 Mar 2024", "Mar 15, 2024", "March 15 2024"
  const months = { jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12 };
  const txtMatch = s.match(/^(\d{1,2})\s+([a-zA-Z]{3,9})[,\s]+(\d{2,4})$/) ||
                   s.match(/^([a-zA-Z]{3,9})[,\s]+(\d{1,2})[,\s]+(\d{2,4})$/);
  if (txtMatch) {
    let day, monthName, year;
    if (!isNaN(+txtMatch[1])) { day = +txtMatch[1]; monthName = txtMatch[2]; year = +txtMatch[3]; }
    else { monthName = txtMatch[1]; day = +txtMatch[2]; year = +txtMatch[3]; }
    const mo = months[monthName.slice(0,3).toLowerCase()];
    if (mo) {
      const y = year < 100 ? 2000 + year : year;
      if (isValidDate(y, mo, day)) return `${y}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
  }

  // Numeric with separator: handles /, -, .
  const parts = s.match(/^(\d{1,4})[\/.\-](\d{1,2})[\/.\-](\d{2,4})$/);
  if (parts) {
    let [, a, b, c] = parts;
    let y, m, d;

    if (a.length === 4) {
      // YYYY/MM/DD or YYYY-MM-DD
      y = +a; m = +b; d = +c;
    } else {
      const yr = c.length === 2 ? 2000 + +c : +c;
      if (fmt === 'dmy') { d = +a; m = +b; y = yr; }
      else if (fmt === 'mdy') { m = +a; d = +b; y = yr; }
      else { y = +a; m = +b; d = +c; }
    }

    // Auto-correct ambiguous: if month > 12, swap m and d
    if (m > 12 && d <= 12) { const tmp = m; m = d; d = tmp; }
    if (isValidDate(y, m, d)) return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  return null; // unparseable
}

function isValidDate(y, m, d) {
  if (y < 2000 || y > 2099) return false;
  if (m < 1 || m > 12 || d < 1 || d > 31) return false;
  const dt = new Date(y, m - 1, d);
  return dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
}

}

// Hardcoded fallback — survives any cache/localStorage clear
const _SUPA_FALLBACK = {
  url: 'https://zdbknsexwavcknvwqbeg.supabase.co',
  anonKey: '',
  workspaceId: 'default'
};

function supaCfg() {
  try {
    const raw = localStorage.getItem(SUPA_KEY);
    if (raw) {
      const cfg = JSON.parse(raw);
      if (cfg.url && cfg.anonKey) return cfg;
    }
  } catch { /* fall through */ }
  // Always fall back to hardcoded credentials — restore to localStorage
  localStorage.setItem(SUPA_KEY, JSON.stringify(_SUPA_FALLBACK));
  return _SUPA_FALLBACK;
}

function saveSupa(cfg) {
  try { localStorage.setItem(SUPA_KEY, JSON.stringify(cfg)); } catch(_) {}
  setTimeout(initRealtimeSync, 500); // reconnect realtime with new credentials
}

function clearSupa() {
  localStorage.removeItem(SUPA_KEY);
}

async function supaFetch(path, options = {}) {
  const cfg = supaCfg();
  if (!cfg) return null;
  const url = cfg.url.replace(/\/$/, '') + '/rest/v1' + path;
  const res = await fetch(url, {
    ...options,
    headers: {
      ...supaHeaders(cfg.anonKey),
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Supabase ${res.status}: ${txt}`);
  }
  // Safely parse — 204 and empty bodies return null instead of throwing
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function supabasePush() {
  _lastPushAt = Date.now(); // mark our own push to suppress realtime echo
  const cfg = supaCfg();
  if (!cfg) return;
  // GATE 1: session must have confirmed remote state before any write
  if (!_supabaseReady) {
    showSyncBlockedOverlay();
    return;
  }
  // GATE 2: never overwrite remote data with an empty local DB
  if (!DB.teamMembers?.length) {
    return;
  }
  const workspaceId = cfg.workspaceId || 'default';
  try {
    await supaFetch('/mis_workspaces', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=minimal', // always 204, no body
      body: JSON.stringify({
        id: workspaceId,
        data: DB,
        updated_at: new Date().toISOString(),
      }),
    });
  } catch(e) {
    updateSyncIndicator('error');
  }
}

// Pull from Supabase and merge into DB (Supabase wins on conflict)
async function supabasePull() {
  const cfg = supaCfg();
  if (!cfg) return false;
  const workspaceId = cfg.workspaceId || 'default';
  try {
    const rows = await supaFetch(`/mis_workspaces?id=eq.${encodeURIComponent(workspaceId)}&select=data,updated_at`);
    if (!rows || !rows.length) {
      // Remote row doesn't exist yet — safe to push a new workspace
      _supabaseReady = true;
      return false;
    }
    const remote = rows[0].data;
    if (!remote) {
      // Row exists but data is empty — safe to push
      _supabaseReady = true;
      return false;
    }
    // Remote is source of truth — overwrite local cache
    if (remote.supabase) delete remote.supabase; // strip legacy credential leaks
    DB = remote;
    localStorage.setItem(KEY, JSON.stringify(DB));
    _supabaseReady = true; // confirmed remote state — pushes now allowed
    return true;
  } catch(e) {
    // Network/auth error — do NOT set _supabaseReady; block all pushes until next pull
    return false;
  }
}

// Build Supabase auth headers — handles both legacy JWT keys (eyJ...) and new publishable keys (sb_publishable_...)
function supaHeaders(anonKey, extra = {}) {
  const isNewFormat = anonKey.startsWith('sb_publishable_') || anonKey.startsWith('sb_secret_');
  return {
    'apikey': anonKey,
    // New format keys must NOT be in Authorization header (not a JWT)
    // Legacy JWT keys go in both headers
    ...(!isNewFormat ? { 'Authorization': 'Bearer ' + anonKey } : {}),
    ...extra,
  };
}

const STORAGE_BUCKET = 'mis-files';

// Upload a File object to Supabase Storage, return public URL
// path example: 'avatars/tm123.jpg'
async function supaUpload(file, path) {
  const cfg = supaCfg();
  if (!cfg) {
    throw new Error('Supabase is not configured. Go to Settings → Supabase Sync to connect your project before uploading files.');
  }

  const baseUrl = cfg.url.replace(/\/$/, '');
  const url = `${baseUrl}/storage/v1/object/${STORAGE_BUCKET}/${path}`;

  const res = await fetch(url, {
    method: 'POST',
    headers: {
      ...supaHeaders(cfg.anonKey, {
        'Content-Type': file.type || 'application/octet-stream',
        'x-upsert': 'true',
      }),
    },
    body: file,
  });

  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Storage upload failed ${res.status}: ${txt}`);
  }

  const publicUrl = `${baseUrl}/storage/v1/object/public/${STORAGE_BUCKET}/${path}`;
  return publicUrl;
}

// Delete a file from Supabase Storage
async function supaDelete(path) {
  const cfg = supaCfg();
  if (!cfg || !path || path.startsWith('data:')) return; // skip base64 or no config
  const baseUrl = cfg.url.replace(/\/$/, '');
  const url = `${baseUrl}/storage/v1/object/${STORAGE_BUCKET}/${path}`;
  await fetch(url, {
    method: 'DELETE',
    headers: supaHeaders(cfg.anonKey),
  }).catch(() => {});
}

// Extract storage path from a public URL (for deletion)
function supaPathFromUrl(url) {
  if (!url || url.startsWith('data:')) return null;
  const marker = `/object/public/${STORAGE_BUCKET}/`;
  const idx = url.indexOf(marker);
  return idx >= 0 ? url.slice(idx + marker.length) : null;
}
