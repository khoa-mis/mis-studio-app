                  <div style="font-size:18px;font-weight:600;color:${color}">${value}</div>
                  ${sub ? `<div style="font-size:11px;color:var(--text-3)">${sub}</div>` : ''}
                </div>`;

              const tiles = [];

              if (toSendAmt > 0)
                tiles.push(tile('To Invoice', fmt(toSendAmt, dc), 'var(--text-3)', `${projRows.filter(r=>!r.inv?.sentDate&&!r.inv?.paidDate&&!r._isPrediction).length} project${projRows.filter(r=>!r.inv?.sentDate&&!r.inv?.paidDate&&!r._isPrediction).length!==1?'s':''}`, '📋'));
              if (invoicedAmt > 0)
                tiles.push(tile('Invoiced', fmt(invoicedAmt, dc), '#4A7FC1', `${selData.useActuals ? 'Actual sent' : 'This month'}`, '🧾'));
              if (sentUnpaidAmt > 0)
                tiles.push(tile('Sent · Awaiting', fmt(sentUnpaidAmt, dc), '#E07030', 'Sent, not yet paid', '⏳'));
              if (expectedAmt > 0)
                tiles.push(tile('Expected In', fmt(expectedAmt, dc), '#7251B5', 'From prior invoices', '📥'));
              if (paidAmt > 0)
                tiles.push(tile('Received (Xero)', fmt(paidAmt, dc), '#2176AE', 'Confirmed bank receipt', '✓'));
              if (costAmt > 0)
                tiles.push(tile('Est. Cost', fmt(costAmt, dc), '#9170D6', 'Payroll incl. 15% buffer', '💼'));
              if (margin !== null)
                tiles.push(tile('Gross Margin', fmt(margin, dc), margin >= 0 ? 'var(--accent)' : '#C0392B',
                  `${Math.round(margin / revenueBase * 100)}% on ${invoicedAmt > 0 ? 'invoiced' : 'forecast'}`, '📊'));

              if (!tiles.length) return '';
              return `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bg);display:flex;flex-wrap:wrap;gap:20px 32px;align-items:flex-start">
                ${tiles.join('<div style="width:1px;background:var(--border);align-self:stretch;opacity:.5"></div>')}
              </div>`;
            })()}
          </div>

          ${selData.byProject.length ? (() => {
            const projRows  = selData.byProject.filter(r => !r._isPrediction);
            const predRows  = selData.byProject.filter(r => r._isPrediction);
            const renderRow = r => {
              const inv = r.inv;
              const fmtShort = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}) : '';
              const invBadge = !inv ? '' :
                inv.paidDate ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#678F2F;background:rgba(103,143,47,0.1);border-radius:100px;white-space:nowrap;padding:2px 7px;cursor:pointer" class="inv-badge" data-proj-id="${r.projId}" data-month="${selectedMonth}">✓ ${fmtShort(inv.paidDate)}</span>` :
                inv.sentDate ? `<div style="display:inline-flex;flex-direction:column;align-items:flex-start;gap:2px">
                  <span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:#4A7FC1;background:rgba(74,127,193,0.1);border-radius:100px;white-space:nowrap;padding:2px 7px;cursor:pointer" class="inv-badge" data-proj-id="${r.projId}" data-month="${selectedMonth}">Sent ${fmtShort(inv.sentDate)}</span>
                  ${inv.dueDate ? `<span style="font-size:10px;color:var(--text-3);padding-left:6px">Due ${fmtShort(inv.dueDate)}</span>` : ''}
                </div>` :
                `<span style="font-size:10px;color:var(--text-3);cursor:pointer;padding:2px 4px;border-radius:3px" class="inv-badge" data-proj-id="${r.projId}" data-month="${selectedMonth}">+ Log</span>`;
              const recBadge = !inv ? '' :
                inv.paidDate ? `<span style="font-size:11px;font-weight:700;color:var(--accent);cursor:pointer" class="inv-badge" data-proj-id="${r.projId}" data-month="${selectedMonth}">${inv.paidAmt > 0 ? fmt(inv.paidAmt, dc) : '✓'}</span>` :
                `<span style="font-size:10px;color:var(--text-3)">—</span>`;
              return `<tr class="${r.projId && !r._isPrediction ? 'proj-date-row' : ''}" data-proj-id="${r.projId||''}" style="border-bottom:1px solid var(--bg);${r.fxWarn?'opacity:0.5':''}${r.projId&&!r._isPrediction?';cursor:default':''}">
                <td style="padding:9px 18px">
                  <div style="font-weight:600;color:${r.isPipeline?'#7EB83B':r._isOverdue?'#C0392B':r._isPrediction?'#4A7FC1':'var(--text)'}">
                    ${r.name}
                    ${r.isPipeline?` <span style="font-size:10px;background:#7EB83B22;color:#7EB83B;border-radius:100px;white-space:nowrap;padding:1px 5px">${r.probability}%</span>`:''}
                    ${r.projId && !r._isPrediction ? `<svg class="proj-date-edit-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11" stroke-linecap="round" style="margin-left:5px;vertical-align:-1px;opacity:0;transition:opacity .1s"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>` : ''}
                  </div>
                  <div style="font-size:11px;color:var(--text-3)">${r.client}</div>
                </td>
                <td style="padding:9px 10px"><span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:100px;white-space:nowrap;background:${r.isPipeline?'#7EB83B22':r._isReceived?'rgba(103,143,47,.12)':r._isOverdue?'rgba(192,57,43,.1)':r._isPrediction?'rgba(74,127,193,.12)':billingColor[r.billing]+'22'};color:${r.isPipeline?'#7EB83B':r._isReceived?'#678F2F':r._isOverdue?'#C0392B':r._isPrediction?'#4A7FC1':billingColor[r.billing]}">${r.isPipeline?'Pipeline':r._isReceived?'Received':r._isOverdue?'Overdue':r._isPrediction?'Expected':billingLabel[r.billing]||r.billing}</span></td>
                <td style="padding:9px 10px;color:${r.fxWarn?'#D4A017':'var(--text-3)'};font-size:11px">${r.note}</td>
                <td style="padding:9px 14px;text-align:center">${invBadge}</td>
                <td style="padding:9px 14px;text-align:center">${recBadge}</td>
                <td style="padding:9px 18px;text-align:right;font-family:monospace;font-weight:700;color:${r.fxWarn?'#D4A017':r.isPipeline?'#7EB83B':r._isOverdue?'#C0392B':r._isPrediction?'#4A7FC1':'var(--accent)'}">${r.fxWarn?'—':fmt(r.amount,dc)}</td>
              </tr>`;
            };
            const predTotal = predRows.reduce((s,r) => s + r.amount, 0);
            return `<table style="width:100%;border-collapse:collapse;font-size:14px">
              <thead><tr style="background:var(--bg)">
                <th style="padding:7px 18px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Project</th>
                <th style="padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Type</th>
                <th style="padding:7px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Basis</th>
                <th style="padding:7px 14px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#4A7FC1;border-bottom:1px solid var(--border)">Invoiced</th>
                <th style="padding:7px 14px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);border-bottom:1px solid var(--border)">Received</th>
                <th style="padding:7px 18px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Forecast</th>
              </tr></thead>
              <tbody>
                ${projRows.map(renderRow).join('')}
                ${(() => {
                  // Split predictions: active (≤90 days past due) vs severely overdue (>90 days)
                  const activePred  = predRows.filter(r => !r._seriouslyOverdue);
                  const seriousPred = predRows.filter(r => r._seriouslyOverdue);
                  const activeTotal  = activePred.reduce((s,r)=>s+r.amount,0);
                  const seriousTotal = seriousPred.reduce((s,r)=>s+r.amount,0);
                  const sectionId    = `proj-serious-${selectedMonth}`;

                  return `
                  ${activePred.length ? `
                  <tr><td colspan="6" style="padding:6px 18px;background:rgba(74,127,193,0.04);border-top:1px solid rgba(74,127,193,0.15);border-bottom:1px solid rgba(74,127,193,0.15)">
                    <div style="display:flex;align-items:center;justify-content:space-between">
                      <div style="display:flex;align-items:center;gap:10px">
                        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#4A7FC1">⏱ Expected Payments from Prior Invoices</span>
                        ${activePred.filter(r=>r._isOverdue).length ? `<span style="font-size:10px;font-weight:700;background:rgba(192,57,43,.1);color:#C0392B;border-radius:100px;white-space:nowrap;padding:1px 7px">${activePred.filter(r=>r._isOverdue).length} overdue</span>` : ''}
                      </div>
                      <span style="font-size:12px;font-weight:700;color:#4A7FC1;font-family:monospace">${fmt(activeTotal, dc)}</span>
                    </div>
                  </td></tr>
                  ${activePred.map(renderRow).join('')}` : ''}
                  ${seriousPred.length ? `
                  <tr><td colspan="6" style="padding:6px 18px;background:rgba(192,57,43,0.04);border-top:1px solid rgba(192,57,43,0.15);border-bottom:1px solid rgba(192,57,43,0.15)">
                    <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer" onclick="const b=document.getElementById('${sectionId}');const i=this.querySelector('.sr-chevron');if(b){const open=b.style.display==='';b.style.display=open?'none':'';i.style.transform=open?'rotate(-90deg)':'rotate(0deg)';}">
                      <div style="display:flex;align-items:center;gap:10px">
                        <svg class="sr-chevron" viewBox="0 0 24 24" fill="none" stroke="#C0392B" stroke-width="2.5" width="12" height="12" style="transition:transform .2s;transform:rotate(-90deg)"><polyline points="6 9 12 15 18 9"/></svg>
                        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#C0392B">⚠ Seriously Overdue (90+ days)</span>
                        <span style="font-size:10px;font-weight:700;background:rgba(192,57,43,.1);color:#C0392B;border-radius:100px;white-space:nowrap;padding:1px 7px">${seriousPred.length} invoice${seriousPred.length!==1?'s':''}</span>
                      </div>
                      <span style="font-size:12px;font-weight:700;color:#C0392B;font-family:monospace">${fmt(seriousTotal, dc)}</span>
                    </div>
                  </td></tr>
                  <tbody id="${sectionId}" style="display:none">
                    ${seriousPred.map(renderRow).join('')}
                  </tbody>` : ''}`;
                })()}
              </tbody>
            </table>`;
          })() : `<div class="empty-state" style="padding:24px"><p>No forecast data for ${fmtM(selectedMonth)}.</p></div>`}
        </div>

        <!-- Soft pipeline (50–79%) -->
        ${softPipeline.length ? `
        <div class="card" style="padding:0;overflow:hidden">
          <div style="padding:12px 18px;border-bottom:1px solid var(--border)">
            <div style="font-size:18px;font-weight:400;color:var(--text)">Soft Pipeline <span style="font-size:13px;color:var(--text-3)">50–79%</span></div>
            <div style="font-size:11px;color:var(--text-3);margin-top:2px">Not in forecast — weighted: <strong>${fmt(softPipelineWeighted, dc)}</strong></div>
          </div>
          <table style="width:100%;border-collapse:collapse;font-size:14px">
            <thead><tr style="background:var(--bg)">
              <th style="padding:7px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Deal</th>
              <th style="padding:7px 10px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Prob.</th>
              <th style="padding:7px 14px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Weighted</th>
            </tr></thead>
            <tbody>
              ${softPipeline.sort((a,b) => (b.value*b.probability)-(a.value*a.probability)).map(d => {
                const res = toDefaultCurrency(Math.round(d.value*d.probability/100), d.currency);
                return `<tr style="border-bottom:1px solid var(--bg)">
                  <td style="padding:8px 14px;font-weight:600">${d.name}<div style="font-size:11px;color:var(--text-3)">${d.stageName}</div></td>
                  <td style="padding:8px 10px;text-align:center;font-size:11px;font-weight:700;color:#7EB83B">${d.probability}%</td>
                  <td style="padding:8px 14px;text-align:right;font-family:monospace;font-weight:700;color:var(--text-2)">${res.ok?fmt(res.value,dc):fmt(d.value,d.currency)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>` : ''}
      </div>
    `;

    el.querySelectorAll('.proj-month-bar').forEach(b => b.addEventListener('click', () => { selectedMonth = b.dataset.month; renderAll(); }));
    el.querySelectorAll('.proj-month-sel').forEach(b => b.addEventListener('click', () => { selectedMonth = b.dataset.month; renderAll(); }));
    el.querySelectorAll('.proj-date-row').forEach(row => {
      row.addEventListener('mouseenter', () => { const ic = row.querySelector('.proj-date-edit-icon'); if (ic) ic.style.opacity = '1'; });
      row.addEventListener('mouseleave', () => { const ic = row.querySelector('.proj-date-edit-icon'); if (ic) ic.style.opacity = '0'; });
      row.querySelector('.proj-date-edit-icon')?.closest('div')?.addEventListener('click', e => {
        if (e.target.closest('.inv-badge')) return; // let badge handle it
        const projId = row.dataset.projId;
        if (!projId) return;
        const proj = (DB.projects || []).find(p => p.id === projId);
        if (!proj) return;
        showProjDateModal(proj, () => { renderAll(); });
      });
    });

    // Invoice tracking modal
    el.querySelectorAll('.inv-badge').forEach(badge => {
      badge.addEventListener('click', e => {
        e.stopPropagation();
        const projId = badge.dataset.projId;
        const month  = badge.dataset.month;
        const proj   = (DB.projects||[]).find(p => p.id === projId);
        if (!proj) return;
        const log    = (proj.invoiceLog || {})[month] || {};
        const projectedAmt = selData.byProject.find(r => r.projId === projId)?.amount || 0;
        const o = document.createElement('div');
        o.className = 'modal-overlay';
        o.innerHTML = `
          <div class="modal" style="max-width:420px">
            <div class="modal-header">
              <div class="modal-title" style="font-size:14px">${proj.name}<span style="font-size:11px;font-weight:400;color:var(--text-3);margin-left:8px">${fmtM(month)}</span></div>
              <button class="modal-close" id="il-close">✕</button>
            </div>
            <div class="modal-body">
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                <div>
                  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#4A7FC1;margin-bottom:10px">Invoice Sent</div>
                  <div class="form-group" style="margin-bottom:10px"><label>Date</label><input type="date" id="il-sent-date" value="${log.sentDate||''}"></div>
                  <div class="form-group"><label>Amount <span style="font-size:10px;font-weight:400;color:var(--text-3)">(${dc})</span></label>
                    <input type="number" id="il-sent-amt" value="${log.sentAmt||projectedAmt||''}" min="0" step="100" placeholder="${projectedAmt ? fmt(projectedAmt,dc) : '0'}">
                    ${projectedAmt ? `<div class="form-hint">Forecast: ${fmt(projectedAmt,dc)}</div>` : ''}
                  </div>
                </div>
                <div>
                  <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:10px">Payment Received</div>
                  <div class="form-group" style="margin-bottom:10px"><label>Date</label><input type="date" id="il-paid-date" value="${log.paidDate||''}"></div>
                  <div class="form-group"><label>Amount <span style="font-size:10px;font-weight:400;color:var(--text-3)">(${dc})</span></label>
                    <input type="number" id="il-paid-amt" value="${log.paidAmt||''}" min="0" step="100" placeholder="0">
                  </div>
                </div>
              </div>
              <div class="form-actions" style="margin-top:16px">
                <button class="btn btn-ghost" id="il-clear" style="color:var(--danger);margin-right:auto">Clear</button>
                <button class="btn btn-ghost" id="il-cancel">Cancel</button>
                <button class="btn btn-primary" id="il-save">Save</button>
              </div>
            </div>
          </div>`;
        document.body.appendChild(o);
        o.querySelector('#il-close').onclick = o.querySelector('#il-cancel').onclick = () => o.remove();
        o.addEventListener('click', ev => { if (ev.target === o) o.remove(); });
        o.querySelector('#il-clear').onclick = () => {
          const idx = (DB.projects||[]).findIndex(p => p.id === projId);
          if (idx < 0) return;
          if (DB.projects[idx].invoiceLog) delete DB.projects[idx].invoiceLog[month];
          saveDB(); o.remove(); renderAll();
        };
        o.querySelector('#il-save').onclick = () => {
          const sentDate = o.querySelector('#il-sent-date').value;
          const sentAmt  = parseFloat(o.querySelector('#il-sent-amt').value) || 0;
          const paidDate = o.querySelector('#il-paid-date').value;
          const paidAmt  = parseFloat(o.querySelector('#il-paid-amt').value) || 0;
          const idx = (DB.projects||[]).findIndex(p => p.id === projId);
          if (idx < 0) return;
          if (!DB.projects[idx].invoiceLog) DB.projects[idx].invoiceLog = {};
          DB.projects[idx].invoiceLog[month] = { sentDate, sentAmt, paidDate, paidAmt };
          saveDB(); o.remove(); renderAll();
        };
        // Auto-fill paid amount with sent amount on paid date entry
        o.querySelector('#il-paid-date').addEventListener('change', () => {
          const paidAmt = o.querySelector('#il-paid-amt');
          if (!paidAmt.value) paidAmt.value = o.querySelector('#il-sent-amt').value;
        });
      });
    });

    const aiBtn = el.querySelector('#ai-run-btn');
    if (aiBtn) aiBtn.addEventListener('click', runAIAnalysis);
    const aiToggle = el.querySelector('#ai-toggle-btn');
    if (aiToggle) aiToggle.addEventListener('click', () => { aiExpanded = !aiExpanded; renderAll(); });

    // ── Bar chart tooltip ─────────────────────────────────────
    const tip     = el.querySelector('#proj-tip');
    const wrap    = el.querySelector('#proj-chart-wrap');
    if (tip && wrap) {
      const bars = el.querySelectorAll('.proj-month-bar');
      bars.forEach(bar => {
        bar.addEventListener('mouseenter', e => {
          const month      = bar.dataset.month;
          const xero       = parseFloat(bar.dataset.xero) || 0;
          const confirmed  = parseFloat(bar.dataset.confirmed) || 0;
          const pipeline   = parseFloat(bar.dataset.pipeline) || 0;
          const cost       = parseFloat(bar.dataset.cost) || 0;
          const total      = confirmed + pipeline;
          const isPast     = month < currentMonth;
          const isCur      = month === currentMonth;

          const dot = (color, text) =>
            `<div style="display:flex;align-items:center;gap:7px;margin-top:4px">
              <div style="width:9px;height:9px;border-radius:2px;background:${color};flex-shrink:0"></div>
              <span style="color:rgba(255,255,255,.65)">${text}</span>
            </div>`;

          let html = `<div style="font-size:13px;font-weight:600;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:6px">${fmtM(month)}${isCur?' <span style="font-size:10px;font-weight:400;opacity:.6">current</span>':isPast?' <span style="font-size:10px;font-weight:400;opacity:.6">past</span>':''}</div>`;
          if (xero > 0)      html += dot('linear-gradient(180deg,#3D9FD4,#1358A0)', `Xero received: <strong style="color:#fff">${fmt(xero,dc)}</strong>`);
          if (confirmed > 0) html += dot('linear-gradient(180deg,#5CAE3F,#2E6B22)', `Confirmed: <strong style="color:#fff">${fmt(confirmed,dc)}</strong>`);
          if (pipeline > 0)  html += dot('#7EB83B', `Pipeline ≥80%: <strong style="color:#fff">${fmt(pipeline,dc)}</strong>`);
          if (total > 0)     html += `<div style="margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.12);font-size:13px">Total forecast: <strong style="color:#fff">${fmt(total,dc)}</strong></div>`;
          if (cost > 0)      html += dot('linear-gradient(180deg,#9170D6,#5338A0)', `Est. cost +15%: <strong style="color:#fff">${fmt(cost,dc)}</strong>`);
          if (total > 0 && cost > 0) {
            const margin = total - cost;
            const pct    = Math.round((margin / total) * 100);
            html += `<div style="font-size:11px;color:${margin>=0?'#7EB83B':'#E57373'};margin-top:3px">Margin: ${fmt(margin,dc)} (${pct}%)</div>`;
          }
          // Forecast vs actual variance for past months
          if (isPast && total > 0) {
            const diff    = xero - total;
            const varPct  = Math.round((diff / total) * 100);
            const isOver  = diff >= 0;
            html += `<div style="margin-top:7px;padding-top:6px;border-top:1px solid rgba(255,255,255,.12);font-size:13px">
              vs forecast: <strong style="color:${isOver?'#7EB83B':'#E57373'}">${isOver?'+':''}${varPct}%</strong>
              <span style="font-size:10px;opacity:.5">(Xero ${xero>0?fmt(xero,dc):'$0'} / forecast ${fmt(total,dc)})</span>
            </div>`;
          }

          tip.innerHTML = html;
          tip.style.display = 'block';

          // Position: above the column, clamped to wrap bounds
          const wrapRect = wrap.getBoundingClientRect();
          const barRect  = bar.getBoundingClientRect();
          let left = barRect.left - wrapRect.left + barRect.width / 2 - tip.offsetWidth / 2;
          left = Math.max(4, Math.min(left, wrapRect.width - tip.offsetWidth - 4));
          const top = barRect.top - wrapRect.top - tip.offsetHeight - 8;
          tip.style.left = left + 'px';
          tip.style.top  = Math.max(4, top) + 'px';
        });
        bar.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
      });
    }
  }

  renderAll();
}


function renderPerformance(el, acts) {
  if (drillState && drillState.type === 'member') {
    renderMemberDrill(el, acts);
    return;
  }

  const months = allMonths();
  const { month, category } = perfFilters;
  const categoryMemberIds = category
    ? new Set(DB.teamMembers.filter(m => m.category === category).map(m => m.id))
    : null;

  // Put filters in the topbar
  acts.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px">
      <select id="f-month" style="font-size:13px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:var(--font);outline:none;cursor:pointer">
        <option value="">All Months</option>
        ${months.map(m=>`<option value="${m}" ${m===month?'selected':''}>${fmtMonth(m)}</option>`).join('')}
      </select>
      <select id="f-category" style="font-size:13px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-family:var(--font);outline:none;cursor:pointer">
        <option value="">All Categories</option>
        ${['Admin','Technology','PM/AM','Quality Control'].map(c=>`<option value="${c}" ${c===category?'selected':''}>${c}</option>`).join('')}
      </select>
      <button class="btn btn-secondary btn-sm" id="nudge-btn" style="white-space:nowrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.14 9.8 19.79 19.79 0 0 1 1.08 1.16 2 2 0 0 1 3.07.98h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
        Nudge Incomplete
      </button>
    </div>
  `;

  // Wire filter events from topbar
  ['f-month','f-category'].forEach(id => {
    document.getElementById(id)?.addEventListener('change', e => {
      const key = { 'f-month':'month', 'f-category':'category' }[id];
      perfFilters[key] = e.target.value;
      renderView();
    });
  });

  // Wire Nudge Incomplete button
  document.getElementById('nudge-btn')?.addEventListener('click', async () => {
    const btn = document.getElementById('nudge-btn');

    // Find members who are tracked, have hours < available, and have an email
    const incompleteMembers = DB.teamMembers.filter(m => {
      if (m.archived) return false;
      if (m.trackUtilisation === false) return false;
      if (!m.email) return false;
      if (category && m.category !== category) return false;
      const logged = DB.timeEntries
        .filter(e => e.teamMemberId === m.id && entryMonth(e) === month)
        .reduce((s,e) => s+e.hours, 0);
      return !m.noTargetHours && logged < effectiveAvailH(m, logged, month);
    });

    if (!incompleteMembers.length) {
      toast('Everyone\'s fully logged up — nothing to nudge! 🎉', 'info');
      return;
    }

    // Show confirmation modal
    const bodyHtml = `
      <div style="margin-bottom:16px;font-size:14px;color:var(--text-2)">
        The following <strong>${incompleteMembers.length} team member${incompleteMembers.length!==1?'s':''}</strong> haven't completed their timesheets for <strong>${fmtMonth(month)}</strong>:
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;max-height:260px;overflow-y:auto">
        ${incompleteMembers.map(m => {
          const logged = entriesByMemberMonth(m.id, month).reduce((s,e)=>s+e.hours,0);
          const avail = m.availableHours||160;
          const pct = Math.round((logged/avail)*100);
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-radius:var(--radius-sm)">
            ${memberAvatar(m)}
            <div style="flex:1">
              <div style="font-weight:600;font-size:13px">${displayName(m)}</div>
              <div class="micro-11">${m.email}</div>
            </div>
            <div style="text-align:right;font-size:14px">
              <span style="font-weight:700">${logged.toFixed(1)}h</span>
              <span style="color:var(--text-3)"> / ${avail}h</span>
              <div style="color:var(--text-3)">${pct}% complete</div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div id="nudge-status" style="margin-bottom:12px"></div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="nudge-cancel">Cancel</button>
        <button class="btn btn-primary" id="nudge-confirm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.14 9.8 19.79 19.79 0 0 1 1.08 1.16 2 2 0 0 1 3.07.98h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21 16.92z"/></svg>
          Send Nudge to ${incompleteMembers.length}
        </button>
      </div>
    `;

    const overlay = showModal('⏰ Nudge Incomplete Timesheets', bodyHtml);
    overlay.querySelector('#nudge-cancel').onclick = () => overlay.remove();

    overlay.querySelector('#nudge-confirm').onclick = async () => {
      const confirmBtn = overlay.querySelector('#nudge-confirm');
      const statusEl = overlay.querySelector('#nudge-status');
      confirmBtn.disabled = true;
      confirmBtn.textContent = 'Sending…';

      let sent = 0, failed = 0;
      for (const m of incompleteMembers) {
        const logged = entriesByMemberMonth(m.id, month).reduce((s,e)=>s+e.hours,0);
        const avail = m.availableHours||160;
        const remaining = (avail - logged).toFixed(1);
        const nudgeSubject = `⏰ Timesheet reminder — ${fmtMonth(month)}`;
        const nudgeMsg = `Hi ${m.name},\n\nJust a friendly nudge — your timesheet for ${fmtMonth(month)} looks incomplete.\n\nLogged: ${logged.toFixed(1)}h of ${avail}h (${remaining}h remaining)\n\nPlease log your remaining hours at your earliest convenience.\n\nThanks! 🙏\nmis.studio`;
        // Always create in-app notification
        addNotification(m.id, 'nudge', nudgeSubject, nudgeMsg);
        // Also send email if configured
        const result = await sendNotificationEmail({
          to_email: m.email,
          to_name: m.name,
          from_name: 'mis.studio',
          subject: nudgeSubject,
          message: nudgeMsg,
        });
        if (result.ok) sent++;
        else failed++;
      }

      if (sent > 0) {
        confirmBtn.textContent = `✓ Sent to ${sent}`;
        confirmBtn.style.background = 'var(--accent)';
        statusEl.innerHTML = `<div class="status-success">
          ✓ Nudge sent to ${sent} team member${sent!==1?'s':''}${failed>0?` (${failed} failed — check EmailJS config)`:''}
        </div>`;
        toast(`Nudge sent to ${sent} team member${sent!==1?'s':''}! 📬`);
      } else {
        statusEl.innerHTML = `<div class="status-error">
          Failed to send — check your EmailJS configuration in Settings.
        </div>`;
        confirmBtn.disabled = false;
        confirmBtn.textContent = `Send Nudge to ${incompleteMembers.length}`;
      }
    };
  });

  // Build index first so e._month is populated on all entries
  _buildEntryIndex();
  // Filter using cached _month — avoids O(n) entryMonth() calls per entry
  let entries = (month && categoryMemberIds)
    ? [...categoryMemberIds].flatMap(mid => entriesByMemberMonth(mid, month))
    : month
      ? DB.teamMembers.flatMap(m => entriesByMemberMonth(m.id, month))
      : categoryMemberIds
        ? [...categoryMemberIds].flatMap(mid => entriesByMember(mid))
        : DB.timeEntries;

  const totalHours = entries.reduce((s,e)=>s+e.hours,0);
  const totalEntries = entries.length;

  // by member
  const memberMap = {};
  entries.forEach(e => {
    if (!memberMap[e.teamMemberId]) memberMap[e.teamMemberId] = { hours: 0, billable: 0, entries: 0, currency: '' };
    memberMap[e.teamMemberId].hours += e.hours;
    memberMap[e.teamMemberId].billable += entryBillable(e);
    memberMap[e.teamMemberId].entries++;
    memberMap[e.teamMemberId].currency = getEntryCurrency(e);
  });

  // stat cards
  const uniqueClients = new Set(entries.map(e=>e.clientId)).size;

  // Utilisation calculations — only include members flagged for utilisation tracking
  const trackedMembers = DB.teamMembers.filter(m =>
    !m.archived && (!categoryMemberIds || categoryMemberIds.has(m.id)) && m.trackUtilisation !== false
    && memberActiveInMonth(m.id, month)
  );
  const totalAvailH = trackedMembers.reduce((s, m) => { const lh = Object.values(memberMap[m.id]||{hours:0}).length ? (memberMap[m.id]?.hours||0) : 0; return s + effectiveAvailH(m, lh, month); }, 0);
  const trackedHours = entries
    .filter(e => trackedMembers.some(m => m.id === e.teamMemberId))
    .reduce((s,e) => s + e.hours, 0);
  const billableHours = entries.reduce((s,e) => e.nonBillable ? s : s + e.hours, 0);
  const utilisationPct = totalAvailH > 0 ? Math.min((trackedHours / totalAvailH) * 100, 100) : 0;
  const billablePct = totalHours > 0 ? (billableHours / totalHours) * 100 : 0;
  const remainingH = Math.max(0, totalAvailH - trackedHours);

  // Build 6-month team chart data
  const perfChartMonths = [];
  const now6 = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now6.getFullYear(), now6.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}`;
    // Use index: get all entries for this month across tracked members
    const monthEntries = categoryMemberIds
      ? [...categoryMemberIds].flatMap(mid => entriesByMemberMonth(mid, key))
      : trackedMembers.flatMap(m => entriesByMemberMonth(m.id, key));
    const h = monthEntries.filter(e => trackedMembers.some(m => m.id === e.teamMemberId)).reduce((s,e)=>s+e.hours,0);
    const b = monthEntries.reduce((s,e) => e.nonBillable ? s : s+e.hours, 0);
    perfChartMonths.push({ key, label: d.toLocaleDateString('en-GB',{month:'short'}), hours: h, billable: b });
  }
  const currentPerfIdx = perfChartMonths.findIndex(m => m.key === month);

  el.innerHTML = `
    <div class="section-header" style="margin-bottom:16px">
      <div style="font-family:var(--font);font-size:28px;font-weight:300;color:var(--text);letter-spacing:-0.5px">${fmtMonth(month)} Utilisation</div>
    </div>

    <div class="grid-3 mb-16">
      <div class="card">
        <div class="card-title">Utilisation</div>
        <div class="card-value" style="color:${utilisationPct>=80?'var(--success)':utilisationPct>=50?'var(--text)':'var(--text-3)'}">${utilisationPct.toFixed(0)}%</div>
        <div class="card-sub">${totalHours.toFixed(1)}h of ${totalAvailH.toFixed(0)}h available</div>
      </div>
      <div class="card">
        <div class="card-title">Hours Logged</div>
        <div class="card-value">${totalHours.toFixed(1)}</div>
        <div class="card-sub">${remainingH.toFixed(1)}h remaining</div>
      </div>
      <div class="card">
        <div class="card-title">Billable Hours</div>
        <div class="card-value" style="color:var(--success)">${billableHours.toFixed(1)}</div>
        <div class="card-sub"><strong>${billablePct.toFixed(0)}%</strong> of logged hours</div>
      </div>
    </div>

    <div class="card mb-16" style="padding:20px 20px 16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
        <div>
          <div class="lbl">6-month overview</div>
          <div style="font-size:22px;font-weight:300;color:var(--text)">Team Hours</div>
        </div>
        <div style="text-align:right">
          <div class="lbl">${fmtMonth(month)}</div>
          <div style="font-size:28px;font-weight:600;color:#4a7c25">${totalHours.toFixed(1)}h</div>
          <div class="micro-12">${utilisationPct.toFixed(0)}% utilisation</div>
        </div>
      </div>
      <div style="position:relative;width:100%;height:200px">
        <canvas id="perf-chart"></canvas>
      </div>
      <div style="display:flex;align-items:center;gap:20px;margin-top:12px;font-size:14px;color:var(--text-3)">
        <span class="row-6">
          <span style="width:20px;height:2.5px;background:#4a7c25;display:inline-block;border-radius:2px"></span>
          Hours logged
        </span>
        <span class="row-6">
          <span style="width:20px;height:0;border-top:1.5px dashed rgba(74,124,37,0.5);display:inline-block"></span>
          Capacity (${totalAvailH.toFixed(0)}h)
        </span>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Team Member</th>
              <th>Hours Logged</th>
              <th>Utilisation</th>
              <th>Billable Value</th>
              <th>Entries</th>
            </tr>
          </thead>
          <tbody id="dash-table-body"></tbody>
        </table>
      </div>
    </div>

  `;

  // Init performance chart
  const perfCanvas = el.querySelector('#perf-chart');
  if (perfCanvas && typeof Chart !== 'undefined') {
    if (window._perfChart) { try { window._perfChart.destroy(); } catch(_) {} window._perfChart = null; }
    const ctx = perfCanvas.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 200);
    grad.addColorStop(0, 'rgba(74,124,37,0.18)');
    grad.addColorStop(1, 'rgba(74,124,37,0)');
    const labels = perfChartMonths.map(m => m.label);
    const dataHours = perfChartMonths.map(m => m.hours);
    window._perfChart = new Chart(perfCanvas, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            data: dataHours,
            borderColor: '#4a7c25',
            borderWidth: 2.5,
            backgroundColor: grad,
            fill: true,
            tension: 0.4,
            pointBackgroundColor: dataHours.map((_, i) => i === currentPerfIdx ? '#4a7c25' : '#fff'),
            pointBorderColor: '#4a7c25',
            pointBorderWidth: 2.5,
            pointRadius: dataHours.map((_, i) => i === currentPerfIdx ? 6 : 4),
            pointHoverRadius: dataHours.map((_, i) => i === currentPerfIdx ? 8 : 6),
          },
          {
            data: Array(6).fill(totalAvailH),
            borderColor: 'rgba(74,124,37,0.4)',
            borderWidth: 1.5,
            borderDash: [5, 4],
            fill: false,
            tension: 0,
            pointRadius: 0,
            pointHoverRadius: 0,
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#fff',
            borderColor: 'rgba(74,124,37,0.3)',
            borderWidth: 1,
            titleColor: 'var(--text)',
            bodyColor: '#666',
            padding: 10,
            cornerRadius: 6,
            callbacks: {
              title: (items) => labels[items[0].dataIndex],
              label: (item) => {
                if (item.datasetIndex === 1) return `  Capacity: ${item.raw}h`;
                const h = item.raw;
                const util = totalAvailH > 0 ? ((h/totalAvailH)*100).toFixed(0) : 0;
                return `  Logged: ${h}h  (${util}% utilisation)`;
              }
            }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'Manrope, sans-serif', size: 11 }, color: '#ADADAB' } },
          y: {
            min: 0,
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { font: { family: 'Manrope, sans-serif', size: 11 }, color: '#ADADAB',
              callback: v => v + 'h'
            }
          }
        }
      }
    });
  }

  // Fill member rows
  const tbody = el.querySelector('#dash-table-body');
  const filteredMembers = DB.teamMembers.filter(m =>
    !m.archived && m.trackUtilisation !== false && (!category || m.category === category)
    && memberActiveInMonth(m.id, month)
  );

  if (filteredMembers.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>No team members in this category.</p></div></td></tr>`;
  } else {
    filteredMembers.forEach(mem => {
      const data = memberMap[mem.id] || { hours: 0, billable: 0, entries: 0 };
      const _memLoggedH = memberMap[mem.id]?.hours || 0;
      const avail = effectiveAvailH(mem, _memLoggedH, month);
      const pct = Math.min((data.hours / avail) * 100, 100);
      const over = data.hours > avail;
      const currency = data.currency || mem.defaultCurrency || DB.settings.defaultCurrency;
      const emailDisplay = mem.trackUtilisation === false
        ? '<span style="color:var(--text-3);font-style:italic">excluded from utilisation</span>'
        : mem.email
          ? `<a href="mailto:${mem.email}" style="color:var(--text-3);text-decoration:none" onclick="event.stopPropagation()">${mem.email}</a>`
          : '';
      const tr = document.createElement('tr');
      tr.className = 'clickable';
      tr.innerHTML = `
        <td>
          <div class="flex items-center gap-8">
            <div class="avatar-sm">${initials(mem.name)}</div>
            <div>
              <div style="font-weight:600;font-family:var(--font)">${displayName(mem)}</div>
              <div style="font-size:11px">${emailDisplay}</div>
            </div>
          </div>
        </td>
        <td class="mono">${fmtH(data.hours)} <span class="micro-label">/ ${fmtH(avail)}</span></td>
        <td style="min-width:120px">
          <div style="font-size:14px;color:${over?'var(--danger)':'var(--text-2)'}; margin-bottom:3px">${pct.toFixed(0)}%${over?' <span class="badge badge-red" style="font-size:10px">Over</span>':''}</div>
          <div class="progress-bar"><div class="progress-fill${over?' over':''}" style="width:${pct}%"></div></div>
        </td>
        <td class="mono">${data.hours>0 ? fmt(data.billable, currency) : '—'}</td>
        <td class="muted">${data.entries}</td>
      `;
      tr.onclick = () => {
        drillState = { type: 'member', id: mem.id, month };
        navigate('performance', drillState);
      };
      tbody.appendChild(tr);
    });
  }
}

// ── MEMBER DRILL ──
function renderMemberDrill(el, acts) {
  const { id, month } = drillState;
  const mem = getMember(id);
  if (!mem.id) { navigate('performance'); return; }

  acts.innerHTML = `<button class="btn btn-ghost btn-sm" id="drill-back">← Back to Performance</button>`;
  el.querySelector ? null : null;

  let entries = month ? entriesByMemberMonth(id, month) : entriesByMember(id);

  const totalHours = entries.reduce((s,e)=>s+e.hours,0);
  const totalBillable = entries.reduce((s,e)=>s+entryBillable(e),0);
  const avail = mem.availableHours || 160;
  const currency = mem.defaultCurrency || DB.settings.defaultCurrency;

  el.innerHTML = `
    <div class="breadcrumb">
      <a id="bc-dash">Performance</a>
      <span>›</span>
      <span>${displayName(mem)}</span>
      ${month ? `<span>›</span><span>${fmtMonth(month)}</span>` : ''}
    </div>

    <div class="drill-member-header">
      <div class="avatar">${initials(mem.name)}</div>
      <div style="flex:1">
        <div style="font-family:var(--font);font-size:18px;font-weight:700">${displayName(mem)}</div>
        <div style="font-size:14px;opacity:0.6;margin-top:2px">${mem.email}</div>
      </div>
      <div style="text-align:right">
        <div style="font-family:var(--font);font-size:24px;font-weight:300">${fmtH(totalHours)}</div>
        <div style="font-size:11px;opacity:0.5">of ${fmtH(avail)} available</div>
      </div>
      <div style="text-align:right;margin-left:24px">
        <div style="font-family:var(--font);font-size:24px;font-weight:300;color:var(--accent)">${fmt(totalBillable, currency)}</div>
        <div style="font-size:11px;opacity:0.5">billable value</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Time Entries</div>
      <div style="font-size:14px;color:var(--text-2)">${entries.length} entries ${month ? 'for '+fmtMonth(month) : ''}</div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Client</th><th>Project</th><th>Description</th><th>Month</th><th>Hours</th><th>Rate</th><th>Billable</th></tr></thead>
          <tbody id="drill-body"></tbody>
        </table>
      </div>
    </div>
  `;

  const body = el.querySelector('#drill-body');
  if (entries.length === 0) {
    body.innerHTML = `<tr><td colspan="7" class="text-center muted" style="padding:20px">No entries found.</td></tr>`;
  } else {
    entries.forEach(e => {
      const cli = getClient(e.clientId);
      const proj = getProject(e.projectId);
      const { rate, overridden } = getEffectiveRate(e.teamMemberId, e.projectId);
      const curr = getEntryCurrency(e);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="font-weight:600">${cli.name||'—'}</td>
        <td class="muted">${proj.name||'—'}</td>
        <td class="muted">${e.description||'—'}</td>
        <td class="muted">${fmtMonth(e.month)}</td>
        <td class="mono">${fmtH(e.hours)}</td>
        <td class="mono" style="font-size:14px">${fmt(rate,curr)}/h${overridden?` <span class="badge badge-amber" style="font-size:9px">Override</span>`:''}</td>
        <td class="mono">${fmt(e.hours * rate, curr)}</td>
      `;
      body.appendChild(tr);
    });
  }

  // Add back to topbar actions after render
  setTimeout(() => {
    document.getElementById('drill-back')?.addEventListener('click', () => {
      drillState = null;
      navigate('performance');
    });
    document.getElementById('bc-dash')?.addEventListener('click', () => {
      drillState = null;
      navigate('performance');
    });
  }, 0);
}

          </div>

        <div class="form-row">

          <div class="form-group"><label>Due Date</label><input type="date" id="inv-m-ddate" value="${v.dueDate||''}"></div>
        </div>

          <button class="btn btn-primary" id="inv-m-save">${isEdit ? 'Update' : 'Add Invoice'}</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(o);
  o.querySelector('#inv-m-close').onclick = o.querySelector('#inv-m-cancel').onclick = () => o.remove();
  o.addEventListener('click', e => { if (e.target === o) o.remove(); });
  // Filter projects by selected client
  const clientSel  = o.querySelector('#inv-m-client');
  const projectSel = o.querySelector('#inv-m-project');
  function filterProjects() {
    const cid = clientSel.value;
    Array.from(projectSel.options).forEach(opt => {
      if (!opt.value) return;
      const p = DB.projects.find(p => p.id === opt.value);
      opt.style.display = (!cid || p?.clientId === cid) ? '' : 'none';
    });
  }
  clientSel.addEventListener('change', filterProjects);
  filterProjects();
  o.querySelector('#inv-m-save').onclick = () => {
    const num    = o.querySelector('#inv-m-num').value.trim();
    const amt    = parseFloat(o.querySelector('#inv-m-amt').value) || 0;
    const idate  = o.querySelector('#inv-m-idate').value;
    if (!num) { toast('Invoice number is required','error'); return; }
    if (!idate) { toast('Invoice date is required','error'); return; }
    const record = {
      id:            v.id,
      invoiceNumber: num,
      clientId:      o.querySelector('#inv-m-client').value,
      projectId:     o.querySelector('#inv-m-project').value,
      description:   o.querySelector('#inv-m-desc').value.trim(),
      amount:        amt,
      currency:      o.querySelector('#inv-m-curr').value,
      invoiceDate:   idate,
      dueDate:       o.querySelector('#inv-m-ddate').value,
      xeroInvoice:   o.querySelector('#inv-m-xero').value.trim(),
      paymentDate:   o.querySelector('#inv-m-pdate').value,
      invoiceLink:   o.querySelector('#inv-m-link').value.trim(),
      status:        o.querySelector('#inv-m-status').value,
    };
    if (!DB.invoices) DB.invoices = [];
    if (isEdit) {
      const idx = DB.invoices.findIndex(i => i.id === v.id);
      if (idx >= 0) DB.invoices[idx] = record; else DB.invoices.push(record);
    } else {
      DB.invoices.push(record);
    }
    saveDB(); o.remove(); renderView();
    toast(isEdit ? 'Invoice updated ✓' : 'Invoice added ✓');
  };
}

  o.querySelector('#ii-fetch-btn').addEventListener('click', async () => {
