    stat.innerHTML = 'Fetching…';
    try {
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (!match) throw new Error('Could not extract sheet ID from URL.');
      const sheetId  = match[1];
      // Extract gid from URL if present
      const gidMatch = url.match(/gid=(\d+)/);
      const gid = gidMatch ? gidMatch[1] : '0';
      const tabParam = tab ? `&sheet=${encodeURIComponent(tab)}` : '';
      const gidParam = tab ? '' : `&gid=${gid}`;

      // Fetch JSON to extract hyperlinks (CSV strips them)
      const jsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json${tabParam}${gidParam}`;
      // Fetch CSV for clean data parsing
      const csvUrl  = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv${tabParam}${gidParam}`;

      const [csvRes, jsonRes] = await Promise.all([fetch(csvUrl), fetch(jsonUrl)]);
      if (!csvRes.ok) throw new Error('Could not fetch sheet. Check sharing is set to "Anyone with the link can view".');

      const text = await csvRes.text();

      // Build a map of row → hyperlink URL from JSON response (for first column)
      const hyperlinkByRow = {};
      try {
        const jsonText = await jsonRes.text();
        // Google wraps JSON in /*O_o*/\ngoogle.visualization.Query.setResponse({...})
        const jsonClean = jsonText.replace(/^[^{]*/, '').replace(/\);?\s*$/, '');
        const gdata = JSON.parse(jsonClean);
        const rows = gdata?.table?.rows || [];
        rows.forEach((row, ri) => {
          const cell = row?.c?.[0];
          if (!cell) return;
          let link = '';
          // Format 1: cell.p.url (some versions of the API)
          if (cell.p?.url) link = cell.p.url;
          // Format 2: cell.f contains HTML anchor <a href="...">
          if (!link && cell.f) {
            const hrefMatch = cell.f.match(/href=["']([^"']+)["']/i);
            if (hrefMatch) link = hrefMatch[1];
          }
          // Format 3: cell.f is a plain URL
          if (!link && cell.f && /^https?:\/\//i.test(cell.f.trim())) link = cell.f.trim();
          // Format 4: cell.v is a plain URL (value is the URL itself)
          if (!link && cell.v && /^https?:\/\//i.test(String(cell.v).trim())) link = String(cell.v).trim();
          if (link) hyperlinkByRow[ri] = link;
        });
      } catch(_) { /* JSON parse failed — hyperlinks just won't be available */ }
      // Parse CSV
      const lines = text.trim().split('\n').map(l => l.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)?.map(c => c.replace(/^"|"$/g,'').replace(/""/g,'"').trim()) || l.split(',').map(c=>c.trim()));
      if (lines.length < 2) throw new Error('Sheet appears empty.');
      const headers = lines[0].map(h => h.toLowerCase().replace(/[^a-z0-9]/g,''));
      const col = (row, ...names) => { const idx = headers.findIndex(h => names.some(n => h.includes(n))); return idx >= 0 ? (row[idx]||'').trim() : ''; };
      // Robust date parser → YYYY-MM-DD or '' if unparseable
      function parseImportDate(raw) {
        if (!raw) return '';
        const s = raw.trim();
        if (!s) return '';
        // Already ISO date only: 2025-01-15
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        // ISO datetime with T: 2025-01-15T00:00:00 or 2025-01-15T00:00:00.000Z
        const isodt = s.match(/^(\d{4}-\d{2}-\d{2})T/);
        if (isodt) return isodt[1];
        // ISO datetime with space: "2025-01-15 00:00:00" (Google Sheets CSV export format)
        const isodtSpace = s.match(/^(\d{4}-\d{2}-\d{2})\s/);
        if (isodtSpace) return isodtSpace[1];
        // DD/MM/YYYY or DD-MM-YYYY
        const dmy = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
        if (dmy) return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
        // MM/DD/YYYY (US)
        const mdy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (mdy) {
          const [,a,b,y] = mdy;
          if (parseInt(a) > 12) return `${y}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`;
          return `${y}-${a.padStart(2,'0')}-${b.padStart(2,'0')}`;
        }
        // Textual: "15 Jan 2025", "Jan 15 2025", "January 15, 2025"
        const months = {jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
        const txt = s.match(/(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})/);
        if (txt) {
          const mo = months[txt[2].toLowerCase().slice(0,3)];
          if (mo) return `${txt[3]}-${String(mo).padStart(2,'0')}-${txt[1].padStart(2,'0')}`;
        }
        const txt2 = s.match(/([a-zA-Z]+)\s+(\d{1,2}),?\s+(\d{4})/);
        if (txt2) {
          const mo = months[txt2[1].toLowerCase().slice(0,3)];
          if (mo) return `${txt2[3]}-${String(mo).padStart(2,'0')}-${txt2[2].padStart(2,'0')}`;
        }
        // Last resort: let JS try — use LOCAL date components to avoid UTC timezone shift
        try {
          const d = new Date(s);
          if (!isNaN(d)) {
            const y   = d.getFullYear();
            const m   = String(d.getMonth() + 1).padStart(2,'0');
            const day = String(d.getDate()).padStart(2,'0');
            return `${y}-${m}-${day}`;
          }
        } catch(_) {}
        return '';
      }

      const _rows = lines.slice(1).map((row, rowIdx) => {
        // Extract URL from the first meaningful cell — Google Sheets can export
        // hyperlinks as: (1) plain URL, (2) =HYPERLINK("url","label") formula,
        // or (3) just the display text with URL embedded via gviz tq API as label
        const extractLink = (cellVal) => {
          if (!cellVal) return '';
          // =HYPERLINK("https://...","label") formula
          const hf = cellVal.match(/^=?HYPERLINK\s*\(\s*["']([^"']+)["']/i);
          if (hf) return hf[1];
          // Plain URL in cell
          if (/^https?:\/\//i.test(cellVal.trim())) return cellVal.trim();
          return '';
        };
        // Check invoice number column and also the raw first column for a URL
        const rawInvCell  = (() => { const idx = headers.findIndex(h => ['invoicenumber','invoice','invno','number','num'].some(n => h.includes(n))); return idx >= 0 ? (row[idx]||'') : (row[0]||''); })();
        // Check dedicated url/link column first, then fall back to invoice number cell
        const rawLinkCol = col(row, 'invoiceurl', 'invoice_url', 'invoice url', 'url', 'link', 'docurl', 'document');
        // Also check JSON hyperlink map — rowIdx maps to data rows (header already sliced)
        const invoiceLink = extractLink(rawLinkCol) || extractLink(rawInvCell) || hyperlinkByRow[rowIdx] || '';
        // Clean invoice number — strip any URL or HYPERLINK formula to get just the label
        const cleanInvNum = (v) => {
          const hf = v.match(/^=?HYPERLINK\s*\(\s*["'][^"']*["']\s*,\s*["']([^"']*)["']/i);
          if (hf) return hf[1].trim();
          if (/^https?:\/\//i.test(v.trim())) return '';
          return v.trim();
        };
        return {
        invoiceNumber: cleanInvNum(col(row,'invoicenumber','invoice','invno','number','num')),
        invoiceLink:   invoiceLink,
        clientName:    col(row,'client','customer','company'),
        projectName:   col(row,'project','job'),
        description:   col(row,'description','desc','notes','detail','memo','narrative'),
        amount:        parseFloat(col(row,'amount','total','value').replace(/[^0-9.]/g,'')) || 0,
        currency:      (col(row,'currency','curr') || dc).toUpperCase(),
        invoiceDate:   parseImportDate(col(row,'invoicedate','date','issued')),
        dueDate:       parseImportDate(col(row,'duedate','due','payby')),
        xeroInvoice:   col(row,'xeroinvoice','xero','xerono','xeronumber','xeroid'),
        paymentDate:   parseImportDate(col(row,'paymentdate','payment','paiddate','paid','received')),
        badDebt:       col(row,'baddebt','bad debt','writeoff','write off','written off','uncollectable').toLowerCase().replace(/\s/g,'') === 'yes' || col(row,'baddebt','bad debt','writeoff','write off','written off','uncollectable').toLowerCase().includes('bad') || col(row,'baddebt','bad debt','writeoff','write off','written off','uncollectable') === '1' || col(row,'baddebt','bad debt','writeoff','write off','written off','uncollectable').toLowerCase() === 'true',
        skip:          col(row,'baddebt','bad debt','writeoff','write off','written off','uncollectable').toLowerCase().trim() === 'skip',
        status:        col(row,'status','paid').toLowerCase().includes('paid') ? 'paid' : 'unpaid',
        };
      }).filter(r => r.invoiceNumber || r.amount > 0);
      if (!_rows.length) throw new Error('No valid rows found. Check column headers match expected names.');
      stat.innerHTML = '';
      o.querySelector('#ii-count').textContent = `${_rows.length} invoice${_rows.length!==1?'s':''} ready to import`;

      // Pre-compute matches for preview using same norm logic
      const _norm = s => (s||'').toLowerCase()
        .replace(/[.,\-&]/g,' ')
        .replace(/\s+/g,' ')
        .replace(/\b(pte\s*ltd|pvt\s*ltd|sdn\s*bhd|co\s*ltd|pty\s*ltd|llc|ltd|inc|corp|corporation|limited|pte|pvt|pty|plc|gmbh|bv|nv|sa|srl|sas|ag|kg)\b\.?/gi,' ')
        .replace(/\s+/g,' ').trim();
      const _nameMatch = (a, b) => !!(a && b && (a===b || a.startsWith(b) || b.startsWith(a)));

      const tb = o.querySelector('#ii-table');
      tb.innerHTML = _rows.map(r => {
        const nc = _norm(r.clientName);
        const np = _norm(r.projectName);
        const matchedClient  = DB.clients.find(c => _nameMatch(_norm(c.name), nc));
        const matchedProject = DB.projects.find(p => _nameMatch(_norm(p.name), np) && (!matchedClient || p.clientId === matchedClient.id))
                            || DB.projects.find(p => _nameMatch(_norm(p.name), np));
        const clientCell = matchedClient
          ? `<span style="color:var(--accent);font-weight:600">${r.clientName}</span>
             <a href="#/clients/clients" target="_blank" style="font-size:10px;color:var(--accent);opacity:.7;margin-left:5px;text-decoration:none" title="View in TRACKR">↗</a>
             <div style="font-size:10px;color:var(--text-3)">matched: ${matchedClient.name}</div>`
          : `${r.clientName||'—'}<div style="font-size:10px;color:#E07030">will create</div>`;
        const projectCell = matchedProject
          ? `<span style="color:var(--accent);font-weight:600">${r.projectName}</span>
             <a href="#/clients/projects/project/${matchedProject.id}" target="_blank" style="font-size:10px;color:var(--accent);opacity:.7;margin-left:5px;text-decoration:none" title="View in TRACKR">↗</a>
             <div style="font-size:10px;color:var(--text-3)">matched: ${matchedProject.name}</div>`
          : `${r.projectName||'—'}${r.projectName?'<div style="font-size:10px;color:#E07030">will create</div>':''}`;
        return `<tr style="border-bottom:1px solid var(--bg)">
          <td style="padding:7px 10px;font-family:monospace;font-weight:600">${r.invoiceNumber||'—'}</td>
          <td style="padding:7px 10px">${clientCell}</td>
          <td style="padding:7px 10px">${projectCell}</td>
          <td style="padding:7px 10px;text-align:right;font-weight:700">${fmt(r.amount, r.currency)}</td>
          <td style="padding:7px 10px;color:var(--text-2)">${r.invoiceDate||'—'}</td>
          <td style="padding:7px 10px;color:var(--text-2)">${r.dueDate||'—'}</td>
        </tr>`;
      }).join('');
      o.querySelector('#ii-preview-wrap').style.display = '';
      o.querySelector('#ii-fetch-row').style.display = 'none';

      o.querySelector('#ii-confirm').onclick = () => {
        if (!DB.invoices) DB.invoices = [];
        let added = 0, clientsCreated = 0, projectsCreated = 0;
        const importBatch = Date.now();

        // Normalise: lowercase, collapse whitespace, strip punctuation, strip common company suffixes
        const norm = s => (s||'').toLowerCase()
          .replace(/[.,\-&]/g,' ')
          .replace(/\s+/g,' ')
          .replace(/\b(pte\s*ltd|pvt\s*ltd|sdn\s*bhd|co\s*ltd|pty\s*ltd|llc|ltd|inc|corp|corporation|limited|pte|pvt|pty|plc|gmbh|bv|nv|sa|srl|sas|ag|kg)\b\.?/gi,' ')
          .replace(/\s+/g,' ')
          .trim();

        // Fuzzy match: true if either normalised name starts with the other
        const nameMatch = (a, b) => {
          if (!a || !b) return false;
          return a === b || a.startsWith(b) || b.startsWith(a);
        };

        // Pre-build lookup maps keyed by normalised name
        const clientMap  = new Map(DB.clients.map(c  => [norm(c.name),  c]));
        const projectMap = new Map(DB.projects.map(p => [norm(p.name)+'\x00'+(p.clientId||''), p]));

        // Fuzzy find in map by prefix match
        const findClient  = nName => clientMap.get(nName) || [...clientMap.entries()].find(([k]) => nameMatch(k, nName))?.[1];
        const findProject = (nName, clientId) => {
          // Try client-scoped first, then any
          return projectMap.get(nName+'\x00'+clientId)
            || [...projectMap.entries()].find(([k]) => { const [kn,kc] = k.split('\x00'); return nameMatch(kn, nName) && (!clientId || kc === clientId); })?.[1]
            || [...projectMap.entries()].find(([k]) => nameMatch(k.split('\x00')[0], nName))?.[1];
        };

        // ── Load Xero RECEIVE transactions from cache ─────────
        // Try DB.xeroCache first (synced), fall back to standalone localStorage key
        let xeroTxs = [];
        try {
          const dbCache = DB.xeroCache?.invoices;
          const lsCache = JSON.parse(localStorage.getItem('mis-xero-invoices') || 'null');
          const cache   = dbCache || lsCache;
          xeroTxs = cache?.data || [];
        } catch(_) {}

        // Parse Xero /Date(ms)/ format → YYYY-MM-DD
        const xeroDate = d => {
          if (!d) return '';
          const m = String(d).match(/\/Date\((\d+)/);
          const dt = m ? new Date(parseInt(m[1])) : new Date(String(d));
          if (isNaN(dt)) return '';
          // Use local date components to avoid UTC timezone shift
          const y  = dt.getFullYear();
          const mo = String(dt.getMonth()+1).padStart(2,'0');
          const dy = String(dt.getDate()).padStart(2,'0');
          return `${y}-${mo}-${dy}`;
        };

        // Match an invoice to a Xero transaction:
        // Signals: amount (required, FX-adjusted), currency match/mismatch, date proximity
        //          (invoice OR due date), contact name, invoice/desc number in ref,
        //          description word overlap, project name in Xero description
        const AMOUNT_TOLERANCE_SAME_CCY  = 0.02; // 2%  — same currency
        const AMOUNT_TOLERANCE_CROSS_CCY = 0.15; // 15% — cross-currency, FX fluctuation between invoice and payment dates
        const matchXero = (inv) => {
          if (!xeroTxs.length || !inv.amount) return null;
          // If due date is in the future, payment hasn't happened yet — skip matching
          const today = new Date().toISOString().slice(0,10);
          if (inv.dueDate && inv.dueDate > today) return null;
          const invAmt     = parseFloat(inv.amount) || 0;
          const invCurr    = (inv.currency || dc).toUpperCase();
          const invDate    = inv.invoiceDate || '';
          const dueDate    = inv.dueDate || '';
          const invMonth   = invDate.slice(0, 7);
          const nClient    = norm(inv.clientName || '');
          const nProject   = norm(inv.projectName || '');
          const nDesc      = (inv.description || '').toLowerCase().trim();
          const invNum     = (inv.invoiceNumber || '').toLowerCase().replace(/\s+/g,'');

          // Extract invoice number from description — support full hyphenated numbers e.g. INV-2025-042
          // Pattern 1: explicit prefix (inv, invoice, #)
          const descInvNumPrefixed = nDesc.match(/(?:inv(?:oice)?|#)\s*[-]?\s*([\w][\w-]*\w|[\w]+)/i)?.[1]?.toLowerCase().replace(/\s+/g,'') || '';
          // Pattern 2: any token that looks like an invoice number (alphanumeric with dashes, min 3 chars, contains digit)
          const descTokens = nDesc.match(/[a-z0-9][\w-]*\d[\w-]*/gi) || [];
          const descInvNum = descInvNumPrefixed || descTokens[0]?.toLowerCase() || '';

          // Helper: extract all invoice-number-like tokens from a string
          const extractInvTokens = s => (s.match(/[a-z0-9][\w-]*\d[\w-]*/gi) || []).map(t => t.toLowerCase());

          // Helper: check if two invoice numbers partially match
          // e.g. "inv-2025-042" vs "2025-042" or "042"
          const invNumMatch = (a, b) => {
            if (!a || !b) return false;
            if (a === b) return true;
            if (a.includes(b) || b.includes(a)) return true;
            // Match significant numeric suffix — last segment of hyphenated number
            const aSuffix = a.split(/[-\/]/).pop();
            const bSuffix = b.split(/[-\/]/).pop();
            return aSuffix && bSuffix && aSuffix.length >= 2 && aSuffix === bSuffix;
          };

          let best = null, bestScore = 0, allCandidates = [];
          xeroTxs.forEach(tx => {
            const txAmt    = tx.Total || tx.amount || 0;
            const txDate   = xeroDate(tx.Date || tx.date);
            const txCurr   = (tx.CurrencyCode || tx.currency || '').toUpperCase();
            const txRate   = tx.CurrencyRate || 1; // Xero's exchange rate for this tx
            const txContact = norm(tx.Contact?.Name || tx.contact || '');
            const txRef    = (tx.Reference || tx.reference || '').toLowerCase();
            const txNarr   = (tx.Narration || '').toLowerCase();
            const txId     = tx.BankTransactionID || tx.id || '';
            const txLineDescs = (tx.LineItems || []).map(li => (li.Description||'').toLowerCase()).filter(Boolean);
            const txAllDesc   = [txNarr, txRef, ...txLineDescs].join(' ');

            if (!txAmt) return;

            // ── Pre-check: invoice number in Xero text ────────
            // Do this BEFORE the amount gate — if the invoice number is
            // found in the Xero description, the amount tolerance is widened
            // because this transaction may cover multiple invoices.
            const xeroTokens = extractInvTokens(txAllDesc);
            const invNumInXero = !!(
              (invNum && (txAllDesc.includes(invNum) || xeroTokens.some(t => invNumMatch(invNum, t)))) ||
              (descInvNum && (txAllDesc.includes(descInvNum) || xeroTokens.some(t => invNumMatch(descInvNum, t)))) ||
              (descTokens.length && descTokens.some(dt => xeroTokens.some(xt => invNumMatch(dt.toLowerCase(), xt))))
            );

            // ── Currency-aware amount gate ────────────────────
            const sameCurrency = !txCurr || !invCurr || txCurr === invCurr;
            let effectiveTxAmt = txAmt;

            if (!sameCurrency) {
              // Try FX conversion first
              const converted = FX.convertSync(txAmt, txCurr, invCurr);
              if (converted !== null) {
                effectiveTxAmt = converted;
              } else if (txRate && txRate !== 1) {
                // Xero's CurrencyRate converts foreign → base, so txAmt * rate = base currency amount
                // Try both directions since rate meaning varies
                const rateA = txAmt / txRate;
                const rateB = txAmt * txRate;
                // Pick whichever is closer to the invoice amount
                effectiveTxAmt = Math.abs(rateA - invAmt) < Math.abs(rateB - invAmt) ? rateA : rateB;
              }
            }

            // Amount tolerance:
            // - invoice number found in Xero: wider (8%) — may be a bundled payment
            // - same currency: strict 2%
            // - cross-currency: 8% for FX fluctuation
            // Removed the ">= 0.98" catch-all — it was matching any larger Xero transaction
            const tolerance = invNumInXero
              ? 0.08
              : sameCurrency ? AMOUNT_TOLERANCE_SAME_CCY : AMOUNT_TOLERANCE_CROSS_CCY;

            const amtMatch = invAmt > 0 && Math.abs(effectiveTxAmt - invAmt) / invAmt <= tolerance;
            if (!amtMatch) return;

            let score = 0;

            // ── Currency match bonus / mismatch penalty ───────
            if (sameCurrency) {
              score += 15; // expected — same currency is strong confirmation
            } else {
              score -= 10; // cross-currency match is weaker — penalise slightly
            }

            // ── Date constraint: payment cannot precede invoice date by more than 14 days ──
            // Allow up to 14 days early — client may pay proforma or invoice is backdated
            if (invDate && txDate) {
              const gapDays = (new Date(invDate) - new Date(txDate)) / 86400000;
              if (gapDays > 14) return;
            }

            // ── Date proximity: invoice date AND due date ─────
            const dateScore = (refDate) => {
              if (!refDate || !txDate) return 0;
              const diff = (new Date(txDate) - new Date(refDate)) / 86400000;
              if (diff < -14)  return -999; // payment more than 14 days before — reject
              if (diff < 0)    return 10;   // slightly early payment (proforma / backdated invoice)
              if (diff <= 7)   return 40;
              if (diff <= 30)  return 20;
              if (diff <= 60)  return 5;
              if (diff <= 365) return 1;
              return -999;
            };
            const invoiceDateScore = dateScore(invDate);
            const dueDateScore     = dateScore(dueDate);
            const bestDateScore    = Math.max(invoiceDateScore, dueDateScore);
            if (bestDateScore <= -999) return; // both dates too far
            if (bestDateScore < 0) return;
            score += bestDateScore;
            if (dueDateScore >= 20) score += 10; // bonus: payment near due date is expected

            // ── Contact name ──────────────────────────────────
            if (nClient && txContact && nameMatch(nClient, txContact)) score += 30;

            // ── Invoice number matching ───────────────────────
            if (invNumInXero) {
              // Strong signal — invoice number found in Xero text
              if (invNum && txRef.includes(invNum))          score += 35;
              else if (invNum && txNarr.includes(invNum))    score += 30;
              else if (invNum && txAllDesc.includes(invNum)) score += 25;
              else if (xeroTokens.some(t => invNumMatch(invNum || '', t)))  score += 22;

              if (descInvNum && descInvNum !== invNum) {
                if (txRef.includes(descInvNum))          score += 28;
                else if (txAllDesc.includes(descInvNum)) score += 20;
                else if (xeroTokens.some(t => invNumMatch(descInvNum, t))) score += 16;
              }
              if (descTokens.length && descTokens.some(dt => xeroTokens.some(xt => invNumMatch(dt.toLowerCase(), xt)))) score += 15;
            } else {
              // Weaker path — partial token match only
              if (invNum) {
                if (txRef.includes(invNum))          score += 25;
                else if (txNarr.includes(invNum))    score += 20;
                else if (txAllDesc.includes(invNum)) score += 15;
                else if (xeroTokens.some(t => invNumMatch(invNum, t))) score += 12;
              }
              if (descInvNum && descInvNum !== invNum) {
                if (txRef.includes(descInvNum))          score += 20;
                else if (txAllDesc.includes(descInvNum)) score += 14;
              }
            }

            // ── Description word overlap ──────────────────────
            if (nDesc && nDesc.length > 4) {
              if (txAllDesc.includes(nDesc)) {
                score += 25;
              } else {
                const invWords = nDesc.split(/\s+/).filter(w => w.length > 3);
                const matches  = invWords.filter(w => txAllDesc.includes(w));
                if (matches.length >= 2) score += 15;
                else if (matches.length === 1) score += 5;
              }
            }

            // ── Client name in Xero description ──────────────
            if (nClient && txAllDesc.includes(nClient)) score += 10;

            // ── Project name in Xero description ─────────────
            // Retainer/project clients often include project name in payment narration
            if (nProject && nProject.length > 3 && txAllDesc.includes(nProject)) score += 20;
            else if (nProject && nProject.length > 3) {
              // Word-level: shared meaningful words between project name and Xero desc
              const projWords = nProject.split(/\s+/).filter(w => w.length > 3);
              const projMatches = projWords.filter(w => txAllDesc.includes(w));
              if (projMatches.length >= 2) score += 12;
              else if (projMatches.length === 1) score += 5;
            }

            // ── Same month as invoice date ────────────────────
            if (invMonth && txDate.slice(0,7) === invMonth) score += 10;

            if (score > bestScore) { bestScore = score; best = { tx, txDate, txId, txRef: tx.Reference||tx.reference||'', score, invNumInXero }; }
            // Collect all positive-scoring candidates for fallback in dedup pass
            if (score > 0) allCandidates.push({ tx, txDate, txId, txRef: tx.Reference||tx.reference||'', score, invNumInXero });
          });
          allCandidates.sort((a,b) => b.score - a.score);

          // Require a meaningful minimum:
          // - Invoice number found EXACTLY in Xero ref/narration: score >= 30
          // - Invoice number found via token match only: score >= 50 AND contact required
          // - No invoice number match: score >= 60
          if (!best) return null;
          const bestTxRef     = (best.tx.Reference || best.tx.reference || '').toLowerCase();
          const bestTxNarr    = (best.tx.Narration || '').toLowerCase();
          const bestTxContact = norm(best.tx.Contact?.Name || best.tx.contact || '');
          const bestTxLineDescs = (best.tx.LineItems || []).map(li => (li.Description||'').toLowerCase()).filter(Boolean);
          const bestTxAllDesc = [bestTxNarr, bestTxRef, ...bestTxLineDescs].join(' ');
          const bestXeroTokens = extractInvTokens(bestTxAllDesc);
          const bestInvNumInXero = !!(
            (invNum     && (bestTxAllDesc.includes(invNum)     || bestXeroTokens.some(t => invNumMatch(invNum, t)))) ||
            (descInvNum && (bestTxAllDesc.includes(descInvNum) || bestXeroTokens.some(t => invNumMatch(descInvNum, t)))) ||
            (descTokens.length && descTokens.some(dt => bestXeroTokens.some(xt => invNumMatch(dt.toLowerCase(), xt))))
          );
          const invNumExact = !!(
            (invNum     && (bestTxRef.includes(invNum)     || bestTxNarr.includes(invNum))) ||
            (descInvNum && (bestTxRef.includes(descInvNum) || bestTxNarr.includes(descInvNum)))
          );
          let minScore;
          if (invNumExact) {
            minScore = 30;
          } else if (bestInvNumInXero) {
            const hasContactMatch = nClient && bestTxContact && nameMatch(nClient, bestTxContact);
            minScore = hasContactMatch ? 45 : 999;
          } else {
            const hasContactMatch = nClient && bestTxContact && nameMatch(nClient, bestTxContact);
            const bestTxCurr = (best.tx.CurrencyCode || best.tx.currency || '').toUpperCase();
            const isSameCcy = invCurr && bestTxCurr === invCurr;
            // Word-level contact match (e.g. "magnolia" in "magnolia sales support pte ltd")
            const hasWordContactMatch = !hasContactMatch && nClient && bestTxContact &&
              nClient.split(' ').filter(w => w.length > 3).some(w => bestTxContact.includes(w));
            // Amount diff — for cross-currency use converted amount
            const bestTxAmt = best.tx.Total || best.tx.amount || 0;
            let bestEffAmt = bestTxAmt;
            if (!isSameCcy && bestTxCurr && invCurr) {
              const conv = FX.convertSync(bestTxAmt, bestTxCurr, invCurr);
              if (conv !== null) bestEffAmt = conv;
              else {
                const txR = best.tx.CurrencyRate || 1;
                if (txR !== 1) bestEffAmt = Math.abs(bestTxAmt/txR - invAmt) < Math.abs(bestTxAmt*txR - invAmt) ? bestTxAmt/txR : bestTxAmt*txR;
              }
            }
            const amtDiffPct = invAmt > 0 ? Math.abs(bestEffAmt - invAmt) / invAmt : 1;
            const amtVeryClose = amtDiffPct <= 0.005; // 0.5%
            const amtClose     = amtDiffPct <= 0.02;  // 2%
            const amtReasonable = amtDiffPct <= 0.08;  // 8% — cross-ccy tolerance

            if      (hasContactMatch && (isSameCcy || amtVeryClose))           minScore = 40;
            else if (hasContactMatch && amtClose && isSameCcy)                  minScore = 43;
            else if (isSameCcy && amtClose)                                     minScore = 44;
            else if (hasWordContactMatch && isSameCcy && amtClose)              minScore = 44;
            else if (hasContactMatch && !isSameCcy && amtReasonable)            minScore = 44; // cross-ccy + contact + ~8%
            else if (!isSameCcy && amtClose && (hasContactMatch || hasWordContactMatch)) minScore = 44;
            else                                                                             minScore = 60;
          }
          return bestScore >= minScore ? { ...best, allCandidates } : { _noMatch: true, _bestScore: bestScore, _minScore: minScore, _bestTx: best?.tx, _bestTxDate: best?.txDate, _bestTxAmt: best?.tx ? (best.tx.Total||best.tx.amount||0) : 0, _bestContact: bestTxContact };
        };

        let xeroMatched = 0;

        const pendingXeroMatches = [];
        const importCutoff = DB.settings?.xeroSyncFrom || '';
        _rows.forEach(r => {
          // Skip rows before the configured import cutoff date entirely
          if (importCutoff && r.invoiceDate && r.invoiceDate < importCutoff) return;
          // Skip rows explicitly marked as "skip" in the bad debt column
          if (r.skip) return;
          const nClient  = norm(r.clientName);
          const nProject = norm(r.projectName);
          // ── Resolve or create client ──────────────────────
          let client = findClient(nClient);
          if (!client && nClient) {
            client = {
              id:           genId('cl'),
              name:         r.clientName.trim(),
              currency:     r.currency || DB.settings?.defaultCurrency || 'USD',
              billingModel: 'standard',
              importedAt:   importBatch,
            };
            DB.clients.push(client);
            clientMap.set(nClient, client);
            clientsCreated++;
          }

          // ── Resolve or create project ─────────────────────
          const scopedKey = nProject + '\x00' + (client?.id || '');
          let project = findProject(nProject, client?.id || '');
          if (!project && nProject) {
            project = {
              id:           genId('pr'),
              name:         r.projectName.trim(),
              clientId:     client?.id || '',
              currency:     r.currency || client?.currency || DB.settings?.defaultCurrency || 'USD',
              billingType:  'time_materials',
              retainer:     { hoursIncluded:0, monthlyFee:0, overageEnabled:false, overageRate:0, billingDay:1 },
              rateOverrides: {},
              importedAt:   importBatch,
            };
            DB.projects.push(project);
            projectMap.set(scopedKey, project);
            projectsCreated++;
          }
          // If still no project and client has exactly one project, use it
          if (!project && client) {
            const clientProjects = DB.projects.filter(p => p.clientId === client.id);
            if (clientProjects.length === 1) project = clientProjects[0];
          }

          // ── Xero match ────────────────────────────────────
          // Skip Xero matching if invoice date is before the configured sync-from date
          const xm = (!r.xeroInvoice && !r.paymentDate) ? matchXero({ ...r, projectName: r.projectName }) : null;
          // Store candidate match keyed by row index — deduplication happens below
          pendingXeroMatches.push({ idx: DB.invoices.length, xm, score: xm?.score || 0 });

          DB.invoices.push({
            id:             genId('inv'),
            invoiceNumber:  r.invoiceNumber,
            clientId:       client?.id || '',
            projectId:      project?.id || '',
            originalClient: r.clientName?.trim() || '',
            description:    r.description || '',
            amount:         r.amount,
            currency:       r.currency,
            invoiceDate:    r.invoiceDate,
            dueDate:        r.dueDate,
            xeroInvoice:    r.xeroInvoice || '',
            paymentDate:    r.paymentDate || '',
            status:         r.badDebt ? 'bad_debt' : r.status || 'unpaid',
            badDebt:        r.badDebt || false,
            invoiceLink:    r.invoiceLink || '',
            importedAt:     importBatch,
          });

          // ── Link to project invoiceLog ────────────────────
          // Populate the project's invoiceLog so it appears in Projections
          if (project && r.invoiceDate) {
            const month = r.invoiceDate.slice(0, 7); // YYYY-MM
            if (!project.invoiceLog) project.invoiceLog = {};
            // Only write if not already set (don't overwrite manual entries)
            if (!project.invoiceLog[month]) {
              project.invoiceLog[month] = {
                sentDate: r.invoiceDate,
                sentAmt:  r.amount,
                paidDate: r.status === 'paid' ? (r.dueDate || r.invoiceDate) : '',
                paidAmt:  r.status === 'paid' ? r.amount : 0,
              };
            }
          }
          added++;
        });

        // ── Dedup pass: assign each Xero transaction to at most one invoice ──
        pendingXeroMatches.sort((a, b) => b.score - a.score);
        const claimedTxIds = new Set();
        const unmatchedDiag = [];
        pendingXeroMatches.forEach(({ idx, xm }) => {
          if (!xm) return;
          if (xm._noMatch) {
            const inv = DB.invoices[idx];
            if (inv) unmatchedDiag.push({ inv, ...xm });
            return;
          }
          // Try best match first, then fall back through all candidates if claimed
          const candidates = xm.allCandidates?.length ? xm.allCandidates : [xm];
          let chosen = null;
          for (const cand of candidates) {
            const candId = cand.txId || cand.txRef || '';
            if (!candId || !claimedTxIds.has(candId)) { chosen = cand; break; }
          }
          if (!chosen) return; // all candidates claimed
          const txId = chosen.txId || chosen.txRef || '';
          if (txId) claimedTxIds.add(txId);
          const inv = DB.invoices[idx];
          if (!inv || inv.badDebt) return;
          inv.xeroInvoice  = chosen.txRef || chosen.txId || '';
          inv.paymentDate  = chosen.txDate || '';
          inv.status       = 'paid';
          inv.xeroAmount   = chosen.tx?.Total || chosen.tx?.amount || 0;
          inv.xeroCurrency = (chosen.tx?.CurrencyCode || chosen.tx?.currency || '').toUpperCase();
          xeroMatched++;
        });

        // ── Bundle pass: run AFTER all 1:1 matching is complete ──────
        // For invoices still unmatched, try pairs and triples that sum
        // to a single Xero transaction total (within 2% tolerance).
        if (xeroTxs.length) {
          const usedTxRefs = new Set(
            DB.invoices
              .filter(i => i.importedAt === importBatch && i.xeroInvoice)
              .map(i => i.xeroInvoice).filter(Boolean)
          );
          const unmatched = DB.invoices.filter(i =>
            i.importedAt === importBatch && !i.xeroInvoice && !i.paymentDate && i.status !== 'bad_debt'
          );

          // Group unmatched by clientId
          const byClient = {};
          unmatched.forEach(inv => {
            if (!inv.clientId) return;
            (byClient[inv.clientId] = byClient[inv.clientId] || []).push(inv);
          });

          // DEBUG
          console.log('[Bundle] unmatched invoices:', unmatched.map(i => `${i.invoiceNumber}(client:${i.clientId},amt:${i.amount},curr:${i.currency},invDate:${i.invoiceDate})`));
          console.log('[Bundle] usedTxRefs:', [...usedTxRefs]);

          xeroTxs.forEach(tx => {
            const txId      = tx.BankTransactionID || tx.id || '';
            const txRef     = tx.Reference || tx.reference || txId;
            if (usedTxRefs.has(txRef) || usedTxRefs.has(txId)) { console.log('[Bundle] SKIPPED (usedTxRefs):', txRef, tx.Total||tx.amount); return; }
            const txAmt     = tx.Total || tx.amount || 0;
            const txDate    = xeroDate(tx.Date || tx.date);
            const txCurr    = (tx.CurrencyCode || tx.currency || '').toUpperCase();
            const txContact = norm(tx.Contact?.Name || tx.contact || '');
            if (!txAmt || !txDate) return;

            // Try to match against each client group
            // Also try without contact matching as fallback (contact name may differ)
            const allClientIds = Object.keys(byClient);
            const matchingClientIds = allClientIds.filter(cid => {
              const c = DB.clients.find(cl => cl.id === cid);
              return c && nameMatch(norm(c.name), txContact);
            });
            // Fallback: try all clients if no contact match (Xero contact name may be different)
            const clientIdsToTry = matchingClientIds.length > 0 ? matchingClientIds : allClientIds;

            for (const cid of clientIdsToTry) {
              const candidates = byClient[cid].filter(inv => {
                if (inv.xeroInvoice) return false;
                const invCurr = (inv.currency || dc).toUpperCase();
                if (txCurr && invCurr && txCurr !== invCurr) return false;
                if (inv.invoiceDate && txDate < inv.invoiceDate) return false;
                const diff = inv.invoiceDate ? (new Date(txDate) - new Date(inv.invoiceDate)) / 86400000 : 999;
                return diff >= 0 && diff <= 365;
              });

              if (candidates.length < 2) continue;

              // Bundle tolerance is wider than 1:1 — rounding differences compound across invoices
              const TOL = 0.05; // 5%
              let found = null;

              // Validate found bundle: all invoices must have invoice dates
              // before the Xero payment date and within 365 days of it
              const validateBundle = (bundle) => {
                return bundle.every(inv => {
                  if (!inv.invoiceDate) return true; // no date to check
                  if (txDate < inv.invoiceDate) return false; // payment before invoice — impossible
                  const diff = (new Date(txDate) - new Date(inv.invoiceDate)) / 86400000;
                  return diff >= 0 && diff <= 365;
                });
              };

              // Try pairs
              outer: for (let i = 0; i < candidates.length; i++) {
                for (let j = i + 1; j < candidates.length; j++) {
                  const sum = candidates[i].amount + candidates[j].amount;
                  if (Math.abs(sum - txAmt) / txAmt <= TOL) {
                    const fnd = [candidates[i], candidates[j]];
                    if (validateBundle(fnd)) { found = fnd; break outer; }
                  }
                }
              }
              // Try triples
              if (!found) {
                outer2: for (let i = 0; i < candidates.length; i++) {
                  for (let j = i + 1; j < candidates.length; j++) {
                    for (let k = j + 1; k < candidates.length; k++) {
                      const sum = candidates[i].amount + candidates[j].amount + candidates[k].amount;
                      if (Math.abs(sum - txAmt) / txAmt <= TOL) {
                        const fnd2 = [candidates[i], candidates[j], candidates[k]];
                        if (validateBundle(fnd2)) { found = fnd2; break outer2; }
                      }
                    }
                  }
                }
              }
              // Try quads
              if (!found && candidates.length >= 4) {
                outer3: for (let i = 0; i < candidates.length; i++) {
                  for (let j = i + 1; j < candidates.length; j++) {
                    for (let k = j + 1; k < candidates.length; k++) {
                      for (let l = k + 1; l < candidates.length; l++) {
                        const sum = candidates[i].amount + candidates[j].amount + candidates[k].amount + candidates[l].amount;
                        if (Math.abs(sum - txAmt) / txAmt <= TOL) {
                          const fnd3 = [candidates[i], candidates[j], candidates[k], candidates[l]];
                          if (validateBundle(fnd3)) { found = fnd3; break outer3; }
                        }
                      }
                    }
                  }
                }
              }
              // Try quintuples
              if (!found && candidates.length >= 5) {
                outer4: for (let i = 0; i < candidates.length; i++) {
                  for (let j = i + 1; j < candidates.length; j++) {
                    for (let k = j + 1; k < candidates.length; k++) {
                      for (let l = k + 1; l < candidates.length; l++) {
                        for (let m = l + 1; m < candidates.length; m++) {
                          const sum = candidates[i].amount + candidates[j].amount + candidates[k].amount + candidates[l].amount + candidates[m].amount;
                          if (Math.abs(sum - txAmt) / txAmt <= TOL) {
                            found = [candidates[i], candidates[j], candidates[k], candidates[l], candidates[m]];
                            break outer4;
                          }
                        }
                      }
                    }
                  }
                }
              }

              if (found) {
                found.forEach(inv => {
                  inv.xeroInvoice  = txRef;
                  inv.paymentDate  = txDate;
                  inv.status       = 'paid';
                  inv.xeroAmount   = txAmt;
                  inv.xeroCurrency = txCurr;
                });
                xeroMatched += found.length;
                usedTxRefs.add(txRef);
                usedTxRefs.add(txId);
                break;
              }
            }
          });
        }

        saveDB(); o.remove(); renderView();
        const parts = [`${added} invoice${added!==1?'s':''} imported`];
        if (clientsCreated)  parts.push(`${clientsCreated} new client${clientsCreated!==1?'s':''} created`);
        if (projectsCreated) parts.push(`${projectsCreated} new project${projectsCreated!==1?'s':''} created`);
        if (xeroMatched)     parts.push(`${xeroMatched} matched to Xero`);
        if (!xeroTxs.length) parts.push('no Xero data — sync Xero in PAY first');
        toast(parts.join(' · ') + ' ✓');

        // Show diagnostic for unmatched invoices that had a near-miss in Xero
        const nearMisses = unmatchedDiag.filter(d => d._bestTx);
        if (nearMisses.length) {
          const diag = document.createElement('div');
          diag.className = 'modal-overlay';
          diag.innerHTML = `
            <div class="modal" style="max-width:720px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column">
              <div class="modal-header">
                <div class="modal-title">Xero Near-Misses — ${nearMisses.length} unmatched invoice${nearMisses.length!==1?'s':''}</div>
                <button class="modal-close" id="diag-close">✕</button>
              </div>
              <div style="overflow-y:auto;flex:1">
                <table style="width:100%;border-collapse:collapse;font-size:13px">
                  <thead><tr style="background:var(--bg);position:sticky;top:0">
                    <th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Invoice</th>
                    <th style="padding:8px 14px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Amount</th>
                    <th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Closest Xero Tx</th>
                    <th style="padding:8px 14px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Xero Amt</th>
                    <th style="padding:8px 14px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Score / Min</th>
                    <th style="padding:8px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Reason</th>
                  </tr></thead>
                  <tbody>
                    ${nearMisses.map(d => {
                      const txAmt = d._bestTxAmt;
                      const invAmt = d.inv.amount || 0;
                      const invCurr2 = (d.inv.currency || dc).toUpperCase();
                      const txCurr = (d._bestTx?.CurrencyCode || d._bestTx?.currency || '').toUpperCase();
                      const txContact = d._bestContact || '—';
                      const txDate = d._bestTxDate || '—';
                      const isSameCcy = txCurr === invCurr2;
                      // Convert Xero amount to invoice currency for fair comparison
                      let effAmt = txAmt;
                      let convNote = '';
                      if (!isSameCcy && txAmt) {
                        const conv = FX.convertSync(txAmt, txCurr, invCurr2);
                        if (conv !== null) { effAmt = conv; convNote = ` (≈${fmt(conv, invCurr2)})`; }
                        else {
                          const txR = d._bestTx?.CurrencyRate || 1;
                          if (txR !== 1) {
                            const rA = txAmt / txR, rB = txAmt * txR;
                            effAmt = Math.abs(rA - invAmt) < Math.abs(rB - invAmt) ? rA : rB;
                            convNote = ` (≈${fmt(effAmt, invCurr2)})`;
                          }
                        }
                      }
                      const amtDiff = invAmt > 0 ? ((Math.abs(effAmt - invAmt) / invAmt) * 100).toFixed(1) : '?';
                      const reasons = [];
                      if (d._bestScore < d._minScore) reasons.push(`Score ${d._bestScore} < min ${d._minScore}`);
                      if (parseFloat(amtDiff) > 2) reasons.push(`Amt diff ${amtDiff}%${!isSameCcy?' (converted)':''}`);
                      if (!isSameCcy) reasons.push(`Ccy ${invCurr2}≠${txCurr}`);
                      return `<tr style="border-bottom:1px solid var(--bg)">
                        <td style="padding:8px 14px;font-family:monospace;font-weight:700">${d.inv.invoiceNumber||'?'}
                          <div style="font-size:11px;font-weight:400;color:var(--text-3)">${d.inv.invoiceDate||''}</div>
                        </td>
                        <td style="padding:8px 14px;text-align:right;font-weight:700;font-family:monospace">${fmt(invAmt, invCurr2)}</td>
                        <td style="padding:8px 14px;color:var(--text-2)">${txContact}
                          <div style="font-size:11px;color:var(--text-3)">${txDate}</div>
                        </td>
                        <td style="padding:8px 14px;text-align:right;font-family:monospace;color:${parseFloat(amtDiff)<=2?'#678F2F':'#C0392B'}">${txAmt ? fmt(txAmt, txCurr||invCurr2) : '—'}${convNote}
                          <div style="font-size:11px;color:var(--text-3)">${amtDiff}% diff${!isSameCcy?' after FX':''}</div>
                        </td>
                        <td style="padding:8px 14px;text-align:center;font-family:monospace;font-size:12px;color:${d._bestScore>=d._minScore?'#678F2F':'#C0392B'}">${d._bestScore}/${d._minScore}</td>
                        <td style="padding:8px 14px;font-size:12px;color:#C0392B">${reasons.join(', ')||'—'}</td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
              <div style="padding:12px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--text-3)">
                Use <strong>Mark paid</strong> on overdue invoices to manually assign payment dates. Re-sync Xero in PAY if transactions are missing.
              </div>
            </div>`;
          document.body.appendChild(diag);
          diag.querySelector('#diag-close').onclick = () => diag.remove();
          diag.addEventListener('click', e => { if (e.target === diag) diag.remove(); });
        }
      };
    } catch(e) { stat.innerHTML = `<span style="color:var(--danger)">${e.message}</span>`; }
  });
}

// ── Export CSV ────────────────────────────────────────────


function exportInvoicesCSV() {
  const headers = ['invoice_number','client','original_client','project','description','amount','currency','invoice_date','due_date','xero_invoice','xero_date','days_late','status'];
  const rows = DB.invoices.map(inv => {
    const client  = getClient(inv.clientId);
    const project = (DB.projects||[]).find(p => p.id === inv.projectId);
    const diffDays = (inv.paymentDate && inv.dueDate) ? Math.round((new Date(inv.paymentDate+'T00:00:00') - new Date(inv.dueDate+'T00:00:00')) / 86400000) : '';
    return [inv.invoiceNumber, client?.name||'', inv.originalClient||'', project?.name||'', inv.description||'', inv.amount, inv.currency||dc, inv.invoiceDate, inv.dueDate, inv.xeroInvoice||'', inv.paymentDate||'', diffDays, inv.status||'unpaid'];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `invoices_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV exported ✓');
}


let _invFilter = { match: 'all', q: '' }; // 'all' | 'matched' | 'unmatched'

  actBtns.querySelector('#inv-unmatched-xero-btn').addEventListener('click', () => {

    const xeroDate2 = d => { if (!d) return ''; const m = String(d).match(/\/Date\((\d+)/); const dt = m ? new Date(parseInt(m[1])) : new Date(String(d)); if (isNaN(dt)) return ''; return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; };
    const fmtD2 = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';

    let xeroTxs = [];
    try {
      const dbCache = DB.xeroCache?.invoices;

    const unmatched = xeroTxs.filter(tx => {

        <div style="overflow-y:auto;flex:1">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:var(--bg);position:sticky;top:0">
              <th style="padding:7px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Date</th>
              <th style="padding:7px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Contact</th>
              <th style="padding:7px 14px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Amount</th>
              <th style="padding:7px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Currency</th>
              <th style="padding:7px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Reference</th>
              <th style="padding:7px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-3);border-bottom:1px solid var(--border)">Description</th>
            </tr></thead>
            <tbody id="ux-body">
              ${unmatched.map(tx => {
                const txDate = xeroDate2(tx.Date || tx.date);
                const txAmt  = tx.Total || tx.amount || 0;
                const txCurr = (tx.CurrencyCode || tx.currency || '').toUpperCase();
                const txContact = tx.Contact?.Name || tx.contact || '—';
                const txRef  = tx.Reference || tx.reference || '—';
                const txDesc = (tx.LineItems||[]).map(l => l.Description).filter(Boolean).join(', ') || tx.Narration || '—';
                return `<tr class="ux-row" style="border-bottom:1px solid var(--bg)">
                  <td style="padding:8px 14px;color:var(--text-2);white-space:nowrap">${fmtD2(txDate)}</td>
                  <td style="padding:8px 14px;font-weight:600">${txContact}</td>
                  <td style="padding:8px 14px;text-align:right;font-family:monospace;font-weight:700">${fmt(txAmt, txCurr||dc2)}</td>
                  <td style="padding:8px 14px"><span class="badge badge-blue">${txCurr||'—'}</span></td>
                  <td style="padding:8px 14px;color:var(--text-3);font-family:monospace;font-size:11px">${txRef}</td>
                  <td style="padding:8px 14px;color:var(--text-3);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${txDesc}">${txDesc}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
          ${unmatched.length === 0 ? '<div style="padding:32px;text-align:center;color:var(--text-3)">All Xero transactions are matched 🎉</div>' : ''}
        </div>
        <div style="padding:10px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-3)">
          These transactions exist in Xero but aren't linked to any invoice. Click a row on the Invoices table then use <strong>Mark paid</strong> to assign manually.
        </div>
      </div>`;
    document.body.appendChild(d);
    d.querySelector('#ux-close').onclick = () => d.remove();
    d.addEventListener('click', e => { if (e.target === d) d.remove(); });
    d.querySelector('#ux-search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      d.querySelectorAll('.ux-row').forEach(row => {
        row.style.display = !q || row.textContent.toLowerCase().includes(q) ? '' : 'none';
      });
    });
  });
  actBtns.querySelector('#inv-set-due-btn')?.addEventListener('click', () => {
    const missing = DB.invoices.filter(i => !i.dueDate && i.invoiceDate).length;
    const all     = DB.invoices.filter(i => i.invoiceDate).length;
    confirmModal(
      'Set Due Dates (Net 30)',
      `Set due date to <strong>invoice date + 30 days</strong>.<br><br>
       <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px">
         <input type="radio" name="due-mode" value="missing" checked> Missing only (${missing} invoices without a due date)
       </label>
       <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:8px">
         <input type="radio" name="due-mode" value="all"> All invoices (${all} total — overwrites existing due dates)
       </label>`,
      'Apply',
      () => {
        const mode = document.querySelector('input[name="due-mode"]:checked')?.value || 'missing';
        let updated = 0;
        DB.invoices.forEach(inv => {
          if (!inv.invoiceDate) return;
          if (mode === 'missing' && inv.dueDate) return;
          const d = new Date(inv.invoiceDate + 'T00:00:00');
          d.setDate(d.getDate() + 30);
          inv.dueDate = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          updated++;
        });
        saveDB(); renderView();
        toast(`${updated} due date${updated!==1?'s':''} set to net 30 ✓`);
      }
    );
  });
  actBtns.querySelector('#inv-del-all-btn')?.addEventListener('click', () => {
    const importedInvoices   = DB.invoices.filter(i => i.importedAt);
    const importedProjectIds = new Set(importedInvoices.map(i => i.projectId).filter(Boolean));
    const importedClientIds  = new Set(importedInvoices.map(i => i.clientId).filter(Boolean));
    const projectsToRemove   = DB.projects.filter(p => p.importedAt && importedProjectIds.has(p.id));
    const clientsToRemove    = DB.clients.filter(c => c.importedAt && importedClientIds.has(c.id));
    const invCount  = importedInvoices.length;
    const projCount = projectsToRemove.length;
    const cliCount  = clientsToRemove.length;
    if (!invCount) { toast('No imported invoices to delete', 'error'); return; }
    const detail = [
      `${invCount} invoice${invCount!==1?'s':''}`,
      projCount ? `${projCount} imported project${projCount!==1?'s':''}` : '',
      cliCount  ? `${cliCount} imported client${cliCount!==1?'s':''}` : '',
    ].filter(Boolean).join(', ');
    confirmModal('Delete Imported Records',
      `This will delete <strong>${detail}</strong> that were created during import. Manually added invoices and pre-existing clients/projects will not be affected.`,
      'Delete', () => {
        const removeProjectIds = new Set(projectsToRemove.map(p => p.id));
        const removeClientIds  = new Set(clientsToRemove.map(c => c.id));
        DB.invoices  = DB.invoices.filter(i => !i.importedAt);
        DB.projects  = DB.projects.filter(p => !removeProjectIds.has(p.id));
        DB.clients   = DB.clients.filter(c => !removeClientIds.has(c.id));
        saveDB(); renderView(); toast(`Deleted ${detail} ✓`);
      }
    );
  });

  // Per-row delete and flag
  el.querySelectorAll('.inv-del').forEach(btn => {
    btn.addEventListener('click', () => {
      confirmModal('Delete Invoice', 'This will permanently delete this invoice. This cannot be undone.', 'Delete', () => {
        DB.invoices = DB.invoices.filter(i => i.id !== btn.dataset.id);
        saveDB(); renderView(); toast('Invoice deleted');
      });
    });
  });
  el.querySelectorAll('.inv-row').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('button') || e.target.closest('a')) return;
      const inv = DB.invoices.find(i => i.id === row.dataset.id);
      if (!inv) return;
      const client  = getClient(inv.clientId);
      const project = (DB.projects||[]).find(p => p.id === inv.projectId);
      const fmtD = d => d ? new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
      const curr = inv.currency || DB.settings?.defaultCurrency || 'USD';

      // Find nearest Xero transactions from cache for context
      let xeroRows = '';
      try {
        const dbCache = DB.xeroCache?.invoices;
        const lsCache = JSON.parse(localStorage.getItem('mis-xero-invoices') || 'null');
        const txs = (dbCache || lsCache)?.data || [];
        const norm = s => (s||'').toLowerCase().replace(/[.,\-&]/g,' ').replace(/\b(pte\s*ltd|pvt\s*ltd|sdn\s*bhd|ltd|inc|corp|pte|pvt)\b\.?/gi,' ').replace(/\s+/g,' ').trim();
        const nClient = norm(client?.name || '');
        // Find all transactions from this client ±365 days
        const nearby = txs.filter(tx => {
          const txC = norm(tx.Contact?.Name || tx.contact || '');
          const txD = tx.Date ? (() => { const m = String(tx.Date).match(/\/Date\((\d+)/); return m ? new Date(parseInt(m[1])) : new Date(tx.Date); })() : null;
          const invD = inv.invoiceDate ? new Date(inv.invoiceDate+'T00:00:00') : null;
          const daysDiff = txD && invD ? Math.abs((txD - invD) / 86400000) : 999;
          const contactMatch = nClient && txC && (txC.includes(nClient) || nClient.includes(txC) || txC.split(' ').some(w => w.length > 3 && nClient.includes(w)));
          return contactMatch && daysDiff <= 365;
        }).sort((a,b) => {
          const da = a.Date ? (() => { const m = String(a.Date).match(/\/Date\((\d+)/); return m ? new Date(parseInt(m[1])) : new Date(a.Date); })() : new Date(0);
          const db2 = b.Date ? (() => { const m = String(b.Date).match(/\/Date\((\d+)/); return m ? new Date(parseInt(m[1])) : new Date(b.Date); })() : new Date(0);
          return da - db2;
        });
        xeroRows = nearby.length ? nearby.map(tx => {
          const txD = tx.Date ? (() => { const m = String(tx.Date).match(/\/Date\((\d+)/); return m ? new Date(parseInt(m[1])) : new Date(tx.Date); })() : null;
          const txDate = txD ? `${txD.getFullYear()}-${String(txD.getMonth()+1).padStart(2,'0')}-${String(txD.getDate()).padStart(2,'0')}` : '';
          const txAmt = tx.Total || tx.amount || 0;
          const txCurr = (tx.CurrencyCode || tx.currency || '').toUpperCase();
          const isThisMatch = inv.xeroInvoice && (inv.xeroInvoice === (tx.BankTransactionID||tx.id||'') || inv.xeroInvoice === (tx.Reference||tx.reference||''));
          return `<tr style="background:${isThisMatch?'rgba(103,143,47,0.06)':''}">
            <td style="padding:6px 12px;color:var(--text-2)">${fmtD(txDate)}</td>
            <td style="padding:6px 12px;color:var(--text-2)">${tx.Contact?.Name||tx.contact||'—'}</td>
            <td style="padding:6px 12px;text-align:right;font-family:monospace;font-weight:700;color:${isThisMatch?'#678F2F':'var(--text)'}">${fmt(txAmt, txCurr)}</td>
            <td style="padding:6px 12px;color:var(--text-3);font-size:11px">${tx.Reference||tx.Narration||'—'}</td>
            <td style="padding:6px 12px;text-align:center">${isThisMatch?'<span style="color:#678F2F;font-weight:700">✓ Matched</span>':'<span style="color:var(--text-3)">—</span>'}</td>
          </tr>`;
        }).join('') : '<tr><td colspan="5" style="padding:16px;text-align:center;color:var(--text-3)">No nearby Xero transactions found for this client — re-sync Xero in PAY</td></tr>';
      } catch(_) { xeroRows = '<tr><td colspan="5" style="padding:16px;text-align:center;color:var(--text-3)">Could not load Xero data</td></tr>'; }

      const d = document.createElement('div');
      d.className = 'modal-overlay';
      d.innerHTML = `
        <div class="modal" style="max-width:680px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column">
          <div class="modal-header">
            <div class="modal-title">${inv.invoiceNumber||'Invoice'} — Match Details</div>
            <button class="modal-close" id="imd-close">✕</button>
          </div>
          <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
            <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:3px">Client</div><div style="font-weight:600">${client?.name||'—'}</div></div>
            <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:3px">Project</div><div>${project?.name||'—'}</div></div>
            <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:3px">Amount</div><div style="font-weight:700;font-family:monospace">${fmt(inv.amount||0, curr)}</div></div>
            <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:3px">Invoice Date</div><div>${fmtD(inv.invoiceDate)}</div></div>
            <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:3px">Due Date</div><div>${fmtD(inv.dueDate)}</div></div>
            <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3);margin-bottom:3px">Status</div>
              <div>${inv.paymentDate ? `<span style="color:#678F2F;font-weight:700">Paid ${fmtD(inv.paymentDate)}</span>${inv.xeroAmount?` · ${fmt(inv.xeroAmount,inv.xeroCurrency||curr)}`:''}`:'<span style="color:#C0392B">Unpaid</span>'}</div>
            </div>
          </div>
          <div style="padding:12px 20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-3)">Nearby Xero Transactions (same client, ±365 days)</div>
          <div style="overflow-y:auto;flex:1">
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead><tr style="background:var(--bg)">
                <th style="padding:6px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Date</th>
                <th style="padding:6px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Contact</th>
                <th style="padding:6px 12px;text-align:right;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Amount</th>
                <th style="padding:6px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Reference</th>
                <th style="padding:6px 12px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Match</th>
              </tr></thead>
              <tbody>${xeroRows}</tbody>
            </table>
          </div>
        </div>`;
      document.body.appendChild(d);
      d.querySelector('#imd-close').onclick = () => d.remove();
      d.addEventListener('click', e => { if (e.target === d) d.remove(); });
    });
  });

  el.querySelectorAll('.inv-flag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const inv = DB.invoices.find(i => i.id === btn.dataset.id);
      if (!inv) return;
      inv.flagged = !inv.flagged;
      saveDB(); renderView();
      toast(inv.flagged ? '⚑ Invoice flagged — not found in Xero' : 'Flag removed');
    });
  });

  el.querySelectorAll('.inv-edit-link-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const inv = DB.invoices.find(i => i.id === btn.dataset.id);
      if (inv) showInvoiceModal(inv);
    });
  });

  el.querySelectorAll('.inv-mark-paid-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const inv = DB.invoices.find(i => i.id === btn.dataset.id);
      if (!inv) return;
      const o = document.createElement('div');
      o.className = 'modal-overlay';
      o.innerHTML = `
        <div class="modal" style="max-width:340px">
          <div class="modal-header">
            <div class="modal-title">Mark ${inv.invoiceNumber||'Invoice'} as Paid</div>
            <button class="modal-close" id="mp-close">✕</button>
          </div>
          <div class="modal-body">
            <div class="form-group"><label>Payment Date</label><input type="date" id="mp-date" value="${new Date().toISOString().slice(0,10)}"></div>
            <div class="form-group"><label>Xero Reference <span style="font-weight:400;color:var(--text-3);font-size:11px">(optional)</span></label><input type="text" id="mp-ref" placeholder="e.g. INV-0042 or UUID" style="font-family:monospace"></div>
            <div class="form-actions">
              <button class="btn btn-ghost" id="mp-cancel">Cancel</button>
              <button class="btn btn-primary" id="mp-save">Mark Paid</button>
            </div>
          </div>
        </div>`;
      document.body.appendChild(o);
      o.querySelector('#mp-close').onclick = o.querySelector('#mp-cancel').onclick = () => o.remove();
      o.addEventListener('click', e => { if (e.target === o) o.remove(); });
      o.querySelector('#mp-save').onclick = () => {
        const date = o.querySelector('#mp-date').value;
        const ref  = o.querySelector('#mp-ref').value.trim();
        if (!date) { toast('Please set a payment date', 'error'); return; }
        inv.paymentDate  = date;
        inv.status       = 'paid';
        if (ref) inv.xeroInvoice = ref;
        saveDB(); o.remove(); renderView();
        toast(`${inv.invoiceNumber||'Invoice'} marked as paid ✓`);
      };
    });
  });

}

let clientsTab = 'projects';
let projectDrillId = null; // project id when in drill-down

function renderClients(el, acts) {
  // Project detail drill-down
  if (projectDrillId) {
    renderProjectDetail(el, acts);
    return;
  }

  el.innerHTML = `
    <div class="tabs">
      <div class="tab ${clientsTab==='projects'?'active':''}" data-tab="projects">Projects</div>
      <div class="tab ${clientsTab==='clients'?'active':''}" data-tab="clients">Clients</div>
    </div>
    <div id="clients-tab-content"></div>
  `;

  el.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => { clientsTab = t.dataset.tab; history.replaceState({ view: 'clients' }, '', buildHash('clients')); renderView(); });
  });

  const content = el.querySelector('#clients-tab-content');

  if (clientsTab === 'clients') {
    acts.innerHTML = `<button class="btn btn-primary" id="new-client-btn">+ Add Client</button>`;
    content.innerHTML = `
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Client</th><th>Currency</th><th>Billing</th><th>Projects</th><th style="text-align:right">Actions</th></tr></thead>
            <tbody id="clients-body"></tbody>
          </table>
        </div>
      </div>

      body.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>No clients yet. Add your first client.</p></div></td></tr>`;
    } else {
